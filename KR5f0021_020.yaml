front:
  text: 抱朴子外篇卷之二十二十一二十二二十三同卷真八
  hash: sha256:8e8220387de4634e2a019d9975f727c1cc10d06a299ff1a4c2d61c8d32115d92
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_020-001a, image: hfl/0872/0872-012.png}
body:
  text: 名實門人問曰聞漢末之世靈獻之時品藻乖濫英逸窮滯叨餮得志名不準實賈不本物以其通者為賢塞者為愚其故何哉抱朴子答曰夫雷霆鞫磕而或不聞焉七曜經天而或不見焉豈唯形器有聾瞽哉心神所蔽亦又如之是以聞格言而不識者非無耳也見英異而不知者非無目也由乎聰不經妙而明不逮竒也夫智大量遠者盤桓以山峙器小志近者蓬飛而萍浮夫唯山峙故莫之能動焉夫唯萍浮故流而不滯焉方之貨也則緘連以待賈者唯至珍而難售鳴鼓以徇之者雖凡蔽而易盡比之材也則結根於嵩岱者雖竦蓋千仞垂蔭萬畒而莫之知也插株於塗要者雖鈎曲戾細而速朽而猶見用也故廟堂有枯楊之瑚簋窮谷多不伐之梓橡也是以竊華名者螻蜥騰於雲霄失實賈者翠虬淪乎九泉於是斥鷃淩風以高奮靈鳳卷翮以幽戢鉛鋒充太阿之寶犬羊佻勃高切獨行貌虎狼之資矣夫佞者鼓珍賂為徑羽則無高而不到矣乘朋黨為舟楫則無遠而不濟矣持之以夙興側立加之以先意承指其利口諛辭也似辨其道聽塗說也似學其心險貌柔也似仁其行汙言潔也似廉其好說人短也似忠其不知忌諱也似直故多通焉且亦奉望我者欲我益之不求我者我不能愛自然之理也夫賢常少而愚常多多則比周而匿瑕少則孤弱而無援佞人相汲引而柴正路俊哲處下位而不見知拔茅之義圯而負乘之群興亢龍高墜泣血漣如故子西逐大聖之仲尼臧倉毁命世之孟軻二生不免斯患降兹亦何足言斯禍蓋與開闢並生苦之匪唯一世也歷覽振古多同此疾至於駑蹇矯首於雕多么切輦駥驥委牧乎林坰彼已尸祿邦國殄瘁下淩上替實此之由或蟲流而莫斂或逆竄於申亥或擢筋於廟梁或絶命於望夷蓋所拔之非真而忠能之不用也故明君勤於招賢而汲汲於擢竒導達凝滯而嚴防壅蔽才誠足委不拘於屠釣言審可施抽之於戎戍或舉於牛口之下而加之於群僚之上或拔於桎梏之中而任以社稷之重故能勛業隆濟拓境服遠取威定功垂統長世也夫直繩者枉木之所憎也清公者姦慝之所讎也人主不能運玄鑒以索隱而必須當塗之所舉然每觀前代專權之徒率其所舉皆在乎附己者也所薦者先乎利己者也毁所畏而進所愛所畏則至公者也所愛則同私者也至公用則姦黨破衆私立則主威奪矣姦黨破則升泰之所由也主威奪則危亡之端漸矣毁所畏則恐辭之不痛雖刖劓之猶未𢜰意焉故必除之而後快也彼進所愛則苦談之不美雖位超之猶未逞心焉故必危彼以安此也是故抱枉而死無愆而黜者有自來矣所以體道合真嶷然特立才遠量逸懷霜履冰思綿天地器兼元凱執經衡門淵渟嶽立寧潔身以守滯耻脅肩以苟合樂飢陋巷以勵高尚之節藏器全真以待天年之盡非時不出非禮不動結褐嚼蔬而不悒悒也黃髮終否而不悢悢力尚切也安肯蹙太山之峻以適鑿柄之中斂垂天之羽為戒旦之役編於仕類而抑鬱庸兒之下捨鸞鳳之林適枳棘之藪競腐鼠於踞鴟而枉尺以直尋哉且大賢之狀也至拙其為味也甚淡蕭然自足泊爾無知知之者稀而不戚時不能用而不悶雖并日無藜藿之糝不以易不義之太牢也雖緼褐無卒歲之服不肯樂無道之狐白也獨可散髮高枕守其所有已絶不曲躬低眉求其所未須也德薄位厚弗交也名與實違弗親也榮華馳逐弗務也豪俠姦權弗接也俗說細辨不答也脅肩所赴弗隨也貌愚而志遠面垢而行潔確乎若嵩岱銓衡所不能測也浩乎若滄海斗斛所不能校也峻其重仞之高隱其百官之富觀彼佻竊若草莽也邈世之操眇焉冠秋雲之表遺俗之神緬焉棲九玄之端雖窮賤而不可脅以威雖危苦而不可動以利其所業尚可聞而不可盡也其所執守可見而不可論也故疾之者齊聲而側目愛之者寡弱而無益亦猶撮壤不能填决河升水不能殄原火於是鼖鼓戢雷霆之音鞉徒刀切鞞奴移切恣喋鼛音高之響芳蕙芟夷臭鮑佩御玄鬯傾弃而不羞醨酪專灌於圓丘汗血驅放而垂耳跛蹇馳騁於鑾軒此古人之所以懷沙負石赴流魚葬而不堪與之同世也已矣悲夫然捐玄黎於汙濘非夜光之不真也由莫識焉投彤盧而不彎非繁弱之不徑也坐莫賞焉故瓊瑶俟荆和而顯連城之賈烏號須逢門而著陷堅之功飛菟待子豫而飈騰俊民值知己而宣力若夫美玉不出重岫良弓不鑿百札驥騄不服朱軒命世不履爵勢則孰知其能攄符彩之耀曄頓雲禽於千仞騁逸迹以追風康庶績於百揆乎夫其不遇亦得不雜糅於瓦石鈞賤於朽木列鑣於下乘等望於凡瑣哉嗟乎彍棘矢而望高手乎渠廣策疲駑而求繼軌於周穆放斧斤而欲雙巧於班墨忽良才而欲彝倫之攸叙不亦難乎名實雖漏於一世德音可邀乎將來樂天知命何慮何憂安時處順何怨何尤哉抱朴子外篇卷之二十
