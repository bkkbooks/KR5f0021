front:
  text: 抱朴子外篇卷之二十三
  hash: sha256:65532140b90a4695851ae5cb5f9cbdf104d90422c4b738e1ec7936f62bf561bb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_023-001a, image: hfl/0872/0872-046.png}
body:
  text: 弭訟姑子劉君士由之論曰人綱始於夫婦判合擬乎二儀是故大婚之禮古人所重將合二姓之好以承祖宗之基主人拜迎於門聽命於廟玄纁贄幣親御授綏壻有三年之喪致命女氏女氏許諾而不敢改大喪既没請命於壻壻有辭焉然後乃嫁所以崇敬讓也豈有先訟後婚之謂乎而末世輕慢傷化敗俗舉不修義許而弗與訟䦧穢辱煩塞官曹今可使諸爭婚者未及同牢皆聽義絶而倍還酒禮歸其幣帛其嘗已再離者一倍禆娉其三絶者再倍禆娉如此離者不生訟心貪吝者無利重受乃王治之要術不易之永法也抱朴子答曰劉君愍德讓之凌替疾民爭之損化雖速我訟室家不足用和之貴將遂淪胥創讜言以拾世遺建嘉謀以拯流遁紛譁之俗將以此而易無耻之風將由兹而移彌綸情僞固難間矣誠經國之永法至益之篤論也洪以不敏不識至理造次承聞竊有疑焉夫婚媾之結義無逼迫彼則簡擇而求此則可意乃許輕諾後悔罪在女氏食言弃信與奪任情嚴防峻制未之能弭今猥恣之唯責禆娉倍貧者所憚也豐於財者則適其願矣後所許者或能富殖助其禆娉必所甘心然則先家拱默不得有言原情論之能無怨歎乎夫不伏之人視死猶歸血刃之禍於是將起今苟惜其辭訟之小醜而搆其難忍之大恨所謂愛其僦子宙切覽之煩忘其凋殞之酷也夫買物於市者或加價而奪之則鮮忍而不忿然矣沉乎見奪待告之妻哉此法遂用者將使結婚者雖納敬親迎猶抱有見奪之慮何者劉君之論以同牢爲斷固也爾則女氏雖受幣積年恒挾在意之威恃可數奪必惰於擇壻壻小不得意便得改悔結讎速禍莫此之甚矣曩人畫法慮關終始杜漸防萌思之良精而不關恣奪之路斷以報板之制者殆有意乎儻令女有國色傾城絶倫而值豪右權臣之徒目玩冶容心忘禮度資累千金情無所吝十倍還娉猶所不憚况但一乎華氏不難於殺孔父而取其妻楚人爲子迎婦以其美而自納之以此論之豈惜傾竭居産以助女氏還前家之直哉小人輕薄睚五懈魚計二切眦在鄒在計二切成怨又喜委衰逐盛蹋冷趨熱此法之行則必多奪貧賤而與富貴者矣不審吾君何方以防弊乎或曰可使女氏受娉禮無豐約皆以即日報板後皆使時人署姓名於别板必十人已上以備遠行及死亡又令女之父兄若伯叔答壻家書必手書一紙若有變悔而證據明者女氏父毋兄弟皆加刑罪如此庶於無訟者乎抱朴子外篇卷之二十三
