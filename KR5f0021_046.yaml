front:
  text: 抱朴子外篇卷之四十五
  hash: sha256:f791122910dc7ef3793e23365f2ce6110ff89ba8faa4b9ec1fe45580425f1ad2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_046-001a, image: hfl/0873/0873-116.png}
body:
  text: 文行或曰德行者本也文章者末也故四科之序文不居上然則著紙者糟粕之餘事可傳者祭畢之芻狗卑高之格是可譏矣抱朴子答曰筌可棄而魚未獲則不得無筌文可廢而道未行則不得無文若夫翰迹韻略之廣逼屬辭比義之妍媸源流至到之修短韞藉汲引之深淺其懸絶也雖天外毫内不足以喻其遼邈其相傾也雖三光熠燿不足以方其巨細龍淵鈆鋌未足譬其銳鈍鴻羽積金未足方其輕重而俗士唯見能染毫畫紙便槩以一例斯伯氏所以永思鍾子郢人所以格斤不運也夫斲削者比肩而班狄擅絶手之名援琴者至多而夔襄專清聲之稱廐馬千駟而騏騮有邈羣之價美人萬計而威施有超世之色者蓋遠過衆也且文章之與德行猶十尺之與一丈謂之餘事未之前聞也八卦生乎鷹隼之被六甲出於靈龜之負文之所在雖且貴本不必便疏末不必皆薄譬錦繡之因素地珠玉之託蜯石雲雨生於膚寸江河始於咫尺理誠若兹則雅論病矣又曰應龍徐舉顧眄而凌雲汗血緩步呼吸而千里故螻螘怪其無階而高致駑蹇驚過己之不漸也若夫馳驟詩論之中周旋一經之内以常情覽巨異以褊量測無涯始自髫齓詣于振素不能得也又世俗率貴古昔而賤當今敬所聞而黷所見同時雖有追風絶景之駿猶謂不及伯樂之所御也雖有宵朗兼城之璞猶謂不及楚和之泣也雖有斷馬指雕之劍猶謂不及歐冶之所鑄也雖有生枯起朽之藥猶謂不及和鵲之所合也雖有冠羣獨行之士猶謂不及於古人也抱朴子外篇卷之四十五
