front:
  text: 抱朴子外篇卷之九
  hash: sha256:8a59450d7cd325c51288ecd98c80575a21724a7979a03079e6f31a9de19a8f06
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_009-001a, image: hfl/0871/0871-102.png}
body:
  text: 官理抱朴子曰騄𩤟之騁逸迹由造父之御也禹稷之序百揆遭唐虞之主也故能不勞而千里至揖讓而頌聲作若乃臧獲之乘驌騻殷辛之臨三仁欲長驅輕騖則轡急轅逼欲盡規竭忠則禍福發機所以車傾於險塗國覆而不振也故良駿敗於拙御智士躓於闇世仲尼不能止魯侯之出晏嬰不能遏崔杼之亂其才則是主則非也夫君猶器也臣猶物也器小物大不能相受矣髫孺背千金而逐蛺蜨越人棄八珍而甘鼃黽即患不賞好又病不識惡矣夫不用則雖珍而不貴矣莫與則傷之者必至昔衛靈聽聖言而數驚秦孝聞高談而睡寐而欲緝隆平之化牧良能之勲猶却行以逐馳適楚而首燕也抱朴子外篇卷之九
  hash: sha256:e83ca99eca4b8c39db5daea14e158e4d1d94175bf3e9389bc95d19304f62e302
