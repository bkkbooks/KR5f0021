front:
  text: 抱朴子外篇卷之一真一
  hash: sha256:e1271baf688762cf2f983738d3cb71f35b3462061ea0dccdbafcb5f400e808b7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_001-001a, image: hfl/0871/0871-004.png}
body:
  text: 嘉遁抱朴子曰有懷氷先生者薄周流之棲遑悲吐握之良苦讓膏壤於陸海爰躬耕乎斥鹵祕六竒以括囊含琳琅而不吐謐清音則莫之或聞掩輝藻則世不得覩背朝華於朱門保恬寂乎蓬户絶軏躅於金張之閭養浩然於幽人之仵謂榮顯為不幸以玉帛為草土抗靈規於雲表獨違今而遂古庇峻岫之巍峩籍翠蘭之芳茵漱流霞之澄液茹八石之精英思眇眇焉若居乎虹霓之端意飄飄焉若在乎倒景之鄰萬物不能攪其和四海不足汩其神於是有赴勢公子聞之慨然而歎曰空谷有頂領之駿者孫陽之耻也太乎遺冠世之才者賞真之責也安可令俊民全其獨善之分而使聖朝乏乎元凱之用哉乃造而説曰徒聞振翅竦身不能淩厲九霄騰跚玄極攸敘彝倫者非英偉也今先生操立斷之鋒掩炳蔚之文玩圖籍於絶迹之藪括藻麗乎鳥獸之群陳龍章於晦夜沈琳琅於重淵蟄伏於盛夏藏華於當春雖復下惟覃思殫毫騁藻幽贊太極闡釋元本言歡則木梗怡顔如巧笑語戚則偶象頻顣而滂沱抑輕則鴻羽沈於弱水抗重則玉石漂於飛波離同則肝膽為胡越合異則萬殊而一和切論則秋霜春肅溫辭則冰條吐葩摧高則峻極頽淪竦卑則淵池嵯峨疵清則倚暗夜光救濁則立澄黃河然不能沾芳惠於庶物著弘勛於皇家名與朝露皆睎體與蜉蝣並化忽崇高於聖人之寶忘川逝於大耋之嗟竊為先生不取焉蓋聞大者天地其次君臣先聖憂時思行其道三月無君皇皇如也耻今聖主不與堯舜一致愍此黎民不可比屋而封故或負鼎而龍躍或扣角以鳳歌不須蒲輪而後動不待文王而後興潛初飛五與時消息進有攸往之利退無濡尾之纍明哲以保身宣化以濟俗使夫承蘭風以傾柯濯清波以遣穢者若沈景之應朗鑒方圓之赴規矩故勳格上下惠沾八表夫有唐所以巍巍重華所以恭己西伯所以三分姬發所以革命桓文所以一匡漢高所以應天未有不致群賢為六翮託豪傑為舟楫者也若令各守洗耳之高人執耦耕之分則稽古之化不建英明之盛不彰明良之歌不作括天之網不張矣故藏器者珍於變通隨時英逸者貴於吐竒撥亂若乃耀靈翳景於雲表則麗天之明不著哮虎韜牙而握瓜則搏噬之捷不揚太阿潛鋒而不擊則立斷之徑不顯驥騄踠趾而不馳則追風之迅不形並默則子貢與喑者同口咸瞑則離朱與矇瞽不殊矣先生潔身而忽大倫之亂得意而忘安上之義存有關機之纍沒無金石之聲庸人且猶憤色何有大雅而無心哉夫繩舒則木直正進則邪凋有虞舉則四凶戮宣尼任則少卯梟猶震雷駭則鼛鼓堙朝日出則螢燭幽也不拯招魂之病則無以效越人之絶伎不獎多難之世則無以知非常之遠量高拱以觀溺非勿踐之仁也懷道以迷國非作者之務也若俟中唐殖占日之草朝陽繁鳴鳳之音郊時獨角之獸野攢連理之林長旌卷而不懸干戈戢而莫尋少伯方將告退於成功孰能相擢乎陸沈哉深願先生不遠迷復哉於是懷冰先生蕭然遐眺遊氣天衢情神遼緬旁若無物俯而答曰嗚呼有是言乎蓋至人無為棲神沖漠不役志於祿利故害而不能加也不躇峙於險途故傾墜不能為患也藜藿不供而意佚於方丈齊編庸民而心歡於有土寢宜僚之舍閉干木之閭携莊萊之友治陋巷之居礭嶽峙而不拔豈有懷於卷舒乎以欲廣則濁和故委世務而不紆眄以位極者憂深故背勢利而無餘疑其貴不以爵也富不以財也侣雲鵬以高逝故不縈翮於腐鼠以蕃武為厚誡故不改樂於簞瓢且夫玄黃遐邈而人生倏忽以過隙之促託罔極之間迅乎猶奔星之暫見飄乎以飛矢之電經聊且優遊以自得安能苦形於外物哉夫鳶不絓網驎不墮穽相彼鳥獸猶知為患風塵之徒曾是未吝也若夫要離滅家以效功紀信赴燔以誑楚陳賈刎頸以證弟仲由投命而葅醢嬴門伏剱以表心聶政感惠而屠葅荆卿絶臏以報燕樊公含悲而授首皆下愚之狂惑豈上智之攸取哉蓋厚祿者責重爵尊者神勞故漆園垂綸而不顧𡖖相之貴柏成操耜而不屑諸侯之高羊説安乎屠肆揚朱吝其一毛僥求之徒昧乎可欲集不擇木仕不料世貪進不慮負乘之禍受任不計不堪之敗論榮貴則引伊周以救溺言亢悔則諱覆餗而不記伺河龍之睡而撥明珠居量表之寵而冀無患耽漏刻之安蔽必至之危無朝菌之榮望大椿之壽似蹈薄冰以待夏日登朽枝而須徑風淵魚之引芳餌澤雉之咽毒粒咀漏脯以充飢酣鳩酒以止渴也昔箕子覩象箸而流泣尼父聞偶葬而永歎蓋尋微以知著原始以見終然而暗夫蹈機不覺何前識之至難而利欲之𤵜篤邪周成賢而信流言公旦聖而走南楚託鴟梟以告悲賴金縢以僅免况能寤之主不世而一有不悅之謗無時而暫乏德不以激烈風而起斃禾事不以載圭璧而稱多才嗟泣靡及宜其然也夫漸漬之久則膠漆解堅浸潤之至則骨肉乖析塵羽之積則沈舟折軸三至之言則市虎以成故江充疏賤非親於元儲後毋假繼非密於伯竒而掘梗之誣滅父子之恩袖蜂之誑破天性之愛又况其他安可自必嗟乎伍貟所以懷忠而漂尸悲夫白起所以秉義而刎頸也蓋徹鑒所為寒心匠人之所眩惑矣又欲推短才以釐雷同仗獨是以彈衆非然不覩金雖克木而錐鑽不可以伐鄧林水雖勝火而升合不足以救焚山寸膠不能治黃河之濁尺水不能却蕭丘之熱是以身名並全者甚稀而先笑後號者多有也畏亢悔而貪榮之欲不滅忌毁辱而爭肆之情不遣亦猶惡濕而泳深淵憎影而不就隂穿舟而息漏猛爨而止沸者也夫七尺之骸稟之以所生不可受全而歸殘也方寸之心制之在我不可放之於流遁也躬耕以食之穿井以飲之短褐以蔽之蓬廬以覆之彈詠以娛之呼吸以延之逍遙竹素寄情玄毫守常待終斯亦足矣且夫道存則尊德盛則貴隋珠彈雀智者不為何必須權而顯俟祿而飽哉且夫安貧者以無財為富甘卑者以不任為榮故幼安浮海而澄神胡子甘心於退耕逢比有令德之罪信布陷功大之刑一枝足以戢鸞羽何煩乎豐林潢汙足以泛龍鱗豈事乎滄海藜藿嘉於八珍寒泉旨於醽醁攝縷美於赤舄緼袍麗於衮服把橦安於杖鉞鳴條樂乎絲竹茅茨艷於丹楹采椽珍於刻桷登嵩峰為臺榭庇巖霤為華屋積篇章為敖庾寶玄談為金玉棄細人之近戀損庸隸之所欲遊九臯以含歡遣智惠以絶俗同屈尺蠖藏光守朴表拙示訥知止常足然後咀嚼芝芳風飛雲浮晞景九陽附翼高遊仰棲梧桐俯集玄洲孰與銜轡而伏櫪同被繡於犧牛哉赴勢公子曰夫入而不出者謂之耽寵忘退往而不反者謂之不仕無義故達者以身非我有任乎所值隱顯默語無所必固時止則止時行則行束帛之集庭燎之舉則君子道長在天利見若運陟陽九讒勝之時則不出户庭括囊勿用龍起鳳戢隨時之宜古人所以或避危亂方不肯入或色斯而不終日者慮巫山之失火恐芝艾之并焚耳方今聖皇御運世夷道泰仁及蒼生惠風遐邁威肅鬼方澤沾九裔儀坤德以厚載擬乾穹以高蓋神化則雲行雨施玄澤則煙煴汪濊四門穆穆以博延主思英逸以俾乂此乃千載所希值剖判之一會而先生慕嘉遁之偏枯不覺狷華之患害也務乎單豹之養內未覩暴虎之犯外也是聞涉水之或溺則謂乘舟者皆敗以商臣之凶逆則謂繼體無類也懷冰先生曰聖化之盛誠如高論出處之事人各有懷故堯舜在上而箕穎有巢棲之客夏后御世而窮藪有握耒之賢豈有慮於此險哉蓋各附於所安也是以高尚其志不仕王侯存夫爻象匹夫所執延州守節聖人許焉僕所以逍遙於丘園斂迹乎草澤者誠以才非政事器乏治民而多士雲起髦彥鱗萃文武盈朝庶事既康故不欲復舉熠耀以厠日月之間拊甂瓴於洪鍾之側貢輕扇於堅冰之節衒裘爐乎隆暑之月必見捐於無用速非時之巨嗤若擁經著述可以全真成名有補末化若強所不堪則將顛沛惟咎同悔小狐故居其所長以全其所短耳雖無立朝之勳即戎之勞然切磋後生弘道養正殊塗一致非損之民也劣者全其一介何及於許由聖世恕而容之同曠於有唐不亦可乎赴勢公子勃然自失肅爾改容曰先生立言助教文討姦違摽退靜以抑躁競之俗興儒教以救微言之絶非有出者誰敘彝倫非有隱者誰誨童蒙普天率土莫匪臣民亦何必垂纓執笏者為是而樂飢衡門者可非乎失群迷乎雲夢者必須指南以知道並乎滄海者必仰辰極以得返今聞嘉訓乃覺其蔽請負衣冠策駑希驥泛愛與進不嫌擇焉抱朴子外篇卷之一
