front:
  text: 抱朴子外篇卷之四十九志六
  hash: sha256:334ac0086f06c9f7b785798dc7a63cfcc998878f808b8894078839dfe76d4c4c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_050-001a, image: hfl/0873/0873-168.png}
body:
  text: 知止抱朴子曰禍莫大於無足福無厚乎知止抱盈居沖者必全之算也宴安盛滿者難保之危也若夫善卷巢許管胡之徒咸蹈雲物以高驁依龍鳳以竦迹覘韜鋒於香餌之中寤覆車乎來軔之路違險塗以遐濟故能免詹何之釣緡可謂善料微景於形外覿堅冰於未霜徙薪曲突於方熾之火纚舟弭楫於衝風之前瞻九犗而深沈望密蔚而曾逝不託巢於葦苕之末不偃寢乎崩山之崖者也斯皆器大量弘審機識致淩儕獨往不牽常欲神參造化心遺萬物可欲不能蠆介其純粹近理不能耗滑其清澄苟無若人之自然誠難企及乎絶軌也徒令知功成身退慮勞大者不賞狡兔訖則知獵犬之不用高島盡則覺良弓之將棄鑒彭韓之明鏡而念抽簪之術覩越種之暗機則識金象之貴若范公泛艘以絶景薛生遜亂以全潔二疏投印於方盈田豫釋紱於漏盡進脫亢悔之咎退無濡尾之吝清風足以揚千載之塵德音足以祛將來之惑方之陳竇不亦邈乎或智小敗於謀大或轅弱折於載重或獨是陷於衆非或盡忠訐於兼會或唱高算而受朝錯之禍或竭心力而遭吳起之害故有局高蹐厚猶不免焉公旦之放仲尼之行賈生遜擯於下土子長熏骨乎無辜樂毅平齊伍員破楚白起以百勝拓疆文子以九術霸越韓信功蓋於天下黥布滅家以佐命榮不移晷辱以及之不避其禍豈智者哉為臣不易豈將一塗要而言之决在擇主我不足賴其驗如此告退避賢潔而且安美名厚實福莫大焉能修此術萬未有一吉凶由人可勿思乎逆耳之言樂之者希獻納期榮將速身禍救訞謗其不暇何信受之可必哉夫增繳紛紜則鴛雛徊翮坑穽充蹊則麟虞斂跡情不可極欲不可滿達人以道制情以計遣欲為謀者猶宜使忠況自為榮而不詳哉蓋知足者常足也不知足者無足也常足者福之所赴也無足者禍之所鍾也生生之厚殺哉生矣宋氏引苗郢人張革誠欲其快而實速萎裂知進忘退斯之以乎夫莢奔而不止者鮮不傾墜凌波而無休者希不沉溺弄刃不息者傷刺之由也斫擊不輟者缺毁之原也盈則有損自然之理周廟之器豈欺我哉故養由之射行人識以弛弦東野之御顔子知其方敗成功之下未易久處也夫飲酒者不必盡亂而亂者多焉富貴者豈其皆危而危者有焉智者料事於倚伏之表伐木於毫末之初吐高言不於纍棋之際議治裘不於羣狐之中古人佯狂為愚豈所樂哉時之宜然不獲已也亦有深逃而陸遭濤波幽遁而水被焚燒若龔勝之絶粒以殞命李業煎蹙以吞鴆由乎迹之有眹景之不滅也若使行如蹈水身如居隂動無遣蹤可尋靜與無為為一豈有斯患乎又况乎揭日月以隱形骸擊建鼓以徇利器者哉夫值明時則優於濟四海遇險世則劣於保一身為此永慨非一士也吾聞無熾不滅靡溢不損焕赫有委灰之兆春草為秋瘁之端日中則昃月盈則蝕四時之序成功者退遠取諸物則構高崇峻之無限則頽壞惟憂矣近取諸身則嘉膳㫖酒之不節則結疾傷性矣況乎其高概雲霄而積之猶不止其威震人主而加崇又不息者乎蚊虻墮山適足翱翔兕虎之墜碎而為齏此言大物不可失所也且夫正色彈違直道而行打撲于紀不慮讎鄛則怨深恨積若舍法容非屬託如響吐剛茹柔委曲繩墨則忠喪敗居此地者不亦勞乎是以身名並全者甚希而折足覆餗者不乏也然而入則蘭房窈窕朱帷組帳文茵兼舒於華第艷容粲爛於左右輕體柔聲清歌妙舞宋蔡之巧陽阿之妍口吐採菱延露之曲足躡渌水七槃之節和音悅耳冶姿娛心密宴繼集醽醁不撤仰登綺閣俯映清淵遊果林之丹翠戲蕙圃之芬馥文鱗瀺灂采羽頡頏飛繳墮雲鴻沉綸引魴鯉遠玲不索而交集玩弄紛華而自至出則朱輪耀路高蓋接軫丹旗雲蔚麾節翕赫金口嘈獻戈甲璀錯得意託於後乘嘉㫖盈乎屬車窮遊觀之娛極畋漁之歡聖眀之譽滿耳而入諂悅之言異口同辭于時眇然意蔑古人謂伊吕管晏不足算也豈覺崇替之相為首尾哀樂之相為朝暮肯謝貴盛乞骸骨背朱門而反丘園哉若乃聖明在上大賢讚事百揆非我則不叙兆民非我則不濟高而不以危為憂滿而不以溢為慮者所不論也窮達或問一流之才而或窮或達其故何也俊逸縶滯其有憾乎抱朴子答曰夫器業不異而有抑有揚者無知己也故否泰時也通塞命也審時者何怨於沉潜知命者何恨於卑瘁乎故沉閭渟鈞精徑之良也而不以擊則朝菌不能斷焉珧華黎緑連城之寶也委之泥濘則瓦礫積其上焉故可珍而不必見珍也可用而不必見用也庸俗之夫暗於别物不分朱紫不辨菽麥唯以達者為賢而不知僥求者之所達也唯以窮者為劣而不詳守道之所窮也且夫懸象不麗天則不能揚大明灼無外嵩岱不託地則不能竦峻極概雲宵兔足因夷塗以騁迅龍艘泛激流以效速離光非燧人不熾楚金非歐冶不剡豐華俟發春而表艷棲鴻待衝飈而輕戾四嶽不明揚則有鰥不登庸叔牙不推賢則夷吾不式厚穰苴賴平仲以超踔淮隂因蕭公以鷹揚隻生由勝之之談曲逆緣無知之薦元直起龍縈之孔明公瑾貢虎卧之興霸故能美名垂於帝籍弘勳著於當世也漢之末年吳之季世則不然焉舉士也必附己者為前取人也必多黨者為决而附己者不必足進之器也同乎我故不能遺焉而多黨者不必逸羣之才也信衆口故謂其可焉或信此之庸猥而不能遣所念之近情或適彼之英異而不能平心於至公於是釋銓衡而以疏數為輕重矣棄度量而以綸集為多少矣于時之所謂雅人高韻秉國之鈞黜陟决己褒貶由口者鮮哉免乎斯纍也又况於胸中卒有憎獨立疾非黨忌勝己忽寒素者乎悲夫邈俗之士不羣之人所以比肩不遇不可勝計或抑頓於藪澤或立朝而非退也蓋修德而道不行藏器而時不會或俟河清而齒已沒或竭忠勤而不見知遠用不騁於一世勳澤不加於生民席上之珍鬱於泥濘濟物之才終於無施操築而不值武丁抱竿而不遇西伯自曩迄今將有何限而獨悲之不亦陋哉瞻徑路之遠而恥由之知大道之否而不改之齊通塞於一塗付榮辱於自然者豈懷悒悶於知希興永歎於川逝乎疑其有憾是未識至人之用心也小年之不知大年井蛙之不曉滄海自有來矣重言抱朴子曰余友人玄怕先生者齒在志學固已窮覽六略旁綜河雒晝競羲和之末景夕照望舒之餘輝道靡遠而不究言無微而不測以儒道為城池以機神為干戈故談者莫不望塵而銜璧文士寓目而格筆俄而寤智者之不言覺守一之無咎意得則齊筌蹄之可棄道乖則覺唱高而和寡於是奉老氏多敗之戒思金人三緘之義括鋒穎而如訥韜修翰於彤管含金懷玉抑謐華辨終日彌夕或無一言門人進曰先生默然小子胡述且與庸夫無殊焉竊謂號鍾不鳴則不異於積銅浮磬息音則未别乎聚石也玄怕先生答曰吾特收遠名於萬代求知己於將來豈能競見知於今日標格於一時乎陶甄以盛酒雖美不見酣身卑而言高雖是不見信徒卷舌而竭聲將何救於流遁古人六十笑五十九不遠迷復乃覺有以也夫玉之堅金之剛也冰之冷也火之熱也豈須自言然後明哉且八音九奏不能無長短之病養由百發不能止將有一矢之疏玩憑河者數溺於水好劇談者多漏於口伯牙謹於操絃故終無煩手之纍儒者敬其辭令故無樞機之辱淺近之徒則不然焉辨虛無之不急爭細事以費言論廣修堅白無用之說訟諸子非聖過正之書損教益惑謂之深遠委棄正經競治邪學或與暗見者較脣吻之勝負為不識者吐清商之談對非敵力之人旁無賞解之客何異奏雅樂於木梗之側陳玄黃於土偶之前哉徒口枯氣乏椎杭抵掌斤斧缺壞而槃節不破勃然戰色而乖忤愈遠致令恚容表顔醜言自口偷薄之變生乎其間既玷之謬不可救磨未若希聲以全大音約說以俟識者矣抱朴子外篇卷之四十九
