front:
  text: 抱朴子外篇卷之七八九十十一十二十三同卷真五
  hash: sha256:82c24be42f147e9be20643bdc44f4dfa949067ab76c1b17580b0f923c32cf63a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_007-001a, image: hfl/0871/0871-090.png}
body:
  text: 良規抱朴子曰翔集而不擇木者必有離罻之禽矣出身而不料時者必有危辱之士矣時之得也則飄乎猶應龍之覽景雲時之失也則蕩然若巨魚之枯崇陸是以智者藏其器以有待也隱其身而有為也若乃高巖將霣非細縷所綴龍門沸騰非掬壤所遏則不苟且於乾沒不投險於僥幸矣抱朴子曰周公之攝王位伊尹之黜太甲霍光之廢昌邑孫琳之退少帝謂之舍道用權以安社稷然周公之放逐狼跋流言載路伊尹終於受戮大霧三日霍光幾於及身家亦尋滅孫琳桑蔭未移首足異所皆笑音未絶而號咷已及矣夫危而不持安用彼相爭臣七人無道可救致令王莽之徒生其姦變外引舊事以飾非內包豺狼之禍心由於伊霍基斯亂也將來君子宜深鑒兹矣夫廢立之事小順大逆不可長也召王之譎已見貶抑況乃退主惡其可乎此等皆計行事成徐乃受殃者耳若夫隂謀始權而貪人賣之赤族殄祀而他家封者亦不少矣若有姦佞翼成驕亂若桀之干辛推哆尺氏切張口也紂之崇侯惡來厲之黨也改置忠良不亦易乎除君側之衆惡流凶族於四裔擁兵持壃直道守法嚴操柯斧正色拱繩明賞必罰有犯無赦官賢任能唯忠是與事無專擅請而後行君有違謬據理正諫戰戰兢兢不忘恭敬使社稷永安於上己身無患於下功成不處乞骸告退高選忠能進以自代不亦綽有餘裕乎何必奪至尊之璽紱危所奉之見主哉夫君天也父也君而可廢則天亦可改父亦可易也功蓋世者不賞威震王者身危此徒戰勝攻取勛勞無二者且猶鳥盡而弓棄免訖而犬烹况乎廢退其君而欲後主之愛己是奚異夫為人子而舉其所生捐之山谷而取他人養之而云我能為伯瑜曾參之孝但吾親不中奉事故棄去之雖日享三牲昏定晨省豈能見憐信邪霍光之徒雖當時增班進爵賞賜無量皆以計見崇豈斯人之誠心哉夫納棄妻而論前壻之惡買僕虜而毁故主之暴凡人庸夫猶不平之何者重傷其類自然情也故樂羊以安忍見踈而秦西以過厚見親而世人誠謂湯武為是而伊霍為賢此乃相勸為逆者也又見廢之君未必悉非也或輔翼少主作威作福罪大惡積慮於為後患及尚持勢因而易之以延近局之禍規定策之功計在自利未必為國也取威既重殺生決口見廢之主神器去矣下流之罪莫不歸焉雖知其然孰敢形言無東牟朱虛以致其計無南史董狐以證其罪將來今日誰又理之獨見者乃能追覺桀紂之惡不若是其惡湯武之事不若是其美也方策所載莫不尊君卑臣強幹弱枝春秋之義天不可讎大聖著經資父事君民生在三奉之如一而許廢立之事開不道之端下凌上替難以訓矣俗儒沈淪鮑肆困於詭辨方論湯武為食馬肝以彈斯事者為不知權之為變貴於起善而不犯順不謂及理而叛義正也而前代立言者不折之以大道使有此情者加夫立剡鋒之端登方崩之山非所以延年長世遠危之術雖策命暫隆弘賞暴集無異乎犧牛之被紋繡淵魚之愛莽麥渴者之恣口於雲日之酒飢人之取飽於鬱肉漏脯也而屬筆者皆共褒之以為美談以不容誅之罪為知變使人於悒而永慨者也或諫余以此言為傷聖人必見譏貶余答曰舜禹歷試內外然後受終文祖雖有好傷聖人者豈能傷哉昔嚴延年廷奏霍光為不道于時上下肅然無以折也况吾為世之誡無所指斥何慮乎常言哉抱朴子外篇卷之七
