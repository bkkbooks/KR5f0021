front:
  text: 抱朴子外篇卷之二十二
  hash: sha256:5af5129926b558e12e9f0399d84fc78883acaf46d9279928056306c7e86792c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_022-001a, image: hfl/0872/0872-030.png}
body:
  text: 行品抱朴子曰擬玄黃之覆載揚明並以表微文彪昺而備體澄獨見以入神者聖人也稟高亮之純粹抗峻摽以邈俗虛靈機以如愚不二過而諂黷者賢人也居寂寞之無為蹈修直而執平者道人也盡蒸嘗於存亡保髮膚以揚名者孝人也垂惻隱於有生恆恕己以接物者仁人也端身命以徇國經嶮難而一節者忠人也覿微理於難覺料倚伏於將來者明人也量理亂以卷舒審去就以保身者智人也順通塞而一情任性命而不滯者達人也不枉尺以直尋不降辱以苟命者雅人也據體度以動靜每清詳而無悔者重人也體冰霜之粹素不染潔於勢利者清人也篤始終於寒暑雖危亡而不猜者義人也守一言於久要歷歲衰而不渝者信人也摛鋭藻以立言辭炳蔚而清允者文人也奮果毅之壯烈騁干戈以靜難者武人也甄墳索之淵奧該前言以窮理者儒人也鋭乃心於精義吝寸隂以進德者益人也識多藏之厚亡臨祿利而如遺者廉人也不改操於得失不傾志於可欲者貞人也恤急難而忘勞以憂人為己任者篤人也潔皎分以守終不遜厚而苟免者節人也飛清機之英麗言約暢而判滯者辨人也每居卑而推功雖處泰而滋恭者謙人也崇惇睦於九族必居正以赴理者順人也臨凝結而能斷操繩墨而無私者幹人也拔朱紫於中搆剖猶豫以允當者理人也步七曜之盈縮推興亡之道度者術人也赴白刃而忘生格兕虎於林谷者勇人也整威容以肅衆仗法度而無二者嚴人也創機功以濟用總音數而並精者藝人也淩強禦而無憚雖嶮逼而不沮者黠人也執匪懈於夙夜忘勞瘁於深峻者勤人也蒙謗讟而晏如不懾懼於可畏者徑人也聞榮譽而不歡遭憂難而不變者審人也知事可而必行不猶豫於群疑者果人也循繩墨以進止不乾沒於僥幸者謹人也奉禮度以戰兢及親踈而無尤者良人也履道素而無欲時雖移而不變者朴人也凡此諸行了無一然而不躋善人之迹者下人也門人請曰善人之行既聞其目矣惡者之事可以戒俗者願文垂誥焉抱朴子曰不致養於所生損道而危身者悖人也懷邪偽以偷榮豫利己而忘生者逆人也背仁義之正塗苟危人以自安者凶人也好爭奪而無厭專醜正而害直者惡人也出繩墨以傷刻心好殺而安忍者虐人也飾邪説以浸潤構謗纍於忠貞者讒人也雖言巧而行違實履濁而假清者佞人也不原本於枉直苟尚勝而肆怒者暴人也措細善以取信隂挾毒而無親者姦人也承風指以苟容揆主意而扶非者諂人也言不計於反覆好輕諾而無實者虛人也覩利地而亡義棄廉恥以苟得者貪人也覿艷逸而心蕩飾誇綺而思邪者淫人也見成事而疑惑動失計而多悔者暗人也背訓典而自任恥請問於勝己者損人也知善事而不逮雖多為而無成者劣人也委德行而不修奉權勢以取媚者弊人也履蹊徑以僥速推貨賄以爭津者邪人也既傲狼以無禮好淩辱乎勝己者悍人也被抑枉而自誣事無苦而振懾者怯人也治細辨於稠衆非其人而盡言者淺人也暗事宜之可否雖企慕而不及者頑人也知事非而不改聞良規而增劇者惑人也無濟恤之仁心輕告絶於親舊者薄人也既疾其所不逮喜他人之有災者妬人也專財穀而輕義觀困匱而不振者吝人也冒至危以僥幸值禍敗而不悔者愚人也情局碎而偏黨志唯務於盈利者小人也騁鷹犬於原獸好博戲而無已者迷人也忘等威之異數快飾玩之誇麗者奢人也耽聲色與飲宴廢慶弔於人理者荒人也既無心於修尚又怠惰於家業者懶人也無抑斷之威儀每脫易而不思者輕人也觀道義而如醉聞貨殖而波擾者穢人也杖淺短而多謬暗趨舍之臧否者笨步本切人也憎賢者而不貴聞高言而如聾者嚚人也覩朱紫而不分雖提耳而不悟者蔽人也違道義以趑趄冒禮刑而罔顧者亂人也每動作而受嗤言發口而違理者拙人也事酋豪如僕虜值衰微而背惠者慝人也損貧賤之故舊輕人士而踞傲者驕人也棄衰色而廣欲非宦學而遠遊者蕩人也無忠信之純固背恩養而趨利者叛人也當交顔而面從至析離而背毁者偽人也習強梁而專己距忠告而不納者刺人也抱朴子曰人技未易知真偽或相似士有顔貌修麗風表間雅望之溢目接之適意威儀如龍虎盤旋成規矩然心蔽神否才無所堪心中所有盡附皮膚口不能吐片竒筆不能屬半句入不能宰民出不能用兵治事則事廢銜命則辱命動靜無宜出處莫可蓋難分之一也士有貌望朴悴容觀矬陋聲氣雌弱進止質澀然而含英懷寶經明行高幹過元凱文蔚春林官則庶績康用武則克全獨勝蓋難分之二也士有謀猷淵邃術略入神智周成則思洞幽玄才兼能事神器無宜而口不傳心筆不盡意造次之接不異凡庸蓋難分之三也士有機辨清鋭巧言綺粲攬引譬喻淵湧風厲然而口之所談身不能行長於識古短於理今為政政亂牧民民怨蓋難分之四也士有外形足恭容虔言恪而神疏心慢中懷散放受任不憂居局不冶蓋難分之五也士有控弦命中空拳入白倒乘立騎五兵畢習而體輕慮淺手勦心怯虛試無對而實用無驗望塵奔北聞敵失魄蓋難分之六也士有梗槩簡緩言希貌朴細行闕漏不為小勇局蹐拘檢犯而不校握抓垂翅名為弱願然而膽徑心方不畏強禦義正所在視死猶歸支解寸斷不易所守蓋難分之七也士有孝友溫淑恂恂平雅履信思順非禮不蹈安困潔志操清冰霜而疏遲迂闊不達事要見機不作所為無成居己梁倡受任不舉難分之八也士有行己高簡風格峻峭嘯傲偃蹇淩儕慢俗不肅檢括不護小失適情率意旁若無人朋黨排譴談者同敗士友不附品藻所遺而立朝正色知無不為忠於奉上明於攝下蓋難分之九也士有含弘曠濟虛己受物藏疾匿瑕溫恭廉潔勞謙沖退救危全信寄命不疑託孤可保而純良暗權仁而不斷善不能賞惡不忍罰忠貞有餘而幹用不足操柯猶豫廢法效非枉直混錯終於負敗蓋難分之十也夫物有似而實非若然而不然料之無惑望形得神聖者其將病諸况乎常人故用才取士推昵結友不可以不精擇不可以不詳試也若乃性行之惑變始正而終邪若王莽初則美於伊霍晚則劇於趙高又非中才所能逆盡也若令士之易别如鷦鷯之與鴻鵠狐兔之與龍驎者則四凶不得官於堯朝管蔡不得幾危宗周仲尼無淡臺之失延陵無捐金之恨伊尹無七十之勞項羽無嫌范之悔矣所患於其如碔砆上音武下音夫之亂瑾瑜鷦螟之似鳳凰凝冰之類水精煙熏之凝雲氣故令不謬者鮮也惟帝難之矧乎近人哉夫唯大明玄鑒幽微靈銓揣物思灼沉昧瞻山識璞臨川知珠士於難分之中而無取舍之恨者使臧否區分抑揚咸允武丁姬文不獨治而傅説吕尚不永棄高莽宰嚭不得成其惡弘恭石顯無所容其偽矣斯蓋取士之較略選擇之大都耳精微之求存乎其人固非毫翰之所備縷也抱朴子外篇卷之二十二
