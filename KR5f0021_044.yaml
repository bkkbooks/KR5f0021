front:
  text: 抱朴子外篇卷之四十三
  hash: sha256:f3fbdd6e95bad87248352597dc54bc038fc5f6257680161ce814ee0b76a7f861
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_044-001a, image: hfl/0873/0873-106.png}
body:
  text: 喻蔽抱朴子曰余雅謂王仲任作論衡八十餘篇為冠倫大才有同門魯生難余曰夫瓊瑶以寡為竒磧礫以多為賤故庖犧卦不盈十而彌綸二儀老氏言不滿萬而道德備舉王充著書兼箱纍袠而乍出乍入或儒或墨屬詞比義又不盡美所謂陂原之蒿莠未若步武之黍稷也抱朴子答曰且夫作者之謂聖述者之謂賢徒見述作之品未聞多少之限也吾子所謂竄巢穴之沈昧不知八紘之無外守燈燭之宵曜不識三光之晃朗遊潢汙之淺狹未覺南溟之浩汗滯丘垤之位埤不寤蒿岱之峻極也兩儀所以稱大者以其函括八荒緬邈無表也山海所以為富者以其包籠曠闊含受雜錯也若如雅論貴少賤多則穹隆無取乎宏燾而旁泊不貴於厚載也夫迹水之中無吞舟之鱗寸枝之上無垂天之翼蟻垤之顛無扶桑之林潢潦之源無襄陵之流巨鼇首冠瀛洲飛波淩乎方丈洪桃盤於度陵建水竦於都廣沉鯤橫於天池雲鵬戾乎玄象且夫雷霆之駭不能細其響黃河之激不能局其流騏騄追風不能近其迹鴻鵠奮翅不能卑其飛雲厚者雨必猛弓徑者箭必遠王生學博才大又安省乎吾子云玉以少貴石以多賤夫玄圃之下荆華之顛九員之澤折方之淵琳琅積而成山夜光焕而灼天顧不善也又引庖犧氏著作不多若夫周公既繇大易加之以禮樂仲尼作春秋而重之以十篇過於庖犧多於老氏皆當貶也言少則至理不備辭寡即庶事不暢是以必須篇纍卷積而綱領舉也羲和升光以啓旦望舒曜景以灼夜五林並生而異用百藥雜秀而殊治四時會而歲功成五色聚而錦繡麗八音諧而簫韶美羣言合而道藝辨積猗蝢之財而用之甚少是何異於原憲也懷無銓之量而著述約陋亦何别於瑣碌也音為知者珍書為識者傳瞽曠之調鍾未必救解於同世格言高文豈患莫賞而減之哉且夫江海之穢物不可勝計而不損其深也五嶽之曲木不可訾量而無虧其峻也夏君之璜雖有分毫之瑕暉曜符彩足相補也數千萬言雖有不艷之辭事義高遠足相掩也故曰四瀆之濁不方瓮水之清巨象之瘦不同羔羊之肥矣子又譏之乍入乍出或儒或墨夫發口為言著紙為書書者所以代言言者所以書事若用筆不宜雜載是論議當常守一物昔諸侯訪政弟子問仁仲尼答之人人異辭蓋因事記規隨時所急譬猶治病之方千百而針灸之處無常却寒以溫除熱以冷其於救死存身而已豈可詣者逐一道如齊楚而不改路乎陶朱白圭之財不一物者豐也雲夢孟諸所生萬殊者曠也故淮南鴻烈始於原道淑真而亦有兵略主術莊周之書以死生為一亦有畏犧慕龜請粟救飢若以所言不純而棄其文是治珠翳而剜眼療溼痺而刖足患荑莠而刈穀憎枯枝而伐樹也抱朴子外篇卷之四十三
