front:
  text: 抱朴子外篇卷之十八
  hash: sha256:f9d40a5580e9899187e929d6d8dc75a4185b8a08789250cd325158a639a300ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_018-001a, image: hfl/0871/0871-176.png}
body:
  text: 擢才抱朴子曰華章藻蔚非矇瞍所玩英逸之才非淺短所識夫瞻視不能接物則衮龍與素褐同價矣聰鑒不足相涉則俊民與庸天一槩矣眼不見則美不入神焉莫之與則傷之者至焉且夫愛憎好惡古今不鈞時移俗易物同賈異譬之夏后之璜曩直連城鬻之於今賤於銅鐵故昔以隱居求志為高士今以山林之儒為不肖故聖世人之良幹乃暗俗之罪人也往者之介潔乃末葉之羸劣也弘偉之士履道之生其崇信匪徒重仞之墻其淵澤不唯吕梁之深也故短近不能賞而淺促不能測焉因以異乎己而薄之矣以不求我而疾之矣不貴不用何足言乎乃有播埃塵於白圭生瘡痏於玉肌訕疵雷同攻伐獨立曾參蒙劫剽之垢巢許獲穿踰之謗自匪明並懸象玄鑒表微者焉能披泥抽淪玉澄川掇沉珠哉夫圭璋居肆而不售矧乃翳於槃璞乎竒士扣角而見遏況乃潜於臯藪乎孫臏思騁其祕略而司馬刖之韓非願建治績而李斯殺之賈誼慷慨懷經國之術而武夫排之子政忠良有匡危之具而恭顯陷之和氏所以抱璞而泣血禽息所以發憤而碎首也夫玉石易别於賢愚愛寶情篤於好士以易别之寶合篤好之物猶獲罪截趾歷世受誣況乎難知之賢非意所急讒人畫蛇足於無形姦臣畏忠貞之害己體曲者忌繩墨之容夜祼者憎明燭之來是以高譽美行抑而不揚虛構之謗先形生影又無楚人號哭之薦萬無一遇固其宜矣夫以玉為石者亦將以石為玉矣以賢為愚者亦將以愚為賢矣以石為玉未有傷也以愚為賢者亡之診也蓋診亡者雖存而必亡猶脉死者雖生而必死也可勿愼乎於戲悲夫莫之思者也昔仲尼上聖也東受纍於齊人南見塞於子西文種大賢也初不齒於荆俗末雍游於鈞如競年立功不亦難乎夫結緑玄黎非陶猗不能市也千鈞之重非賁獲不能抱也白雪之絃非靈素不能徽也邁倫之才非明主不能用也然耀靈光夜之珍不為莫求而虧其質以苟且於賤賈洪鍾周鼎不為委淪而輕其禮取見舉於侏儒嶧陽雲和不為不御而息唱以競顯於淫哇冠群之德不以沉抑而履徑而剸節於流俗是以和璧變為滯貨柔木廢於勿用赤刀之礦不得經歐冶之罏元凱之疇終不值四門之闢也抱朴子外篇卷之十八
