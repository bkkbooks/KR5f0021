front:
  text: 抱朴子外篇卷之十二
  hash: sha256:d8e2175598716a3087b343a89464b2c82474f5f5c685a1f0287a856051855e52
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_SJB_012-280269c, image: sjb/28/280269c.png}
body:
  text: 任能或曰尾大於身者不可掉臣賢於君者不可任故口不容而强吞之者必哽才非匹而委仗之者見輕抱朴子曰詭哉言乎昔者荆子緫角而攝相事實賴二十五老臻乎惠康子賤起家而治大邦寔由勝己者多而招其弘益齊桓殺兄而立鳥獸其行被髮彝酒婦閭三百委政仲父遂爲霸宗夷吾既終禍亂亟起魯用季子二十餘年内無粃政外無侵削人之亡没殄瘁響集豈非才所不遠其功如彼自任其事其禍如此乎漢高决策於玄幃定勝乎千里則不如良平治兵多而益善所向無敵則不如信布兼而用之帝業克成故疾步累趨未若託乘乎逸足尋飛逐走未若假伎乎鷹犬夫勁弩難彀而可以摧堅逮遠大舟難乘而可以致重濟深猛將難御而可以折衝拓境高賢難臨而可以攸叙彝倫昔魯哀庸主也仲尼上聖不敢不盡其節齊景下才也而晏嬰大賢不敢不竭其誠豈有人臣當與其君校智力之多少計局量之優劣必須堯舜乃爲之役哉何事非君何使非民恥令其君不及唐虞此亦達者之用心也抱朴子外篇卷之十二
  hash: sha256:a23238977e4e46ca6507b98f513cf4948f7add4f8f7c95251451eacef68d526d
