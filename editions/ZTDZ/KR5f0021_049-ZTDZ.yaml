front:
  text: 抱朴子外篇卷之四十八志五
  hash: sha256:9ff2fd7e68f1c4e9d949ad3a5a77cdc9578689d6ed296a9851faf1b580969564
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_SJB_049-280330b, image: sjb/28/280330b.png}
body:
  text: 詰鮑鮑生敬言好老莊之書治鮑辯之言以爲古者无君勝於今世故其著論云儒者曰天生烝民而樹之君豈其皇天諄諄言亦將欲之者爲辭哉夫彊者凌弱則弱者服之矣智者詐愚則愚者事之矣服之故君臣之道起焉事之故力寡之民制焉然則隸屬役御由乎爭彊弱而校愚智彼蒼天果无事也夫混茫以无名爲貴羣生以得意爲歡故剥桂刻漆非木之願拔鶡裂翠非鳥所欲促促銜樂非馬之性荷軛運重非牛之樂詐巧之萌必力違眞伐根之生以飾无用捕飛禽以供華玩穿本完之鼻絆天放之脚荒非萬物並生之意夫役彼黎烝養此在官貴者禄厚而民亦困矣夫死而得生欣喜無量則不如向无死也讓爵辭禄以釣虚名則不如本无讓也天下逆亂焉而忠義顯矣六親不和焉而孝慈彰矣曩古之世无君无臣穿井而飲耕田而食日出而作日入而息汎然不繫恢爾自得不競不營無榮無辱山無蹊徑澤無舟梁川谷不通則不相并兼士衆不聚則不相攻伐是高巢不探深淵不漉鳳鸞栖息於庭宇龍鱗羣遊於園池饑虎可履虺蛇可執涉澤而鷗鳥不飛入林而狐兔不驚勢利不萌福院不作干戈不用城池不設萬物玄同相忘於道疫癘不流民獲考終純白在胷機心不生含餔而熙鼓腹而遊其言不華其行不飾安得聚歛以奪民財安得嚴刑以爲坑穽降及杪季智用巧生道德既衰尊卑有序繁升降損益之禮飾紱冕玄黄之服起土木於凌霄構丹緑於棼撩傾峻搜寳泳淵採珠聚玉如林不足以極其變積金成山不足以瞻其費澶漫於淫荒之域而叛其大始之本去崇日遠背朴彌增尚賢則民爭名貴貨則盜賊起見可欲則眞正之心亂勢利陳則劫奪之塗開造剡銳之器長侵割之患弩恐不勁甲恐不堅𨥨恐不利𢙢不厚若无凌暴此皆可棄也故曰白玉不毁孰爲珪璋道德不廢安取仁義使夫桀紂之徒得燔人辜諫者脯諸侯葅方伯剖人心破人脛窮驕淫之惡用炮烙之虐若令斯人並爲匹夫性雖凶奢安得施之使彼肆酷恣欲屠割天下由於爲君故得縱意也君臣既立衆慝日滋而欲攘臂乎桎梏之間愁勞於塗炭之中人主憂惈於廟堂之上百姓煎擾乎困苦之中閑之以禮度整之以刑罰是猶闢滔天之源激不測之流塞之以撮壤障之以指掌也抱朴子難曰蓋聞沖昧既闢降濁升清穹隆仰燾旁泊俯停乾坤定位上下以形遠取諸物則天尊地卑以著人倫之體近取諸身則元首股肱以表君臣之序降殺之軌有自來矣若夫太極混沌兩儀無質則未若玄黄剖判七耀垂象隂陽陶冶萬物羣分也由兹以言亦知鳥聚獸散巢栖穴竄毛血是茹結草斯服入無六親之尊卑出無階級之等威未若庇體廣厦稉梁嘉㫖黼黻綺紈御冬當暑明辟莅物良宰匠世設官分職宇宙穆如也貴賤有章則慕賞畏罰勢齊力均則爭奪靡憚是以有聖之作受命自天或結罟以畋漁或瞻辰而鑽燧或嘗卉以選粒或構宇以仰蔽備物致用去害興利百姓欣戴奉而尊之君臣之道於是乎生安有詐愚凌弱之理三五迭興道教遂隆辯章勸沮德盛刑清明良之歌作蕩蕩之化成太階既平七政遵度梧禽激響於朝陽麟虞覿靈而來出龜龍吐藻於河湄景老摛耀於天路皇風振於九域凶器戢乎府庫是以禮制則君安樂作而刑厝也若夫奢淫狂暴由乎人己豈必有君便應爾乎而鮑生獨舉衰世之罪不論至治之義何也且夫遠古質朴蓋其未變民尚童蒙機心不動譬夫嬰孩智慧未萌非爲知而不爲欲而忍之也若人與人爭草萊之利家與家訟巢窟之地上無治枉之官下有重類之黨則私鬭過於公戰木石銳於干戈交尸布野流血絳路久而無君噍類盡矣至於擾龍馴鳳河圖洛書或鱗衛申負或黄魚波湧或丹禽翔授或回風三集皆在有君之世不出無王之時也夫祥瑞之徵指發玄極或以表革命之符或以彰至治之盛若令有君不合天意彼嘉應之來孰使之哉子若以混㝠爲美乎則乾坤不宜分矣若以無名爲高乎則八卦不當畫矣豈造化有謬而太昊之闇哉雅論所尚唯貴自然請問夫識母忘父羣生之性也拜伏之敬世之未飾也然性不可任必尊父焉飾不可廢必有拜焉任之廢之子安乎古者生無棟宇死無殯葬川無舟檝之器陸無車馬之用吞啖毒烈以至殞斃疾無醫術枉死無限後世聖人改而垂之民到于今賴其厚惠機巧之利未易敗矣今使子居則反巢穴之陋死則捐之中野限水則泳之游之山行則徒步負戴棄鼎鉉而爲生臊之食廢針石而任自然之病祼以爲飾不用衣裳逢女爲偶不假行媒吾子亦將曰不可也況於無君乎若令上世人如木石玄冰結而不寒肴糧絶而不飢者可也衣食之情苟在其心則所爭豈必金玉所競豈必榮位橡茅可以生鬭訟藜藿足用致侵奪矣夫有欲之性萌於受氣之初厚己之情著於成形之日賊殺並兼起於自然必也不亂其理何居夫明王在上羣后盡規坐以待旦昧朝旰食延誹謗以攻過責昵屬之補察聽輿謡以屬省鑒履尾而夕惕颺清風以掃穢厲秋威以肅物制峻網密有犯無赦形戮以懲小罪九伐以討大憝猶懼豺狼之當路感彝倫之不叙憂作威之凶家恐姦宄之害國故嚴司鷹揚以彈違虎臣杖鉞於方獄而狂狡之變莫世乏之而命放之使無所憚則盜跖將横行以掠殺而良善端拱以待禍無主所訴無彊所憑而冀家爲夷齊人皆柳惠何異負豕而欲無臭憑河而欲不濡無轡箤而御奔馬棄施櫓而乘輕舟未見其可也鮑生又難曰夫天地之位二氣範物樂陽則雲飛好隂則川處敢柔剛以卒性隨四八而化生各附所安本無尊卑也君臣既立而變化遂滋夫獺多則魚擾鷹衆則鳥亂有司設則百姓困奉上厚則下民貧壅崇寳貨飾玩臺榭食則方丈衣則龍章内聚曠女外多鰥男採難得之寳貴竒怪之物造無益之器恣不已之欲非鬼非神財力安出哉夫穀帛積則民有飢寒之儉百官備則坐靡供奉之費宿衛有徒食之衆百姓養游手之人民乏衣食自給已劇況加賦歛重以苦役下不堪命且凍且飢冒法斯濫於是乎在王者憂勞於上台鼎顰顣於下臨深履薄懼禍之及恐智勇之不用故厚爵重禄以誘之恐姦釁之不虞故嚴城深池以備之而不知禄厚則民匱而臣驕城嚴則役重而攻巧故散鹿臺之金發巨橋之粟莫不懽然况乎本不聚金而不歛民粟乎休牛桃林放馬華山載戢干戈載櫜弓矢猶以爲泰况乎本無軍旅而不戰不戍乎茅茨土階棄織拔葵雜囊爲幃濯裘布被妾不衣帛馬不秣粟儉以率物以爲美談所謂盜跖分財取少爲讓陸處之魚相煦以沬也夫身無在公之役家無輸調之費安土樂業順天分地内足衣食之用外無勢利之爭操杖攻劫非人情也象刑之教民莫之犯法令滋彰盜賊多有豈彼無利性而此專貪殘蓋我清靜則民自正下疲怨則智巧生也任之自然猶慮凌暴勞之不休奪之無已田蕪倉虚杼軸之空食不充口衣不周身欲令勿亂其可得乎所救禍而禍彌深峻禁而不止也關梁所以禁非而猾吏因之以爲非焉衡量所以檢僞而邪人因之以爲僞焉大臣所以扶危而姦臣恐主之不危兵革所以靜難而寇者盜之以爲難此皆有君之所致也民有所利則有爭心富貴之家所利重矣且夫細民之爭不過小小匹夫校力亦何所至無疆土之可貪無城郭之可利無金寳之可欲無權柄之可競勢不能以合徒衆威不足以驅異人孰與王赫斯怒陳師鞠旅推無讎之民攻無罪之國僵尸則動以萬計流血則漂樐丹野無道之君無世不有肆其虐亂天下無邦忠良見害於内黎民暴骨於外豈徒小小爭奪之患邪至於移父事君廢孝爲忠申令無君亦同有之耳古之爲屋足以蔽風雨而今則被以朱紫飾以金玉古之爲衣足以掩身形而今則玄黄黼黻錦綺羅紈古之爲樂足以定人情而今則煩乎淫聲驚魂傷和古之飲食足以充飢虚而今則焚林漉淵宰割羣生豈可以事之有過而都絶之乎若令唐虞在上稷卨贊事卑宫薄賦使民以時崇節儉之清風肅玉食之明禁質素簡約者貴而顯之亂化侵民者黜而戮之則頌聲作而黎庶安矣何必慮火災而壞屋室畏風波而填大川乎抱朴子曰鮑生貴上古無君之論余既駮之矣後所答余文多不能盡載余抄條其論而牒詰之云鮑生曰人君採難得之寳聚竒怪之物飾無益之用厭無已之求抱朴子詰曰請問古今帝王盡採難得之寳聚竒怪之物乎有不爾者也余聞唐堯之爲君也摘金於山虞舜之禪也捐壁於谷疏食菲服方之監門其不汔淵剖珠傾巖刊玉鑿石鑠黄白之鑛越海裂翡翠之羽網瑇瑁於絶域掘丹青於㟭漢亦可知矣夫服章無殊則威重不著名位不同則禮物異數是以周公辯貴賤上下之典式宫室居處則有堵雉之限冠蓋旌旗則有文物之飾車服器用則有多少之制庖厨供羞則有法膳之品年凶災眚又減撤之無已之慾不在有道子之所云可以聲桀紂之罪不足以定雅論之證也鮑生曰人君後宫三千豈皆天意穀帛積則民飢寒矣抱朴子詰曰王者妃妾之數聖人之所制也聖人與天地合其德者也其德與天地合豈徒異哉夫豈徒欲以順情盈慾而已乎乃所以佐六宫理隂陽教肅宗奉祖廟秪承大祭供玄紞之服廣本枝之路且案周典九土之記及漢氏地理之最天下女數多於男焉王者所宗豈足以逼當娶者哉姬公思之似已審矣帝王帥百僚以藉田后妃將命婦以蠶織下及黎庶農課有限力佃有賞怠惰有罰十一而稅以奉公用家有備凶之儲國有九年之積各得順天分地不奪其時調薄役希民無飢寒衣食既足禮讓以興昔文景之世百姓務農家給户豐官倉之米至腐赤不可勝計然而士庶猶侯服鼎食牛馬蓋澤由於賦歛有節不足損下也至於季世官失佃課之制私務浮末之業生穀之道不廣而游食之徒滋多故上下同之而犯非者衆鮑生乃歸咎有君未若譏采擇之過限刺農課之不實責牛飲之三千貶履畝與太半但使後宫依周禮租調不横加斯則可矣必無君乎夫一日晏起則事有失所即鹿無虞維入于林中安可終已靡所宗統則君子失所仰凶人得其志網踈猶漏可都無網乎鮑生曰人生也衣食已劇况又加之以收賦重之以力役飢寒並至下不堪命冒法犯非於是乎生抱朴子詰曰蜘蛛張網蚤蝨不餒使人智巧役用萬物食口衣身何足劇乎但患富者無知止之心貴者有無限之用耳豈可以一䟾之故而終身不行以桀紂之虐思乎無主也夫言主事彌張賦歛之重於往古民力之疲於末務飢寒所縁以譏之可也而言有役有賦使國亂者請問唐虞升平之世三代有道之時爲無賦役以相供奉元首股肱躬耕以自給耶鮑生乃唯知飢寒並至莫能固窮獨不知衣食並足而民知榮辱乎鮑生曰王者臨深履尾不足喻危假寐待旦日昃旰食將何爲懼禍及也抱朴子難曰審能如此乃聖主也王者所病在乎驕奢賢者不用用者不賢夏癸指天日以自喻秦始憂萬世之同謚故致傾亡取笑將來若能懼危夕惕廣納規諫詢芻蕘以待聽養黄髮以乞言何憂機事之有違何患百揆之不康夫戰兢則彝倫叙怠荒則姦宄作豈况無君能無亂乎鮑生曰王者欽想竒瑞引誘幽荒欲以崇德邁威厭耀朱服白雉玉環何益齊民乎抱朴子詰曰夫王者德及天則有天瑞德及地則有地應若乃景星摛光以佐望舒之耀冠日舍采以表羲和之晷靈禽嗈喈於阿閣金象焜晃乎清沼此豈卑辭所致厚幣所誘哉王莽姦猾包藏禍心文致太平誑眩朝野貺遺外域使送瑞物豈可以此謂古皆然乎夫見盈丈之尾則知非咫尺之軀覩尋仞之牙則知非膚寸之口故王母之遣使明其玄化通靈無遠不懷也越裳之重譯足知惠沾殊方被無外也夫絶域不可以力服蠻貊不可以威攝自非至治焉能然哉何者鮑生謂爲不用夫周室非乏玉而須王母之環以其爲富非儉膳而渴越裳之雉以充庖也所以貴之者誠以斯物爲太平則上無苛虐之政下無失所之人蜎飛蠕動咸得其懽有國之美孰多於斯而云不用無益於齊民源遠體大固未易見鮑生之言不亦宜乎鮑生曰人君恐姦釁之不虞故嚴城以備之也抱朴子詰曰侯王設險大易所貴不審嚴城何譏焉爾夫兩儀肇闢萬物化生則邪正存焉爾夫聖人知凶醜之自然下愚之難移猶春陽之不能榮枯朽炎景之不能鑠金石冶容慢藏誨淫召盜故取法乎習坎備豫於未萌重門有擊柝之警治戎遏暴客之變而欲除之其理何居兕之角也鳳之距也天實假之何必日用哉蜂蠆挾毒以衛身智禽銜蘆以扞網貛曲其穴以備徑至之鋒水牛結陣以却虎豹之暴而鮑生欲棄甲冑以進利刀墮城池以止衝鋒若令甲胄既捐而利刀不住城池既壞而衝鋒猶集公輸墨翟猶不自全不審吾生計將安出乎或曰苟無可欲之物雖無城池之固敵亦不來者也抱朴子答曰夫可欲之物何必金玉錐刀之末愚民競焉越人之大戰由乎分蚺蛇之不鈞吴楚之反兵起乎一株之桑葉飢荒之世人人相食素手裸跣遠則甫侯子羔近則于公釋之探情審罰剖豪析芒受戮者吞聲而歌德刖劓者没齒無怨言此皆非無君之時也昔有鰥在下而四嶽不蔽明揚仄陋而元凱畢舉或投屠刀而排金門或釋板築而躡玉堂或委芻豢而登卿相或自亡命而爲上將伯柳達讎人解狐薦怨家方回叩頭以致士禽息碎首以推賢敢問于時有君不耶又云田蕪廪虚皆由有君夫君非塞田之蔓草臣非耗倉之雀鼠也其蕪其虚卒由戹運水旱疫癘以臻凶荒豈在賦求令其然乎至於八政首食謂之民天后稷躬稼有虞親耕豐年多黍多稌我庾惟億民食其陳白渠開而斥鹵膏壤邵父起陽陵之陂而積穀爲山叔敖創期思而家有腐栗趙過造三犂之巧而關右以豐任延教九眞之佃而黔庶殷飽此豈無君之時乎抱朴子外篇卷之四十八
