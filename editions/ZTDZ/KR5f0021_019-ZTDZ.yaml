front:
  text: 抱朴子外篇卷之十九
  hash: sha256:8ad9b73105c85294a0b673b7b1ce6c90642f7e7facaabcbc312ace386eb0d944
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_SJB_019-280281c, image: sjb/28/280281c.png}
body:
  text: 任命抱朴子曰余之友人有居泠先生者恬愉靜素形神相忘外不飾驚愚之容内不寄有爲之心遊精墳誥樂以忘憂晝競羲和之末景夕照望舒之餘耀道靡遠而不究言無微而不研然車迹不軔如震切權右之國尺牘不經貴勢之庭是以名不出蓬户身不離畎畝於是翼亮大夫候而難之曰余聞淵蟠起則玄雲赴道化霑則逸才奮故康衢有角歌之音鼎俎發淩風之迹沽之則收不貲之賈踊之則超在天之舉耀逸景於暘谷播大明乎九垓勛廕當己聲揚罔極故尋仞之塗甚近而弗往者雖追風之脚不能到也楹梲之下至卑而不動者雖鴻鶤之翅未之及也况乎寢足於大荒之表斂羽於幽梧之枝安得效迅以尋景振輕乎蒼霄哉年期奄冉而不久託世飄迅而不再智者履霜則知堅冰之必至處始則悟生物之有終六龍促軌於大渾華顛倏忽而告暮古人所以映順流而頽歎眄過隙而興悲矣先生資命世之逸量含英偉以邈俗銳翰汪濊以波涌六竒抑鬱而淵穡然不能淩扶摇以高竦揚清一於九玄器不陳於瑚簋之末體不免於負薪之勞猶奏和音於聾俗之地鬻章甫於被髮之域徒忘寤於翰林銳意以窮神崇琬琰於懷抱之内吐琳琅於毛墨之端躬困屢空之儉神勞堅高之間譬若埋尺璧於重壤之下封文錦於沓匱之中終無交易之富孰賞堙翳之珍哉夫龍驥維縶則無以别乎蹇驢赤刀韜鋒則曷用異於鉛刃鱣鮪不居牛迹大鵬不滯蒿林願先生委龍蛇之穴升利見之塗釋户庭之獨潔覽二鼠而遠寤越窮谷以登高襲丹藻以改素競驚飈於清晨不盤旋以詣夜收名器於崇高嚮鍾鼎之慶祚栢成一介之夫採薇何足多慕乎居泠先生應曰蓋聞靈機㝠緬混芒眇昧禍福交錯乎倚伏之間興亡纏綿乎盈虚之會迅逝者不能脫逐身之景樂成者不能免理致之敗匠流末者未若挺冶無兆之中整已然者不逮反本乎玄朴之外是以覺尺蠖者甘屈以保伸識通塞者不慘悅於否泰且夫洪陶範物大象流形躁靜異尚翔沉舛情金寳其重羽矜其輕篤隘者執束於滓涅達妙者逍遥於玄清潢洿納行潦而潘壹渤澥吞百川而不盈鮋鰕踊悅於泥濘赤螭淩厲乎高㝠嚼香餌者快嗜欲而赴死味虚淡者含天和而趨生識機神者瞻無兆而弗惑闇休咎者觸强弩而不驚各附攸好安肯改營吾聞五玉不能自剖於嵩岫騰蛇不能無霧而電征龍淵不能勿操而斷犀兕景鍾不能莫扣而揚洪聲金芝須商風而激耀倉庚俟烟煴而修鳴騏騄不苟馳以赴險君子不詭過以毁名運屯則沉淪於勿用時行則高竦乎天庭士以自衒爲不高女以自媒爲不貞何必委洗耳之峻摽效負俎之干榮哉夫其窮也則有虞婆娑而陶鈞父見逐於愚嫗范生來辱於溺簣苦怪如籠也弘式匿竒於耕牧及其達也則淮隂投竿而稱孤文種解屩而紆青傳說釋築而論道管子脫桎爲上卿蓋君子藏器以有待也稸德以有爲也非其時不見也非其君不事也窮達任所值出處無所繫其靜也則爲逸民之宗其動也則爲元凱之表或運思於立言或銘勛乎國器殊塗同歸其致一焉士能爲可貴之行而不能使俗必貴之也能爲可用之才而不能使世必用之也被褐茹草垂綸罝免則心歡意得如將終身服冕乘軺兼朱重紫則若固有之常如布衣此至人之用懷也若席上之珍不積環堵之操不粹者予之過也知之者希名位不臻以玉爲石謂鳳曰鷃者非余罪也夫汲汲於見知悒悒於否滯者裳民之情也浩然而養氣淡爾而靡欲者無悶之志也時至道行器大者不悅天地之間知命者不憂若乃徇萬金之貨以索百十之售多失骭干上聲毛我則未暇矣抱朴子外篇卷之十九
