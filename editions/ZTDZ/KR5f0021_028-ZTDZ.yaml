front:
  text: 抱朴子外篇卷之二十八
  hash: sha256:2a78847b6ded5e5a1db9c6ee8df9854df7b3e6bfb668b1071016c5eaf1487dcf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_SJB_028-280299a, image: sjb/28/280299a.png}
body:
  text: 百里抱朴子曰三台九列坐而論道州牧郡守操綱舉領其官益大其事愈優煩劇所鍾其唯百里衆役於是乎出調求之所叢赴牧守雖賢而令長不堪則國事不舉萬機有闕其損敗豈徒止乎一境而已哉令長尤宜得才乃急於臺省之官也用之不得其人其故无他也在乎至公之情不行而任私之意不違也或父兄貴重而子弟以聞望見選或高人屬託而凡品以无能見叙或是所宿念或親戚匪他知其不可而能用也等亦時有快者不爲盡无所中也要於不精者率多矣其能自獨立勉修清約夙夜在公以求衆譽懼風績之不美恥知己之謬舉鮮矣庸猥之徒器小志近冒于貨賄唯富是圖肆情恣慾元止无足在所司官知其有足賴主人舉劾彈糺終於當解慮其結怨反見中傷不敢犯觸而恣其貪殘矣如此黎庶亦安得不困毒而離叛離叛者衆則不得不屯聚而爲群盜矣夫百尋之室焚於分寸之飈千丈之波潰於一蟻之穴何可不深防乎何可不改張乎而秉斤兩者或舍銓衡而任情掌柯斧者或曲繩墨於附己選之者既不爲官擇人而求之者又不自謂不任於是蒞政而政荒牧民而民散或有穢濁驕奢而困百姓者矣或有苛虐酷烈而多怨叛者矣或有闇塞退憒而庶事亂者矣或有潦倒疏緩而致弛壞者矣或有好興不急而疲人力者矣或有藏養逋逃而行淩暴者矣或有不曉法令而受欺弄者矣或有以音聲酒色而致荒湎者矣或有圍碁樗蒱而廢政務者矣或有田獵遊飲而忘庶事者矣或有不省辭訟而刑獄亂者矣百姓不堪起爲寇賊舋咎發聞寘于叢棘虧君上之明益刑書之煩而民之荼毒亦已深矣夫用非其人譬猶被木馬以繁纓何由騁迹於追風以壤龍當雲雨安能耀景於天衢哉若秉國之鈞出納王命者審良樂之顧盻不令跛蹇厠騏騄冒昧苟得闇於自量者慮中道之顛躓不以駑薾服鸞衡則何患庶績之不康何憂四凶之不退三皇豈足四五帝豈難六哉抱朴子外篇卷之二十八
