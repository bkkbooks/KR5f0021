front:
  text: 抱朴子外篇卷之三十三
  hash: sha256:85eb429c76c1118fcd6251821ff5a2feba41514b2c99def72d1cb3847fcff511
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_SJB_033-280304a, image: sjb/28/280304a.png}
body:
  text: 漢過抱朴子曰歷覽前載建乎近代道微俗弊莫劇漢末也當塗端右閹官之徒操弄神器秉國之鈞廢正興邪殘仁害義蹲踏背憎即聾從昧同惡成群汲引姦黨吞財多藏不知紀極而不能散錙銖之薄施振清廉之窮儉焉進官則非多財者不達也獄訟則非厚貨者不直也官高勢重力足拔才而不能發毫氂之片言進益時之翹俊也其所用也不越於妻妾之戚屬其惠澤也不出乎近習之庸瑣莫戒臧文竊位之譏靡追解狐忘私之義分禄以擬王林致士以由方回故列子比屋而門無鄭陽之恤高概成群而不遭暴生之薦抑挫獨立推進附己此樊姬所以掩口馮唐所以永慨也于時率皆素飡偷容掩德蔽賢忌有功而危之疾清白而排之諱忠讜而陷之惡特立而擯之柔媚者受崇飾之祐方稜者蒙訕棄之患養豺狼而殲驎虞殖枳棘而剪椒桂於是傲兀不檢九轉萍流者謂之弘偉大量苛碎峭嶮懷螫挾毒者謂之公方正直令色警惠有貌無心者謂之機神朗徹利口小辯希指巧言者謂之摽領清妍猝突萍鷽驕矜輕侻者謂之巍峨瑰桀嗜酒好色闒茸無疑者謂之率任不矯求取不廉好奪無足者謂之淹曠達節蓬髮褻服遊集非類者謂之通美汎愛反經詭聖順非而博者謂之莊老之客嘲弄嗤領淩尚侮慢者謂之蕭豁雅韻毁方投圓面從響應者謂之絶倫之秀憑倚權豪推貨履徑者謂之知變之竒嬾看文書望空下名者謂之業大志高仰賴强親位過其才者謂之四豪之匹輸貨勢門以市名爵者謂之輕財貴義結黨合譽行與口違者謂之以文會友左道邪術假託鬼怪者謂之通靈神人卜占小數誑飾禍福者謂之知來之妙𨃞馬弄矟山角切一夫之勇者謂之上將之元合離道聽偶俗而言者謂之英才碩儒若夫體亮行高神清量遠不諂笑以取悅不曲言以負心含霜履雪義不苟合據道推方嶷然不群風雖疾而枝不撓身雖困而操不改進則切辭正論攻過箴闕退則端誠杜私知無不爲者謂之闇騃徒苦夙興夜寐退食自公憂勞損益畢力爲政者謂之小器俗吏於是明哲色斯而幽遁高俊括囊而佯愚䟽賤者奮飛以擇木縶制者曲從而朝隱知者不肯吐其祕筭勇者不爲致其果毅忠謇離退姦凶得志邪流溢而不可遏也僞塗闢而不可杜也以臻乎淩上替下盜賊多有宦者奪人主之威三九死庸豎之手忠賢望士謂之黨人囚捕誅鋤天下嗟嗷無罪無辜閉門遇禍微烟起於蕭墻而飈焚徧於宇宙淺隙發於膚寸而波濤漂乎四極金城屠於庶寇湯池杭於一葦勁銳望塵而冰泮征人倒戈而奔北飛鋒荐於扆闥左衽掠於禁省禾黍生於廟堂榛莠秀乎玉階雲觀變爲狐兔之藪象魏化爲虎豹之蹊東序烟燼於委灰生民燋淪於淵火凶家害國得罪竹帛良史無褒言金石無德音夫何哉失人故也抱朴子外篇卷之三十三
