front:
  text: 抱朴子外篇卷之三十二
  hash: sha256:2202f40cebc0cf328091518cb2f3fd4895ee9b84e43c0398090da2ab6b7d0106
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_SJB_032-280302b, image: sjb/28/280302b.png}
body:
  text: 尚博抱朴子曰正經爲道義之淵海子書爲增深之川流仰而比之則景星之佐三辰也俯而方之則林薄之裨嵩嶽也雖津塗殊闢而進德同歸雖離於舉趾而合於興化故通人緫原本以括流末操綱領而得一致焉古人歎息於才難故謂百世爲隨踵不以璞非崑山而棄耀夜之寳不以書不出聖而廢助教之言是以閭陌之拙詩軍旅之鞫誓或詞鄙喻陋簡不盈十猶見撰録亞次典誥百家之言與善一揆譬操水者器雖異而救火同焉猶針灸者術雖殊而攻疾均焉漢魏以來群言彌繁雖義深於玄淵辭贍於波濤施之可以臻徵祥於天上發嘉瑞於后土召環雉於大荒之外安圓堵於函夏之内近弭禍亂之階遠垂長世之祉然時無聖人目其品藻故不得騁驊騄之迹於千里之塗編近世之道於三墳之末也拘繫之徒桎梏淺隘之中挈瓶訓詁之間輕竒賤異謂爲不急或云小道不足觀或云廣博亂人思而不識合錙銖可以齊重於山陵聚百十可以致數於億兆群色會而衮藻麗衆音雜而韶濩和也或貴愛詩賦淺近之細文忽薄深美富博之子書以磋切之至言爲騃拙以虚華之小辯爲妍巧眞僞顛倒玉石混殽同廣樂於桑間鈞龍章於卉服悠悠皆然可歎可慨者也或曰著述雖繁適可以騁辭耀藻無補救於得失未若德行不言之訓故顔閔爲上而游夏乃次四科之格學本而行末然則綴文固爲餘事而吾子不褒崇其源而獨貴其流可乎抱朴子荅曰德行爲有事優劣易見文章微妙其體難識夫易見者粗也難識者精也夫唯粗也故銓衡有定焉夫唯精也故品藻難一焉吾故捨易見之粗而論難識之精不亦可乎或曰德行者本也文章者末也故四科之序文不居上然則著紙者糟粕之餘事可傳者祭畢之芻狗卑高之格是可譏矣文之體略可得聞乎抱朴子答曰筌可以棄而魚未獲則不得無筌文可以廢而道未行則不得無文若夫翰迹韻略之宏促屬辭比事之䟽密源流至到之脩短藴藉汲引之深淺其懸絶也雖天外毫内不足以喻其遼邈其相傾也雖三光熠耀不足以方其巨細龍淵鉛鋌未足譬其銳鈍鴻羽積金未足比其輕重清濁參差所禀有主朗昧不同科强弱各殊氣而俗士唯見能染毫畫紙者便槩之一例斯伯牙所以永思鍾子郢人所以格斤不運也蓋刻削者比肩而班秋擅絶手之稱援琴者至衆而夔襄專知音之難廐馬千駟而騏驥有邈群之價美人萬計而威施有超世之容蓋有遠過衆者也且文章之與德行猶十尺之與一丈謂之餘事未之前聞夫上天之所以垂象唐虞之所以爲稱大人虎炳君子豹蔚昌旦定聖謚於一字仲尼從周之郁莫非文也八卦生鷹隼之所被六甲出靈龜之所負文之所在雖賤猶貴犬羊之鞟未得比焉且夫本不必皆珍末不必悉薄譬若錦繡之因素地珠玉之居蜯石雲雨生於膚寸江河始於咫尺爾則文章雖爲德行之弟未可呼爲餘事也或曰今世所爲多不及古文章著述又亦如之豈氣運衰殺自然之理乎抱朴子答曰百家之言雖有步起皆出碩儒之思成才士之手方之古人不必悉減也或有汪濊玄曠合契作者内闢不測之深源外播不匱之遠流其所祖宗也高其所紬繹也妙變化不繫滯於規矩之方圓旁通不凝閡於一塗之逼促是以偏嗜酸鹹者莫能識其味用思有限者不能得其神也夫應龍徐舉顧盻凌雲汗血緩步呼吸千里而螻螘怪其無階而高致駑蹇患其過己之不漸也若夫馳驟於詩論之中周旋於傳記之間而以常情覽巨異以褊量測無涯以至粗求至精以甚淺揣甚深雖始自髫齓訖于振素猶不得也夫賞其快者必譽之以好而不得曉者必毁之以惡自然之理也於是以其所不解者爲虚誕慺力恢切敬也誠以爲爾未必違情以傷物也又世俗率神貴古昔而黷賤同時雖有追風之駿猶謂之不及造父之所御也雖有連城之珍猶謂之不及楚人之所泣也雖有擬斷之劍猶謂之不及歐冶之所鑄也雖有起死之藥猶謂之不及和鵲之所合也雖有超群之人猶謂之不及竹帛之所載也雖有益世之書猶謂之不及前代之遺文也是以仲尼不見重於當時大玄見蚩薄於比肩也俗士多云今山不及古山之高今海不及古海之廣今日不及古日之熱今月不及古月之朗何肯許今之才士不減古之枯骨重所聞輕所見非一世之所患矣昔之破琴剿絃者諒有以而然乎抱朴子外篇卷之三十二
