front:
  text: 抱朴子外篇卷之四
  hash: sha256:d93793935eaae168a1987e8c70c6f4ee6083064d27aad593eec702bf8d8d4810
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_SJB_004-280260b, image: sjb/28/280260b.png}
body:
  text: 崇教抱朴子曰澄視於秋毫者不見天文之焕炳肆心於細務者不覺儒道之弘遠翫鮑者忘茝蕙迷大者不能反夫受繩墨者無枉刳之木染道訓者無邪僻之人飾治之術莫良乎學學之廣在於不倦不倦在於固志志苟不固則貧賤者汲汲於營生富貴者沈淪於逸樂是以遐覽淵博者曠代而時有面墻之徒比肩而接武也若使素士則晝躬耕以餬夜薪火以修業在位則以酣宴之餘暇時遊觀於勸誡則世無視内游夏不乏矣亦有飢寒切己藜藿不給膚困風霜口乏糟糠出無從師之資家有暮旦之急釋耒則農事廢執卷則供養虧者雖闕學業可恕者也所謂千里之足困於鹽車之下赤乃之鑛不經歐冶之門者也若夫王孫公子優游貴樂婆娑綺紈之間不知稼穡之艱難目倦於玄黄耳疲乎鄭衛鼻饜乎蘭麝口爽於膏梁冬沓貂狐之緼麗夏縝紗縠之翩飄出驅慶封之輕軒入宴華房之粲蔚飾朱翠於楹梲積無已於篋匱陳妖冶以娱心湎醽醁以沈醉行爲會飲之魁坐爲博奕之帥省文章既不曉覩學士如草芥口筆乏乎典據牽引錯於事類劇談則方戰而已屈臨疑則生老而憔悴雖菽麥之能辯亦奚别乎瞽瞶哉抱朴子曰蓋聞帝之元儲必入太學承師問道齒於國子者以知爲臣然後可以爲君知爲子然後可以爲父也故學立而仕不以政學操刀傷割鄭喬所嘆觸情縱欲謂之非人而貴游子弟生乎深宫之中長乎婦人之手憂懼之勞未嘗經心或未免於襁褓之中而加青紫之官纔勝衣冠而居清顯之位操殺生之威提黜陟之柄榮辱决於與奪利病感於唇吻愛惡無時暫乏毁譽括厲於耳嫌疑象類似是而非因機會以生無端藉素信以設巧言交構之變千端萬緒巧筭所不能詳毫墨所不能究也無術學則安能見邪正之眞僞具古今之行事自悟之理無所感假能無䋶巢覆車之禍乎先哲居高不敢忘危愛子欲教之義方雕琢切磋弗納於邪僞選明師以象成之擇良友以漸染之督之以博覽示之以成敗使之察往以悟來觀彼以知此驅之於直道之上歛之乎撿括之中懔乎若跟掛於萬刃慄然有如乘奔以履冰故能多遠悔吝保其貞吉也昔諸竇蒙遺教之福霍禹受率意之禍中山東平以好古而安燕刺由面墻而危前事不忘今之良鑒也湯武染乎伊吕其興勃然辛癸染乎推崇其亡忽焉朋友師傅尤宜精簡必取寒素德行之士以清苦自立以不群見憚者其經術如仲舒桓榮者强直若龔遂王吉者能朝夕講論忠孝之至道正色證存亡之軌迹以洗濯垢涅閑邪矯枉宜必抑情遵憲法入德訓者矣漢之末世吴之晩年則不然焉望冠蓋以選用任朋黨之華譽有師友之名無拾遺之實匪唯無益乃反爲損故其所講說非道德也其所貢進非忠益也唯在於新聲艷色輕體妙手評歌謳之清濁理管絃之長短相狗馬之勦駑議遨游之處所比錯塗之好惡方雕琢之精麤校彈棋樗蒲之巧拙計漁獵相掊之勝負品藻妓妾之妍蚩指摘衣服之鄙野爭騎乘之善否論弓劍之疏密招竒合異至於無限盈溢之過日增月甚其談宫殿則遠擬瑶臺瓊室近效阿房林光以千門萬户爲局促以昆明太液爲淺陋笑茅茨爲不肖以土堦爲朴騃民力竭於功役儲蓄靡於不急起土山以準嵩霍决渠水以象九河登淩霄之華觀闢雲際之綺窗淫音譟而惑耳羅袂揮而亂目濮上北里迭奏迭起或號或呼俾晝作夜流連於羽觴之間沈淪乎絃節之側或建翠翳之青葱或射勇禽於郊坰馳輕足於嶮峻之上暴僚隸於盛日之下舉火而往乘星而返機事廢而不修賞罰棄而不治或浮文艘於滉瀁而密網於緑川垂香餌於漣潭縱櫂歌於清淵飛高繳以下輕鴻引沈綸以援潜鱗或結罝罘於林麓之中合重圍於山澤之表列丹飈於豐草騁逸騎於平原縱盧猎以噬狡獸飛輕鷂以鷙翔禽勁弩殪狂兕長戟斃熊虎如此既彌年而不厭歷載而無已矣而又加之以四時請會祖送慶賀要思數之密客接執贄之嘉賔人間之務密勿罔極是以雅正稍遠遨逸漸篤其去儒學緬乎邈矣能獨見崇替之理自拔淪溺之中舍敗德之嶮塗履長世之大道者良甚鮮矣嗟乎此所以保國安家者至稀而傾撓泣血者無筭也今聖明在上稽古濟物堅隄防以杜決溢明褒貶以彰勸沮想宗室公族及貴門富年必當競尚儒術撙節藝文釋老莊之意不急精六經之正道也抱朴子外篇卷之四
