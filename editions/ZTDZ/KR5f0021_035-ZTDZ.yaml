front:
  text: 抱朴子外篇卷之三十五
  hash: sha256:5f40f963a04233fe3d2d0aac332adc90d5adf218b2f155bf388b992a6127b4e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_SJB_035-280306c, image: sjb/28/280306c.png}
body:
  text: 守塉抱朴子曰余友人有潜居先生者慕寢丘之莫爭簡塉土以葺宇銳精藝文意忽學稼屢失有年飢色在顔或人難曰夫知禮在於廪實施博由乎貨豐高出於有餘儉生乎不足故十千美於詩人食貨首乎八政躬稼基克配之業耦耕有不改之樂竒士之居也進則侣鴻鸞以振翮退則參陶白之理治仕必霸王居必千金是以昔人必科膏壤以分利勤四體以稼穡播原菽之與與茂嘉蔬之翼翼收麰秬之千倉積我庾之惟億出連騎以游畋入侯服而王食而先生之宅此也亢陽則出谷颺塵重隂則滔天淩丘陸無含秀之苗水無吐穗之株稗糲曠於圌廪薪爨廢於庖厨怡爾執待免之志淡然無去就之謨吾恐首陽之事必見於今丹山之困可立而須人爲子寒心子何晏然而弗憂也夫覩機而不作不可以言明安土而不移衆庶之常事豈翫鮑者忘蘭而大迷者易性乎何先生未寤之久也鄙人惑焉不識所謂夫衮冕非禦鋒鏑之服典誥非救飢寒之具也胡不眎沃衍於四郊躬田畯之良業捨六藝之迂闊收萬箱以賑乏乎潜居先生曰夫聵者不可督之以分雅鄭瞽者不可責之以别丹漆井鼃不可語以滄海庸俗不中說以經術吾子苟知老農之小功未喻面墻之巨拙何異拾瑣沙而捐隋和向炯燭而背白日也夫好尚不可以一概杚趨舍不可以彼我易也夫欲隮閬風陟嵩華者必不留行於丘垤意在乎游南溟汎滄海者豈暇逍遥於潢洿是以注清聽於九韶者巴人之聲不能悅其耳烹大牢饗方丈者荼蓼之味不能甘其口鵾鵬戾赤霄以高翔鶺鴒傲蓬林以鼓翼洿隆殊途亦飛之極晦朔甚促朝菌不識蜉蝣怱怱於寸隂野馬六月而後息儵鮒汎濫以暴鱗靈虬勿用乎不測行業乖舛意何可得余雖藜飡之不充而足於鼎食矣故列子不以其乏而貪鄭陽之禄曾參不以其貧而易晉楚之富夫收微言於將墜者周孔之遐武也情孳孳於爲利者孟叟之罪人也造遠者莫能兼通於岐路有爲者莫能並舉於耕學體瘁而神豫亦何問於居約且又處塉則勞勞則不學清而清至矣居沃則逸逸則不學奢而奢來矣清者福之所集也奢者禍之所赴也福集則雖微可著雖衰可興焉禍赴則雖强可弱雖存可亡焉此不期而必會不招而自來者也故君子欲正其末必端其本欲輟其流則遏其源故道德之功建而奓靡之門閉矣姜望至德而佃不復種重華大聖而漁不償網然後玉璜表營丘之祚大功有二十之高何必譏之以惰嬾而察才以相士乎夫二人分財取少爲廉余今讓天下之豐沃處兹邦之褊埆舍安昌之膏腴取北郭之無欲誠萬物之可細亦何往而不足哉北辰以不改爲衆星之尊五嶽以不遷爲群望之宗蟋蟀屢移而不貴禽魚饜深則逢患方將墾九典之蕪薉播六德之嘉穀厥田邈於上土之科其收盈乎天地之間何必耕也爲務哉昔被衣以弃財止盜庾氏以推璧厲貪疏廣散金以除子孫之禍叔敖取塉以弭可欲之憂牛缺以載珍致寇陶谷以多藏召殃得失較然可無鑒乎於是問者抑然良久口張而不能嗑首俛而不能仰慨而嗟乎始悟立不朽之言者不以産業汨和追下帷之績者不以窺園涓目子以臭鶵之甘呼鴛鳳擗蟹之計要猛虎豈不陋乎鄙哉子之不夙知也抱朴子外篇卷之三十五
