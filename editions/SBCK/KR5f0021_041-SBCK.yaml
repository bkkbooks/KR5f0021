  text: 抱朴子外篇卷一
  hash: sha256:3a5b2ef7f2beca9d9426971c3f8f7c9385b8da433d2db10746a6ce0e77e11c39
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_SBCK_001-1a}
body:
  text: 晉丹陽洪稚川著嘉遁抱朴子曰有懷氷先生者薄周流之棲遑悲吐握之良苦讓膏壌於陸海爰躬耕乎斥鹵秘六竒以括嚢含琳琅而不吐謐清音則莫之或聞掩輝藻則世不得覩背朝華於朱門保恬寂乎蓬户絶軏躅於金張之閭養浩然於幽人之仵謂榮顯為不幸以玉帛為草抗靈䂓於雲表獨違今而遂古庇峻岫之巍峩藉翠蘭之芳茵漱流霞之澄液茹八石之精英思焉若居乎虹霓之端意飄飄焉若在乎倒景之鄰萬物不能攪其和四海不足汩其神於是有赴勢公子聞之慨然而歎曰空谷有項領之駿者孫陽之耻也太平遺冠世之才者賞真之貴也安可令俊民全其獨善之分而使聖朝乏乎元凱之用哉乃造而説曰徒聞振趐竦身不能凌厲九霄騰跚極攸叙彛倫者非英偉也今先生操立斷之鋒掩炳蔚之文玩圖籍於絶跡之藪括藻麗乎鳥獸之群陳龍章於晦夜沈琳琅於重淵蟄伏於盛夏藏華於當春雖復下帷覃思殫毫騁藻幽賛太極闡釋元本言歡則本梗怡顔如巧語戚則偶象嚬顣而滂沲抑輕則鴻羽沈於弱水抗重則玉石漂於飛波離同則肝膽為胡越合異則萬殊而一和切論則秋霜春肅温辭則冰條吐葩摧髙則峻極頺淪竦卑則淵池嵳峩疵清則倚暗夜光救濁則立澄黄河然不能沾芳惠於庻物著勲於皇家名與朝露皆晞體與蜉蝣並化忽崇高於聖人之寳忘川逝於大耋之嗟為先生不取焉蓋聞大者天地其次君臣先聖憂時思行其道三月無君皇皇如也耻今聖主不與堯舜一致愍此黎民不可比屋而封故或負而龍躍或扣角以鳯歌不須蒲輪而後動不待文主而後興潜初飛五與時消息進有攸徃之利退無濡尾之累明哲以保身宣化以濟俗使夫承蘭風以傾柯濯清波以遣者若沈景之應朗鑒方圓之赴䂓矩故勲格上下惠沾八表夫有唐所以巍巍重華所以恭已西伯所以三分姬發所以革命桓文所以一匡漢高所以應天未有不致群賢為六翮託豪傑為舟楫者也若令各守洗耳之高人執耦耕之分則稽古之化不建英明之盛不彰明良之歌不作括天之網不張矣故藏器者珍於變通隨時英逸者貴於竒撥亂若乃耀靈翳景於雲表則麗天之明不著哮虎韜牙而握則摶噬之㨗不揚太阿潜而不擊則立斷之勁不顯騄踠趾而不馳則追風之迅不形並黙則子貢與喑者同口咸瞑則離朱與矇瞽不殊矣先生潔身而忽大倫之亂得意而忘安上之義存有闗機之累沒無金石之聲庸人且猶憤色何有大雅而無心哉夫繩舒則木直正進則邪凋有虞舉則四凶戮宣尼任則少卯梟猶震雷駭則鼛鼓堙朝日出則螢燭幽也不拯招魂之病則無以効越人之絶伎不㢡多難之世則無以知非常之逺量高拱以觀溺非勿踐之仁也懷道以迷國非作者之務也若俟中唐殖占日之草朝陽繁鳴鳯之音郊跱獨角之獸野攅連理之林長旌卷而不懸干戈戢而莫尋少伯方將告退於成功孰能相擢乎陸沈哉深願先生不逺迷復哉於是懷冰先生蕭然遐眺遊氣天衢情神遼緬旁若無物俯而答曰嗚呼有是言乎蓋至人無為棲神沖漠不役志於禄利故害而不能加也不䠧峙於險途故傾墜不能為患也藜藿不供而意佚於方丈齊編庸民而心歡於有土寑宜僚之舍閉干木之閭莊萊之友治陋巷之居礭岳峙而不拔豈有懷於卷舒乎以慾廣則濁和故委世務而不紆眄以位極者憂深故背勢利而無餘疑其貴不以爵也富不以財也侣雲鵬以高逝故不縈翮於腐鼠以蕃武為厚誡故不改樂於簞瓢且夫玄黄遐邈而人生倐忽以過隙之促託罔極之間迅乎猶奔星之蹔見飄乎似飛矢之電經聊且優游以自得安能苦形於外物哉夫鳶不絓網驎不墮穽相彼鳥獸猶知為患風塵之徒曾是未吝也若夫要離滅家以効功紀信赴燔以誑楚陳賈刎頸以證弟仲由投命而嬴門伏劔以表心聶政感惠而屠荆卿絶臏以報燕樊公含悲而授首皆下愚之狂惑豈上智之攸取哉蓋厚禄者責重爵尊者神勞故漆園垂綸而不顧卿相之貴柏成操耜而不屑諸侯之髙羊説安乎屠肆楊朱吝其一毛僥求之徒昧乎可欲集不擇木仕不料世貪進不慮負乘之禍受任不計不堪之敗論榮貴則引伊周以救溺言亢悔則諱覆餗而不記伺河龍之睡而撥明珠居量表之寵而冀無患耽漏刻之安蔽必至之危無朝菌之榮望大椿之夀似蹈薄氷以待夏日登朽枝而須勁風淵魚之引芳餌澤雉之咽毒粒咀漏脯以充飢酣鴆酒以止渇也昔箕子覩象箸而流泣尼父聞偶而永歎蓋尋㣲以知著原始以見終然而闇夫蹈機不覺何前識之至難而利欲之篤邪周成賢而信流言公旦聖而走南楚託鴟鴞以告悲賴金縢以僅免況能寤之主不世而一有不恱之謗無時而蹔乏徳不以激烈風而起斃禾事不以載珪璧而稱多才嗟泣靡及宜其然也夫漸漬之久則膠漆解堅浸潤之至則骨肉乖析塵羽之積則沉舟折軸三至之言則市虎以成故江充䟽賤非親於元儲後毋假繼非宻於伯竒而掘梗之誣滅父子之恩䄂蜂之誑破天性之愛又況其他安可自必嗟乎伍員所以懷忠而漂尸悲夫白起所以秉義而刎頸也蓋徹鑒所為寒心匠人之所眩惑矣又欲推短才以雷同仗獨是以彈衆非然不覩金雖克木而錐鑚不可以伐鄧林水雖勝火而升合不足以救焚山寸膠不能治黃河之濁尺水不能却蕭丘之熱是以身名並全者甚稀而先後號者多有也畏亢悔而貪榮之慾不滅忌毁辱而爭肆之情不遣亦猶惡濕而泳深淵憎影而不就隂穿舟而息漏猛㸑而止沸者也夫七尺之骸禀之以所生不可受全而歸殘也方寸之心制之在我不可放之於流遁也躬耕以食之穿井以飲之短褐以蔽之廬以覆之彈詠以娯之呼吸以延之逍遥竹素寄情玄毫守常待終斯亦足矣且夫道存則尊徳盛則貴隋珠彈雀智者不為何必須權而顯俟禄而飽哉且夫安貧者以無財為富甘卑者以不任為榮故幼安浮海而澄神胡子甘心於退耕逢比有令徳之罪信布陷功大之刑一枝足以戢鸞羽何煩乎豐林潢洿足以泛龍鱗豈事乎滄海藜藿嘉於八珍寒泉㫖於醽醁躡履羙於赤舄緼袍麗於衮服把橦安於杖鳴條樂乎絲竹茅茨艶於丹楹采椽珍於刻桷登嵩峯為臺榭庇巖霤為華屋積篇章為敖庾寳玄談為金玉棄細人之近戀庸之所欲遊九臯以含歡遣智惠以絶俗同屈尺蠖藏光守樸表拙示訥知止常足然後咀嚼芝芳風飛雲浮晞景九陽附翼高遊仰棲梧桐俯集玄洲孰與銜轡而伏同被繡於犧牛哉赴勢公子曰夫入而不出者謂之耽寵忘退徃而不及者謂之不任無義故達者以身非我有任乎所值顯黙語無所必固時止則止時行則行束帛之集庭燎之舉則君子道長在天利見若運涉陽九讒勝之時則不出戸庭括嚢勿用龍起鳯戢隨時之冝古人所以或避危亂而不肯入或色斯而不終日者慮巫山之失火恐芝艾之并焚耳方今聖皇御運世夷道泰仁及蒼生惠風遐邁威肅方澤沾九裔儀坤徳以厚載擬乾穹以高蓋神化則雲行雨施玄澤則煙煴汪濊四門穆穆以愽延主思英逸以俾乂此乃千載所希值剖判之一㑹而先生慕嘉遁之偏枯不覺狷華之患害也務乎單豹之養内未覩暴虎之犯外也是聞涉水之或溺則謂乘舟者皆敗以商臣之凶逆則謂繼體無也懷冰先生曰聖化之盛誠如高論出處之事人各有懷故堯舜在上而箕潁有巢棲之客夏后御世而窮数有握耒之賢豈有慮於此險哉蓋各附於所安也是以高尚其志不仕王侯存夫爻象匹夫所執延州守節聖人許焉僕所以逍遥於丘園歛迹乎草澤者誠以才非政事器乏治民而多士雲起髦彦鱗萃文武盈朝庻事既康故不欲復舉熠燿以厠日月之間拊甂瓴於洪鍾之側貢輕扇於堅氷之節衒裘鑪乎隆暑之月必見於無用速非時之巨嗤若擁經著述可以全真成名有補末化若强所不堪則將顛沛惟咎同悔小狐故居其所長以全其所短耳雖無立朝之勲即戎之勞然切磋後生弘道養正殊塗一致非損之民也劣者全其一介何及於許由聖世恕而容之同曠於有唐不亦可乎赴勢公子勃然自失肅爾改容曰先生立言助教文討姦違摽退靜以抑躁競之俗興儒教以救㣲言之絶非有出者誰叙彛倫非有者誰誨童普天率莫匪臣民亦何必垂纓執笏者為是而樂飢衡門者可非乎失群迷乎雲夢者必湏指南以知道並乎滄海者必仰辰極以得返今聞嘉訓乃覺其蔽請負衣冠筞駑希汎愛與進不嫌擇焉抱朴子外篇卷一終抱朴子外篇卷二晋丹陽洪稚川著逸民抱朴子曰余昔遊乎雲臺之山而造逸民遇仕人在焉仕人之言曰明明在上總御八紘華夷同歸要荒服事而先生遊栢成之遐武混群伍於鳥獸然時移俗異世務不拘故木食山棲外物遺累者古之清高今之逋逃也君子思危於未形絶禍於方來無乃去張毅之内就單豹之外害畏盈抗慮忘亂群之近憂避牛跡之淺嶮而墮百仭之不測違濡足之泥涇投鑢冶而不覺乎逸民答曰夫銳志於雛鼠者不識騶虞之用心盛務於庭粒者安知鴛鸞之逺指猶焦之笑雲鵬朝菌之怪大椿坎蛙之疑海鼈井蛇之嗤應龍也子誠喜懼於勸沮焉識玄曠之髙韻哉吾幸生於堯舜之世何憂不得此人之志乎仕人曰昔狂狷華士義不事上於海隅而太公誅之吾子沈遁不亦危乎逸民曰吕尚長於用兵短於為國不能儀玄黄以覆載擬海嶽以愽納褒賢貴徳樂育人才而甘於刑殺不修仁義故其刼殺之禍萌於始封周公聞之知其無國也夫攻守異容道貴知變而吕尚無烹鮮之術出致逺之御推戰陳之法害髙尚之士可謂頼甲胄以完刃又兼之浮泳以射走之儀又望求之於准的者也夫傾庻鳥之巢則靈鳯不集漉魚鼈之池則神虬遐逝刳凡獸之胎則麒麟不峙其郊害一介之士則英傑不踐其境吕尚創業垂統以示後人而張苛酷之端開殘賊之軏適足以驅俊民以資他國逐賢能以遺讎敵也去彼市馬骨以致駿足軾陋巷以退秦兵者不亦逺乎子謂吕尚何如周公乎士人曰不能審也逸民曰夫周公大聖以貴下賤吐哺握髮懼於失人從白屋之士七十人布衣之徒親執贄所師見者十人所友者十有二人皆逼以在朝也設令吕尚居周公之地則此等皆成市朝之暴尸而溝澗之腐胔矣唐堯非不能致許由巢父也虞舜非不能脅善卷石户也夏禹非不能逼柏成子髙也成湯非不能録卞隨務光也魏文非不能屈干木也晉平非不能吏期唐也然復而肆之貴而重之豈六君之劣弱也誠以百行殊尚黙黙難齊慕尊賢之美稱耻賊善之醜迹取之不足以増威放之未憂於官曠從其志則可以闡弘風化熙隆退讓厲茍進之貪夫感輕薄之冐昧雖器不益於旦夕之用才不周於立朝之俊不亦愈於脅肩低眉諂媚權右提贄懷貨宵征同塵爭津競濟市買名品棄徳行學問之本赴雷同比周之末也彼六君尚不肯苦言以侵士寧肯加之鋒刃乎聖賢誠可師者吕尚居然謬矣漢高帝雖細行多闕不涉典藝然其弘曠恢廓善恕多容不繫近累蓋豁如也雖飢渇四皓而不逼也及太子卑辭致之以為羽翼便敬徳矯情惜其大者發黃鵠之悲歌杜婉妾之覬覦其珍賢貴如此之至也宜其以布衣而君四海其度量蓋有過人者矣且夫吕尚之殺狷華者在於恐其沮衆也然俗之所患者病乎躁於進趨不務行業耳不苦於安貧樂賤者之太多也假令士徃徃屬目至於情掛勢利志無止足者終莫能割此常慾而慕彼退靜者也開闢已降非少人也而忘富遺貴之士猶不能居萬分之一仲尼親受業於老子而不能修其無為子貢與原憲同門而不能模其清苦四凶與巢由同時王莾與二龔共世而不能效也凡民雖復笞督之危辱之使追狷華猶必不肯乃當憂其壞俗邪吕尚思不及此以軍法治平世枉害賢人酷誤已甚矣頼其功大不便以至顛沛耳且吕尚之未遇文王也亦曽於窮賤凡人易之老婦逐之賣傭不售屠釣無獲曽無一人慕之其避世也何獨慮狷華之沮衆邪設令殷紂以尚逃遁収而歛之尚臨死豈能自謂罪所應邪魏武帝亦刑法嚴峻果於殺戮乃心欲用乎孔明明自陳不樂出身武帝謝遣之曰義不使高世之士辱於汙君之朝也其鞭撻九有草創皇基亦不妄矣紛擾日久求競成俗或推貨賄以龍躍或階黨援以鳯起風成化習大道漸蕪後生昧然儒訓遂堙將為立身非財莫可茍有卓然不群之士不出户庭潜志味道誠宜優訪以興謙退也夫使孫呉荷戈一人之力耳用其計術則賢於萬夫今令大儒為吏不必切事肆之山林則能陶冶童闡弘禮敬何必服巨象使捕鼠韝鸞也則鍾鐫其聲若乃零淪藪澤空生徒死亦安足貴乎逸民答曰子可謂守培塿玩狐丘未登閬風而臨雲霓翫瀅汀游潢洿未浮南溟而涉天漢凡所謂志人者不必在乎禄位不必湏乎勛伐也太上無已其次無名能振翼以絶群騁迹以絶軏為常人所不能為割近才所不能割少多不為凡俗所量恬粹不為名位所染淳風足以濯百代之高操足以激將來之濁何必紆朱曵紫服冕乘軺被犧牛之文繡吞詹何之香餌朝為張天之炎夕成冰泠之委灰夫斥鷃不以蓬榛易雲霄之表玉鮪不以幽岫滄海之曠虎豹入廣厦而懷悲鴻鶤登嵩巒而含慼物各有心安其所長莫不㤗於得意而慘於失所也經世之士悠悠皆是一日無君惶惶如也譬猶藍田之積玉鄧林之多材良工大匠肆意所用亦何必棲魚而沈鳥哉嘉遁高蹈先聖所許或出或處各從攸好蓋士之所貴立徳立言若夫孝友仁義操業清高可謂立徳矣窮覽墳索著述粲然可謂立言矣夫善卷無治民之功未可謂之减於俗吏仲尼無攻伐之勛不可以為不及於韓白矣身名竝全謂之為上居求志先民嘉焉夷齊一介不合變通古人嗟嘆謂不降志辱身不降者明逸之爲高也不辱者知覊縶之爲洿也聖人之清者孟軻所美亦云天爵貴於印綬志脩遺榮孫卿所尚道義既必可輕王公而世人所畏唯勢所重唯利盛徳身滯便謂庸人器小任大便爲高士或有乘危冒嶮投死忘生棄遺體於萬仭之下邀榮華乎一朝之閒比夫輕四海愛脛毛之士何其然邪仕人曰潜退之士得意山澤不荷世貴蕩然縱肆不爲時用嗅祿利誠爲天下無益之物何如逸民答曰夫麟不吠守鳯不司晨騰黄不引犂尸祝不治庖也且夫揚大明乎無外宣嫗煦之和風者日也耀華燈於閑夜冶金石以致用者火也天下不可以經時無日不可以一旦無火然其大小不可同也江海之外彌綸二儀升爲雲雨降成百川而朝夕之用不及累仭之井灌田溉園未若溝渠之沃挍其巨細孰爲曠哉桀紂帝王也仲尼陪臣也今見比於桀紂則莫不怒焉見擬於仲尼則莫不恱焉爾則貴賤果不在位也故孟子云禹稷顔淵易地皆然矣宰予亦謂孔子賢於堯舜逺矣夫匹庻而鈞稱於王者儒生高極乎唐虞者徳而已矣何必官哉且夫交靈升於造化運天地於懷抱恢恢然故不棲於心術芒芒然寵辱不汨其純白流俗之所欲不能染其神近人之所惑不能移其志榮華猶贅疣也萬物猶蜩翼也若然者豈肯詰屈其支體俯仰其容儀挹酌於其所不喜脩索於其所棄遺怡顔以取進曲躬以避退恐俗人之不恱慼我身之凌遲屈龍淵為錐鑚之用抑靈鼖為鼗鼙之音推黄以適釤鎌之持撓華旗以入林杞之下乎古公杖䇿而捐之越翳入穴以逃之季扎退耕以委之老萊灌園以逺之從其所好莫與易也故醇而不雜斯則富矣身不受役斯則貴矣若夫剖符有所謂禄利耳非富貴也且夫官高者其責重功大者人忌之獨有貧賤莫與我爭可得長寳而無憂焉濯裘布被㧞葵去織㹠不掩豆菜肴糲飡又獲逼下邀偽之譏樹塞反坫三歸玉食禳侯之富安昌之泰則有僣上洿濁之累未若遊神典文故納新求飽乎耒耜之端索緼乎杼軸之間腹仰河而已滿身集一枝而餘安萬物芸芸化為埃塵矣饘粥餬口布褐緼袍淡泊肆志不憂不喜斯為尊樂喻之無物也夫仕也者欲以為名邪則脩毫可以憤懣篇章可以寄姓字何假乎良史何煩乎鑱哉孟子不以矢石為功楊雲不以治民益世求仁而得不亦可乎仕人又曰遁之士則為不臣亦豈宜居君之地食君之穀乎逸民曰何謂其然乎昔顔回死魯定公將躬弔焉使人訪仲尼仲尼曰凡在内皆臣也定公乃升自東階行君禮焉由此論之率土之濵莫匪王臣可知也在朝者陳力以秉庻事山林者脩徳以厲貪濁殊塗同歸俱人臣也王者無外天下為家日月所照雨露所及皆其境也安得懸虚空飡咀流霞而使之不居乎地不食乎穀哉夫山之金玉水之珠貝雖不在府庫之中不給朝夕之用然皆君之財也退士不居肉食之列亦猶山水之物也豈非國有乎許由不於四海之外四皓不走於八荒之表也故曰萬黎獻共惟帝臣干木不荷戈戍境築壘疆場而有蕃魏之功今者潔行蓽之内以詠先王之道使民知退讓儒墨不替此亦堯舜之所許也昔夷齊不食周粟鮑焦死於橋上彼之硜硜何足師表哉昔安帝以玄纁玉帛聘周彦祖桓帝以玄纁玉帛聘韋休明順帝以玄纁玉帛聘楊仲宣就拜侍中不到魏文帝徵管幼安不至又就拜光禄勲竟不到乃詔所在常以八月致羊一口酒二斛桓帝玄纁玉帛聘徐孺子就拜太原太守及東海相不到順帝以玄纁玉帛聘樊季高不到乃詔所在常以八月致羊一口酒二斛又賜几杖待以師傅之禮獻帝時鄭康成州辟舉賢良方正茂才公府十四辟皆不就公車徵左中郎愽士趙相侍中大司農皆不起昭帝公車徵韓福到賜帛五十疋及羊酒法高卿再舉孝亷本州五辟公府八辟九舉賢良愽士三徴皆不就桓帝以玄纁玉帛安車軺輪聘韓伯休不到以玄纁玉帛安車軺輪聘姜伯雅就拜太中大夫犍為太守不起然皆見優重不加威辟也若此諸帝褒逸之士不謬者則吕尚之誅華士為凶酷過惡斷可知抱朴子外篇卷二終抱朴子外篇卷三晋丹陽洪稚川著勗學抱朴子曰夫學者所以清澄性理簸揚埃雕鍜鑛璞礱鍊屯鈍啓導聰明染質素察徃知來愽涉勸成仰觀俯察於是乎在人事王道於是乎備進可以為國退可以保己是以聖賢罔莫孜孜而勤之夙夜以勉之命盡日中而不釋飢寒危困而不廢豈以有求於當世哉誠樂之自然也夫斵削刻畫之薄伎射御乘之易事猶湏慣習然能後善況乎人理之曠道徳之逺隂陽之變神之情緬邈玄奥誠難生知雖云色白匪染弗麗雖云味甘匪和弗美故瑶華不琢則耀夜之景不發丹青不治則純鈞之勁不就火則不鑚不生不扇不熾水則不决不流不積不深故質雖在我而成之由彼也登閬風捫晨極然後知井谷之闇隘也披七經玩百氏然後覺面牆之至困也夫不學而求知猶願魚而無網焉心雖勤而無獲矣廣愽以窮理猶順風而託焉體不勞而致逺矣粉黛至則西施以加麗而宿瘤以藏醜經術深則髙才者洞逸鹵鈍者醒悟文梓干雲而不可以臺榭者未加班輸之結構也天然爽朗而不可謂之君子者不識大倫之臧否也欲超千里於終朝必假追影之足欲凌洪波而遐濟必因艘楫之器欲見無外而不下堂必由之乎載籍欲測淵㣲而不役神必得之乎明師故朱緑所以改素絲訓誨所以移蒙蔽披玄雲而揚大明則萬物無所其狀矣舒竹帛而考古今則天地無所藏其情矣況於神乎而況於人事乎泥可令齊堅乎金玉曲木可攻之以應繩墨百獸可教之以戰陳畜牲可習之以進退沈鱗可動之以聲音機石可感之以精誠又況乎含五常而禀最靈者哉低仰之駟教之功也鷙擊之禽習之馴也與彼凡馬野鷹本實一此以貴彼以質賤運行潦而勿輟必混流乎滄海矣崇一簣而弗休必鈞高乎峻極矣大川滔瀁則虬螭群游日就月將則徳立道備乃可以止夢乎丘旦何徒解桎乎困蒙哉昔仲由冠雞帶㹠䨥珥鳴蟬杖劔而見拔白而舞盛稱南山之勁竹欲任掘强之自然尼父善誘染以徳教遂成升堂之生而登四科之哲子張鄙人而灼聚凶猾漸漬道訓成化名儒乃抗禮於王公豈直免於庸陋以是賢人悲寓世之倐忽疾泯沒之無稱感朝聞之弘訓悟通㣲之無懼將落之明戒覺罔念之作狂不飽食以終日不棄功於寸隂鑒逝川之勉志悼過隟之電速割遊情之不急損人間之末務洗憂貧之心遣廣願之息畋獵愽奕之游戯矯晝坐睡之懈怠知徒思之無益遂振䇿於聖途學以聚之問以辯之進徳脩業温故知新夫周公上聖而日讀百篇仲尼天縱而韋編三絶墨翟大賢載文盈車仲舒命世不窺園門倪寛帶經以芸鉏路生截蒲以寫書黄霸抱桎梏以受業寗子勤夙夜以倍功故能究覽道奥窮測㣲言觀萬古如同日知八荒若户庭考七耀之盈虚步三五之變化審盛衰之方來驗善否於旣徃料玄黄於掌握甄未兆以如成故能盛徳大業冠於當世清芳令問播于罔極也且夫聞商羊而戒浩瀁訪鳥砮而洽東肅諮萍實而言色味訊狗而識墳羊披靈寳而知山因折爼而説專車瞻離畢而分隂陽之候由冬螽而覺閏餘之錯何神之有學而已矣夫童謡猶助聖人之耳目豈況墳索之弘愽哉才性有優劣思理有脩短或有夙知而早成或有提耳而後喻夫速悟時習者騄之脚也遲解晚覺者鶉鵲之翼也彼雖尋飛絶景止而不行則步武不過焉此雖咫尺以進徃而不輟則山澤可越焉明暗之學其猶兹乎蓋少則志一而難忘長則神放而易失故修學務早及其精專習與性成不異自然也若乃絶倫之器盛年有故雖失之於谷而之於虞淵方知良田之晚播愈於卒嵗之荒蕪也日燭之喻斯言當矣世道多難儒教淪喪文武之軌將遂凋墜或沈溺於聲色之中或驅馳於競逐之路孤貧而精六藝者以游夏之資而抑頓乎九泉之下因風而附鳯翼者以駑庸之質猶遑乎霞霄之表舎本逐末者謂之勤修庻幾擁經求己者謂之陸沈迂闊於是莫不蒙塵觸雨戴霜履氷懷黄握白提清絜肥以赴邪徑之近易規朝種而暮穫矣若乃下帷高枕遊神九典精義味道居精乎建不拔之操揚青於嵗寒之後不揆世以投迹不隨衆以萍漂者蓋亦鮮矣汲汲於進趨悒悶於否滯者豈能舎至易速達之通而守甚難必窮之塞路乎此川上所以無人子衿之所為作愍俗者所以痛心而長慨憂道者所以含悲而頽思也夫寒暑代謝否終則泰文武迭貴常然之數也冀群冦畢滌中興在今七耀遵度舊惟新振天惠以廣掃鼔九陽之洪爐運大鈞乎皇極開玄模以軌物陶冶庶匠成翹秀蕩汰積埃革邪反正戢干戈橐弓矢興辟雍之庠序集國子修文徳發金聲振玉音降風雲於潜初旅束帛乎丘園令抱翼之鳯奮翮於清虚項領之駿騁迹於千里使夫含章抑欝窮覽洽聞者申公伏生之徒發玄纁登蒲輪結氣陳立素顯其身行其道俾聖世迪唐虞之高軌馳升平之廣塗玄流沾於九垓惠風被乎無外五刑厝而頌聲作和氣洽而嘉穟生不亦休哉昔秦之二世不重儒術舎先聖之道習刑獄之法民不見徳唯戮是聞故惑而不知反迷之路敗而不知自救之方遂墮墜於雲霄之上而粉乎不測之下惟尊及卑可無鑒乎抱朴子外篇卷三終抱朴子外篇卷四晋丹陽洪稚川著崇教抱朴子曰澄視於秋毫者不見天文之煥炳肆心於細務者不覺儒道之弘逺翫鮑者忘蕙迷大者不能及夫受繩墨者無枉刳之木染道訓者無邪僻之人治之術莫良乎學學之廣在於不倦不倦在於固志志茍不固則貧賤者汲汲於營生富貴者沈淪於逸樂是以遐覽淵慱者曠代而時有面牆之徒比肩而接武也若使素士則晝躬耕以餬口夜薪火以修業在位則以酣宴之餘暇時遊觀於勸誡則世無視内游夏不乏矣亦有飢寒切己藜藿不給膚困風霜口乏糟糠出無從師之資家有暮旦之急釋耒則農事廢執卷則供養虧者雖闕學業可恕者也所謂千里之足困於鹽車之下赤刀之鑛不經歐冶之門者也若夫王孫公子優游貴樂婆娑綺紈之間不知稼穡之艱難目倦於玄黄耳疲乎鄭衛鼻饜乎蘭麝口爽於膏粱冬沓貂狐之温麗夏縝紗縠之翩飄出驅慶封之輕軒入宴華房之粲蔚朱翠於楹梲積無己於箧匱陳妖冶以娯心湎醁以沈醉行為㑹飲之魁坐為愽奕之帥省文章既不曉覩學士如草芥口筆乏乎典據牽引錯於事劇談則方戰而已屈臨疑則生老而憔悴雖菽麥之能辯亦奚别乎瞽瞶哉抱朴子曰蓋聞帝之元儲必入太學承師問道齒於國子者以知為臣然後可以為君知為子然後可以為父也故學立而仕不以政學操刀傷割鄭喬所歎觸情縱欲謂之非人而貴游子弟生乎深宫之中長乎婦人之手憂懼之勞未甞經心或未免於襁褓之中而加青紫之官纔勝衣冠而居清顯之位操殺生之威提黜陟之柄榮辱决於與奪利病感於唇吻愛惡無時暫乏毁譽括厲於耳嫌疑象似是而非因機㑹以坐無端藉素信以設巧言交構之變千端萬緒巧筭所不能詳毫墨所不能究也無術學則安能見邪正之真偽具古今之行事自悟之理無所感假能無傾巢覆車之禍乎先哲居髙不敢忘危愛子欲教之義方雕琢切磋弗納於邪偽選明師以象成之擇良友以漸染之督之以慱覽示之以成敗使之察徃以悟來觀彼以知此驅之於直道之上歛之乎撿括之中懔乎若跟掛於萬刃慄然有如乘奔以履氷故能多逺悔吝保其貞吉也昔諸竇道教之福霍禹受率意之禍中山東平以好古而安燕刺由面牆而危前事不忘今之良鑒也湯武染乎伊吕其興勃然辛癸染乎推崇其亡忽焉明友師傅尤宜精簡必取寒素徳行之士以清苦自立以不群見憚者其經術如仲舒柄榮者强直若龔遂王吉者能朝夕講論忠孝之至道正色證存亡之軌迹以洗濯垢閑邪矯枉宜必抑情遵憲法入徳訓者矣漢之末世呉之晚年則不然焉望冠盖以選用任朋黨之華譽有師友之名無拾遺之實匪唯無益乃反為損故其所講非道徳也其所貢進非忠益也唯在於新聲艶色輕體妙手評歌謳之清濁理管絃之長短相狗馬之勦駑議遨遊之處所比錯塗之好惡方雕琢之精麤校彈棊樗蒲之巧拙計漁獵相掊之勝負品藻妓妾之妍指摘衣服之鄙野爭乘之善否論弓劍之踈宻招竒合異至於無限盈溢之過日増月甚其談宫殿則逺擬瑶臺瓊室近効阿房林光以千門萬户為局促以昆明太液為淺陋笑茅茨為不肖以土堦爲朴騃民力竭於功役儲蓄靡於不急起土山以准嵩霍决渠水以象九河登凌霄之華觀闢雲際之綺窻淫音譟而惑耳羅揮而亂目濮上北里迭奏迭起或號或呼俾晝作夜流連於羽觴之間沈淪乎絃節之側或建翠翳之青葱或射勇禽於郊坰馳輕足於嶮峻之上暴僚於盛日之下舉火而往乘星而返機事廢而不修賞罰棄而不治或浮文艘於滉瀁布宻網於緑川垂香餌於漣潭縱櫂歌於清淵飛高繳以下輕鴻引沈綸以援潜鱗或結罘於林麓之中合重圍於山澤之表列丹飈於豊草騁逸於平原縱盧猎以噬狡獸飛輕鷂以鷙翔禽勁弩殪狂兕長㦸斃熊虎如此既彌年而不猒歷載而無已矣而又加之以四時請㑹祖送慶賀要思數之宻客接執贄之嘉賔人間之務宻勿罔極是以雅正稍逺遨逸漸篤其去儒學乎邈矣能獨見崇替之理自拔淪溺之中舍敗徳之嶮塗履長世之大道者良甚鮮矣嗟乎此所以保國安家者至稀而傾撓泣血者無筭也今聖明在上稽古濟物堅隄防以杜决溢明褒貶以彰勸沮想宗室公族及貴門富年必當競尚儒術撙節藝文釋老莊之意不急精六經之正道也抱朴子外篇卷四終抱朴子外篇卷五晋丹陽洪稚川著君道抱朴子曰清玄剖而上浮濁黄判而下沈尊卑等威於是乎著徃聖取諸兩儀而君臣之道立設官分職而雍熙之化隆君人者必修諸己以先四海去偏黨以平王道遣私情以標至公擬宇宙以籠萬殊真偽既明於物外矣而兼之以自見聽受既聰於接來矣而加之以自聞儀决水以進善鈞絶絃以黜惡招徳塞違庸親昵賢使規盡其圓矩竭其方繩肆其直斤効其斵器無量表之任才無失授之用考名責實屢省勤恤樹訓典以示民極審褒貶以彰勸沮明檢齊以杜僣濫詳枉直以違晦吝其與之也無叛理之幸其奪之也有百氏之揜匠之以六藝軌之以忠信蒞之以慈和齊之以禮刑揚仄陋以伸沈抑激清流以澄臧否使物無詭道事無非分立朝牧民者不得侵官越局推轂即戎者莫敢憚危顧命恱近以懐逺修文以招阜百姓之財粟闡進徳之廣塗杜機偽之繁務則明罰勑法哀敬折獄淳化治則匿瑕藏疾五教在寛外惣多士於文武内建維城之穆屬使親踈相持尾為身幹枝雖茂而無傷本之憂流雖盛而無背源之勢石磐岳峙式遏覬覦見三苖之傾殄則知川源之未可恃也覩翳幽之不守則覺嚴嶮之不足頼也夫江漢猶存而强楚虜辱劔閣自如而子陽赤族四岳三塗實不一姓金城湯池未若人和守在海外匪山河也是以賢君抱懼不足而改過恐有餘謀當計得猶思危而弗休焉戰勝地廣猶戒盈而夕焉象渾穹以遐燾式坤厚以廣載運重光以表㣲致逺思乎未兆資春景以嫗煦範秋霜以肅物訓諮以校同異平衡以銓群言虛己以盡下情推功以勸將來御之以術則終始可竭也整之以度則參差可齊也嶷若閬風之渡霄而諸下不得以輕重料焉窈若玄淵之萬仭則近不能以少多量焉然則君之流源不窮而百僚之才力畢陳矣我之涯畔無外而彼之斤兩可限矣發號吐令則輷若震霆之激響而不為邪辯改其正畫法創制則炳若七曜麗天而不以愛惡曲其情宏略逺罩則藹若宻雲之高結居貞成務則若嵩岱之根地料倚伏於未萌之前審毁譽於巧言之口不使敦朴散於雕偽不使一體澆於二端雖能獨斷必慱納乎芻蕘雖務含弘必清耳於浸潤民之飢寒則哀彼貴此百姓有罪則謂之在予嘉祥之臻則念得神之祐或逢天之怒則思桑林之引咎不吝改絃於宜易之調不耻及迷於朝過之塗虎眄以警宻麟跱以接䟽路無擊壌之叟則羞聞和音之作民有不粒之匱則媿臨方文之膳處飛閣之概天則懼役夫之勞瘁茹柔嘉之㫖脆則憂敬授之失時聆管絃之宴羨則戚逸樂之有過瞻藻麗之采粲則慮賦歛之慘烈遵放勛之麤裘准衛文之大帛追有夏之卑宫識露臺之不果鑒章華之召災悟阿房之速禍誥誓則念依時之失信耽玩則覺褒妲之惑我征伐則量力度時不令百里有號泣之憤誅戮則遺情任理不使鴟夷有抱枉之魂鑒操彤之杜伯推人立之呼豕廢適則戒晉獻之巨惑立庻則念劉表之殄祀蒐畋則樂失獸而得士識弛網而悦逺偏愛則慮䄂蜂之謗巧飛鷰之專寵獨任則悟鹿馬之作威恭顯之惡直納䇿則思漢祖之吐哺孝景之誅錯㫖甘之進則䟽儀狄容悦姑息則沈欒激除蒸子之謟親放麋之仁鑒白龍以輟輕脫觀羸以節無饜防人彘之變於六宫之中止汗血之求於絶域之外除惡犬以遏酒酗之患市馬骨以招追風之駿軾怒鼃以勸勇避螳蜋以厲武聆虐會之讜言容保申之正直剔腹背無益之毛攬六翮凌虚之用烹如簧以謐司原之箴折菀渃以迪梁伯之羙放丹姬以弭婉孌之迷退子瑕以杜餘桃之惑藏淵中之魚操利器之柄勿憚徙薪之煩以省焦爛之費鼓亷耻之陶冶明考試之準的怒不越法以加虐喜不踰憲以厚遺割情於所愛而有犯者無赦採善於所憎而有勞者不遺傾下以納忠聞逆耳而不諱廣乞言於誹謗雖委抑而不距掩細瑕而録大用忘近惡而念逺功使夫曹翽孟明有修來之効魏尚張敞立雪耻之績射鈎之賊臣著匡合之弘勲釋縳之左車吐止戈之高䇿則鵂梟化為鴛鸞邪偽變成忠貞芳頴秀於斥鹵夜光起乎泥濘剡銳載胥九功允諧西靣逡巡以延師友之才尊事老叟以敦孝悌之行是以淵蟠者仰赴山棲者俯集炳蔚内弼虓闞外御政得於上而物傾於下惠發乎邇而澤邁乎逺明哲宣力於攸莅黔庻譲畔於藪澤爾乃蠲滋章之法令振太和之清風蒲輪玉帛以抽丘園之俊民元凱畢集以究論道之損益减牧羊之多人及不酤之至醇張仁譲之闈杜華競之津旌義正之操弘道素之格使附徳者若潜萌之恱甘雨見歸者猶行潦之赴大川黎民安之若緑葉之綴脩柯左祍仰之若衆星之繫北辰是以七政不亂象於玄極寒温不謬節而錯集四靈備覿芝華灼粲甘露淋漉以霄墜嘉穂婀娜而盈箱丹魃逐於神潢玄厲抅於廣朔百川無沸騰之異南箕謐偃禾之暴物無詭時之凋人無嗟慨之響囹圄虚陳五刑厝正朔所不加冕紳所不暨氊裘皮服山棲海竄莫不含歡革面感和重譯靈禽貢於彤庭瑶環獻自西極貟首遽善猶氤氲之順勁風要荒承指若響亮之和絶音誠升隆之盛致三五之躅也故能固廟祧於罔極繁本枝乎百世矣夫根深則末盛矣下樂則上安矣馬不調造父不能超千里之迹民不附唐虞不能致同天之美馬極則變態生而傾僨惟憂矣民困則多離叛其禍必振矣可不戰戰以待旦乎可不慄慄而慮危乎人主不澄思於治亂不深鑒於亡徴雖目分百尋之秋毫耳精八音之清濁文則琳琅墮於筆端武則鈎鉻切居額摧於指掌心苞萬篇之誦口播濤波之辯猶無補於土崩不救乎瓦解也何者不居其大而務其細滯乎下人之業而闇元本之端也誠能事過乎儉臨深履氷居安不忘乘奔之戒處存不廢慮亡之懼操綱領以整毛目握道數以御衆才韓白畢力以折衝蕭曹竭能以經國介一人之心致其果毅謀夫恊思進其長筭則人主雖從容玉房之内逍遥雲閣之端羽爵腐於甘醪樂人疲於拚儛猶可以垂拱而任賢高枕以責成何必居茅茨之狹陋食薄味之大躬監門之勞役懐損命之辛勤然後可以惠流蒼生道洽海外哉昏惑之君則不然焉其為政也或仁而不斷朱紫混漫正者不賞邪者不罰或苛猛慘酷或純威無厚刑過乎重不恕不逮根露基頽危猶巢幕而自比於天日擬固於泰山謂克明俊徳者不難及小心翼翼者未足筭也於是無罪無辜滛刑以逞民不見徳唯戮是聞官人則以順志者爲賢擢才則以近習者爲前上宰列委之毋后之族專斷顧問决之阿謟之徒所揚引則逺九族外親而不簡其器幹所信仗則在於才曲媚而憎乎方直所抑退則從雷同而不察之以情所寵進則任羙談而不考其績用掌要治民之官御戎專征之將或貪汚以壊所在矣或營私以亂朝廷矣或懦弱以敗庻事矣或恇怯以失軍利矣終於不覺不忍黜斥猶加親委冀其晚効器小任大遂及於禍良才逺量無援之士或披褐而朝或沈淪於窮否懐道括嚢展力莫由陵替之災所以多有也又經典規戒弗聞不覽玩弄褻宴是耽是務髙樓觀而下道徳廣苑囿而狹招納深池沼而淺恩信恱狗馬而惡謇諤貴珠玉而賤智略豐綺紈而約惠澤緩振濟而急聚歛勤畋弋而忽稼穡重兼并而輕民命進優倡而退儒雅厚嬖幸而薄戰士流聲色而忘庻事先酣遊而後聴斷數苦役而踈犒賜工造費好不急之器圏聚食肉靡穀之物然則危亡不可以怨天㣲弱不可以尤人也夫吉凶由己湯武豈一哉昔周文掩未埋之骨而天下稱其仁殷紂剖比干之心而四海疾其虐望在具瞻毁譽尤得失之舉不在多也凡譽重則蠻貊歸懷而不可以虚索也毁積即華夏離心而不可以言救也是以小善雖無大益而不可不為細惡雖無近禍而不可不去也若乃肆情縱欲而不與天下共其樂故有憂莫之恤也削基増峻而不覺下墮則上崩故傾頽莫之扶也於是轡䇿去於我手神物假而不還力勤財匱民不堪命衆怨於下天怒於上田成盜全齊於帷幄姬昌取有二於西鄰陳呉之徒奮劔而大呼劉項之倫揮戈而飊駭雲梯乘於百雉之上皓刄交於象魏之下飛鋒内荐禁兵外瀆而乃憂悲以思邈世之大賢擁篲以延巖棲之智士慕伊吕於嵩岫招孫呉於草萊拜昌言而無所思嘉筭而莫問猶大厦既燔而運水於滄海洪潦凌室而造於長洲矣夫巍巍之稱不可驕吝搆而東嶽之封未易以恣欲修也上聖兼䇿載馳猶懼不逮前而庸主緩步按轡而自以爲過之或於安而思危或在嶮而自逸或功成治定而匪怠匪荒或綴旒累卵而不覺不寤不有辛癸之沒溺曷用貴欽明之高濟哉念兹在兹庶乎庶乎抱朴子外篇卷五終抱朴子外篇卷六晋丹陽葛洪稚川著臣節抱朴子曰昔在唐虞稽古欽明猶俟群后之翼亮用臻巍巍之成功故能熙帝之載庶績其凝四門穆穆百揆時序蠻夷無猾夏之變阿閣有鳴鳯之巢也喻之元首方之股肱雖有尊卑之殊邈實若一體之相頼也君必度能而授者備乎覆餗之敗臣必量才而受者故無流放之禍夫如影如響俯伏惟命者偷容之尸素也違令犯顔蹇蹇匪躬安上之民翰也先意承指者侫諂之徒也匡過弼違者社稷之骾也必將伏斧鑕而正諌據鑊而盡言忠而見疑諍而不得者待放可也必死無補將増主過者去之可也其動也匪訓典弗據焉其靜也匪憲章弗循焉請託無所容申繩不顧私明刑而不濫乎所恨審賞而不加乎附已不專命以招權不含洿而談㓗進思盡言以攻謬退念推賢而不蔽夙興夜慼庶事之不康也儉躬約志若䇿奔於薄氷也約謀貢士不宣之於口非義之利不棲之乎心立朝則以砥矢爲操居己則以羔羊為節當危值難則忘家而不顧命擥衡執銓則平懐而無彼此儀蕭公之宇宙羨張陳之畫竒追周全之盡規准二鮑之直視蹈嬰弘之節儉執恬毅之守終甘此離絶炙身之分戒彼韓英失忠之禍出不辭勞入不數功歸勲引過讓以先下專誠祗慄恒若天威之在顔也宵夙䖍竦有如湯鑊之在側也負荷寄託則以伊周為師表宣力四方則以吉召為軌儀送徃事君則竭忠貞而不㢠摶噬干紀則若鷹鸇之鳥雀蕃扞壃場則慕魏絳李牧之高蹤蒞衆撫民則希文翁信臣之徳化夫忠至者無以為國況懷智以迷上乎義督者滅祀而無憚況黜辱之敢辭乎故能保勞貴以顯親託良哉於輿歌昆吾彛器能者鐫勲臯陶后稷亦何人哉抱朴子曰人臣勲不弘則耻俸禄之虚厚也績不茂則羞爵命之妄高也履信思順天人攸賛畏盈居謙乃終有慶舉足則蹈道度抗手則奉繩墨褒崇雖淹留而悔辱亦必逺矣若夫損上以附下廢公以營私阿媚曲從以水濟水君舉雖謬而諂笑賛善數進玩好陷主於惡巧言毁政令色取悦上蔽人主之明下杜進賢之路外結出境之交内樹背公之黨雖才足非言足文過專威若趙高擅朝如董卓未有不身膏剡鋒家靡湯火者也然而愚瞽舍正即邪違真侣偽親覽傾僨不改其軌無禍之集匪降自天也抱朴子曰臣喻股肱則手足也履氷執不得辭焉是以古人方之於地掘之則出水泉樹之則秀百穀生者立焉死者入焉功多而不望賞勞瘁而不敢怨審識斯術保己之要也抱朴子曰臣職分則治統廣則多滯非賁獲之壯不可以舉兼人之重非萬夫之特不可總異官之局韓侯所以罪侵胃之典子元所以懼不勝之禍也若乃才力絶倫文武兼允人有腹心之高筭出有折衝之逺畧雖事殷而益舉兩循而俱濟舎之則彛倫斁委之而無其人者兼之可也非此器也宜自忖引轅若載重尠不及矣常人貪榮不慮後患身既傾溺而禍逮君親不亦哀哉人皆辭斧斤所未開而莫讓攝官抱朴子外篇卷六終抱朴子外篇卷七晋丹陽洪稚川著良䂓抱朴子曰翔集而不擇木者必有離罻之禽矣出身而不料時者必有危辱之士矣時之得也則飄乎猶應龍之覽景雲時之失也則蕩然若巨魚之枯崇陸是以智者藏其器以有待也其身而有為也若乃高巖將霣非細縷所綴龍門沸騰非掬壤所遏則不茍且於乾没不投險於僥倖矣抱朴子曰周公之攝王位伊尹之黜太甲霍光之廢昌邑孫琳之退少帝謂之舎道用權以安社稷然周公之放逐狼跋流言載路伊尹終於受戮大霧三日霍光幾於及身家亦尋滅孫琳桑䕃未移首足異所皆笑音未絶而號咷已及矣夫危而不持安用彼相爭臣七人無道可救致令王莽之徒生其姦變外引舊事以非内包豺狼之禍心由於伊霍基斯亂也將來君子冝深鑒茲矣夫廢立之事小順大逆不可長也召王之譎已見貶抑況乃退主惡其可乎此等皆計行事成徐乃受殃者耳若夫隂謀始權而貪人賣之赤族殄祀而他家封者亦不少矣若有姦侫翼成驕亂若桀之干辛推哆張口也尺氏切紂之崇侯惡來厲之黨也改置忠良不亦易乎除君側之衆惡流凶族於四裔擁兵持壃直道守法嚴操柯斧正色拱繩明賞必罰有犯無赦官賢任能唯忠是與事無專擅請而後行君有違謬據理正諌戰戰兢兢不忘恭敬使社稷永安於上已身無患於下功成不處乞骸告退高選忠能進以自代不亦綽有餘乎何必奪至尊之璽紱危所奉之見主哉夫君天也父也君而可廢則天亦可改父亦可易也功蓋世者不賞威震主者身危此徒戰勝攻取勛勞無二者且猶鳥盡而弓棄兎訖而犬烹況乎廢退其君而欲後主之愛已是奚異夫爲人子而舉其所生捐之山谷而取他人養之而云我能為伯瑜曾參之孝但吾親不中奉事故棄去人雖日享三牲昏定晨省豈能見憐信邪霍光之徒雖當時増班進爵賞賜無量皆以計見崇豈斯人之誠心哉夫納棄妻而論前壻之惡買僕虜而毁故主之暴凡人庸夫猶不平之何者重傷其自然情也故樂羊以安忍見踈而秦西以過厚見親而世人誠謂湯武爲是而伊霍為賢此乃相勸為逆者也又見廢之君未必悉非也或輔翼少主作威作福罪大惡積慮於為後患及尚持勢因而易之以延近局之禍規定䇿之功計在自利未必為國也取威既重殺生決口見廢之主神噐去矣下流之罪莫不歸焉雖知其然孰敢形言無東牟朱虚以致其計無南史董狐以證其罪將來今日誰又理之獨見者乃能追覺桀紂之惡不若是其惡湯武之事不若是其羙也方䇿所載莫不尊君卑臣强幹弱枝春秋之義天不可讎大聖著經資父事君民生在三奉之如一而許廢立之事開不道之端下凌上替難以訓矣俗儒沈淪鮑肆困於詭辯方論湯武為食馬肝以彈斯事者為不知權之爲變貴於起善而不犯順不謂反理而叛義正也而前代立言者不折之以大道使有此情者加夫立剡鋒之端登方崩之山非所以延年長世逺危之術雖䇿命暫隆弘賞暴集無異乎犧牛之被紋繡淵魚之愛莽麥渇者之恣口於雲日之酒飢人之取飽於鬱肉漏脯也而屬筆者皆共褒之以為美談以不容誅之罪為知變使人於悒而永慨者也或諫余以此言為傷聖人必見譏貶余答曰舜禹歴試内外然後受終文祖雖有好傷聖人者豈能傷哉昔嚴延年廷奏霍光為不道于時上下肅然無以折也況吾為世之誡無所指斥何慮乎常言哉抱朴子外篇卷七終抱朴子外篇卷八晋丹陽洪稚川著時難抱朴子曰盡節無者可為也若夫使言必納而身必安者須時時之否也夫姦凶之徒妬所不逮擁上抑下惡直醜正憂畏公方之彈擊邪枉是以務除勝已以紓其誅明主不世而出庸君迷於皂白既不能受用忠益或乃宣泄至言於是弘恭石顯之徒巧辭以搆象似假至公以售私姦今獻長生之術者反獲立死之罪進安上之計者旋受危身之禍故曰非言之難也談之時難也夫以賢説聖猶未必即受故伊尹干湯至于七十也以智告愚則必不入故文王諫紂終於不納也言不見信之猶可也若乃李斯之誅韓非龎涓之刖孫臏上官之毁屈平盎之中晁錯不可勝載也為臣不易豈一塗也哉蓋徃而不反者所以功在身後而藏器俟時者所以百無一遇高勲之臣曠代而一有䧟氷之徒委積乎史䇿悲夫時之難遇也如此其甚哉由茲以言吾知渭濱吕之儔巖間傅之屬懷其王佐之器抱其邈世之材秉竿擁築老死於庸兒之伍而遂不遭文王高宗者必不訾矣抱朴子外篇卷之八終抱朴子外篇卷之九晋丹陽洪稚川著官理抱朴子曰騄駬之騁逸迹由造父之御也禹稷之序百揆遭唐虞之主也故能不勞而千里至揖譲而頌聲作若乃臧獲之乘驌騻殷辛之臨三仁欲長驅輕騖則轡急轅逼欲盡規竭忠則禍如發機所以車傾於險塗國覆而不振也故良駿敗於拙御智士躓於闇世仲尼不能止魯侯之出晏嬰不能遏崔杼之亂其才則是主則非也夫君猶器也臣猶物也器小物大不能相受矣髫孺背千金而逐蛺蜨越人棄八珎而甘鼃黽即患不賞好又病不識惡矣夫不用則雖珎而不貴矣莫與則傷之者必至昔衛靈聴聖言而數驚秦孝聞高談而睡而欲緝隆平之化牧良能之勲猶却行以逐馳適楚而首燕也抱朴子外篇卷九終抱朴子外篇卷十晋丹陽洪稚川著務正抱朴子曰南溟引朝宗以成不測之深玄圃崇木石以致極天之峻大厦凌霄頼群橑之積輪曲轅直無可闕之物故元凱之佐登而格天之化洽折衝之才周則逐鹿之姦寢舜禹所以有天下而不與衛靈所以雖驕恣而不危也衆力并則萬鈞不足舉也群智用則庶績不足康也故繁足者死而不多士者亂而不亡然劔㦸不長於縫緝錐鑚不可以擊斷牛馬不能吠守雞犬不任駕乘役其所長則事無廢功避其所短則世無棄材矣抱朴子外篇卷十終抱朴子外篇卷十一晋丹陽洪稚川著貴賢抱朴子曰舎輕艘而渉無涯者不見其必濟也無良輔而羨隆平者未聞其有成也鴻鸞之凌虚者六翮之力也淵虬之天飛者雲霧之偕也故招賢用才者人主之要務也立功立事者髦俊之所思也若乃樂治定而忽智士者何異欲致逺塗而棄騏騄哉夫拔丘園之否滯舉遺漏之幽人職盡其才禄稱其功者君所以待賢者也勤夙夜之在公竭心力於百揆進善退惡知無不為者臣所以報知己也世有逸之民而無獨立之主者士可以嘉遁而無憂君不可以無臣而致治是以傅説吕尚不汲汲於聞達者道徳備則輕王公也而殷高周文乃夢想乎得賢者建洪勛必湏良佐也患於生乎深宫之中長乎婦人之手不識稼穡之艱難不知憂懼之何理承家繼體蔽于崇替所急在乎侈靡至務在乎游宴般于畋獵湎于酣樂聞滛聲則驚聴見艶色則改視役聰用明止此二事鑒澄人物不以經神唯識玩弄可以恱心志不知竒士可以安社稷犀象珠玉無足而至自萬里之外定傾之器能行而淪乎四境之内二竪之疾既據而募良醫棟橈之禍已集而思謀夫何異乎火起乃穿井覺飢而占田哉夫庸猶不可以不拊循而卒盡其力安可以無素而暴得其用哉抱朴子外篇卷十一終抱朴子外篇卷十二晋丹陽洪稚川著任能或曰尾大於身者不可掉臣賢於君者不可任故口不容而强吞之者必哽才非匹而委仗之者見輕抱朴子曰詭哉言乎昔者荆子總角而攝相事實賴二十五老臻乎惠康子賤起家而治大寔由勝已者多而招其弘益齊桓殺兄而立鳥獸其行被髮彛酒婦閭三百委政仲父遂為覇宗夷吾既終禍亂亟起魯用季子二十餘年内無粃政外無侵削人之亡沒殄瘁響集豈非才所不逺其功如彼自任其事其禍如此乎漢高決䇿於玄幃定勝乎千里則不如良平治兵多而益善所向無敵則不如信布兼而用之帝業克成故疾步累趨未若託乘乎逸足尋飛逐走未若假伎乎鷹犬夫勁弩難彀而可以摧堅逮逺大舟難乘而可以致重濟深猛將難御而可以折衝拓境高賢難臨而可以攸叙彛倫昔魯哀庸主也仲尼上聖不敢不盡其節齊景下才也而晏嬰大賢不敢不竭其誠豈有人臣當與其君校智力之多少計局量之優劣必須堯舜乃為之役哉何事非君何使非民耻令其君不及唐虞此亦達者之用心也抱朴子外篇卷十二終抱朴子外篇卷十三晋丹陽洪稚川著欽士抱朴子曰由余在戎而秦穆惟憂楚殺得臣而晉文乃喜樂毅出而燕壞種蠡入而越霸破國亡家失士者也豈徒有之者重無之者輕而已哉桞惠之墓猶挫元冦之銳況於坐之於朝廷乎干木之猶退踐境之攻況於置之於端右乎郅都之象使勁虜振慴孔明之尸猶令大國寢鋒以此禦侮則地必不侵矣以此率師則主必不辱矣是以明主旅束帛於窮巷揚滯羽於瘁林飛翹車於河梁闢四門而不倦不吝金璧不逺千里不憚屈已不耻卑辭而以致賢為首務得士為重寳舉之者受上賞蔽之者為竊位故公旦執贄於白屋秦卲拜昌於張生鄒子涉境而燕君擁篲莊周未食而趙惠竦立晉文接亥唐脚痺而坐不敢正齊侫之造稷丘雖頻繁而不辭其勞楚王受笞於保申簡去甲於公廬彼雖降高抑滿以貴下賤終亦并目以逺其明假耳以廣其聦龍騰虎據宜其然也抱朴子外篇卷十三終抱朴子外篇卷十四晋丹陽洪稚川著用刑抱朴子曰莫不貴仁而無能純仁以致治也莫不賤刑而無能廢刑以整民也咸云明后御世風向草偃道洽化醇安所用刑余乃論之曰夫徳教者黼黻之祭服也刑罰者捍刃之甲胄也若徳教治狡暴猶以黼黻御剡鋒也以刑罰施平世是以甲胄升廟堂也故仁者養物之器刑者懲非之具我欲利之而彼欲害之加仁無悛非刑不止刑為仁佐於是可知也譬存玄胎息呼吸吐納含景内視熊經鳥伸者長生之術也然艱而且遲為者尠成能得之者萬一焉病篤痛甚身困命危則不得不攻之以鍼石治之以毒烈若廢和鵲之方而慕松喬之道則死者衆矣仁之為政非為不美也然黎庶巧偽趨利忘義若不齊之以威紏之以刑逺羨羲農之風則亂不可振其禍深大以殺止殺豈樂之哉八卦之作窮理盡性明罰用獄著於噬嗑繫以徽纆存乎習坎然用刑其来尚矣逮於軒轅聖徳尤高而躬親征伐至于百戰殭尸涿鹿流血阪泉猶不能使時無叛逆載戢干戈亦安能使百姓皆良民不犯罪而不治者未之有也唐虞之盛象天用刑竄殛放流天下乃服漢文玄黙比隆成康猶斷四百鞭死者多夫匠石不舎䋲墨故無不直之木明主不廢戮罰故無陵遲之政也蓋天地之道不能純仁故青陽闡陶育之和素秋厲肅殺之威融風扇則枯瘁攄藻白露凝則繁英彫零是以品物阜焉嵗功成焉温而無寒則蝡動不蟄根植冬榮寛而無嚴則姦宄並作利器長守故明賞以存正必罰以閑邪勸沮之器莫此之要民設教濟其寛猛使懦不可狎剛不傷恩五刑之罪至于三千是䋲不可曲也司冦行刑君為不舉是法不可廢也䋲曲則姦囬萌矣法廢則禍亂滋矣亡國非無令也患於令煩而不行敗軍非無禁也患於禁設而不止故衆慝彌蔓而下黷其上夫賞貴當功而不必重罰貴得罪而不必酷也鞭朴廢於家則僮僕怠情征伐息於國群下不䖍愛待敬而不敗故制禮以崇之徳湏威而久立故作刑以肅之班倕不委䂓矩故方圓不戾於物明君不釋法度故機詐不肆其巧唐虞其仁如天而不原四罪姬公友于兄弟而不赦二叔仲尼之誅正卯漢武之殺外甥垂淚惜法蓋不獲已也故誅一以振萬損少以成多方之櫛髪則所利者衆比於割疽則所全者大是以炙刺痛而不可止者以痊病也刑法凶醜而不可罷者以救弊也六軍如林未必皆勇排鋒陷火人情所憚然恬顔以勸之則投命者尠斷斬以威之則莫不奮擊故役歡笑者不及叱咤之速用誘悦者未若刑戮之齊是以安于感深谷而嚴其法衛子疾弃灰而峻其辟夫以其所畏禁其所翫峻而不犯全民之術也明病之術者杜未生之疾達治亂之要者遏將來之患若乃以輕刑禁重罪以薄法衛厚利陳之滋章而犯者彌多有似穿穽以當路非仁人之用懷也善為政者必先端此以率彼治親以整踈不曲法以行意必有罪而無赦若石碏之割愛以威親晉文之忍情以斬頡故仁者為政之脂粉刑者御世之轡䇿脂粉非體中之至急而轡䇿湏臾不可無也肅恭少怠則慢惰已至威嚴暫弛則群邪生心當怒不怒姦臣為虎當殺不殺大賊乃發水久壞河山起咫尺尋木千丈始于毫末鑚燧之火勺水所滅鵠卵未孚指掌之所靡及其乘衝飈而燎巨野奮六羽以淩朝霞則雖智勇不能制也故明君治難於其易去惡於其㣲不伐善以長亂不操柯而猶豫焉然則刑之為物國之神器君所自執不可假人猶長劔不可倒捉巨魚不可脫淵也乃崇替之所由安危之源本也田常之奪齊六卿之分晉趙高之弑秦王莽之漢履霜逮氷由來漸矣或永歎於海濱或拊心乎望夷禍延宗祧作戒將來者由乎慕虚名於徃古忘實禍於當已也或人曰刑辟之興蓋存叔世立人之道唯仁與義我清静而民自正我無欲而民自樸烹鮮之戒不欲其煩寛以愛人則得衆恱以使人則下附故孟子以體仁為安楊子雲謂申韓為屠宰夫繁策急轡非造父之御嚴刑峻罰非三五之道故有虞手不指揮口不煩言恭已南靣而治化雍熈矣宓生政以率俗彈琴詠詩身不下堂而漁者霄肅矣必能厚惠薄歛救乏擢滯舉賢任才勸穯省用招以禮懷逺以徳陶之以成均治之以庠序化上而興善者必若靡草之逐驚風洗心而革靣者必若清波之滌輕塵朝有徳讓之群后野無犯禮之軌躅圜土可以虚蕪楚革可以永格何必賞罰可以為國乎抱朴子答曰易稱明罰敕法書有哀矜折獄爵人於朝刑人於市有自來矣豈從叔世多仁則法不立威寡則下侵上夫法不立則庶事汩矣下侵上則逆節萌矣至醇既澆於三代大樸又散於秦漢道衰於疇昔俗薄乎當今而欲結繩以整姦欺不言以化狡猾委轡䇿而乘奔馬於險塗舎柁櫓而汎舟以淩波盤旋以逐走盜揖譲以救災火斬晁錯以却七國舞于戈以平赤眉未見其可也蓋三皇步而五帝驟霸王以來載馳載騖當其弊也吏欺民巧冦盜公行髠鉗不足以懲無耻族誅不能禁覬覦重目以廣視累耳以逺聴抗燭以理滯事焦心以息姧源而猶市朝有呼嗟之音邉鄙有不聞之枉作威作福者或發乎瞻視之下凶家害國者或搆乎蕭墻之内而欲以太昊之道治偷薄之俗以畫一之歌救湧之亂非識因革之隨時明損益之變通也所謂刻舟以摸遺劔叅天而射五步摜犀兕之甲以涉不測之淵衿却寒之裘以禦鬱隆之暑踵之解結頤之搔背其為憤憤莫此之劇矣但當先令而後誅得情而勿喜使伯氏無怨於失邑虞芮知耻而無訟耳若强暴掩容操繩而不憚誘於含垢草蔓而不除恃藏疾之大言忘膏肓之近急何異焦喉之渇切身而遥指滄海於萬里之外滔天之水已及而方造舟於長洲之林安得免夸父之禍脫淪水之害哉世人薄申韓之實事嘉老莊之誕談然而為政莫能錯刑殺人者原其死傷人者赦其罪所謂土柈瓦胾無救朝飢者也道家之言髙則髙矣用之則弊遼落迂闊譬猶干將不可以縫線巨象不可使捕鼠金舟不能凌陽侯之波玉馬不任騁千里之迹也若行其言則當燔桎梏隳囹圄罷有司滅刑書鑄干戈平城池散府庫毁符節撤梁掊衡量離朱之目塞子野之耳汎然不繫反乎天牧不訓不營相忘江湖朝廷閴爾若無人民則至死不徃來可得而論難得而行也俗儒徒聞周以仁興秦以嚴亡而未覺周所以得之不純仁而秦所以失之不獨嚴也昔周用肉刑刖足劓鼻盟津之令後至者斬畢力賞罰誓有孥戮考其所為未盡仁也及其叔世罔法翫文人主苛虐號令不出宇宙禮樂征伐不復由已群下力競還為長蛇伐本塞源毁冠裂冕或沉之於漢或流之于彘失柄之敗由於不嚴也秦之初興官人得才衛鞅由余之徒式法於内白起王翦之倫攻取於外兼弱攻昧取威定霸吞噬四隣咀嚼群雄拓地攘戎龍變虎視實頼明賞必罰以基帝業降及杪季驕於得意窮奢極泰加之以威虐築城萬里離宫千餘鍾鼔女樂不徙而具驪山之役太半之賦閭左之戍坑儒之酷北擊獫切虚檢狁南征百越暴兵百萬動數十年天下有生離之哀家户懷怨曠之歎白骨成山虚祭布野徐福出而重號咷之讎趙高入而屯豺狼之黨天下欲反十室九空其所以亡豈由嚴刑此為秦以嚴得之非以嚴失之也且刑由刄也巧人以自成拙者以自傷為治國有道而助之以刑者能令慝偽不作凶邪改志若綱絶網紊得罪于天用刑失理其危必速亦猶水火者所以活人亦所以殺人存乎能用之與不能用夫癥瘕不除而不脩越人之術者難圖老彭之夀也姦黨實繁而不嚴彈違之制者未見其長世之福也但當簡于張之徒任以法理世選趙陳之屬委以案劾明主留神於上忠良盡誠於下見不善則若鷹鸇之搏鳥雀覩亂萌則若薙切他計田之芟蕪薉切於吠慶賞不謬加而誅戮不失罪則太平之軌不足迪令而不犯可庶幾廢刑致治未敢謂然也或曰然則刑罰果所以助教興善式遏軌忒也若夫古之肉刑亦可復與抱朴子曰曷為而不可哉昔周用肉刑積祀七百漢氏廢之年代不如至於改以鞭笞大多死者外有輕刑之名内有殺人之實也及於犯罪上不足以至死則其下唯有徒謫鞭杖或遇赦令則身無損且髠其更生之髮撾作方愈之創殊不足以懲次死之罪今除肉刑則死罪之下無復中刑在其間而次死罪不得不止於徒謫鞭杖是輕重不得不適也又犯罪者希而時有耳至於殺之則恨重而鞭之則恨輕犯此者為多今不用肉刑是次死之罪常不見治也今若自非謀反大逆惡于君親及用軍臨敵犯軍法者及手殺人者以肉刑代其死則亦足以懲示凶人而刑者猶任坐役能有所為又不絶其生之道而終身殘毁百姓見之莫不寒心亦足使未犯者肅慄以彰示將來乃過於殺人殺人非不重也然辜之三日行埋弃之不知者衆不見者多也若夫肉刑者之為摽戒也多昔魏世數議此事諸碩儒達學洽通殷理者咸謂宜復肉刑而意異者駮之皆不合也魏武帝亦以爲然直以二陲未賔逺人不能統至理者卒聞中國刖人肢體割人耳鼻便當望風謂爲酷虐故且停以湏四方之并耳通人楊子雲亦以爲肉刑冝復也但廢之來久矣坐而論道者未以爲急耳抱朴子外篇卷十四終抱朴子外篇卷十五晋丹陽洪稚川著審舉抱朴子曰華霍所以能崇極天之峻者由乎其下之厚也唐虞所以能臻巍巍之功者實頼股肱之良也雖有孫陽之手而無騏之足則不得致千里矣雖有稽古之才而無宣力之佐則莫縁凝庻績矣人君雖明並日月神鑒未兆然萬機不可以獨統曲碎不可以親總必徦目以遐覽借耳以廣聽誠湏有司是康是賛故聖莫不根心招賢以舉才為首務施玉帛於丘園馳翹車於巖藪勞於求人逸於用能上自槐棘降逮皂論道經國莫不任職恭已無為而治平刑措而化洽無外萬咸寧設官分職其猶構室一物不堪則崩橈之由也然未貢舉之士格以四科三事九列是之自出必簡摽頴拔萃之俊而漢之末葉桓靈之世柄去帝室政在姦臣網漏防潰風頽教沮抑清徳而揚諂媚退履道而進多財力競成俗茍得無耻或輸自售之寳要人之書或父兄貴顯望門而辟命低眉膝以積習而見夫銓衡不平則輕重錯謬斗斛不正則少多混亂繩墨不陳曲直不分準格傾側則滓雜實繁以之治人則虐暴而豺貪受取聚歛以補買官之費立之朝廷則亂劇於棼絲引用駑庸以為黨援而望風向草偃庶事之康何異懸瓦礫而責夜光絃不調而索清音哉何可不澄濁飛沈沙汰臧否嚴試對之法峻貪夫之防哉殄瘁攸階可勿畏乎古者諸侯貢士適者謂之有功有功者增班進爵貢士不適謂之有過有過者黜位削地猶復不能令詩人謐大車素餐之刺山林無伐檀罝兎之賢況舉之無非才之罪受之無負乘之患衡量一失其格多少安可復損乎夫孤立之翹秀藏器以待賈碌之輕薄人事以邀速夫唯待價故頓淪於窮瘁矣夫唯邀速故佻而騰躍矣蓋梟鴟屯飛則鴛幽集豺狼當路則麒麟遐遁舉善而教則不仁者逺矣姦偽榮顯則英傑潜逝高概耻與闒茸爲伍清節羞入饕餮之貫舉任並謬則群賢括嚢群賢括嚢則凶邪相引凶邪相引則小人道長小人道長則檮杌比肩頌聲所以不作怨嗟所以嗷嗷也高幹長材恃能勝己屈伸黙語聴天任命窮通得失委之自然亦焉得不墮多黨者之後而居有力者之下乎逸倫之士非禮不動山峙淵渟知之者希馳逐之徒蔽而毁之故思賢之君終不知竒才之所在懐道之人願効力而莫從雖抱稷卨之器資邈世之量遂沈滯詣死不得登叙也而有黨有力者紛然鱗萃人乏官曠致者又美亦安得不拾掇而用之乎靈獻之世閹官用事群姦秉權危害忠良臺閣失選用於上州郡輕貢舉於下夫選用失於上則牧守非其人矣貢舉輕於下則秀孝不得賢矣故時人語曰舉秀才不知書察孝㢘父别居寒素清白濁如泥高第良將怯如雞又云古人欲達勤誦經今世圖官免治生蓋疾之甚也于時懸爵而賣之猶列肆也爭津者買之猶市人也有直者無分而徑進空拳者望途而迹其貨多者其官貴其財少者其職卑故東園積賣官之錢崔烈有銅臭之上為下俲君行臣甚故阿侫幸獨談親容桑梓議主中正吏部並為魁儈各責其估清貧之士何理有望哉是既然矣又邪正不同譬猶氷炭惡直之人憎於非黨刀尺顛倒者則恐人之議己也達不由道者則患言論之不美也乃共搆合虚誣中傷清徳瑕累横生莫敢救拔於是曾閔獲商臣之謗孔墨蒙盜跖之垢懷正居貞者填笮乎泥濘之中而狡猾巧偽者軒翥乎虹霓之際矣而凡夫淺識不辨邪正謂守道者為陸沈以履徑者為知變俗之隨風而動逐波而流者安能復身於徳行若思於學問哉是莫不弃檢括之勞而赴用賂之速矣斯誠有漢之所以傾來代之所宜深鑒也或曰吾子論漢末貢舉之事誠得其病也今必欲戒既徃之失避傾車之路改有代之絃調防法翫之或變令濮上巴人反安樂之正音腠理之疾無退走之滯患者豈有方乎士有風姿豐偉雅望有餘而懐空抱虚幹植不足以貌取之則不必得賢徐徐先試則不可倉卒將如之何抱朴子答曰知人則哲上聖所難今使牧守皆能審良才於未用保性履之始終誠未易也但共遣其私情竭其聰明不為利慾動不為屬託屈所欲舉者必澄思以察之慱訪以詳之脩其名而考其行校同異以備虚令親族稱其孝友閭歸其信義嘗小仕者有忠清之効治事之幹則寸錦足以知巧刺鼠足以觀勇也又秀孝皆宜如舊試經答策防其罪對之姦當令必絶其不中者勿署吏加罰禁錮其所舉書不中者刺史太守免官不中左遷中者多不中者少後轉不得過故若受賕切巨流而舉所不當發覺有驗者除名禁錮終身不以赦令原所舉舉者與同罪今試用此法治一二嵗之間秀孝必多不行者亦足以知天下貢舉不精之久矣過此則必多修徳而勤學者矣又諸居職其犯公坐者以法律從事其以貪濁汚為罪不足至死者刑竟及遇赦皆宜禁錮終身輕者二十年如此不亷之吏必將化為夷齊矣若乃臨官受取金錢山積發覺則自恤得了免退則旬日復用者曽史亦將變為盜跖矣如此則雖貢士皆中不辭於官長之不良或曰能言不必能行今試經對䇿雖過豈必有政事之才乎抱朴子答曰古者猶以射擇人況經術乎如其舎旃則未見餘法之賢乎此也夫豐草不秀塉土巨魚不生小水格言不吐庸人之口髙文不墮頑夫之筆故披洪範而知箕子有經世之噐覽九術而見范生懐治國之略省夷吾之書而明其有撥亂之幹視不害之文而見其精霸王之道也今孝㢘必試經無脱謬而秀才必對䇿無失指則亦不得闇蔽也良將髙第取其膽武猶復試之以䇿況文士乎假令不能必盡得賢能要必愈於了不試也今且令天下諸當在貢舉之流者莫敢不勤學但此一條其為長益風教亦不細矣若使海内畏妄舉之失凡人息僥倖之求背競逐之末歸學問之本儒道將大興而私貨必漸絶竒才可得而役庶官可以不曠矣或曰先生欲急貢舉之法但禁錮之罪竒而且重懼者甚衆夫急轡繁䇿伯樂所不爲宻防峻法徳政之所耻抱朴子曰夫骨填肉補之藥長於養體益夀而不可以救暍溺之急也務寛含垢之政可以蒞敦御朴而不中以拯衰弊之變也虎狼見逼不揮戈奮劔而彈琴詠詩吾未見其身可保也燎火及室不奔走灌注而揖譲盤旋吾未見其焚之自息也今與知欲賣䇿者論此是與跖義捕盜也抱朴子曰今普天一統九垓同風王制政令誠宜齊一夫衡量小器猶不可使徃徃而有異況人士之格而可參差而無檢乎江表雖逺宻邇海隅然染道化率禮教亦既千餘載矣徃雖暫隔不盈百年而儒學之事亦不偏廢也惟以其土宇於中州故人士之數不得鈞其多少耳及其徳行才學之高者子游仲任之徒亦未謝上國也昔吳土初附其貢士見偃以不試今太平已近四十年矣猶復不試所以使東南儒業衰於在昔也此乃見同於左衽之非所以别之也且夫君子猶愛人以禮況為其愷悌之父母邪法有招患令有損化其此之謂也今貢士無復試者則必皆修馳逐以競虚名誰肯復開卷受書哉所謂饒之適足以敗之者也自有天性好古心恱藝文學不為禄味道忘貧若法高卿周生烈者學精而不仕狥乎榮利者萬之一耳至於寗越倪寛黄霸之徒所以强自篤厲於典籍者非天性也皆由患苦困瘁欲以經術自拔耳向使非漢武之世則朱買臣嚴助之屬亦未必讀書也今若取富貴之道幸有易於學者而復素無自然之好豈肯復空自勤苦執灑掃為諸生逺行尋師問道者乎兵興之世武貴文寢俗人視儒士如僕虜見經誥如芥壤者何哉由於聲名背乎此也夫不用譬猶售章甫於夷越狥髯蛇於華夏矣今若遐邇一例明考課試則必多負笈千里以尋師友轉其禮賂之費以買記籍者不俟終日矣抱朴子曰才學之士堪秀孝者已不可多得矣就令其人若如桓靈之世舉吏不先以財貨便安臺閣主者則雖諸經兼本解於問無不對猶見誣枉使不得過矣常追恨于時執事不重為之防余意謂新年當試貢舉者今年便可使儒官才士豫作諸䇿計足周用集上禁其留草殿中封閉之臨試之時亟賦之人事因縁於是絶當答䇿者皆可㑹著一處高選臺省之官親監察之又嚴禁其交闗出入畢事乃遣違犯有罪無赦如此屬託之冀窒矣夫明君恃已之不可欺不恃人之不欺己也亦何耻於峻為斯制乎若試經法立則天下可以不立學官而人自勤樂矣案四科亦有明解法令之狀今在職之人官無大小悉不知法令或有㣲言難曉而小吏多頑而使之決獄無以死生委之以輕百姓之命付無知之人也作官長不知法為下吏所欺而不知又決其口筆者憤憤不能知食法與不食不問不以付主者或以意斷事蹉跌不慎法令亦可令亷良之吏皆取明律令者試之如試經髙者隨才品叙用如此天下必少弄法之吏失理之獄矣抱朴子外篇卷十五終抱朴子外篇卷十六晋丹陽洪稚川著交際抱朴子曰余以朋友之交不宜雜浮面而不心揚雲攸譏故雖位顯名羙門齊年敵而趨舎異䂓業尚乖互者未嘗結焉或有矜其先達步髙視逺或遺忽陵遲之舊好或簡弃後門之味或取人以官而不論徳其不遭知己零淪丘園者雖才深智逺操清節髙者不可也其進趨偶合位顯官通者雖靣墻庸瑣必及也如此之徒雖能令壌蟲雲飛斥鷃戾天手捉刀尺口為禍福得之則排氷吐華失之則當春彫悴余代其踧蹐耻與共世窮之與達不能求也然而輕薄之人無分之子曽無疾非俄然之節星言宵征守其門庭翕然諂笑卑辭恱色提壺執贄時行索媚勤若積久猶見嫌拒乃行因託長者以搆合之其見受也則踊恱過於幽繫之遇赦其不合也則懊悴劇於喪病之逮己也通塞有命道貴正直否泰付之自然津塗何足多咨嗟乎細人豈不鄙哉人情不同一何逺邪毎為慨然助彼羞之昔莊周見惠子從車之多而弃其餘魚余感俗士不汲汲於攀及至也瞻彼云云馳騁風塵者不懋建徳業務本求已而偏徇髙交以結朋黨謂人理莫此之要當世莫此之急也以嶽峙獨立者為澁吝䟽拙以奴顔婢睞聲來去者為曉解當世風成俗習莫不逐末流遁遂徃可慨者也或有徳薄位髙器盈志溢聞財利則驚掉見竒士則坐睡繿縷杖䇿被褐負笈者雖文艶相雄學優融玄同之埃芥不加接引若夫程鄭王孫羅裒之徒乘肥衣輕懷金挾玉者雖筆不集札菽麥不辨為之倒屣吐食握髪余徒恨不在其位有斧無柯無以為國家流濁於四裔投負人於北波雖赫奕刀尺決乎勢力足以移山拔海吹呼能令泥象登雲造其門庭我則未暇也而多有下意怡顔匍匐膝進求交於若人以圖其益悲夫生民用心之不鈞何其遼邈之不肖也哉余所以同生聖世而抱困賤本後顧而不見者今皆追瞻而不及豈不有以乎然性茍不堪各從所好以此存亡予不能易也或又難曰時移世變古今别務行立乎已名成乎人金玉經於不測者託於輕舟也靈鳥萃於玄霄者扶揺之力也芳蘭之芬烈者清風之功也屈士起於丘園者知己之助也今先生所交必清澄其行業所厚必沙汰其心性孑然隻跱失弃名軰結讎一世招怨流俗豈合和光以籠物同塵之髙義乎若比智而交則白屋不降公旦之貴若鈞才而遊則尼父必無入室之客矣抱朴子曰吾聞詳交者不失人而泛結者多後悔故曩哲先擇而後交不先交而後擇也子之所論出人之計也吾之所守退士之志也子云玉浮鳥高皆有所因誠復别理一家之説也吾以為寧作不載之寳不飛之鵬不颺之蘭無黨之士亦損於夜光之質垂天之大含芳之卉不朽之蘭乎且夫名多其實位過其才處之者猶尠免於禍辱交之者何足以為榮福哉由茲論之則交彼而遇者雖得達不足貴芘之而悞者譬如䕃朽樹之笮也彼尚不能自止其顛蹷亦安能救我之碎首哉吾聞大丈夫之自得而外物者其於庸人也蓋逼迫不獲已而與之形接雖以千計猶蚤虱之積乎衣而贅疣之攅乎體也失之雖以萬數猶飛塵之去嵩岱鄧林之墮朽條耳豈以有之為益無之覺損乎且夫朋友也者必取乎直亮多聞拾遺斥謬生無謂言死無託辭終始一契寒暑不渝者然而此人良未易得而或黙語殊或憎愛異心或盛合衰離或見利忘信其處今也譬猶禽魚之結侣氷炭之同器欲其久合安可得哉夫父子天性好惡宜鈞而子政子駿平論異隔南山伯竒辯訟有無面别心殊其來尚矣總而混之不亦難哉世俗之人交不論志逐名趨勢來冷去見過不改視迷不救有利則獨專而不相分有害則茍免而不相恤或事便則先取而不譲值機㑹則賣彼以安此凡如是則有不如無也天下不為盡不中交也率於為益者寡而生累者衆知人之明上聖所難而欲力厲近才短於鑒物者務廣其交又欲使悉得可與經夷險而不易情歴危苦而相負荷者吾未見其可多得也雖搜琬琰於培塿之上索鸞鳯乎鷦鷯之巢未為難也吾亦豈敢謂藍田之陽丹穴之中為無此物哉亦直言其稀已矣夫操尚不同猶金沉羽浮也志好之乖次猶火升而水降也茍不可同雖造化之靈大塊之匠不可使同也何可强乎余飡稟訥駭加之以天挺篤嬾諸戯弄之事彈棊愽奕皆所惡見及飛輕走迅遊獵傲覽咸所不為殊不喜嘲䙝凡此數者皆時世所好莫不躭之而余悉闕焉故親交所以尤遼也加以挾直好吐忠藎藥石所集甘心者尠又欲勉之以學問諌之以馳競止其樗蒲節其沉湎此又常人所不能恱也毀方瓦合違情偶俗人之愛力其所不堪而欲好日新安可得哉知其如此而不辯改之可不謂之闇於當世拙於用大乎夫交而不卒合而又離則兩受不弘之名俱失克終之羙夫厚則親愛生焉薄則嫌隙結焉自然之理也可不詳擇乎為可臨觴拊背執手湏臾欲多其數而必其全吾所懼也或曰然則都可以無交乎抱朴子答曰何其然哉夫畏水者何必廢舟楫忌傷者何必弃斧斤交之為道其來尚矣天地不交則不泰上下不交即乖志夫不泰則二氣隔并矣志乖則天下無國矣然始之甚易終之寛難患乎所結非其人敗於爭小以忘大也易羙金蘭詩詠百朋雖有兄弟不如友生切思三益大聖所嘉門人所以增親惡言所以不至管仲所以免誅戮而立覇功子元所以去亭長而驅朱軒者交之力也單絃不能發韶夏之和音孑色不能成衮龍之瑋爗一味不能合伊之甘獨木不能致鄧林之荗玄圃極天蓋由衆石之積南溟浩瀁實湏群流之赴明鏡舉則傾冠見矣羲和照則曲影覺矣括脩則枉刺之疾消矣良友結則輔仁之道弘矣達者知其然也所企及則必簡乎勝己所降結必料乎同志其處也則講道進徳其出也則齊心比翼否則鈞魚釣之業泰則恊經世之務安則有以精義危則有以相恤耻令譚青專面地之篤不使王貢擅彈冠之羙夫然故交道可貴也然實未易知勢利生去就毁壊刎頸之契漸漬釋膠漆之堅於是有忘素情之綢歎或睚切五懈眥責音而不思遂令元伯巨卿之好獨著於昔張耳陳餘之變屢搆於今推徃尋來良可歎也夫梧禽不與鴟梟同枝麟虞不與豺狼連群清源不與濁潦混流仁明不與凶闇同處何者漸染積而移直道暴迫則生害也或人曰敢問全交之道可得聞乎抱朴子答曰君子交絶猶無惡言豈肯向所異辭乎殺身猶以許友豈名位之足竸乎善交狎而不慢和而不同見彼有失則正色而諫之告我以過則速改而不憚不以忤彼心而不言不以逆我耳而不納不以巧辯其非不以華辭文其失不形同而神乖不匿情而口合不面從而背憎不疾人之勝己䕶其短而引其長隱其失而宣其得外無計數之諍内遺心竸之累夫然故鹿鳴之好全而伐木之刺息若乃輕合而不重離易厚而不難薄始如形影終為參辰至歡變為篤恨接援化成讎敵不詳之悔亦無以徃者漢季陵遲皇轡不振在公之義替紛竸之俗成以違時為清髙以救世為辱身尊卑禮壞大倫遂亂在位之人不務盡節委本趨末背實尋聲王事廢者其譽美姦過積者其功多莫不飛輪兼策星言假寐冐寒觸暑以走權門市虛華之名於秉勢之口買非分之位於賣官之家或爭所欲還相屠㓕於是公叔偉長疾其若彼力不能正不忍見之爾乃發憤著論杜門絶交斯誠感激有為而然蓋矯枉而過正非經常之永訓也徒當逺非之黨慎諂黷之源何必祼以詭彼已斷粒以刺玉食哉夫反之為非重諫而不止遂至大亂故禮義之所弃可以絶矣抱朴子外篇卷十六終抱朴子外篇卷十七晋丹陽葛洪稚川著備闕抱朴子曰騕褭駿馬也於皎切能奮蘭筋以絶景而不能履氷以乗深猛虎能似雷霆以噬而不能踊雲霧以凌虚鴻鶤不能振翅於籠卓之中輕鷂不能電擊於几筵之下物旣然矣人亦如之故能調和隂陽者未必能兼百行脩簡書也能敷五邁九者不必能全小㓗經曲碎也惠子上相之摽也而不能役舟檝以凌陽侯漢髙神武之傑也而不能治産業端檢栝淮隂良將之元也而不能修農商免飢寒周勃社稷之骾也而不能答錢穀責獄辭若以所短弃所長則逸儕㧞萃之才不用矣責大體而論細禮則匡世濟民之勲不著矣天不能平其西北地不能隆其東南日月不能摛光於曲穴衝風不能揚波於井底擿齒則松檟不及一寸之筳挑耳則棟梁不如鷦鷯之羽彈烏則千金不及丸泥之用縫緝則長劒不及數分之針何必伏巨象而捕䑕制大鵬以司晨乎故姜牙賣煦無所售而見師於文武蔣生憒慢於百里而獨步三槐抱朴子外篇卷十七終抱朴子外篇卷十八晋丹陽洪稚川著擢才抱朴子曰華章藻蔚非矇瞍所玩英逸之才非淺短所識夫瞻視不能接物則衮龍與素褐同價矣聰鑒不足相涉則俊民與庸夫一槩矣眼不見則美不入神焉莫之與則傷之者至焉且夫愛憎好惡古今不鈞時移俗易物同價異譬之夏后之璜曩直連城鬻之於今賤於銅鐡故昔以隱居求志為髙士今以山林之儒為不肖故聖世人之良幹乃闇俗之罪人也徃者之介㓗乃末葉之羸劣也偉之士履道之生其崇信匪徒重仞之牆其淵澤不唯吕梁之深也故短近不能賞而淺促不能測焉因以異乎己而薄之矣以不求我而疾之矣不貴不用何足言乎乃有播埃塵於白珪生瘡痏於玉肌訕疵雷同攻伐獨立曽參刼剽之垢巢許獲穿踰之謗自匪明並懸象鑒表微者焉能披泥抽淪玉澄川掇沉珠哉夫珪璋居肆而不售矧乃翳於槃璞乎竒士扣角而見遏况乃潜於臯藪乎孫臏思騁其秘略而司馬刖之韓非願建治績而李斯殺之賈誼慷慨懐經國之術而武夫排之子政忠良有匡危之具而恭顯陷之和氏所以抱璞而泣血禽息所以發憤而碎首也夫玉石易别於賢愚愛寶情篤於好士以易别之寶合篤好之物猶獲罪截趾歴世受誣况乎難知之賢非意所急䜛人畫蛇足於無形姦臣畏忠貞之害己體曲者忌䋲墨之容夜祼者憎明燭之來是以髙譽美行抑而不揚虛搆之謗先形生影又無楚人號哭之薦萬無一遇固其宜矣夫以王為石者亦將以石為玉矣以賢為愚者亦將以愚為賢矣以石為玉未有傷也以愚為賢者亡之診也蓋診亡者雖存而必亡猶脉死者雖生而必死也可勿慎乎於戯悲夫莫之思者也昔仲尼上聖也東受累於齊人南見塞於子西文種大賢也初不齒於荆俗末雍游於鈞如竸年立功不亦難乎夫結緑黎非陶猗不能市也千鈞之重非賁獲不能抱也白雪之非靈素不能徽也邁倫之才非明主不能用也然耀靈光夜之珍不為莫求而虧其質以苟且於賤賈洪鍾周鼎不為委淪而輕其禮取見舉於侏儒嶧陽雲和不為不御而息唱以競顯於淫哇冠羣之徳不以沉抑而履徑而剸節於流俗是以和璧變為滯貨柔木廢於勿用赤刀之鑛不得經歐冶之鑪元凱之疇終不值四門之闢也抱朴子外篇卷十八終抱朴子外篇卷十九晋丹陽洪稚川著任命抱朴子曰余之友人有居冷先生者恬愉静素形神相忘外不驚愚之容内不寄有為之心遊精墳誥樂以忘憂晝競羲和之末景夕照望舒之餘耀道靡逺而不䆒言無微而不研然車迹不軔切如震權右之國尺牘不經貴勢之庭是以名不出蓬户身不離畎畆於是翼亮大夫侯而難之曰余聞淵蟠起則雲赴道化霑則逸才奮故康衢有角歌之音爼發凌風之迹沽之則收不貲之賈踊之則超在天之舉耀逸景於暘谷播大明乎九垓勲廕當已聲揚罔極故尋仞之塗甚近而弗往者雖追風之脚不能到也楹棁之下至卑而不動者雖鴻鶤之翅未之及也况乎寢足於大之表歛羽於幽梧之枝安得效迅以尋景振輕乎蒼霄哉年期奄冉而不久託世飄迅而不再智者履霜則知堅氷之必至處始則悟生物之有終六龍促軌於大渾華顛倐忽而告暮古人所以映順流而頺歎眄過隙而興悲矣先生資命世之逸量含英偉以邈俗鋭翰汪濊以波涌六竒抑鬱而淵稸然不能凌扶揺以高竦揚清耀於九噐不陳於瑚簋之末體不免於負薪之勞猶奏和音於聾俗之地鬻章甫於被髪之域徒㤀寤於翰林鋭意以窮神崇琬琰於懷抱之内吐琳琅於毛墨之端躬困屢空之儉神勞堅髙之間譬若埋尺璧於重壤之下封文錦於沓匱之中終無交易之富孰賞堙翳之珍哉夫龍驥維縶則无以别乎蹇驢赤刀韜鋒則曷用異於鉛刃鱣鮪不居牛迹大鵬不滯蒿林願先生委龍蛇之穴升利見之塗釋户庭之獨㓗覽二鼠而逺寤越窮谷以登髙襲丹藻以改素競驚飈於清晨不盤旋以詣夜收名噐於崇髙嚮鍾之慶祚栢成一介之夫採薇何足多慕乎居泠先生應曰葢聞靈機㝠緬混茫昧禍福交錯乎倚伏之間興亡纒綿乎盁虚之㑹迅逝者不能脱逐身之景樂成者不能免理致之敗匠流末者未若挺冶元兆之中整已然者不逮原本乎朴之外是以覺尺蠖者甘屈以保伸識通塞者不慘悦於否泰且夫洪陶範物大象流形躁靜異尚翔沉舛情金寶其重羽矜其輕篤隘者執束於滓達妙者逍遥於清潢洿納行潦而潘噎渤澥吞百川而不盈鮋鰕踊悦於泥濘赤螭凌厲乎髙㝠嚼香餌者快嗜欲而赴死味虚淡者含天和而趨生識機神者瞻無兆而弗惑闇休咎者觸强弩而不驚各附攸好安肯改營吾聞五玉不能自剖於嵩岫騰蛇不能無霧而電征龍淵不能勿操而斷犀兕景鍾不能莫扣而揚洪聲金芝湏啇風而激耀倉庚俟烟煴而修鳴騏騄不苟馳以赴險君子不詭遇以毁名運屯則沉淪於勿用時行則髙竦乎天庭士以自衒為不髙女以自媒為不貞何必委洗耳之峻標效負爼之干榮哉夫其窮也則有虞婆娑而陶鈞尚父見逐於愚嫗范生來辱於溺簣苦怪切籠也式匿竒於耕牧及其達也則淮隂投竿而稱孤文種解屫而紆青傅説釋築而論道管子脱桎為上卿葢君子藏噐以有待也稸徳以有為也非其時不見也非其君不事也窮達任所值出處無所繫其靜也則為逸民之宗其動也則為元凱之表或運思於立言或銘勲乎國噐殊塗同歸其致一焉士能為可貴之行而不能使俗必貴之也能為可用之才而不能使世必用之也被褐茹草垂綸罝兎則心歡意得如將終身服冕乗軺兼朱重紫則若固有之常如布衣此至人之用懷也若席上之珍不積環堵之操不粹者予之過也知之者希名位不臻以玉為石謂鳯曰鷃者非余罪也夫汲汲於見知悒悒於否滯者常民之情也浩然而養氣淡爾而靡欲者無悶之志也時至道行噐大者不悦天地之間知命者不憂若乃狥萬金之貨以索百千之售多失骭聲干上毛我則未暇矣抱朴子外篇卷十九終抱朴子外篇卷二十晋丹陽洪稚川著名實門人問曰聞漢末之世靈獻之時品藻乖濫英逸窮滯饕餮得志名不凖實賈不本物以其通者為賢塞者為愚其故何哉抱朴子答曰夫雷霆輷磕而或不聞焉七曜經天而或不見焉豈唯形噐有聾瞽哉心神所蔽亦又如之是以聞格言而不識者非無耳也見英異而不知者非無目也由乎聰不經妙而明不逮竒也夫智大量逺者盤桓以山峙噐小志近者蓬飛而萍浮夫唯山峙故莫之能動焉夫唯萍浮故流而不滯焉方之貨也則緘連以待賈者唯至珍而難售鳴鼔以狥之者雖凡蔽而易盡比之材也則結根於嵩岱者雖竦葢千仞垂䕃萬畆而莫之知也挿株於塗要者雖鈎曲戾細而速朽而猶見用也故廟堂有枯楊之瑚簋窮谷多不伐之梓橡也是以竊華名者螻騰於雲霄失實賈者翠虬淪乎九泉於是斥鷃凌風以髙奮靈鳯卷翮以幽戢鉛鋒充太阿之寶犬羊佻獨行貌勑高切虎狼之資矣夫佞者鼓珍賂為勁羽則無高而不到矣乘朋黨為舟楫則無逺而不濟矣持之以夙興側立加之以先意承指其利口謏辭也似辦其道聴塗説也似學其心險貌柔也似仁其行汙言㓗也似亷其好説人短也似忠其不知忌諱也似直故多通焉且亦奉望我者欲我益之不求我者我不能愛自然之理也夫賢常少而愚常多多則比周而匿瑕少則孤弱而無援佞人相汲引而柴正路俊哲處下位而不見知㧞茅之義圯而負乘之羣興亢龍髙墜泣血漣如故子西逐大聖之仲尼臧倉毁命世之孟軻二生不免斯患降兹亦何足言斯禍蓋與開闢並生苦之匪唯一世也歴覽振古多同此疾至於駑蹇矯首於琱切多么輦駥驥委牧乎林埛彼已尸䘵國殄瘁下凌上替寔此之由或蟲流而莫歛或逆竄於申亥或擢筋於廟梁或絶命於望夷葢所㧞之非真而忠能之不用也故明君勤於招賢而汲汲於擢竒導達凝滯而嚴防壅蔽才誠足委不拘於屠釣言審可施抽之於戎戍或舉於牛口之下而加之於群僚之上或㧞於桎梏之中而任以社稷之重故能勲業隆濟拓境服逺取威定功垂統長世也夫直繩者枉木之所憎也清公者姦慝之所讎也人主不能運鑒以索隱而必湏當塗之所舉然每觀前代專權之徒率其所舉皆在乎附己者也所薦者先乎利己者也毁所畏而進所愛所畏則至公者也所愛則同私者也至公用則姦黨破衆立則主威奪矣姦黨破則升泰之所由也主威奪則危亡之端漸矣毁所畏則恐辭之不痛雖刖劓之猶未意焉故必除之而後快也彼進所愛則苦談之不美雖立超之猶未逞心焉故必危彼以安此也是故抱枉而死無愆而黜者有自來矣所以體道合真嶷然特立才逺量逸懷霜履氷思綿天地噐兼元凱執經衡門淵渟嶽立寜潔身以守滯耻脅肩以苟合樂飢陋巷以勵髙尚之節藏噐全真以待天年之盡非時不出非禮不動結褐嚼蔬而不悒悒也黄髪終否而不悢悢切力尚也安肯蹙太山之峻以適鑿柄之中歛垂天之羽為戒旦之役編於仕而抑鬱庸兒之下捨鸞鳯之林適枳棘之藪競腐䑕於踞鴟而枉尺以直尋哉且大賢之狀也至拙其為味也甚淡蕭然自足泊爾無知知之者稀而不慼時不能用而不悶雖并日無藜藿之糝不以易不義之太牢也雖緼無卒嵗之服不肯樂無道之狐白也獨可散髪髙枕守其所有已絶不曲躬低眉求其所未湏也徳薄位厚弗交也名與實違弗親也榮華馳逐弗務也豪狹姦權弗接也俗説細辯不答也脅肩所赴弗随也貌愚而志遠面垢而行潔乎若嵩岱銓衡所不能測也浩乎若滄海斗斛所不能校也峻其重仞之髙隱其百官之富觀彼佻竊若草莾也邈世之操焉冠秋雲之表遺俗之神緬焉棲九玄之端雖窮賤而不可脅以威雖危苦而不可動以利其所業尚可聞而不可盡也其所執守可見而不可論也故疾之者齊聲而側目愛之者寡弱而無益亦猶撮壤不能填決河升水不能殄原火於是鼗鼓戢雷霆之音鞉切徒刀鞞切奴移恣喋鼛高音之響芳蕙芟夷臭鮑佩御玄鬯傾弃而不羞醨酪專灌於圓丘汗血驅放而垂耳跛蹇馳騁於鑾軒此古人之所以懷沙負石赴流魚葬而不堪與之同世也已矣悲夫然捐黎於洿濘非夜光之不真也由莫識焉投彤盧而不彎非繁弱之不勁也坐莫賞焉故瓊瑶俟荆和而顯連城之價烏號須逢門而著陷堅之功飛莵待子豫而飊騰俊民值知已而宣力若夫美玉不出重岫良弓不鑿百札驥騄不服朱軒命世不履爵勢則孰知其能攄符彩之耀曄頓雲禽於千仞騁逸迹以追風康庶績於百揆乎夫其不遇亦得不雜糅於瓦石鈞賤於朽木列鑣於下乘等望於凡哉嗟乎彍棘矢而望髙手乎渠廣䇿疲駑而求繼軌於周穆放斧斤而欲雙巧於班墨忽良才而欲彛倫之攸叙不亦難乎名實雖漏於一世徳音可邀乎將來樂天知命何慮何憂安時處順何怨何尤哉抱朴子外篇卷二十終抱朴子外篇卷二十一晋丹陽洪稚川著清鑒抱朴子曰咸謂勇力絶倫者則上將之噐洽聞治亂者則三九之才也然張飛闗羽萬人之敵而皆喪元辱主授首非所孔融邊讓文學邈俗而並不達治務所在敗績鄧禹馬援田間諸生而善於用兵蕭何曹參不渉經誥而優於宰輔爾則知人果未易也欲試可乃已則恐成折足覆餗欲聴言察貌則或似是而非真偽混錯然而世人甚以為易經耳過目謂可精盡余甚猜焉未敢許也區别臧否瞻形得神存乎其人不可力為自非明並日月聴聞無音者願加清澄以漸進用不可頓任輕假利噐收還之既甚難所損者亦以多矣無以一事闇保其餘同乎己者未必可用異於我者未必可忽也或難曰夫在天者垂象在地者有形故望山度水則髙深可推風起雲飛則吉凶可歩智者覩木不瘁則悟美玉之在山覿岸不枯則覺明珠之沉淵彗星出則知鱣魚之方死日月蝕則識麒麟之共鬭華霍不湏稱而無限之重可知矣江河不待量而不測之數已定矣鴻鵠之翼騄騏之足雖未飛走輕迅可必也豪曹之劒徐氏匕首雖未奮擊其立斷無疑也駮子有吞牛之容鶚鷇有凌鷙之貌卉茂者土必沃魚大者水必廣虎尾不附狸身象牙不出䑕口叔魚無猒之心見於初生之狀食我㓕宗之徵著乎開胞之始申童覺竊妻之巫臣張負知將貴之陳平范子所以絶迹於五湖者以句踐蜂目而鳥喙也趙人所以息意於争鋒者以白起首鋭而視直也文王之接吕尚桒隂未移而知其足師矣徳之見孔明晷景未改而腹心已委矣郭泰中才猶能知人故入頴川則友李元禮到陳留則結符偉明入外黄則親韓子助至蒲亨則師仇季知止學舍則收魏徳公觀耕者則㧞茅季偉竒孟敏於擔負戒元艾之必敗終如其言一無差錯必能簡精鈍於符表詳舒急乎聲氣料明闇於舉厝察清濁於財色觀取與於宜適謂虚實於言行考操業於閨閫校始終於信效善否之驗不其易乎抱朴子答曰余非謂人物了不可知知人挺無形理也徒以斯術存乎大明非夫當人自許然而世士各謂能之是以有云以警付任耳夫貌望豐偉者不必賢而形噐尫瘁者不必愚咆哮者不必勇淳淡者不必怯或外候同而用意異或氣性殊而所務合非若天地有常候山川有定止也物亦故有逺而易知近而難料譬猶眼能察天衢而不周項領之間耳能聞雷霆不能識螘虱之音也唐吕樊許善於相人狀唯知夀夭貧富官秩尊卑而不能審情性之寛尅志行之洿隆惟帝難之況庸人乎而吾子舉論形之例詰精神之談未修其本殆失指矣夫亡射之箭皆破秋毫然凖的恒不得為工叔向之母申氏之子非不一得然不能常也陶唐稽古而失任姬公欽明而謬授尼父逺得崇替於未兆近失澹臺於形骸延州審清濁於千載之外而蔽竒士於咫尺之内知人之難如此其甚郭泰所論皆為此人過上聖乎但其所得者顯而易識其所失者人不能紀且夫所貴貴乎見俊才於無名之中料逸足乎呉坂之間掇懷珠之蚌於九淵之底指含光之珍於積石之中若伯喈識絶音之噐於煙燼之餘平子剔逸響之竹於未用之前六軍之聚市人之㑹暫觀一覩無所昡惑探其潜生之心計定其始終之事行乃為獨見不傳之妙耳如末論必俟考其操蹈之全毁觀其云為之好醜此為絲線既經於銓衡布帛已厯於丈尺除乃説其斤兩之䡖重端匹之修短人皆能之何煩於明哲哉抱朴子外篇卷二十一終抱朴子外篇卷二十二晋丹陽洪稚川著行品抱朴子曰擬黄之覆載揚明並以表㣲文彪昺而備體澄獨見以入神者聖人也禀髙亮之純粹抗峻標以邈俗虛靈機以如愚不貳過而謟黷者賢人也居寂寞之無為蹈修直而執平者道人也盡烝嘗於存亡保髮膚以揚明者孝人也垂惻於有生恒恕己以接物者仁人也端身命以徇國經嶮難而一節者忠人也覿㣲理於難覺料倚伏於將來者明人也量理亂以卷舒審去就以保身者智人也順通塞而一情任性命而不滯者達人也不枉尺以直尋不降辱以苟命者雅人也據體度以動静毎清詳而無悔者重人也體氷霜之粹素不染㓗於勢利者清人也篤始終於寒暑雖危亡而不猜者義人也守一言於久要厯嵗衰而不渝者信人也摛鋭藻以立言辭炳蔚而清允者文人也奮果毅之壯烈騁干戈以静難者武人也甄墳索之淵奥該前言以窮理者儒人也銳乃心於精義吝寸隂以進徳者益人也識多藏之厚亡臨禄利而如遺者廉人也不改操於得失不傾志於可欲者貞人也䘏急難而㤀勞以憂人為己任者篤人也潔皎分以守終不遜厚而苟免者節人也飛清機之英麗言約暢而判滯者辯人也每居卑而推功雖處㤗而滋恭者謙人也崇惇睦於九族必居正以赴理者順人也臨凝結而能斷操䋲墨而無私者幹人也㧞朱紫於中搆剖猶豫以允當者理人也步七曜之盈縮推興亡之道度者術人也赴白刃而㤀生格兕虎於林谷者勇人也整威容以肅衆伏法度而無二者嚴人也創機功以濟用總音數而並精者藝人也凌强禦而無憚雖嶮逼而不沮者人也執匪懈於夙夜㤀勞瘁於深峻者勤人也蒙謗讟而晏如不慴懼於可畏者勁人也聞榮譽而不歡遭憂難而不變者審人也知事可而必行不猶豫於羣疑者果人也循䋲墨以進止不乾沒於僥倖者謹人也奉禮度以戰競及親踈而無尤者良人也履道素而無欲時雖移而不變者朴人也凡此諸行了無一然而不躋善人之迹者下人也門人請曰善人之行既聞其目矣惡者之事可以戒俗者願文垂誥焉抱朴子曰不致養於所生損道而危身者悖人也懷邪偽以偷榮豫利己而忘生者逆人也背仁義之正茍危人以自安者凶人也好爭奪而無猒專醜正而害直者惡人也出繩墨以傷刻心好殺而安忍者雪人也邪説以浸潤謗累於忠貞者䜛人也雖言巧而行違實履濁而假清者佞人也不原本於枉直茍尚勝而肆怒者暴人也措細善以取信隂挾毒而無親者姦人也承風指以茍容揆主意而扶非者諂人也言不計於反覆好輕諾而無實者虚人也覩利地而亡義弃亷耻以茍得者貪人也覿艷逸而心蕩誇綺而思邪者淫人也見成事而疑惑動失計而多悔者闇人也背訓典而自任耻請問於勝己者損人也知善事而不建雖多為而無成者劣人也委徳行而不修奉權勢以取媚者弊人也履蹊徑以僥速推貨賄以争津者邪人也既傲狠以無禮好凌辱乎勝己者悍人也被抑枉而自誣事無苦而振懾者怯人也治細辯於稠衆非其人而盡言者淺人也闇事宜之可否雖企慕而不及者頑人也知事非而不改聞良䂓而増劇者惑人也無濟恤之仁心輕告絶於親舊者薄人也既疾其所不逮喜他人之有災者妬人也專財穀而輕義觀困匱而不振者吝人也冐至危以僥倖值禍敗而不悔者愚人也情局碎而偏黨志唯務於盈利者小人也騁鷹犬於原獸好博戲而無已者迷人也忘等威之異數快玩之誇麗者奢人也耽聲色與飲讌廢慶弔於人理者人也既無心於修尚又怠惰於家業者人也無抑斷之威儀每脱易而不思者輕人也觀道義而如醉聞貨殖而波擾者人也杖淺短而多謬闇趨舍之臧否者笨本歩切人也憎賢者而不貴聞髙言而如聾者嚚人也覩朱紫而不分雖提耳而不悟者蔽人也違道義以趑趄冐禮刑而罔顧者亂人也每動作而受嗤言發口而違理者拙人也事酋豪如僕虜值衰微而背惠者慝人也損貧賤之故舊輕人士而踞傲者驕人也弃衰色而廣欲非䆠學而逺遊者蕩人也無忠信之純固背恩養而趨利者叛人也當交顔而面從至析離而背毁者偽人也習强梁而專己距忠吿而不納者刺人也抱朴子曰人技未易知真偽或相似士有顔貌修麗風表閑雅望之溢目接之適意威儀如龍虎盤旋成䂓矩然心蔽神否才無所堪心中所有盡附皮膚口不能吐片竒筆不能屬半句入不能宰民出不能用兵治事則事廢銜命則辱命動靜無宜出處莫可葢難分之一也士有貌望樸悴容觀矬陋聲氣雌弱進止質澁然而含英懷寶經明行髙幹過元凱文蔚春林官則庶績康用武則克全獨勝蓋難分之二也士有謀猷淵䆳術畧入神智周成則思洞幽才兼能事神噐無宜而口不傳心筆不盡意造次之接不異凡庸蓋難分之三也士有機辯清鋭巧言綺粲擥引譬喻淵湧風厲然而口之所談身不能行長於識古短於理今為政政亂牧民民怨盖難分之四也士有外形足恭容䖍言恪而神䟽心慢中懷散放受任不憂居局不治盖難分之五也士有控命中空拳入白倒乘立五兵畢習而體輕慮淺手勦心怯虚試無對而實用無驗望塵奔北聞敵失魄盖難分之六也士有梗槩簡緩言希貌樸細行闕漏不為小勇跼踳拘檢犯而不校握爪垂翅名為弱愿然而膽勁心方不畏强禦義正所在視死猶歸支解寸斷不易所守盖難分之七也士有孝友温淑恂恂平雅履信思順非禮不蹈安困潔志操清氷霜而䟽遲迂闊不達事要見機不作所為無成居己梁倡受任不舉難分之八也士有行己髙簡風格峻峭嘯傲偃蹇凌儕慢俗不肅檢括不䕶小失適情率意旁若無人朋黨排譴談者同敗士友不附品藻所遺而立朝正色知無不為忠於奉上明於攝下蓋難分之九也士有含曠濟虚己受物藏疾匿瑕温恭亷潔勞謙冲退救危全信寄命不疑託孤可保而純良暗權仁而不斷善不能賞惡不忍罰忠貞有餘而幹用不足操柯猶豫廢法効非枉直混錯終於負敗蓋難分之十也夫物有似而實非若然而不然料之無惑望形得神聖者其將病諸况乎常人故用才取士推昵結友不可以不精擇不可以不詳試也若乃性行之惑變始正而終邪若王莾初則美於伊霍晚則劇於趙髙又非中才所能逆盡也若令士之易别如鷦鷯之與鴻鵠狐兎之與龍驎者則四凶不得官於堯朝管蔡不得幾危宗周仲尼無澹臺之失延陵無捐金之恨伊尹無七十之勞項羽無嫌范之悔矣所患於其如碔砆下音夫上音武之亂瑾瑜鷦螟之似鳯凰凝氷之水精煙熏之凝雲氣故令不謬者尟也惟帝難之矧乎近人哉夫唯大明鑒幽微靈銓揣物思灼沉昧瞻山識璞臨川知珠士於難分之中而無取舍之恨者使臧否區分抑揚咸允武丁姬文不獨治而傅説吕尚不永弃高莾宰嚭不得成其惡恭石顯無所容其偽矣斯蓋取士之較畧選擇之大都耳精微之求存乎其人固非毫翰之所備縷也抱朴子外篇卷二十二終抱朴子外篇卷二十三晋丹陽洪稚川著弭訟姑子劉君士由之論曰人綱始於夫婦判合擬乎二儀是故大婚之禮古人所重將合二姓之好以承祖宗之基主人拜迎於門聴命於廟纁贄幣親御授綏壻有三年之喪致命女氏女氏許諾而不敢改大喪既沒請命於婿壻有辭焉然後乃嫁所以崇敬讓也豈有先訟後婚之謂乎而末世輕慢傷化敗俗舉不修義許而弗與訟䦧辱煩塞官曹今可使諸爭婚者未及同牢皆聴義絶而倍還酒禮歸其幣帛其甞已再離者一倍禆娉其三絶者再倍禆娉如此離者不生訟心貪吝者無利重受乃王治之要術不易之永法也抱朴子答曰劉君愍徳讓之凌替疾民爭之損化雖速我訟室家不足用和之貴將遂淪胥創讜言以拾世遺建嘉謀以拯流遁紛譁之俗將以此而易無耻之風將由兹而移彌綸情偽固難間矣誠經國之永法至益之篤論也洪以不敏不識至理造次承聞竊有疑焉夫婚媾之結義無逼迫彼則簡擇而求此則可意乃許輕諾後悔罪在女氏食言弃信與奪任情嚴防峻制未之能弭今猥恣之唯責禆娉倍貧者所憚也豊於財者則適其願矣後所許者或能富殖助其禆娉必所甘心然則先家拱黙不得有言原情論之能無怨歎乎夫不伏之人視死猶歸血刃之禍於是將起令茍惜其辭訟之小醜而搆其難忍之大恨所謂愛其僦切子宙覽之煩忘其凋殞之酷也夫買物於市者或加價而奪之則尠忍而不忿然矣况乎見奪待告之妻哉此法遂用者將使結婚者雖納敬親迎猶抱有見奪之慮何者劉君之論以同牢為斷固也爾則女氏雖受幣積年恒挾在意之威恃可數奪必惰於擇壻壻小不得意便得改悔結讎速禍莫此之甚矣曩人畫法慮闗終始杜漸防萌思之良精而不闕恣奪之路斷以報板之制者殆有意乎儻令女有國色傾城絶倫而值豪右權臣之從目玩冶容心忘禮度資累千金情無所吝十倍還娉猶所不憚况但一乎華氏不難於殺孔父而取其妻楚人為子迎婦以其美而自納之以此論之豈惜傾竭屋産以助女氏還前家之直哉小人輕薄睚計二切五魚䀝計二切在在成怨又喜委衰逐盛蹋冷趨此法之行則必多奪貧賤而與富貴者矣不審吾君何方以防弊乎或曰可使女氏受娉禮無豊約皆以即日報板後皆使時人署姓名於别板必十人已上以備逺行及死亡又令女之父兄若伯叔答壻家書必手書一若有變悔而證據明者女氏父母兄弟皆加刑罪如此庶於無訟者乎抱朴子外篇卷二十三終抱朴子外篇卷二十四晋丹陽洪稚川著酒誡抱朴子曰目之所好不可從也耳之所樂不可順也鼻之所喜不可任也口之所嗜不可隨也心之所欲不可恣也故惑目者必逸容鮮藻也惑耳者必妍音淫聲也惑鼻者必切昌給蕙芬馥也惑口者必珍羞嘉㫖也惑心者必勢利功名也五者畢惑則或承之禍為身患者不亦信哉是以智者嚴櫽括於性理不肆神以逐物檢之以恬愉増之以長筭其抑情也劇乎隄防之備决其御性也過乎腐轡之乘奔故能内保永年外免釁累也蓋飢寒難堪者也而清節者不納不義之穀帛焉困賤難居者也而髙尚者不處危亂之榮貴焉蓋計得則能忍之心全矣道勝則害性之事棄矣夫酒醴之近味生病之毒物無毫分之細益有丘山之巨損君子以之敗徳小人以之速罪耽之惑之尠切息淺不及禍世之士人亦知其然既莫能絶又不肯節縱心口之近欲輕召災之根源似渴之恣冷雖適已而身危也小大亂喪亦罔非酒然而俗人是酣是湎音其初筵也抑抑濟濟言希容整詠湛露之厭厭歌在鎬之愷樂舉萬夀之觴誦温克之義日未移晷體輕耳夫琉璃海螺之噐並用滿酌罰餘之令遂急醉而不止㧞轄投井於是口涌鼻溢濡首及亂屢儛蹮蹮舍其坐遷載號載呶宣也女友切如沸如或爭辭尚勝或啞啞笑聲烏格切獨笑或無對而談或嘔吐几筵或值蹷切居月良倡或冠脱帯解貞良者流華督之顧眄怯懦者效慶忌之蕃㨗遲重者蓬轉而波擾整肅者鹿踊而魚躍口訥於寒暑者皆垂掌而諧聲謙卑而不競者悉禆瞻以髙交亷耻之儀毁而錯之疾發闒茸之性露而傲佷之態出精濁神亂臧否顛倒或奔車走馬赴阬切客庚谷而不憚以九折之阪為螘封或登危蹋頺雖墮墜而不覺以吕梁之淵為牛跡也或肆忿於噐物或酗醟酗酒為命切於妻子加枉酷於臣僕用剡鋒乎熾火烈於室廬掊寶玩於淵流遷威怒於踞人加暴害於士友䙝嚴主以夷戮者有矣犯凶人而受困者有矣言雖尚辭煩而叛理拜伏徒多勞而非敬臣子失禮於君親之前㓜賤悖慢於耆宿之座謂清談爲詆詈以忠吿爲侵己於是白刃抽而忘思難之慮棒杖奮而罔顧乎前後搆漉血之讎招大辟之禍以少凌長則鄉黨加重責矣辱人父兄則子弟將推刃矣發人所諱則壯士不能堪矣計數深尅則醒者不能恕矣起衆患於湏㬰結百痾於膏肓切呼光奔駟不能追既往之悔思改而無自及之蹊蓋智者所深防而煦人所不免也其爲禍敗不可勝載然而歡集莫之或釋舉白盁耳不論於能否料瀝霤於小餘以稽遲為輕已傾匡注於所敬殷勤而成薄勸之不持督之不盡怨色醜音所由而發也夫風經府藏使人惚怳及其劇者自傷自虞或遇斯疾莫不憂懼吞苦忍痛欲其速愈至於醉之病性何異於兹而獨居宻以逃風不能割情以節酒若畏風憎病則沉之咎塞而流連之失正矣夫風之為疾猶展攻治酒之為變在乎呼吸及其間亂若存若亡視泰山如彈丸見滄海如盤孟仰嚾切荒旦天墮俯呼地陷卧待虎狼投井赴火而不謂惡也夫用身之如此亦安能惜敬恭之禮䕶喜怒之失哉昔儀狄既䟽大禹以興糟丘酒池辛癸以亡豊侯得罪以戴尊衘盃景升壞以三雅之爵劉松爛腸以逃暑之飲郭珍發狂以無日不醉信陵之凶短襄子之亂政趙武之失衆子反之誅戮漢惠之伐命灌夫之㓕族陳遵之遇害季布之䟽斥子建之免退徐邈之禁言皆是物也世人好之樂之者甚多而戒之畏之者至少彼衆我寡良箴安施且願君子節之而已曩者旣年穀貴人有醉者相殺牧伯因此輙有酒禁嚴令重申官司捜索收執榜擊也薄行切徇者相辱制鞭而死者太半防之彌峻犯者至多至乃穴地為釀油嚢懷酒民之好此可謂篤矣余以匹夫之賤託此空言之書末如之何矣又臨民者雖設其法而不能自斷斯物緩己急人雖令不從弗躬弗親庶民弗信以此而教教安得行以此而禁禁安得止哉沽賣之家廢業則困遂修賂遺依憑權右所屬吏不敢問無力者獨止而有勢者擅市張壚專利乃更倍售從其酤買公行靡憚法輕利重安能免乎哉或人難曰夫夏桀殷紂之亡信陵漢惠之殘聲色之過豈唯酒乎以其生患於古而斷之於今所謂以褒姒喪周而欲人君廢六宫以阿房之危秦而使王者結草菴也蓋聞千鍾百觚堯舜之飲也唯酒無量仲尼之能也姬旦酒肴不徹故能制禮作樂漢髙婆娑巨醉故能斬蛇鞠旅于公引滿一斛而斷獄益明管輅傾仰三斗而清辯綺粲楊雲酒不離口而太乃就子圉醉無所識而霸功以舉一瓶之醪傾而三軍之衆悦解毒之觴行而盜馬之屬感消憂成禮䇿勲飲至降神合人非此莫以也内速諸父外將嘉賔如淮如澠春秋所貴由斯言之安可識乎抱朴子答曰酒旗之宿則有之矣譬猶玄象著明莫大乎日月水火之原於是在焉然節而宣之則以養生立功用之失適則焚溺而死豈可恃懸象之在天而謂水火不殺人哉宜生之具莫先於食食之過多實結癥瘕况於酒醴毒之物乎夫使彼夏桀殷紂信陵漢惠流於亡國之淫聲沉溺於傾城之亂色皆由乎酒熏其性醉成其勢所以致極情之失忘修之術者也我論其本子識其末謂非酒禍禍其安出是獨知猛雨之霑衣而不知雲氣之所作唯患飛埃之糝目不覺飊風之所為也千鍾百觚不經之言不然之事明者不信矣夫聖人之異自才智至於形骸非能兼人有七尺三丈之長萬倍之大也一日之飲安能至是仲尼則畏性之變不敢及亂周公則終日百拜肴乾酒澄上聖戰戰猶且若斯況乎庸人能無悔乎漢髙應天承運革命向雖不醉猶當斬蛇于公聰達明於聴斷小大以情不失枉直是以刑不濫加世無怨民但其健飲不即廢事若論大醉亦俱無知决疑之才何頼於酒未聞臯繇甫侯子産釋之醉乃折獄也管輅年少希當劇談故假酒勢以助膽氣若過其量亦必迷錯及其刺毫於爻卦索神之變化占氣色以決盛衰聆鳴鳥以知方來候風雲而尅吉凶觀碑栢而識禍福豈復湏酒然後審之楊雲通人才髙思逺英贍之富禀之自天豈藉外物以助著述及其數飲由於偶好亦或有疾以宣藥勢耳子圉師志蓋已素定雖復不醉亦於終果瓶醪悦衆寓言之喻誠能賞罰允當威恩抱朴子外篇卷二十四終抱朴子外篇卷二十五晋丹陽洪稚川著疾謬抱朴子曰世故繼有禮教漸頺敬讓莫崇傲慢成俗儔飲㑹或蹲或踞暑夏之月露首袒體盛務唯在摴蒱彈棋所論極於聲色之間舉口不踰綺紈袴之側游歩不去勢利酒客之門不聞清談論道之言專以醜辭嘲弄為先以如此者為髙逺以不爾者為騃癡也五駭切野於是馳逐之庸民偶俗之近人慕之者猶宵蟲之赴明燭學之者猶輕毛之應飊切甫遥風嘲戲之談或上及祖考或下逮婦女往者務其不深焉報者恐其不重焉倡之者不慮見答之後患和之者耻於言輕之不塞周禾之芟温麥之刈實由報恨不能已也利口者扶强而黨勢辯給者借鍒以刺耳鍒扶發切由切以不應者為拙劣以先止者為負敗如此交惡之辭焉能黙哉其有才思者為人也猶善於依因機㑹准擬體例引古喻今言微理舉雅而可笑中而不傷不棖人之所諱不犯人之所惜若夫拙者之為人也則枉曲直湊使人愕然妍之與媸其於宜絶豈唯無益而已哉乃有使酒之客及於難侵之性不能堪之拂衣拔棘而手足相及醜言加於所尊歡心變而成讎絶交壞身搆隙致禍以杯螺相擲者有矣以隂私相訐面斥人居謁切者有矣昔陳靈之被矢管氏之泯族匪降自天口實爲之樞機之發榮辱之主三緘之戒豈欺我哉激雷不能追既往之失辭班輸不能磨斯言之既玷音雖不能三思而吐清談猶可息謔調以防禍萌也尊其辭令敬其威儀使言無口過體無倨切居御容可法可觀可畏可愛蓋逺辱之良術全交之要道也且夫慢人者不愛其親者也輕鬭者不重遺體者也皆陷不孝可不詳乎然而迷謬者無自見之明觸情者諱逆耳之規疾美而無直亮之鍼切職深艾羣惑而無指南以自反諂媚小人歡笑以賛善面從之徒拊節以稱功益使惑者不覺其非自謂有端晏之㨗過人之辯而不悟斯乃招患之旌召害之符傳非之驛傾身之車也豈徒减其方䇿之令聞虧其沒世之徳音而已哉蓋雖有偕老之慎不能救一朝之過雖有陶朱之富不能贖片言之謬故毫之失有千里之差傷人之語有劒㦸之痛積微致著累淺成深鴻羽所以沈龍舟群輕所以折勁軸寸飊所以燔百尋之室蠧蝎所以仆切普卜連抱之木也古賢何獨跼蹐恂恂之如彼今人何其憒慢傲放之如此乎是以髙世之士望塵而旋迹輕薄之徒響赴而影集謀事無智者之居危無切磋之益良史懸筆無可書之善談者含音無足傳之美令聞不著醜聲宣流沒有餘敗貽譏將來始無可法終無可紀斯亦志士之耻也安忍為之過而不改斯誠委夷路而陷叢棘舍嘉㫖而咽鈎吻者也豈所謂以小善為無益而不為以小惡為無損而不止以至惡積而不可掩罪大而不可解者邪余願世人改其無檢之行除其驕吝之失遣其誇矜尚人之疾絶息嘲弄不典之言則趙勝之門無去客黄祖之棓無所用矣抱朴子曰或有不治清徳以取敬而仗氣力以求畏其入衆也則亭立不坐争處端上作色諧聲逐人自安其不得意恚懟不退其行出也則逼狹之地耻於分塗振䇿長驅推人於險有不即避更加攄頓嗚呼悲哉此云古之卑而不可踰推䕃譲路勞謙下士無競於物立若不勝衣行若不容身者何其緬然之不肖哉夫德盛操清則雖深自挹降而人猶貴之若履蹈不髙則雖行凌暴而人猶不敬假令外服人體内失人心所謂見憎惡非為見尊重也昔莊生未食趙王側立騶衍入壃燕君擁篲康成之里逆虜望拜林宗之庭莫不卑肅非力之所服也夫以抄盜致財雖巨富不足嘉凶徳脅人雖見憚不足榮也然而庸民為之不惡故聞其言者猶鴟梟之來鳴也覩其面者若魅之見形也其所至詣則如妖怪之集也其在道塗則甚逢虎之羣也愚夫行之自矜為豪小人徵之以為横階亂靡有定寔此之由也然敢為此者非必篤頑也率冠盖之後勢援之門素頗力行善事以竊虚名名既粗立本情便放或假財色以交權豪或因時運以佻榮位或以婚姻而連貴戚或弄毁譽以合威柄噐盈志溢態發病出黨成交廣道通步髙清論所不能復制繩墨所不能復彈遂成鷹頭之蠅廟垣之䑕所未及者則低眉掃地以奉望之居其下者作威作福以控御之故勝己者則不得聞聞亦陽不知也减己者則不敢言言亦不能禁也夫災蟲害穀至降霜則殄矣佞雄亂羣值嚴時則敗矣獨善其身者唯可以不肯事之不行傚之而已耳有斧無柯其如之何哉抱朴子曰詩美睢鳩貴其有别在禮男女無行媒不相見不雜坐不通問不同衣物不得親授姊妹出適而反兄弟不共席而坐外言不入内言不出婦人送迎不出門行必擁蔽其面道路男由左女由右此聖人重别杜漸之明制也且夫婦之間可謂昵矣而猶男子非疾病不晝居於内將終不死婦人之手況於他乎昔魯女不幽居深處以致扈犖切力各之變孔妻不宻潜户庭以起華督之禍史激無防有汙種之悔王孫不嚴有杜門之辱而今俗婦女休其織之業廢其紞之務不績其麻市也婆娑舍中饋之事修周旋之好更相從詣之適親戚承星舉火不已于行多將侍從暐盈路婢使吏卒錯雜如市尋道䙝謔可憎可惡或宿于他門或冐夜而反遊戲佛寺觀視漁畋登髙臨水出境慶弔開車褰幃周章城邑盃觴路酌歌行奏轉相髙尚習非成俗坐致因縁無所不肯誨淫之源不急之甚刑于寡妻家乃正願諸君子少可禁絶婦無外事所以防微矣抱朴子曰輕薄之人迹厠髙深交成財贍名位粗㑹便背禮叛教託云率任才不逸倫强為放達以傲兀無檢者為大度以惜䕶節操者為澁少於是臘鼓垂無頼之子白醉耳之後結黨合羣遊不擇竒士碩儒或隔籬而不接妄行所在雖逺而必至手連袂以遨以集入他堂室觀人婦女指玷修短評論美醜不解此等何為者哉或有不通主人便共突前嚴未辦不復窺聴犯門折闗踰垝切居毁穿隙有似抄劫之至也其或妾媵藏避不及至捜索隱僻就而引曳亦怪事也夫君子之居室猶不奄家人之不備故入門則揚聲升堂則下視而唐突他家將何理乎然落拓之子無骨骾而好隨俗者以通此者為親宻距此者為不泰誠為當世不可不爾於是要呼憒雜入室視妻促膝之狹坐交杯觴於咫尺歌淫冶之音曲以誂文君之動心載號載呶謔戲醜䙝窮鄙極黷爾乃笑亂男女之大節蹈相䑕之無儀夫桀傾紂覆周滅陳亡咸由無禮况匹庶乎蓋信不由中則屢盟無益意得神至則形噐可忘君子之交也以道義合以志契親故淡而成焉小人之接也以勢利結以狎慢宻故甘而敗焉何必房集内讌爾乃欵誠著妻妾飲㑹然後分好昵哉古人鑒淫敗之曲防杜傾邪之端漸可謂至矣修之者為君子背之者為罪人然禁䟽則上宫有穿窬之男網漏則桑中有奔隨之女縱而肆之其猶烈猛火於雲夢開積水乎萬仞其可撲以箒篲遏以撮壤哉然而俗習行慣皆曰此乃京城上國公子王孫貴人所共為也余每折之曰夫中州禮之所自出也禮豈然乎蓋衰亂之所興非治世之舊風也夫老聃清虛之至者也猶不敢見乎所欲以防心亂若使柳下惠潔髙行屢接䙝讌將不能不使情生於中而色形于表况乎情淡者萬未一而抑情者難多得如斯之事何足長乎窮士雖知此風俗不足引進而名勢並乏何以整之每以為慨故常獲憎於斯黨而見謂為野朴之人不能隨時之宜余其於信己而已亦安以我之不可從人之可乎可歎非一率如此也已矣夫吾末如之何也彼之染入邪俗淪胥以敗者曷肯納逆耳之讜言而反其東走之逺迹哉抱朴子曰俗間有戲婦之法於稠衆之中親屬之前問以醜言責以慢對其為鄙黷不可忍論或蹙以楚撻或繫脚倒懸酒容酗醟不知限齊至使有傷於流血踒切烏卧折支體者可歎者也古人感離别而不㓕燭悲代親而不舉樂禮論娶者羞而不賀今既不能動蹈舊典至於徳為鄉閭之所敬言為人士之所信誠宜正色矯而呵之何謂同其波流長此俗哉然民間行之日久莫覺其非或清談所不能禁非峻刑不能止也遂詘周而疵孔謂傲放為邈世矣或因變故佻竊榮貴或頼髙援翻飛㧞萃於是便驕矜誇驁氣凌雲物歩髙視逺然自足顧瞻否滯失羣之士雖實英異忽焉若草或傾枕而延賔或稱疾以距客欲令人士立門以成林車填噎於閭巷呼謂尊貴不可不爾夫以勢位言之則周公勤于吐握以聞望校之則仲尼恂恂善誘咸以勞謙為務不以驕慢為髙漢之末世則異於兹蓬髪亂横挾不帯或䙝衣以接人或祼而箕踞朋友之集味之遊莫切切進徳誾誾修業功過弼違講道精義其相見也不復叙離闊問安否賔則入門而呼奴主則望客而喚狗其或不爾不成親至而棄之不與為黨及好㑹則狐蹲牛飲爭食競割掣撥淼摺無復亷耻以同此者為泰以不爾者為劣終日無及義之言徹夜無箴䂓之益誣引老莊貴於率任大行不顧細禮至人不拘檢括嘯傲縱逸謂之體道嗚呼惜乎豈不哀哉於是嘲族以叙歡交極黷以結情欵以傾倚申脚者為妖妍摽秀以風格端嚴者為田舍朴騃以鎮抗指者為勦令鮮倚以出言有章者為摺答猝突凡彼輕薄之徒雖便辟偶俗廣結伴流更相推揚取達速易然率皆皮膚狡澤而懷空抱虚有似蜀人瓠壺之喻胸中無一之誦所識不過酒炙之事所謂傲狠明徳即聾從昧冒干貨財貪于飲食左生所載不才之子也若問以墳索之微言神之情狀萬物之變化殊方之竒怪朝廷宗廟之大禮郊祀禘祫之儀品三正四始之原本隂陽律曆之道度軍國社稷之典式古今因革之異同則怳悸自失喑嗚俛仰焉莫莫焉雖心覺面牆之困而外䕶其短乏之病不肯謐已强張大談曰雜碎故事蓋是窮巷諸生章句之士吟詠而向枯簡匍匐以守黄卷者所宜識不足以問吾徒也誠知不學之弊碩儒之貴所祖習之非所輕易之謬然終於迷而不返者由乎放誕者無損於進趨故也若髙人以格言彈而呵之有不畏大人而長惡不悛者下其名品則宜必懼然氷泮而革面旋而東走之迹矣抱朴子外篇卷二十五終抱朴子外篇卷二十六晋丹陽洪稚川著譏惑抱朴子曰澄濁剖判庻物化生羽族或能應對焉毛宗或有知言焉于玃識徃歸終知来玄禽解隂陽虵螘逺泉流蓍無以過焉甘石不能勝焉夫唯無禮不厠貴性厥初古民無階級上聖悼混然之甚陋愍巢宂之可鄙故棟宇以去鳥獸之群制禮數以異等威之品教之盤旋訓以揖讓立則罄折拱則抱鼓趨歩升降之節瞻視接對之容至于三千盖檢溢之隄防人理之所也故儼若冠於曲禮望貌首於五事出門有見賔之肅閑居有敬獨之戒顔生整儀於宵浴仲由臨命而結纓㳟容暫廢隋慢已及安上治民非此莫以盖人之有禮猶魚之有水矣魚之失水雖暫假息然枯糜可必待也人之棄禮雖猶然而禍敗之階也魯秉周禮暴兵不加魏式干木銳冦旋斾大楚帶甲百萬而有振槁之脆強秦殽函襲嶮而無折桞之固豈非棄三本而喪根柢之攸召哉矧乎安可觸情喪亂日乆風頺教沮抑斷之儀廢簡脫之俗成近人值正化之役庸民遭道綱之絶紊猶網魚之去水罟圍獸之出陸羅也喪亂以来事物屢變冠履衣服䄂財制日月改易無復一定乍長乍短一廣一狹忽髙忽卑或粗或細所無常以同為快其好事者朝夕放效所謂京輦貴大眉逺方皆半額也余實凡夫拙於隨俗其服物變不勝故不變無所損者余未曾易也雖見指笑余亦不理也豈茍欲違衆哉誠以為不耳上國衆事所以勝江表者多然亦有可否者君子行禮不求變俗謂違本之他國不改其桑梓之法也况於在其父母之鄉亦何為當事棄舊而強更學乎吳之善書則有皇象劉纂岑伯然朱季平皆一代之絶手如中州有鍾元常胡孔明張芝索靖各一之妙並用古體俱足周事余謂廢已習之法更勤苦以學中國之書尚可不湏也况於乃有轉易其聲音以效北語既不能便良似可耻可笑所謂不得邯鄲之歩而有匍匐之嗤者此猶其小者耳乃有遭喪者而學中國哭者令忽然無復念之情昔鍾儀莊舄不忘本聲古人韙之孔子云喪親者若嬰兒之失母其號豈常聲之有寧令哀有餘而禮不足哭以洩哀妍拙何在而乃治其音非痛切之謂也又聞貴人在大哀或有疾病服石散以數食宣藥勢以飲酒為性命疾患危篤不堪風冷幃帳茵褥任其所安於是凡小人之有財力者了不復居於喪位常在别房髙牀重褥美食大飲或與宻客引滿投空至於沈醉曰此京洛之法也不亦惜哉余之鄉里先徳君子其居重難或并在衰老於禮唯應縗麻在身不成喪致毁者皆過哀啜粥口不經甘時人雖不肖者莫不企及自勉而今人乃自取如此何其相去之遼緬乎又凡人不解呼謂中國人之居喪者多皆奢溢殊不然也吾聞晉之宣景文武四帝居親喪皆毁瘠踰制又不用王氏二十五月之禮皆行七月服于時天下之在重哀者咸以四帝為法世人何獨不聞此而虚誣髙人不亦惑乎抱朴子外篇卷二十六終抱朴子外篇卷二十七晋丹陽洪稚川著剌驕抱朴子曰生乎世貴之門居乎烈之率多不與驕期而驕自来矣非夫超羣之噐不辯於免盈溢之過也盖勞謙虛已則附之者衆驕慢倨傲則去之者多附之者衆則安去之者多則危之診也存亡之機於是乎在輕而為之不亦蔽哉亦有出自卑碎由㣲而著徒以翕肩歛迹偓伊側立低眉屈膝奉附權豪因縁運㑹超越不次毛成翼長蟬蛻泉瓖便自軒昻目不歩足噐滿意得視人猶芥或曲宴宻集管絃嘈囐後賔填門不復接引或於同造之中偏有所見復未必全得也直以求之差勤以數接其情苞苴繼到壺榼不曠者耳孟軻所謂愛而不敬豕畜之也而多有行諸云是自尊重之道自尊重之道乃在乎以貴下賤卑以自牧非此之謂也乃衰薄之弊俗膏肓之廢疾安共為之可悲者也若夫偉人巨噐量逸韻逺髙蹈獨徃蕭然自得身寄波流之間神躋九之表道足於内遺物於外冠摧履決藍縷帶索何肯與俗人競幹佐之便辟修佞幸之媚容効上林喋喋之嗇夫為春蜩夏蠅之聒耳求之以貌貴之以妍俗人徒覩其外形之粗簡不能察其精神之淵邈務在皮膚不料心志雖懐英抱異絶倫邁世事動可以悟舉世之術言發足以解古今之惑含章括嚢非法不談而茅蓬不能動萬鈞之鏗鏘侏儒不能㸔重仭之麗因而蚩之謂為凡憒夫非漢東之人不能料明珠於泥淪之蜯非泣血之民不能識夜光扵重崖之裏蟭螟屯蚊眉之中而彌天之大鵬寸鮒㳺牛迹之水不貴横海之巨鱗故道業不足以相渉聦明不足以相逮理自不合無所多怪所以疾之而不能黙者願夫在位君子無以貎取人勉朂謙損以永天秩耳抱朴子曰世人聞戴叔鸞阮嗣宗傲俗自放見謂大度而不量其材力非傲生之匹而慕學之或亂項科頭或裸袒蹲夷或濯脚於稠衆或溲便於人前或停客而獨食或行酒而止所親此盖左袵之所為非諸夏之快事也夫以戴阮之才學猶以踔自病得失財不相補向使二生敬蹈檢括恂恂以接物兢兢以御用其至到何但爾哉况不及之逺者而遵修其業其速禍危身將不移隂何徒不以清德見待而已乎昔西施心痛而卧於道側姿顔妖麗蘭麝芬馥見者咸美其容而念其疾莫不躊躇焉於是鄰女慕之因偽疾伏於路間形状既醜加之酷臭行人皆憎其貌而惡其氣莫不睨面掩鼻疾趨而過焉今世人無戴阮之自然而効其倨慢亦是醜女闇扵自量之也帝者猶執子弟之禮扵三老五更者率人以敬也人而無禮其刺深矣夫慢人必不敬其親也盖欲人之敬之必見自敬焉不修善事則為惡人無事於大則為小人紂為無道見稱獨夫仲尼陪臣謂為素王則君子不在乎富貴矣今為犯禮之行而不喜聞遄死之譏是負豕而憎人説其臭投泥而諱人言其汙也昔辛有見被髪而祭者知戎之將熾余觀懐愍之世俗尚驕䙝夷虜自遇其後羌胡猾夏侵掠上京及悟斯事乃先著之妖怪也今天下向平中興有徴何可不共改既徃之失修濟濟之美乎夫入虎狼之羣後知賁育之壯勇處禮廢之俗乃知雅人之不渝道化凌遲流遁遂往賢士儒者所宜共惜法當扣心同慨矯而正之若力之不能末如之何且當竹栢其行使嵗寒而無改也何有便當崩騰競逐其闒茸之徒以取容扵若曹邪去道彌逺可謂為痛歎者也其或俄然守正爾不移不蓬轉以随衆不改雅以入鄭者人莫能憎而知其善而期以不同於己者便共仇讎而不數之嗟乎衰弊乃可爾邪君子聽使以亢亮方楞無黨扵俗揚清波以激濁流執勁矢以厲羣枉不過當不見容與不得富貴耳天爵茍存扵吾體者以此獨立不逹亦何苦何恨乎而便當伐本瓦合餔糟握泥足適履毁方入圓不亦劇乎夫節士不能使人不憎之而道不可屈也不能令人不辱之而行猶在我也不能令人不擯之而操不可改也故分定計決勸沮不能干樂天知命憂懼不能入困瘁而益堅窮否而不悔誠能用心如此者亦安肯草靡萍浮以索鑿柄傚乎禮之所弃者之所為哉抱朴子曰聞之漢末諸無徒自相品藻次第羣驕慢傲不入道檢者為都魁雄伯四通八逹皆背叛禮教而從肆邪僻訕毁真正中傷非黨口習醜言身行弊事凡所云為使人不忍論也夫古人所謂通逹者謂通於道德逹於仁義耳豈謂通乎䙝黷而逹於淫邪哉有似盗跖自謂有聖人之道五者也此俗之傷破人倫劇於冦賊之来不能經乆豈所損壊一服而已若夫貴門子孫及在位之士不惜典刑而皆科頭袒體踞見賔客既辱天官又移染庸民後生晚出彼或以涇清之資或佻虚名而躬自為之則凡夫便謂立身當世莫此之美也夫守禮防者苦且難而其人多窮賤焉恣驕放者樂且易而為者皆逹焉於是俗人莫不委此而就彼矣世間或有少無清白之操業長以買官而富貴或亦其所知足以自也其黨與足以相引也而無行之子便指以為證曰彼縱情恣慾而不妨其赫奕矣此敕身履道而不免於貧賤矣而不知榮顯者有幸而頓淪者不遇皆不由其行也然所謂四通八逹者愛附己為之履不及納帶不暇結手升堂連袂入室出則接請㑹則直致所惠則得多屬託則常聽所欲則必副言論則見饒有患則見救所論薦則蹇驢蒙龍駿之價所中傷則孝已受商臣之談故小人之赴也若決積水於萬仭之髙隄而放烈火乎雲夢之枯草焉欲望肅雍濟濟後生有式是猶炙氷使燥積灰令熾矣抱朴子外篇卷二十七終抱朴子外篇卷二十八晋丹陽洪稚川著百里抱朴子曰三台九列坐而論道州牧郡守操綱舉領其官益大其事愈憂煩劇所鍾其唯百里衆役於是乎出調求之所叢赴牧守雖賢而令長不堪則國事不舉萬機有闕其損敗豈徒止乎一境而已哉令長尤宜得才乃於臺省之官也用之不得其人其故無他也在乎至公之情不行而任私之意不違也或父兄貴重而子弟以聞望見選或髙人屬託而凡品以無能見叙或是所宿念或親戚匪他知其不可而能用也等亦時有快者不為盡無所中也要於不精者率多矣其能自効立勉修清約夙夜在公以求衆譽懼風績之不羙耻知己之謬舉尠矣庸猥之徒噐小志近冐于貨賄唯富是圖肆情恣慾元止無足在所司官知其有足頼主人舉劾彈糺終於當解慮其結怨反見中傷不敢犯觸而恣其貪殘矣如此庻亦安得不困毒而離叛離叛者衆則不得不屯聚而為羣盗矣夫百尋之室焚於分寸之飈千丈之陂潰於一蟻之穴何可不深防乎何可不改張乎而秉斤兩者或銓衡而任情掌柯斧者或曲繩墨於附己選之者既不為官擇人而求之者又不自謂不任於是政而政荒牧民而民散或有濁驕奢而困百姓者矣或有苛虐酷烈而多怨叛者矣或有闇塞退憒而庻事亂者矣或有潦倒疏緩而致㢮壊者矣或有好興不而疲人力者矣或有藏飬逋逃而行凌暴者矣或有不曉法令而受欺弄者矣或有以音聲酒色而致荒湎者矣或有圍碁樗蒱而廢政務者矣或有田獵逰飲而忘庻事者矣或有不省辭訟而刑獄亂者矣百姓不堪起為冦賊舋咎發聞寘于叢棘虧君上之明益刑書之煩而民之荼毒亦已深矣夫用非其人譬猶被木馬以繁纓何由騁迹於追風以壤龍當雲雨安能耀景於天衢哉若秉國之鈞出納王命者審良樂之顧盻不令跛蹇厠騏騄冐昧茍得闇於自量者慮中道之顛躓不以駑薾服鸞衡則何患庶績之不康何憂四凶之不退三皇豈足四五帝豈難六哉抱朴子外篇卷二十八終抱朴子外篇卷二十九晋丹陽洪稚川著接䟽抱朴子曰以英逸而遭大明桑䕃未移而金蘭之恊已固矣以長才而遇深識則不待歴試而相知之情已審矣飄乎猶起鴻之乗勁風翩乎若騰鱗之躡驚雲也若以沈抑而可忽乎則姜公不用於周矣若以疏賤而可距乎則毛生不貴乎趙矣若積素行乃說政則寗戚不顯於齊矣若貴宿名而委任則陳韓不録於漢矣明者舉大畧細不忮不求故能取威定功成天平地豈肯稱薪而㸑數粒乃炊并瑕弃璧披毛索黶哉抱朴子外篇卷二十九終抱朴子外篇卷三十晋丹陽洪稚川著鈞世或曰古之著書者才大思深故其文隠而難曉今人意淺力近故露而易見以此易見比彼難曉猶溝澮之方江河螘垤之並嵩岱矣故水不發崑山則不能揚洪流以東漸書不出英俊則不能備致逺之韻焉抱朴子答曰夫論管宂者不可問以九陔之無外習拘閡者不可督以㧞萃之獨見盖徃古之士匪匪神其形噐雖冶鑠於疇曩然其精神布在乎方䇿情見乎辭指歸可得且古書之多隠未必昔人故欲難曉或世異語變或方言不同經荒歴亂埋藏積乆簡編朽絶亡失者多或雜續殘缺或脫去章句是以難知似若至深耳且夫尚書者政事之集也然未若近代之優文詔䇿軍書奏議之清富贍麗也毛詩者華彩之辭也然不及上林羽獵二京三都之汪濊愽富也然則古之子書能勝今之作者何也然守株之徒嘍嘍所翫有耳無目何肯謂爾其於古人所作為神今世所著為淺貴逺賤近有自来矣故新劒以詐刻加價弊方以偽題見寳也是以古書雖質樸而俗儒謂之堕於天也今文雖金玉而常人同之於瓦礫也然古書者雖多未必盡美要當以為學者之山淵使屬筆者得采伐漁獵其中然而譬如東甌之木長洲之林梓豫雖多而未可謂之為大厦之壯觀華屋之麗也雲夢之澤孟諸之藪魚肉之雖饒而未可謂之為煎之盛膳渝狄之嘉味也今詩與古詩俱有義理而盈於差美方之於士並有徳行而一人偏長藝文不可謂一例也比之於女俱體國色而一人獨閑百伎不可混為無異也若夫俱論宫室而奚斯路寢之頌何如王生之賦靈光乎同遊獵而叔畋盧鈴之詩何如相如之言上林乎並美祭祀而清廟雲漢之辭何如郭氏南郊之艶乎等稱征伐而出軍六月之作何如陳琳武軍之壯乎則舉條可以覺焉近者夏侯湛潘安仁並作亡詩白華由庚南陔華黍之屬諸碩儒髙才之賞文者咸以古詩三百未有足以偶二賢之所作也且夫古者事事醇素今則莫不彫時移世改理自然也至於錦麗而且堅未可謂之减於蓑衣輜軿妍而又牢未可謂之不及椎車也書猶言也若入談語故為知有胡越之接終不相解以此教戒人豈知之哉若言以易曉為辨則書何故以難知為好哉若舟車之代歩渉文墨之改結䋲諸後作而善於前事其功業相次千萬者不可復縷舉也世人皆知之快於曩矣何以獨文章不及古邪抱朴子外篇卷三十終抱朴子外篇卷三十一晋丹陽洪稚川著省煩抱朴子曰安上治民莫善於禮彌綸人理誠為曲備然冠婚飲射何煩碎之甚邪人倫雖以有禮為貴但當令足以叙等威而表情敬何在乎升降揖讓之繁重拜起俯伏之無已邪徃者天下乂安四方無事好古官長時或修之至乃講試累月督以楚撻晝夜修習廢寢與食經時學之一日試之執卷從事案文舉勲黜謫之罰又在其間猶有過誤不得其意而欲以為以此為生民之常事至難行也此墨子所謂累世不能盡其學當年不能䆒其事者也古人詢于蒭蕘慱採童謡狂夫之言猶在擇焉至於墨子之論不能非也但其張刑開塗徑浹人事備王道不能曲述耳至於譏葬厚刺禮煩未可棄也自建安之後魏之武文送終之制務在儉薄此則墨子之道有可行矣余以為喪亂既平朝野無為王者所制自君作古可命精學洽聞之士才任損益免於拘愚者使删定三禮割棄不要次其源流總合其事集以相從其煩重逰辭異而義同者存之不可常行除之無所傷損卒可斷約而舉之勿令沈隠復有凝滯其吉凶噐用之物爼豆觚觶之屬衣冠車服之制旗章采色之美官室尊卑之品朝饗賔主之儀祭奠殯葬之變郊祀禘祫之法社稷山川之禮皆可减省務令約儉夫約則易從儉則用少易從則不煩用少則費薄不煩則涖事者無過矣費薄則調求者不苛矣拜伏揖譲之節升降盤旋之容使足叙事無令小碎條牒各别令易案用今五禮混撓雜紛錯枝分葉散重出牙見更相貫渉舊儒尋案猶多所滯駮難漸廣異同無已殊理兼增月長自非至精莫不惑悶躊躇岐路之衢愁勞羣疑之藪煎神瀝思考校叛例嘗有窮年竟不豁了治之勤苦决嫌無地呻吟尋析憔悴决角修之華首不立妨費日月廢棄他業愁困後生真未央矣長致章句多於本書今若破合雜俗次比種稷刪削不抗其綱較其令炳若日月之著明灼若五色之有定息學者萬倍之役弭諸儒争訟之煩將来逹者觀之當美於今之視周矣此亦改燒石去血食之比無所憚難而恨恨於惜懷推車遲於去巢居也然守常之徒而卒聞此義必将愕然創見謂之狂生矣夫三王不相㳂樂五帝不相襲禮而其移風易俗安上治民一也或革或因損益懷善何必當乗船以登山䇿馬以渉川甲以升廟堂重裘以當隆暑乎若謂古事終不可變則棺椁不當代薪埋衣裳不宜改裸矣抱朴子外篇卷三十一終抱朴子外篇卷三十二晋丹陽洪稚川著尚博抱朴子曰正經為道義之淵海子書為增深之川流仰而比之則景星之佐三辰也俯而方之則林薄之禆嵩嶽也雖津塗殊闢而進徳同歸雖離於舉趾而合於興化故通人緫原本以括流末操綱領而得一致焉古人歎息於才難故謂百世為隨踵不以璞非崑山而棄耀夜之寳不以書不出聖而廢助教之言是以閭陌之拙詩軍旅之鞫誓或詞鄙喻陋簡不盈十猶見撰録亞次曲誥百家之言與善一揆譬操水者噐雖異而救火同焉猶針灸者術雖殊而攻疾均焉漢魏以来群言彌繁雖義深於淵辭贍於波濤施之可以臻徴祥於天上發嘉瑞於后土召環雉於大荒之外安圎堵於函夏之内近弭禍亂之階逺垂長世之祉然時無聖人目其品藻故不得騁驊騄之迹於千里之編近世之道於三墳之末也拘繋之徒桎梏淺隘之中挈瓶訓詁之間輕竒賤異謂為不或云小道不足觀或云廣愽亂人思而不識合錙銖可以齊重於山陵聚百十可以致數於億兆羣色㑹而衮藻麗衆音雜而韶濩和也或貴愛詩賦淺近之細文忽薄深羙富博之子書以磋切之至言為騃拙以華之小辯為妍巧真偽顛倒玉石混淆同廣樂於桑間鈞龍章於卉服悠悠皆然可歎可慨者也或曰著述雖繁適可以騁辭耀藻無救於得失未若德行不言之訓故顔閔為上而㳺夏乃次四科之格學本而行末然則綴文固為餘事而吾子不褒崇其源而獨貴其流可乎抱朴子答曰德行爲有事優劣易見文章㣲妙其體難識夫易見者粗也難識者精也夫唯粗也故銓衡有定焉夫唯精也故品藻難一焉吾故捨易見之粗而論難識之精不亦可乎或曰德行者本也文章者末也故四科之序文不居上然則著者糟粕之餘事可傳者祭畢之芻狗卑髙之格是可譏矣文之體略可得聞乎抱朴子答曰筌可以棄而魚未獲則不得無筌文可以廢而道未行則不得無文若夫翰迹韻略之宏促屬辭比事之疏宻源流至到之修短藴藉汲引之深淺其懸絶也雖天外毫内不足以喻其遼邈其相傾也雖三光熠耀不足以方其巨細龍淵鉛鋌未足譬其銳鈍鴻羽積金未足比其輕重清濁参差所禀有主朗昩不同科強弱各殊氣而俗士唯見能染毫畫者便槩之一例斯伯牙所以永思鍾子郢人所以格斤不運也盖刻削者比肩而班狄擅絶手之稱援琴者至衆而䕫襄專知音之難廐馬千駟而騏驥有邈羣之價美人萬計而威施有超世之容盖有逺過衆者也且文章之與德行猶十尺之與一丈謂之餘事未之前聞夫上天之所以垂象唐虞之所以為稱大人虎炳君子豹蔚昌旦定聖諡於一字仲尼從周之郁莫非文也八卦生鷹隼之所被六甲出靈龜之所負文之所在雖賤猶貴犬羊之鞟未得比焉且夫本不必皆珍末不必悉薄譬若錦繡之因素地珠玉之居蜯石雲雨生於膚寸江河始於咫尺爾則文章雖為徳行之弟未可呼為餘事也或曰今世所為多不及古文章著述又亦如之豈氣運衰殺自然之理乎抱朴子答曰百家之言雖有歩起皆出碩儒之思成才士之手方之古人不必悉减也或有汪濊曠合契作者内闢不測之深源外播不匱之逺流其所祖宗也髙其所紬繹也妙變化不繫滯於規矩之方圓旁通不凝閡於一塗之逼促是以偏嗜酸鹹者莫能識其味用思有限者不能得其神也夫應龍徐舉顧盻凌雲汗血緩歩呼吸千里而螻螘怪其無階而髙致駑蹇患其過己之不漸也若夫馳驟於詩論之中周旋於傳記之間而以常情覽巨異以褊量測無涯以至粗求至精以甚淺揣甚深雖始自髫齓訖于振素猶不得也夫賞其快者必譽之以好而不得曉者必毁之以惡自然之理也於是以其所不解者爲虗誕慺敬也力侯切誠以爲爾未必違情以傷物也又世俗率神貴古昔而黷賤同時雖有追風之駿猶謂之不及造父之所御也雖有連城之珍猶謂之不及楚人之所泣也雖有擬斷之劒猶謂之不及歐冶之所鑄也雖有起死之藥猶謂之不及和鵲之所合也雖有超羣之人猶謂之不及竹帛之所載也雖有益世之書猶謂之不及前代之遺文也是以仲尼不見重於當時大見薄於比肩也俗士多云今山不及古山之髙今海不及古海之廣今日不及古日之今月不及古月之朗何肯許今之才士不减古之枯骨重所聞輕所見非一世之所患矣昔之破琴剿絃者諒有以而然乎抱朴子外篇卷三十二終抱朴子外篇卷三十三晋丹陽洪稚川著漢過抱朴子曰歴覽前載逮乎近代道㣲俗弊莫劇漢末也當塗端右閹官之徒操弄神噐秉國之鈞廢正興邪殘仁害義蹲背憎即聾從昧同惡成羣汲引姦黨吞財多藏不知紀極而不能散錙銖之薄施振清㢘之窮儉焉進官則非多財者不達也獄訟則非厚貨者不直也官髙勢重力足㧞才而不能發毫之片言進益時之翹俊也其所用也不越於妻妾之戚屬其惠澤也不出乎近習之庸莫戒臧文位之譏靡追解狐㤀之義分禄以擬王林致士以由方囬故列子比屋而門無鄭陽之恤髙概成群而不遭暴生之薦抑挫獨立推進附己此樊所以掩口馮唐所以永慨也干時率皆素飡偷容掩德蔽賢忌有功而危之疾清白而排之諱忠讜而陷之惡特立而擯之柔媚者受崇之祐方稜者訕棄之患飬豺狼而殱驎虞殖枳棘而剪椒桂於是傲兀不檢丸轉萍流者謂之偉大量苛碎峭嶮懐螫挾毒者謂之公方正直令色警惠有貎無心者謂之機神朗徹利口小辯希指巧言者謂之標領清妍猝突萍鷽驕矜輕侻者謂之巍峩瑰桀嗜酒好色闒茸無疑者謂之率任不矯求取不廉好奪無足者謂之淹矌逹節蓬髪䙝服逰集非者謂之通美汎愛反經詭聖順非而博者謂之莊老之客嘲弄嗤領凌尚侮慢者謂之蕭豁雅韻毁方投圓面從響應者謂之絶倫之秀憑倚權豪推貨履徑者謂之知變之竒㸔文書望空下名者謂之業大志髙仰賴強親位過其才者謂之四豪之匹輸貨勢門以市名爵者謂之輕財貴義結黨合譽行與口違者謂之以文㑹友左道邪術假託怪者謂之通靈神人卜占小數誑禍福者謂之知來之妙馬弄矟切山角一夫之勇者謂之上將之元合離道聽偶俗而言者謂之英才碩儒若夫體亮行髙神清量逺不諂笑以取恱不曲言以負心含霜履雪義不茍合據道推方嶷然不羣風雖疾而枝不撓身雖困而操不改進則切辭正論攻過箴闕退則端誠杜私知無不為者謂之闇騃従苦夙興夜寐退食自公憂勞損益畢力為政者謂之小噐俗吏於是明哲色斯而幽遁髙俊括囊而佯愚疏賤者奮飛以擇木縶制者曲從而朝隠知者不肯吐其秘筭勇者不為致其果毅忠謇離退姦凶得志邪流溢而不可遏也偽塗闢而不可杜也以臻乎凌上替下盗賊多有䆠者奪人主之威三九死庸豎之手忠賢望士謂之黨人囚捕誅鋤天下嗟嗷無罪無辜閉門遇禍微煙起於蕭牆而飈焚徧於宇宙淺隙發於膚寸而波濤漂乎四極金城屠於庶冦湯池杭於一葦勁鋭望塵而氷泮征人倒戈而奔北飛鋒荐於扆闥左衽掠於禁省禾黍生於廟堂榛莠秀乎玉階雲觀變爲狐兎之薮象魏化爲虎豹之蹊東序烟燼於委灰生民蟭淪於淵火凶家害國得罪竹帛良史無褒言金石無徳音夫何哉失人故也抱朴子外篇卷三十三終抱朴子外篇卷三十四晋丹陽洪稚川著吳失抱朴子曰吳之杪季殊代同疾知前失之於彼不能改絃於此鑒亂亡之未逺而躡傾車之前軌覩枳首之争苺而忘同身之禍笑蟣虱之宴安不覺事異而患等見競濟之舟沈而不知殊塗而溺均也余生於晉世所不見余師鄭君具所親悉毎誨之云吳之挽世尤劇之病賢者不用滓充序紀綱弛紊吞舟多漏貢舉以厚貨者在前官人以黨强者為右匪富匪勢窮年無冀徳清行髙者懐英逸而抑淪有財有力者躡雲物以官躋主昏於上臣欺於下不黨不得不競不進背公之俗彌劇正直之道遂壊於是斥鷃因驚風以凌霄朽舟託迅波而電邁鴛鳯卷六翮於叢棘鷁首滯潢汙而不擢矣秉維之佐牧民之吏非母后之親則阿諂之人也進無補過拾遺之忠退無聴訟之幹虚談則口吐氷霜行己則濁於泥潦莫媿尸禄之剌莫畏致戎之禍以毁譽為織以威福代稼穡車服則光可以鑒豐屋則羣烏爰止叱咤疾於雷霆禍福速於神勢利傾於君儲積富乎公室出翟黄之衛從入遊玉根之藻棁僮僕成軍閉門為市牛羊掩原隰田池布千里有魚滄濯裘之儉以趙宣平仲之名内崇陶侃文信之訾實有安昌董鄧之汙雖造賔不沐嘉㫖之俟飢士不蒙升合之救而金玉滿堂伎妾溢房啇販千艘腐穀萬庾園囿擬上林館第僣太極粱肉餘於犬馬積珍䧟於帑藏其接士也葭莩之薄其自奉也有盡理之厚或有不開律令之篇卷而大理之位不識謹案之所置而處機要之職不知五經之名目而饗儒官之禄不閑尺之寒暑而坐著作之地筆不狂簡而受駮議之榮低眉垂翼而充奏劾之選不辨人物之精粗而委以品藻之政不知三才之軍勢而軒昂節盖之下屢為奔北之辱將而不失前鋒之顯號不别菽麥之同異而沗叨顧問之近任夫魚質龍文似是而非遭水而喜見即悲雖臨之以斧之威誘之以傾城之寳猶不能奮鉛鋒於犀兕騁駑蹇以追風非不忌重誅也非不恱美賞也體不可力無自柰何而欲與之輯熈百揆濟大務猶託萬鈞扵尺舟之上求千鍾於升合之中紲芻狗而責盧鵲之效鷄鶩而崇鷹揚之功其不可用亦較然矣吳主不此之思不加夕佞諂凡庸委以重任危機急於彍弩亡徴著扵日月而自謂安於峙嶽唐虞可仰也目力疲於綺粲而不以覽庶事之得失耳聦盡於淫音而不以證獻言之邪正榖帛靡於不而不以賑戰士之凍餒心神恱於愛媚而不以念存亡之理盖輕乎崇替之源而忽乎宗廟之重者也鄭君又稱其師左先生隠居天柱山不營禄利不友諸侯然心願太平憂桑梓乃慨然永歎於蓬屋之下告其門生曰漢必寢耀黄精載起纉樞紐於太㣲廻紫盖於鶉首聮天理物光宅東夏惠風於區外澤洽乎宇内重譯接武貢楛古侯切盈庭蕩蕩巍巍格于上下承平字文因循甚易而五絃謐響南風不詠上不獲㳟己之逸下不聞康哉之歌飛龍翔而不集淵虬蟠而不躍驎虞翳於㝠昧朱華牙而未秀隂陽相沴寒燠繆節七政告凶陵谷易所殷雷鞫磕於龍潜之月凝霜肅殺乎朱明之運玉燭不照沈醴不涌郊場多壘嘉生不遂其豈他哉誠由四凶不去元凱不舉用者不賢賢者不用也然髙槪逺量懐玉守靜㓗志無欲於物藏噐淵洿得意遺世非禮不動非時不見困而無悶窮而不悔樂天任命混一榮辱進無恱色退無戚容者固有伏死乎甕牗安肯衒沽以進趨掲其不貲之寳以競燕石之售哉孔墨之道昔曾不行孟軻楊雄亦居困否有徳無時有自来耳世無離朱皂白混焉時乏管青騏蹇糅焉磧礫積於金匱瑾瑶委乎溝洫匠石而遐淪梓豫忽而莫識己矣悲夫我生不辰弗先弗後將見吳土之化為晉域南民之變成北也言猶在耳而孫氏輿櫬抱朴子聞之曰二君之言可為来戒故録于篇欲後代知有吳失國匪降自天也若茍諱國惡纎介不貶則董狐無貴於直筆賈誼將受譏於過秦乎抱朴子外篇卷三十四終抱朴子外篇卷三十五晋丹陽洪稚川著守塉抱朴子曰余友人有潜居先生者慕寢丘之莫爭簡塉土以葺宇銳精藝文意忽學稼屢失有年飢色在顔或人難曰夫知禮在於廪實施慱由乎貨豐髙出於有餘儉生乎不足故十千美於詩人食貨首乎八政躬稼基克配之業耦耕有不改之樂竒士之居也進則侣鴻鸞以振翮退則參陶白之理治仕必覇王居必千金是以昔人必科膏壤以分利勤四體以稼穡播原菽之與與茂嘉蔬之翼翼收麰秬之千倉積我庾之惟億出連以游畋入候服而玉食而先生之宅此也亢陽則出谷颺塵重隂則㴞天凌丘陸無含秀之苖水無吐穗之株稗糲曠扵圌廪薪㸑廢於庖厨怡爾執待免之志淡然無去就之謨吾恐首陽之事必見今於丹山之困可立而湏人為子寒心子何晏然而弗憂也夫覩機而不作不可以言明安土而不移衆庻之常事豈翫鮑者忘蘭而大迷者易性乎何先生未寤之乆也鄙人惑焉不識所謂夫衮冕非禦鏑之服典誥非救飢寒之具也胡不眎沃衍於四郊躬田畯之良業捨六藝之迂闊收萬箱以賑乏乎潜居先生曰夫聵者不可督之以分雅鄭瞽者不可責之以别丹漆井鼃不可語以滄海庸俗不可以經術吾子茍知老農之小功未喻面牆之巨拙何異拾瑣沙而捐隋和向炯燭而背白日也夫好尚不可以一概杚趨不可以彼我易也夫欲隮閬風陟嵩華者必不留行於丘垤意在乎㳺南溟汎滄海者豈睱逍遥於潢洿是以注清聽於九韶者巴人之聲不能恱其耳烹大牢饗方丈者荼蓼之味不能甘其口鵾鵬戾赤霄以髙翔鶺鴒傲蓬林以鼓翼洿隆殊途亦飛之極晦朔甚促朝菌不識蜉蝣忽忽於寸隂野馬六月而後息鯈鮒汎濫以暴鱗靈虬勿用乎不測行業乖舛意何可得余雖藜飡之不充而足於食矣故列子不以其乏而貪鄭陽之禄曾參不以其貧而易晉楚之富夫收微言扵將墜者周孔之遐武也情孳孳於為利者孟叟之罪人也造逺者莫䏻兼通扵岐路有為者莫䏻並舉於耕學體瘁而神豫亦何間於居約且又處塉則勞勞則不學清而清至矣居沃則逸逸則不學奢而奢来矣清者福之所集也奢者禍之所赴也福集則雖㣲可著雖衰可興焉禍赴則雖強可弱雖存可亡焉此不期而必㑹不招而自来者也故君子欲正其末必端其本欲輟其流則遏其源故道德之功建而奓靡之門閉矣姜望至德而佃不復種重華大聖而漁不償網然後玉璜表營丘之祚大功有二十之髙何必譏之以惰而察才以相士乎夫二人分財取少為㢘余今讓天下之豐沃處兹之埆安昌之膏腴取北郭之無欲誠萬物之可細亦何徃而不足哉北辰以不改為衆星之尊五嶽以不遷為羣望之宗蟋蟀屢移而不貴禽魚饜深則逢患方將墾九典之蕪薉播六德之嘉厥田邈扵上土之科其收盈乎天地之間何必耕也為務哉昔衣以弃財止盗庾氏以推璧厲貪疏廣散金以除子孫之禍叔敖取塉以弭可欲之憂牛缺以載珍致冦陶谷以多藏召殃得失較然可無鑒乎於是問者抑然良乆口張而不䏻嗑首俛而不䏻仰慨而嗟乎始悟立不朽之言者不以産業汨和追下帷之績者不以窺園㳙目子以鶵之甘呼鴛擗蟹之計要猛虎豈不陋乎鄙哉子之不夙知也抱朴子外篇卷三十五終抱朴子外篇卷三十六晋丹陽洪稚川著安貧抱朴子曰昔漢火寢耀龍戰虎爭九有幅裂三家據有樂天先生者避地蓬轉播流岷益始處昵於文休未見知於孔明而言髙行方獨立不羣時人憚焉莫之或與時二公之力不䏻違衆遂令斯生沈抑衡蓽齒漸桑榆而韋布不改而時主思賢不聞不知當途之士莫舉莫貢潜側武之陋巷竄䋲樞之蓬屋進廢經世之務退忘治生之事藜飡屢空朝不謀夕於是偶俗公子造而詰之曰蓋聞有伊吕之才者不乆滯於窮賤懐猗頓之術者不長處於飢寒逹者貴其知變智士驗乎不匱故范生出則㓕吳覇越為命世之佐入則貨殖營生累萬金之貲夫貧在六極富在五福詩美哿矣易貴聚人垂餌香則鱣鮪来懸賞厚則果毅奮長卿所以解犢鼻而擁朱旄曲逆所以下席扉而享茅土不韋所以食十萬之邑絳候所以㧞囹圄之困也故下郷儉而獲悔咎之辱漂嫗豐而千金之報先生無少伯之竒略專銳思乎六經忽絶粻切歩良之實禍慕不朽之虗名恥詭遇以干禄羞衒沽以要榮冀西伯之方畋俟黄河之將清甘列子之菜色邈全神而遺形何異圖畫騏驥以代徒行之勞遥指海水以解口焦之渇張魚網扵峻極之巔施釣緍於修木之末雖自以為得所猶未免乎迂闊也事無身後之功物無違時之盛今海内分英雄力競象龔滔天猾夏放命駑蹇星馳以兼路豺狼口而交爭當投以訟屈素士䝉塵以履徑純儒釋皇道而治五霸之術碩生弃四科而恤月旦之評筐篚實者進於草萊乏資地者退於朝廷握黄白者排金門而陟玉堂誦方䇿者結世讎而委泥濘贄幣濃者瓦石成珪璋請託薄者龍駿弃林坰黨援多者偕驚飈以凌雲交結狹者侣跛鼈以沈泳夫丸泥已不䏻遏彭蠡之沸騰獨賢亦焉䏻反流遁之失正今先生入無儋石之儲出無束修之調徒含章如龍鳯文如虎豹吐之如波濤陳之如錦繡而凍餓於環堵何計䟽之可弔奚不汎輕舟以託迅御飛帆以逺之交瑰貨於朔南收金碧扵九疑廸崔烈之遐武縻好爵於清時徒疲勞於述作豈蟬蛻之有期也獨苦身以為名乃黄老之所嗤也樂天先生答曰六藝備研八索必該斯則富矣振翰摛藻德音無窮斯則貴矣求仁仁至旃焉如夫棲重淵以頥靈外萬物而自得遺紛埃於險塗澄精神於黙不窺牖以遐覽判㣲言而靡惑雖復設之以台猶爾而弗革也曷肯憂貧而與賈竪爭利戚窮而與凡瑣競逹哉吾子茍知商販可以崇寳耕也可以免飢不識逐麋者不顧兎道逺者其到遲也且夫尚父之鼓刀素首乃吐竒也萬鈞之為重衝飈不䏻移簫韶未九成靈鳥不紆儀也是以俟扶揺而登蒼霄者不充詘扵蓬蒿之杪騁蘭筋以陟六萬者不爭塗乎蹇驢之羣大孝必畏辱親之險故子春戰悸於下堂上智不貴難得之財故唐虞捐金而抵璧明哲消禍於未来知士聞利則慮害而吾子訊僕以汎舟孳孳於潤屋勸隋珠之彈雀探虎口以奪肉輕遺體於不測觸重險以逺至忘髪膚之明戒尋乾沒扵難冀若乃焚輪傾巖木㧞石飛陽候山峙洪濤㠑巍輕艘塵漂力與心違徒嗟泣而罔逮乃悟逹者之見㣲也昔囬憲以清苦稱髙陳平以無金免危廣漢以好利䘮身牛缺以載寳灰糜匹夫枉死於懐璧豐狐召災以美皮今吾子督余以誨盗之業敦余以召賊之䇿進酖酒以獻酬非養夀之忠益夫士以三墳為金玉五典為琴筝講肆為鍾皷百家為笙簧使味道者以辭飽酣徳者以義醒超流俗以髙蹈軼億代而揚聲方長驅以獨徃何貨賄之穢情夫藏多者亡厚好謙者忌盈含夜光者速剖循覆車者必傾過載者沈其舟慾勝者殺其生盖下士所用心上德所未營也於是問者茫然自失請備門生之末編永寳長生之良方焉抱朴子外篇卷三十六終抱朴子外篇卷三十七晋丹陽洪稚川著仁明抱朴子曰門人共論仁明之先後各據所見乃以諮余余告之曰三光垂象者乾也厚載無窮者坤也乾有明而兼仁坤有仁而無明卑髙之數不以邈乎夫唯聖人與天合德故唐堯以欽明冠典仲尼以明義首篇明明在上元首之尊稱也明哲保身大雅之絶蹤也蜎飛蝡動亦有仁故其意愛於長育哀傷著於啁噍子笑切嚼也上竹交切下然赴阬穽而無猜入罻羅而不覺有仁無明故並趨禍而攸失熾潜景以易咀生結棟宇以免巢穴選禾稼以代毒烈制衣裳以改祼役舟楫以濟不通服牛馬以息負歩序等威以鎮禍亂造噐械以戒不虞創書契以治百官制禮律以肅風教皆大明之所為非偏人之所辯也夫心不違仁而明不經國危亡之禍無以杜遏亦可知矣夫料盛衰於未兆探機事之無形指倚伏於理外距浸潤於根生者明之功也垂惻隠於昆蟲雖見犯而不校覩觳觫而改牲避行葦而不蹈者仁之事也爾則明者才也仁者行也殺身成仁之行可力為而至鑒測幽之明難妄假精粗之分居然殊矣夫體不忍之仁無臧否之明則心惑偽真神亂朱紫思筭不分邪正不識不逮安危則一身之不保何暇立以濟物乎昔姬公非無友于之愛而泣涕以㓕親石碏非無天性之慈而割私以義斷恩仁用明以計抑仁仁可時廢而明不可無也湯武逆取順守誠不仁也應天革命以其明也徐偃修仁以朝同班外墜城池之險内無戈甲之備亡國破家不明之禍也門人曰仲尼歎仁為任重而道逺又云人而不仁如禮何若聖與仁則吾豈敢孟子曰仁宅也義路也人無惻隠之心非仁也三代得天下以仁失天下以不仁此皆聖賢之格言竹素之顯證也而先生貴明未見典據小子蔽闇所惑焉抱朴子答曰古人云好仁不好學其蔽也愚子近之矣曩六國相吞豺虎力競髙權詐而下道德尚殺伐而廢退讓孟生方欲抑頓貪殘褒隆仁義安得不勤勤諄諄獨稱仁邪然未有片言云仁勝明也譬猶疫癘之時醫巫為貴異口同辭唯論藥石豈可便謂鍼艾之伎過於長生乆視之道乎且吾以為仁明之事布於方䇿直欲切理示大較精神舉一隅耳而子猶日用而不知云明事之無據乎乾稱大明終始六位時成是立天以明無不包也坤云至哉萬物資生是地徳仁承順而已先後之理不亦炳然詩云明明上天照臨下土明明天子令問不已易曰王明並受其福幽賛神明神而明之此則明之與神合體誠非純仁所䏻企擬也孔子曰聰明神武不云聦仁又曰昔者明王之治天下不曰仁王春秋傳曰明德唯馨不云仁德書云元首明哉不曰仁哉老子歎上士則曰明白四逹其衰薄則曰失道而後徳失德而後仁易曰王者南靣向明不云向仁也我欲仁斯仁至矣又曰為仁由己斯則人人可為之也至於聦明何可督哉故孟子云凡見赤子將入井莫不趨而救之以此觀之則莫不有仁心但厚薄之間而聰明之分時而有耳昔崔杼不殺晏嬰晏嬰謂抒為大不仁而有小仁然則姦臣賊子猶䏻有仁矣門人又曰易稱立人之道曰仁與義然則人莫大於仁也抱朴子答曰所以云爾者以為仁在於行行可力為而明入於神必湏天授之才非所以訓故也抱朴子外篇卷三十七終抱朴子外篇卷三十八晋丹陽葛州稚州著愽喻抱朴子曰盈乎萬鈞必起于錙銖竦秀凌霄必始於分毫是以行潦集而南就無涯之曠尋常積而玄圃致極天之髙抱朴子曰騁逸䇿迅者雖遺景而不勞因風凌波者雖濟危而不傾是以元凱分職而則天之勲就伊吕旣任而革命之功成抱朴子曰瓊艘瑶楫無渉川之用金弧玉弦無激矢之能是以介㓗而無政事者非撥亂之噐儒雅而乏治略者非翼亮之乎抱朴子曰閬風玄圃不借髙於丘垤懸結緑不假觀於瓊珉是以英偉不群而幽蕙之芬駭峻概獨立而衆禽之響振抱朴子曰氷炭不衒能於冷瑾瑜不證珍而體著是以君子恭巳不恤乎莫與至人尸居心遺乎毀譽抱朴子曰衝飊傾山而不䏻効力於技毫火鑠金石而不能耀烈以起涇是以淮隂善戰守而拙理治之策絳侯安社稷而乏承對之給抱朴子曰徇名者不以授命為難重身者不以近欲累情是以紀信甘灰糜而不恨楊朱同一毛於連城抱朴子曰小鮮不解靈虬之逺規鳬鷖不知鴻鵠之非匹是以耦耕者笑隙勝之投来淺識者孔明之抱膝抱朴子曰淳鈞之鋒驗於犀兕宣慈之良効於明試是以同否則元凱與斗筲無殊並任則騄騏與駑駘不異抱朴子曰噐非瑚簋必進鋭而退量擬伊吕雖發晚而到早是以鷦鷯倦翮猶不越乎蓬杪鳶雛徐起顧眄而戾蒼昊抱朴子曰否終則承之以泰晦極則清輝晨耀是以垂耳呉阪者騁千里之逸縈鱗九淵者凌虹霓以髙蹈抱朴子曰九斷四屬者藴藻所以表靈摧柯碎葉者蕙所以増芬是以夷吾桎檻而建匡合之績應侯困辱而著入秦之勲抱朴子曰所競者細則利同而讎結善否殊塗則事異而結生是以嫫母宿瘤惡見西施之艶容商臣小白憎聞延州之退耕抱朴子曰精鈍舛迹則凌遲者愧恨壯弱異科則扛鼎者見忌是以淮隂顯擢而庸悒懊以疾其超武安功髙而范睢談以破其事抱朴子曰必死之病不下苦口之藥朽爛之材不受琱鏤之是以比干匪躬而剖心於情忠田豐見㣲而夷戮於言直抱朴子曰嶧陽孤桐不無絃而激哀響大夏孤竹不能莫吹而吐清聲是以官卑者稷卨不能康庶績權薄者伊周不能臻升平抱朴子曰登峻者戒在於窮髙濟深者禍生於舟重是以西秦有思上蔡之李斯東越有悔盈抗之文種抱朴子曰剛柔有不易之質貞橈有天然之性是以百錬而南金不虧其真危困而烈士不失其正抱朴子曰不以其道則富貴不足居違仁捨義雖期頥不足吝是以卞隨負石以投淵仲由甘心以赴刃抱朴子曰卑髙不可以一槪齊餐廪不可以勸沮化是以惠施患從車之苦少莊周憂得魚之方多抱朴子曰出處有氷炭之殊躁靜有飛沉之異是以墨翟以重繭怡顔荘叟以遺世得意抱朴子曰適心者交淺而愛深忤神者接乆而彌乖是以聲同則傾蓋而居眤道異則白首而無憂抱朴子曰餘艎鷁首涉川之良噐也櫂之以北狄則沈漂於波流焉蒲梢汗血迅趨之駿足也御非造父則傾僨於嶮塗焉青萍豪曹剡鋒之精絶也操者非羽越則有自傷之患焉勁兵銳卒撥亂之神物也用者非明哲則速自焚之禍焉抱朴子曰天秩有不遷之常尊無禮猶犯遄死之重刺是以玄洲之禽獸雖能言而不得厠貴牲蛩蛩之負蹷雖寄命不得為仁義抱朴子曰謗讟不可以巧言弭實恨不可以虚事釋釋之非其道弭之不由理猶懐氷之遣冷重鑪以却暑逐光以逃影穿舟以止漏矣抱朴子曰明主官人不令出其噐忠臣居位不敢過其量非其才而妄授非所堪而任猶氷椀之盛沸湯葭莩之包烈火綴萬鈞於腐索加倍載於扁舟抱朴子曰豹狐之裘不為負薪施九成六變不為聾夫設髙唱逺謀不為庸愚吐忘身致果不為薄德作抱朴子曰民財匱矣而求不已下力竭矣而役不休欲怨難而不生規其寧之惟永猶斷根以續枝割背以禆腹刻目以廣明剜耳以開聦也抱朴子曰法無一定而慕權宜之隨時功不倍前而好屢變以偶俗猶剸髙馬以適卑車削附踝以就履斷長劎以赴短鞞割尺璧以納促匣也抱朴子曰止波之脩鱗不出窮谷之隘鸞棲之峻木不秀培塿之卑九疇之格言不吐庸猥之口金版之髙筭不出恒民之懐覩百抱之枝則足以知其本之不細覩汪濊之文則足以覺其人之淵䆳抱朴子曰桑林鬱藹無栢木之凄冽膏壤帶郭無解黔敖之然繭纊綈紈此之自出千倉萬箱於是乎生故識逺者貴本見近者務末抱朴子曰體粗者繫形知精者得神原始見終者有可推之緒得之未朕者無假物之因是以晝見天地未足稱明夜察分毫乃為絶倫抱朴子曰芳藻春耀不能離柯以乆鮮吞舟之魚不舎水而攝生是以名羙而實不副者必無沒世之風位髙而噐不稱者不免致冦之敗抱朴子曰忍痛苦之藥石者所以除伐命之疾嬰甲胄之重冷者所以扞鏑之集㓗操履之拘若者所以全㧞萃之業納拂心之至言者所以悟易方之惑也抱朴子曰鸞鳳競粒於庭場則受䙝於雞鶩龍麟雜厠於芻豢則見黷於六牲是以啇老棲峻以播遯世之操卞隨赴深以全遺物之聲抱朴子曰浚井不渫則混濘滋積嘉榖不芸則荑莠彌蔓學而不思則疑閡實繁講肆不精則長惑䘮功抱朴子曰積萬金於篋匱雖儉乏而不用則未知其有異於貧窶懐逸藻於胷心不寄意於翰素則未知其有别於庸猥抱朴子曰南威青琴姣冶之極而必俟盛以增麗囬賜游夏雖天才雋朗而實須墳誥以廣智抱朴子曰丹幃接網組帳重䕃則醜姿翳矣朱漆致錯塗炫耀則枯木隠矣是以六藝備則卑鄙化為君子衆譽集則孤陋邈乎貴逰抱朴子曰繁林翳薈則羽族雲萃玄淵浩汗則鱗群競赴德盛業廣則宅心者衆舎瑕録用即逺懐近集抱朴子曰尋飛䋲景之足而不能騁逸放於吕梁凌波泳淵之屬而不陟峻而攀危故離朱剖毫於百步而不能辯八音之雅俗子野合通靈之絶響而不能指白黒於咫尺抱朴子曰四聦廣闢則羲和納景萬仞虛已則行潦交赴故愽采之道弘則異聞畢集庭燎之輝舉則竒士扣角誹謗之木設則有過不知敢諌之鼓懸則直言必獻抱朴子曰言莫不褒堯而堯政不必皆得也舉世莫不貶桀而桀事不必盡失也故一條之枯不損繁林之蓊藹蒿麥冬生無解畢發之肅殺西施有所惡而不能减其羙者羙多也嫫母有所善而不䏻救其醜者醜篤也抱朴子曰身與名難兩濟功與神尠並全支離其德者苦而必安用以適世者樂而多危故鷙禽以擊拘縶言鳥以智慧見籠瓊瑶以符采剖判三金以琦玩冶鑠蘭以芬馨剪刈文梓以含音受伐是以翠虬覩化益而登玄雲靈值孟戱而反丹穴子永歎天倫之偉漆園悲繡之犧抱朴子曰萬麋傾角猛虎為之含牙千禽鱗萃鷙鳥為之握爪是以四國流言公旦而不遏謗者盈路子産而無以塞抱朴子曰威施之艶粉黛無以加二至之氣吹呼不能増是以懐英逸之量者不矜風格以示異體邈俗之噐者不恤小譽以狥通抱朴子曰麟止儀所患在少狐鳴梟呼世忌其多是以俊乂盈朝而求賢者未倦讒佞作威而忠貞者切齒抱朴子曰多力何必孟賁烏獲逸容豈唯鄭旦毛嬙飊迅非徒驊騮驌騻立斷未獨沉閭干將是以能立素王之業者不必東魯之丘治掩枯之仁者不必西鄰之昌抱朴子曰靈振響於朝陽未有惠物之益而莫不澄於下風焉鴟梟宵集於垣宇未有分之損而莫不掩耳而注鏑焉故善言之徃無逺不恱惡辭之来靡近不忤猶日月無謝於貞明枉矢見忘扵暫出抱朴子曰影無違形之状名無離實之文故背源之水必不揚長流以東漸非時之華必不能稽輝藻於氷霜抱朴子曰鋸牙之獸雖低伏而見憚揮斧之蟲雖跧形而不威故君子窮而不可輕小人軒冕逹而不足重抱朴子曰麟道遥大荒之表故無機穽之禍靈鶬振趐玄圃之峯以違罩羅之患何必曲穴而永懐怵何必衘蘆而慘畏容故充乎宰割之用者必愛乎芻豢者也給乎煎熬之膳者必安乎庭立者也抱朴子曰聦者貴於理遺音於千載之外而得興亡之迹明者珍於鍳群於寒瘁之中而抽匡世之噐夫聆繁㑹之響而顧問於庸工非延州之清也枉英逺之才而諮之於常人非獨見之竒識也故與不賞物者而論用凌儕之噐是使瞽者指五色也與妬勝已者而謀舉疾惡之賢是與狐議治裘也抱朴子曰鷙駿危苦於嶮峻之端不樂咈呼之役吉光飢渇於氷霜之野不願犧牲之飽孤竹不以絶粒易鹿臺之富子㢘不以困匱貿銅山之豐抱朴子曰志合者不以山海為逺道乖者不以咫尺為近故有䟦涉而游集亦或宻邇而不接抱朴子曰華衮粲爛非色之功嵩岱之峻非一簣之積故九子任而康凝之績熈四七授而佐命之勲著抱朴子曰翠虬無趐而天飛螣蛇無足而電鶩鼈無耳而善聞蚓無口而揚聲故臯繇喑而與辯者同功晉野瞽而與離朱齊明抱朴子曰官逹者才未必當其位譽羙者實未必副其名故鋸齒不能咀嚼箕舌不别味壺耳不能理音屩鼻不識氣釜目不能攄望舒之景牀足不能有尋常之逝抱朴子曰路人不能挽勁命中而識養由之射顔子不控轡振䇿而知東野之敗故有不能下棊而經目識勝負不徽絃而過耳觧鄭雅者抱朴子曰垂䕃萬畆者必出峻極之嶺㴞天襄陵者必發板桐之源邈世之勲必由絶倫之噐定傾之必吐冠俗之懐是以蟭螟之巢無乗風之羽溝澮之中無宵朗之琦抱朴子曰衝飊焚輪原火所以增熾也螢燭值之而反滅甘雨膏澤嘉生所以繁榮也而枯木得之以速朽朱輪華轂俊民之大寳也而負乗之而召禍鼎食萬鍾宣力之弘報也而逸才受之以覆餗抱朴子曰屠犀為甲給乎專征之服裂翠為華集乎后妃之首雖出幽谷遷于喬木然為二物之計未若棲竄於林薄攝生乎榛藪也故靈龜寧曳尾於塗中而不願巾笥之寳澤雉樂十歩之啄以違雞鶩之禍抱朴子曰徧才不足以經周用長不足以濟衆短是以雞知將旦不能究隂陽之暦數鵲識夜半不極晷景之道度山鳩知晴雨於將来不能明天文蛇螘知潜泉之所居不逹地理抱朴子曰禁令不明而嚴刑以靜亂廟筭不精而窮兵以侵鄰猶釤禾以討蝗蟲伐木以殺蠧蝎食毒以中蚤虱徹舎以逐雀鼠抱朴子曰銳鋒産乎鈍石明火熾乎闇木貴珠出乎賤蜯羙玉出乎醜璞是以不可以父母限重華不可以祖禰量衛霍也抱朴子曰志得則顔怡意失則容戚本朽則末枯源淺則流促有諸中者必形乎表發乎邇者必著乎逺抱朴子曰妍姿媚貎形色不齊而恱情可均絲竹金石五聲詭韻而快耳不異繳飛鉤沉罾舉罝抑而有獲同功樹勲立言出處殊塗而所貴一致抱朴子曰利豐者害後質羙者召災是以南禽殱於藻羽穴豹死扵文皮鱣鯉積而玄淵涸麋鹿聚而繁林焚金玉崇而冦盗至名位髙而憂責集抱朴子曰啇風宵肅則絺扇廢登危陟峻則輕舟棄干戈雲擾則文儒退䘮亂旣平則武夫黜抱朴子曰價直萬金者不待見其物而好惡可别矣條枝連抱者不俟圍其木而巨細可論矣故望洪濤之㴞天則知其不起乎潢汙之中矣觀翰草之汪濊則知其不出乎章句之徒矣抱朴子曰丹華緑草不拘於曲瘁之株紫芝芳秀不限於斥鹵之壤是以受玄珪以告成者生於四罪之門承歴數於文祖者出於頑嚚之家抱朴子曰善言居室則靡逺不應枉直不中則無近不離是以宋野有退舎之熒惑殷朝有外奔之昵屬四環至自少廣之表鹿馬變於蕭之裏抱朴子曰荆卿朱亥不示勇於怯弱之間孟賁馮婦不戈㦸於俚俠之群英儒碩生不細辯於淺近之徒逹人偉士不變晈察於流俗之中抱朴子曰盤旋揖讓非禦冦之容摜甲纓胄非廟堂之垂紳振佩不可以揮刃爭鋒規行矩歩不可以救火拯溺抱朴子曰乾坤陶育而庻物不識其惠者由乎其益無方也大人神化而群細不覺其施者由乎治之於未有也故可知者小也易料者少也抱朴子曰娥英任姒不以織為首稱湯武漢髙不以細行招近譽故澄視於三辰者不遑紆鑒於井谷清於韶濩者豈暇垂耳於桑間抱朴子曰膚表或不可以論中望貎或不可以核能仲尼似䘮家之狗公旦朴斵之材咎繇面如箕伊尹形若槁骸及龍陽宋朝猶土偶之冠夜光籍孺董鄧猶錦紈之裹塵埃也抱朴子曰勛華不能化下愚故教不行於子弟辛癸不能改上智故惡不染於三仁抱朴子曰至大有所不變極細有所不能奪故氷霜肅殺不能凋菽麥之茂熾暑鬰隆不消雪山之凍飈風蕩海不能使潜泉揚波春澤榮物不能使枯卉發華抱朴子曰泣血之寳仰礛䃴以摛景沉閭孟勞須椘砥以歛騮馹待王孫而致逺令質俟隱括而成德抱朴子曰棲鸞戢鸑雖飢渇而不願籠委於庖人之室乗黄天鹿雖幽飢而不樂蒭秣於濯龍之廐是以掇蜩之叟忘萬物於芳林垂綸之生忽執珪於南楚抱朴子曰方圓舛状逝止異歸故渾象尊於行健坤后貴於安貞七政四氣以周流成功五嶽六柱以峙靜作鎮是以宋墨楚中以載馳存國干木胡明以無為折衝抱朴子曰得意於丘園者身否而神泰役已以恤物者形逸而心勞故抱甕灌園者歡於台宰嘔餐茹者羙乎鼎食仗䇿去幽者形如腒腊夜以待旦者勤憂損命抱朴子曰仁忍有天淵之絶善否猶有無之覺騶虞側足以蹈虚豺狼掩群以害生虞卿捐相印以濟窮華公讓三事以推賢李斯疾勝己而殺韓非龎㳙患不如而刑孫臏抱朴子曰用得其長則才無或棄偏詰其短則觸物無可故輕羅霧縠冶服之麗也而不可以禦流鏑沉閭巨闕斷斬之良也而不可以挑脚刺抱朴子曰小疵不足以損大噐短疾不足以累長才日月挾蟲鳥之瑕不妨麗天之景黄河合泥滓之濁不害凌山之流奢僣不可以棄夷吾奪田不可以薄蕭何竊妻不可以廢相如受金不可以斥陳平抱朴子曰虎豹不能摶噬於波濤之中螣蛇不能登凌於不霧之日摯雉兎則鸞鳯不及鷹鷂引耕犁則龍麟不逮峙故武夫勇士無用乎晏如之世碩生逸才不貴乎力競之運抱朴子曰兩絆而項領則騏騄與蹇驢同矣失林而居檻則猨狖與貛貉等矣韜鋒而不擊則龍泉與鋸刀均矣才逺而任近則英俊與庸瑣比矣若乃求千里之迹於縶維之駿責匠世之勲於處碎之賢謂之不惑吾不信也抱朴子曰荼茹蒿者必無識甘之口棄瓊拾礫者必無甄珍之明薄九成而恱北鄙者吾知其不格靈祗而儀翔矣含英秀而杖常民者吾知其不能叙彛倫而臻升平矣抱朴子曰逹乎通塞之至理者不悁悒於窮否審乎自然之有命者不逸豫於道行故縈抑淵洿則遺愠悶之心振耀宸扆而無得意之色三仕三巳則其人也抱朴子曰否泰繫乎運窮逹不足論士得失在乎適偶榮辱不可以才量時命不可以力求遭遇不可以智違故尚父者老婦之棄夫韓信者乞食之餓子蕭公者斗筲之吏黥布者刑黜之亡當其行龍姿於虺蜥之中卷鳯趐乎斥鷃之群則彼龍后謂為其倫抱朴子曰四靈翳逸而為隆平之符幽人嘉遁而為有國之寳何必司晨而銜鑣覊紲於憂責哉有用人之用也無用我之用也狥身者不以名汨和修生者不以物累已抱朴子曰量才而授者不求功於噐外揆能而受者不負責於力盡故㓕熒燭者不煩滄海扛斤兩者不事烏獲運薪輦鹽不宜枉騏驥之脚碎職任安足屈獨行之俊矣抱朴子曰甽澮之流不能運大白之艘升合之噐不能容千鍾之物熠燿不並表微之景常才不能别逸倫之噐蓋造化所假聰明有本根也抱朴子曰郢人美下里之滛鼃而薄六莖之和音庸夫好悦耳之華譽而惡利行之良規故宋玉舍其延靈之精聲智士招其獨見之遠謀抱朴子曰瓊珉山積不能無挾瑕之噐鄧林千里不無偏枯之木論珍則不可以細疵棄巨美語大則不可以少累廢其多故叛主者良平也而吐六奇以安上群盗者彭越也而建弘勲於佐命抱朴子曰五嶽巍峩不以藏疾傷其極天之髙滄海滉瀁不以含垢累其無涯之廣故九德尚寛以得衆宣尼汎愛而與進抱朴子外篇卷三十八終抱朴子外篇卷三十九晉丹陽葛洪稚川著廣譬抱朴子曰立德踐言行全操清斯則富矣何必玉帛之崇乎高尚其志不降不辱斯則貴矣何必青紫之兼拕也俗民不能識其度量庸夫不得揣其銓衡是則高矣何必凌雲而蹈霓乎問者莫或測其淵流求者未有覺其短乏是則深矣何必洞河而淪海乎四海茍備雖室有懸磬之窶可以無羡乎鑄山而煮海矣身處鳥獸之群可以不渇乎朱輪而華轂矣抱朴子曰潜靈俟慶雲以騰竦棲鴻階勁風以凌虚素鱗湏發而躍白雉待公旦而來姜老值西伯而投磻溪之綸韓英遭漢高乃騁撥亂之才抱朴子曰澄精神於玄一者則形噐可忘邈高節以外物者則富貴可遺故支離之偉造化而怡顔北人箕叟棲嵩岫而得意焉抱朴子曰粗理不可浹全事不可畢兼故懸象明而可蔽山川滯而或移金玉剛而可柔堅氷宻而可離公旦不能與伯氏跟絓於馮雲之峻仲尼不與吕梁較伎於百仭之溪抱朴子曰震雷不能細其音以恊金石之和日月不能其耀以就曲照之惠大川不䏻促其涯以適速濟之情五岳不能削其峻以赴陟者之欲故廣車不能脅其轍以茍通於狹路髙士不撙其節以同塵於隘俗抱朴子曰隂陽以廣陶濟物三光以普照著眀嵩華以藏疾為曠北溟以含垢稱大碩儒以與進弘道逺教以博愛容衆抱朴子曰靈之甲不必為戰施麟角鳳爪不必為闘設故雋生不釋劒於平世擊柝不輟備於思危抱朴子曰南金不為處幽而自輕瑾瑶不以居深而止㓗志道者不以否滯而改圖守正者不以莫賞而茍合抱朴子曰豋玄圃者悟丘阜之卑浮溟海者識池沼之褊披九典乃覺面之篤蔽聞至道乃知拘俗之多迷抱朴子曰渾沌之原無皎澄之流毫之根無連抱之枝分寸之燼無炎逺之熱隙穴之中無炳蔚之群鉤曲之形無繩直之影參差之上無整齊之下抱朴子曰不覩瓊琨之熠爍則不覺瓦礫之可賤不覩虎豹之或蔚則不知犬羊之質漫聆白雪之九成然後悟巴人之極鄙識儒雅之汪濊爾乃悲不學之固陋抱朴子曰無當之玉盌不如全用之埏埴寸裂之錦黻未若堅完之韋布故夏之無禮不如逐之皎潔富貴之多罪不如貧賤之履道抱朴子曰猛獸不摶扵度外鷹鷂不揮翮以妄擊若廟筭旣内不揆德進取又外不量力猶輕羽之投洪鑪飛雪之委沸鑊朝之試干將羔犢之犯虣虎也抱朴子曰三辰蔽於天則清景暗扵地根荄蹷於此則柯條瘁於彼道失於近則禍及扵逺政繆於上而民困於下抱朴子曰務於逺者或失於近治其外者或患生乎内覆頭者不必能令足不濡蔽腹者不必令背不傷故秦始築城遏胡而禍發幃幄漢武懸旌萬里而變起蕭墻抱朴子曰人才無定珍噐用無常道進趨者以適世為奇役御者以合時為妙故玄氷結則五明捐隆暑熾則裘鑪退高鳥聚則良弓發狡兎多則盧鵲走干戈興則武夫韶夏作則文儒起抱朴子曰激修流揚朝宗者不可以背五城而跨積石舒翠葉吐丹葩者不可以舍洪荄而去繁柯敗源失本尟不枯汔叛聖違經理不弘濟抱朴子曰四瀆辯源五河分流赴卑注海殊塗同歸色不均而皆艷音不同而咸悲香非一而並芳味不等而悉美抱朴子曰物貴濟事而為其末化俗以德而言非其本故緜布可以禦寒不必貂狐淳素可以匠物不在文辯抱朴子曰衝飊謐氣則轉蓬山峙脩綱旣舒則萬目齊理故未有上好謙而下慢主賤寶而俗貧抱朴子曰事有縁㣲而成著物有治近而致逺故修步武之池而引沈鱗於江海豐朝陽之林而延靈禽於丹穴設象於槃盂而翠虬降於玄霄委灰於尺水而望舒變於太極是以晉文囬輪於勇蟲而壯士雲赴句踐曲躬扵怒鼃而戎卒輕死九九顯而扣角之俊至枯骨掩而參分之仁洽抱朴子曰膏壤在荄而柯葉含榮率俗以身則不言而化故有唐以鹿裘臻太平齊桓以捐紫止奢競章華構而豐屋之過成露臺輟而玄黙之風行抱朴子曰聦者料興亡於遺音之絶響明者覿機理於玄㣲之未形故越人見齊桓不振之徴於未覺之疾箕子識殷人鹿臺之禍於象箸之抱朴子曰二儀不能廢春秋以成嵗明主不能舍刑德以致治故誅貴所以立威賞賤所以勸善罰上達則姦萌破而懦弱所能用也惠下逮則逺人懷而非儉吝所能辯也抱朴子曰浮滄海者必精占於風氣故保利涉之福善涖政者必戰戰於得失故享惟永之慶故闇君之所輕蓋明主之所重也亡國之所棄則治世之所行也抱朴子曰毫蹉於機則尋常違於的與奪失於此則善否亂於彼邪正混侔則彛倫攸斁功過不料則庻績以崩故明君賞猶春雨而無霖滛之失罰擬秋霜而無詭時之嚴抱朴子曰明銓衡者所重不可得誣也仗法度者所愛不可得也故得人者先得之於已者也失人者先失之於己者也未有得已而失人失已而得人者也抱朴子曰明主躬操威恩不假人以利噐暗主倒執干戈雖名尊而勢去故制慶賞而得衆者田常所以奪齊也擅威福而專朝者王莽所以漢也抱朴子曰常制不可以待變化一塗不可以應無方刻船不可以索遺劒膠柱不可以諧清音故翠蓋不設於晴朗朱輪不施於涉川味淡則加之以鹽沸溢則增水而减火抱朴子曰丹書鐵劵刺牲㰱血不能救違約之弊則難以結繩檢矣五刑九伐赤族之盛不足以止覬覦之姦則不可以舞干化矣是以書有世重之文易有隨時之冝抱朴子曰人有識真之明者不可欺以偽也有揣深之智者不可誑以淺也不然以虺蛇為應龍狐鴟為麟鳯矣抱朴子曰世有雷同之譽而未必賢也俗有讙譁之毀而未必惡也是以迎而許之者未若鑒其事而試其用逆而距之者未若聽其言而課其實則佞媚不以虚談進良能不以孤弱退駑蹇輟望於大輅戎虬揚鑣而電騁則功胡大而不可建道胡逺而不可到抱朴子曰濳朽之木不能當傾山之風舎隟之崖難以值滔天之濤故七百之祚三十之世非徒牧野之功倒戈之敗鹿臺之禍不始甲子之朝其彊乆矣其亡尙矣抱朴子曰貴逺而賤近者常人之用情也信耳而疑目者古今之所患也是以秦王歎息於韓非之書而想其為人漢武慷慨於相如之文而恨不同世及旣得之終不能拔或納讒而誅之或放乎冗散此蓋葉公之好偽形見真龍而失色也抱朴子曰摩尼不宵朗則無别於磧礫化鯤不凌霄則靡殊於桃蟲綿駒吞聲則與喑人為群逸才沈抑則與凡庸為伍故䱇鰍褻絳虬於淵洿駑蹇黷駿騄於坰野者不識彼物静與之同動與之異抱朴子曰棄金璧於塗路則行人止足委錦紈於泥濘則見者驚咄若夫放高世之士於庸鹵之伍捐經國之噐於困滯之地而談者不訟其屈達者不拯其窮或貴其文而忽其身或用其策而忘其功斯之為病由來乆矣抱朴子曰開源不億仭則無懷山之流崇峻不凌霄則無彌天之雲財不豐則其惠也不博才不逺則其辭也不贍故覩盈丈之牙則知其不出徑寸之口見百尋之枝則知其不附毫末之木抱朴子曰靈鳯所以晨起丹穴夕萃軒丘日未移晷周章九陵凌風蹈雲不䟾不閡者以其六翮之輕勁也夫良才大智亦有國之六翮也抱朴子曰淇衞忘歸不能無絃而逺激振塵之音不能無噐而興哀超俗拔萃之德不能立功扵未至之時抱朴子曰朱緑之藻不秀於枯柯傾山之流不發乎涸源熠耀之宵焰不能使萬品程形志盡勢利不能使芳風邈世抱朴子曰重淵不洞地則不能舎螭龍吐吞舟峻山不極天則不能韜琳琅播雲雨立德不絶俗則不能収美聲著厚實執志不絶群則不能臻成功銘弘勲而夫凡朝為蜩翼之善夕望丘陵之益猶立植黍稷坐索於豐収也抱朴子行無邈俗之標而索高世之稱體無道藝之本而營朋黨之末欲以清貴於當世播德音於將來猶褰裳以越滄海企佇而躍九玄抱朴子曰泥龍雖藻繪炳蔚而不堪慶雲之招撩禽雖琱琢玄黄而不任凌風之舉芻狗雖以金翠而不能躡景以頓逸近才雖豐其寵禄而不能令天清而地平抱朴子曰毒粥旣陳則旁有爛腸之鼠明燎宵舉則下有聚死之蟲芻豢之豐則鼎爼承之才小任大則泣血漣如桑霍為戒厚矣范䟽之鑒明矣抱朴子曰滄海揚萬里之濤不能歛山峯之塵驚風摧千仭之木不能拔弱草之荄貙虎虣闞不能威蚊䖟冠世之才不能合流俗抱朴子曰堅志者功名之主也不惰者衆善之師也登山不以艱險而止則必臻乎峻嶺矣清苦不以窮否而怨則必永其令聞矣抱朴子曰和鵲雖不長生而針石不可謂非濟命之噐也儒者雖多貧賤而墳典不可謂非進德之具也播種有不者矣而稼穡不可廢仁義有遇禍者矣而行業不可惰抱朴子曰重載不止所以沉我舟也昧進忘退所以危我身也聚蝎攻本雖權安然必傾之徵也抱朴子曰玄雲為龍興非虺蜒所能招也飊風為虎發非狐狢之能致也是以大人受命則逸倫之士集玉帛幽求則丘園之俊起抱朴子曰金以剛折水以柔全山以高陊谷以卑安是以執雌節者無争雄之禍多尚人者有召怨之患抱朴子曰淮隂隱勇於跨下不損其龍躍而虎視也應侯韜奇於溺簀不妨其鸞翔而鳯起也或南面稱孤或宰緫台鼎故一抑一揚者輕鴻所以凌虛也乍屈乍伸者良才所以俟時也抱朴子曰焦螟之卑棲不肯為衘鼠之唳天玄蟬之㓗飢不願為蜋之飽是以禦寇不納鄭陽之惠曽參不美晉楚之寶抱朴子曰㣲飊不能揚大海之波毫芒不能動萬鈞之鍾是以漆園思惠有捐斤之歎伯氏哀期有剿絃之憤短唱不足以致弘麗之和勢利不足以移淡泊之心抱朴子曰熊羆不校捷於狐狸金鶚不競擊於小鷂是以張耳掩壯於抱關朱亥竄勇於鼓刀抱朴子曰懸魚惑以芳餌檻虎死於籠狐不可以釣緍致者必虬螭也不可以機穽誘者必麟虞也抱朴子曰夫雲翔者不知泥居之洿處貴者尟恕群下之勞然根朽者尋木不能保其千里之茂也民怨者堯舜不能恃其長世之慶也抱朴子曰凡木結根於靈山而匠石為之斤斧小鮮寓身於龍池而漁父為之息網罟蛟集鷹首則鳸鵦不敢啄鼠住虎側則狸犬不敢議抱朴子曰靈蔡黙然而吉凶昭晳於無形春鼃長譁而醜音見患於聒耳故聲希者響必巨辭寡者信必著抱朴子曰箕踞之俗惡盤旋之容髪之域憎章甫之故忠正者見排扵䜛勝之世雅人不容乎惡直之俗抱朴子曰升水不能救八藪之燔撮壤不能遏砥柱之沸騰寸刃不䏻刋長洲之林獨是不能止朋黨之非抱朴子曰千羊不能扞獨虎萬雀不抵一鷹庭燎攅舉不及羲和之末景百鼓並伐未若震霆之餘聲是以庸夫盈朝不能使彞倫攸叙英俊孤任足以令庻事根長抱朴子曰非分之達猶林卉之冬華也守道之窮猶竹栢之履霜也故識否泰扵獨見者雖刼以鋒鋭猶不失正而改塗焉安肯諂笑以偶俗乎體方貞以居直者雖誘以封國猶不違情以趨時焉安肯躐徑以取容乎抱朴子曰震雷輷而不能致音乎聾聵之耳重光麗天而不能曲景扵幽岫之中凝氷慘慄而不䏻凋款凍之華朱飊鑠石而不能靡蕭丘之木故至德有所不能移也抱朴子曰彍弩危機嚴鏃銜弦至可忌也而勇雉觸之而不猜闇政亂惡直妬能甚難測也而貪人競之而不避故飛鋒暴集而不覺禍敗奄及而不振是以愚夫之所恱乃達者之所悲也凡才之所趨乃大智之所去也抱朴子曰風不輟則扇不用日不入則燭不明華不墮則實不結岸不則谷不盈九有人安則韓白之功不著長君繼軌則伊霍之勲不成故病困乃重良醫世亂而貴忠貞抱朴子曰好榮故樂譽之欲多畏辱則憎毀之情急若夫通精元一合契造化混盈虛以同條齊得失於一指者愛惡未始有所繫窮通不足以滑和抱朴子曰與奪不汨其神者至粹者也利害不染其和者極醇者也浩浩乎非瓢觶所校矣茫茫乎非跬步所尋矣聲希所以為大音和寡所以崇我貴玄黄遼邈而不與其曠死生大矣而不以改其守常分細碎將胡恤焉抱朴子曰林繁則匠入矣珠美則蚌裂矣石舍金者焚鑠草任藥者剪掘刃利則先缺絃哀則速絶用以適已真人之寶也才合世求有伎之災也抱朴子曰准的陳則流鏑赴焉美名起則謗讟攻焉瑰貨多藏則不招怨而怨至矣噐盈志驕則不召禍而禍來矣抱朴子曰連城之寶非貧寒所能市也高世之噐非淺俗所識也然盈尺之珍不以莫知而暗其質逸倫之士不以否塞而薄其節樂天任命何怨何尤抱朴子曰大鵬無戒旦之用巨象無馳逐之才故蔣琬敗績於百里而為三台之標陳平困瘁於治家而懷六奇之略抱朴子曰明闇者才也自然而不可焉窮達者時也有㑹而不可力焉吕尚非早蔽而晚智然振素而僅遇韓信非初怯而末勇然危困而後達抱朴子曰奔驥不能及旣徃之失千金不能救斯言之玷故慱其施者未若防其㣲勤其求者不如寡其辭抱朴子曰烈士之愛國也如家奉君也如親則不忠之事不爲其罪矣仁人之視人也如已待䟽也猶宻則不恕之怨不爲其責矣抱朴子曰玄氷未結白雪不積則青松之茂不顯俗化不弊風教不頽則皎㓗之操不别在危國而沉賤故莊萊抗遺榮之高居亂而飢寒故曾列播忘富之稱抱朴子曰天居高而鑒卑故其網雖踈而不漏神聦明而正直故其道賞真而罰偽是以惠和暢於九區則七耀得於玄昊殘害著於品物則二氣謬於四八抱朴子曰天秩有罔極之尊人爵無違德之貴故仲尼雖匹夫而饗祀於百代辛癸為帝王而僕竪不願以見比啇老身愈賤而名愈貴幽厲位彌重而罪彌著齊王之生不及柳惠之墓秦王之宫未若康成之閭抱朴子曰影響不能無形聲以著餘慶不可以無德而招故唐堯為政七十餘載然後景星摛耀羊公積行黄髪不倦爾乃墜金雨集塗逺者其至必遲施後者其報常晚抱朴子曰理盡者不可責有餘一至者不可求兼濟故洪濤之末不能蕩浮萍衝風之後不颺輕塵勁弩之餘力不能洞霧縠西頽之落暉不能照山東抱朴子曰懸象雖薄蝕不可以比螢燭之貞耀黄河雖混渾不可以方沼沚之清澄山雖崩猶峻於丘垤虎雖瘠猶猛於豺狼抱朴子曰神農不九疾則四經之道不垂大禹不胼胝則玄珪之慶不集故救憂為厚樂之本暫勞為永逸之始抱朴子曰金鉤桂餌雖珍不能制九淵之沉鱗顯寵豐禄雖貴而不致無欲之幽人故吕梁有鵠立之夫河湄繁伐檀之民玉帛徒集於子陵之巷蒲輪虚及於徐生之門抱朴子曰觀殊好愛憎難同飛鳥覩西施而驚逝魚鼈聞九韶而深沉故衮藻之粲煥不能恱裸郷之目采凌之清音不能快楚之耳古公之仁不能喻欲地之狄端木之辯不能釋縶馬之庸抱朴子曰般旋之儀見憎於裸踞之鄉繩墨之匠獲忌扵曲木之肆貪婪饕餮者疾素絲之皎㓗比周實繁者讎高操之孤立猶賈豎之惡同利醜女之害國色抱朴子曰君子之升騰也則推賢而散禄庸人之得志也則矜貴而忽士施惠隆扵佞幸用才出乎小惠不與智者共其安而望有危而見救不與奇士同其歡而欲有戚而見恤猶災火張天方請雨於名山洪水凌空而伐舟於東閩不亦晚乎抱朴子外篇卷三十九終抱朴子外篇卷四十晋丹陽洪稚川著辭義或曰乾坤方圓非䂓矩之功三辰摛景非瑩磨之力春華粲煥非漸染之采蕙芬馥非容氣所假知夫至真貴乎天然也義以罕覿為異辭以不常為美而歴觀古今屬文之象尟能挺逸麗於毫端多斟酌於前言何也抱朴子曰清音貴於雅韻充諧著作珍乎判㣲析理故八音形噐異而鍾律同黼黻文物殊而五色均徒閑澁有主賔妍蚩有步驟是則緫章無常曲大庖無定味夫梓豫山積非班匠不能成機巧衆書無限非英才不能膏膄何必尋木千里乃構大厦神之言乃著篇章乎抱朴子曰夫才有清濁思有脩短雖並屬文參差萬品或浩養而不淵潭或得事情而辭鈍違物理而言功蓋偏長之一致非兼通之才也闇於自料强欲兼之違才易務故不免也抱朴子曰五味舛而並甘衆乖而皆麗近人之情愛同憎異貴乎合已賤於殊途夫文章之體尤難詳賞茍以入耳爲佳適心爲快尟知忘味之九成雅頌之風流也所謂考鹽梅之鹹酸不知大之不致明飄颻之細巧蔽於沈深之弘也其英異宏逸者則羅網乎玄黄之表其拘束齷齪者則覊紲於籠罩之内振翅有利鈍則翔集有高卑騁迹有遲迅則進趨有逺近駑銳不可膠柱調也文貴豐贍何必稱善如一口乎不䏻拯風俗之流遯世塗之凌夷通疑者之路賑貧者之乏何異春華不爲肴糧之用蕙不救氷寒之急古詩刺過失故有益而貴今詩純虛譽故有損而賤也抱朴子曰屬筆之家亦各有病其深者則患乎譬煩言冗申誡廣喻欲棄而惜不覺成煩也其淺者則患乎妍而無據證援不給皮膚鮮澤而骨骾逈弱也繁華暐曄則並七曜以高麗沈㣲淪妙則儕玄淵之無測人事靡細而不浹王道无㣲而不備故能身賤而言貴千載彌彰焉抱朴子外篇卷四十終抱朴子外篇卷
