body:
  text: 抱朴子者姓葛名洪字稚川丹陽句容人也其先葛天氏蓋古之有天下者也後降為列國因以為姓焉洪曩祖為荆州剌史王莽之簒君耻事國賊棄官而歸與東郡太守翟義共起兵將以誅莾為莾所敗遇赦免禍遂稱疾自絶於世莾以君宗强慮終有變乃徙君於瑯瑘君之子浦廬起兵以佐光武有大功光武踐祚以廬為車騎又遷驃騎大將軍封下邳僮縣侯食邑五千户開國侯之弟文隨侯征討屡有大捷侯比上書文為訟功而官以文從兄行無軍名遂不為論侯曰弟與我同冒矢石瘡痍周身傷失右眼不得尺寸之報吾乃重金累紫何心以安乃自表乞轉封於弟書至上請報漢朝欲成君高義故特聽焉文辭不獲已受爵即弟為驃騎營立宅舎於博望里于今基兆石礎存焉又分割租秩以供奉吏士給如二君焉驃騎殷勤止之而不從驃騎曰此更煩役國人何以為讓乃託他行遂南渡江而家于句容子弟躬耕以典籍自娯文累使奉迎驃騎驃騎終不還文令人守䕶慱望宅舎以冀驃騎之反至于累世無居之者洪祖父學無不涉究測精㣲文藝之高一時莫倫有經國史才仕呉歴宰海鹽臨安山隂三縣入為吏部侍郎御史中丞廬陵太守吏部尚書太子少傅中書大鴻臚侍中光禄勲輔呉將軍封呉壽縣侯洪父以孝友聞行為士表方册所載罔不窮覽仕吳五官郎中正建城南昌二縣令中書郎廷尉平中䕶軍拜㑹稽太守未辭而晋軍順流西境不守慱簡秉文經武之才朝野之論僉然推君於是轉為五郡赴警大都督給親兵五千緫統征軍戍遏壃塲天之所懷人不能支故主欽若九有同實君以故官赴除郎中稍至太中大夫歴位大中肐郷令縣户二萬舉州最治德化尤異恩洽刑清野有頌聲路無姦跡不佃公田越界如市秋毫之贈不入于門紙筆之用皆出財刑厝而禁止不言而化行以疾去官發詔見用為吳王郎中令正色弼違進可替不舉善彈枉軍國肅雍邵陵太守卒於官洪者君之第三子也生晚為二親所嬌饒不早見督以書史年十有三而慈父見背夙失庭訓飢寒困瘁躬執耕穡承星履草宻勿疇襲又累遭兵火先人典籍蕩盡農隙之暇無所讀乃負笈徒步行借又卒於一家少得全部之書益破功日伐薪賣之以給紙筆就營田園處以柴火寫書坐此之故不得早涉藝文常乏紙每所寫反覆有字人尠能讀也年十六始讀孝經論語詩易貧乏無以逺尋師友孤陋寡聞明淺思短大義多所不通但貪廣覽於衆書乃無不暏誦精持曽所披涉自正經諸史百家之言下至短雜文章近萬卷旣性闇善忘又少文意志不專所識者甚薄亦不免惑而著述時猶得有所引用竟不成純儒不中為傳授之師其河雒圖緯一視便止不得留意也不喜星書及筭術九宫三棊太一飛符之屬了不從焉由其若人而少氣味也晚學風角望氣三元遁甲六壬太一之法粗知其㫖又不研精亦計此輩率是為人用之事同出身情無急此以自勞役不如省子書之有益遂又廢焉案别録藝文志衆有萬三千二百九十九卷而魏代以來群文滋長倍於徃者乃自知所未見之多也江表書籍通同不具昔故詣京師索奇異而正值大亂半道而還每興嘆恨今齒近不惑素志衰頽但念損之又損為乎無為偶耕藪澤茍存性命耳博涉之業於是日沮矣洪之為人也而騃野性鈍口訥形貌醜陋而終不辨自矜飾也冠履垢弊衣或繿縷而或不耻焉俗之服用俄而屢改或忽廣領而大帶或身促而脩䄂或長裾曵地或短不蔽脚洪其於守常不隨世變言則率實杜絶嘲戯不得其人終日黙然故人咸稱之為抱朴之士是以洪著書因以自號焉洪禀性尫羸兼之多疾貧無車馬不堪徒行行亦性所不好又患弊俗捨本逐末交游過差故遂撫筆閑居守静蓽門而無趨所之從至於權豪之徒雖在宻跡而莫或相識焉衣不辟寒室不免漏食不充虚名不出户不䏻憂也貧無僮僕籬落頓決荆叢於庭宇蓬莠塞乎階霤披榛出門排草入室論者以為意逺忽近而不怒其乏役也不曉謁以故不修見官長至於吊大䘮省困疾乃心欲自勉强令無不必至而居疾少健恒復不周每見譏責於論者洪引咎而不恤也意茍無餘而病使心違顧不媿巳而已亦何理於人之不見亮乎唯明鑒之士乃恕其信抱朴非以養高也世人多慕豫親之好推闇至之宻洪以為知人甚未易上聖之所難浮雜之交口合神疕無益有損雖不能如朱公叔一切絶之且必須清澄詳悉乃處意焉又為此見憎者甚衆而不改也馳逐茍達側立勢門者又共疾洪之異於己而見疵毀謂洪為傲物輕俗而洪之為人信心而行毀譽皆置於不聞至患近人或恃其所長而輕人所短洪忝為儒者之末每與人言常度其所知而論之不强引之以造彼所不聞也及與學士有所辯識每舉綱領若值惜短難解心家但粗説意之與向使足以發寤而已不致苦理使彼率不得自還也彼静心者存詳而思之則多自覺而得之者焉度不與言者雖或有問常辭以不知以免辭費之過也洪性深不好干煩官長身少及長曽救知己之抑者數人不得有言於在位者然其人皆不知洪之恤也不忍見其陷於非理宻自營之耳其餘雖親至者在事乗勢與洪無惜者終不以片言半字少累之也至於粮用窮匱急合湯藥則換求朋或見濟亦不讓也受人之施必皆乆乆漸有以報之不令覺也非則不妄受其饋致焉洪所食有旬日之儲則分以濟人之乏若殊自不足亦不割已也不為皎皎之細行不治察察之小廉村里凡人之謂良守善者用時或齎酒餚候洪雖非儔匹亦不拒也後有以荅之亦不登時也洪甞謂史雲不食於昆弟華生治潔於昵客盖邀名之偽行非廊廟之逺量也洪尤疾無義之人不勤農桑之本業而慕非義之姦利持鄉論者則賣選舉以取謝有威勢者則解符䟽以索財或有罪人之賂或枉有理之家或為逋逃之藪而饗亡命之人或挾使民丁妨以公役或强錢物以求貴價或占錮市肆奪百姓之利或割人田地刼孤弱之業恫官府之間以窺掊尅之益内以誇妻妾外以釣名位其如此者不與交焉由是俗人憎洪疾巳自然䟽絶故巷無車馬之跡堂無異志之賔庭可設雀羅而机筵積塵焉洪自有識逮以將老口不及人之非不說人之乃自然也雖僕竪有其所短所羞之事不以戯之也未甞論評人物之優劣不喜訶譴人交之好惡或為尊長所逼問辭不獲巳其論人也則獨舉彼體中之勝事而已其論文也則撮其所得之佳者而不指摘其病累故無毀譽之怨貴人時或問官吏民甲乙何如其清高閑能者洪指説其快事其貪暴闇塞者對以偶不識悉洪由此頗見譏責以顧䕶太多不能明辯臧否使皂白區分而洪終不敢改也每見世人有好論人物者比方倫匹未必當而褒貶與奪或失准格見譽者自謂已分未必信德也見侵者則恨之入骨劇於血讎洪益以為戒遂不復言及士人矣雖門宗子弟其稱兩皆以付族不為輕乎其價數也或以譏洪洪荅曰我身在我者也法當易知設令有人問我使自比古人及同時令我自求軰則我實不能自知可與誰為匹也况非我安可為取評定之耶漢末俗弊朋黨分部許子將之徒以口舌取戒争訟論議門宗成讎故汝南人士無復定價而有月旦之評魏武帝深亦疾之欲取其首爾乃奔波亡走殆至屠㓕前鑒不逺可以得師矣且人之未易知也雖父兄不比盡子弟也同乎我者遽是乎異於我者遽非乎或有始無卒唐堯公旦仲尼季札皆有不全得之恨無以近人信其嘍嘍管見熒燭之明而輕人評物是皆賣彼上聖大賢乎昔大安中石氷作亂六州之地柯鎮業靡違正黨逆義軍大都督邀洪為將兵都尉累見敦迫旣桑梓恐虜禍深憂大古人有急疾之義又畏軍法不敢任志遂募合數百人與諸軍旅進曾攻賊之别將破之日錢帛山積珍玩蔽地諸軍莫不放兵拾財物繼轂連檐洪獨約令所領不得妄離行陣士有摭得衆者洪即斬之以狥於是無敢委杖而果有伏賊數百出蕩諸軍諸軍悉發無部隊皆人馬負重無復戰心遂致驚亂死傷狼藉殆欲不振獨洪軍整齊轂張無所損傷以救諸軍之大崩洪有力焉後别戰斬賊小帥多獲甲首而獻捷幕府於是大都督加洪伏波將軍例給布百疋諸將多封閉之或送還家而洪分賜將士及施知故之貧者餘之十匹又徑以市肉酤酒以饗將吏于時竊擅一日之美談焉事平洪投戈釋甲徑詣洛陽欲廣尋異書了不論戰功竊慕魯連不受聊城之金包胥不納存楚之賞成功不處之義焉正遇上國大亂北道不通而陳敏又反於江東歸塗隔塞㑹有故人譙國嵇居道見用為廣州剌史乃表請洪為參軍雖非所樂然利可避地於南故黽勉就焉見遣先行催兵而居道於後遇害遂停廣州頻為節將見邀用皆不就永惟富貴可以漸得而不可頓合其間屑屑亦足以勞人且榮位勢利譬如寄客旣非常物又其去不可得留也隆隆者絶赫赫者滅有若春華須凋落得之不喜失之安悲悔吝百端憂懼兢戰不可勝言不足為也且自度性篤而才至短以篤而御短才雖翕肩屈膝趨走風塵猶必不辦大致名位而免患累况不䏻乎未若修松喬之道在我而已不由於人焉將登名山服食養性非有廢也事不兼濟自不絶棄世務則曷縁修習玄静哉且知之誠難亦不得惜問而與人議也是以車馬之跡不經貴世之城片字之書不交在位之家又士林之中雖不可出而見造之賔意不能拒妨人所作不得專一乃嘆曰山林之中無道也而古之修道者必入山林者誠欲以違逺讙譁使心不亂也今將遂本志委桑梓嵩岳以尋方平梁公之軌先所作子書内外篇幸已用功夫聊復撰次以示將来云爾洪年十五六時所作詩賦雜文當時自謂可行至于弱冠更詳省之殊多不稱意夫才未必為増也直所覽差廣而覺妍之别於是大有所製棄十不存一今除所作子書但雜尚餘百所卷猶未盡損益之理而多慘憤不遑復料護之他人文成手便快意余才鈍思遲實不能示作文章每一更字輙自轉勝但患又所作多不能數省之耳洪年二十餘乃計作細碎小文妨棄功日未若立一家之言乃草創子書㑹遇兵亂流離播越有所亡失連在道路不復投筆十餘年至建武中乃定凡著内篇二十卷外篇五十卷碑頌詩賦百卷軍書檄移章表箋記三十卷又撰俗所不列者為神仙傳十卷又撰高止不仕者為隱逸傳十卷又抄五經七史百家之言兵事方伎短雜奇要三百一十卷别有目録其内篇言神仙方藥怪變化養生延年禳邪却禍之事屬道家其外篇言人間得失世事臧否屬儒家洪見魏文帝典目自叙未及彈棊撃劒之事有意於畧説所知而實不數少所便能不可虚自稱揚今將具言所不閑焉洪體鈍性駑寡所玩好自緫髪垂髫又擲瓦手搏不及兒童之群未曾闘雞騖走狗馬見人博戯了不目盻或强牽引觀之殊不入神有若晝睡是以至今不知棊局上有幾道樗蒲齒名亦念此軰末伎亂意思而妨日月在位有損政事儒者則廢講誦凡民則忘稼穡啇人則失貝財至於勝負未分交争都市心熱於中顔愁於外名之為樂而實煎悴䘮廉耻之操興争競之端相取重貨宻結怨隙昔宋閔公呉太子致碎首之禍生叛亂之變覆滅七國幾傾天朝作戒百代其鑒明矣每觀戯者慙恚交集手足相及醜詈相加絶交壞友徃徃有焉怨不在大亦不在小多召悔不足為也仲尼雖有晝寢之戒以洪較之洪實未許其賢於晝寢何者晝寢但無益而未有怨恨之憂闘訟之變聖者猶韋編三絶以勤經業凡才近人安得兼修惟諸戯盡不如示一尺之書故因本不喜而不為蓋此俗人所親焉少甞學射但力少不能挽强若顔高之弓耳意為射旣在六藝又可以禦冦辟刼及取鳥獸是以習之昔在軍旅曽手射追騎應弦而倒殺二賊一馬遂以得免死又曽受刀楯及單刀雙㦸皆有口訣要術以待取人乃有祕法其巧入神若以此道與不曉者對使可以當全獨勝所向無前矣晚又學七尺杖術可以入白刄取大戰然亦是不急之末學知之譬如麟角鳯距何必用之此已徃未之或知洪少有定志決不出身每覽巢許子州北人石戸二姜兩法真子龍之傳當廢書前席慕其為人念精治五經著一部子書令後世知其為文儒而已後州郡及車騎大將軍辟皆不就薦名瑯瑘王丞相府昔起義兵賊平之後了不修名詣府論功主者永無賞報之冀晋王應天順人撥亂反正結皇綱於垂絶修宗廟之廢祀念先朝之滯賞並無報以勸来洪隨例就彼庚寅詔書賜爵中侯食句容之邑二百戸竊詔討賊以救桑梓勞不足録金紫之命非其始願本欲逺慕魯連近引田疇上書固辭以遂㣲志遇有大例同不見許昔仲由讓應受之賜而沮為善醜虜未夷天下多事國家方欲明賞必罰以彰憲典小子豈敢茍絜區區之懦志而距弘通之大制故遂息意而恭承詔命焉洪旣著自叙之篇或人難曰昔王充年在耳順道窮望絶懼身名之偕㓕故自紀終篇先生以始立之盛值乎有道之運方將解申公之束帛登枚生之蒲輪耀藻九五絶聲昆吾何憾芬芳之不揚而務老生之彼務洪荅曰夫二儀彌邈而人居若寓以朝菌之耀秀不移晷而殄瘁春華之暫榮未改旬而凋墜雖飛飊之經霄激電之乍照未必速也夫期頥猶奔星之騰炯黄髪如激箭之過隙况或未明而殞籜逆秋而零瘁者哉故項子有含穗之嘆揚烏有夙折之哀歴覽逺右逸倫之士或以文藝而龍躍或以武功而虎踞高勲著於盟府德音被乎管絃形噐雖沈鑠於淵壞美談飄颻而日載故雖千百代猶穆如也余以庸陋沉抑婆娑用不合時行舛於世發音則響與俗乖抗足則跡與衆迕内無金張之援外乏彈冠之友循塗雖坦而足無騏驎六虚雖曠而翼非大鵬上不鷹揚匡國下無顯親垂名名不寄於良史聲不附乎鍾鼎故因著述之餘而為自叙之篇雖無補於窮達亦賴將來之有述焉
