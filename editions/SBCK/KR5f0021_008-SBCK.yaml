body:
  text: 時難抱朴子曰盡節無者可為也若夫使言必納而身必安者須時時之否也夫姦凶之徒妬所不逮擁上抑下惡直醜正憂畏公方之彈擊邪枉是以務除勝已以紓其誅明主不世而出庸君迷於皂白既不能受用忠益或乃宣泄至言於是弘恭石顯之徒巧辭以搆象似假至公以售私姦今獻長生之術者反獲立死之罪進安上之計者旋受危身之禍故曰非言之難也談之時難也夫以賢説聖猶未必即受故伊尹干湯至于七十也以智告愚則必不入故文王諫紂終於不納也言不見信之猶可也若乃李斯之誅韓非龎涓之刖孫臏上官之毁屈平盎之中晁錯不可勝載也為臣不易豈一塗也哉蓋徃而不反者所以功在身後而藏器俟時者所以百無一遇高勲之臣曠代而一有䧟氷之徒委積乎史䇿悲夫時之難遇也如此其甚哉由茲以言吾知渭濱吕之儔巖間傅之屬懷其王佐之器抱其邈世之材秉竿擁築老死於庸兒之伍而遂不遭文王高宗者必不訾矣抱朴子外篇卷之八終抱朴子外篇卷之九晋丹陽洪稚川著
