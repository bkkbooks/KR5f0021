seq: 35
front:
  text: 三十五
  hash: sha256:adc7d6d8c5ca19cde8397e95c95e8a1c58f1e4a9cba3a03e6a23bf8a6a774a77
body:
  text: 晋丹陽洪稚川著守塉抱朴子曰余友人有潜居先生者慕寢丘之莫爭簡塉土以葺宇銳精藝文意忽學稼屢失有年飢色在顔或人難曰夫知禮在於廪實施慱由乎貨豐髙出於有餘儉生乎不足故十千美於詩人食貨首乎八政躬稼基克配之業耦耕有不改之樂竒士之居也進則侣鴻鸞以振翮退則參陶白之理治仕必覇王居必千金是以昔人必科膏壤以分利勤四體以稼穡播原菽之與與茂嘉蔬之翼翼收麰秬之千倉積我庾之惟億出連以游畋入候服而玉食而先生之宅此也亢陽則出谷颺塵重隂則㴞天凌丘陸無含秀之苖水無吐穗之株稗糲曠扵圌廪薪㸑廢於庖厨怡爾執待免之志淡然無去就之謨吾恐首陽之事必見今於丹山之困可立而湏人為子寒心子何晏然而弗憂也夫覩機而不作不可以言明安土而不移衆庻之常事豈翫鮑者忘蘭而大迷者易性乎何先生未寤之乆也鄙人惑焉不識所謂夫衮冕非禦鏑之服典誥非救飢寒之具也胡不眎沃衍於四郊躬田畯之良業捨六藝之迂闊收萬箱以賑乏乎潜居先生曰夫聵者不可督之以分雅鄭瞽者不可責之以别丹漆井鼃不可語以滄海庸俗不可以經術吾子茍知老農之小功未喻面牆之巨拙何異拾瑣沙而捐隋和向炯燭而背白日也夫好尚不可以一概杚趨不可以彼我易也夫欲隮閬風陟嵩華者必不留行於丘垤意在乎㳺南溟汎滄海者豈睱逍遥於潢洿是以注清聽於九韶者巴人之聲不能恱其耳烹大牢饗方丈者荼蓼之味不能甘其口鵾鵬戾赤霄以髙翔鶺鴒傲蓬林以鼓翼洿隆殊途亦飛之極晦朔甚促朝菌不識蜉蝣忽忽於寸隂野馬六月而後息鯈鮒汎濫以暴鱗靈虬勿用乎不測行業乖舛意何可得余雖藜飡之不充而足於食矣故列子不以其乏而貪鄭陽之禄曾參不以其貧而易晉楚之富夫收微言扵將墜者周孔之遐武也情孳孳於為利者孟叟之罪人也造逺者莫䏻兼通扵岐路有為者莫䏻並舉於耕學體瘁而神豫亦何間於居約且又處塉則勞勞則不學清而清至矣居沃則逸逸則不學奢而奢来矣清者福之所集也奢者禍之所赴也福集則雖㣲可著雖衰可興焉禍赴則雖強可弱雖存可亡焉此不期而必㑹不招而自来者也故君子欲正其末必端其本欲輟其流則遏其源故道德之功建而奓靡之門閉矣姜望至德而佃不復種重華大聖而漁不償網然後玉璜表營丘之祚大功有二十之髙何必譏之以惰而察才以相士乎夫二人分財取少為㢘余今讓天下之豐沃處兹之埆安昌之膏腴取北郭之無欲誠萬物之可細亦何徃而不足哉北辰以不改為衆星之尊五嶽以不遷為羣望之宗蟋蟀屢移而不貴禽魚饜深則逢患方將墾九典之蕪薉播六德之嘉厥田邈扵上土之科其收盈乎天地之間何必耕也為務哉昔衣以弃財止盗庾氏以推璧厲貪疏廣散金以除子孫之禍叔敖取塉以弭可欲之憂牛缺以載珍致冦陶谷以多藏召殃得失較然可無鑒乎於是問者抑然良乆口張而不䏻嗑首俛而不䏻仰慨而嗟乎始悟立不朽之言者不以産業汨和追下帷之績者不以窺園㳙目子以鶵之甘呼鴛擗蟹之計要猛虎豈不陋乎鄙哉子之不夙知也抱朴子外篇卷三十五終抱朴子外篇卷
