front:
  text: 三十
  hash: sha256:a70676fba2a260e89793ebcc9d613314244fbe982cbd0b62eabf558cf95ef778
body:
  text: 晋丹陽洪稚川著鈞世或曰古之著書者才大思深故其文隠而難曉今人意淺力近故露而易見以此易見比彼難曉猶溝澮之方江河螘垤之並嵩岱矣故水不發崑山則不能揚洪流以東漸書不出英俊則不能備致逺之韻焉抱朴子答曰夫論管宂者不可問以九陔之無外習拘閡者不可督以㧞萃之獨見盖徃古之士匪匪神其形噐雖冶鑠於疇曩然其精神布在乎方䇿情見乎辭指歸可得且古書之多隠未必昔人故欲難曉或世異語變或方言不同經荒歴亂埋藏積乆簡編朽絶亡失者多或雜續殘缺或脫去章句是以難知似若至深耳且夫尚書者政事之集也然未若近代之優文詔䇿軍書奏議之清富贍麗也毛詩者華彩之辭也然不及上林羽獵二京三都之汪濊愽富也然則古之子書能勝今之作者何也然守株之徒嘍嘍所翫有耳無目何肯謂爾其於古人所作為神今世所著為淺貴逺賤近有自来矣故新劒以詐刻加價弊方以偽題見寳也是以古書雖質樸而俗儒謂之堕於天也今文雖金玉而常人同之於瓦礫也然古書者雖多未必盡美要當以為學者之山淵使屬筆者得采伐漁獵其中然而譬如東甌之木長洲之林梓豫雖多而未可謂之為大厦之壯觀華屋之麗也雲夢之澤孟諸之藪魚肉之雖饒而未可謂之為煎之盛膳渝狄之嘉味也今詩與古詩俱有義理而盈於差美方之於士並有徳行而一人偏長藝文不可謂一例也比之於女俱體國色而一人獨閑百伎不可混為無異也若夫俱論宫室而奚斯路寢之頌何如王生之賦靈光乎同遊獵而叔畋盧鈴之詩何如相如之言上林乎並美祭祀而清廟雲漢之辭何如郭氏南郊之艶乎等稱征伐而出軍六月之作何如陳琳武軍之壯乎則舉條可以覺焉近者夏侯湛潘安仁並作亡詩白華由庚南陔華黍之屬諸碩儒髙才之賞文者咸以古詩三百未有足以偶二賢之所作也且夫古者事事醇素今則莫不彫時移世改理自然也至於錦麗而且堅未可謂之减於蓑衣輜軿妍而又牢未可謂之不及椎車也書猶言也若入談語故為知有胡越之接終不相解以此教戒人豈知之哉若言以易曉為辨則書何故以難知為好哉若舟車之代歩渉文墨之改結䋲諸後作而善於前事其功業相次千萬者不可復縷舉也世人皆知之快於曩矣何以獨文章不及古邪抱朴子外篇卷三十終抱朴子外篇卷
