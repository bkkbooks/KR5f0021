body:
  text: 勗學抱朴子曰夫學者所以清澄性理簸揚埃雕鍜鑛璞礱鍊屯鈍啓導聰明染質素察徃知來愽涉勸成仰觀俯察於是乎在人事王道於是乎備進可以為國退可以保己是以聖賢罔莫孜孜而勤之夙夜以勉之命盡日中而不釋飢寒危困而不廢豈以有求於當世哉誠樂之自然也夫斵削刻畫之薄伎射御乘之易事猶湏慣習然能後善況乎人理之曠道徳之逺隂陽之變神之情緬邈玄奥誠難生知雖云色白匪染弗麗雖云味甘匪和弗美故瑶華不琢則耀夜之景不發丹青不治則純鈞之勁不就火則不鑚不生不扇不熾水則不决不流不積不深故質雖在我而成之由彼也登閬風捫晨極然後知井谷之闇隘也披七經玩百氏然後覺面牆之至困也夫不學而求知猶願魚而無網焉心雖勤而無獲矣廣愽以窮理猶順風而託焉體不勞而致逺矣粉黛至則西施以加麗而宿瘤以藏醜經術深則髙才者洞逸鹵鈍者醒悟文梓干雲而不可以臺榭者未加班輸之結構也天然爽朗而不可謂之君子者不識大倫之臧否也欲超千里於終朝必假追影之足欲凌洪波而遐濟必因艘楫之器欲見無外而不下堂必由之乎載籍欲測淵㣲而不役神必得之乎明師故朱緑所以改素絲訓誨所以移蒙蔽披玄雲而揚大明則萬物無所其狀矣舒竹帛而考古今則天地無所藏其情矣況於神乎而況於人事乎泥可令齊堅乎金玉曲木可攻之以應繩墨百獸可教之以戰陳畜牲可習之以進退沈鱗可動之以聲音機石可感之以精誠又況乎含五常而禀最靈者哉低仰之駟教之功也鷙擊之禽習之馴也與彼凡馬野鷹本實一此以貴彼以質賤運行潦而勿輟必混流乎滄海矣崇一簣而弗休必鈞高乎峻極矣大川滔瀁則虬螭群游日就月將則徳立道備乃可以止夢乎丘旦何徒解桎乎困蒙哉昔仲由冠雞帶㹠䨥珥鳴蟬杖劔而見拔白而舞盛稱南山之勁竹欲任掘强之自然尼父善誘染以徳教遂成升堂之生而登四科之哲子張鄙人而灼聚凶猾漸漬道訓成化名儒乃抗禮於王公豈直免於庸陋以是賢人悲寓世之倐忽疾泯沒之無稱感朝聞之弘訓悟通㣲之無懼將落之明戒覺罔念之作狂不飽食以終日不棄功於寸隂鑒逝川之勉志悼過隟之電速割遊情之不急損人間之末務洗憂貧之心遣廣願之息畋獵愽奕之游戯矯晝坐睡之懈怠知徒思之無益遂振䇿於聖途學以聚之問以辯之進徳脩業温故知新夫周公上聖而日讀百篇仲尼天縱而韋編三絶墨翟大賢載文盈車仲舒命世不窺園門倪寛帶經以芸鉏路生截蒲以寫書黄霸抱桎梏以受業寗子勤夙夜以倍功故能究覽道奥窮測㣲言觀萬古如同日知八荒若户庭考七耀之盈虚步三五之變化審盛衰之方來驗善否於旣徃料玄黄於掌握甄未兆以如成故能盛徳大業冠於當世清芳令問播于罔極也且夫聞商羊而戒浩瀁訪鳥砮而洽東肅諮萍實而言色味訊狗而識墳羊披靈寳而知山因折爼而説專車瞻離畢而分隂陽之候由冬螽而覺閏餘之錯何神之有學而已矣夫童謡猶助聖人之耳目豈況墳索之弘愽哉才性有優劣思理有脩短或有夙知而早成或有提耳而後喻夫速悟時習者騄之脚也遲解晚覺者鶉鵲之翼也彼雖尋飛絶景止而不行則步武不過焉此雖咫尺以進徃而不輟則山澤可越焉明暗之學其猶兹乎蓋少則志一而難忘長則神放而易失故修學務早及其精專習與性成不異自然也若乃絶倫之器盛年有故雖失之於谷而之於虞淵方知良田之晚播愈於卒嵗之荒蕪也日燭之喻斯言當矣世道多難儒教淪喪文武之軌將遂凋墜或沈溺於聲色之中或驅馳於競逐之路孤貧而精六藝者以游夏之資而抑頓乎九泉之下因風而附鳯翼者以駑庸之質猶遑乎霞霄之表舎本逐末者謂之勤修庻幾擁經求己者謂之陸沈迂闊於是莫不蒙塵觸雨戴霜履氷懷黄握白提清絜肥以赴邪徑之近易規朝種而暮穫矣若乃下帷高枕遊神九典精義味道居精乎建不拔之操揚青於嵗寒之後不揆世以投迹不隨衆以萍漂者蓋亦鮮矣汲汲於進趨悒悶於否滯者豈能舎至易速達之通而守甚難必窮之塞路乎此川上所以無人子衿之所為作愍俗者所以痛心而長慨憂道者所以含悲而頽思也夫寒暑代謝否終則泰文武迭貴常然之數也冀群冦畢滌中興在今七耀遵度舊惟新振天惠以廣掃鼔九陽之洪爐運大鈞乎皇極開玄模以軌物陶冶庶匠成翹秀蕩汰積埃革邪反正戢干戈橐弓矢興辟雍之庠序集國子修文徳發金聲振玉音降風雲於潜初旅束帛乎丘園令抱翼之鳯奮翮於清虚項領之駿騁迹於千里使夫含章抑欝窮覽洽聞者申公伏生之徒發玄纁登蒲輪結氣陳立素顯其身行其道俾聖世迪唐虞之高軌馳升平之廣塗玄流沾於九垓惠風被乎無外五刑厝而頌聲作和氣洽而嘉穟生不亦休哉昔秦之二世不重儒術舎先聖之道習刑獄之法民不見徳唯戮是聞故惑而不知反迷之路敗而不知自救之方遂墮墜於雲霄之上而粉乎不測之下惟尊及卑可無鑒乎抱朴子外篇卷三終抱朴子外篇卷四晋丹陽洪稚川著
