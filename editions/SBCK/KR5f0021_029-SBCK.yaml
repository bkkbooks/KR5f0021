front:
  text: 二十九
  hash: sha256:7f23a496e1eb859e042c55e28c6ee203a562aa9013b0739ce30e4bf8240420ee
body:
  text: 晋丹陽洪稚川著接䟽抱朴子曰以英逸而遭大明桑䕃未移而金蘭之恊已固矣以長才而遇深識則不待歴試而相知之情已審矣飄乎猶起鴻之乗勁風翩乎若騰鱗之躡驚雲也若以沈抑而可忽乎則姜公不用於周矣若以疏賤而可距乎則毛生不貴乎趙矣若積素行乃說政則寗戚不顯於齊矣若貴宿名而委任則陳韓不録於漢矣明者舉大畧細不忮不求故能取威定功成天平地豈肯稱薪而㸑數粒乃炊并瑕弃璧披毛索黶哉抱朴子外篇卷二十九終抱朴子外篇卷
  hash: sha256:77f75a12a996e78ffd757e79c1a3c1191981169f8d1ae789ee4a8a51756a3845
