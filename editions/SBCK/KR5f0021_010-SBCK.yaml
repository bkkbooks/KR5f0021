body:
  text: 務正抱朴子曰南溟引朝宗以成不測之深玄圃崇木石以致極天之峻大厦凌霄頼群橑之積輪曲轅直無可闕之物故元凱之佐登而格天之化洽折衝之才周則逐鹿之姦寢舜禹所以有天下而不與衛靈所以雖驕恣而不危也衆力并則萬鈞不足舉也群智用則庶績不足康也故繁足者死而不多士者亂而不亡然劔㦸不長於縫緝錐鑚不可以擊斷牛馬不能吠守雞犬不任駕乘役其所長則事無廢功避其所短則世無棄材矣抱朴子外篇卷十終抱朴子外篇卷
  hash: sha256:b26748d11b22a595d8656d4112be1ae6f6a4e515c6c4875cae979254ca487aaa
