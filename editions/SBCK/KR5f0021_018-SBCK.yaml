front:
  text: 十八
  hash: sha256:078c45851449bef08411f664692f1bbc1ff052d23a607d382f80aadd54f6ccec
body:
  text: 晋丹陽洪稚川著擢才抱朴子曰華章藻蔚非矇瞍所玩英逸之才非淺短所識夫瞻視不能接物則衮龍與素褐同價矣聰鑒不足相涉則俊民與庸夫一槩矣眼不見則美不入神焉莫之與則傷之者至焉且夫愛憎好惡古今不鈞時移俗易物同價異譬之夏后之璜曩直連城鬻之於今賤於銅鐡故昔以隱居求志為髙士今以山林之儒為不肖故聖世人之良幹乃闇俗之罪人也徃者之介㓗乃末葉之羸劣也偉之士履道之生其崇信匪徒重仞之牆其淵澤不唯吕梁之深也故短近不能賞而淺促不能測焉因以異乎己而薄之矣以不求我而疾之矣不貴不用何足言乎乃有播埃塵於白珪生瘡痏於玉肌訕疵雷同攻伐獨立曽參刼剽之垢巢許獲穿踰之謗自匪明並懸象鑒表微者焉能披泥抽淪玉澄川掇沉珠哉夫珪璋居肆而不售矧乃翳於槃璞乎竒士扣角而見遏况乃潜於臯藪乎孫臏思騁其秘略而司馬刖之韓非願建治績而李斯殺之賈誼慷慨懐經國之術而武夫排之子政忠良有匡危之具而恭顯陷之和氏所以抱璞而泣血禽息所以發憤而碎首也夫玉石易别於賢愚愛寶情篤於好士以易别之寶合篤好之物猶獲罪截趾歴世受誣况乎難知之賢非意所急䜛人畫蛇足於無形姦臣畏忠貞之害己體曲者忌䋲墨之容夜祼者憎明燭之來是以髙譽美行抑而不揚虛搆之謗先形生影又無楚人號哭之薦萬無一遇固其宜矣夫以王為石者亦將以石為玉矣以賢為愚者亦將以愚為賢矣以石為玉未有傷也以愚為賢者亡之診也蓋診亡者雖存而必亡猶脉死者雖生而必死也可勿慎乎於戯悲夫莫之思者也昔仲尼上聖也東受累於齊人南見塞於子西文種大賢也初不齒於荆俗末雍游於鈞如竸年立功不亦難乎夫結緑黎非陶猗不能市也千鈞之重非賁獲不能抱也白雪之非靈素不能徽也邁倫之才非明主不能用也然耀靈光夜之珍不為莫求而虧其質以苟且於賤賈洪鍾周鼎不為委淪而輕其禮取見舉於侏儒嶧陽雲和不為不御而息唱以競顯於淫哇冠羣之徳不以沉抑而履徑而剸節於流俗是以和璧變為滯貨柔木廢於勿用赤刀之鑛不得經歐冶之鑪元凱之疇終不值四門之闢也抱朴子外篇卷十八終抱朴子外篇卷
