body:
  text: 疾謬抱朴子曰世故繼有禮教漸頺敬讓莫崇傲慢成俗儔飲㑹或蹲或踞暑夏之月露首袒體盛務唯在摴蒱彈棋所論極於聲色之間舉口不踰綺紈袴之側游歩不去勢利酒客之門不聞清談論道之言專以醜辭嘲弄為先以如此者為髙逺以不爾者為騃癡也五駭切野於是馳逐之庸民偶俗之近人慕之者猶宵蟲之赴明燭學之者猶輕毛之應飊切甫遥風嘲戲之談或上及祖考或下逮婦女往者務其不深焉報者恐其不重焉倡之者不慮見答之後患和之者耻於言輕之不塞周禾之芟温麥之刈實由報恨不能已也利口者扶强而黨勢辯給者借鍒以刺耳鍒扶發切由切以不應者為拙劣以先止者為負敗如此交惡之辭焉能黙哉其有才思者為人也猶善於依因機㑹准擬體例引古喻今言微理舉雅而可笑中而不傷不棖人之所諱不犯人之所惜若夫拙者之為人也則枉曲直湊使人愕然妍之與媸其於宜絶豈唯無益而已哉乃有使酒之客及於難侵之性不能堪之拂衣拔棘而手足相及醜言加於所尊歡心變而成讎絶交壞身搆隙致禍以杯螺相擲者有矣以隂私相訐面斥人居謁切者有矣昔陳靈之被矢管氏之泯族匪降自天口實爲之樞機之發榮辱之主三緘之戒豈欺我哉激雷不能追既往之失辭班輸不能磨斯言之既玷音雖不能三思而吐清談猶可息謔調以防禍萌也尊其辭令敬其威儀使言無口過體無倨切居御容可法可觀可畏可愛蓋逺辱之良術全交之要道也且夫慢人者不愛其親者也輕鬭者不重遺體者也皆陷不孝可不詳乎然而迷謬者無自見之明觸情者諱逆耳之規疾美而無直亮之鍼切職深艾羣惑而無指南以自反諂媚小人歡笑以賛善面從之徒拊節以稱功益使惑者不覺其非自謂有端晏之㨗過人之辯而不悟斯乃招患之旌召害之符傳非之驛傾身之車也豈徒减其方䇿之令聞虧其沒世之徳音而已哉蓋雖有偕老之慎不能救一朝之過雖有陶朱之富不能贖片言之謬故毫之失有千里之差傷人之語有劒㦸之痛積微致著累淺成深鴻羽所以沈龍舟群輕所以折勁軸寸飊所以燔百尋之室蠧蝎所以仆切普卜連抱之木也古賢何獨跼蹐恂恂之如彼今人何其憒慢傲放之如此乎是以髙世之士望塵而旋迹輕薄之徒響赴而影集謀事無智者之居危無切磋之益良史懸筆無可書之善談者含音無足傳之美令聞不著醜聲宣流沒有餘敗貽譏將來始無可法終無可紀斯亦志士之耻也安忍為之過而不改斯誠委夷路而陷叢棘舍嘉㫖而咽鈎吻者也豈所謂以小善為無益而不為以小惡為無損而不止以至惡積而不可掩罪大而不可解者邪余願世人改其無檢之行除其驕吝之失遣其誇矜尚人之疾絶息嘲弄不典之言則趙勝之門無去客黄祖之棓無所用矣抱朴子曰或有不治清徳以取敬而仗氣力以求畏其入衆也則亭立不坐争處端上作色諧聲逐人自安其不得意恚懟不退其行出也則逼狹之地耻於分塗振䇿長驅推人於險有不即避更加攄頓嗚呼悲哉此云古之卑而不可踰推䕃譲路勞謙下士無競於物立若不勝衣行若不容身者何其緬然之不肖哉夫德盛操清則雖深自挹降而人猶貴之若履蹈不髙則雖行凌暴而人猶不敬假令外服人體内失人心所謂見憎惡非為見尊重也昔莊生未食趙王側立騶衍入壃燕君擁篲康成之里逆虜望拜林宗之庭莫不卑肅非力之所服也夫以抄盜致財雖巨富不足嘉凶徳脅人雖見憚不足榮也然而庸民為之不惡故聞其言者猶鴟梟之來鳴也覩其面者若魅之見形也其所至詣則如妖怪之集也其在道塗則甚逢虎之羣也愚夫行之自矜為豪小人徵之以為横階亂靡有定寔此之由也然敢為此者非必篤頑也率冠盖之後勢援之門素頗力行善事以竊虚名名既粗立本情便放或假財色以交權豪或因時運以佻榮位或以婚姻而連貴戚或弄毁譽以合威柄噐盈志溢態發病出黨成交廣道通步髙清論所不能復制繩墨所不能復彈遂成鷹頭之蠅廟垣之䑕所未及者則低眉掃地以奉望之居其下者作威作福以控御之故勝己者則不得聞聞亦陽不知也减己者則不敢言言亦不能禁也夫災蟲害穀至降霜則殄矣佞雄亂羣值嚴時則敗矣獨善其身者唯可以不肯事之不行傚之而已耳有斧無柯其如之何哉抱朴子曰詩美睢鳩貴其有别在禮男女無行媒不相見不雜坐不通問不同衣物不得親授姊妹出適而反兄弟不共席而坐外言不入内言不出婦人送迎不出門行必擁蔽其面道路男由左女由右此聖人重别杜漸之明制也且夫婦之間可謂昵矣而猶男子非疾病不晝居於内將終不死婦人之手況於他乎昔魯女不幽居深處以致扈犖切力各之變孔妻不宻潜户庭以起華督之禍史激無防有汙種之悔王孫不嚴有杜門之辱而今俗婦女休其織之業廢其紞之務不績其麻市也婆娑舍中饋之事修周旋之好更相從詣之適親戚承星舉火不已于行多將侍從暐盈路婢使吏卒錯雜如市尋道䙝謔可憎可惡或宿于他門或冐夜而反遊戲佛寺觀視漁畋登髙臨水出境慶弔開車褰幃周章城邑盃觴路酌歌行奏轉相髙尚習非成俗坐致因縁無所不肯誨淫之源不急之甚刑于寡妻家乃正願諸君子少可禁絶婦無外事所以防微矣抱朴子曰輕薄之人迹厠髙深交成財贍名位粗㑹便背禮叛教託云率任才不逸倫强為放達以傲兀無檢者為大度以惜䕶節操者為澁少於是臘鼓垂無頼之子白醉耳之後結黨合羣遊不擇竒士碩儒或隔籬而不接妄行所在雖逺而必至手連袂以遨以集入他堂室觀人婦女指玷修短評論美醜不解此等何為者哉或有不通主人便共突前嚴未辦不復窺聴犯門折闗踰垝切居毁穿隙有似抄劫之至也其或妾媵藏避不及至捜索隱僻就而引曳亦怪事也夫君子之居室猶不奄家人之不備故入門則揚聲升堂則下視而唐突他家將何理乎然落拓之子無骨骾而好隨俗者以通此者為親宻距此者為不泰誠為當世不可不爾於是要呼憒雜入室視妻促膝之狹坐交杯觴於咫尺歌淫冶之音曲以誂文君之動心載號載呶謔戲醜䙝窮鄙極黷爾乃笑亂男女之大節蹈相䑕之無儀夫桀傾紂覆周滅陳亡咸由無禮况匹庶乎蓋信不由中則屢盟無益意得神至則形噐可忘君子之交也以道義合以志契親故淡而成焉小人之接也以勢利結以狎慢宻故甘而敗焉何必房集内讌爾乃欵誠著妻妾飲㑹然後分好昵哉古人鑒淫敗之曲防杜傾邪之端漸可謂至矣修之者為君子背之者為罪人然禁䟽則上宫有穿窬之男網漏則桑中有奔隨之女縱而肆之其猶烈猛火於雲夢開積水乎萬仞其可撲以箒篲遏以撮壤哉然而俗習行慣皆曰此乃京城上國公子王孫貴人所共為也余每折之曰夫中州禮之所自出也禮豈然乎蓋衰亂之所興非治世之舊風也夫老聃清虛之至者也猶不敢見乎所欲以防心亂若使柳下惠潔髙行屢接䙝讌將不能不使情生於中而色形于表况乎情淡者萬未一而抑情者難多得如斯之事何足長乎窮士雖知此風俗不足引進而名勢並乏何以整之每以為慨故常獲憎於斯黨而見謂為野朴之人不能隨時之宜余其於信己而已亦安以我之不可從人之可乎可歎非一率如此也已矣夫吾末如之何也彼之染入邪俗淪胥以敗者曷肯納逆耳之讜言而反其東走之逺迹哉抱朴子曰俗間有戲婦之法於稠衆之中親屬之前問以醜言責以慢對其為鄙黷不可忍論或蹙以楚撻或繫脚倒懸酒容酗醟不知限齊至使有傷於流血踒切烏卧折支體者可歎者也古人感離别而不㓕燭悲代親而不舉樂禮論娶者羞而不賀今既不能動蹈舊典至於徳為鄉閭之所敬言為人士之所信誠宜正色矯而呵之何謂同其波流長此俗哉然民間行之日久莫覺其非或清談所不能禁非峻刑不能止也遂詘周而疵孔謂傲放為邈世矣或因變故佻竊榮貴或頼髙援翻飛㧞萃於是便驕矜誇驁氣凌雲物歩髙視逺然自足顧瞻否滯失羣之士雖實英異忽焉若草或傾枕而延賔或稱疾以距客欲令人士立門以成林車填噎於閭巷呼謂尊貴不可不爾夫以勢位言之則周公勤于吐握以聞望校之則仲尼恂恂善誘咸以勞謙為務不以驕慢為髙漢之末世則異於兹蓬髪亂横挾不帯或䙝衣以接人或祼而箕踞朋友之集味之遊莫切切進徳誾誾修業功過弼違講道精義其相見也不復叙離闊問安否賔則入門而呼奴主則望客而喚狗其或不爾不成親至而棄之不與為黨及好㑹則狐蹲牛飲爭食競割掣撥淼摺無復亷耻以同此者為泰以不爾者為劣終日無及義之言徹夜無箴䂓之益誣引老莊貴於率任大行不顧細禮至人不拘檢括嘯傲縱逸謂之體道嗚呼惜乎豈不哀哉於是嘲族以叙歡交極黷以結情欵以傾倚申脚者為妖妍摽秀以風格端嚴者為田舍朴騃以鎮抗指者為勦令鮮倚以出言有章者為摺答猝突凡彼輕薄之徒雖便辟偶俗廣結伴流更相推揚取達速易然率皆皮膚狡澤而懷空抱虚有似蜀人瓠壺之喻胸中無一之誦所識不過酒炙之事所謂傲狠明徳即聾從昧冒干貨財貪于飲食左生所載不才之子也若問以墳索之微言神之情狀萬物之變化殊方之竒怪朝廷宗廟之大禮郊祀禘祫之儀品三正四始之原本隂陽律曆之道度軍國社稷之典式古今因革之異同則怳悸自失喑嗚俛仰焉莫莫焉雖心覺面牆之困而外䕶其短乏之病不肯謐已强張大談曰雜碎故事蓋是窮巷諸生章句之士吟詠而向枯簡匍匐以守黄卷者所宜識不足以問吾徒也誠知不學之弊碩儒之貴所祖習之非所輕易之謬然終於迷而不返者由乎放誕者無損於進趨故也若髙人以格言彈而呵之有不畏大人而長惡不悛者下其名品則宜必懼然氷泮而革面旋而東走之迹矣抱朴子外篇卷二十五終抱朴子外篇卷
