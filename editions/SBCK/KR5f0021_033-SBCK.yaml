front:
  text: 三十三
  hash: sha256:e1447d0e02b86af74470b9fcb5c114196034cac7a9351ce6d65c975595ad47bc
body:
  text: 晋丹陽洪稚川著漢過抱朴子曰歴覽前載逮乎近代道㣲俗弊莫劇漢末也當塗端右閹官之徒操弄神噐秉國之鈞廢正興邪殘仁害義蹲背憎即聾從昧同惡成羣汲引姦黨吞財多藏不知紀極而不能散錙銖之薄施振清㢘之窮儉焉進官則非多財者不達也獄訟則非厚貨者不直也官髙勢重力足㧞才而不能發毫之片言進益時之翹俊也其所用也不越於妻妾之戚屬其惠澤也不出乎近習之庸莫戒臧文位之譏靡追解狐㤀之義分禄以擬王林致士以由方囬故列子比屋而門無鄭陽之恤髙概成群而不遭暴生之薦抑挫獨立推進附己此樊所以掩口馮唐所以永慨也干時率皆素飡偷容掩德蔽賢忌有功而危之疾清白而排之諱忠讜而陷之惡特立而擯之柔媚者受崇之祐方稜者訕棄之患飬豺狼而殱驎虞殖枳棘而剪椒桂於是傲兀不檢丸轉萍流者謂之偉大量苛碎峭嶮懐螫挾毒者謂之公方正直令色警惠有貎無心者謂之機神朗徹利口小辯希指巧言者謂之標領清妍猝突萍鷽驕矜輕侻者謂之巍峩瑰桀嗜酒好色闒茸無疑者謂之率任不矯求取不廉好奪無足者謂之淹矌逹節蓬髪䙝服逰集非者謂之通美汎愛反經詭聖順非而博者謂之莊老之客嘲弄嗤領凌尚侮慢者謂之蕭豁雅韻毁方投圓面從響應者謂之絶倫之秀憑倚權豪推貨履徑者謂之知變之竒㸔文書望空下名者謂之業大志髙仰賴強親位過其才者謂之四豪之匹輸貨勢門以市名爵者謂之輕財貴義結黨合譽行與口違者謂之以文㑹友左道邪術假託怪者謂之通靈神人卜占小數誑禍福者謂之知來之妙馬弄矟切山角一夫之勇者謂之上將之元合離道聽偶俗而言者謂之英才碩儒若夫體亮行髙神清量逺不諂笑以取恱不曲言以負心含霜履雪義不茍合據道推方嶷然不羣風雖疾而枝不撓身雖困而操不改進則切辭正論攻過箴闕退則端誠杜私知無不為者謂之闇騃従苦夙興夜寐退食自公憂勞損益畢力為政者謂之小噐俗吏於是明哲色斯而幽遁髙俊括囊而佯愚疏賤者奮飛以擇木縶制者曲從而朝隠知者不肯吐其秘筭勇者不為致其果毅忠謇離退姦凶得志邪流溢而不可遏也偽塗闢而不可杜也以臻乎凌上替下盗賊多有䆠者奪人主之威三九死庸豎之手忠賢望士謂之黨人囚捕誅鋤天下嗟嗷無罪無辜閉門遇禍微煙起於蕭牆而飈焚徧於宇宙淺隙發於膚寸而波濤漂乎四極金城屠於庶冦湯池杭於一葦勁鋭望塵而氷泮征人倒戈而奔北飛鋒荐於扆闥左衽掠於禁省禾黍生於廟堂榛莠秀乎玉階雲觀變爲狐兎之薮象魏化爲虎豹之蹊東序烟燼於委灰生民蟭淪於淵火凶家害國得罪竹帛良史無褒言金石無徳音夫何哉失人故也抱朴子外篇卷三十三終抱朴子外篇卷
