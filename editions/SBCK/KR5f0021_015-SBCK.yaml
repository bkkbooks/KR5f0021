body:
  text: 審舉抱朴子曰華霍所以能崇極天之峻者由乎其下之厚也唐虞所以能臻巍巍之功者實頼股肱之良也雖有孫陽之手而無騏之足則不得致千里矣雖有稽古之才而無宣力之佐則莫縁凝庻績矣人君雖明並日月神鑒未兆然萬機不可以獨統曲碎不可以親總必徦目以遐覽借耳以廣聽誠湏有司是康是賛故聖莫不根心招賢以舉才為首務施玉帛於丘園馳翹車於巖藪勞於求人逸於用能上自槐棘降逮皂論道經國莫不任職恭已無為而治平刑措而化洽無外萬咸寧設官分職其猶構室一物不堪則崩橈之由也然未貢舉之士格以四科三事九列是之自出必簡摽頴拔萃之俊而漢之末葉桓靈之世柄去帝室政在姦臣網漏防潰風頽教沮抑清徳而揚諂媚退履道而進多財力競成俗茍得無耻或輸自售之寳要人之書或父兄貴顯望門而辟命低眉膝以積習而見夫銓衡不平則輕重錯謬斗斛不正則少多混亂繩墨不陳曲直不分準格傾側則滓雜實繁以之治人則虐暴而豺貪受取聚歛以補買官之費立之朝廷則亂劇於棼絲引用駑庸以為黨援而望風向草偃庶事之康何異懸瓦礫而責夜光絃不調而索清音哉何可不澄濁飛沈沙汰臧否嚴試對之法峻貪夫之防哉殄瘁攸階可勿畏乎古者諸侯貢士適者謂之有功有功者增班進爵貢士不適謂之有過有過者黜位削地猶復不能令詩人謐大車素餐之刺山林無伐檀罝兎之賢況舉之無非才之罪受之無負乘之患衡量一失其格多少安可復損乎夫孤立之翹秀藏器以待賈碌之輕薄人事以邀速夫唯待價故頓淪於窮瘁矣夫唯邀速故佻而騰躍矣蓋梟鴟屯飛則鴛幽集豺狼當路則麒麟遐遁舉善而教則不仁者逺矣姦偽榮顯則英傑潜逝高概耻與闒茸爲伍清節羞入饕餮之貫舉任並謬則群賢括嚢群賢括嚢則凶邪相引凶邪相引則小人道長小人道長則檮杌比肩頌聲所以不作怨嗟所以嗷嗷也高幹長材恃能勝己屈伸黙語聴天任命窮通得失委之自然亦焉得不墮多黨者之後而居有力者之下乎逸倫之士非禮不動山峙淵渟知之者希馳逐之徒蔽而毁之故思賢之君終不知竒才之所在懐道之人願効力而莫從雖抱稷卨之器資邈世之量遂沈滯詣死不得登叙也而有黨有力者紛然鱗萃人乏官曠致者又美亦安得不拾掇而用之乎靈獻之世閹官用事群姦秉權危害忠良臺閣失選用於上州郡輕貢舉於下夫選用失於上則牧守非其人矣貢舉輕於下則秀孝不得賢矣故時人語曰舉秀才不知書察孝㢘父别居寒素清白濁如泥高第良將怯如雞又云古人欲達勤誦經今世圖官免治生蓋疾之甚也于時懸爵而賣之猶列肆也爭津者買之猶市人也有直者無分而徑進空拳者望途而迹其貨多者其官貴其財少者其職卑故東園積賣官之錢崔烈有銅臭之上為下俲君行臣甚故阿侫幸獨談親容桑梓議主中正吏部並為魁儈各責其估清貧之士何理有望哉是既然矣又邪正不同譬猶氷炭惡直之人憎於非黨刀尺顛倒者則恐人之議己也達不由道者則患言論之不美也乃共搆合虚誣中傷清徳瑕累横生莫敢救拔於是曾閔獲商臣之謗孔墨蒙盜跖之垢懷正居貞者填笮乎泥濘之中而狡猾巧偽者軒翥乎虹霓之際矣而凡夫淺識不辨邪正謂守道者為陸沈以履徑者為知變俗之隨風而動逐波而流者安能復身於徳行若思於學問哉是莫不弃檢括之勞而赴用賂之速矣斯誠有漢之所以傾來代之所宜深鑒也或曰吾子論漢末貢舉之事誠得其病也今必欲戒既徃之失避傾車之路改有代之絃調防法翫之或變令濮上巴人反安樂之正音腠理之疾無退走之滯患者豈有方乎士有風姿豐偉雅望有餘而懐空抱虚幹植不足以貌取之則不必得賢徐徐先試則不可倉卒將如之何抱朴子答曰知人則哲上聖所難今使牧守皆能審良才於未用保性履之始終誠未易也但共遣其私情竭其聰明不為利慾動不為屬託屈所欲舉者必澄思以察之慱訪以詳之脩其名而考其行校同異以備虚令親族稱其孝友閭歸其信義嘗小仕者有忠清之効治事之幹則寸錦足以知巧刺鼠足以觀勇也又秀孝皆宜如舊試經答策防其罪對之姦當令必絶其不中者勿署吏加罰禁錮其所舉書不中者刺史太守免官不中左遷中者多不中者少後轉不得過故若受賕切巨流而舉所不當發覺有驗者除名禁錮終身不以赦令原所舉舉者與同罪今試用此法治一二嵗之間秀孝必多不行者亦足以知天下貢舉不精之久矣過此則必多修徳而勤學者矣又諸居職其犯公坐者以法律從事其以貪濁汚為罪不足至死者刑竟及遇赦皆宜禁錮終身輕者二十年如此不亷之吏必將化為夷齊矣若乃臨官受取金錢山積發覺則自恤得了免退則旬日復用者曽史亦將變為盜跖矣如此則雖貢士皆中不辭於官長之不良或曰能言不必能行今試經對䇿雖過豈必有政事之才乎抱朴子答曰古者猶以射擇人況經術乎如其舎旃則未見餘法之賢乎此也夫豐草不秀塉土巨魚不生小水格言不吐庸人之口髙文不墮頑夫之筆故披洪範而知箕子有經世之噐覽九術而見范生懐治國之略省夷吾之書而明其有撥亂之幹視不害之文而見其精霸王之道也今孝㢘必試經無脱謬而秀才必對䇿無失指則亦不得闇蔽也良將髙第取其膽武猶復試之以䇿況文士乎假令不能必盡得賢能要必愈於了不試也今且令天下諸當在貢舉之流者莫敢不勤學但此一條其為長益風教亦不細矣若使海内畏妄舉之失凡人息僥倖之求背競逐之末歸學問之本儒道將大興而私貨必漸絶竒才可得而役庶官可以不曠矣或曰先生欲急貢舉之法但禁錮之罪竒而且重懼者甚衆夫急轡繁䇿伯樂所不爲宻防峻法徳政之所耻抱朴子曰夫骨填肉補之藥長於養體益夀而不可以救暍溺之急也務寛含垢之政可以蒞敦御朴而不中以拯衰弊之變也虎狼見逼不揮戈奮劔而彈琴詠詩吾未見其身可保也燎火及室不奔走灌注而揖譲盤旋吾未見其焚之自息也今與知欲賣䇿者論此是與跖義捕盜也抱朴子曰今普天一統九垓同風王制政令誠宜齊一夫衡量小器猶不可使徃徃而有異況人士之格而可參差而無檢乎江表雖逺宻邇海隅然染道化率禮教亦既千餘載矣徃雖暫隔不盈百年而儒學之事亦不偏廢也惟以其土宇於中州故人士之數不得鈞其多少耳及其徳行才學之高者子游仲任之徒亦未謝上國也昔吳土初附其貢士見偃以不試今太平已近四十年矣猶復不試所以使東南儒業衰於在昔也此乃見同於左衽之非所以别之也且夫君子猶愛人以禮況為其愷悌之父母邪法有招患令有損化其此之謂也今貢士無復試者則必皆修馳逐以競虚名誰肯復開卷受書哉所謂饒之適足以敗之者也自有天性好古心恱藝文學不為禄味道忘貧若法高卿周生烈者學精而不仕狥乎榮利者萬之一耳至於寗越倪寛黄霸之徒所以强自篤厲於典籍者非天性也皆由患苦困瘁欲以經術自拔耳向使非漢武之世則朱買臣嚴助之屬亦未必讀書也今若取富貴之道幸有易於學者而復素無自然之好豈肯復空自勤苦執灑掃為諸生逺行尋師問道者乎兵興之世武貴文寢俗人視儒士如僕虜見經誥如芥壤者何哉由於聲名背乎此也夫不用譬猶售章甫於夷越狥髯蛇於華夏矣今若遐邇一例明考課試則必多負笈千里以尋師友轉其禮賂之費以買記籍者不俟終日矣抱朴子曰才學之士堪秀孝者已不可多得矣就令其人若如桓靈之世舉吏不先以財貨便安臺閣主者則雖諸經兼本解於問無不對猶見誣枉使不得過矣常追恨于時執事不重為之防余意謂新年當試貢舉者今年便可使儒官才士豫作諸䇿計足周用集上禁其留草殿中封閉之臨試之時亟賦之人事因縁於是絶當答䇿者皆可㑹著一處高選臺省之官親監察之又嚴禁其交闗出入畢事乃遣違犯有罪無赦如此屬託之冀窒矣夫明君恃已之不可欺不恃人之不欺己也亦何耻於峻為斯制乎若試經法立則天下可以不立學官而人自勤樂矣案四科亦有明解法令之狀今在職之人官無大小悉不知法令或有㣲言難曉而小吏多頑而使之決獄無以死生委之以輕百姓之命付無知之人也作官長不知法為下吏所欺而不知又決其口筆者憤憤不能知食法與不食不問不以付主者或以意斷事蹉跌不慎法令亦可令亷良之吏皆取明律令者試之如試經髙者隨才品叙用如此天下必少弄法之吏失理之獄矣抱朴子外篇卷十五終抱朴子外篇卷
