front:
  text: 三十六
  hash: sha256:0a16b41faa0a2e6ada265d48c852af764be7a6122f7abfa049da2882d0941c0a
body:
  text: 晋丹陽洪稚川著安貧抱朴子曰昔漢火寢耀龍戰虎爭九有幅裂三家據有樂天先生者避地蓬轉播流岷益始處昵於文休未見知於孔明而言髙行方獨立不羣時人憚焉莫之或與時二公之力不䏻違衆遂令斯生沈抑衡蓽齒漸桑榆而韋布不改而時主思賢不聞不知當途之士莫舉莫貢潜側武之陋巷竄䋲樞之蓬屋進廢經世之務退忘治生之事藜飡屢空朝不謀夕於是偶俗公子造而詰之曰蓋聞有伊吕之才者不乆滯於窮賤懐猗頓之術者不長處於飢寒逹者貴其知變智士驗乎不匱故范生出則㓕吳覇越為命世之佐入則貨殖營生累萬金之貲夫貧在六極富在五福詩美哿矣易貴聚人垂餌香則鱣鮪来懸賞厚則果毅奮長卿所以解犢鼻而擁朱旄曲逆所以下席扉而享茅土不韋所以食十萬之邑絳候所以㧞囹圄之困也故下郷儉而獲悔咎之辱漂嫗豐而千金之報先生無少伯之竒略專銳思乎六經忽絶粻切歩良之實禍慕不朽之虗名恥詭遇以干禄羞衒沽以要榮冀西伯之方畋俟黄河之將清甘列子之菜色邈全神而遺形何異圖畫騏驥以代徒行之勞遥指海水以解口焦之渇張魚網扵峻極之巔施釣緍於修木之末雖自以為得所猶未免乎迂闊也事無身後之功物無違時之盛今海内分英雄力競象龔滔天猾夏放命駑蹇星馳以兼路豺狼口而交爭當投以訟屈素士䝉塵以履徑純儒釋皇道而治五霸之術碩生弃四科而恤月旦之評筐篚實者進於草萊乏資地者退於朝廷握黄白者排金門而陟玉堂誦方䇿者結世讎而委泥濘贄幣濃者瓦石成珪璋請託薄者龍駿弃林坰黨援多者偕驚飈以凌雲交結狹者侣跛鼈以沈泳夫丸泥已不䏻遏彭蠡之沸騰獨賢亦焉䏻反流遁之失正今先生入無儋石之儲出無束修之調徒含章如龍鳯文如虎豹吐之如波濤陳之如錦繡而凍餓於環堵何計䟽之可弔奚不汎輕舟以託迅御飛帆以逺之交瑰貨於朔南收金碧扵九疑廸崔烈之遐武縻好爵於清時徒疲勞於述作豈蟬蛻之有期也獨苦身以為名乃黄老之所嗤也樂天先生答曰六藝備研八索必該斯則富矣振翰摛藻德音無窮斯則貴矣求仁仁至旃焉如夫棲重淵以頥靈外萬物而自得遺紛埃於險塗澄精神於黙不窺牖以遐覽判㣲言而靡惑雖復設之以台猶爾而弗革也曷肯憂貧而與賈竪爭利戚窮而與凡瑣競逹哉吾子茍知商販可以崇寳耕也可以免飢不識逐麋者不顧兎道逺者其到遲也且夫尚父之鼓刀素首乃吐竒也萬鈞之為重衝飈不䏻移簫韶未九成靈鳥不紆儀也是以俟扶揺而登蒼霄者不充詘扵蓬蒿之杪騁蘭筋以陟六萬者不爭塗乎蹇驢之羣大孝必畏辱親之險故子春戰悸於下堂上智不貴難得之財故唐虞捐金而抵璧明哲消禍於未来知士聞利則慮害而吾子訊僕以汎舟孳孳於潤屋勸隋珠之彈雀探虎口以奪肉輕遺體於不測觸重險以逺至忘髪膚之明戒尋乾沒扵難冀若乃焚輪傾巖木㧞石飛陽候山峙洪濤㠑巍輕艘塵漂力與心違徒嗟泣而罔逮乃悟逹者之見㣲也昔囬憲以清苦稱髙陳平以無金免危廣漢以好利䘮身牛缺以載寳灰糜匹夫枉死於懐璧豐狐召災以美皮今吾子督余以誨盗之業敦余以召賊之䇿進酖酒以獻酬非養夀之忠益夫士以三墳為金玉五典為琴筝講肆為鍾皷百家為笙簧使味道者以辭飽酣徳者以義醒超流俗以髙蹈軼億代而揚聲方長驅以獨徃何貨賄之穢情夫藏多者亡厚好謙者忌盈含夜光者速剖循覆車者必傾過載者沈其舟慾勝者殺其生盖下士所用心上德所未營也於是問者茫然自失請備門生之末編永寳長生之良方焉抱朴子外篇卷三十六終抱朴子外篇卷
