seq: 50
front:
  text: 四十九
  hash: sha256:cd5af0a0a38988ab10151702cab5918147f2b6cc983275cfb11722c346b30e3c
body:
  text: 晋丹陽洪稚川著知止抱朴子曰禍莫大於無足福無厚乎知止抱盈居冲者必全之筭也宴安盛滿者難保之危也若夫善卷巢許管胡之徒咸蹈雲物以高驁依龍鳯以竦迹覘韜鋒於香餌之中寤覆車乎来軔之路違險塗以遐濟故能免詹何之釣緡可謂善料㣲景於形覿堅氷於末霜徙薪曲突於方熾之火纚舟弭檝於衝風之前瞻九犗而深沈望宻蔚而曾逝不託巢於葦苕之末不偃寢乎崩山之崖者也斯皆噐大量弘審機識致凌儕獨徃不牽常慾神參造化心遺萬物可欲不能蠆介其純粹近理不耗滑其清澄茍無若人之自然誠難企及乎絶軌也徒令知功成身退慮勞大者不賞狡兔訖則知獵犬之不用高鳥盡則覺良弓之將棄鑒彭韓之明鏡而念抽簮之術覩越種之闇機則識金象之貴若范公汎艘以絶景薛生遜亂以全潔二䟽投印於方盈田豫釋紱於漏盡進脫亢悔之咎退無濡尾之吝清風足以揚千載之塵德音足以祛將來之惑方之陳竇不亦邈乎或智小敗於謀大或轅弱折於載重或獨是陷於衆非或盡忠訐於兼㑹或唱高筭而受晁錯之禍或竭心力而遭呉起之害故有跼高蹐厚猶不免焉公旦之放仲尼之行賈生遜擯於下土子長熏骨乎無辜樂毅平齊伍員破楚白起以百勝拓疆文子以九術覇越韓信功盖於天下黥布㓕家以佐命榮不移晷辱以及之不避其禍豈智者哉為臣不易豈將一塗要而言之决在擇主我不足頼其驗如此告退避賢潔而且安美名厚實禍莫大焉能修此術萬未有一吉凶由人可勿思乎逆耳之言樂之者希獻納斯榮將身禍救訞謗其不睱何信受之可必哉夫矰繳紛紜則鴛雛翮坑穽充蹊則鱗虞歛跡情不可極慾不可滿達人以道制情以計遣慾為謀者猶冝使忠况自為榮而不詳哉蓋知足者常足也不知足者無足也常足者福之所赴也無足者禍之所鍾也生生之厚殺哉生矣宋氏引苗郢人張革誠欲其快而實速萎裂知進忘退斯之以乎夫筴奔而不止者尠不傾墜凌波而無休者希不沉溺㺯刄不息者傷剌之由也斫撃不輟者缺毁之原也盈則有損自然之理周廟之噐豈欺我哉故養由之射行人識以弛弦東野之御顔子知其方敗成功之下未易乆處也夫飲酒者不必盡亂而亂者多焉富貴者豈其皆危而危者有焉智者料事於倚伏之表伐木於毫末之吐高言不於累棊之際議治裘不於群狐之中古人佯狂為愚豈所樂哉時之宜然不獲已也亦有深逃而陸遭濤波幽遁而水被焚燒若龔勝之絶粒以殞命李業煎蹙以吞酖由乎迹之有朕景之不㓕也若使行如蹈氷身如居隂動無遺蹤可尋靜與無為為一豈有斯患乎又况乎揭日月以隱形骸撃建鼓以狥利噐者哉夫值明時則優於濟四海遇險世則劣於保一身為此永慨非一士也吾聞無熾不㓕靡溢不損煥赫有委灰之兆春草為秋瘁之端日中則昃月盈則蝕四時之序成功者退逺取諸物則構高崇峻之無限則頽壞惟憂矣近取諸身則嘉膳㫖酒之不節則結疾傷性矣况乎其高概雲霄而積之猶不止其威震人主而加崇又不息者乎蚊䖟墮山適足翺翔兕虎之墜碎而為此言大物不可失所也且夫正色彈違直道而行打撲干紀不慮讎隟則怨深恨積若舎法容非屬託如響吐剛茹柔委曲繩墨則忠䘮敗居此地者不亦榮乎是以身名並全者甚希而折足覆餗者不乏也然而入則蘭房窈窕朱帷組帳文茵兼舒於華第艶容粲爛於左右輕體柔聲清歌妙舞宋蔡之巧陽阿之妍口吐採菱延露之曲足躡渌水七槃之節和音悦耳冶姿娯心宻宴繼集醁不撤仰登綺閣俯映清淵遊果林之丹翠戯蕙圃之芬馥文鱗瀺灂釆羽頡頏飛繳墮雲鴻沉綸引魴鯉逺珍不索而交集玩弄紛華而自至出則朱輪耀路高盖接軫丹旗雲蔚麾節翕赫金口嘈囐戈甲璀錯得意託於後乗嘉㫖盈乎屬車窮游觀之娯極畋漁之懽聖明之譽滿耳而入諂悦之言異口同辭于時然意蔑古人謂伊吕管晏不足筭也豈覺崇替之相為首尾哀樂之相為朝暮肯謝貴盛乞骸骨背朱門而反丘園哉若乃聖明在上大賢讃事百揆非我則不叙兆民非我則不濟高而不以危為憂滿而不以溢為慮者所不論也窮達或問一流之才而或窮或達其故何也俊逸縶滯其有憾乎抱朴子荅曰夫噐業不異而有抑有揚者無知巳也故否泰時也通塞命也審時者何怨於沉潜知命者何恨於卑瘁乎故沉閭渟鈞精勁之良也而不以撃則朝菌不能斷焉珧華黎緑連城之寳也委之泥濘則瓦礫積其上焉故可珍而不必見珍也可用而不必見用也庸俗之夫闇於别物不分朱紫不辯菽麥唯以達者為賢而不知僥求者之所達也唯以窮者為劣而不詳守道之所窮也且夫懸象不麗天則不䏻揚大明灼無外嵩岱不託地則不能竦峻極概雲霄兎足因夷塗以騁迅龍艘汎激流以效速離光非燧人不熾楚金非歐冶不剡豐華俟發春而表艶棲鴻待衝颷而輕戾四嶽不明揚則有鰥不登庸叔牙不推賢則夷吾不式厚穰苴賴平仲以超踔淮隂因蕭公以鷹揚雋生由勝之之談曲逆縁無知之薦元直起龍縈之孔明公瑾貢虎卧之興覇故能美名垂於帝籍弘勲著扵當世也漢之末年呉之季世則不然焉舉士也必附己者為前取人也必多黨者為決而附己者不必足進之噐也同乎我故不能遺焉而多黨者不必逸群之才也信衆口故謂其可焉或信此之庸猥而不遣所念之近情或適彼之英異而不能平心於至公扵是釋銓衡而以䟽數為輕重矣棄度量而以綸集為多少矣于時之所謂雅人高韻秉國之鈞黜陟決已褒貶由口者尠哉免乎斯累也又况扵胷中卒有憎獨立疾非黨忌勝巳忽寒素者乎悲夫邈俗之士不群之人所以比肩不遇不可勝計或抑頓於藪澤或立朝而非退也蓋修德而道不行藏噐而時不㑹或俟河清而齒已沒或竭忠勤而不見知逺用不騁於一世勲澤不加於生民席上之珍鬱於泥濘濟物之才終於無施操築而不值武丁抱竿而不遇西伯自曩迄今將有何限而獨悲之不亦陋哉瞻徑路之逺而耻由之知大道之否而不改之齊通塞扵一塗付榮辱扵自然者豈懷悒悶於知希興永歎於川逝乎疑其有憾是未識至人之用心也小年之不知大年井蛙之不曉滄海自有来矣重言抱朴子曰余友人玄怕先生者齒在志學固巳窮覽六略旁綜河雒晝競羲和之末景夕照望舒之餘輝道靡逺而不究言無㣲而不測以儒道為城池以機神為干戈故談者莫不望塵而衘璧文士寓目而格筆俄而寤智者之不言覺守一之無咎意得則齊筌蹄之可棄道乖則覺唱高而和寡於是奉老氏多敗之戒思金人三緘之義括鋒頴而如訥韜脩翰於彤管含金懷玉抑謐華辯終日彌夕或無一言門人進曰先生黙然小子胡述且與庸夫無殊焉竊謂號鍾不鳴則不異於積銅浮磬息音則未别乎聚石也玄怕先生荅曰吾特逺名於萬代求知己於將來豈能競見知於今日標格於一時乎甄陶以盛酒雖美不見酣身卑而言高雖是不見信徒卷舌而竭聲將何救於流遁古人六十笑五十九不逺迷復乃覺有以也夫玉之堅金之剛也冰之冷也火之熱也豈須自言然後明哉且八音九奏不能無長短之病養由百發不能止將有一失之䟽翫慿河者數溺於水好劇談者多漏於口伯牙謹於操絃故終無煩手之累儒者敬其辭令故無樞機之辱淺近之徒則不然焉辯虚無之不急争細事以費言論廣脩堅白無用之説訟諸子非聖過正之書損教益惑謂之深逺委棄正經競洽邪學或與闇見者較脣吻之勝負為不識者吐清啇之談對非敵力之人旁無賞解之客何異奏雅樂於木梗之側陳玄黄於土偶之前哉徒口枯氣乏椎肮抵掌斤斧缺壞而槃節不破勃然戰色而乖忤愈逺致令恚容表顔醜言自口偷薄之變生乎其間旣玷之謬不可救磨未若希聲以全大音約説以俟識者抱朴子外篇卷四十九終抱朴子外篇卷五十晋丹陽洪稚川著自叙
