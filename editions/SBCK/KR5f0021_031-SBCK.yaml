front:
  text: 三十一
  hash: sha256:df93f417c1deeee2056c628bef9b7adf9f4e9d7ab33fff32a0a42d676e919b1a
body:
  text: 晋丹陽洪稚川著省煩抱朴子曰安上治民莫善於禮彌綸人理誠為曲備然冠婚飲射何煩碎之甚邪人倫雖以有禮為貴但當令足以叙等威而表情敬何在乎升降揖讓之繁重拜起俯伏之無已邪徃者天下乂安四方無事好古官長時或修之至乃講試累月督以楚撻晝夜修習廢寢與食經時學之一日試之執卷從事案文舉勲黜謫之罰又在其間猶有過誤不得其意而欲以為以此為生民之常事至難行也此墨子所謂累世不能盡其學當年不能䆒其事者也古人詢于蒭蕘慱採童謡狂夫之言猶在擇焉至於墨子之論不能非也但其張刑開塗徑浹人事備王道不能曲述耳至於譏葬厚刺禮煩未可棄也自建安之後魏之武文送終之制務在儉薄此則墨子之道有可行矣余以為喪亂既平朝野無為王者所制自君作古可命精學洽聞之士才任損益免於拘愚者使删定三禮割棄不要次其源流總合其事集以相從其煩重逰辭異而義同者存之不可常行除之無所傷損卒可斷約而舉之勿令沈隠復有凝滯其吉凶噐用之物爼豆觚觶之屬衣冠車服之制旗章采色之美官室尊卑之品朝饗賔主之儀祭奠殯葬之變郊祀禘祫之法社稷山川之禮皆可减省務令約儉夫約則易從儉則用少易從則不煩用少則費薄不煩則涖事者無過矣費薄則調求者不苛矣拜伏揖譲之節升降盤旋之容使足叙事無令小碎條牒各别令易案用今五禮混撓雜紛錯枝分葉散重出牙見更相貫渉舊儒尋案猶多所滯駮難漸廣異同無已殊理兼增月長自非至精莫不惑悶躊躇岐路之衢愁勞羣疑之藪煎神瀝思考校叛例嘗有窮年竟不豁了治之勤苦决嫌無地呻吟尋析憔悴决角修之華首不立妨費日月廢棄他業愁困後生真未央矣長致章句多於本書今若破合雜俗次比種稷刪削不抗其綱較其令炳若日月之著明灼若五色之有定息學者萬倍之役弭諸儒争訟之煩將来逹者觀之當美於今之視周矣此亦改燒石去血食之比無所憚難而恨恨於惜懷推車遲於去巢居也然守常之徒而卒聞此義必将愕然創見謂之狂生矣夫三王不相㳂樂五帝不相襲禮而其移風易俗安上治民一也或革或因損益懷善何必當乗船以登山䇿馬以渉川甲以升廟堂重裘以當隆暑乎若謂古事終不可變則棺椁不當代薪埋衣裳不宜改裸矣抱朴子外篇卷三十一終抱朴子外篇卷
