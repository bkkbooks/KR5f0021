front:
  text: 二十六
  hash: sha256:edc30d933f2ede735baa432ccaaa3a2541551ae62a2425c1466924a1c64660c8
body:
  text: 晋丹陽洪稚川著譏惑抱朴子曰澄濁剖判庻物化生羽族或能應對焉毛宗或有知言焉于玃識徃歸終知来玄禽解隂陽虵螘逺泉流蓍無以過焉甘石不能勝焉夫唯無禮不厠貴性厥初古民無階級上聖悼混然之甚陋愍巢宂之可鄙故棟宇以去鳥獸之群制禮數以異等威之品教之盤旋訓以揖讓立則罄折拱則抱鼓趨歩升降之節瞻視接對之容至于三千盖檢溢之隄防人理之所也故儼若冠於曲禮望貌首於五事出門有見賔之肅閑居有敬獨之戒顔生整儀於宵浴仲由臨命而結纓㳟容暫廢隋慢已及安上治民非此莫以盖人之有禮猶魚之有水矣魚之失水雖暫假息然枯糜可必待也人之棄禮雖猶然而禍敗之階也魯秉周禮暴兵不加魏式干木銳冦旋斾大楚帶甲百萬而有振槁之脆強秦殽函襲嶮而無折桞之固豈非棄三本而喪根柢之攸召哉矧乎安可觸情喪亂日乆風頺教沮抑斷之儀廢簡脫之俗成近人值正化之役庸民遭道綱之絶紊猶網魚之去水罟圍獸之出陸羅也喪亂以来事物屢變冠履衣服䄂財制日月改易無復一定乍長乍短一廣一狹忽髙忽卑或粗或細所無常以同為快其好事者朝夕放效所謂京輦貴大眉逺方皆半額也余實凡夫拙於隨俗其服物變不勝故不變無所損者余未曾易也雖見指笑余亦不理也豈茍欲違衆哉誠以為不耳上國衆事所以勝江表者多然亦有可否者君子行禮不求變俗謂違本之他國不改其桑梓之法也况於在其父母之鄉亦何為當事棄舊而強更學乎吳之善書則有皇象劉纂岑伯然朱季平皆一代之絶手如中州有鍾元常胡孔明張芝索靖各一之妙並用古體俱足周事余謂廢已習之法更勤苦以學中國之書尚可不湏也况於乃有轉易其聲音以效北語既不能便良似可耻可笑所謂不得邯鄲之歩而有匍匐之嗤者此猶其小者耳乃有遭喪者而學中國哭者令忽然無復念之情昔鍾儀莊舄不忘本聲古人韙之孔子云喪親者若嬰兒之失母其號豈常聲之有寧令哀有餘而禮不足哭以洩哀妍拙何在而乃治其音非痛切之謂也又聞貴人在大哀或有疾病服石散以數食宣藥勢以飲酒為性命疾患危篤不堪風冷幃帳茵褥任其所安於是凡小人之有財力者了不復居於喪位常在别房髙牀重褥美食大飲或與宻客引滿投空至於沈醉曰此京洛之法也不亦惜哉余之鄉里先徳君子其居重難或并在衰老於禮唯應縗麻在身不成喪致毁者皆過哀啜粥口不經甘時人雖不肖者莫不企及自勉而今人乃自取如此何其相去之遼緬乎又凡人不解呼謂中國人之居喪者多皆奢溢殊不然也吾聞晉之宣景文武四帝居親喪皆毁瘠踰制又不用王氏二十五月之禮皆行七月服于時天下之在重哀者咸以四帝為法世人何獨不聞此而虚誣髙人不亦惑乎抱朴子外篇卷二十六終抱朴子外篇卷
