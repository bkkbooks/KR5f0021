body:
  text: 臣節抱朴子曰昔在唐虞稽古欽明猶俟群后之翼亮用臻巍巍之成功故能熙帝之載庶績其凝四門穆穆百揆時序蠻夷無猾夏之變阿閣有鳴鳯之巢也喻之元首方之股肱雖有尊卑之殊邈實若一體之相頼也君必度能而授者備乎覆餗之敗臣必量才而受者故無流放之禍夫如影如響俯伏惟命者偷容之尸素也違令犯顔蹇蹇匪躬安上之民翰也先意承指者侫諂之徒也匡過弼違者社稷之骾也必將伏斧鑕而正諌據鑊而盡言忠而見疑諍而不得者待放可也必死無補將増主過者去之可也其動也匪訓典弗據焉其靜也匪憲章弗循焉請託無所容申繩不顧私明刑而不濫乎所恨審賞而不加乎附已不專命以招權不含洿而談㓗進思盡言以攻謬退念推賢而不蔽夙興夜慼庶事之不康也儉躬約志若䇿奔於薄氷也約謀貢士不宣之於口非義之利不棲之乎心立朝則以砥矢爲操居己則以羔羊為節當危值難則忘家而不顧命擥衡執銓則平懐而無彼此儀蕭公之宇宙羨張陳之畫竒追周全之盡規准二鮑之直視蹈嬰弘之節儉執恬毅之守終甘此離絶炙身之分戒彼韓英失忠之禍出不辭勞入不數功歸勲引過讓以先下專誠祗慄恒若天威之在顔也宵夙䖍竦有如湯鑊之在側也負荷寄託則以伊周為師表宣力四方則以吉召為軌儀送徃事君則竭忠貞而不㢠摶噬干紀則若鷹鸇之鳥雀蕃扞壃場則慕魏絳李牧之高蹤蒞衆撫民則希文翁信臣之徳化夫忠至者無以為國況懷智以迷上乎義督者滅祀而無憚況黜辱之敢辭乎故能保勞貴以顯親託良哉於輿歌昆吾彛器能者鐫勲臯陶后稷亦何人哉抱朴子曰人臣勲不弘則耻俸禄之虚厚也績不茂則羞爵命之妄高也履信思順天人攸賛畏盈居謙乃終有慶舉足則蹈道度抗手則奉繩墨褒崇雖淹留而悔辱亦必逺矣若夫損上以附下廢公以營私阿媚曲從以水濟水君舉雖謬而諂笑賛善數進玩好陷主於惡巧言毁政令色取悦上蔽人主之明下杜進賢之路外結出境之交内樹背公之黨雖才足非言足文過專威若趙高擅朝如董卓未有不身膏剡鋒家靡湯火者也然而愚瞽舍正即邪違真侣偽親覽傾僨不改其軌無禍之集匪降自天也抱朴子曰臣喻股肱則手足也履氷執不得辭焉是以古人方之於地掘之則出水泉樹之則秀百穀生者立焉死者入焉功多而不望賞勞瘁而不敢怨審識斯術保己之要也抱朴子曰臣職分則治統廣則多滯非賁獲之壯不可以舉兼人之重非萬夫之特不可總異官之局韓侯所以罪侵胃之典子元所以懼不勝之禍也若乃才力絶倫文武兼允人有腹心之高筭出有折衝之逺畧雖事殷而益舉兩循而俱濟舎之則彛倫斁委之而無其人者兼之可也非此器也宜自忖引轅若載重尠不及矣常人貪榮不慮後患身既傾溺而禍逮君親不亦哀哉人皆辭斧斤所未開而莫讓攝官抱朴子外篇卷六終抱朴子外篇卷七晋丹陽洪稚川著良䂓
