body:
  text: 崇教抱朴子曰澄視於秋毫者不見天文之煥炳肆心於細務者不覺儒道之弘逺翫鮑者忘蕙迷大者不能及夫受繩墨者無枉刳之木染道訓者無邪僻之人治之術莫良乎學學之廣在於不倦不倦在於固志志茍不固則貧賤者汲汲於營生富貴者沈淪於逸樂是以遐覽淵慱者曠代而時有面牆之徒比肩而接武也若使素士則晝躬耕以餬口夜薪火以修業在位則以酣宴之餘暇時遊觀於勸誡則世無視内游夏不乏矣亦有飢寒切己藜藿不給膚困風霜口乏糟糠出無從師之資家有暮旦之急釋耒則農事廢執卷則供養虧者雖闕學業可恕者也所謂千里之足困於鹽車之下赤刀之鑛不經歐冶之門者也若夫王孫公子優游貴樂婆娑綺紈之間不知稼穡之艱難目倦於玄黄耳疲乎鄭衛鼻饜乎蘭麝口爽於膏粱冬沓貂狐之温麗夏縝紗縠之翩飄出驅慶封之輕軒入宴華房之粲蔚朱翠於楹梲積無己於箧匱陳妖冶以娯心湎醁以沈醉行為㑹飲之魁坐為愽奕之帥省文章既不曉覩學士如草芥口筆乏乎典據牽引錯於事劇談則方戰而已屈臨疑則生老而憔悴雖菽麥之能辯亦奚别乎瞽瞶哉抱朴子曰蓋聞帝之元儲必入太學承師問道齒於國子者以知為臣然後可以為君知為子然後可以為父也故學立而仕不以政學操刀傷割鄭喬所歎觸情縱欲謂之非人而貴游子弟生乎深宫之中長乎婦人之手憂懼之勞未甞經心或未免於襁褓之中而加青紫之官纔勝衣冠而居清顯之位操殺生之威提黜陟之柄榮辱决於與奪利病感於唇吻愛惡無時暫乏毁譽括厲於耳嫌疑象似是而非因機㑹以坐無端藉素信以設巧言交構之變千端萬緒巧筭所不能詳毫墨所不能究也無術學則安能見邪正之真偽具古今之行事自悟之理無所感假能無傾巢覆車之禍乎先哲居髙不敢忘危愛子欲教之義方雕琢切磋弗納於邪偽選明師以象成之擇良友以漸染之督之以慱覽示之以成敗使之察徃以悟來觀彼以知此驅之於直道之上歛之乎撿括之中懔乎若跟掛於萬刃慄然有如乘奔以履氷故能多逺悔吝保其貞吉也昔諸竇道教之福霍禹受率意之禍中山東平以好古而安燕刺由面牆而危前事不忘今之良鑒也湯武染乎伊吕其興勃然辛癸染乎推崇其亡忽焉明友師傅尤宜精簡必取寒素徳行之士以清苦自立以不群見憚者其經術如仲舒柄榮者强直若龔遂王吉者能朝夕講論忠孝之至道正色證存亡之軌迹以洗濯垢閑邪矯枉宜必抑情遵憲法入徳訓者矣漢之末世呉之晚年則不然焉望冠盖以選用任朋黨之華譽有師友之名無拾遺之實匪唯無益乃反為損故其所講非道徳也其所貢進非忠益也唯在於新聲艶色輕體妙手評歌謳之清濁理管絃之長短相狗馬之勦駑議遨遊之處所比錯塗之好惡方雕琢之精麤校彈棊樗蒲之巧拙計漁獵相掊之勝負品藻妓妾之妍指摘衣服之鄙野爭乘之善否論弓劍之踈宻招竒合異至於無限盈溢之過日増月甚其談宫殿則逺擬瑶臺瓊室近効阿房林光以千門萬户為局促以昆明太液為淺陋笑茅茨為不肖以土堦爲朴騃民力竭於功役儲蓄靡於不急起土山以准嵩霍决渠水以象九河登凌霄之華觀闢雲際之綺窻淫音譟而惑耳羅揮而亂目濮上北里迭奏迭起或號或呼俾晝作夜流連於羽觴之間沈淪乎絃節之側或建翠翳之青葱或射勇禽於郊坰馳輕足於嶮峻之上暴僚於盛日之下舉火而往乘星而返機事廢而不修賞罰棄而不治或浮文艘於滉瀁布宻網於緑川垂香餌於漣潭縱櫂歌於清淵飛高繳以下輕鴻引沈綸以援潜鱗或結罘於林麓之中合重圍於山澤之表列丹飈於豊草騁逸於平原縱盧猎以噬狡獸飛輕鷂以鷙翔禽勁弩殪狂兕長㦸斃熊虎如此既彌年而不猒歷載而無已矣而又加之以四時請㑹祖送慶賀要思數之宻客接執贄之嘉賔人間之務宻勿罔極是以雅正稍逺遨逸漸篤其去儒學乎邈矣能獨見崇替之理自拔淪溺之中舍敗徳之嶮塗履長世之大道者良甚鮮矣嗟乎此所以保國安家者至稀而傾撓泣血者無筭也今聖明在上稽古濟物堅隄防以杜决溢明褒貶以彰勸沮想宗室公族及貴門富年必當競尚儒術撙節藝文釋老莊之意不急精六經之正道也抱朴子外篇卷四終抱朴子外篇卷五晋丹陽洪稚川著
