  text: 四十七
  hash: sha256:c56feabd159562ff0991519b1d52c1d16e65798d88d04d6ea7c5a96f707ea465
body:
  text: 晋丹陽洪稚川著彈禰抱朴子曰漢末有禰衡者年二十有三孔文舉齒過知命身居九列文學冠群少長稱譽名位殊絶而友衡於布衣又表薦之於漢朝以為宜起家作臺郎云惟岳降神異人並出目所一見輙誦於口耳所瞥聞不忘於心性與道合思若有神其歎之如此衡游許下自公卿國士以下衡初不稱其官皆名之云阿某或以姓呼之為某兒呼孔融為大兒呼楊脩為小兒荀彧猶强可與語過此以徃皆木梗泥偶似人而無人氣皆酒瓮飯囊耳百官大㑹衡時在坐忽顰悽愴哀歎忼慨或譏之曰英豪樂集非所歎也衡顧盻歴視稠衆而答曰在此積尸列柩之間仁人安能不悲乎曹公甞切齒欲殺之然復無正有入法應死之罪又惜有殺儒生之名乃謫作鼓吏衡了無悔情耻色乃縛角於柱口就吹之乃有異聲並揺鼗撃鼓聞者不知其一人也而論更劇無所顧忌尋亡走投荆州牧劉表表欲作書與孫權討逆于時已全據江東帶甲百萬欲結輔車之援共其距中國使諸文士立草盡思而不得表意乃示衡衡省之曰但欲使孫左右柱刀兒視之者此可用爾儻令張子布見此大辱人也即摧壞投地表悵然有怪色謂衡曰為了不中芸鋤乎惜之也索紙筆便更書之衆所作有十餘通衡凡一歴視之而已暗記書之畢以還表表以還主或有録所作之本也以比校之無一字錯乃各大驚表乃請衡更作衡則作成手不停輟表甚以為佳而施用焉衡驕傲轉甚一州人士莫不憎恚而表亦不復堪欲殺之或諌以為曹公名為嚴酷猶能容忍衡少有虚名若一朝殺之則天下游士莫復擬足於荆楚者也表遂遣之衡走到夏口依將軍黄祖祖待以上賔祖大兒黄射與衡偕行過人墓下俱讀碑銘一過而去乆之射曰前所視碑文大佳恨不寫也衡曰卿存之名耳我一覽尚記之即為暗書之末有一字石缺乃不分明衡與半字曰疑此當作某字恐不審也射省可難言行輕人宻願榮顯是以高游鳯林不能幽翳蒿萊然修己駮刺迷而不覺故開口見憎舉足蹈禍齎如此之伎倆亦何理容於天下而得其死哉猶裊鳴狐嚾人皆不喜音響不改易處何益許下人物之海也文舉為之主任荷之足為至到扵此不安已可知矣猶必死之病俞附越人所無如何朽木鈆鋌班輸歐冶所不能匠也而復走投荆楚間終陷極害此乃衡懵蔽之効也蓋欲之而不䏻得非能得而弗用者矣於戯才士可勿戒哉嵇生曰吾所惑者衡之虚名也子所論者衡之實病也敢不寤寐於指南投杖於折中乎抱朴子外篇卷四十七終抱朴子外篇卷
