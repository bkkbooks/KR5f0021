front:
  text: 二十二
  hash: sha256:8f4058e1381ee09c1c4d531e1cfb7566ec6ede463740a4c47658c737d16ac163
body:
  text: 晋丹陽洪稚川著行品抱朴子曰擬黄之覆載揚明並以表㣲文彪昺而備體澄獨見以入神者聖人也禀髙亮之純粹抗峻標以邈俗虛靈機以如愚不貳過而謟黷者賢人也居寂寞之無為蹈修直而執平者道人也盡烝嘗於存亡保髮膚以揚明者孝人也垂惻於有生恒恕己以接物者仁人也端身命以徇國經嶮難而一節者忠人也覿㣲理於難覺料倚伏於將來者明人也量理亂以卷舒審去就以保身者智人也順通塞而一情任性命而不滯者達人也不枉尺以直尋不降辱以苟命者雅人也據體度以動静毎清詳而無悔者重人也體氷霜之粹素不染㓗於勢利者清人也篤始終於寒暑雖危亡而不猜者義人也守一言於久要厯嵗衰而不渝者信人也摛鋭藻以立言辭炳蔚而清允者文人也奮果毅之壯烈騁干戈以静難者武人也甄墳索之淵奥該前言以窮理者儒人也銳乃心於精義吝寸隂以進徳者益人也識多藏之厚亡臨禄利而如遺者廉人也不改操於得失不傾志於可欲者貞人也䘏急難而㤀勞以憂人為己任者篤人也潔皎分以守終不遜厚而苟免者節人也飛清機之英麗言約暢而判滯者辯人也每居卑而推功雖處㤗而滋恭者謙人也崇惇睦於九族必居正以赴理者順人也臨凝結而能斷操䋲墨而無私者幹人也㧞朱紫於中搆剖猶豫以允當者理人也步七曜之盈縮推興亡之道度者術人也赴白刃而㤀生格兕虎於林谷者勇人也整威容以肅衆伏法度而無二者嚴人也創機功以濟用總音數而並精者藝人也凌强禦而無憚雖嶮逼而不沮者人也執匪懈於夙夜㤀勞瘁於深峻者勤人也蒙謗讟而晏如不慴懼於可畏者勁人也聞榮譽而不歡遭憂難而不變者審人也知事可而必行不猶豫於羣疑者果人也循䋲墨以進止不乾沒於僥倖者謹人也奉禮度以戰競及親踈而無尤者良人也履道素而無欲時雖移而不變者朴人也凡此諸行了無一然而不躋善人之迹者下人也門人請曰善人之行既聞其目矣惡者之事可以戒俗者願文垂誥焉抱朴子曰不致養於所生損道而危身者悖人也懷邪偽以偷榮豫利己而忘生者逆人也背仁義之正茍危人以自安者凶人也好爭奪而無猒專醜正而害直者惡人也出繩墨以傷刻心好殺而安忍者雪人也邪説以浸潤謗累於忠貞者䜛人也雖言巧而行違實履濁而假清者佞人也不原本於枉直茍尚勝而肆怒者暴人也措細善以取信隂挾毒而無親者姦人也承風指以茍容揆主意而扶非者諂人也言不計於反覆好輕諾而無實者虚人也覩利地而亡義弃亷耻以茍得者貪人也覿艷逸而心蕩誇綺而思邪者淫人也見成事而疑惑動失計而多悔者闇人也背訓典而自任耻請問於勝己者損人也知善事而不建雖多為而無成者劣人也委徳行而不修奉權勢以取媚者弊人也履蹊徑以僥速推貨賄以争津者邪人也既傲狠以無禮好凌辱乎勝己者悍人也被抑枉而自誣事無苦而振懾者怯人也治細辯於稠衆非其人而盡言者淺人也闇事宜之可否雖企慕而不及者頑人也知事非而不改聞良䂓而増劇者惑人也無濟恤之仁心輕告絶於親舊者薄人也既疾其所不逮喜他人之有災者妬人也專財穀而輕義觀困匱而不振者吝人也冐至危以僥倖值禍敗而不悔者愚人也情局碎而偏黨志唯務於盈利者小人也騁鷹犬於原獸好博戲而無已者迷人也忘等威之異數快玩之誇麗者奢人也耽聲色與飲讌廢慶弔於人理者人也既無心於修尚又怠惰於家業者人也無抑斷之威儀每脱易而不思者輕人也觀道義而如醉聞貨殖而波擾者人也杖淺短而多謬闇趨舍之臧否者笨本歩切人也憎賢者而不貴聞髙言而如聾者嚚人也覩朱紫而不分雖提耳而不悟者蔽人也違道義以趑趄冐禮刑而罔顧者亂人也每動作而受嗤言發口而違理者拙人也事酋豪如僕虜值衰微而背惠者慝人也損貧賤之故舊輕人士而踞傲者驕人也弃衰色而廣欲非䆠學而逺遊者蕩人也無忠信之純固背恩養而趨利者叛人也當交顔而面從至析離而背毁者偽人也習强梁而專己距忠吿而不納者刺人也抱朴子曰人技未易知真偽或相似士有顔貌修麗風表閑雅望之溢目接之適意威儀如龍虎盤旋成䂓矩然心蔽神否才無所堪心中所有盡附皮膚口不能吐片竒筆不能屬半句入不能宰民出不能用兵治事則事廢銜命則辱命動靜無宜出處莫可葢難分之一也士有貌望樸悴容觀矬陋聲氣雌弱進止質澁然而含英懷寶經明行髙幹過元凱文蔚春林官則庶績康用武則克全獨勝蓋難分之二也士有謀猷淵䆳術畧入神智周成則思洞幽才兼能事神噐無宜而口不傳心筆不盡意造次之接不異凡庸蓋難分之三也士有機辯清鋭巧言綺粲擥引譬喻淵湧風厲然而口之所談身不能行長於識古短於理今為政政亂牧民民怨盖難分之四也士有外形足恭容䖍言恪而神䟽心慢中懷散放受任不憂居局不治盖難分之五也士有控命中空拳入白倒乘立五兵畢習而體輕慮淺手勦心怯虚試無對而實用無驗望塵奔北聞敵失魄盖難分之六也士有梗槩簡緩言希貌樸細行闕漏不為小勇跼踳拘檢犯而不校握爪垂翅名為弱愿然而膽勁心方不畏强禦義正所在視死猶歸支解寸斷不易所守盖難分之七也士有孝友温淑恂恂平雅履信思順非禮不蹈安困潔志操清氷霜而䟽遲迂闊不達事要見機不作所為無成居己梁倡受任不舉難分之八也士有行己髙簡風格峻峭嘯傲偃蹇凌儕慢俗不肅檢括不䕶小失適情率意旁若無人朋黨排譴談者同敗士友不附品藻所遺而立朝正色知無不為忠於奉上明於攝下蓋難分之九也士有含曠濟虚己受物藏疾匿瑕温恭亷潔勞謙冲退救危全信寄命不疑託孤可保而純良暗權仁而不斷善不能賞惡不忍罰忠貞有餘而幹用不足操柯猶豫廢法効非枉直混錯終於負敗蓋難分之十也夫物有似而實非若然而不然料之無惑望形得神聖者其將病諸况乎常人故用才取士推昵結友不可以不精擇不可以不詳試也若乃性行之惑變始正而終邪若王莾初則美於伊霍晚則劇於趙髙又非中才所能逆盡也若令士之易别如鷦鷯之與鴻鵠狐兎之與龍驎者則四凶不得官於堯朝管蔡不得幾危宗周仲尼無澹臺之失延陵無捐金之恨伊尹無七十之勞項羽無嫌范之悔矣所患於其如碔砆下音夫上音武之亂瑾瑜鷦螟之似鳯凰凝氷之水精煙熏之凝雲氣故令不謬者尟也惟帝難之矧乎近人哉夫唯大明鑒幽微靈銓揣物思灼沉昧瞻山識璞臨川知珠士於難分之中而無取舍之恨者使臧否區分抑揚咸允武丁姬文不獨治而傅説吕尚不永弃高莾宰嚭不得成其惡恭石顯無所容其偽矣斯蓋取士之較畧選擇之大都耳精微之求存乎其人固非毫翰之所備縷也抱朴子外篇卷二十二終抱朴子外篇卷
