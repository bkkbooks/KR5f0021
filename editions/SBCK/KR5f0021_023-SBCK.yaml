front:
  text: 二十三
  hash: sha256:dcfb24deab3318afbb1bd34345d9b6e23275b3c8029687a8d34b076e169620dd
body:
  text: 晋丹陽洪稚川著弭訟姑子劉君士由之論曰人綱始於夫婦判合擬乎二儀是故大婚之禮古人所重將合二姓之好以承祖宗之基主人拜迎於門聴命於廟纁贄幣親御授綏壻有三年之喪致命女氏女氏許諾而不敢改大喪既沒請命於婿壻有辭焉然後乃嫁所以崇敬讓也豈有先訟後婚之謂乎而末世輕慢傷化敗俗舉不修義許而弗與訟䦧辱煩塞官曹今可使諸爭婚者未及同牢皆聴義絶而倍還酒禮歸其幣帛其甞已再離者一倍禆娉其三絶者再倍禆娉如此離者不生訟心貪吝者無利重受乃王治之要術不易之永法也抱朴子答曰劉君愍徳讓之凌替疾民爭之損化雖速我訟室家不足用和之貴將遂淪胥創讜言以拾世遺建嘉謀以拯流遁紛譁之俗將以此而易無耻之風將由兹而移彌綸情偽固難間矣誠經國之永法至益之篤論也洪以不敏不識至理造次承聞竊有疑焉夫婚媾之結義無逼迫彼則簡擇而求此則可意乃許輕諾後悔罪在女氏食言弃信與奪任情嚴防峻制未之能弭今猥恣之唯責禆娉倍貧者所憚也豊於財者則適其願矣後所許者或能富殖助其禆娉必所甘心然則先家拱黙不得有言原情論之能無怨歎乎夫不伏之人視死猶歸血刃之禍於是將起令茍惜其辭訟之小醜而搆其難忍之大恨所謂愛其僦切子宙覽之煩忘其凋殞之酷也夫買物於市者或加價而奪之則尠忍而不忿然矣况乎見奪待告之妻哉此法遂用者將使結婚者雖納敬親迎猶抱有見奪之慮何者劉君之論以同牢為斷固也爾則女氏雖受幣積年恒挾在意之威恃可數奪必惰於擇壻壻小不得意便得改悔結讎速禍莫此之甚矣曩人畫法慮闗終始杜漸防萌思之良精而不闕恣奪之路斷以報板之制者殆有意乎儻令女有國色傾城絶倫而值豪右權臣之從目玩冶容心忘禮度資累千金情無所吝十倍還娉猶所不憚况但一乎華氏不難於殺孔父而取其妻楚人為子迎婦以其美而自納之以此論之豈惜傾竭屋産以助女氏還前家之直哉小人輕薄睚計二切五魚䀝計二切在在成怨又喜委衰逐盛蹋冷趨此法之行則必多奪貧賤而與富貴者矣不審吾君何方以防弊乎或曰可使女氏受娉禮無豊約皆以即日報板後皆使時人署姓名於别板必十人已上以備逺行及死亡又令女之父兄若伯叔答壻家書必手書一若有變悔而證據明者女氏父母兄弟皆加刑罪如此庶於無訟者乎抱朴子外篇卷二十三終抱朴子外篇卷
