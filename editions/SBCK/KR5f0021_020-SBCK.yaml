body:
  text: 名實門人問曰聞漢末之世靈獻之時品藻乖濫英逸窮滯饕餮得志名不凖實賈不本物以其通者為賢塞者為愚其故何哉抱朴子答曰夫雷霆輷磕而或不聞焉七曜經天而或不見焉豈唯形噐有聾瞽哉心神所蔽亦又如之是以聞格言而不識者非無耳也見英異而不知者非無目也由乎聰不經妙而明不逮竒也夫智大量逺者盤桓以山峙噐小志近者蓬飛而萍浮夫唯山峙故莫之能動焉夫唯萍浮故流而不滯焉方之貨也則緘連以待賈者唯至珍而難售鳴鼔以狥之者雖凡蔽而易盡比之材也則結根於嵩岱者雖竦葢千仞垂䕃萬畆而莫之知也挿株於塗要者雖鈎曲戾細而速朽而猶見用也故廟堂有枯楊之瑚簋窮谷多不伐之梓橡也是以竊華名者螻騰於雲霄失實賈者翠虬淪乎九泉於是斥鷃凌風以髙奮靈鳯卷翮以幽戢鉛鋒充太阿之寶犬羊佻獨行貌勑高切虎狼之資矣夫佞者鼓珍賂為勁羽則無高而不到矣乘朋黨為舟楫則無逺而不濟矣持之以夙興側立加之以先意承指其利口謏辭也似辦其道聴塗説也似學其心險貌柔也似仁其行汙言㓗也似亷其好説人短也似忠其不知忌諱也似直故多通焉且亦奉望我者欲我益之不求我者我不能愛自然之理也夫賢常少而愚常多多則比周而匿瑕少則孤弱而無援佞人相汲引而柴正路俊哲處下位而不見知㧞茅之義圯而負乘之羣興亢龍髙墜泣血漣如故子西逐大聖之仲尼臧倉毁命世之孟軻二生不免斯患降兹亦何足言斯禍蓋與開闢並生苦之匪唯一世也歴覽振古多同此疾至於駑蹇矯首於琱切多么輦駥驥委牧乎林埛彼已尸䘵國殄瘁下凌上替寔此之由或蟲流而莫歛或逆竄於申亥或擢筋於廟梁或絶命於望夷葢所㧞之非真而忠能之不用也故明君勤於招賢而汲汲於擢竒導達凝滯而嚴防壅蔽才誠足委不拘於屠釣言審可施抽之於戎戍或舉於牛口之下而加之於群僚之上或㧞於桎梏之中而任以社稷之重故能勲業隆濟拓境服逺取威定功垂統長世也夫直繩者枉木之所憎也清公者姦慝之所讎也人主不能運鑒以索隱而必湏當塗之所舉然每觀前代專權之徒率其所舉皆在乎附己者也所薦者先乎利己者也毁所畏而進所愛所畏則至公者也所愛則同私者也至公用則姦黨破衆立則主威奪矣姦黨破則升泰之所由也主威奪則危亡之端漸矣毁所畏則恐辭之不痛雖刖劓之猶未意焉故必除之而後快也彼進所愛則苦談之不美雖立超之猶未逞心焉故必危彼以安此也是故抱枉而死無愆而黜者有自來矣所以體道合真嶷然特立才逺量逸懷霜履氷思綿天地噐兼元凱執經衡門淵渟嶽立寜潔身以守滯耻脅肩以苟合樂飢陋巷以勵髙尚之節藏噐全真以待天年之盡非時不出非禮不動結褐嚼蔬而不悒悒也黄髪終否而不悢悢切力尚也安肯蹙太山之峻以適鑿柄之中歛垂天之羽為戒旦之役編於仕而抑鬱庸兒之下捨鸞鳯之林適枳棘之藪競腐䑕於踞鴟而枉尺以直尋哉且大賢之狀也至拙其為味也甚淡蕭然自足泊爾無知知之者稀而不慼時不能用而不悶雖并日無藜藿之糝不以易不義之太牢也雖緼無卒嵗之服不肯樂無道之狐白也獨可散髪髙枕守其所有已絶不曲躬低眉求其所未湏也徳薄位厚弗交也名與實違弗親也榮華馳逐弗務也豪狹姦權弗接也俗説細辯不答也脅肩所赴弗随也貌愚而志遠面垢而行潔乎若嵩岱銓衡所不能測也浩乎若滄海斗斛所不能校也峻其重仞之髙隱其百官之富觀彼佻竊若草莾也邈世之操焉冠秋雲之表遺俗之神緬焉棲九玄之端雖窮賤而不可脅以威雖危苦而不可動以利其所業尚可聞而不可盡也其所執守可見而不可論也故疾之者齊聲而側目愛之者寡弱而無益亦猶撮壤不能填決河升水不能殄原火於是鼗鼓戢雷霆之音鞉切徒刀鞞切奴移恣喋鼛高音之響芳蕙芟夷臭鮑佩御玄鬯傾弃而不羞醨酪專灌於圓丘汗血驅放而垂耳跛蹇馳騁於鑾軒此古人之所以懷沙負石赴流魚葬而不堪與之同世也已矣悲夫然捐黎於洿濘非夜光之不真也由莫識焉投彤盧而不彎非繁弱之不勁也坐莫賞焉故瓊瑶俟荆和而顯連城之價烏號須逢門而著陷堅之功飛莵待子豫而飊騰俊民值知已而宣力若夫美玉不出重岫良弓不鑿百札驥騄不服朱軒命世不履爵勢則孰知其能攄符彩之耀曄頓雲禽於千仞騁逸迹以追風康庶績於百揆乎夫其不遇亦得不雜糅於瓦石鈞賤於朽木列鑣於下乘等望於凡哉嗟乎彍棘矢而望髙手乎渠廣䇿疲駑而求繼軌於周穆放斧斤而欲雙巧於班墨忽良才而欲彛倫之攸叙不亦難乎名實雖漏於一世徳音可邀乎將來樂天知命何慮何憂安時處順何怨何尤哉抱朴子外篇卷二十終抱朴子外篇卷
