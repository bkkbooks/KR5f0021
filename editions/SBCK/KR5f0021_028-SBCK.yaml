front:
  text: 二十八
  hash: sha256:3769279ebc02dc98782d30fd91e83d1081e7c2c3385ab33bfa1905f11ce65fdc
body:
  text: 晋丹陽洪稚川著百里抱朴子曰三台九列坐而論道州牧郡守操綱舉領其官益大其事愈憂煩劇所鍾其唯百里衆役於是乎出調求之所叢赴牧守雖賢而令長不堪則國事不舉萬機有闕其損敗豈徒止乎一境而已哉令長尤宜得才乃於臺省之官也用之不得其人其故無他也在乎至公之情不行而任私之意不違也或父兄貴重而子弟以聞望見選或髙人屬託而凡品以無能見叙或是所宿念或親戚匪他知其不可而能用也等亦時有快者不為盡無所中也要於不精者率多矣其能自効立勉修清約夙夜在公以求衆譽懼風績之不羙耻知己之謬舉尠矣庸猥之徒噐小志近冐于貨賄唯富是圖肆情恣慾元止無足在所司官知其有足頼主人舉劾彈糺終於當解慮其結怨反見中傷不敢犯觸而恣其貪殘矣如此庻亦安得不困毒而離叛離叛者衆則不得不屯聚而為羣盗矣夫百尋之室焚於分寸之飈千丈之陂潰於一蟻之穴何可不深防乎何可不改張乎而秉斤兩者或銓衡而任情掌柯斧者或曲繩墨於附己選之者既不為官擇人而求之者又不自謂不任於是政而政荒牧民而民散或有濁驕奢而困百姓者矣或有苛虐酷烈而多怨叛者矣或有闇塞退憒而庻事亂者矣或有潦倒疏緩而致㢮壊者矣或有好興不而疲人力者矣或有藏飬逋逃而行凌暴者矣或有不曉法令而受欺弄者矣或有以音聲酒色而致荒湎者矣或有圍碁樗蒱而廢政務者矣或有田獵逰飲而忘庻事者矣或有不省辭訟而刑獄亂者矣百姓不堪起為冦賊舋咎發聞寘于叢棘虧君上之明益刑書之煩而民之荼毒亦已深矣夫用非其人譬猶被木馬以繁纓何由騁迹於追風以壤龍當雲雨安能耀景於天衢哉若秉國之鈞出納王命者審良樂之顧盻不令跛蹇厠騏騄冐昧茍得闇於自量者慮中道之顛躓不以駑薾服鸞衡則何患庶績之不康何憂四凶之不退三皇豈足四五帝豈難六哉抱朴子外篇卷二十八終抱朴子外篇卷
