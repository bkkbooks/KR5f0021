front:
  text: 二十四
  hash: sha256:c0661086447e6de64c264c1d4d6c985b428d37dda7ba8debc1fdabdad2fb7f10
body:
  text: 晋丹陽洪稚川著酒誡抱朴子曰目之所好不可從也耳之所樂不可順也鼻之所喜不可任也口之所嗜不可隨也心之所欲不可恣也故惑目者必逸容鮮藻也惑耳者必妍音淫聲也惑鼻者必切昌給蕙芬馥也惑口者必珍羞嘉㫖也惑心者必勢利功名也五者畢惑則或承之禍為身患者不亦信哉是以智者嚴櫽括於性理不肆神以逐物檢之以恬愉増之以長筭其抑情也劇乎隄防之備决其御性也過乎腐轡之乘奔故能内保永年外免釁累也蓋飢寒難堪者也而清節者不納不義之穀帛焉困賤難居者也而髙尚者不處危亂之榮貴焉蓋計得則能忍之心全矣道勝則害性之事棄矣夫酒醴之近味生病之毒物無毫分之細益有丘山之巨損君子以之敗徳小人以之速罪耽之惑之尠切息淺不及禍世之士人亦知其然既莫能絶又不肯節縱心口之近欲輕召災之根源似渴之恣冷雖適已而身危也小大亂喪亦罔非酒然而俗人是酣是湎音其初筵也抑抑濟濟言希容整詠湛露之厭厭歌在鎬之愷樂舉萬夀之觴誦温克之義日未移晷體輕耳夫琉璃海螺之噐並用滿酌罰餘之令遂急醉而不止㧞轄投井於是口涌鼻溢濡首及亂屢儛蹮蹮舍其坐遷載號載呶宣也女友切如沸如或爭辭尚勝或啞啞笑聲烏格切獨笑或無對而談或嘔吐几筵或值蹷切居月良倡或冠脱帯解貞良者流華督之顧眄怯懦者效慶忌之蕃㨗遲重者蓬轉而波擾整肅者鹿踊而魚躍口訥於寒暑者皆垂掌而諧聲謙卑而不競者悉禆瞻以髙交亷耻之儀毁而錯之疾發闒茸之性露而傲佷之態出精濁神亂臧否顛倒或奔車走馬赴阬切客庚谷而不憚以九折之阪為螘封或登危蹋頺雖墮墜而不覺以吕梁之淵為牛跡也或肆忿於噐物或酗醟酗酒為命切於妻子加枉酷於臣僕用剡鋒乎熾火烈於室廬掊寶玩於淵流遷威怒於踞人加暴害於士友䙝嚴主以夷戮者有矣犯凶人而受困者有矣言雖尚辭煩而叛理拜伏徒多勞而非敬臣子失禮於君親之前㓜賤悖慢於耆宿之座謂清談爲詆詈以忠吿爲侵己於是白刃抽而忘思難之慮棒杖奮而罔顧乎前後搆漉血之讎招大辟之禍以少凌長則鄉黨加重責矣辱人父兄則子弟將推刃矣發人所諱則壯士不能堪矣計數深尅則醒者不能恕矣起衆患於湏㬰結百痾於膏肓切呼光奔駟不能追既往之悔思改而無自及之蹊蓋智者所深防而煦人所不免也其爲禍敗不可勝載然而歡集莫之或釋舉白盁耳不論於能否料瀝霤於小餘以稽遲為輕已傾匡注於所敬殷勤而成薄勸之不持督之不盡怨色醜音所由而發也夫風經府藏使人惚怳及其劇者自傷自虞或遇斯疾莫不憂懼吞苦忍痛欲其速愈至於醉之病性何異於兹而獨居宻以逃風不能割情以節酒若畏風憎病則沉之咎塞而流連之失正矣夫風之為疾猶展攻治酒之為變在乎呼吸及其間亂若存若亡視泰山如彈丸見滄海如盤孟仰嚾切荒旦天墮俯呼地陷卧待虎狼投井赴火而不謂惡也夫用身之如此亦安能惜敬恭之禮䕶喜怒之失哉昔儀狄既䟽大禹以興糟丘酒池辛癸以亡豊侯得罪以戴尊衘盃景升壞以三雅之爵劉松爛腸以逃暑之飲郭珍發狂以無日不醉信陵之凶短襄子之亂政趙武之失衆子反之誅戮漢惠之伐命灌夫之㓕族陳遵之遇害季布之䟽斥子建之免退徐邈之禁言皆是物也世人好之樂之者甚多而戒之畏之者至少彼衆我寡良箴安施且願君子節之而已曩者旣年穀貴人有醉者相殺牧伯因此輙有酒禁嚴令重申官司捜索收執榜擊也薄行切徇者相辱制鞭而死者太半防之彌峻犯者至多至乃穴地為釀油嚢懷酒民之好此可謂篤矣余以匹夫之賤託此空言之書末如之何矣又臨民者雖設其法而不能自斷斯物緩己急人雖令不從弗躬弗親庶民弗信以此而教教安得行以此而禁禁安得止哉沽賣之家廢業則困遂修賂遺依憑權右所屬吏不敢問無力者獨止而有勢者擅市張壚專利乃更倍售從其酤買公行靡憚法輕利重安能免乎哉或人難曰夫夏桀殷紂之亡信陵漢惠之殘聲色之過豈唯酒乎以其生患於古而斷之於今所謂以褒姒喪周而欲人君廢六宫以阿房之危秦而使王者結草菴也蓋聞千鍾百觚堯舜之飲也唯酒無量仲尼之能也姬旦酒肴不徹故能制禮作樂漢髙婆娑巨醉故能斬蛇鞠旅于公引滿一斛而斷獄益明管輅傾仰三斗而清辯綺粲楊雲酒不離口而太乃就子圉醉無所識而霸功以舉一瓶之醪傾而三軍之衆悦解毒之觴行而盜馬之屬感消憂成禮䇿勲飲至降神合人非此莫以也内速諸父外將嘉賔如淮如澠春秋所貴由斯言之安可識乎抱朴子答曰酒旗之宿則有之矣譬猶玄象著明莫大乎日月水火之原於是在焉然節而宣之則以養生立功用之失適則焚溺而死豈可恃懸象之在天而謂水火不殺人哉宜生之具莫先於食食之過多實結癥瘕况於酒醴毒之物乎夫使彼夏桀殷紂信陵漢惠流於亡國之淫聲沉溺於傾城之亂色皆由乎酒熏其性醉成其勢所以致極情之失忘修之術者也我論其本子識其末謂非酒禍禍其安出是獨知猛雨之霑衣而不知雲氣之所作唯患飛埃之糝目不覺飊風之所為也千鍾百觚不經之言不然之事明者不信矣夫聖人之異自才智至於形骸非能兼人有七尺三丈之長萬倍之大也一日之飲安能至是仲尼則畏性之變不敢及亂周公則終日百拜肴乾酒澄上聖戰戰猶且若斯況乎庸人能無悔乎漢髙應天承運革命向雖不醉猶當斬蛇于公聰達明於聴斷小大以情不失枉直是以刑不濫加世無怨民但其健飲不即廢事若論大醉亦俱無知决疑之才何頼於酒未聞臯繇甫侯子産釋之醉乃折獄也管輅年少希當劇談故假酒勢以助膽氣若過其量亦必迷錯及其刺毫於爻卦索神之變化占氣色以決盛衰聆鳴鳥以知方來候風雲而尅吉凶觀碑栢而識禍福豈復湏酒然後審之楊雲通人才髙思逺英贍之富禀之自天豈藉外物以助著述及其數飲由於偶好亦或有疾以宣藥勢耳子圉師志蓋已素定雖復不醉亦於終果瓶醪悦衆寓言之喻誠能賞罰允當威恩抱朴子外篇卷二十四終抱朴子外篇卷二十五晋丹陽洪稚川著
