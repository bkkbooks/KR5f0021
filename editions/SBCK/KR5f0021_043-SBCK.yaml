front:
  text: 四十二
  hash: sha256:233791b5812ce9fd46fc86bdb35ebc1a4bc10fb20e9e82a67dbdbc708245bc92
body:
  text: 晋丹陽洪稚川著應嘲抱朴子曰客嘲余云先生載營抱一韜景靈淵背俗獨徃邈爾蕭然計決而猶與不棲於心術分定而世累無餘於間伯陽以道德為首莊周以逍遥冠篇用能標峻格於九霄宣芳烈於罔極也今先生高尚勿用身不服事而著君道臣節之書不交於世而作譏俗救生之論甚愛骭毛而綴用兵戰守之法不营進趨而有審舉窮達之篇蒙竊惑焉抱朴子曰君臣之大次於天地思樂有道出處一情隱顯任時言亦何繫大人君子與事變通老子無為者也谷終隱者也而著其書咸論世務何必身居其位然後乃言其事乎夫噐非瓊瑶楚和不泣質非潜虬風雲不集余才短德薄幹不適治出處同歸行止一致豈必達官乃可議政事居否則不可論治亂乎常恨莊生言行自伐桎梏世業身居漆園而多誕談好畫魅憎圖狗馬狹細忠貞貶毀仁義可謂彫虎龍難以徵風雲空扳億萬不能救無錢孺子之竹馬不免於脚剥土柈之盈案無益於腹虚也或人又曰然吾子所著彈斷風俗言苦辭直吾恐適足取憎在位招擯扵時非所以揚聲發譽見貴之道也抱朴子曰夫制噐者珍於周急而不以采外形為善立言者貴扵助教而不以偶俗集譽為高若徒阿順諂䛕虚美隱惡豈所匡失弼違醒迷補過者乎慮寡和而廢白雪之音嫌難售而賤連城之價余無取焉非不能屬華豔以取悦非不知抗直言之多吝然不忍違情曲筆錯濫真偽欲令心口相契顧不愧景冀知音之在後也否泰有命通塞聽天何必書行言用榮及當年乎夫君子之開口動筆必戒悟蔽式整雷同之傾邪磋礱流遁之闇而著書者徒飾弄華藻張磔迂濶屬難驗無益之辭治靡麗虚言之美有似堅白厲修之書公孫刑名之論雖曠籠天地之外㣲入無間之内立觧連環離同合異鳥影不動雞卵有足犬可為羊大長虵之言適足示巧表奇以誑俗何異乎畫敖倉以救飢仰天漢以觧渴説崑山之多玉不能賑原憲之貧觀藥藏之簿領不䏻治危急之疾墨子刻木雞以厲天不如三寸之車鎋管青鑄騏驥於金象不如駑馬之周用言高秋天而不可施者丘不與易也抱朴子外篇卷四十二終抱朴子外篇卷
