body:
  text: 用刑抱朴子曰莫不貴仁而無能純仁以致治也莫不賤刑而無能廢刑以整民也咸云明后御世風向草偃道洽化醇安所用刑余乃論之曰夫徳教者黼黻之祭服也刑罰者捍刃之甲胄也若徳教治狡暴猶以黼黻御剡鋒也以刑罰施平世是以甲胄升廟堂也故仁者養物之器刑者懲非之具我欲利之而彼欲害之加仁無悛非刑不止刑為仁佐於是可知也譬存玄胎息呼吸吐納含景内視熊經鳥伸者長生之術也然艱而且遲為者尠成能得之者萬一焉病篤痛甚身困命危則不得不攻之以鍼石治之以毒烈若廢和鵲之方而慕松喬之道則死者衆矣仁之為政非為不美也然黎庶巧偽趨利忘義若不齊之以威紏之以刑逺羨羲農之風則亂不可振其禍深大以殺止殺豈樂之哉八卦之作窮理盡性明罰用獄著於噬嗑繫以徽纆存乎習坎然用刑其来尚矣逮於軒轅聖徳尤高而躬親征伐至于百戰殭尸涿鹿流血阪泉猶不能使時無叛逆載戢干戈亦安能使百姓皆良民不犯罪而不治者未之有也唐虞之盛象天用刑竄殛放流天下乃服漢文玄黙比隆成康猶斷四百鞭死者多夫匠石不舎䋲墨故無不直之木明主不廢戮罰故無陵遲之政也蓋天地之道不能純仁故青陽闡陶育之和素秋厲肅殺之威融風扇則枯瘁攄藻白露凝則繁英彫零是以品物阜焉嵗功成焉温而無寒則蝡動不蟄根植冬榮寛而無嚴則姦宄並作利器長守故明賞以存正必罰以閑邪勸沮之器莫此之要民設教濟其寛猛使懦不可狎剛不傷恩五刑之罪至于三千是䋲不可曲也司冦行刑君為不舉是法不可廢也䋲曲則姦囬萌矣法廢則禍亂滋矣亡國非無令也患於令煩而不行敗軍非無禁也患於禁設而不止故衆慝彌蔓而下黷其上夫賞貴當功而不必重罰貴得罪而不必酷也鞭朴廢於家則僮僕怠情征伐息於國群下不䖍愛待敬而不敗故制禮以崇之徳湏威而久立故作刑以肅之班倕不委䂓矩故方圓不戾於物明君不釋法度故機詐不肆其巧唐虞其仁如天而不原四罪姬公友于兄弟而不赦二叔仲尼之誅正卯漢武之殺外甥垂淚惜法蓋不獲已也故誅一以振萬損少以成多方之櫛髪則所利者衆比於割疽則所全者大是以炙刺痛而不可止者以痊病也刑法凶醜而不可罷者以救弊也六軍如林未必皆勇排鋒陷火人情所憚然恬顔以勸之則投命者尠斷斬以威之則莫不奮擊故役歡笑者不及叱咤之速用誘悦者未若刑戮之齊是以安于感深谷而嚴其法衛子疾弃灰而峻其辟夫以其所畏禁其所翫峻而不犯全民之術也明病之術者杜未生之疾達治亂之要者遏將來之患若乃以輕刑禁重罪以薄法衛厚利陳之滋章而犯者彌多有似穿穽以當路非仁人之用懷也善為政者必先端此以率彼治親以整踈不曲法以行意必有罪而無赦若石碏之割愛以威親晉文之忍情以斬頡故仁者為政之脂粉刑者御世之轡䇿脂粉非體中之至急而轡䇿湏臾不可無也肅恭少怠則慢惰已至威嚴暫弛則群邪生心當怒不怒姦臣為虎當殺不殺大賊乃發水久壞河山起咫尺尋木千丈始于毫末鑚燧之火勺水所滅鵠卵未孚指掌之所靡及其乘衝飈而燎巨野奮六羽以淩朝霞則雖智勇不能制也故明君治難於其易去惡於其㣲不伐善以長亂不操柯而猶豫焉然則刑之為物國之神器君所自執不可假人猶長劔不可倒捉巨魚不可脫淵也乃崇替之所由安危之源本也田常之奪齊六卿之分晉趙高之弑秦王莽之漢履霜逮氷由來漸矣或永歎於海濱或拊心乎望夷禍延宗祧作戒將來者由乎慕虚名於徃古忘實禍於當已也或人曰刑辟之興蓋存叔世立人之道唯仁與義我清静而民自正我無欲而民自樸烹鮮之戒不欲其煩寛以愛人則得衆恱以使人則下附故孟子以體仁為安楊子雲謂申韓為屠宰夫繁策急轡非造父之御嚴刑峻罰非三五之道故有虞手不指揮口不煩言恭已南靣而治化雍熈矣宓生政以率俗彈琴詠詩身不下堂而漁者霄肅矣必能厚惠薄歛救乏擢滯舉賢任才勸穯省用招以禮懷逺以徳陶之以成均治之以庠序化上而興善者必若靡草之逐驚風洗心而革靣者必若清波之滌輕塵朝有徳讓之群后野無犯禮之軌躅圜土可以虚蕪楚革可以永格何必賞罰可以為國乎抱朴子答曰易稱明罰敕法書有哀矜折獄爵人於朝刑人於市有自來矣豈從叔世多仁則法不立威寡則下侵上夫法不立則庶事汩矣下侵上則逆節萌矣至醇既澆於三代大樸又散於秦漢道衰於疇昔俗薄乎當今而欲結繩以整姦欺不言以化狡猾委轡䇿而乘奔馬於險塗舎柁櫓而汎舟以淩波盤旋以逐走盜揖譲以救災火斬晁錯以却七國舞于戈以平赤眉未見其可也蓋三皇步而五帝驟霸王以來載馳載騖當其弊也吏欺民巧冦盜公行髠鉗不足以懲無耻族誅不能禁覬覦重目以廣視累耳以逺聴抗燭以理滯事焦心以息姧源而猶市朝有呼嗟之音邉鄙有不聞之枉作威作福者或發乎瞻視之下凶家害國者或搆乎蕭墻之内而欲以太昊之道治偷薄之俗以畫一之歌救湧之亂非識因革之隨時明損益之變通也所謂刻舟以摸遺劔叅天而射五步摜犀兕之甲以涉不測之淵衿却寒之裘以禦鬱隆之暑踵之解結頤之搔背其為憤憤莫此之劇矣但當先令而後誅得情而勿喜使伯氏無怨於失邑虞芮知耻而無訟耳若强暴掩容操繩而不憚誘於含垢草蔓而不除恃藏疾之大言忘膏肓之近急何異焦喉之渇切身而遥指滄海於萬里之外滔天之水已及而方造舟於長洲之林安得免夸父之禍脫淪水之害哉世人薄申韓之實事嘉老莊之誕談然而為政莫能錯刑殺人者原其死傷人者赦其罪所謂土柈瓦胾無救朝飢者也道家之言髙則髙矣用之則弊遼落迂闊譬猶干將不可以縫線巨象不可使捕鼠金舟不能凌陽侯之波玉馬不任騁千里之迹也若行其言則當燔桎梏隳囹圄罷有司滅刑書鑄干戈平城池散府庫毁符節撤梁掊衡量離朱之目塞子野之耳汎然不繫反乎天牧不訓不營相忘江湖朝廷閴爾若無人民則至死不徃來可得而論難得而行也俗儒徒聞周以仁興秦以嚴亡而未覺周所以得之不純仁而秦所以失之不獨嚴也昔周用肉刑刖足劓鼻盟津之令後至者斬畢力賞罰誓有孥戮考其所為未盡仁也及其叔世罔法翫文人主苛虐號令不出宇宙禮樂征伐不復由已群下力競還為長蛇伐本塞源毁冠裂冕或沉之於漢或流之于彘失柄之敗由於不嚴也秦之初興官人得才衛鞅由余之徒式法於内白起王翦之倫攻取於外兼弱攻昧取威定霸吞噬四隣咀嚼群雄拓地攘戎龍變虎視實頼明賞必罰以基帝業降及杪季驕於得意窮奢極泰加之以威虐築城萬里離宫千餘鍾鼔女樂不徙而具驪山之役太半之賦閭左之戍坑儒之酷北擊獫切虚檢狁南征百越暴兵百萬動數十年天下有生離之哀家户懷怨曠之歎白骨成山虚祭布野徐福出而重號咷之讎趙高入而屯豺狼之黨天下欲反十室九空其所以亡豈由嚴刑此為秦以嚴得之非以嚴失之也且刑由刄也巧人以自成拙者以自傷為治國有道而助之以刑者能令慝偽不作凶邪改志若綱絶網紊得罪于天用刑失理其危必速亦猶水火者所以活人亦所以殺人存乎能用之與不能用夫癥瘕不除而不脩越人之術者難圖老彭之夀也姦黨實繁而不嚴彈違之制者未見其長世之福也但當簡于張之徒任以法理世選趙陳之屬委以案劾明主留神於上忠良盡誠於下見不善則若鷹鸇之搏鳥雀覩亂萌則若薙切他計田之芟蕪薉切於吠慶賞不謬加而誅戮不失罪則太平之軌不足迪令而不犯可庶幾廢刑致治未敢謂然也或曰然則刑罰果所以助教興善式遏軌忒也若夫古之肉刑亦可復與抱朴子曰曷為而不可哉昔周用肉刑積祀七百漢氏廢之年代不如至於改以鞭笞大多死者外有輕刑之名内有殺人之實也及於犯罪上不足以至死則其下唯有徒謫鞭杖或遇赦令則身無損且髠其更生之髮撾作方愈之創殊不足以懲次死之罪今除肉刑則死罪之下無復中刑在其間而次死罪不得不止於徒謫鞭杖是輕重不得不適也又犯罪者希而時有耳至於殺之則恨重而鞭之則恨輕犯此者為多今不用肉刑是次死之罪常不見治也今若自非謀反大逆惡于君親及用軍臨敵犯軍法者及手殺人者以肉刑代其死則亦足以懲示凶人而刑者猶任坐役能有所為又不絶其生之道而終身殘毁百姓見之莫不寒心亦足使未犯者肅慄以彰示將來乃過於殺人殺人非不重也然辜之三日行埋弃之不知者衆不見者多也若夫肉刑者之為摽戒也多昔魏世數議此事諸碩儒達學洽通殷理者咸謂宜復肉刑而意異者駮之皆不合也魏武帝亦以爲然直以二陲未賔逺人不能統至理者卒聞中國刖人肢體割人耳鼻便當望風謂爲酷虐故且停以湏四方之并耳通人楊子雲亦以爲肉刑冝復也但廢之來久矣坐而論道者未以爲急耳抱朴子外篇卷十四終抱朴子外篇卷十五晋丹陽洪稚川著
