front:
  text: 十九
  hash: sha256:9340996fc6c404c0ff856bacaed35ee78791a147a2c7e1eb2a4e61cbdc984deb
body:
  text: 晋丹陽洪稚川著任命抱朴子曰余之友人有居冷先生者恬愉静素形神相忘外不驚愚之容内不寄有為之心遊精墳誥樂以忘憂晝競羲和之末景夕照望舒之餘耀道靡逺而不䆒言無微而不研然車迹不軔切如震權右之國尺牘不經貴勢之庭是以名不出蓬户身不離畎畆於是翼亮大夫侯而難之曰余聞淵蟠起則雲赴道化霑則逸才奮故康衢有角歌之音爼發凌風之迹沽之則收不貲之賈踊之則超在天之舉耀逸景於暘谷播大明乎九垓勲廕當已聲揚罔極故尋仞之塗甚近而弗往者雖追風之脚不能到也楹棁之下至卑而不動者雖鴻鶤之翅未之及也况乎寢足於大之表歛羽於幽梧之枝安得效迅以尋景振輕乎蒼霄哉年期奄冉而不久託世飄迅而不再智者履霜則知堅氷之必至處始則悟生物之有終六龍促軌於大渾華顛倐忽而告暮古人所以映順流而頺歎眄過隙而興悲矣先生資命世之逸量含英偉以邈俗鋭翰汪濊以波涌六竒抑鬱而淵稸然不能凌扶揺以高竦揚清耀於九噐不陳於瑚簋之末體不免於負薪之勞猶奏和音於聾俗之地鬻章甫於被髪之域徒㤀寤於翰林鋭意以窮神崇琬琰於懷抱之内吐琳琅於毛墨之端躬困屢空之儉神勞堅髙之間譬若埋尺璧於重壤之下封文錦於沓匱之中終無交易之富孰賞堙翳之珍哉夫龍驥維縶則无以别乎蹇驢赤刀韜鋒則曷用異於鉛刃鱣鮪不居牛迹大鵬不滯蒿林願先生委龍蛇之穴升利見之塗釋户庭之獨㓗覽二鼠而逺寤越窮谷以登髙襲丹藻以改素競驚飈於清晨不盤旋以詣夜收名噐於崇髙嚮鍾之慶祚栢成一介之夫採薇何足多慕乎居泠先生應曰葢聞靈機㝠緬混茫昧禍福交錯乎倚伏之間興亡纒綿乎盁虚之㑹迅逝者不能脱逐身之景樂成者不能免理致之敗匠流末者未若挺冶元兆之中整已然者不逮原本乎朴之外是以覺尺蠖者甘屈以保伸識通塞者不慘悦於否泰且夫洪陶範物大象流形躁靜異尚翔沉舛情金寶其重羽矜其輕篤隘者執束於滓達妙者逍遥於清潢洿納行潦而潘噎渤澥吞百川而不盈鮋鰕踊悦於泥濘赤螭凌厲乎髙㝠嚼香餌者快嗜欲而赴死味虚淡者含天和而趨生識機神者瞻無兆而弗惑闇休咎者觸强弩而不驚各附攸好安肯改營吾聞五玉不能自剖於嵩岫騰蛇不能無霧而電征龍淵不能勿操而斷犀兕景鍾不能莫扣而揚洪聲金芝湏啇風而激耀倉庚俟烟煴而修鳴騏騄不苟馳以赴險君子不詭遇以毁名運屯則沉淪於勿用時行則髙竦乎天庭士以自衒為不髙女以自媒為不貞何必委洗耳之峻標效負爼之干榮哉夫其窮也則有虞婆娑而陶鈞尚父見逐於愚嫗范生來辱於溺簣苦怪切籠也式匿竒於耕牧及其達也則淮隂投竿而稱孤文種解屫而紆青傅説釋築而論道管子脱桎為上卿葢君子藏噐以有待也稸徳以有為也非其時不見也非其君不事也窮達任所值出處無所繫其靜也則為逸民之宗其動也則為元凱之表或運思於立言或銘勲乎國噐殊塗同歸其致一焉士能為可貴之行而不能使俗必貴之也能為可用之才而不能使世必用之也被褐茹草垂綸罝兎則心歡意得如將終身服冕乗軺兼朱重紫則若固有之常如布衣此至人之用懷也若席上之珍不積環堵之操不粹者予之過也知之者希名位不臻以玉為石謂鳯曰鷃者非余罪也夫汲汲於見知悒悒於否滯者常民之情也浩然而養氣淡爾而靡欲者無悶之志也時至道行噐大者不悦天地之間知命者不憂若乃狥萬金之貨以索百千之售多失骭聲干上毛我則未暇矣抱朴子外篇卷十九終抱朴子外篇卷二十晋丹陽洪稚川著
