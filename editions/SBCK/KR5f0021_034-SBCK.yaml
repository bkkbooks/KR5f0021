front:
  text: 三十四
  hash: sha256:c36def1b57825b05d01bde0cb1e6d6bc9713f6a52ae6fa56342512b1fadc0e37
body:
  text: 晋丹陽洪稚川著吳失抱朴子曰吳之杪季殊代同疾知前失之於彼不能改絃於此鑒亂亡之未逺而躡傾車之前軌覩枳首之争苺而忘同身之禍笑蟣虱之宴安不覺事異而患等見競濟之舟沈而不知殊塗而溺均也余生於晉世所不見余師鄭君具所親悉毎誨之云吳之挽世尤劇之病賢者不用滓充序紀綱弛紊吞舟多漏貢舉以厚貨者在前官人以黨强者為右匪富匪勢窮年無冀徳清行髙者懐英逸而抑淪有財有力者躡雲物以官躋主昏於上臣欺於下不黨不得不競不進背公之俗彌劇正直之道遂壊於是斥鷃因驚風以凌霄朽舟託迅波而電邁鴛鳯卷六翮於叢棘鷁首滯潢汙而不擢矣秉維之佐牧民之吏非母后之親則阿諂之人也進無補過拾遺之忠退無聴訟之幹虚談則口吐氷霜行己則濁於泥潦莫媿尸禄之剌莫畏致戎之禍以毁譽為織以威福代稼穡車服則光可以鑒豐屋則羣烏爰止叱咤疾於雷霆禍福速於神勢利傾於君儲積富乎公室出翟黄之衛從入遊玉根之藻棁僮僕成軍閉門為市牛羊掩原隰田池布千里有魚滄濯裘之儉以趙宣平仲之名内崇陶侃文信之訾實有安昌董鄧之汙雖造賔不沐嘉㫖之俟飢士不蒙升合之救而金玉滿堂伎妾溢房啇販千艘腐穀萬庾園囿擬上林館第僣太極粱肉餘於犬馬積珍䧟於帑藏其接士也葭莩之薄其自奉也有盡理之厚或有不開律令之篇卷而大理之位不識謹案之所置而處機要之職不知五經之名目而饗儒官之禄不閑尺之寒暑而坐著作之地筆不狂簡而受駮議之榮低眉垂翼而充奏劾之選不辨人物之精粗而委以品藻之政不知三才之軍勢而軒昂節盖之下屢為奔北之辱將而不失前鋒之顯號不别菽麥之同異而沗叨顧問之近任夫魚質龍文似是而非遭水而喜見即悲雖臨之以斧之威誘之以傾城之寳猶不能奮鉛鋒於犀兕騁駑蹇以追風非不忌重誅也非不恱美賞也體不可力無自柰何而欲與之輯熈百揆濟大務猶託萬鈞扵尺舟之上求千鍾於升合之中紲芻狗而責盧鵲之效鷄鶩而崇鷹揚之功其不可用亦較然矣吳主不此之思不加夕佞諂凡庸委以重任危機急於彍弩亡徴著扵日月而自謂安於峙嶽唐虞可仰也目力疲於綺粲而不以覽庶事之得失耳聦盡於淫音而不以證獻言之邪正榖帛靡於不而不以賑戰士之凍餒心神恱於愛媚而不以念存亡之理盖輕乎崇替之源而忽乎宗廟之重者也鄭君又稱其師左先生隠居天柱山不營禄利不友諸侯然心願太平憂桑梓乃慨然永歎於蓬屋之下告其門生曰漢必寢耀黄精載起纉樞紐於太㣲廻紫盖於鶉首聮天理物光宅東夏惠風於區外澤洽乎宇内重譯接武貢楛古侯切盈庭蕩蕩巍巍格于上下承平字文因循甚易而五絃謐響南風不詠上不獲㳟己之逸下不聞康哉之歌飛龍翔而不集淵虬蟠而不躍驎虞翳於㝠昧朱華牙而未秀隂陽相沴寒燠繆節七政告凶陵谷易所殷雷鞫磕於龍潜之月凝霜肅殺乎朱明之運玉燭不照沈醴不涌郊場多壘嘉生不遂其豈他哉誠由四凶不去元凱不舉用者不賢賢者不用也然髙槪逺量懐玉守靜㓗志無欲於物藏噐淵洿得意遺世非禮不動非時不見困而無悶窮而不悔樂天任命混一榮辱進無恱色退無戚容者固有伏死乎甕牗安肯衒沽以進趨掲其不貲之寳以競燕石之售哉孔墨之道昔曾不行孟軻楊雄亦居困否有徳無時有自来耳世無離朱皂白混焉時乏管青騏蹇糅焉磧礫積於金匱瑾瑶委乎溝洫匠石而遐淪梓豫忽而莫識己矣悲夫我生不辰弗先弗後將見吳土之化為晉域南民之變成北也言猶在耳而孫氏輿櫬抱朴子聞之曰二君之言可為来戒故録于篇欲後代知有吳失國匪降自天也若茍諱國惡纎介不貶則董狐無貴於直筆賈誼將受譏於過秦乎抱朴子外篇卷三十四終抱朴子外篇卷
