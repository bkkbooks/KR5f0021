body:
  text: 抱朴子外篇卷二晉葛洪撰審舉第十五抱朴子曰華霍所以能崇極天之峻者由乎其下之厚也唐虞所以能臻巍巍之功者實賴股肱之良也雖有孫陽之手而無騏驥之足則不得致千里矣雖有稽古之才而無宣力之佐則莫縁凝庶績矣人君雖明並日月神鑒未兆然萬幾不可以獨統曲碎不可以親總必假目以闢覽借耳以廣聴誠須有司是康是賛故聖莫不根心招賢以舉才為首務施玉帛於丘園馳翹車於巖藪勞於求人逸於用能自槐棘降逮皂𨽻論道經國莫不任職恭已無為而治平刑措而化洽無外萬邦咸寧設官分職其猶搆室一物不堪則崩撓之由也然未貢舉之士格以四科三事九列是之自出必簡標頴拔萃之俊而漢之末葉桓靈之世柄去帝室政在姦臣網漏防潰風頺教沮抑清徳而揚諂媚退履道而進多財力競成俗茍得無耻或輸自售之寳或賣要人之書或父兄貴顯望名而辟命或低頭屈膝積習而見収夫銓衡不平則輕重錯謬斗斛不正則少多混亂䋲墨不陳則曲直不分準格傾側則滓雜實繁以之治人則虐暴而豺貪受取聚斂以補買官之費立之朝廷則亂劇於棼絲引用駑庸以為之黨援而望風向草偃庶事之康何異懸瓦礫而責夜光絃不調而索清音哉何可不澄濁飛沉沙汰臧否嚴試對之法峻貪夫之防哉殄瘁攸階可勿畏乎古者諸侯貢士適者謂之有功有功者增班進爵貢士不適謂之有過有過者出位削地猶復不能免詩人興大車素餐之刺山林無伐檀兔罝之賢況舉之無非才之罪受之無負乘之患衡量一失其格多少安可復損乎夫孤立之翹秀藏器以待價瑣碎之輕薄人事以邀夫惟待價故頓淪於窮瘁矣夫唯邀速故佻竊而騰躍矣盖梟鴟屯飛則鴛幽集豺狼當路則麒麟避遁舉善而教則不仁者逺矣姦偽榮顯則英傑潜逝高概耻與闒茸為伍清節羞入饕餮之貫舉任並謬則羣賢括嚢羣賢括嚢則㓙邪相引㓙邪相引則小人道長小人道長則檮杌比肩頌聲所以不作怨嗟所以嗷嗷也高幹長材恃能勝己屈伸黙語聴天任命窮通得失委之自然亦焉得不墮多黨者之後而居有力者之下乎逸倫之士非禮不動山峙淵停知之者希馳逐之徒蔽而毁之故思賢之君終不知竒才之所在懐道之人願效力而莫從雖抱稷卨之器資邈世之量遂沉滯詣死不得登叙也而有黨有力者紛然鱗萃人乏官曠致者又美亦安得不拾掇而用之乎靈獻之世閹宦用事羣姦秉權危害忠良臺閣失選用於上州郡輕貢舉於下夫選用失於上則牧守非其人矣貢舉輕於下則秀孝不得賢矣故時人語曰舉秀才不知書察孝行父别居寒清素白濁如泥高第良將却如雞又云古人欲達勤誦經今世圖官免治生盖疾之甚也于時懸爵而賣之猶列肆也爭津者買之猶市人也有苴者無分而徑進空拳者望途而収迹其貨多者其官貴其財少者其職卑故東園積賣官之錢崔烈有銅臭之嗤上為下傚君行臣甚故阿佞幸獨談親容桑梓議主中正吏部並為魁儈各債其估清貧之士何理有望哉是既然矣又邪正不同譬猶氷炭惡直之人憎於非黨刀尺顛倒者則恐人之議己也達不由道者則患言論之不美也乃共搆合虚誣中傷清徳瑕累横生莫敢救拔於是曾閔獲商臣之謗孔墨蒙盜跖之垢懷正居貞者殞笮乎泥濘之中而狡猾巧偽者軒翥乎虹霓之際矣而凡夫淺識不辨邪正謂守道者為陸沈以履徑者為知變俗之隨風而動逐波而流者安能復身於徳行苦思於學問哉是莫不棄檢括之勞而赴用賂之速也斯誠有漢之所以傾來代之所宜深鑒也或曰吾子論漢末貢舉之事誠得其病也今彼欲戒既往之失避傾車之路改有代之絃調防法翫之或變今濮上巴人反安樂之正音腠理之疾無退走之滯患者豈有力乎士有丰姿豐偉雅望有餘而懐空抱虚幹植不足以貌取之則不必得賢徐徐先試則不可倉卒將如之何抱朴子曰知人則哲上聖所難今使牧守皆能審良才於未用保性履之始終誠未易也但共遣其私竭其聰明不為利慾動不為囑託屈所欲舉者必澄思以察之博訪以詳之修其名而考其行校同異以備虚餙令親族稱其孝友邦閭歸其信義嘗小仕者有忠清之效治事之幹則寸錦足以知巧刺鼠足以觀勇也又秀孝皆宜如舊試經答策防其所對之姦當令必絶其不中者勿署吏罰禁錮其所舉書不中者刺史太守免官不中左遷中者多不中者少後轉不得過故若受賕巨切流而舉所不當發覺有驗者除名禁錮終身不以赦令原所舉舉者與同罪今試用此法治一二嵗之間秀孝必多不行者亦足以知天下貢舉不精之久矣過此則必多修徳而勤學者矣又諸居職其犯公坐者以法律從事其以貪濁汙為罪不足至死者刑竟及遇赦皆宜禁錮終身輕者二十年如此不亷之吏必將化為夷齊矣若乃臨官受取金錢山積發覺則自恤得了免退則旬日復用者曽史亦將變為盜跖矣如此則雖貢士皆中不辭於官長之不良或曰能言不必能行今試經對䇿雖過豈必有政事之才乎抱朴子答曰古者猶以射擇人況經術乎如其舎㫋則未見餘法之賢乎此也夫豐草不秀瘠土巨魚不生小水格言不吐庸人之口髙文不墮頑夫之筆故披洪範而知箕子有經世之器覧九術而見范生懐治國之略省夷吾之書而明其有撥亂之幹視不害之文而見其精霸王之道也今孝亷必試經無脱謬而秀才必對䇿無失指則亦不得闇蔽也良將髙第取其膽武猶復試之以䇿況文士乎假令不能必盡得賢能要必愈於了不試也己且令天下諸當在貢舉之流者莫敢不勤學但此一條其為長益風教亦不細矣若使海内畏妄舉之失凡人息僥倖之求背競逐之末歸學問之本儒道將大興而私貨必漸絶竒才可得而役庶官可以不曠矣或曰先生欲急貢舉之法但禁錮之罪苛而且重懼者甚衆夫急轡繁䇿伯樂所不為宻防峻法徳政之所耻抱朴子曰夫骨填肉補之藥長於養體益夀而不可以救暍溺之急也務寛含垢之政可以蒞敦御朴而不足以拯衰弊之變也虎狼見逼不揮戈奮劍而彈琴詠詩吾未見其身可保也燎火及室不奔走灌注而揖譲盤旋吾未見其焚之自息也今與知欲賣䇿者論此是與跖議捕盜也抱朴子曰今普天一統九垓同風王制政令誠宜齊一夫衡量小器猶不可使往往而有異況人士之格而可參差而無檢乎江表雖逺宻邇海隅然染道化率禮道亦既千餘載矣往雖暫隔不盈百年而儒學之事亦不偏廢也惟以其土宇徧於中州故人士之數不得鈞其多少耳及其徳行才學之高者子㳺仲任之徒亦未謝上國也昔吳王初年附其貢士見格以不試今太平已近四十年矣猶復不試所以使東南儒業衰於在昔也此乃見同於左衽之𩔖非所以别之也且夫君子猶愛人以禮況為其愷悌之父母邪法有招患令有損化其此之謂也今貢士無復試者則必皆修飾馳逐以競虚名誰肯復開卷受書哉所謂饒之適足以敗之者也自有天性好古心恱藝文學不為禄味道忘貧若法高卿周生烈者學精而不仕狥乎榮利者萬之一耳至於甯越倪寛黄霸之徒所以强自篤勵於典籍者非天性也皆由患苦困瘁欲以經術自拔耳向使非漢武之世則朱買臣嚴助之屬亦未必讀書也今若取富貴之道幸有意于學者而復素無自然之好豈肯復空自勤苦執灑掃為諸生逺行尋師問道者乎兵興之世武貴文寢俗人視儒士如僕虜見經誥如芥壌者何哉由於聲名背乎此也夫不用譬猶售章甫於於越狥蚦蛇于華夏矣今若遐邇一例明考課試則必多負笈千里以尋師友轉其禮賂之費以買記籍者不俟終日矣抱朴子曰才學之士堪秀孝者已不可多得矣就今其人若如桓靈之世舉吏不先以財貨便安臺閣主者則雖諸經兼本解於問無不對猶見枉誣使不得過矣常追恨于時執事不重為之防除余意謂新年當試貢舉者今年便可使儒官才士豫作諸䇿計足周用集禁其留草殿中封閉之臨試之時亟賦之人事因縁於是絶當答䇿者皆可㑹著一處高選臺省之官親監察之又嚴禁之其交闗出入畢事乃遣違犯有罪無赦如此囑託之冀窒矣夫明君恃己之不可欺不恃人之不欺己也亦何耻於峻為斯制乎若試經法立則天下不可以不立學官而人自勤學矣漢四科亦有明解法令入仕今在職之人官無大小悉不知法令或有㣲言難曉而小吏多頑而使之決獄是以死生委之以輕百姓之命付無知之人也作官長不知法為下吏所欺而不知又決其口筆者憒憒不能知合法與不合不問不以付主者或以意斷事蹉跌不慎法令亦可令亷良之吏皆取明律令者試之如試經髙者隨才品叙用如此天下必少弄法之吏失理之獄矣交際第十六抱朴子曰余以朋友之交不宜雜浮而不心楊雲攸譏故雖位顯名美門齊年敵而趨舎異規業尚乖互者未嘗接焉或有矜其先達步髙視逺或遺忽陵遲之舊好或簡棄後起之𩔖味或取人以官而不論徳或不遭知己零淪丘園者雖才深智逺操清節髙者不可也其進趨偶合位顯官通者雖靣墻庸瑣必及也如此之徒雖能令壌蟲雲飛斥鷃戾天手捉刀尺口為禍福得之則排氷吐華失之則當春彫悴余殆局耻與共世窮之與達不能求也然而輕薄之人無分之子曽無疾非介然之節星言宵征守其門庭翕然諂侫卑辭恱色提壺執贄時行索媚勤苦積久猶見嫌拒乃行因託長者以搆合之其見受也則踊恱過於幽繫之遇赦其不可也則懊悴劇於喪病之逮己也通塞有命道貴正直否泰付之自然津塗何足多咨嗟乎細人豈不鄙哉人情不同亦何逺邪毎為慨然助彼羞之昔莊周見恵子從車之多而棄其餘魚余感俗士不汲汲於攀及至也瞻彼云云馳騁風塵者不懋建徳業務本求己而偏狥髙友以結朋黨謂人理莫此之要當世莫此之急也以嶽峙獨立者為澁吝䟽拙以奴顔婢膝者為曉解當世風成俗習莫不流遁逐欲遂往可慨者也或有徳薄位髙器盈志溢聞財利則驚掉見竒士則坐睡繿縷杖䇿被褐負笈者雖文艶相雄學優融𤣥同之埃芥不加接引若夫程鄭王孫羅襃之徒乘肥衣輕懷金挾玉者雖素不習禮菽麥不辨為之倒屣吐食握髪余徒恨不在其位有斧無柯無以為國家流濁於四裔投畀於有北彼雖赫奕刀尺決乎勢力足以移山拔海吹呼能令出泥登雲造其門庭我則未暇也而多有下意怡顔匍匐膝進求交於若人以圖其益悲夫生民用心之鈞何其遼邈之不肖也哉余所以同生聖世而抱困賤本後顧而不見者今皆追瞻而不及其不有以乎然性茍不堪各從所好以此存亡子不能易也或又難曰時移世變古今别務行立乎己名成乎人金玉經於不測者託於輕舟也靈烏萃於𤣥霄者扶揺之力也芳蘭之芳烈者清風之功也屈士起於丘園者知己之助也今先生所交必清澄其行業所厚必沙汰其心性孑然隻跱失其名軰結仇一世招怨流俗豈合和光以籠物同塵之髙義乎若比智而交則白屋不降公旦之貴若鈞才而遊則尼父必無入室之客矣抱朴子曰吾聞詳交者不失人而泛結者多後悔故曩哲先擇而後交不先交而後擇也子之所論出人之計也吾之所守退士之志也子云玉浮鳥高皆有所因誠復别理一家之説也吾以為寧作不載之寳不飛之鵬不颺之蘭乎且夫士亦損於夜光之質垂天之大含芳之卉不朽之蘭乎且夫名多其實位過其才處之者猶尠免於禍辱交之者何足以為榮福哉由茲論之則交彼而遇者雖得達不足貴芘之而悞者譬如䕃朽樹之破笮也彼尚不能自止其顛蹷亦安能救我之碎首哉吾聞大丈夫之自得而外物者其於庸人也盖逼迫不獲已而與之形接雖以千計猶蚤虱之積乎衣而贅疣之攅乎體也失之雖以萬數猶飛塵之去嵩岱鄧林之墮朽條耳豈以有之為益無之覺損乎且夫朋友也者必取乎直諒多聞拾遺斥謬生無請言死無託辭終始一契寒暑不渝者然而此人良未易得而或黙語殊途或憎愛易心或盛合衰離或見利忘信其處今也譬猶禽魚之結侣氷炭之同器欲其久合安可得乎夫父子天性好惡宜鈞而子政子駿評論異隔南山伯竒辯訟有無面别心殊其來尚矣總而混之不亦難哉世俗之人交不論志逐名趨勢熱來冷去見過不改視迷不救有利則獨專而不相分有害則茍免而不相恤或事便則先取而不譲值機㑹則賣彼以安此凡如是則友不如無也天下不為盡不中交也率於為益者寡而生累者衆知人之明上聖所難而欲力厲近才短於鑒物者務廣其交又欲使悉得可與經夷險而不易情歴危苦而相負荷者吾未見其可多得也雖搜琬琰於培塿之上索鸞鳯於鷦鷯之巢未為難也吾亦豈敢謂藍田之陽丹穴之中為無此物哉亦直言其稀已矣夫操尚不同猶金沉羽浮也志好之乖次猶火升而水降也茍不可同雖造化之靈大塊之匠不可使同也何可强乎余所稟訥騃加之以天挺篤嬾諸戯弄之事彈棊愽奕皆所惡見及飛輕走迅逰獵傲覽咸所不為殊不喜嘲䙝凡此數者皆時世所好莫不躭之而余悉闕焉故親交所以尤遼也加以挾直好吐忠藎藥石所集甘心者尠又欲加勉之以禮問諌之以馳競止其摴蒱節其沉湎此又常人所不能恱也毀方瓦合違情偶俗人之愛力甚所不堪而欲好日新安可待哉知其如此而不便改之可不謂之闇於當時拙於用大乎夫交而不卒合而又離則兩受不𢎞之名俱失克終之美夫厚則親愛生焉薄則嫌隙結焉自然之理也可不詳擇乎為可臨觴拊背執手須臾欲多其數而必其全吾所懼也或曰然則都可以無交乎抱朴子答曰何其然哉夫畏水者何必廢舟楫忌傷者何必棄斧斤交之為道其來尚矣天地不交則不泰上下不交即乖志夫不泰則二氣隔并矣志乖則天下無國矣然始之甚易終之竟難患乎所結非其人而於爭小以忘大也易羙金蘭詩詠百朋雖有兄弟不如友生切思三益大聖所嘉門人所以尊親惡言所以不至管仲所以免誅戮而五霸立子元所以去亭長而驅朱軒者友之力也單絃不能發韶夏之和音孑色不能成衮龍之瑋一味不能合伊鼎之甘獨木不能致鄧林之荗𤣥圃極天盖由衆石之積南溟浩瀁實須羣流之赴明鏡舉則傾冠見矣羲和照則曲影覺矣括修則枉刺之疾消矣良友結則輔仁之道𢎞矣達者知其然也所企及則必簡乎勝己所降結則必料乎同志其處也必講道進徳其出也則齊心比翼否則鈞魚釣之業泰則恊經世之務安則有以精義危則有以相恤耻令譚青專兩地之篤不使王貢擅彈冠之美夫然後故交道可貴也然虚實未易知勢利生去就積毁壊刎頸之契漸漬釋膠漆之堅於是有忘素情之惆歎或睚五懈切眥而不思遂令元伯巨卿之好獨著於昔張耳陳餘之變屢搆於今推往尋來良可歎也夫梧禽不與鴟梟同枝麟虞不與豺狼連羣清源不與濁潦混流仁明不與㓙闇同處何者漸染漬而移直道暴迫則生害也或曰敢問全交道可得聞乎抱朴子答曰君子交絶猶無惡言豈肯向所異辭乎殺身猶以許友豈名位之足競乎善交狎而不慢和而不同彼有失則正色而諫之告我以過則改而不憚不以忤彼心而不言不以逆我耳而不納不以巧辨餙其非不以華辭文其失不形同而神乖不匿情而口合不面從而背憎不疾人之勝己䕶其短而引其長隱其失而宣其得外無計數之諍内遺心競之累夫然後鹿鳴之好全而伐木之刺息若乃輕合而不重離易厚而不難薄始如形影終為參辰至歡變為篤恨接援化成讎敵不祥之悔亦無以往者漢季陵遲皇轡不振在公之義替紛競之俗成以違時為清髙以救世為辱身尊卑禮讓大倫遂亂在位之人不務盡節委本趨末背實尋聲王事廢者其譽美姦過積者其功多莫不飛輪兼策星言假寐冒寒觸暑以走權門飾虛華之名於秉勢之口獲非分之位於賣官之家或爭所欲還相屠㓕於是公叔偉長疾其若彼力不能正不忍見之爾乃發憤著論杜門絶交斯誠感激有為而然蓋矯枉而過正非常經之永訓也徒當逺非𩔖之黨慎諂黷之源何必祼以詭彼其斷粒以刺玉食哉夫反之為非重諫而不止遂至大亂故禮義之所棄可以絶矣備闕第十七抱朴子曰騕褭於交切駿馬也能奮蘭筋以絶景而不能履氷以乗深猛虎能吼雷霆以搏噬而不能踊雲霧以凌虛鴻鶤不能振翅於籠罩之中輕鷂不能電擊於几筵之下物既然矣人亦如之故能調和隂陽者未必能兼百行修簡書也能敷五邁九者不能全小潔經曲碎也惠子上相之標也而不能役舟楫以凌陽侯漢髙神武之傑也而不能治産業端檢括淮隂良將之擘也而不能修農商免饑寒周勃社稷之骾也而不能答錢穀責獄辭若以所短棄所長則逸儕㧞萃之才不用矣責大體而論細禮則匡世濟民之勲不著矣天不能平其西北地不能隆其東南日月不能摛光於曲穴衝風不能揚波於井底擿齒則松檟不及一寸之筳挑耳則棟梁不如鷦鷯之羽彈烏則千金不及丸泥之用縫緝則長劒不及數分之針何必伏巨象而捕䑕制大鵬以司晨乎故姜牙賣魚無所售而見師於文武蔣生憒慢於百里而獨步於三槐擢才第十八抱朴子曰華章藻蔚非矇瞍所玩英逸之才非淺短所識夫瞻視不能接物則衮龍與素褐同價矣聰鑒不足相涉則俊民與庸夫一概矣眼不見則美不入神焉莫之與則傷之者至焉且夫愛憎好惡古今不均時移俗易物同價異譬之夏后之璜曩直連城鬻之於今賤於銅鐡故昔以隱居求志為髙士今以山林之儒為不肖故聖人之良幹乃闇俗之罪人也徃者之介石乃末葉之羸劣也𢎞偉之士履道之生其崇信匪徒重仞之牆其淵澤不唯吕梁之深也故短近不能賞而淺促不能測焉因以異乎己而薄之矣以不求我而疾之矣不貴不用何足言乎乃有播埃塵於白珪生瘡痏於玉肌訕疵雷同攻伐獨立曽參蒙刼剽之垢巢許獲穿窬之謗自匪明並懸象𤣥鑒表微者焉能披泥抽淪玉澄川掇沉珠哉夫珪璋居肆而不售矧乃翳於磐璞乎竒士扣角而見遏况乃潜於臯藪乎孫臏思騁其秘略而司馬刖之韓非願建其治績而李斯殺之賈誼慷慨懐經國之術而武夫排之子政忠良有匡危之具而恭顯陷之和氏所以抱璞而泣血禽息所以發憤而碎首也夫玉石易别於賢愚愛寶情篤於好士以易别之寶合篤好之物猶獲罪截趾歴世受誣况乎難知之賢非意所急䜛人畫蛇足於無形姦臣畏忠貞之害己體曲者忌䋲墨之容夜祼者憎明燭之來是以髙譽美行抑而不揚虛搆之謗先形生影又無楚人號哭之薦萬無一遇固其宜矣夫以王為石者亦將以石為玉矣以賢為愚者亦將以愚為賢矣以石為玉未有傷也以愚為賢者亡之診也盖診亡者雖存而必亡猶脉死者雖生而必死也可勿慎乎於戯悲夫莫之思者也昔仲尼上聖也東受累於齊人南見塞於子西文種大賢也初不齒於荆俗末雍游於鈞如競年立功不亦難乎夫結緑𤣥黎非陶徛不能市也千鈞之重非賁獲不能抱也白雪之絃非靈素不能徽也邁倫之才非明主不能用也然耀靈光夜之珍不為莫求而其質以苟且於賤賈洪鍾周鼎不為委淪而輕其禮取見舉於侏儒嶧陽雲和不為不御而息唱以競顯於淫哇冠羣之徳不以沉抑而履徑而剸節於流俗是以和壁變為滯貨柔木廢於勿用赤刀之鑛不得經歐冶之鑪元凱之疇終不值四門之闢也任命第十九抱扑子曰余之友人有居冷先生者恬愉静素形神相忘外不飾驚愚之容内不寄有為之心遊精墳誥樂以忘憂書競羲和之末景夕照望舒之餘耀道靡逺而不䆒言無微而不妍然車迹不軔如震切權右之國尺牘不經貴勢之庭是以名不出蓬户身不離畆於是翼亮大夫侯而難之曰余聞淵蟠起則𤣥雲赴道化霑則逸才奮故康衢有角歌之音鼎爼發凌風之迹沾之則收不貲之賈踊之則超在天之舉耀逸景於暘谷播大明乎九垓勲廕當已聲揚罔極故尋仞之塗甚近而弗往者雖追風之脚不能到也楹棁之下至卑而不動者雖鵾鴻之翅未之及也况乎寢足於大之表斂羽於幽梧之枝安得效信以尋景振輕乎蒼霄哉年期奄冉而不久託世飄而不再智者履霜則知堅氷之必至處始則悟生物之有終六龍促軌於大渾華顛倐忽而告暮古人所以映順流而頺歎眄過隙而興悲矣先生資命世之逸量含英偉以邈俗鋭翰汪濊以波涌六竒抑鬱而淵畜然不能凌扶揺以高竦揚清耀於九𤣥器不陳於瑚簋之末體不免於負薪之勞猶奏和音於聾俗之地鬻章甫於被髪之域徒㤀寤於翰林鋭意以窮神崇琬琰於懷抱之内吐琳瑯於毛墨之端躬困屢空之儉神勞堅髙之間譬若埋尺璧於重壤之下封文錦於㳫匱之中終無交易之富孰賞堙翳之珍哉夫龍驥維縶則無以别乎蹇驢赤刀韜鋒則曷用異於鉛刃鱣鮪不居牛迹大鵬不滯蒿林願先生委龍蛇之穴升利見之塗釋户庭之獨潔覽二鼠而逺寤越窮谷以登髙襲丹藻以改素競驚飈於清晨不盤旋以栢夜收名器於崇髙嚮鍾鼎之慶祚暮成一介之夫採薇何足多慕乎居泠先生應曰葢聞靈機㝠緬混茫渺昧禍福交錯乎倚伏之間興亡纒綿乎盈虚之㑹逝者不能脱逐身之景樂成者不能免理致之敗匠流末者未若挺冶元兆之中整已然者不逮原本乎𤣥朴之外是以覺尺蠖者甘屈以保伸識通塞者不慘悦於否泰且夫洪陶範物大象流形躁靜異尚翔沉舛情金寶其重羽矜其輕篤隘者執束於滓汁達妙者逍遥於𤣥清潢洿納行潦而乃噎渤澥吞百川而不盈鮋鰕踊悦於泥濘赤螭凌厲乎髙㝠嚼香餌者快嗜欲而赴死味虚淡者含天和而趨生識機神者瞻無兆而弗惑闇休咎者觸强弩而不驚各附攸好安肯改營吾聞五玉不能自剖於嵩岫騰蛇不能無霧而電征龍淵不能勿操而斷犀兕景鍾不能莫扣而揚洪聲金芝須商風而激耀倉庚俟烟煴以修鳴騏騄不苟馳以赴險君子不詭遇以毁名運屯則沉淪於勿用時行則髙竦乎天庭士以自衒為不髙女以自媒為不貞何必委洗耳之峻標效負爼之干榮哉夫其窮也則有虞婆娑而陶鈞尚父見逐於愚嫗范生來辱於溺簀苦恠切籠也𢎞式匿竒於耕牧及其達也則淮隂投竿而稱孤文種解屫而紆青傅説釋築而論道管子脱桎為上卿葢君子藏器以有待也畜徳以有為也非其時不見也非其君不事也窮達任所值出處無所繫其靜也則為逸民之宗其動也則為元凱之表或運思於立言或銘勲乎國器殊途同歸其致一焉士能為可貴之行而不能使俗必貴之也能為可用之才而不能使世必用之也被褐茹草垂綸罝兎則心歡意得如將終身服冕乗軺兼朱重紫則若固有之常如布衣此至人之用懷也若席上之珍不積環堵之操不粹者予之過也知之者希名位不臻以玉為石謂鳯曰鷃者非余罪也夫汲汲於見知悒悒於否滯者常民之情也浩然而養氣淡爾靡欲者無悶之至也時至道行器大者不悦天地之間知命者不憂若乃狥萬金之貨以索百千之售多失骭干上聲毛我則未暇矣名實第十九門人問曰聞漢末之世靈獻之時品藻乖濫英逸窮滯饕得志名不凖實賈不本物以其通者為賢塞者為愚其故何哉抱朴子答曰夫雷霆輷磕而或不聞焉七曜經天而或不見焉豈唯形器有聾瞽哉心神所蔽亦又如之是以聞格言而不識者非無耳也見英異而不知者非無目也由乎聰不經妙而明不逮竒也夫智大量逺者盤桓以山峙器小志近者蓬飛而萍浮夫唯山峙故莫之能動焉夫唯萍浮故流而不滯焉方之貨也則緘連以待賈者唯至珍而難售鳴鼔以狥之者雖見蔽而易盡比之材也則結根於嵩岱者雖竦葢千仞垂䕃萬畆而莫之知也挿株於塗要者雖鈎曲戾細雖速朽而猶見用也故廟堂有枯楊之瑚簋窮谷多不伐之梓豫也是竊華名者螻騰於雲霄失實賈者翠虬淪乎九泉於是斥鷃凌風以髙奮靈鳯卷翮以幽戢鉛鋒充太阿之寶犬羊佻勅髙切獨行貌虎狼之資矣夫佞者鼓珍賂為勁羽則無高而不到矣乘朋黨為舟楫則無逺而不濟矣持之以夙興側立加之以先意承指其利口謏辭也似辨其道聴塗説也似學其心險貌柔也似仁其行汚言潔也似亷其好説人短也似忠其不知忌諱也似直故多通焉且愛奉望我者欲我欲之不求我者我不能愛自然之理也夫賢常少而愚常多多則比周而匿瑕少則孤弱而無援佞人相汲引而柴正路俊哲處下位而不見知㧞茅之義犯而負乘之羣興亢龍髙墜泣血漣如故子西逐大聖之仲尼臧倉毁命世之孟軻二生不免斯患降兹亦何足言斯禍盖與開闢並生苦之匪唯一世也歴覽振古多同此疾至於駑蹇矯首於琱多么切輦駥驥委牧乎林坰彼已尸䘵邦國殄瘁下凌上替實此之由或蟲流而莫斂或逆竄於申亥或擢筋於廟梁或絶命於望夷葢所㧞之非真而忠能之不用也故明君勤於招賢而汲汲於擢竒道達凝滯而嚴防壅蔽才誠足委不拘於屠釣言審可施抽之於戎戍或舉於牛口之下而加之於羣僚之上或㧞於桎梏之中而任以社稷之重故能勲業隆濟拓境服逺取威定功垂統長世也夫直䋲者枉木之所憎也清公者姦慝之所讎也人主不能運𤣥鑒以索隱而必須當塗之所舉然每觀前代專權之徒率其所舉皆在乎附舉己者也所薦者先乎利己者也毁所畏而進所愛所畏則至公者也所愛則同私者也至公用則姦黨破衆私立則主威奪矣姦黨破則昇泰之所由也主威奪則危亡之端漸矣毁所畏則恐辭之不痛雖刖劓之猶未稱意焉故必除之而後快也彼進所愛則苦談之不美雖立超之猶未逞心焉故必危彼以安此也是故抱枉而死無愆而黜者有自來矣所以體道合真嶷然特立才逺量逸懷霜履氷思綿天地器兼元凱執已衡門淵渟嶽立寜潔身以守滯恥脅肩以苟合樂饑陋巷以勵髙尚之節藏器全真以待天年之盡非時不出非禮不動結褐嚼蔬而不悒悒也黄髪終否而不悢悢力尚也也安肯蹙泰山之峻以適鑿枘之中斂垂天之羽為戒旦之役編於仕𩔖而抑鬱庸兒之下捨鸞鳯之林適枳棘之藪競腐䑕於踞鴟而枉尺以直尋哉且大賢之狀也至拙為味也甚淡蕭然自足泊爾無知知之者稀而不蹙時不能用而不悶雖并日無藜藿之糝不以易不義之大牢也雖緼袍無卒嵗之服不肯樂無道之狐白也獨可散髪髙枕守其所有以絶不曲躬低眉求其所未須也徳薄位厚弗交也名與實違弗親也榮華馳逐弗務也豪狹姦權弗接也俗説細辨不答也脅肩所赴弗隨也貌愚而志達面垢而行潔乎若嵩岱銓衡所不能測也浩乎若滄海斗斛所不能校也峻其重仞之髙隱其百官之富觀彼佻竊若草莽也邈世之操𦕈焉冠秋雲之表遺俗之神緬焉棲九𤣥之端雖窮賤而不可脅以威雖危苦而不可動以利其所業耳可聞而不可盡也其所執手可見而不可論也故疾之者齊聲而側目愛之者寡弱而無益亦猶撮壤不能填決河升水不能殄原火於是鼗皷戢雷霆之音鞉徒刀切鞞奴移切恣喋鼛音髙之響芳蕙芟夷臭鮑佩御𤣥鬯傾棄而不羞醨酪專灌于圓丘汗血驅放而垂耳跛蹇馳騁於鑾軒此古人之所以懷沙負石赴流魚葬而不堪與之同世也已矣悲夫然捐𤣥黎於洿濘非夜光之不真也由莫識焉投彤盧而不彎非繁弱之不勁也坐莫賞焉故瓊瑶俟荆和而顯連城之價烏號須逢門而著陷堅之功飛莵待子預而飈騰俊民直知已而宣力若夫美玉不出重岫良弓不鑿百札驥騄不服朱軒命世不履爵勢則孰知其能攄符彩之耀曄頓雲禽於千仞騁逸迹以追風康庶績於百揆乎夫其不遇亦得不雜揉於瓦石鈞賤於朽木列鑣於下乘等望於凡瑣哉嗟乎彍棘矢而望髙手於渠廣䇿疲駑而求繼軌於周穆放斧斤而欲雙巧於班墨忽良才而欲彛倫之攸叙不亦難乎名實雖漏於一世徳音可邀乎將來樂天知命何慮何憂安時處順何怨何尤哉清鑒第二十抱朴子曰咸謂勇力絶倫者則上將之器洽聞治亂者則三九之才也然張飛闗羽萬人之敵而皆喪元辱主授首非所孔融退讓文學邈俗而並不達治務所在敗績鄧禹馬援田間諸生而善於用兵蕭何曹參不渉經誥而優於宰輔爾則知人果未易也欲試可乃已則恐成折足覆餗欲聴言察貌則或似是而非真偽錯然而世人甚以為易經耳過目謂可精盡余甚猜焉未敢許也區别臧否瞻形得神存乎其人不可力為自非明並日月聴聞無音者願加清澄以漸進用不可頓任輕假利器收還之既甚難所損者亦多以矣無以一事闇保其餘同乎己者未必可用異於我者未必可忽也或難曰夫在天者垂象在地者有形故望山度水則髙深可推風起飛雲則吉凶可歩智者覩山不瘁則悟美玉之在山覿岸不枯則覺明珠之沉淵彗星出則知鱣魚之方死日月蝕則識麒麟之共鬭華霍不須稱而無限之重可知矣江河不待量而不測之數已定矣鴻鵠之翼騄騏之足雖未飛走輕可必也豪曹之劒徐氏匕首雖未奮擊其立斷無疑也駮子有吞牛之容鶚鷇有凌鷙之貌卉茂者土必沃魚大者水必廣虎尾不附狸身象牙不出䑕口叔魚無厭之心見於生初之狀食我㓕宗之徵著乎開胞之始申童覺竊妻之巫臣張負知將貴之陳平范子所以絶迹於五湖者以句踐蜂目而鳥喙也趙人所以息意於争鋒者以白起首鋭而視直也文王之接吕尚桑隂未移而知其足師矣𤣥徳之見孔明晷景未改而腹心已委矣郭泰中材猶能知人故入頴川則友李元禮到陳留則結符偉明入外黄則親韓子助至蒲亨則師仇季知止學舍則收龎徳公觀耕者則㧞茅季竒孟敏於擔負戒元艾之必敗終如其言一無差錯必能簡精鈍於符表詳舒急乎聲氣料明闇於舉厝察清濁於財色觀取與於宜適徴虚實於言行考操業於闔闢校始終於信效善否之檢不其易乎抱朴子答曰余非謂人物了不可知知人挺無形理也徒以斯術存乎大明非夫當人自許然而世士各謂能之是以有云以警付任耳夫貌望豐偉者不必賢而形器尫瘁者不必愚咆哮者不必勇淳淡者不必怯或外貌同而用意異或氣性殊而所務合非若天地有常候山川有定止也物亦故有逺而易知近而難料譬猶眼能察天衢而不能周項領之間耳能聞雷霆而不能識螘虱之音也唐吕樊許善於相人狀唯知夀夭貧富官秩尊卑而不能審情性之寛剋志行之洿隆惟帝難之況庸人乎而吾子舉論形之例詰精神之談未修其本殆失指矣夫亡射之箭皆破秋毫然凖的恒不得為工叔向之母申氏之子非不一得然不能常也陶唐稽古而失任姬公欽明而謬授尼父逺得崇替於未兆近失澹臺於形骸延州審清濁於千載之外而蔽竒士於咫尺之内知人之難如此其甚郭泰所論皆為此人過上聖乎但其所得者顯而易識其所失者人不能紀且夫所貴貴乎見俊才於無名之中料逸足乎呉坂之間掇懷珠之蚌於九淵之底指含光之珍於積石之中若伯喈識絶音之器於烟燼之餘平子剔逸響之竹於未用之前六軍之聚市人之㑹暫觀一覩無所昡惑探其潜生之心計定其始終之事行乃為獨見不傳之妙耳若如末論必俟考其操蹈之全毁觀其云為之好醜此為絲線既經於銓衡布帛已厯於丈尺乃説其斤兩之䡖重端匹之修短人皆能之何煩於哲哉行品第二十二抱朴子曰擬𤣥黄之覆載揚明並以表㣲文彪昺而摽以邈俗虛靈機以如愚不二過以謟黷者賢人也居寂寞之無為蹈修直而執平者道人也盡烝嘗於存亡保髮膚以揚名者孝人也垂惻𨼆於有生恒恕己以接物者仁人也端身命以狥國經險難而一節者忠人也覩㣲理於難覺料倚伏於將來者明人也量理亂以卷舒審去就以保身者智人也順通塞而一情任性命而不滯者達人也不枉尺以直尋不降辱以苟命者雅人也據體度以動静毎清詳而無悔者重人也體氷霜之粹素不染於勢利者清人也篤始終於寒暑雖危而不猜者義人也守一言於久要厯嵗衰而不渝者信人也摛鋭以立言辭炳蔚而清允者文人也奮果毅之壯烈騁干戈以静難者武人也甄墳索之淵粤該前言以窮理者儒人也銳乃心於精義吝寸隂以進徳者益人也識多藏之厚亡臨禄利而如遺者廉人也不改操於得失不傾志於可欲者貞人也䘏急難而㤀勞以憂人為己任者篤人也潔皎介以守終不遜避而苟免者節人也飛清機之英麗言約暢而判滯者辯人也每居卑而推功雖處㤗而滋恭者謙人也崇敦睦於九族必居正以赴理者順人也臨凝結而能斷操䋲墨而無私者幹人也㧞朱紫於中搆剖猶豫以允當者理人也步七曜之盈縮推興亡之道軌者術人也赴白刃而㤀生格兕虎於林谷者勇人也整威容以肅衆伏法度而無貳者嚴人也創機巧以濟用總音數而並精者藝人也凌强禦而無憚雖險逼而不沮者人也執匪懈於夙夜㤀勞瘁於深峻者勤人也蒙謗讟而晏如不慴懼於可畏者勁人也聞榮譽而不歡遭憂難而不變者審人也知事可而必行不猶豫於羣疑者果人也循䋲墨以進止不乾沒於僥倖者謹人也奉禮度以戰競及親踈而無尤者良人也履道素而無欲時難移而不變者朴人也凡此諸行了無一然而不躋善人之迹者下人也門人請曰善人之行既聞其目矣惡者之事可以戒俗者願聞垂誥焉抱朴子曰不致養於所生損道而妄身者悖人也懷邪偽以偷榮豫利己而忘生者逆人也背仁義之正途茍危人以自安者㐫人也好爭奪而無厭專醜正而害直者惡人也出䋲墨以傷刻心好殺而安忍者虐人也飾邪説以浸潤搆謗累於忠貞者䜛人也雖言巧而行違實履濁而假清者佞人也不原本於枉直茍好勝而肆怒者暴人也措細善以取信隂挾毒而無親者姦人也承風指以茍容揆主意而扶非者諂人也言不詳於反覆好輕諾而無實者虚人也覩利地而忘義棄亷恥以茍得者貪人也覿艷逸而心蕩飾袴綺而思邪者淫人也見成事而疑惑動失計而多悔者闇人也背訓典而自任恥請問於勝己者損人也知善事而不建雖多為而無成者劣人也委徳行而不修奉權勢以取媚者弊人也履蹊徑以僥速推貨賄以争津者邪人也既傲狠以無禮好凌辱乎勝己者悍人也被抑枉而自誣事無苦而振懾者怯人也治細辨於稠衆非其人而盡言者淺人也闇事宜之可否雖企慕而不及者頑人也知是非而不改聞良規而増劇者惑人也無濟恤之仁心輕告絶於親舊者薄人也既疾其所不逮喜他人之有災者妬人也專財穀而輕義觀困匱而不振者吝人也冐至危以僥倖值禍敗而不悔者愚人也情局碎而偏黨志惟務於盈利者小人也騁鷹犬於原獸好博戲而無已者迷人也忘等威之異數快飾玩之誇麗者奢人也耽聲色於飲讌廢慶弔於人理者人也既無心於修尚又怠惰於家業者嬾人也無抑斷之儀每脱易而不思者輕人也觀道義而如醉聞貨殖而波擾者人也杖淺斷短而多謬闇趨舍之藏否者笨步木切人也憎賢者而不貴聞髙言而如聾者嚚人也覩朱紫而不分雖提耳而不悟者蔽人也違道義以趦趄冐禮刑而罔顧者亂人也每動作而受嗤言發口而違理者拙人也事酋豪如僕虜值衰微而背惠者慝人也捐貧賤之故舊輕人士而倨傲者驕人也棄衰色而廣欲非宦學而逺遊者蕩人也無忠信之純固背恩養而趍利者叛人也當交顔而面從至析離而背毁者偽人也習强梁而專己距忠吿而不納者刺人也抱朴子曰人技未易知真偽或相似士有顔貌修麗風表閑雅望之溢目接之適意威儀如龍虎盤旋成規矩然信心蔽神否才無所堪心中所有盡附皮膚口不能吐片竒筆不能屬半句入不能宰民出不能用兵治事則事廢銜命則命辱動靜無宜出處莫可葢難分之一也士有貌望樸悴容觀矬悴容觀委陋聲氣雌若進止質澁然而含英懷寶經明行髙幹過元凱文蔚春林官則庶績康用武則克全獨勝蓋難分之二也士有謀猷淵䆳術畧入神智周成敗思洞幽𤣥才兼能事神器咸宜而口不傳心筆不盡意造次之接不異凡庸蓋難分之三也士有機變清鋭巧言綺粲擊引譬喻淵湧風厲然而口之所談身不能行長於識古短於理今為政政亂牧民民怨蓋難分之四也士有外形足恭言容恪䖍而神䟽心慢中懷散放受任不憂當局不治蓋難分之五也士有控弦命中空弮入石倒乘立騎五兵畢習而體輕慮淺手勁心怯虚試無對而實用無驗望塵奔北聞敵失魄蓋難分之六也士有梗概簡緩言希貌樸細行闕漏不為小勇跼拘檢犯而不校掘爪垂翅名為弱愿然而膽勁心方不畏强禦義正所在視死猶歸支解寸斷不易所守蓋難分之七也士有孝友温淑恂恂平雅履信思順非禮不蹈安困潔志操清氷霜而䟽遲迂濶不達事要見機不作所為無成居己披猖受任不舉蓋難分之八也士有行己髙簡風格峻峭嘯傲偃蹇凌儕慢俗不肅檢括不䕶小失過情率意旁若無人朋黨排譴談者同敗士友不附品藻所遺而立朝正色知無不為忠於奉上明以攝下蓋難分之九也士有含𢎞廣濟虚己受物藏疾匿瑕温恭亷潔勞謙冲退救危全信寄命不疑託孤可保而純良暗權仁而不斷善不能賞惡不忍罰忠貞有餘而幹用不足操柯猶豫廢法縦非枉直混錯終於負敗盖難分之十也夫物有似而實非若然而不然料之無惑望形得神聖者其將病諸况乎常人故用才取士推昵結友不可以不精擇不可以不詳試也若乃性行之惑變始正而終邪若王莽初則美於伊霍晚則劇於趙髙又非中才所能逆盡也若令士之易别如鷦鷯之與鴻鵠狐兎之與龍麟者則四㓙不得官於堯朝管蔡不得幾危宗周仲尼無澹臺之失延陵無捐金之恨伊尹無七十之勞項羽無嫌范之悔矣所患於其如碔砆上音武上音夫之亂瑾瑜鷦螟之似鳯凰凝氷之𩔖水精烟熏之疑雲氣故令不謬者也惟帝難之矧乎近人哉夫惟大明𤣥鑒幽微靈銓揣物思灼沉昧瞻山識璞臨川知珠士於難分之中而無取舍之恨者使臧否區分抑揚成允武丁姬文不獨治而傅説吕尚不永棄高莽宰嚭不得成其惡𢎞恭石顯無所容其偽矣斯蓋取士之較畧選擇之大都可精微以求存乎其人固非毫翰之所備縷也弭訟第二十一姑子劉君士由之論曰人綱始於夫婦判合擬乎二儀是故大婚之禮古人所重將合二姓之好以承祖宗之基主人拜迎於門聴命於廟𤣥纁贄幣親御授綏婿有三年之喪致命女氏許諾而不敢改大喪既沒請命於婿婿有辭焉然後乃嫁所以崇敬讓也豈有先訟後婿之謂乎而末世輕慢傷化敗俗舉不修義許而弗與訟䦧辱煩塞官曹今可使諸爭婚者未及同牢皆聴義絶而倍還酒禮歸其幣帛其甞已再離者一倍禆娉其三絶者再倍禆娉如此離者不生訟心貪容者無利重乃王治之要術不易之永法也抱朴子答曰劉君愍徳讓之凌替疾民爭之損化雖速我訟室家不足用和之貴將遂淪胥創讜言以拾世遺建嘉謀以拯流遁紛譁之俗將以此而易無恥之風將由兹而移彌綸情偽固難間矣誠經國之永法至益之篤論也洪以不敏不識至理造次承問竊有疑焉夫婚媾之結義無逼迫彼則簡擇而求此則可意乃許輕諾後悔罪在女氏食言棄信與奪任情嚴防峻制未之能彌令猥恣之唯貴禆娉倍貧者所憚也豐於財者則適其願矣後所許者或能富殖助其禆娉必所甘心然則先家拱黙不得有言原情論之能無怨歎乎夫不伏之人視死猶歸血刃之禍於是將起令茍惜其辭訟之小醜而搆其難忍之大恨所謂愛其僦子宙切覽之煩忘其凋殞之酷也夫買物於市者或加價而奪之則尠忍而不忿然矣况乎見奪待告之妻哉此法遂用者將使結婚者雖納吉親迎猶抱有見奪之慮何者劉君之論以同牢為斷固也爾則女氏雖受幣積年恒挾任意之威恃可數奪必惰於擇婿婿小不得意便得改悔結讎速禍莫此之甚矣曩人畫法慮闗終始杜漸防萌思之良精而不闕恣奪之路斷以報板之制者殆有意乎儻令女有國色傾城絶倫而位豪右權臣之從目玩冶容心忘禮度資累千金情無所吝十倍還娉猶所不憚况但一乎華氏不難於殺孔父而取其妻楚人為子迎婦以其美而自納之以此論之豈惜傾竭屋産以助女氏還前家之直哉小人輕薄睚五解魚許二切䀝在解在許二切成怨又喜委衰逐盛蹋冷趨熱此法之行則必寡奪貧賤而與富貴者矣不審吾君何方以防弊乎或曰可使女氏受娉禮無豐約皆以即日報板後皆使時人署姓名於别板必十人已上以備逺行及死亡又令女之父兄若伯叔答婿家書必手書一紙若有變悔而證據明者女氏父母兄弟皆加刑罰罪如此庶於無訟者乎酒誡第二十抱朴子曰目之所好不可從也耳之所樂不可順也鼻之所喜不可任也口之所嗜不可隨也心之所欲不可恣也故惑目者必逸容鮮藻也惑耳者必妍音淫聲也惑鼻者必茝昌給切蕙芬馥也惑口者必珍羞嘉㫖也惑心者必勢利功名也五者畢惑則或承之禍為身患者不亦信哉是以智嚴櫽括於性理不肆神以逐物檢之以恬愉増之以長筭其抑情也劇乎隄防之備决其御性也過乎腐轡之乘奔故能内保永年外免釁累也盖饑寒難堪者也而清節者不納不義之穀帛焉困賤難居者也而髙尚者不處危亂之榮貴焉蓋計得則能忍之心全矣道勝則害性之事棄矣夫酒醴之近味生病之毒物無毫分之細益有丘山之巨損君子以之敗徳小人以之速罪耽之惑之尠息淺切不及禍世之士人亦知其然既莫能絶又不肯節縱心口之近欲輕召災之本源似熱渴之恣冷雖適已而身危也小大亂喪亦罔非酒然而俗人是酣是湎音其初筵也抑抑濟濟言希容整詠湛露之厭厭歌在鎬之愷樂舉萬夀之觴誦温克之義日未移晷體輕耳熱夫琉璃螺殻之器並用滿酌罰餘之令遂急醉而不止㧞轄投井於是口涌鼻溢濡首及亂屢儛躚躚舍其坐遷載號載呶女交切宣也如沸如羮或爭辭尚勝或啞啞烏格笑聲切獨笑或無對而談或嘔吐几筵或值蹷居月切良倡或冠脱帯解貞良者流華督之顧眄怯懦者效慶忌之蕃㨗遲重者蓬轉而波擾整肅者鹿踊而魚躍口訥於寒暑者皆垂掌而諧聲謙卑而不競者悉狂瞻以髙視亷恥之儀毁而錯之疾發闒茸之性露而傲佷之態出精濁神亂臧否顛倒或奔車走馬赴坑客庚切谷而不憚以九折之阪為螘封或登危蹋頺雖墮墜而不覺以吕梁之淵為牛跡也或肆忿於器物或醟為命切酒於妻子加枉酷於臣僕用剡鋒乎器物熾火烈於室廬掊寶玩於淵流遷威怒於踞人加暴害於士友䙝嚴主以夷戮者有矣犯㐫人而受困者有矣言雖尚辭煩而叛理拜伏徒多勞而非敬臣子失禮於君親之前㓜賤悖慢於耆宿之坐謂清談為詆詈以忠吿為侵己於是白刃抽而忘思難之慮棒杖奮而罔顧乎前後搆漉血之讎招大辟之禍以少凌長則鄉黨不加重矣責辱人父兄則子弟將推刃矣發人所諱則壯者不能堪矣計數深剋則醒者不能恕矣起衆思於須㬰結百疴於膏盲呼光切奔駟不能追既往之悔思改而無自反之蹊蓋智者所深防而愚人所不免也其為禍敗不可勝載然而歡集莫之或釋舉白盈耳不論於能否計瀝霤於小餘以稽遲為輕已傾筐注於所敬殷勤勌而成薄勸之不持督之不盡怨色醜音所由而發也夫風經腑臓使人惚恍及其劇者自傷自虞或遇斯疾莫不憂懼吞苦忍痛欲其速愈至於醉之病性何異於兹而獨居宻以逃風不能割情以節酒若畏風憎病則沉之咎塞而流連之失止矣夫風之為疾猶展攻治酒之為變在乎呼吸及其鬨亂若存若亡視泰山如彈丸見滄海如盤盂仰嚾旦切天墮俯呼地陷卧待虎狼投井赴火而不謂惡也夫用身之如此亦安能惜敬恭之禮䕶喜怒之失哉昔狄儀既䟽大禹以興糟丘酒池辛癸以亡豐侯得罪以戴尊㗸盃景升壞以三雅之爵劉松爛腸以逃暑之飲郭珍發狂以無日不醉信陵之㓙短襄子之亂政趙武之失衆子反之誅戮漢惠之伐命灌夫之㓕族陳遵之遇害季布之䟽斥子建之免退徐邈之禁言皆是物也世人好之樂之者甚多而戒之畏之者至少彼衆我寡良箴安施且願君子節之而已曩者饑年穀貴人有醉者相殺牧伯因此輒有酒禁嚴令重申官司捜索收執榜薄行切擊也狥者相辱制鞭而死者大半防之彌峻犯者至多至乃穴地為釀油嚢懷酒民之好此可謂篤矣余以匹夫之賤託此空言之書末如之何矣又臨民者雖設其法而不能自斷斯物緩己急人雖令不從弗躬弗親庶民弗信以此而教教安得行以此而禁禁安得止哉沽賣之家廢業則困遂修飾賂遺依憑權右所屬吏不敢問無力者獨止而有勢者擅市張壚專利乃更倍售從其酤買公行靡憚法輕利重安能免乎哉或人難曰夫夏桀殷紂之亡信陵漢惠之殘聲色之過豈唯酒乎以其生患於古而斷之於今所謂褒姒喪周而欲人君廢六宫以阿房之危秦而使王者結草菴也蓋聞千鍾百觚堯舜之飲也唯酒無量仲尼之能也姬旦酒殽不徹故能制禮作樂漢髙作樂巨醉故能斬蛇鞠旅于公引滿一斛而斷獄益明管輅仰傾三斗而清辯綺粲揚雲酒不離口而太𤣥乃就子圉醉無所識而霸功以舉一瓶之醪傾而三軍之衆悦解毒之觴行而盜馬之屬感消憂成禮䇿勲飲至降神合人非此莫以也内速諸父外將嘉賔如淮如澠春秋所貴由斯言之安可誡乎抱朴子答曰酒旗之宿則有之矣譬猶懸象著明莫大乎日月水火之原於是在焉然節而宣之則以養生立功用之失適則焚溺而死豈可恃懸象之在天而謂水火不殺人哉宜生之具莫先於食食之過多實結癥瘕况於酒醴之毒物乎夫使彼夏桀殷紂信陵漢惠流於亡國之淫聲沉溺於傾城之亂色皆由乎酒熏其性醉成其勢所以致極情之失忘修飾之術者也我論其本子識其末謂非酒禍禍其安出是猶知濁雨之霑衣而不知雲氣之所作唯患飛埃之糝目而不覺飈風之所為也千鍾百觚不經之言不然之事明者不信矣夫聖人之異自才智至於形骸非能兼人有七尺三丈之長萬倍之大也一日之饑安能至是仲尼則畏性之變不敢及亂周公則終日百拜殽乾酒澄上聖戰戰猶且若斯況乎庸人能無悔乎漢髙應天承運革命向雖不醉猶當斬蛇于公聰達明於聴斷小大以情不失枉直是以刑不濫加世無怨民但其健飲不即廢事若論大醉亦俱無知决疑之才何損于酒未聞臯繇甫侯子産釋之醉乃折獄也管輅年少希當劇談故假酒勢以助膽氣若過其量亦必迷錯及其刺毫於爻卦索鬼神之變化占氣色以決盛衰聆鳴鳥以知方來候風雲而克吉㓙觀碑桓而識禍福豈復須酒然後審之楊雲通人才髙思逺英贍之富禀之自天豈藉外物以助著述及其數飲由於偶好亦或有疾以宣藥勢耳子圉肆志盖已素定雖復不醉亦復終去瓶醪悦衆寓言之喻誠能賞罰允當威恩得所長算縱横應機無方則士思果毅人樂奮命其不然也雖流酒淵何𥙷勝負繆公飲盜造次之權舍法長惡何足多稱哉豈如慎之耶疾謬第二十抱朴子曰世故繼有禮教漸頺敬讓莫崇傲慢成俗儔𩔖飲㑹或蹲或踞暑夏之月露首袒體盛務唯在摴蒱彈碁所論極於聲色之間舉口不踰綺繻紈袴之側游歩不去勢利酒客之門不聞清談論道之言專醜辭嘲弄為先以如此者為髙逺以不爾者為騃五駭切癡也野於是馳遂之庸民偶俗之近人慕之者猶宵蟲之赴明燭學之者猶輕毛之應飈甫遥切風嘲戲之談或及祖考或下逮婦女往者務其必深焉報者恐其不重焉倡之者不慮見答之後患和之者恥其言輕之不塞周禾之芟温麥之刈實由報恨不能已也利口者扶强而黨勢辯給者借鍒以刺鍒耳由切扶發切以不應者為拙劣以先止者為負敗如此交惡之辭焉能黙哉其有才思者為人也猶善於依因機㑹准擬體例引古喻今言微理舉雅而可笑中而不傷不張人之所諱不犯人之所惜若夫拙者之為人也則枉曲直湊使人愕愕然妍之與媸期於宜絶豈唯無益而已哉乃有使酒之客及於難侵之性不能堪之拂衣拔棘而手足相及醜言加於所尊歡心變而成讎絶交壞身搆隙致禍以杯螺相擲者有矣以隂私相訐居謁切西斤人者有矣昔陳靈之被矢管氏之泯族匪降自天口實為之樞機之發榮辱之主三緘之戒豈欺我哉激雷不能追既往之失辭班輸不能磨斯言之既玷音㸃雖不能三思而吐清談猶可息謔調以防禍萌也尊其辭令敬其威儀使言無口過體無倨居御切容可法可觀可畏可愛蓋逺辱之術全交之要道也且夫慢人者不愛其親者也輕鬭者不重遺體者也皆陷不孝可不詳乎然而迷謬者無自見之明觸情者諱逆耳之規疾美而無直亮之鍼職深切艾羣惑而無指南以自反諂媚小人歡笑以賛善面從之徒拊節以稱功益使惑者不覺其非自謂有端晏之㨗過人之辯而不悟斯乃招患之旌召害之符傳非之驛傾身之車也豈徒减其方䇿之令聞其沒世之徳音而已哉蓋雖有偕老之慎不能救一朝之過雖有陶朱之富不能贖片言之謬故毫之失千里之差傷人之語有劒㦸之痛積微致著累淺成深鴻羽所以沉龍舟羣輕所以折勁軸寸飈所以燔百尋之室蠧蝎所以仆普卜也連抱之木也古賢何獨跼蹐恂恂之如彼今人何其憒慢傲放之如此乎是以髙世之士望塵而旋迹輕薄之徒響赴而影集謀事無智者之助居危無切磋之益良史懸筆無可書之善談者含音無足傳之美令聞不著醜聲宣流沒有餘敗貽譏將來始無可法終無可紀斯亦志士之恥也安為之過而不改斯誠委夷路而陷叢棘舍嘉㫖而咽鈎吻者也豈所謂以小善為無益而不為以小惡為無損而不止以至惡積而不可掩罪大而不可解者邪余願世人改其險詖之行除其驕吝之失遣其誇矜之人諸疾絶息嘲弄不典之言則趙勝之門不去客黄祖之棓無所用矣抱朴子曰或有不治清徳以取敬而仗氣力以求畏其入衆也則亭立不坐争處端上作色諧聲逐人自安其不得意恚懟不退其行出入也窄逼之地恥於分塗振䇿長驅推人於險有不即避更加攄頓嗚呼悲哉此云古之卑而不可踰推䕃譲路勞謙下士無競於物立若不勝衣行若不容身者何其腼然之不肖哉夫盛操清節雖深自抱降而人猶貴之若履蹈不髙則雖行凌暴而人猶不敬假令外服人體内失人心所謂見憎惡非為見尊重也昔莊生未食趙王側立騶衍入疆燕君擁篲康成之里逆虜望拜林祖之庭莫不卑肅非力之所服也夫以抄盜致財雖巨富不足嘉凶徳脅人雖見憚不足榮也然而庸民為之不惡故聞其言者猶鴟梟之來鳴也覩其面者若鬼魅之見形也其所至詣則如妖怪之集也其在道塗則甚逢虎之羣也愚夫行之自矜為豪小人徵之以為横階亂靡有定實此之由也然敢為此者非必篤為也率冠蓋之後勢援之門素頗力行善事以竊虚名名既粗立本情便放或假財色以交權豪或因時運以佻榮位或以婚姻而連貴戚或弄毁譽以合威柄器盈志溢態發病出黨成交廣志通步髙清論不能復制䋲墨所不能復彈遂成鷹頭之蠅廟垣之䑕所未及者作威作福以控御之故勝己者則不得聞聞亦陽不知也减己者則不敢言言亦不能禁也夫災蟲害穀至降霜則殄矣佞雄亂羣值嚴時則敗矣獨善其身者唯可以不肯事之不行傚之而已耳有斧無柯其如之何哉抱朴子曰詩美睢鳩貴其有别在禮男女無行媒不相見不雜坐不通問不同一物不得親授姊妹出適而反兄弟不共席而坐外言不入内言不出婦人送迎不出門行必擁蔽其面道路男由左女由右可謂昵矣而猶男子非疾病不晝居於内將終不死婦人之手況於他乎昔魯女不幽居深處以致圉犖力各切之變孔妻不宻潜户庭以起華督之禍史激無防有汙種之悔王孫不言有杜門之辱而今俗婦人休其職之業廢其𤣥紞之務不績其麻市也婆娑舍中饋之事修周旋之好更相從詣之適親戚承星舉火不已于行多將侍從暐盈路婢使吏卒錯雜如市尋道䙝謔可憎可惡或宿于他門或冐夜而反遊戲佛寺觀視漁畋登髙臨水出境慶弔開車褰幃周章城邑盃觴路酌絃歌行奏轉相髙尚習非成俗坐致因縁無所不可誨淫之源不急之甚刑于寡妻家邦乃正願諸君子少可禁絶婦無外事所以防微矣抱朴子曰輕薄之人迹側髙深交成財贍名位粗㑹便背禮叛教託云率任才不逸倫强為放達以傲兀無檢者為大度以惜䕶節操者為澁少於是臘皷垂無賴之子犬白醉耳熱之後結黨合羣遊不擇𩔖竒士碩儒或隔籬而不接妄行所在雖逺而必至携手連袂以遨以集入他堂室觀人婦女指玷修短評論美醜不解此等何為者哉或有不通主人便共前嚴飾未辦不復窺聴犯門折闗踰垝穿隙有似抄劫之至也其或妾媵藏避不及至捜索隱僻就而引曳亦怪事也夫君子之居室猶不掩家人之不備故入門則揚聲升堂則下視而唐突他家將何理乎然落拓之子無骨骾而好隨俗者以通此者為親宻距此者為不恭誠為當世不可不爾於是要呼憒雜入室視妻促膝之狹坐交杯觴於咫絃歌淫冶之音曲以誂文君之動心載號載呶謔戲醜䙝窮鄙極黷爾乃笑亂男子之大節蹈相䑕之無儀夫桀傾紂覆周滅陳亡咸由無禮况匹庶乎盖信不由中則屢盟無益意得神至則形器可忘君子之交也以道義合以志契親故淡而成焉小人之接也以勢利結以狎慢宻故甘而敗焉何必房集内讌爾乃欵誠著妻妾飲㑹然後分好昵哉古人鑒淫敗之曲防杜傾邪之端漸可謂至矣修之者君子背之者為小人然禁䟽則上宫有穿窬之男網漏則桑中有奔隨之女縱而肆之其猶烈猛火於雲夢開積水乎萬仞其可撲以箒篲遏以撮壤哉然而俗習行慣皆曰此乃京城上國公子王孫貴人所共為也余每折之曰夫中州禮之所自出也禮豈然乎蓋衰亂之所興非治世之舊風也夫老耼清虛之至者也猶不敢見乎所欲以防心亂若使柳下惠潔髙行屢接䙝讌將不能不使情生於中而色形于表况乎情淡者萬未一而抑情者難多得如斯之事足長乎窮士雖知此風俗不足引進而名勢並乏何以整之每以為慨故常獲憎於斯黨而見謂為野朴之人不能隨時之宜余期於信己而已亦安以我之不可從人之可乎可嘆非一率如此也已矣夫吾末如之何也彼之染入邪俗淪胥以敗者曷肯納逆耳之讜言而及其東走之逺迹哉抱朴子曰俗間有戲婦之法於稠衆之中親屬之前問以醜言責以慢對其為鄙黷不可忍論或蹙以楚撻或繫脚倒懸酒客醟不知限齊至使有傷於血流踒烏卧切折支體者可嘆者也古人感離别而不㓕燭悲代親而不舉樂禮論娶者羞而不賀人既不能動蹈舊典至於徳為鄉閭之所敬言為人士之所信誠宜正色矯而呵之何謂同其波流長此弊俗哉然民間行之日久莫覺其非或清談所不能禁非峻刑不能止也遂詘周而疵孔謂傲放為邈世矣或因變故佻竊榮貴或賴髙援翻飛㧞萃於是便驕矜誇氣凌雲物歩髙視逺侈然自足顧瞻否滯失羣之士雖實英異忽焉若草或傾枕而延賔或稱疾以距客欲令人士立門以成林車騎填噎於閭巷呼謂尊貴不可不爾夫以勢位言之則周公勤於吐握以聞望校之則仲尼循循善誘咸以勞謙為務不以驕慢為髙漢之末世則異於兹蓬髪亂横挾不帯或䙝衣以接人或祼而箕踞朋友之集𩔖味之遊莫切切進徳誾誾修業功過弼為講道精義其相見也不復叙離闊問安否賔則入門而呼奴主則望客而喚狗其或不爾不成親至而棄之不與為黨及好㑹則狐蹲牛飲爭食競割横撥淼摺無復亷恥以同此者為㤗以不爾者為劣終日無及義之言徹夜無箴規之益誣引老莊貴於率任大行不顧細禮至人不拘撿括嘯傲縱逸謂之體道嗚呼惜乎豈不哀哉於是嘲族以叙歡交極黷以結情欵以傾倚伸脚者為妖妍標秀以風格端嚴者為田舍朴騃以虽鎮抗指者為剿令鮮倚以出言有章者為摺答猝突凡彼輕薄之徒雖便辟偶廣結伴流更相推揚取達速易然率皆皮膚狡澤而懷空抱虚有似蜀人瓠壺之喻胸中無一紙之誦所識不過酒炙之事所謂傲狠明徳即聳從昧冒于貨財貪于飲食左生所載不才之子也若問以墳索之微言鬼神之情狀萬物之變化殊方之竒怪朝廷宗廟之大禮郊祀禘祫之儀品三正四始之原本隂陽律厯之道度軍國社稷之典式古今因革之異同則恍悸自失喑嗚俛仰蒙蒙焉莫莫焉雖心覺面牆之困而外䕶其短乏之病不肯謐已强張大談曰雜碎故事蓋是窮巷諸生章句之士吟咏而向枯簡匍匐以守黄巷者所宜識不足以問吾徒也誠知不學之弊碩儒之貴所祖習之非所經易之謬然終迷而返老放誕者無損於進趨故也若髙人以格言彈而可之有不畏大人而長惡不悛者下其名品則宜必瞿然氷泮而革面旋而東走之迹矣抱朴子外篇卷二
