body:
  text: 抱朴子外篇卷三晉葛洪撰譏惑第二十六抱朴子曰澄濁剖判庻物化生羽族或能應對焉毛宗或有知言焉爰玃識徃歸終知来𤣥禽解隂陽虵螘逺泉流蓍龜無以過焉甘石不能勝焉夫唯無禮不厠貴性厥初古民無階級上聖悼混然之甚陋愍巢穴之可鄙故搆樑宇以去鳥獸之羣制禮數以異等威之品教之盤旋訓以揖讓立則罄折拱則枹皷趨歩升降之節瞻視立對之容至於三千盖儉溢之隄防人之所也故儼若冠於曲禮望貌首於五事出門有見賔之肅閒居有慎獨之戒顔生整儀於宵浴仲由臨命而結纓㳟容暫廢隋慢以及安上治民非此莫以盖人之有禮猶魚之有水矣魚之失水雖暫假息然枯靡可必待也人之棄禮雖猶然而禍敗之階也魯秉周禮暴兵不加魏式干木銳冦旋斾大楚帶甲百萬而有振槁之嗤秦殽函襲嶮而無折桞之園豈非棄三夲而喪根祗之攸召哉矧乎安逸觸情喪亂日乆風頺教沮抑斷之儀廢簡脫之容成近人值政化之衰㣲庸民遭道綱之絶紊猶網魚之去水罟圍獸之出陸羅也喪亂以来事物屢變冠履衣服䄂財制日月改易無復一定乍長乍短一廣一狹忽髙忽卑或粗或細所飾無常以同為快其好事者朝夕放效所謂京輦貴大眉逺方皆半額也余實凡夫拙於隨俗其服物變不勝故不變無所損者余未曾易也雖見指笑余亦不理也豈茍欲違衆哉誠以為不耳上國衆事所以勝江表者多然亦有可否者君子行禮不求變俗謂違本邦之他國不改其桑梓之法也况其在於父母之鄉亦何為當事棄而強更學乎吳之善書則有皇象劉纂岑伯然朱季平皆一代之絶手如中州有鍾元常胡孔明張芝索靖各一邦之妙並有古體俱足周事余謂廢已習之法更勤苦以學中國之書尚可不須也况於乃有轉易其聲音以效他語既不能便似良可耻可笑所謂不得邯鄲之歩而有匍匐之嗤者此猶其小者耳乃有遭喪者而學中國哭者令忽然無復念之情昔鍾儀莊舄不忘本聲古人韙之孔子云喪親者若嬰兒之失母其號豈常聲之有寧令哀有餘而禮不足哭以洩哀妍拙何在而乃治飾其音非痛切之謂也又聞貴人在大哀或有疾病服石散以數食停藥勢以飲酒為性命疾患危篤不堪風冷幃帳茵褥任其所安於是凡瑣小人之有才力者了不復居於喪位常在别房髙牀重褥美食大飲或與宻客引滿投空至於沉醉曰此京洛之法也不亦惜哉余之鄉里先徳君子其居重難或病在衰老於禮唯應縗麻在身不成喪致毁者皆過哀啜粥口不經甘時人雖不肖者莫不企及自免而今人乃自取如此何其相去之遼乎又凡人不解呼謂中國之人居喪者多皆奢溢殊不然也吾聞晉之宣景文武四帝居親喪皆毁瘠踰制又不用王氏二十五月之禮皆行七月服於時天下之在重哀者咸以四帝為法世人何獨不聞此而虚誣髙人不亦惑乎刺驕第二十七抱朴子曰生乎世貴之門居乎熱烈之勢率多不與驕期而驕自来矣非夫超羣之器不能免於盈溢之過也盖勞謙虛已則附之者衆驕慢倨傲則去之者疾存亡之機於是乎在輕重而為之不亦蔽哉亦有出自卑碎由㣲而著徒以翕肩歛迹優伊側立低眉屈膝奉附權豪因縁運㑹超越不次毛成翼長蟬蛻泉壤便自軒昻目不歩足器滿意得視人猶芥或曲晏宻集管弦嘈雜後賔填門不復接引或於同造之中偏有所見復未必全得也直以求之差勤以數接其情苞苴繼到壺榼不曠者耳孟軻所謂愛而不敬豕畜之也而多有行諸云是自尊重之道自尊重之道乃在乎以貴下賤卑以自牧非此之謂也乃衰薄之弊俗膏肓之廢疾安共為之可悲者若夫偉人巨器量逸韻逺髙蹈獨徃蕭然自得身寄波流之間神躋九𤣥之表道足於内遺物於外冠摧履決藍縷帶索何肯與俗人競幹佐之便僻修佞幸之媚容效上林喋喋之嗇夫為春蜩夏蠅之聒耳求之以貌責之以妍俗人徒覷其外形之粗簡不能察其精神之淵務在皮膚不料心志雖懐英抱異絶倫邁世事動可以悟舉世之術言發足以解古今之惑含章括嚢非法不談而茅蓬不能動萬鈞之鏗鏘侏儒不能㸔重仭之𢎞麗因而蚩之謂為凡憒夫非漢濱之人不能料明珠扵泥淪之蚌非泣血之民不能識夜光扵重崖之裏蟭螟屯蚊眉之中而彌天之大鵬寸鮒㳺牛迹之水不貴横海之巨鱗故道業不足以相渉聦明不足以相逮理自不合無所多恠所以疾之而不能黙者願夫在位君子無以貎取人勉朂謙損以永天秩耳抱朴子曰世人聞戴叔鸞阮嗣宗傲俗自放見謂大度而不量其材力非傲生之匹而慕學之或亂項科頭或裸袒蹲夷或濯脚於稠衆或溲便於人前或停客而獨食或行酒而止所親此盖化外之所為非域中之快事也夫以戴阮之才學猶以踔自病得失財不補向使二生敬蹈檢括恂恂以接物兢兢以御用其至到何適但爾哉况不及之逺者而遵修其業其速禍危身將不移隂何徒不以清德見待而已乎昔者西施心痛而卧於道側姿顔妖麗蘭麝芬馥見者咸美其容而念其疾莫不躊躇焉於是隣女慕之因偽疾伏於路間形状既醜加之酷臭行人皆憎其貎鄙其氣莫不睨面掩鼻疾趨而過焉今世人無戴阮之自然而效其倨慢亦是醜女闇扵自量之𩔖也帝者猶加弟子之禮扵三老五更者率人以敬也人而無禮其刺深矣夫慢人必不敬其親也盖欲人之敬之必見自敬焉不修善事則為惡人無事扵大則為小人紂為無道見稱獨夫仲尼陪臣謂為素王則君子不在乎富貴矣今為犯禮之行而不喜聞遄死之譏是負豕而憎人説其臭投泥而諱人言其汙也昔辛有見被髪而祭者知戎之將熾余觀懐愍之世俗尚驕䙝夷虜自遇其後羗胡猾夏侵掠上京及悟斯事乃先著之妖恠也今天下向平中興其徴何可不共改既徃之失修濟濟之美乎夫入虎狼之羣後知奔育之壯勇䖏禮廢之俗乃知雅人之不渝道化凌遲遁跡遂往賢士儒者所宜共惜法當扣心同慨矯而正之若力之不能末如之何當竹栢其行使嵗寒而無改也何有便當崩騰競逐其闒茸之徒以取容扵若曹邪去道彌逺可謂為痛歎者其或峨然守正爾不移不蓬轉以随衆不改雅以入鄭者人莫能憎而知其善而期以不同於己者便共仇而不數之嗟乎衰弊乃可爾邪君子能使以亢亮方楞無黨扵俗揚清波以激濁流執勁矢以厲羣枉不過時不見容與不得富貴耳天爵茍存扵吾體者以此獨立不逹亦何苦何恨乎而便當伐本瓦合哺糟掘泥剸足適履毁方入圓不亦劇乎夫節士不能使人不憎之而道不可屈也不能令人不辱之而行猶在我也不能令人不擯之而操之不可改也故分定計決勸沮不能干樂天知命憂懼不能入困瘁而益堅窮否而不悔誠能用心如此者亦安肯草靡萍浮以索鑿枘傚乎禮之所棄者之所為哉抱朴子曰聞之漢末諸無行自相品藻次第羣驕慢傲不入道檢者為都魁雄伯四通八逹皆背叛禮教而從肆邪僻䜛毁真正中傷非黨口習醜言身行弊事凡所云為使人不忍論也夫古人謂通逹者謂通扵道德逹於仁義耳豈謂通乎䙝黷而逹者淫邪哉有似盗跖自謂有聖人之道五者也此俗之傷破人論劇於冦賊之来不能經乆豈所損壊一服而已若夫貴門子孫及在位之士不惜典刑而皆科頭袒體踞見賔客既辱天官又移染庸民後生晚出彼或以涇清之資或佻虚名而躬自為之則凡夫便謂立身當世莫此之為美也夫守禮防者苦且難而其人多窮賤焉恣驕放者樂且易而為者皆逹焉於是俗人莫不委此而就彼矣世間或有少無清白之操業長以買官而富貴或亦其所知足以自飾也其黨足以相引也而無行之子便指以為證曰彼縱情之恣而不妨其赫奕矣此束身履道而不免於貧賤矣而不知榮顯者有幸而頓淪者不遇皆不由其行也然所謂四通八逹者愛其附己為之履不及納帶不暇結携手升堂連袂入室出則接軫㑹則直致所惠則得多囑託則常聽所欲則必副言論則見饒有患則見救所論薦則蹇驢蒙龍駿之價所中傷則孝已受商臣之談故小人之赴也若決積水於萬仭之髙隄而放烈火乎雲夢之枯草焉欲望肅雍濟濟後生有式是猶之炙氷使燥積灰令熾矣百里第二十八抱朴子曰三台九列坐而論道州牧郡守操綱舉領其官益大其事愈憂煩劇所重其唯百里重役以是乎出誅求之所叢赴牧守雖賢而令長不堪則國事不舉萬機有闕其損敗豈徒止乎一境而已哉令長尤宜得人乃於臺省之官也用之不得其人其故無他也在乎至公之情不行而任私之意不違也或父兄貴重而子弟以聞望見選或髙人囑託而凡品以無能見叙或是所宿念或親戚匪他知其不可而能用此等亦時有快者不為盡無所中也要於不精者率多矣其能自效立勉循清約夙夜在公以求衆譽懼風績之不羙耻知己之謬舉尠矣庸猥之徒器小志近冐扵貨賄唯富是圖肆情恣慾頤指氣使在所司官知其有足賴主人舉劾彈糾終扵當解慮其結怨反見中傷不敢犯觸而恣其貪殘矣如此庻安得不困毒而離叛離叛者衆則不得不屯聚而為羣盗矣夫百尋之室撓扵分寸之飈千丈之陂潰於一蟻之穴何可不深防乎何可不深弭乎而秉斤兩者或銓衡而任情掌柯斧者或曲䋲墨扵附己選之者既不為官擇人而求之者又不自謂不任於是政而政荒牧民而民散或有濁驕奢而困百姓者矣或有苛虐酷烈而多怨叛者矣或有闇塞退憒而庻事亂者矣或有潦倒疏緩而致弛壊者矣或有好興不而搜人力者矣或有藏飬逋逃而行凌暴者矣或有不曉法令而受欺㺯者矣或有以音聲酒色而致荒者矣或有圍碁摴蒱而廢政務者矣或有田獵逰飲而忘庻事者矣或有不省辭訟而刑獄亂者矣百姓不堪起為冦賊釁咎發聞寘于叢棘虧君子之明益刑書之煩而民之荼毒亦已深矣夫用非其人譬猶被木馬以繁纓何由騁迹以追風以壊龍當雲雨安能輝耀景扵天衢哉若秉國之鈞出納王命者審良樂之顧盻不令跛蹇厠騏騄冐昧茍得闇扵自量者慮中道之顛躓不以駑蹇服鸞衡則何患庻績之不康何憂四㐫之不退三皇豈足四五帝豈難六哉接疏第二十九抱朴子曰以英逸而遭大明則桑䕃未移而金蘭之恊已固矣以長才而遇深識則不待歴試而相知之情已審矣飄乎猶起鴻之乗勁風翩乎若騰鱗之躡驚雲也若以沉抑而可忽乎則姜不用於周矣若以疏賤而公可距乎則毛生不貴乎趙矣若積素行乃託政則寗戚不顯於齊矣若貴宿名而委任則陳韓不録於漢矣明者舉大畧細不忮不求故能取威定功成天平地豈肯稱薪而㸑數粒乃炊并瑕棄璧披毛索黶哉鈞世第三十或曰古之著書者才大思深故其文隠而難曉今人意淺力近故露而易見比彼難曉猶溝澮之方江河螘垤之並嵩岱矣故水不發崐山則不能揚洪流以東漸書不出英俊則不能備致逺之𢎞韻焉抱朴子答曰夫論管宂者不可問以九陔之無外習拘閡者不可督以㧞萃之獨見盖徃古之士匪鬼匪神其形器雖冶鑠扵疇曩然其精神布在乎方䇿情見乎辭指歸可得且古書之多隠未必昔人故欲難曉或世異語變或方言不同經荒歴亂埋藏積乆簡編朽絶亡失者多或雜續殘缺或脫去章句是以難知似若至深耳且夫尚書者政事之集也然未若近代之優文詔䇿軍書奏議之清富贍麗也毛詩者華彩之辭也然不及上林羽獵二京三都之汪濊愽富也然則古之子書能勝今之作者何也然守株之徒嘍嘍所翫有耳無目何肯謂爾其扵古人所作為神今世所著為淺貴逺賤近有自来矣故新劍以詐刻加價弊方以偽題見寳也是以古書雖質樸而俗儒謂之堕扵天也今文雖金玉而常人同之於瓦礫也然古書者雖多未必盡美要當以為學者之山淵使屬筆者得采伐漁獵其中然而譬如東甌之木長洲之林梓豫雖多而未可謂之為大厦之壯觀華屋之𢎞麗也雲夢之澤孟諸之藪魚肉之雖饒而未可謂之為煎之盛膳俞狄之嘉味也今與古詩書俱有義理而難於兼美方之於士並有徳行而一人偏長藝文不可謂一例也比之於女俱體國色而一人獨閑百伎不可混為無異也若夫俱論宫室而奚斯路寢之頌何如王生之賦靈光乎同說遊獵而叔田盧令之詩何如相如之言上林乎並美祭祀而清廟雲漢之辭何如郭氏南郊之艶乎等稱征伐而出車六月之作何如陳琳武軍之壯乎則舉條可以覺焉近者夏侯湛潘安仁並作𥙷亡詩白華由庚南陔華黍之屬諸碩儒髙才之賞文者咸以古詩三百未有足於偶二賢之所作也且夫古者事事醇素今則莫不彫飾時移世改理自然也至於錦麗而且堅未可謂之减於簔衣輜軿妍而又牢未可謂之不及椎車也書猶言也若入談語所謂如有胡越之接終不相解以此教戒人豈知之哉若易以易曉為辨則書何故以難知為好哉若舟車之代歩渉文墨之改結䋲諸後作而善扵前事其功業相次千萬者不可復縷舉也世人皆知之快於曩矣何以獨文章不及古邪省煩第三十一抱朴子曰安上治民莫善於禮彌綸人理誠為曲備然冠婚飲射何煩碎之甚邪人倫雖以有理為貴但當令足以叙等威而表情敬何在乎升降揖讓之繁重跽拜俯伏之無已邪徃者天下乂安四方無事好古官長時或修之至乃講試累月督以楚撻晝夜修習廢寢與食經時學之一日試之執卷從事案文舉動黜謫之罰又在其間猶有過悞不得其意而欲以此為生民之常事至難行也此墨子所謂累世不能盡其學當年不能䆒其事者也古人詢于芻蕘慱採童謡狂夫之言猶在擇焉至扵墨子之論不能非也但其張刑開塗徑浹人事備王道不能曲述耳至於譏葬厚刺禮煩未可棄也自建安之後魏之文武送終之制務在儉薄此則墨子之道有可行矣余以為喪亂既平朝野無為王者所制自今作古可命精學洽聞之士才任損益免於拘愚者使删定三禮割棄不要次其源流總合其事𩔖集以相從其煩重逰說辭異而理同者存之不可常行除之無所傷損卒可斷約而舉之勿令沉隠復有凝滯其吉㓙器用之物爼豆觚觶之屬衣冠車服之制旗章采色之美宫室尊卑之品朝饗賔主之儀祭奠殯葬之變郊祀禘祫之法社稷山川之禮皆可减省務令約儉夫約則易從儉則用少易從則不煩用少則費薄不煩則莅事者無過矣費薄則調求者無苛矣拜伏謙譲之節升降盤旋之容使足叙事無令小碎條牒各别易案用今五禮混擾雜飾紛錯枝分葉散重出互見更相貫渉曲儒尋案猶多所滯駁難漸廣異同無己殊理兼說嵗増月長自非至精莫不惑悶躊躇岐路之衢愁勞羣疑之藪煎神瀝思考校叛例嘗有窮年竟不豁了治之勤苦决嫌無地呻吟尋析憔悴决角修之華首不立妨費日月廢棄他業愁困後生真未央矣長致章句多扵本書今若破合雜俗次比種𩔖刪削不抗其綱較其令炳若日月之著明灼若五色之有定息學者萬倍之役弭諸儒争訟之煩將来逹者觀之當美扵今之視周矣此亦改燒石去血食之比無所憚難而恨恨於惜壊推車遲於去巢居也然守常之徒而卒聞此義必将愕然創見謂之狂生矣夫三王不相沿樂五帝不相襲禮而其移風易俗安上治民一也或革或因損益壊善何必當乗船以登山䇿馬以渉川甲以升廟堂重裘以當隆暑乎若謂古事終不可變則棺椁不當代薪埋衣裳不宜改裸袒矣尚博第三十二抱朴子曰正經為道義之淵海子書為增深之川流仰而比之則景星之佐三辰也俯而方之則林薄之禆嵩嶽也雖津塗殊闢而歸於進徳雖難於舉趾而合於興化故通人緫原本以括流末士操綱領而得致焉古人歎息於才難故謂百世為隨踵不以璞非崑山而棄耀夜之寳不以書不出聖而廢助教之言是以閭陌之拙詩軍旅之鞫誓或詞鄙喻陋簡不盈十猶見撰録亞次曲語百家之言與經一揆譬操水者器雖異而救火同焉猶針灸者術雖殊而攻疾均焉漢魏以来羣言彌繁雖義深扵𤣥淵辭贍於波濤放之可以臻徴祥於天上發嘉瑞於后土召環雉於大荒之外安圜堵於函夏之内近弭禍亂之階逺垂長世之祉然時無聖人目其品藻故不得騁驊騄之迹於千里之塗編近世之道於三墳之末也拘謹之徒桎梏淺溢之中挈瓶訓詁之間輕竒賤異謂為不或云小道不足觀或云廣愽亂人思而不識合錙銖可以齊重於山陵聚百十可以致數於億兆羣色㑹而衮藻麗衆音雜而韶濩和也或貴愛詩賦淺近之細文忽薄深羙富博之子書以磋切之至言為騃拙以華之小辯為妍巧真偽顛倒玉石混淆同廣樂於桑間鈞龍章於卉服悠悠皆然可歎可慨者也或曰著述雖繁適可以品辭耀藻無𥙷於得失未若德行不言為訓故顔閔為上而㳺夏乃次四科之格學本而行末然則綴文固為餘事而吾子不褒崇其源而獨貴其流可乎抱朴子答曰德行為有事優劣易見文章㣲妙其體難識夫易見者粗也難識者精也夫唯粗也故銓衡有定焉夫唯精也故品藻難一焉無故捨易見之粗而論難識之精不亦可乎或曰德行者本也文章者末也故四科之序文不居上然則著紙者糟粕之餘事可傳者祭畢之芻狗卑髙之格是可識矣文之體略可得聞乎抱朴子答曰筌可以棄而魚未獲則不得無筌文可以廢而道未行則不得無文若夫翰迹韻略之宏促屬辭比事之疏宻源流至到之修短藴藉汲引之深淺其懸絶也雖天外毫内不足以喻其遼邈其相傾也雖三光耀熠不足以方其巨細龍淵鉛鋌未足譬其銳鈍鴻羽積金未足比其輕重清濁参差所禀有主朗昩不同科強弱各殊氣而俗士唯見能染毫畫紙者便槩之一例斯伯牙所以永思鍾子郢人所以格斤不運也盖刻削者比肩而班狄擅絶手之稱援琴者至衆而䕫襄專知音之難廐馬千駟而騏驥有邈羣之價美人萬計而威施有超世之容盖有逺過衆者也且文章之與德行猶十尺之與一丈謂之餘事未之前聞夫上天之所以垂象唐虞之所以為稱大人虎炳君子豹蔚昌旦定聖諡扵一字仲尼從周之郁莫非文也八卦生鸞隼之所被六甲出靈龜之所負文之所在雖賤猶貴犬羊之鞟未得比焉且夫本不必皆參末不必悉薄譬若錦繡之因素地珠玉之居蚌石雲雨生於膚寸江河始於咫尺爾則文章雖為徳行之次未可呼為餘事也或曰今世所為多不及古文章著述又亦如之豈氣運衰殺自然之理乎抱朴子答曰百家之言雖有歩起皆出碩儒之思成才士之手方之古人不必悉减也或有汪濊𤣥曠合契作者内闢不測之深源外播不匱之逺流其所祖述也長其所紬繹也妙變化不繫滯於䂓矩之方圓旁通不凝閡扵一塗之逼促是以偏嗜酸醎者莫能知其味用思有限者不能得其神也夫應龍徐舉顧盻凌雲汗血緩歩呼吸千里而螻螘怪其無階而髙致駑蹇患其過己之不漸也若夫馳驟扵詩論之中周旋於傳記之間而以常情覽巨異以褊量測無涯以至粗求至精以甚淺揣甚深雖始自髫齓訖于振素猶不得也夫賞其快者必譽之以好而不得曉者必毁之以惡自然之理也於是以其所不解者為虗誕慺力候切敬也誠以為爾未必為情以傷物也又世俗率神貴古者而黷賤同時雖有追風之駿猶謂之不及造父之所御也雖有連城之珍猶謂之不及楚人之所泣也雖有擬斷之劍猶謂之不及歐治之所鑄也雖有起死之藥猶謂之不及和鵲之所合也雖有超羣之人猶謂之不及竹帛之所載也雖有益世之書猶謂之不及前代之遺文也是以仲尼不見重扵當時大𤣥見嗤薄扵比肩也俗士多云今山不及古山之髙今海不及古海之廣今日不及古日之熱今月不及古月之朗何肯許今之才士不减古之枯骨重所聞輕所見非一世之所患矣昔之破琴勦𤣥者諒有以而然乎漢過第三十三抱朴子曰歴覽前載逮乎前代道㣲俗弊莫劇漢末也當塗端拱閹官之徒操㺯神噐秉國之鈞廢正興邪殘人害意噂沓背憎即聾從昧同惡成羣汲引姦黨吞財多藏不知紀極而不能散錙銖之薄物施振清㢘之窮儉焉進官則非多財者不達也獄訟則非厚貨者不直也官髙勢衆力足㧞才而不能發毫之片言進益時之翹俊也其所用也不越扵妻妾之戚屬其惠澤也不出乎近習之所庸莫戒臧文位之譏靡追解狐㤀私之義分禄以擬王林致事以逰方回故列子比屋而門無鄭陽之恤髙概成羣而不遭暴生之薦抑挫獨立推進附己此樊所以掩口馮唐所以永慨也扵時率皆素飡偷容掩德蔽賢忌有功而為之疾清白而排之諱忠讜而陷之惡特立而擯之柔媚者愛崇飾之祐方稜者訕棄之患飬豹狼而殱驎虞殖枳棘而剪椒桂於是傲兀不檢丸轉萍流者謂之𢎞偉大量苛碎峭嶮懐螫挾毒者謂之公方正直令色警慧有貎無心者謂之機神朗徹利口小辯希指巧言者謂之標領清妍猝突召釁驕矜輕脫者謂之巍峩瑰傑嗜酒好色闒茸無疑者謂之率任不矯求取不廉好奪無足者謂之髙矌逹節蓬髪䙝服逰集非𩔖者謂之通美汎愛反經詭聖順非而博者謂之莊老之客嘲㺯嗤妍凌上侮慢者謂之蕭豁雅韻毁方投圓面從響應者謂之絶倫之秀憑倚權豪擁貨居竒者謂之知變之竒懶㸔文書望空下名者謂之業大志髙仰賴強親位過其才者謂之雄豪之匹輸貨勢門以市名爵者謂之輕財貴義結黨合譽行與口違者謂之以文㑹友左道邪術假託鬼怪者謂之通靈神人卜占小數誑飾禍福者謂之知來藏往馬弄矟山角切一夫之勇者謂之上將之畧舍離道徳偶俗而言者謂之英才碩儒若夫體亮行髙神清量逺不諂笑以取恱不曲言以負心含霜履雪義不茍合據道推方嶷然不羣風雖疾而枝不撓身雖困而操不改進則切辭正論攻過箴闕退則端誠杜私知無不為者謂之闇昧至若夙興夜寐退食自公憂勞損益畢力為政者謂之小器俗吏扵是明哲色斯而幽遁髙俊括囊而佯愚疏賤者奮飛以擇木縶制者曲從而朝隠知者不肯吐其秘勇者不為致其果毅忠謇難退姦凶得志邪流溢而不可遏也偽塗闢而不可杜也乃臻乎凌上替下盗賊多有宦者奪人主之威三九死庸豎之手忠賢望士謂之黨人囚捕誅鋤天下嗟嗷無罪無辜閉門遇禍微煙起於蕭墻而飈焚徧於宇宙淺隙發於膚寸而波濤漂乎四極金城屠於庶冦湯池航於一葦勁鋭望塵而氷泮征人倒戈而奔北飛鋒薦於扆闥左衽掠於禁省禾黍生於廟堂榛莠秀乎玉階雲觀變為狐兎之藪象魏化為虎豹之蹊東序煙燼於委灰生民燋淪於淵火凶家害國得罪竹帛良史無褒言金石無徳音夫何為哉失人故也吳失第三十四抱朴子曰吳之杪季殊代同疾如前失之於彼不能改弦於此鑒亂亡之未逺而躡傾車之前軌覩軹道之争首而忘及身之禍笑蟣虱之晏安不覺事異而患等見競濟之舟沉而不知殊塗而均溺也余生於晉世所不見余師鄭君具所親悉毎誨之云吳之晚世尤劇之病賢者不用滓充序紀綱馳紊吞舟多漏貢舉以厚貨者在前官人以黨强者為右匪富匪勢窮年無冀徳清行髙者懐英逸而抑淪有才有力者蹊青雲以官躋主昏於上臣欺於下不黨不得不競不進背公之俗彌劇正直之道遂壊於是斥鷃因驚風以凌霄朽舟託迅波而電邁鸞鳯卷六翮於叢棘鷁首滯潢汙而不櫂矣秉繼之佐牧民之吏非母后之親則阿諂之人也進無補過拾遺之忠退無聴訟之幹虚談則口吐氷霜行己則守汙泥滓以毁譽為織以威福代稼穡車服則光可以鑒豐屋則羣烏爰止叱咤迅於雷霆禍福速於鬼神勢利傾於邦郡儲積富乎公室出飾翟黄之衛從入遊玉根之藻棁僮僕成軍閉門為市牛羊掩原隰田池布千里外有魚餐濯裘之儉以趙宣平仲之名内崇陶侃文信之警實有安昌董鄧之汙雖造賔不沐嘉㫖之待饑士不蒙升合之救而金玉滿堂妓妾溢房商販千艘腐穀萬庾園囿擬上林舘第僣太極粱肉餘於犬馬積珍溢於帑藏其接士也無葭莩之薄其自奉也有盡理之厚或有不開律令之篇卷而大理之位不識几案之所置而處機要之職不知五經之名目而享儒官之禄不閑尺紙之寒暑而坐著作之地筆不狂簡而愛駮議之榮低眉垂翼而充奏劾之選不辨人物之精粗而委以品藻之政不知三才之軍勢而遽軒節盖之下屢為奔北之辱將而不失前鋒之顯號不别菽麥之同異而沗司顧問之近任夫魚質龍文似是而非遭水而喜見即悲雖臨之以斧鉞之威誘之以傾城之寳猶不能奮鉛鋒於犀兕騁駑蹇以追風非不忌重誅也非不恱美賞也才不勝任無可柰何而欲與之緝熈百揆𢎞濟大務猶託萬鈞扵赤舟之上求千鍾於升合之中紲芻狗而責盧鵲之效鞲鷄鶩而崇鷹揚之功其不可用亦較然矣吳主不此之思不加夕佞諂凡庸委以重任危機急弩亡徴著扵日月而自謂安於峙嶽唐虞可仰也目力疲於綺燦而不以證獻言之邪正榖帛靡於不而不以賑戰士之凍餒心神恱於愛媚而不以念存亡之𢎞理盖輕乎崇替之源而忽乎宗廟之重者也鄭君又稱其師左先生隠居天柱山不營禄利不友諸候然心願太平憂桑梓乃慨然永歎於蓬屋之下告其門生曰赤符寢耀黄精載起纉樞紐於太廻紫盖於鶉首繼天理物光宅東夏惠風於區外𤣥澤洽於宇内重譯接武共楛盈庭蕩蕩巍巍格于上下承平宇宙因循甚易而五弦謐響南風不詠上不獲㳟己之道下不聞康哉之歌飛龍翔而不集淵虬蟠而不躍騶虞翳於㝠昧朱華芽而不秀隂陽相沴寒燠繆節七政告㓙陵谷易所殷雷鞫磕於龍潜之月凝霜肅殺乎朱明之運土燭不照沉醴不涌疆場多壘嘉禾不遂豈其他哉誠由四㐫不去元愷不舉用者不賢賢者不用也然髙慨量懐玉守凈志無欲扵物藏器淵沈得意遺世非禮不動非時不見困而無悶窮而不悔樂天任命混一榮辱進無恱色退無戚容者固有伏死乎甕牗安肯衒沽以進趨掲其不貲之寳以競燕石之售哉孔墨之道昔曾不行孟軻揚雄亦居困否有徳無時有自来耳世無離朱皂白混焉時乏管青騏蹇揉焉礫積於金匱瑾瑶委乎溝洫匠石而遐淪梓豫忽而莫識己矣悲夫我生不辰弗先弗後將見吳土之化為晉城南民之變成北𨽻也言猶在耳而孫氏輿襯抱朴子聞之曰二君之言可為来戒故録于篇欲後代知有吳失國匪降自天也若茍諱國惡纎芥不貶則董狐無貴於直筆賈誼將受譏於過秦乎守塉第三十五抱朴子曰余友人有潜居先生者慕寢丘之莫爭間塉土以茸宇銳精藝之文意忽學稼屢失有年饑色在顔或人難曰知禮因扵廪實博施由乎貨豐髙出於有餘儉生乎不足故十千美於詩人食貨首乎八政躬稼基克配之業耦耕有不改之樂竒士之居也進則侣鴻鸞以振翮退則參陶白之理生仕必伯玉居必千金是以昔人必科膏壤以分利勤四體以稼穡播原菽之與與茂嘉蔬之翼翼收牟秬之千倉積我庾之惟億出連騎以逰畋入候服而玉食而先生之宅此也亢陽則出谷颺塵重隂則㴞天凌丘陸無含秀之苖水無吐穗之株稗糲曠扵圌廪薪㸑廢於庖厨怡爾執待免之志坦然無去就之謨吾恐首陽之事必見於今丹山之困可立而須人為子寒心子何宴然而弗憂也夫覩機而不作不可以言明安土而不移衆庻之常事豈翫鮑者忘蘭而失迷者易性乎何先生未寤之乆也鄙人惑焉不識所謂夫衮冕非禦鏑之服典誥非救饑寒之具也胡不眎沃衍扵四郊躬田畯之良業捨六藝之迂濶收萬箱以販乏乎潜居先生曰夫聵者不可督之以分雅鄭瞽者不可責之以别丹漆井鼃不可語以滄海庸俗不可說以經術吾子茍知老農之小功未喻面墻之巨拙何異拾瑣沙而捐隋和向炯燭而背白日也夫好尚不可以一概核趨不可以彼我易也夫欲隮閬風陟嵩華者必不留行於丘垤意在乎㳺南溟汎滄海者豈睱逍遥於潢洿是以注清聽於九韶者邑人之聲不能恱其耳烹太牢享方丈者荼蓼之味不能甘其口鵾鵬戾赤霄以髙翔鶺鴒傲蓬林以皷翼洿陸殊途亦飛之極晦朔甚促朝菌不識蜉蝣忽忽於寸隂野馬六月而後息鯈鮒汎濫以暴鱗靈虬勿用乎不測行業乖舛意何可得余雖藜飡之不充而足於鼎食矣故列子不以其乏而貪鄭陽之禄曾參不以其貧而易晉楚之富夫收微言扵將墜者周孔之遐武也情孜孜以為利者孟叟之罪人也造逺者莫䏻兼通扵岐路有為者莫䏻並舉於耕學體瘁而神豫亦何病於居約且又處塉則勞勞則不學清而清至矣居沃則逸逸則不學奢而奢来矣清者福之所集也奢者禍之所赴也福集則雖㣲可奢雖衰可興焉禍赴則雖強可弱雖存可亡焉此不期而必㑹不招而自来也故君子欲正其末必端其本輟其流則遏其源故道德之功建而奓靡之門閉矣姜望至德而佃不復種重華大聖而漁不償網然後玉璜表營丘之祚大功有二十之髙何必譏之以惰而察才以相士乎夫二人分財取少為㢘余今讓天下之豐沃處兹邦之埆安昌之膏腴取北郭之無欲誠萬物之可細亦何徃而不足哉北辰以不改為衆星之尊五嶽以不遷為羣望之宗蟋蟀屢移而不貴禽魚饜深則逢患方將墾九典之蕪薉播六德之嘉厥田邈扵上土之科其收盈乎天地之間何必耕耘為務哉昔衣以棄財止盗庾氏以椎璧厲貪疏廣散金以除子孫之禍叔敖取塉以彌可欲之憂牛缺以載珍致冦陶以多藏召殃得失較然可無鑒乎於是問者抑然良乆口張而不䏻嗑首俛而不䏻仰慨而嗟乎始吾立不朽之言者不以産業汨和追下帷之績者不以窺園㳙目子以雛之甘呼鴛擗蟹之計要猛虎豈不陋乎鄙哉子之不夙知也安貧第三十六抱朴子曰昔漢火寢耀龍戰虎爭九有堛裂三家鼎據有樂天先生者避地蓬轉播流岷益始處昵於文休未見知於孔明而言髙行方獨立不羣時人憚焉莫之或與時二公之力不䏻違衆遂令斯生沉鬱衡華齒漸桑榆而韋布不改而時主思賢不聞不知當途之士莫舉莫貢潜側武之陋巷竄䋲樞之蓬屋進廢經世之務退忘治生之事藜飡屢空朝不謀夕於是偶俗公子造而詰之曰盖聞有伊吕之才者不乆滯於窮賤懐猗頓之術者不長處扵饑寒逹者貴乎知變智者驗乎不貴故范生出則㓕吳伯越為命世之佐入則貨殖營生累萬金之貲夫貧在六極富在五福詩美哿矣易貴聚人垂餌香則鱣鮪来懸賞厚則果毅奮長卿所以解犢鼻而擁朱旄曲逆所以下席扉而享茅土不韋所以食十萬之邑絳候所以㧞囹圄之困也故下卿儉而獲悔咎之辱漂嫗豐而千金之報先生無少伯之竒略專銳思乎六經忽絶粮之實禍慕不朽之虗名耻詭遇以干禄羞衒沽以要榮冀西伯之方略俟黄河之將清甘列子之菜色邈全神而遺行何異圖畫騏驥以代徒行之勞遥指海水以解口焦之渇張魚網扵峻極之巔施釣緡於修木之末雖自以為得所猶未免乎迂闊也事無身後之功物無違時之盛今海内𤓰分英雄力競象恭㴞天猾夏放命駑蹇星馳以兼路豺狼奮口而交爭當途投以訟屈素士塵以履徑純儒釋皇道而治五霸之術碩生棄四科而恤月旦之評筐篚實者進於草莱乏資地者退於朝廷握黄白者排金門而陟玉堂誦方䇿者結世仇而委泥濘贄幣濃者瓦石成珪璋請託薄者龍駿棄林坰黨援多者偕驚飈以凌雲交結狹者侣跛鱉以沉泳夫丸泥不䏻遏彭蠡之沸騰獨賢亦焉䏻反流遁之失正今先生入無儋石之儲出無束修之調徒含章如鳯龍文如虎豹吐之如波濤陳之如錦繡而凍餓扵擐堵何計䟽之可弔奚不汎輕舟以託訊御飛帆以逺之交瑰貨於朔南收金碧扵九疑廸焦烈之遐武縻好爵於清時徒疲勞於述作豈蟬蛻之有期也獨苦身以為名乃黄老之所嗤也樂天先生答曰六藝俻研八索必該斯則富矣振翰摛藻德音無窮斯則貴矣求仁仁至旃焉如夫棲重淵以頥靈外萬物而自得遺紛埃於險塗澄精神於𤣥黙不窺牖以遐覽判㣲言而靡惑雖復設之以台鼎爾而弗革也曷肯憂貧而與賈竪爭利戚窮而與凡瑣競逹哉吾子茍知商販可以崇寳耕耘可以免饑不識逐麋者不顧道逺者不到遲也且夫尚父之皷刀素首乃吐竒也萬鈞之為重衝飈不䏻移蕭韶未九成靈鳥不紆儀也是以俟扶揺而登蒼霄者不充詘扵蓬蒿之杪騁蘭筋以陟六方者不爭途乎蹇驢之羣大孝必畏辱親之險故子春戰悸於下堂上智不貴難得之才故唐虞捐金而抵璧明哲消禍於未来知士聞利則慮害而吾子訊僕以汎舟孜孜扵潤屋勸隋珠之彈雀探虎口以奪肉輕遺體於不測觸重險以逺至忘膚髪之明戒尋乾沒扵難冀若乃焚輪傾岩木㧞石飛陽候山峙洪濤崔巍輕艘塵漂力與心違徒嗟泣而罔建乃悟逹者之見㣲也昔囘憲以清苦稱髙陳平以無金免危廣漢以好利喪身牛缺以載寳灰縻匹夫枉死於懐璧豐狐召災於美皮今吾余以誨盗之業敦余以召賊之䇿進酖酒以獻酬非養夀之忠益夫士以三墳為金玉五典為琴筝講肄為鍾鼓百家為笙簧使味道者以辭飽酣徳者以義醒超流俗以髙蹈軼億代而揚聲方長驅以獨徃何貨賄之穢情夫藏多者亡厚好謙者忌盈含夜光者速剖循覆車者必傾過載者沉其舟慾勝者殺其生盖下士所用心上德所不營也於是問者茫然自失請備門生之末編永寳長生之良方焉仁明第三十七抱朴子曰門人共論仁明之先後各具所見乃以諮余余告之曰三光垂象者乾也厚載無窮者坤也乾有仁而兼明坤有仁而無明卑髙之數不亦邈乎夫唯聖人與天合德故唐堯以欽明冠典仲尼以明義首篇明明在上元首之尊稱也明哲保身大雅之絶蹤也蜎飛蝡動亦有仁故其意愛𢎞於長育哀傷著於啁噍上竹交切下子切然赴阬井而無猜入罻羅而無覺有仁無明故並趨禍而憂失熾潜景以易組圭結棟宇以免巢穴選禾稼以伐毒烈制衣裳以改祼飾役舟楫以濟不通服牛馬以息負歩序等威以振禍亂造噐械以戒不虞創書契以治百官制禮律以肅風教皆大明之所為非偏人之所辨也夫心不違仁而明不經國危亡之禍無以杜遏亦可知矣夫料盛衰於未兆探機事於無形指倚伏扵理外距浸潤扵根生者明之功也垂惻隠於昆䖝雖見犯而不校覩觳而改牲避行葦而不蹈者仁之用也否則明者才也仁者行也殺身成人之行可以勉而至鑒𤣥測幽之明難妄假精粗之分居然殊矣夫體不忍之仁無臧否之明則心惑偽真神亂朱紫差等不分邪正不識不逮安危則一身之不保何所立以濟物乎昔姬公非無友于之愛而涕泣以㓕親石碏非無天性之慈而割私以奉公盖明見事體不溺近情遂為純臣以利斷恩仁用明以計抑仁仁可時廢而明不可無也應天革命以其明也徐偃修仁以朝同班外墜城池之險内無戈甲之備亡國破家不明之禍也門人曰仲尼嘆明仁為任重而道逺又云人而不仁如禮何若聖與仁則吾豈敢孟子曰仁宅也義路也人無惻隠之心非仁也三代得天下以仁失天下以不仁此皆聖賢之格言竹素之顯證也而先生貴明未見典據小子蔽闇所惑焉抱朴子答曰古人云好仁不好學其蔽也愚子近之矣曩六國相吞豺虎力競髙權詐而下道德尚殺伐而廢退讓孟生方欲抑頓貪殘褒隆仁義安得不勤勤諄諄獨稱仁耶然未有片言云仁勝明也譬猶疫癘之時醫巫為貴異口同辭唯論藥石豈可便謂鍼艾之伎過扵長生乆視之道乎且吾以為仁明之事布於方䇿直欲切理示大較精神舉一隅耳而子猶日用而不知云明事之無據乎乾稱大明終始六位時成是立天以明無不包也坤云至㢤萬物資生是地徳以仁承順而已先後之理不亦炳然詩云明明上天照臨下土明明天子令聞不已易曰王明並受其福幽賛神明神而明之此則明之與神合體誠非純仁所䏻企及也孔子曰聰明神武不云聦仁又曰昔者明王之治天下不曰仁王春秋傳曰明德惟馨不云仁德書云元首明哉不曰仁哉老子嘆上士則曰明目四逹其說衰薄則曰失道而後徳失德而後仁易曰王者南靣向明不云向仁也我欲仁斯仁至矣又曰為仁由己斯則人人可為之也至於聦明何可督哉故孟子云凡見赤子將入井莫不趨而救之以此觀之則莫不有仁心但厚薄之間而聰明之分時而有耳昔崔杼不殺晏嬰夫杼為大不仁而有小仁然則姦臣賊子猶䏻有仁矣門人又曰易稱立人之道曰仁與義然則人莫大扵仁也抱朴子答曰所以云爾者以為仁在於行行可立為明並於神必須天授之才非所以訓故也博喻第三十八抱朴子曰盈乎萬鈞必起於錙銖竦秀凌霄必起於分毫是以行潦集而南就無涯之矌尋常積而𤣥圃致極天之髙抱朴子曰騁逸䇿迅者雖遺景而不勞因風凌波者雖濟危而不傾是以元凱分職而則天之勲就伊吕既任而革命之功成抱朴子曰瓊艘瑶楫無渉川之用金弧玉絃無激矢之䏻是以介潔而無政事者非撥亂之器儒雅而乏治略者非翼亮之才抱朴子曰閬風𤣥圃不借髙於丘垤懸結緑不假觀於瓊珉是以英偉不羣而幽蕙之芬駭峻概獨立而衆禽之響振抱朴子曰氷炭不衒䏻於冷熱瑾瑜不證珍而體著是以君子恭己不恤乎莫知至人尸居心遺乎毁譽抱朴子曰衝飈傾山而不能效力於秋毫火鑠金石而不能耀烈於汜涇是以淮隂善戰守而拙理治之策絳侯安社稷而乏承對之給抱朴子曰狥名者不以授命為難重身者不以近欲累情是以紀信甘灰麋而不恨楊朱同一毛於連城抱朴子曰小鮮不解靈虬之逺䂓鳬鷖不知鴻鵠之非匹是以耦耕者笑陳勝之投耒淺識者嗤孔明之抱膝抱朴子曰純鉤之鋒騐於犀兕宣慈之良效於明試是以同否則元凱與斗筲無殊並任則騄騏與駑駘不異抱朴子曰器非瑚簋必進鋭而退量擬伊吕雖發晚而到早是以鷦鷯倦翮猶不越乎蓬杪鴛雛徐起顧眄而唳蒼昊抱朴子曰九斷四屬者蕰藻所以表靈摧柯碎葉者茝蕙所以増芬是以夷吾桎檻而建匡合之績應侯困辱而著入秦之勲抱朴子曰所競者細則利同而讎結善否殊塗則事異而結生是以嫫母宿瘤惡見西施之艶容商臣小白憎聞延州之退耕抱朴子曰精鈍舛迹則凌遲者愧恨壯弱異科則扛鼎者見忌是以淮隂顯擢而庸𨽻悒懊以疾其趨武安功髙而范睢飾談以破其事抱朴子曰必死之病不下苦口之藥朽爛之材不受雕鏤之飾是以比干匪躬而剖心扵精忠田豐見㣲而夷戮於言直抱朴子曰嶧陽孤桐不能無柱而激哀響大夏孤竹不能莫吹而吐清聲是以官卑者稷卨不能康庻績權薄者伊周不䏻臻升平抱朴子曰登峻者戒在於窮髙濟深者禍生於舟重是以西秦有思上蔡之李斯東越有悔盈机之文種抱朴子曰剛柔有不易之質貞橈有天然之性是以百錬而南金不虧其真危困而烈士不失其正抱朴子曰不以其道則富貴不足居違仁捨義雖期頥不足吝是以卞隨負石以投淵仲由甘心以赴刃抱朴子曰卑髙不可以一槩齊餐廪不可以勸沮化是以惠施患從車之榮少莊周憂得魚之方多抱朴子曰出處有氷炭之殊躁靜有飛沉之異是以墨翟以重繭怡顔北叟以遺世得意抱朴子曰適心者交淺而愛深忤神者接乆而弭乖是以聲同則傾盖而若眤道異則白首而無愛抱朴子曰艅艎鷁首涉川之良器也櫂之以北狄則沉漂於波流焉蒲梢汗血迅趨之駿足也御非造父則傾僨於險塗焉青萍豪曹剡之精絶也操者非羽越則有自傷之患焉勁兵銳卒撥亂之神物也用者非明哲則速自焚之禍焉抱朴子曰天秩有不遷之常尊無禮猶犯遄死之重刺是以𤣥洲之禽獸雖能言而不得厠貴牲蛩之負蹷雖寄命而不得為仁義抱朴子曰謗讟不可以巧言弭實恨不可以虗事釋釋之非其道弭之不由理猶懐氷以遣冷重鑪以却暑逐光以逃影穿舟以止渇矣抱朴子曰明主官人不令出其器忠臣居位不敢過其量非其才而妄授非所堪而任猶氷碗之盛沸湯葭莩之包烈火綴萬鈞於腐索加倍載於扁舟抱朴子曰豹狐之裘不為負薪施九成六變不為聾夫設髙唱逺和不為庸愚吐㤀身致果不為薄徳作抱朴子曰民財匱矣而求不已下力竭矣而役不休欲怨難而不生覬其寧之惟永猶斷根以續枝割背以禆股刻目以廣明剜耳以開聰也抱朴子曰法無一定而慕權宜之隨時功不倍前而好屢變以偶俗猶剸髙馬以適卑車削附踝以就履斷長劍以赴短鞞割尺壁以納促匣也抱朴子曰巨波之修鱗不出竆谷之隘鸞棲之峻木不秀培塿之卑九疇之格言不吐庸猥之口金版之髙不出恒民之懐覩百抱之枝則足以知其本之不細覩汪濊之文則足以覺其人之淵䆳抱朴子曰桑林鬱藹無𥙷栢木之凄冽膏壤帶郭無解黔敖之然繭綈紈綺此之自出千倉萬箱於是乎生故識逺者貴本見近者務末抱朴子曰體粗者繫形知精者得神原始見終者有推源之緒得之未朕者無假物之因是以晝見天地未足稱明夜察分毫乃為絶倫抱朴子曰芳藻春耀不能離柯以乆鮮吞舟之魚不䏻水而攝生是以名羙而實不副者必無沒世之風位髙而器不稱者不免致冦之敗抱朴子曰忍痛苦之藥石者所以除伐命之疾嬰甲胄之重冷者所以扞鏑之集潔操履之拘苦者所以全㧞萃之業納拂心之至言者所以無易方之惑也抱朴子曰鸞競粒扵庭場則愛䙝於鷄鶩龍鱗雜厠於芻豢則見黷於六牲是以商老棲峻以播邈世之操卞隨赴深以全遺物之聲抱朴子曰浚井不渫則泥濘滋積嘉不耘則荑莠彌漫學而不思則疑閡實繁講而不精則長惑喪功抱朴子曰積萬金於篋櫃雖儉乏而不用則未知其有異於貧窶懐逸藻於胷心不寄意於翰素則未知其有别於庸猥抱朴子曰南威青琴姣冶之極而必俟盛飾以增麗回賜㳺夏雖天才雋朗而實須墳誥以廣智抱朴子曰丹幃接網組帳重䕃則醜姿翳矣朱漆致飾錯塗炫燿則枯木隠矣是以六藝備則卑鄙化為君子衆譽集則孤陋邈乎貴逰抱朴子曰繁林翳薈則羽族雲萃淵淵浩汗則鱗羣競赴徳業廣則宅心者衆瑕録用即逺懐近集抱朴子曰尋飛絶景之足而不能騁逸放扵吕梁凌波泳淵之屬而不能陟峻而攀危故離朱剖秋毫扵百步而不䏻辨八音之雅俗子野合通靈之絶響而不䏻指白黒於咫尺抱朴子曰四聰廣闢則羲和納景萬仞虗已則行潦交赴故愽采之道𢎞則異聞畢集庭燎之耀輝則竒士叩角誹謗之木設則有過必知敢諌之鼓懸則直言必獻抱朴子曰能言莫不褒堯政不必皆得也舉世莫不貶桀事不必盡失也故一條之枯不損繁林之蓊藹蒿麥冬生無解觱發之肅殺西施有所惡而不能减其羙者羙多也嫫母有所善而不能救其醜者醜篤也抱朴子曰身與名難兩濟功與神尟並全支離其徳者苦而必安用以適世者樂而多危故鷙禽以奮擊拘縶言鳥以智慧見籠瓊瑶以符采剖判三金以琦玩冶鑠蘭以芬馨剪刈文梓以含音受伐是以翠虬覩伯益而登𤣥雲靈值孟戱而反丹穴子永歎天倫之偉漆園悲繡之犧抱朴子曰萬麋傾角猛虎為之含牙千禽鱗萃鷙鳥為之握爪是以四國流言公旦不能遏謗者盈路子産無以塞抱朴子曰威施之艶粉黛無以加二至之氣吹嘘不能増是以懐英逸之量者不矜風格以示異體邈俗之器者不恤小譽以狥通抱朴子曰麟止儀所患在少狐鳴梟呼世忌其多是以俊乂盈朝而求賢者未倦讒佞作威而忠貞者切齒抱朴子白多力何必孟賁烏獲逸容豈唯鄭旦毛嬙飈迅非徒驊騮驌騻立斷未獨湛盧干將是以能立素王之業者不必東魯之丘能治骨枯之仁者不必西鄰之昌抱朴子曰靈振響於朝陽未有惠物之益而莫不澄聼於下風焉鴟梟宵集於垣宇未有分毫之損而莫不掩耳而注謫焉故善言之徃無逺不恱惡辭之来靡近不忤猶日月無謝於貞明枉矢見忌扵暫出抱朴子曰影無違形之状名無離實之文故無源之水必不䏻揚長流以東漸非時之華必不能稽輝藻於氷霜抱朴子曰鋸牙之獸雖低伏而見憚揮斧之蟲雖跧形而不威君子窮而不可輕小人軒冕逹而不足重抱朴子曰麟逍遥大荒之表故無機穽之禍靈鶬振趐玄圃之峯以違罩羅之患何必曲穴而永懐怵何必銜蘆而慘慘畏容故充乎宰割之用者必愛乎芻豢者也給乎煎熬之膳者必安乎庭立者也抱朴子曰聰者貴於理遺音於千載之外而得興亡之迹明者珍於鑒羣於寒瘁之中而抽匡世之器若夫聆繁㑹之響而顧問於庸工非延州之清聽也枉英逺之才而諮之於常人非獨見之竒識也故與不賞物者而論用凌儕之器是使瞽者指五色也與妬勝己者而謀舉疾惡之賢是放狐議治裘也抱朴子曰鸗駮危苦於嶮峻之端不樂咈守之役吉光饑渇於氷霜之野不願犧牲之飽孤竹不以絶粒易鹿臺之富子㢘不以困匱貿銅山之豐抱朴子曰志合者不以山海為逺道乖者不以咫尺為近故有䟦涉而㳺集亦或宻邇而不接抱朴子曰華衮燦爛非色之功嵩岱之峻非一簣之積故九子任而康凝之績隆四士授而佐命之勲著抱朴子曰翠虬無趐而天飛螣蛇無足而電鶩鱉無耳而善聞蚓無口而揚聲故臯繇喑而與辯者同功晉野瞽而與離朱齊明抱朴子曰官逹者才未必當其位譽羙者實未必副其名故鋸齒不能咀嚼箕舌不能别味壺耳不能理音劍鼻不能識氣釜目不能攄望舒之景牀足不能追奔馬之逝抱朴子曰路人不能挽勁命中而識養由之射顔子不能操轡挾䇿而知東野之敗故有不能下基而經目識黒白不能徽絃而過耳解鄭雅者也抱朴子曰垂䕃萬畝者必出峻極之嶺㴞天襄陵者必發涓滴之源盖世之勲必有絶倫之器定傾之筭必吐冠俗之懐是以蟭螟之巢無乗風之羽溝澮之中無宵朗之琦抱朴子曰衝飈焚輪原火所以增熾也而螢燭值之以反滅甘雨膏澤嘉生所以繁榮也而枯木得之以速朽朱輪華轂俊民之大寳也而負乗之以召禍鼎食萬鍾宣力之𢎞報也而近才受之以覆餗抱朴子曰屠犀為甲給乎專征之服裂翠為華集乎后妃之首雖出幽谷遷于喬木然為二物之計未若棲竄於林薄攝生乎榛藪也故靈龜寧曳尾於塗中而不願巾笥之寳澤雉樂十歩之啄以違雞鶩之禍抱朴子曰偏才不足以經周用長不足以濟衆短是以雞知將旦不能究隂陽之厯數鶴識夜半不能極晷景之道度山鳩知晴雨於將来不能明天文蛇螘知濳水之所居不能逹地理抱朴子曰禁令不明而嚴刑以靜亂廟不精而窮兵以侵鄰猶釤禾以計蝗䖝伐木以殺蠧蝎食毒以中蚤虱徹以逐雀鼠抱朴子曰銳産乎鈍石明火熾乎闇木貴珠出乎賤蚌羙玉出乎醜璞是以不可以父母限重華不可以祖禰量衛霍也抱朴子曰志得則顔怡意失則容戚本朽則末枯源淺則流竭有諸中者必形乎表發乎邇者必著乎逺抱朴子曰妍姿媚貎形色不齊而恱情可均絲竹金石五聲詭韻而快耳不異繳飛鈎沉罾舉罝抑而有獲同功樹勲立言出處殊塗而貴一致抱朴子曰利豐者害原質羙者召灾是以南禽殱於藻羽穴豹死扵文皮鱣鯉積而𤣥淵涸麋鹿聚而繁林焚金玉崇而冦盗至名位髙而憂憒集抱朴子曰啇風霄肅則絺扇廢登危陟峻則輕舟棄干戈雲擾則文儒退喪亂既平則武夫黜抱朴子曰值價萬金者不待見其物而好惡可别矣條枝連抱者不候圍其木而巨細可論矣故望洪濤之㴞天則知其不起乎潢汗之中矣觀翰章之汪濊則知其不出乎章句之徒矣抱朴子曰丹華緑草不抱於曲瘁之株紫芝芳莠不限於斥鹵之壤是以受𤣥珪以告成者生於四罪之門承厯數於文祖者出於頑嚚之家抱朴子曰善言居室則靡逺不應枉直不中則無近不離是以宋野有退舍之熒惑殷朝有外奔之昵屬白環至自少廣之表鹿馬變於蕭墻之裏抱朴子曰荆卿朱亥不示勇於怯弱之門孟賁馮婦不奮戈㦸於俚俠之羣英儒碩生不飭細辯於淺近之徒逹人偉士不變皎察於流俗之中抱朴子曰盤旋揖讓非禦冦之容貫甲纓胄非廟堂之飾垂紳振珮不可以揮刃爭兵規行矩歩不可以救火拯溺抱朴子曰乾坤陶育而庻物不識其惠者由乎其益無方也大人神化而羣細不覺其施者由乎治之於未有也故可知者小也易料者少也抱朴子曰娥英任姒不以蚕織為首稱湯武漢髙不以細行招近譽故澄視於三辰者不遑紆鍳於井谷清於韶濩者豈暇垂耳扵桑間抱朴子曰膚表或不可以論中望貎或不可以核能仲尼似喪家之狗公旦𩔖朴斷之材咎繇面如倛伊尹形若槁骸及龍陽宋朝猶土偶之冠夜光藉儒董鄧猶錦紈之裹塵埃也抱朴子曰勲華不能化下愚故教不行於子弟辛癸不能改上智故惡不染於三仁抱朴子曰至大有所不能變極細有所不能奪故氷霜肅殺不能凋菽麥之茂暑鬱陰隆不能消雪山之凍飈風蕩海不能使潜泉揚波春澤被山不能使枯卉發華抱朴子曰泣血之寳仰磨礲以摛景沉閭孟勞須楚砥以斂騮驊待王孫而致逺令箕俟隱括而成德抱朴子曰棲鸞戢鸑雖饑渇而不願籠委於庖人之室乗黄天鹿雖幽饑而不樂蒭秣於濯龍之廐是以掇蜩之叟忘萬物於芳林垂綸之生忽執珪於南楚抱朴子曰方圓舛状逝止異歸故渾象尊於行徤坤后貴於安貞七政四氣以周流成功五嶽六柱以峙靜作鎭是以宋墨楚申以載馳存國干木胡明以無為折衝抱朴子曰得意扵丘園者身否而神泰役已以恤物者形逸而心勞故抱甕灌園者歡於台宰嘔餐茹者羙乎鼎食仗䇿去幽者形如腒腊夜以待旦者勤憂損命抱朴子曰仁忍有天淵之絶善否猶有無之覺騶虞側足以蹈虗豹狼掩羣以害生虞卿捐相印以濟窮華公讓三事以推賢李斯疾勝己而殺韓非龎㳙患不如而刑孫臏抱朴子曰用得其長則才無或棄偏詰其短則觸物無可故輕羅霧縠冶服之麗也而不可以禦流鏑沉閭巨闕斷斬之良也而不可以挑脚刺抱朴子曰小疵不足以損大器短疢不足以累長才日月挾䖝鳥之食㣲瑕不妨麗天之景黄河合泥滓之濁峻波不害凌山之流樹塞不可以棄夷吾奪田不可以薄蕭何竊妻不可以廢相如受金不可以斥陳平抱朴子曰虎豹不能搏噬於波濤之中騰蛇不能登凌於不霧之日摯雉兎則鸞鳯不及鷹鷂引耕犂則龍鱗還建峙故武夫勇士無用乎晏如之世碩生逸才不貴乎力競之運抱朴子曰兩絆而項領則騏騄與蹇驢同矣失林而居檻則猨狖與貛貉等矣韜而不擊則龍泉與鉛刀均矣才逺而任近則英俊與庸瑣比矣若乃求千里之迹於縶維之駿責匠世之勲於劇碎之賢謂之不惑吾不信也抱朴子曰採荼茹蒿者必無識甘之口棄瓊拾礫者必無甄珍之明薄九成而恱北鄙者吾知其不能格靈祗而儀翔矣英秀而仗常民者吾知其不能叙彛倫而臻升平矣抱朴子曰逹乎通塞之至理者不悁悒於窮否審乎自然之有命者不逸豫於道行故縈抑淵洿則遺愠悶之心振煇宸扆而無得意之色三仕已則其人也抱朴子曰否泰繫乎運窮逹不足以論士得失在乎適偶榮辱不可以量才時命不可以力求遭遇不可以知違故尚父者老婦之棄夫韓信者乞食之餓子蕭公者斗筲之吏黥布者刑黜之亡𨽻當其行龍姿於虺蜥之中卷鳯趐乎斥鷃之羣則彼聾盲謂為詭論抱朴子曰四靈翳逸而為隆平之符幽人嘉遁而為有國之寳何必司晨而銜馬覊紲於憂責哉有用人之用也無用我之用也狥身者不以名汨和修生者不以物累己抱朴子曰量才而授者不求功於器外揆能而受者不負責於力盡故㓕螢燭者不煩滄海扛鼎者不事烏獲運薪輦鹽不宜枉騏驥之脚碎職瑣任安足屈獨行之俊矣
