front:
  text: 抱朴子外篇卷之三十七
  hash: sha256:095b190bcf557c80a7a90eb32e54df4cc41f8de67e10370fc0492c6f09dce66f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_037-001a, image: hfl/0873/0873-012.png}
body:
  text: 仁明抱朴子曰門人共論仁明之先後各據所見乃以諮余余告之曰三光垂象者乾也厚載無窮者坤也乾有明而兼仁坤有仁而無明卑高之數不以邈乎夫唯聖人與天合德故唐堯以欽明冠典仲尼以明義首篇明明在上元首之尊稱也明哲保身大雅之絶蹤也蜎飛蝡動亦能有仁故其意愛弘於長育哀傷著於啁噍上竹交切下子笑切嚼也然赴阬穽而無猜入罻羅而不覺有仁無明故並趨禍而攸失熾潜景以易咀生結棟宇以免巢穴選禾稼以代毒烈制衣裳以改裸飾役舟楫以濟不通服牛馬以息負步序等威以鎮禍亂造器械以戒不虞創書契以治百官制禮律以肅風教皆大明之所爲非偏人之所能辯也夫心不違仁而明不經國危亡之禍無以杜遏亦可知矣夫料盛衰於未兆探機事之無形指倚伏於理外距浸潤於根生者明之功也垂惻隱於昆蟲雖見犯而不校覩觳觫而改牲避行葦而不蹈者仁之事也爾則明者才也仁者行也殺身成仁之行可力爲而至鑒玄測幽之明難妄假精粗之分居然殊矣夫體不忍之仁無臧否之明則心惑僞眞神亂朱紫思筭不分邪正不識不逮安危則一身之不保何暇立以濟物乎昔姬公非無友于之愛而泣涕以滅親石碏非無天性之慈而割私以奉公蓋明見事體不溺近情遂爲純臣以義斷恩舍仁用明以計抑仁仁可時廢而明不可無也湯武逆取順守誠不仁也應天革命以其明也徐愝修仁以朝同班外墜城池之險内無戈甲之備亡國破家不明之禍也門人曰仲尼歎仁爲任重而道遠又云人而不仁如禮何若聖與仁則吾豈敢孟子曰仁宅也義路也人無惻隱之心非仁也三代得天下以仁失天下以不仁此皆聖賢之格言竹素之顯證也而先生貴明未見典據小子蔽闇竊所惑焉抱朴子答曰古人云好仁不好學其蔽也愚子近之矣曩六國相吞豺虎力競高權詐而下道德尚殺伐而廢退讓孟生方欲抑頓貪殘褒隆仁義安得不勤勤諄諄獨稱仁邪然未有片言云仁勝明也譬猶疫癘之時醫巫爲貴異口同辭唯論藥石豈可便謂鍼艾之伎過於長生久視之道乎且吾以爲仁明之事布於方策直欲切理示大較精神舉一隅耳而子猶日用而不知云明事之無據乎乾稱大明終始六位時成是立天以明無不包也坤云至哉萬物資生是地德仁承順而已先後之理不亦炳然詩云明明上天照臨下土明明天子令問不已易曰王明並受其福幽贊神明神而明之此則明之與神合體誠非純仁所能企擬也孔子曰聦明神武不云聦仁又曰昔者明王之治天下不曰仁王春秋傳曰明德唯馨不云仁德書云元首明哉不曰仁哉老子歎上士則曰明白四達其說衰薄則曰失道而後德失德而後仁易曰王者南面向明不云向仁也我欲仁斯仁至矣又曰爲仁由己斯則人人可爲之也至於聦明何可督哉故孟子云凡見赤子將入井莫不趨而救之以此觀之則莫不有仁心但厚薄之間而聦明之分時而有耳昔崔杼不殺晏嬰晏嬰謂杼爲大不仁而有小仁然則姦臣賊子猶能有仁矣門人又曰易稱立人之道曰仁與義然則人莫大於仁也抱朴子答曰所以云爾者以爲仁在於行行可力爲而明入於神必須天授之才非所以訓故也抱朴子外篇卷之三十七
