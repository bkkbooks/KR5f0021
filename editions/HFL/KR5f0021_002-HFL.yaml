front:
  text: 抱朴子外篇卷之二真二
  hash: sha256:12989ba8a3dec67b0e6d6d20cadf8f85268cf1a91f844903dec405711d489b71
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_002-001a, image: hfl/0871/0871-022.png}
body:
  text: 逸民抱朴子曰余昔遊乎雲臺之山而造逸民遇仕人在焉仕人之言曰眀明在上總御八紘華夷同歸要荒服事而先生遊栢成之遐武混群伍於鳥獸然時移俗異世務不拘故木食山棲外物遺累者古之清高今之逋逃也君子思危於未形絶禍於方來無乃去張毅之内熱就單豹之外害畏盈抗慮忘亂群之近憂避牛跡之淺嶮而隨百仞之不測違濡足之泥溼投鑪冶而不覺乎逸民答曰夫銳志於雛鼠者不識騶虞之用心盛務於庭粒者安知鴛鸞之遠指猶焦螟之笑雲鵬朝菌之怪大椿坎蛙之疑海鼈魚蛇之嗤應龍也子誠喜懼於勸沮焉識玄曠之高韻哉吾幸生於堯舜之世何憂不得此人之志乎仕人曰昔狂狷華士義不事上隱於海隅而太公誅之吾子沈遁不亦危乎逸民曰吕尚長於用兵短於爲國不能儀玄黄以覆載擬海嶽以博納褒賢貴德樂育人才而甘於刑殺不修仁義故其劫殺之禍萌於始封周公聞之知其無國也夫攻守異容道貴知變而吕尚無烹鮮之術出致遠之御推戰陳之法害高尚之士可謂賴甲冑以完刃又兼之浮泳以射走之儀又望求之於準的者也夫傾庶鳥之巢則靈鳳不集漉魚鼈之池則神虬遐逝刳凡獸之胎則麒麟不峙其郊害一介之士則英傑不踐其境吕尚創業垂統以示後人而張苛酷之端開殘賊之軏適足以驅俊民以資他國逐賢能以遺讎敵也去彼市馬骨以致駿足軾陋巷以退秦兵者不亦遠乎子謂吕尚何如周公乎仕人曰不能審也逸民曰夫周公大聖以貴下賤吐哺握髮懼於失人從白屋之士七十人布衣之徒親執贄所師見者十人所友者十有一人皆逼以在朝也設令吕尚居周公之地則此等皆成市朝之暴尸而溝澗之腐胔矣唐堯非不能致許由巢父也虞舜非不能脅善卷石户也夏禹非不能逼柏成子高也成湯非不能録卞隨務光也魏文非不能屈干木也𣈆平非不能吏期唐也然復而肆之貴而重之豈六君之劣弱也誠以百行殊尚默默難齊慕尊賢之美稱耻賊善之醜迹取之不足以增威放之未憂於官曠從其志則可以闡弘風化熙隆退讓厲苟進之貪夫感輕薄之冒昧雖器不益於旦夕之用才不周於立朝之後不亦愈於脅肩低眉諂媚權右提贄懷貨宵征同塵爭津競濟市買名品棄德行學問之本赴雷同比周之末也彼六君尚不肯苦言以侵隱士寧肯加之鋒刃乎聖賢誠可師者吕尚居然謬矣漢高帝雖細行多闕不涉典藝然其弘曠恢廓善恕多容不繫近累蓋豁如也雖飢渴四皓而不逼也及太子卑辭致之以爲羽翼便敬德矯情惜其大者發黄鵠之悲歌杜婉妾之顗覦其珍賢貴隱如此之至也宜其以布衣而君四海其度量蓋有過人者矣且夫吕尚之殺狷華者在於恐其沮衆也然俗之所患者病乎躁於進趨不務行業耳不苦於安貧樂賤者之太多也假令隱士往往屬目至於情掛勢利志無止足者終莫能割此常慾而慕彼退靜者也開闢已降非少人也而忘富遺貴之士猶不能居萬分之一仲尼親受業於老子而不能修其無爲子貢與原憲同門而不能模其清苦四凶與巢由同時王莽與二龔共世而不能效也凡民雖復笞督之危辱之使追狷華猶必不肯乃當憂其壞俗邪吕尚思不及此以軍法治平世枉害賢人酷誤已甚矣賴其功大不便以至顛沛耳且吕尚之未遇文王也亦曾隱於窮賤凡人易之老婦逐之賣傭不售屠釣無獲曾無一人慕之其避世也何獨慮狷華之沮衆邪設令殷紂以尚逃遁收而歛之尚臨死豈能自謂罪所應邪魏武帝亦刑法嚴峻果於殺戮乃心欲用乎孔明明自陳不樂出身武帝謝遣之曰義不使高世之士辱於汙君之朝也其鞭撻九有草創皇基亦不妄矣紛擾日久求競成俗或推貨賄以龍躍或階黨援以鳳起風成化習大道漸蕪後生昧然儒訓遂堙將爲立身非財莫可苟有卓然不群之士不出户庭潜志味道誠宜優訪以興謙退也夫使孫吴荷戈一人之力耳用其計術則賢於萬夫今令大儒爲吏不必切事肆之山林則能陶冶童蒙闡弘禮敬何必服巨象使捕鼠韝鸞也則鍾鼎鎸其聲若乃零淪藪澤空生徒死亦安足貴乎逸民答曰子可謂守培塿玩狐丘未登閬風而臨雲霓翫瀅汀游潢洿未浮南溟而涉天漢凡所謂志人者不必在乎禄位不必須乎勛伐也太上無己其次無名能振翼以絶群騁迹以絶軌爲常人所不能爲割近才所不能割少多不爲凡俗所量恬粹不爲名位所染淳風足以濯百代之穢高操足以激將來之濁何必紆朱曳紫服冕乘軺被犠牛之文繡吞詹何之香餌朝爲張天之炎熱夕成冰冷之委灰夫斥鷃不以蓬榛易雲霄之表王鮪不以幽岫𧵍滄海之曠虎豹入廣厦而懷悲鴻鶤登嵩巒而含慼物各有心安其所長莫不泰於得意而慘於失所也經世之士悠悠皆是一日無君惶惶如也譬猶藍田之積玉鄧林之多材良工大匠肆意所用亦何必棲魚而沈鳥哉嘉遁高蹈先聖所許或出或處各從攸好蓋士之所貴立德立言若夫孝友仁義操業清高可謂立德矣窮覽墳索著述粲然可謂立言矣夫善卷無治民之功未可謂之減於俗吏仲尼無攻伐之勛不可以爲不及於韓白矣身名並全謂之爲上隱居求志先民嘉焉夷齊一介不合變通古人嗟嘆謂不降辱夫言不降者明隱逸之爲高也夫不辱者知羈縶之爲洿也聖人之清者孟軻所美亦云天爵貴於印綬志修遺榮孫卿所尚道義既備可輕王公而世人所畏唯勢所重唯利盛德身滯便謂庸人器小任大便謂高士或有乘危冒嶮投死忘生棄遺體於萬仞之下邀榮華乎一朝之間比夫輕四海愛脛毛之士何其緬然邪仕人曰潜退之士得意山澤不荷世貴蕩然縱肆不爲時用嗅禄利誠爲天下無益之物何如逸民答曰夫麟不吠守鳳不司晨騰黄不引犂尸祝不治庖也且夫揚大明乎無外宣嫗煦之和氣者日也耀華燈於閑夜冶金石以致用者火也天下不可以經時無日不可以一旦無火然其大小不可同也江海之外彌綸二儀升爲雲雨降成百川而朝夕之用不及累刃之井灌田溉園未若溝渠之沃校其巨細孰爲曠哉桀紂帝王也仲尼陪臣也今見比於桀紂則莫不怒焉見擬於仲尼則莫不悅焉爾則貴賤果不在位也故孟子云禹稷顔淵易地皆然矣宰予亦謂孔子賢於堯舜遠矣夫匹庶而鈞稱於王者儒生高極乎唐虞者德而已矣何必官哉且夫交靈升於造化運天地於懷抱恢恢然故不棲於心術芒芒然寵辱不汩其純白流俗之所欲不能染其神近人之所惑不能移其志榮華猶贅疣也萬物猶蜩翼也若然者豈肯詰屈其支體俯仰其容儀挹酌於其所不喜脩索於其所棄遺怡顔以取進曲躬以避退恐俗人之不悅慼我身之凌遲屈龍淵爲錐鑽之用抑靈𪔌爲𪔛鼙之音推黄鉞以適釤鎌之持撓華旗以入林𣏌之下乎古公杖策而捐之越翳入穴以逃之季扎退耕以委之老萊灌園以遠之從其所好莫與易也故醇而不雜斯則富矣身不受役斯則貴矣若夫剖符有土所謂禄利耳非富貴也且夫官高者其責重功大者人忌之獨有貧賤莫與我爭可得長寳而無憂焉濯裘布被拔葵去織㹠不掩豆菜肴糲飡又獲逼下邀僞之譏樹塞反坫三歸玉食禳侯之富安昌之泰則有僣上洿濁之累未若遊神典文吐故納新求飽乎耒耜之端索緼乎杼軸之間腹仰河而已滿身集一枝而餘安萬物芸芸化爲埃塵矣饘粥餬口布褐緼袍淡泊肆志不憂不喜斯爲尊樂喻之無物也夫仕也者欲以爲名邪則脩毫可以洩憤懣篇章可以寄姓字何假乎良史何煩乎鑱鼎哉孟子不以矢石爲功揚雲不以治民益世求仁而得不亦可乎仕人又曰隱遁之士則爲不臣亦豈宜居君之地食君之穀乎逸民曰何謂其然乎昔顔回死魯定公將躬弔焉使人訪仲尼仲尼曰凡在邦内皆臣也定公乃升自東階行君禮焉由此論之率土之濱莫匪王臣可知也在朝者陳力以秉庶事山林者脩德以厲貪濁殊塗同歸俱人臣也王者無外天下爲家日月所照雨露所及皆其境也安得懸虚空餐咀流霞而使之不居乎地不食乎穀哉夫山之金玉水之珠貝雖不在府庫之中不給朝夕之用然皆君之財也退士不居肉食之列亦猶山水之物也豈非國有乎許由不竄於四海之外四皓不走於八荒之表也故曰萬邦黎獻共惟帝臣干木不荷戈戍境築壘疆場而有蕃魏之功今隱者潔行蓬蓽之内以詠先王之道使民知退讓儒墨不替此亦堯舜之所許也昔夷齊不食周粟鮑焦死於橋上彼之硜硜何足師表哉昔安帝以玄纁玉帛聘周彦祖桓帝以玄纁玉帛聘韋休明順帝以玄纁玉帛聘楊仲宣就拜侍中不到魏文帝徵管幼安不至又就拜光禄勛竟不到乃詔所在常以八月致羊一口酒二斛桓帝玄纁玉帛聘徐孺子就拜太原太守及東海相不到順帝以玄纁玉帛聘樊季高不到乃詔所在常以八月致羊一口酒二斛又賜几杖待以師傅之禮獻帝時鄭康成州辟舉賢良方正茂才公府十四辟皆不就公車徵左中郎博士趙相侍中大司農皆不起昭帝公車徵韓福到賜帛五十疋及羊酒法高卿再舉孝廉本州五辟公府八辟九舉賢良博士三徵皆不就桓帝以玄纁玉帛安車軺輪聘韓伯休不到以玄纁玉帛安車軺輪聘姜伯雅就拜太中大夫犍爲太守不起然皆見優重不加威辟也若此諸帝褒隱逸之士不謬者則吕尚之誅華士爲凶酷過惡斷可知矣仕人乃悵然自失慨爾冰歎曰始悟超俗之理非庸瑣所見矣抱朴子外篇卷之二
