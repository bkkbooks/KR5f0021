front:
  text: 抱朴子外篇卷之六
  hash: sha256:29261ebdfefbde725279212c6fcc41ae67cc65446e6c957ca5a9286f71eac9a0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_006-001a, image: hfl/0871/0871-082.png}
body:
  text: 臣節抱朴子曰昔在唐虞稽古欽明猶俟群后之翼亮用臻巍巍之成功故能熙帝之載庶績其凝四門穆穆百揆時序蠻夷無猾夏之變阿閣有鳴鳳之巢也喻之元首方之股肱雖有尊卑之殊邈實若一體之相賴也君必度能而授者備乎覆餗之敗臣必量才而受者故無流放之禍夫如影如響俯伏惟命者偷容之尸素也違令犯顔蹇蹇匪躬安上之民翰也先意承指者佞諂之徒也匡過弼違者社稷之骾也必將伏斧鑕而正諫據鼎鑊而盡言忠而見疑諍而不得者待放可也必死無補將增主過者去之可也其動也匪訓典弗據焉其靜也匪憲章弗循焉請託無所容申繩不顧私明刑而不濫乎所恨審賞而不加乎附己不專命以招權不含洿而談潔進思盡言以攻謬退念推賢而不蔽夙興夜寐慼庶事之不康也儉躬約志若策奔於薄冰也納謀貢士不宣之於口非義之利不棲之乎心立朝則以砥矢爲操居己則以羔羊爲節當危值難則忘家而不顧命擥衡執銓則平懷而無彼此儀蕭公之宇宙羡張陳之畫竒追周全之盡規準二鮑之直視蹈嬰弘之節儉執恬毅之守終甘此離紀炙身之分成彼韓英失忠之禍出不辭勞入不數功歸勳引過讓以先下專誠祗慄恒若天威之在顔也宵夙處竦有如湯鑊之在側也負荷寄託則以伊周爲師表宣力四方則以吉召爲軌儀送往事君則竭忠貞而不迴搏噬千紀則若鷹鸇之鷙鳥雀蕃扞壃場則慕魏絳李牧之高蹤蒞衆撫民則希文翁信臣之德化夫忠至者無以爲國况懷智以迷上乎義督者滅祀而無憚况黜辱之敢辭乎故能保勞貴以顯親託良哉於輿歌昆吾彝器能者鎸勳臯陶后稷亦何人哉抱朴子曰人臣勳不弘則恥俸禄之虛厚也績不茂則羞爵命之妄高也履信思順天人攸贊畏盈居謙乃終有慶舉足則蹈道度抗手則奉繩墨褒崇雖淹留而悔辱亦必遠矣若夫損上以附下廢公以營私阿媚曲從以水濟水君舉雖謬而諂笑贊善數進玩好陷主於惡巧言毁政令色取悅上蔽人主之明下杜進賢之路外結出境之交内樹背公之黨雖才足飾非言足文過專威若趙高擅朝如董卓未有不身膏剡鋒家靡湯火者也然而愚瞽舍正即邪違眞侣僞親覽傾僨不改其軌無禍之集匪降自天也抱朴子曰臣喻股肱則手足也履冰執熱不得辭焉是以古人方之於地掘之則出水泉樹之則秀百穀生者立焉死者入焉功多而不望賞勞瘁而不敢怨審識斯術保己之要也抱朴子曰臣職分則治統廣則多滯非賁獲之壯不可以舉兼人之重非萬夫之特不可緫異官之局韓侯所以罪侵冒之典子元所以懼不勝之禍也若乃才力絶倫文武兼允入有腹心之高筭出有折衝之遠略雖事殷而益舉兩循而俱濟舍之則彝倫斁委之而無其人者兼之可也非此器也宜自忖引轅若載重鮮不及矣常人貪榮不慮後患身既傾溺而禍逮君親不亦哀哉人皆辭斧斤所未開而莫讓攝官可不堪嗟乎陳李所以作戒於力少而子房所以高蹈於挹盈也抱朴子外篇卷之六
