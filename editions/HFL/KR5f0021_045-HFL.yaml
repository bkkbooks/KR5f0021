front:
  text: 抱朴子外篇卷之四十四
  hash: sha256:ed0dc3de94eab89770de7d86dc990485ec63fe1642cecdbee72a2fe164b075fd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_045-001a, image: hfl/0873/0873-112.png}
body:
  text: 百家抱朴子曰百家之言雖不皆清翰銳藻弘麗汪濊然悉才士所寄心一夫澄思也正經爲道義之淵海子書爲增深之川流仰而比之則景星之佐三辰俯而方之則林薄之禆嵩嶽而學者專守一業游井忽海遂䟾躓於泥濘之中而沈滯乎不移之困子書彼引玄曠眇邈泓窈緫不測之源揚無遺之流變化不繫於規矩之方圓旁通不淪於違正之邪徑風格高嚴重仞難盡是偏嗜酸甜者莫能賞其味也用思有限者不得辯其神也先民歎息於才難故百世爲隨踵不以璞不生板桐之嶺而捐曜夜之寳不以書不出周孔之門而廢助教之言猶彼操水者器雖異而救火同焉譬若鍼灸者術雖殊而攻疾均焉狹見之徒區區執一去博辭精思而不識合錙銖可以齊重於山陵聚百千可以致數於億兆惑詩賦瑣碎之文而忽子論深美之言眞僞顛倒玉石混殽同廣樂於桑間均龍章於素質可悲可慨豈一條哉抱朴子外篇卷之四十四
  hash: sha256:d1235435b96da4701740242d1b61cc1d31661879b251e6293bdd0b1fdfd709ac
