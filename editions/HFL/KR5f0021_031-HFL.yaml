front:
  text: 抱朴子外篇卷之三十一
  hash: sha256:8c15b39f8a8f3ea458f0e88b353e996ae1237d253dc6a76d7b99e6c46d1efb7f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_031-001a, image: hfl/0872/0872-122.png}
body:
  text: 省煩抱朴子曰安上治民莫善於禮彌綸人理誠爲曲備然冠婚飲射何煩碎之甚邪人倫雖以有禮爲貴但當令足以叙等威而表情敬何在乎升降揖讓之繁重拜起俯伏之無已邪往者天下乂安四方無事好古官長時或修之至乃講試累月督以楚撻晝夜修習廢寢與食經時學之一日試之執卷從事案文舉勛黜謫之罰又在其間猶有過誤不得其意而欲以爲以此爲生民之常事至難行也此墨子所謂累世不能盡其學當年不能究其事者也古人詢于芻蕘博採童謡狂夫之言猶在擇焉至於墨子之論不能非也但其張刑網開塗徑浹人事備王道不能曲述耳至於譏葬厚刺禮煩未可棄也自建安之後魏之武文送終之制務在儉薄此則墨子之道有可行矣余以爲喪亂既平朝野無爲王者所制自君作古可命精學洽聞之士才任損益免於拘愚者使删定三禮割棄不要次其源流總合其事類集以相從其煩重遊說辭異而義同者存之不可常行除之無所傷損卒可斷約而舉之勿令沈隱復有凝滯其吉凶器用之物俎豆觚觶之屬衣冠車服之制旗章采色之美宫室尊卑之品朝饗賔主之儀祭奠殯葬之變郊祀禘祫之法社稷山川之禮皆可滅省務令約儉夫約則易從儉則用少易從則不煩用少則費薄不煩則涖事者無過矣費薄則調求者不苛矣拜伏揖讓之節升降盤旋之容使足叙事無令小碎條牒各别令易案用今五禮混撓雜飾紛錯枝分葉散重出互見更相貫涉舊儒尋案猶多所滯駮難漸廣異同無已殊理兼說歲增月長自非至精莫不惑悶躊躇歧路之衢愁勞群疑之藪煎神瀝思考校叛例嘗有窮年竟不豁了治之勤苦决嫌無地呻吟尋析憔悴决角修之華首不立妨費日月廢棄他業愁困後生眞未央矣長致章句多於本書今若破合雜俗次比種稷删削不急抗其綱較其令炳若日月之著明灼若五色之有定息學者萬倍之役弭諸儒爭訟之煩將來達者觀之當美於今之視周矣此亦改燒石去血食之比無所憚難而恨恨於惜懷推車遲於去巢居也然守常之徒而卒聞此義必將愕然創見謂之狂生矣夫三王不相㳂樂五帝不相襲禮而其移風易俗安上治民一也或革或因損益懷善何必當乘船以登山策馬以涉川被甲以升廟堂重裘以當隆暑乎若謂古事終不可變則棺椁不當代薪埋衣裳不宜改裸袒矣抱朴子外篇卷之三十一
