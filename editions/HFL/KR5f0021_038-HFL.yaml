  text: 抱朴子外篇卷之三十八志一
  hash: sha256:9a1ca01e1f4ca2beabc07c016bd809d5423e818e77dc941efa79eacde794345f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_038-001a, image: hfl/0873/0873-020.png}
body:
  text: 博喻抱朴子曰盈乎萬鈞必起于錙銖竦秀凌霄必始於分毫是以行潦集而南溟就無涯之曠尋常積而玄圃致極天之高抱朴子曰騁逸策迅者雖遺景而不勞因風凌波者雖濟危而不傾是以元凱分職而則天之勲就伊吕既任而革命之功成抱朴子曰瓊艘瑶楫無涉川之用金弧玉弦無激矢之能是以介潔而無政事者非撥亂之器儒雅而乏治略者非翼亮之才抱朴子曰閬風玄圃不借高於丘垤懸黎結緑不假觀於瓊珉是以英偉不羣而幽蕙之芬駭峻概獨立而衆禽之響振抱朴子曰冰炭不衒能於冷熱瑾瑜不證珍而體著是以君子恭己不恤乎莫與至人尸居心遺乎毁譽抱朴子曰衝飊傾山而不能效力於拔毫火鑠金石而不能耀烈以起溼是以淮隂善戰守而拙理治之策絳侯安社稷而乏承對之給抱朴子曰徇名者不以授命爲難重身者不以近欲累情是以紀信甘灰糜而不恨楊朱同一毛於連城抱朴子曰小鮮不解靈虬之遠規鳧鷖不知鴻鵠之非匹是以耦耕者笑陳勝之投耒淺識者嗤孔明之抱膝抱朴子曰淳鈞之鋒驗於犀兕宣慈之良効於明試是以同否則元凱與斗筲無殊並任則騄騏與駑駘不異抱朴子曰器非瑚簋必進銳而退速量擬伊吕雖發晩而到早是以鷦鷯倦翮猶不越乎蓬杪鴛雛徐起顧眄而戾蒼昊抱朴子曰否終則承之以泰晦極則清輝晨耀是以垂耳吴阪者騁千里之逸軌縈鱗九淵者凌虹霓以高蹈抱朴子曰九斷四屬者藴藻所以表靈摧柯碎葉者茝惠所以增芬是以夷吾桎檻而建匡合之績應侯困辱而箸入秦之勛抱朴子曰所競者細則利同而讎結善否殊塗則事異而結生是以嫫毋宿瘤惡見西施之艷容商臣小白憎聞延州之退耕抱朴子曰精鈍舛迹則凌遲者愧恨壯弱異科則扛鼎者見忌是以淮隂顯擢而庸隸悒懊以疾其超武安功高而范睢飾談以破其事抱朴子曰必死之病不下苦口之藥朽爛之材不受琱鏤之飾是以比干匪躬而剖心於情忠田豐見微而夷戮於言直抱朴子曰嶧陽孤桐不能無絃而激哀響大夏孤竹不能莫吹而吐清聲是以官卑者稷卨不能康庶績權薄者伊周不能臻升平抱朴子曰登峻者戒在於窮高濟深者禍生於舟重是以西秦有思上蔡之李斯東越有悔盈抗之文種抱朴子曰剛柔有不易之質貞橈有天然之性是以百鍊而南金不虧其眞危困而烈士不失其正抱朴子曰不以其道則富貴不足居違仁捨義雖期頤不足吝是以卞隨負石以投淵仲由甘心以赴刃抱朴子曰卑高不可以一概齊餐廪不可以勸沮化是以惠施患從車之苦少莊周憂得魚之方多抱朴子曰出處有冰炭之殊躁靜有飛沉之異是以墨翟以重繭怡顔箕叟以遺世得意抱朴子曰適心者交淺而愛深忤神者接久而彌乖是以聲同則傾蓋而居昵道異則白首而無愛抱朴子曰艅艎鷁首涉川之良器也櫂之以北狄則沈漂於波流焉蒲梢汗血迅趨之駿足也御非造父則傾僨於嶮塗焉青萍豪曹剡鋒之精絶也操者非羽越則有自傷之患焉勁兵銳卒撥亂之神物也用者非明哲則速自焚之禍焉抱朴子曰天秩有不遷之常尊無禮猶犯遄死之重刺是以玄洲之禽獸雖能言而不得厠貴牲蛩蛩之負蹷雖寄命不得爲仁義抱朴子曰謗讟不可以巧言弭實恨不可以虛事釋釋之非其道弭之不由理猶懷冰之遣冷重鑪以却暑逐光以逃影穿舟以止漏矣抱朴子曰明主官人不令出其器忠臣居位不敢過其量非其才而妄授非所堪而虛任猶冰椀之盛沸湯葭莩之包烈火綴萬鈞於腐索加倍載於扁舟抱朴子曰豹狐之裘不爲負薪施九成六變不爲聾夫設高唱遠謀不爲庸愚吐忘身致果不爲薄德作抱朴子曰民財匱矣而求不已下力竭矣而役不休欲怨難而不生規其寧之惟永猶斷根以續枝割背以禆腹刻目以廣明剜耳以開聦也抱朴子曰法無一定而慕權宜之隨時功不倍前而好屢變以偶俗猶剸高馬以適卑車削附踝以就褊履斷長劍以赴短鞸割尺璧以納促匣也抱朴子曰止波之脩鱗不出窮谷之隘鸞棲之峻木不秀培塿之卑九疇之格言不吐庸猥之口金版之高筭不出恒民之懷覩百抱之枝則足以知其本之不細覩汪濊之文則足以覺其人之淵邃抱朴子曰桑林鬱藹無補柏木之淒冽膏壤帶郭無解黔敖之蒙袂然繭纏綈紈此之自出千食萬箱於是乎生故識遠者貴本見近者務末抱朴子曰體粗者繫形知精者得神原始見終者有可推之緒得之未眹者無假物之因是以書見天地未足稱眀夜察分毫乃爲絶倫抱朴子曰芳藻春耀不能離柯以久鮮吞舟之魚不能舍水而攝生是以名美而實不副者必無没世之風位高而器不稱者不免致寇之敗抱朴子曰忍痛苦之藥石者所以除伐命之疾嬰甲冑之重冷者所以扞鋒鏑之集潔操履之拘苦者所以全拔萃之業納拂心之至言者所以悟易方之惑也抱朴子曰鸞鳳競粒於庭場則受褻於雞鶩龍麟雜厠於芻豢則見黷於六牲是以商老棲峻以播邈世之操卞隨赴深以全遺物之聲抱朴子曰浚井不渫則混濘滋積嘉穀不芸則荑莠彌蔓學而不思則疑閡實繁講肆不精則長惑喪功抱朴子曰積萬金於篋匱雖儉之而不用則未知其有異於貧窶懷逸藻於胷心不寄意於翰素則未知其有别於庸猥抱朴子曰南威青琴姣冶之極而必俟盛飾以增麗回賜游夏雖天才隻朗而實須墳誥以廣智抱朴子曰丹幃接網組帳重蔭則醜姿翳矣朱漆致飾錯塗炫耀則枯木隱矣是以六藝備則卑鄙化爲君子衆譽集則孤陋邈乎貴遊抱朴子曰繁林翳薈則羽族雲萃玄淵浩汗則鱗羣競赴德盛業廣則宅心者衆舍瑕録用即遠懷近集抱朴子曰尋飛絶景之足而不能騁逸放於吕梁凌波泳淵之屬而不能陟峻而攀危故離朱剖毫於百步而不能辯八音之雅俗子野合通靈之絶響而不能指白黑於咫尺抱朴子曰四聦廣闢則羲和納景萬刃虚己則行潦交赴故博采之道弘則異聞畢集庭燎之輝舉則竒士扣角誹謗之木設則有過必知敢諫之鼓懸則直言必獻抱朴子曰能言莫不褒堯而堯政不必皆得也舉世莫不貶桀而桀事不必盡失也故一條之枯不損繁林之蓊藹蒿麥冬生無解畢發之肅殺西施有所惡而不能減其美者美多也嫫毋有所善而不能救其醜者醜篤也抱朴子曰身與名難兩濟功與神尟並全支離其德者苦而必安用以適世者樂而多危故鷙禽以奮擊拘縶言鳥以智慧見籠瓊瑶以符采剖判三金以琦玩冶鑠蘭茝以芬馨剪刈文梓以含音受伐是以翠虬覩化益而登玄雲靈鳳值孟戲而反丹穴子永歎天倫之偉漆園悲被繡之犧抱朴子曰萬麋傾角猛虎爲之含牙千禽鱗萃鷙鳥爲之握爪是以四國流言公旦不能遏謗者盈路子産而無以塞抱朴子曰威施之艷粉黛無以加二至之氣吹呼不能增是以懷英逸之量者不矜風格以示異體邈俗之器者不恤小譽以徇通抱朴子曰麟止鳳儀所患在少狐鳴梟呼世忌其多是以俊乂盈朝而求賢者未倦讒佞作威而忠貞者切齒抱朴子曰多力何必孟貴烏獲逸容豈唯鄭旦毛嬙飆迅非徒驊騮驌騻立斷未獨沉閭干將是以能立素王之業者不必東魯之丘能治掩枯之仁者不必西鄰之昌抱朴子曰靈鳳振響於朝陽未有惠物之益而莫不澄聽於下風焉鴟梟宵集於垣宇未有分氂之損而莫不掩耳而注鏑焉故善言之往無遠不悅惡辭之來靡近不忤猶日月無謝於貞明枉矢見忘於暫出抱朴子曰影無違形之狀名無離實之文故背源之水必不能揚長流以東漸非時之華必不能稽輝藻於冰霜抱朴子曰鋸牙之獸雖低伏而見憚揮斧之蟲雖跧形而不威故君子被褐窮而不可輕小人軒冕達而不足重抱朴子曰逸麟逍遥大荒之表故無機穽之禍靈鶬振翅玄圃之峰以違罩羅之患何必曲穴而永懷怵惕何必銜蘆而慘慘畏容故充乎宰割之用者必愛乎芻豢者也給乎煎熬之膳者必安乎庭立者也抱朴子曰聦者貴於理遺音於千載之外而得興亡之迹明者珍於鑒逸羣於寒瘁之中而抽匡世之器若夫聆繁會之響而顧問於庸工非延州之清聽也枉英遠之才而諮之於常人非獨見之竒識也故與不賞物者而論用凌儕之器是使瞽者指五色也與妬勝己者而謀舉疾惡之賢是與狐議治裘也抱朴子曰鸗駮危苦於嶮峻之端不樂咈守之役吉光飢渴於冰霜之野不願犧牲之飽孤竹不以絶粒易鹿臺之富子廉不以困匱貿銅山之豐抱朴子曰志合者不以山海爲遠道乖者不以咫尺爲近故有跋涉而游集亦或密邇而不接抱朴子曰華衮粲爛非隻色之功嵩岱之峻非一簣之積故九子任而康凝之績熙四七授而佐命之勳著抱朴子曰翠虬無翅而天飛螣蛇無足而電騖鼈無耳而善聞蚓無口而揚聲故臯繇喑而與辯者同功晋野瞽而與離朱齊明抱朴子曰官達者才未必當其位譽美者實未必副其名故鋸齒不能咀嚼箕舌不能别味壺耳不能理音屩鼻不能識氣釜目不能攄望舒之景牀足不能有尋常之逝抱朴子曰路人不能挽勁命中而識養由之射顔子不能控轡振策而知東野之敗故有不能下棋而經目識勝負不能徽絃而過耳解鄭雅者抱朴子曰垂蔭萬畝者必出峻極之嶺滔天襄陵者必發板桐之源邈世之勛必由絶倫之器定傾之筭必吐冠俗之懷是以蟭螟之巢無乘風之羽溝澮之中無宵朗之琦抱朴子曰衝飆焚輪原火所以增熾也螢燭值之而反滅甘雨膏澤嘉生所以繁榮也而枯木得之以速朽朱輪華轂俊民之大寳也而負乘竊之而召禍鼎食萬鍾宣力之弘報也而近才受之以覆餗抱朴子曰屠犀爲甲給乎專征之服裂翠爲華集乎后妃之首雖出幽谷遷于喬木然爲二物之計未若棲竄於林薄攝生乎榛藪也故靈龜寧曳尾於塗中而不願巾笥之寳澤雉樂十步之啄以違雞鶩之禍抱朴子曰偏才不足以經周用隻長不足以濟衆短是以雞知將旦不能究隂陽之曆數鵠識夜半不能極晷景之道度山鳩知晴雨於將來不能明天文蛇螘知潜泉之所居不能達地理抱朴子曰禁令不明而嚴刑以靜亂廟算不精而窮兵以侵鄰猶釤禾以討蝗蟲伐木以殺蠹蝎食毒以中蚤虱徹舍以逐雀鼠抱朴子曰銳鋒産乎鈍石明火熾乎闇木貴珠出乎賤蚌美玉出乎醜璞是以不可以父毋限重華不可以祖禰量衛霍也抱朴子曰志得則顔怡意失則容戚木朽則末枯源淺則流促有諸中者必形乎表發乎邇者必著乎遠抱朴子曰妍姿媚貌形色不齊而悅情可均絲竹金石五聲詭韻而快耳不異繳飛鉤沉罾舉罝抑而有獲同功樹勳立言出處殊塗而所貴一致抱朴子曰利豐者害後質美者召災是以南禽殲於藻羽穴豹死於文皮鱣鯉積而玄淵涸麋鹿聚而繁林焚金玉崇而寇盜至名位高而憂責集抱朴子曰商風宵肅則絺扇廢登危陟峻則輕舟棄干戈雲擾則文儒退喪亂既平則武夫黜抱朴子曰價直萬金者不待見其物而好惡可别矣條枝連抱者不俟圍其木而巨細可論矣故望洪濤之滔天則知其不起乎潢汙之中矣觀翰章之汪濊則知其不出乎章句之徒矣抱朴子曰丹華緑草不拘於曲瘁之株紫芝芳秀不限於斥鹵之壤是以受玄珪以告成者生於四罪之門承歷數於文祖者出於頑嚚之家抱朴子曰善言居室則靡遠不應枉直不中則無近不離是以宋野有退舍之熒惑殷朝有外奔之昵屬四環至自少廣之表鹿馬變於蕭墻之裏抱朴子曰荆卿朱亥不示勇於怯弱之間孟賁馮婦不奮戈戟於俚俠之羣英儒碩生不飭細辯於淺近之徒達人偉士不變皎察於流俗之中抱朴子曰盤旋揖讓非禦寇之容損甲纓冑非廟堂之飾垂紳振佩不可以揮刃爭鋒規行矩步不可以救火拯溺抱朴子曰乾坤陶育而庶物不識其惠者由乎其益無方也大人神化而群細不覺其施者由乎治之於未有也故可知者小也易料者少也抱朴子曰娥英任姒不以蠶織爲首稱湯武漢高不以細行招近譽故澄視於三辰者不遑紆鑒於井谷清聽於韶濩者豈暇垂耳於桑間抱朴子曰膚表或不可以論中望貌或不可以核能仲尼以喪家之狗公旦類朴斲之材咎繇面如蒙箕伊尹形若槁骸及龍陽宋朝猶土偶之冠夜光藉孺董鄧猶錦紈之裹塵埃也抱朴子曰勛華不能化下愚故教不行於子弟辛癸不能改上智故惡不染於三仁抱朴子曰至大有所不能變極細有所不能奪故冰霜肅殺不能凋菽麥之茂熾暑鬱隆不能消雪山之凍飆風蕩海不能使潜泉揚波春澤榮物不能使枯卉發華抱朴子曰泣血之寳仰礛䃴以摛景沉閭孟勞須楚砥以歛鋒騮馹待王孫而致遠令質俟隱括而成德抱朴子曰棲鸞戢鸑雖飢渴而不願籠委於庖人之室乘黄天鹿雖幽飢而不樂芻秣於濯龍之廐是以掇蜩之叟忘萬物於芳林垂綸之生忽執珪於南楚抱朴子曰方圓舛狀逝止異歸故渾象尊於行健坤后貴於安貞七政四氣以周流成功五嶽六柱以峙靜作鎮是以宋墨楚申以載馳存國干木胡明以無爲折衝抱朴子曰得意於丘園者身否而神泰役己以恤物者形逸而心勞故抱甕灌園者歡於臺宰嘔餐茹薇者美乎鼎食仗策去幽者形如腒腊夜以待旦者勤憂損命抱朴子曰仁忍有天淵之絶善否猶有無之覺騶虞側足以蹈虚豺狼掩羣以害生虞卿捐相印以濟窮華公讓三事以推賢李斯疾勝己而殺韓非龐涓患不如而刑孫臏抱朴子曰用得其長則才無或棄偏詰其短則觸物無可故輕羅霧穀冶服之麗也而不可以禦流鏑沉閭巨闕斷斬之良也而不可以挑脚刺抱朴子曰小疵不足以損大器短疢不足以累長才日月挾蟲鳥之瑕不妨麗天之景黄河合泥滓之濁不害凌山之流奢僣不可以棄夷吾奪田不可以薄蕭何竊妻不可以廢相如受金不可以斥陳平抱朴子曰虎豹不能搏噬於波濤之中螣蛇不能登凌於不霧之日摯雉兔則鸞鳳不及鷹鷂引耕犂則龍麟不逮雙峙故武夫勇士無用乎晏如之世碩生逸才不貴乎力競之運抱朴子曰兩絆而項領則騏騄與蹇驢同矣失林而居檻則猨狖與貛貉等矣韜鋒而不擊則龍泉與鉛刀均矣才遠而任近則英俊與庸瑣比矣若乃求千里之迹於縶維之駿責匠世之勳於處碎之賢謂之不惑吾不信也抱朴子曰捐荼茹蒿者必無識甘之口棄瓊拾礫者必無甄珍之明薄九成而悅北鄙者吾知其不能格靈衹而儀翔鳳矣舍英秀而杖常民者吾知其不能叙彝倫而臻升平矣抱朴子曰達乎通塞之至理者不悁悒於窮否審乎自然之有命者不逸豫於道行故縈抑淵洿則遺愠悶之心振耀宸扆而無得意之色三仕三已則其人也抱朴子曰否泰繫乎運窮達不足論士得失在乎適偶榮辱不可以才量時命不可以力求遭遇不可以智違故尚父者老婦之棄夫韓信者乞食之餓子蕭公者斗筲之吏黥布者刑黜之亡隸當其行龍姿於虺蜥之中卷鳳翅乎斥鷃之羣則彼龍后謂爲其倫抱朴子曰四靈翳逸而爲隆平之符幽人嘉遁而爲有國之寳何必司晨而銜鑣羈紲於憂責哉有用人之用也無用我之用也徇身者不以名汨和修生者不以物累己抱朴子曰量才而授者不求功於器外揆能而受者不負責於力盡故滅熒燭者不煩滄海扛斤兩者不事烏獲運薪輦鹽不宜枉騏驥之脚碎職瑣任安足屈獨行之俊矣抱朴子曰甽澮之流不能運大白之艘升合之器不能容千鍾之物熠燿不能並表微之景常才不能别逸倫之器蓋造化所假聦明有本根也抱朴子曰郢人美下里之淫鼃而薄六莖之和音庸夫好悅耳之華譽而惡利行之良規故宋玉舍其延靈之精聲智士招其獨見之遠謀抱朴子曰瓊珉山積不能無挾瑕之器鄧林千里不能無偏枯之木論珍則不可以細疵棄巨美語大則不可以少累廢其多故叛主者良平也而吐六竒以安上羣盜者彭越也而建弘勳於佐命抱朴子曰五嶽巍峨不以藏疾傷其極天之高滄海滉瀁不以舍垢累其無涯之廣故九德尚寬以得衆宣尼汎愛而與進抱朴子外篇卷之三十八
