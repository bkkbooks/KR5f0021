front:
  text: 抱朴子外篇卷之四十二
  hash: sha256:1a83c299cb44a74d27698a7129012a8f6222aa55c44b1cf5ea4814881892e4cc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_043-001a, image: hfl/0873/0873-100.png}
body:
  text: 應嘲抱朴子曰客嘲余云先生載營抱一韜景靈淵背俗獨往邈爾蕭然計决而猶與不棲於心術分定而世累無餘於胷間伯陽以道德爲首莊周以逍遥冠篇用能摽峻格於九霄宣芳烈於罔極也今先生高尚勿用身不服事而著君道臣節之書不交於世而作譏俗救生之論甚愛骭毛而綴用兵戰守之法不營進趨而有審舉窮達之篇蒙竊惑焉抱朴子曰君臣之大次於天地思樂有道出處一情隱顯任時言亦何繫大人君子與事變通老子無爲者也鬼谷終隱者也而著其書咸論世務何必身居其位然後乃言其事乎夫器非瓊瑶楚和不泣質非潜虬風雲不集余才短德薄幹不適治出處同歸行止一致豈必達官乃可議政事居否則不可論治亂乎常恨莊生言行自伐桎梏世業身居漆園而多誕談好畫鬼魅憎圖狗馬狹細忠貞貶毁仁義可謂彫虎書龍難以徵風雲空板億萬不能救无錢孺子之竹馬不免於脚剥土柈之盈案无益於腹虚也或人又曰然吾子所著彈斷風俗言苦辭直吾恐適足取憎在位招擯於時非所以揚聲發譽見貴之道也抱朴子曰夫制器者珍於周急而不以采飾外形爲善立言者貴於助教而不以偶俗集譽爲高若徒阿順諂諛虚美隱惡豈所匡失弼違醒迷補過者乎慮寡和而廢白雪之音嫌難售而賤連城之價余無取焉非不能屬華艷以取悅非不知抗直言之多吝然不忍違情曲筆錯濫眞僞欲令心口相契顧不愧景冀知音之在後也否泰有命通塞聽天何必書行言用榮及當年乎夫君子之開口動筆必戒悟蔽式整雷同之傾邪磋礱流遁之闇穢而著書者徒飾弄華藻張磔迂闊屬難驗無益之辭治靡麗虚言之美有似堅白厲修之書公孫刑名之論雖曠籠天地之外微入無間之内立解連環離同合異鳥影不動雞卵有足犬可爲羊大龜長蛇之言適足示巧表竒以誑俗何異乎畫敖倉以救飢仰天漢以解渴說崑山之多玉不能賑原憲之貧觀藥藏之簿領不能治危急之疾墨子刻木雞以厲天不如三寸之車鎋管青鑄騏驥於金象不如駑馬之周用言高秋天而不可施者丘不與易也抱朴子外篇卷之四十二
  hash: sha256:e5d8f909828f79359c50b64a44d6eaf72e590be39ededed8423976d94ce99b18
