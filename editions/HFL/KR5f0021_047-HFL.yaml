front:
  text: 抱朴子外篇卷之四十六四十七同卷志四
  hash: sha256:34ec39c898ced701d397b3cfdaab76f328bc776b467fe1773bed1a8418544247
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_047-001a, image: hfl/0873/0873-120.png}
body:
  text: 正郭抱朴子曰嵇生以爲太原郭林宗竟不恭三公之命學無不涉名重於往代加之以知人知人則哲蓋亞聖之器也及在衰世棲棲惶惶席不暇温志在乎匡亂行道與仲尼相似余答曰夫智與不智存於一言樞機之玷亂乎白珪愚謂亞聖之評未易以輕有許也夫所謂亞聖者必具體而微命世絶倫與彼周孔其間无所復容之謂也若人者亦何足登斯格哉林宗拔萃翹特鑒識朗徹方之常人所議固多引之上及實復未足也此人有機辯風姿又巧自抗遇而善用且好事者爲之羽翼延其聲譽於四方故能挾之見准慕於亂世而爲遇聽不覈實者所摧策及其片言所褒則重於千金遊步所經則賢愚波蕩謂龍鳳之集竒瑞之出也吐聲則餘音見法移足則遺迹見擬可謂善擊建鼓而當揭日月者耳非眞隱也蓋欲立朝則世已大亂欲潜伏則悶而不堪或躍則畏禍害確爾則非所安彰偟不定載肥載臞而世人逐其華而莫研其實翫其形而不統其神故遭雨巾壞猶復見傚不覺其短皆是類也俗民追聲一至於是故其雖有缺隙莫之敢指也夫林宗學涉知人非無分也然而未能避過實之名而闇於自料也或勸之以出仕進者林宗對曰吾晝察人事夜看乾象天之所廢不可支也方今運在眀夷之爻值勿用之位蓋盤桓潜居之時非在天利見之會也雖在原陸猶恐滄海流横吾其魚也况可冒衝風而乘奔波乎未若巖岫頤神娱心彭老優哉游哉聊以卒歲案林宗之言其知漢之不可救非其才之所辯審矣法當仰隮商洛俯泛五湖追巢父於峻嶺尋漁父於滄浪若不能結蹤山客離羣獨往則當掩景淵洿韜鱗括囊而乃自西徂東席不暇温欲慕孔墨棲棲之事聖者憂世周流四方猶爲退士所見譏彈林宗才非應期器不絶倫出不能安上治民移風易俗入不能彈毫屬筆祖述六藝行自衒耀亦既過差收名赫赫受饒頗多然卒進無補於治亂退無迹於竹帛觀傾視汩冰泮草靡未有異庸人也無故沉浮於波濤之間倒屣於埃塵之中遨集京邑交關貴游輪刓筴弊匪遑啓處遂使聲譽翕習秦胡景附巷結朱輪之軌堂列赤紱之客軺車盈街載奏連車誠爲游俠之徒未合逸隱之科也有道之世而臻此者猶不得復厠高潔之條貫爲祕丘之俊民而脩兹在於危亂之運奚足多哉孰不謂之闇於在天人之否泰蔽於自量之優劣乎空背恬默之塗竟無有爲之益不值禍敗蓋其幸耳以此爲憂世念國希擬素王有似蹇足之尋龍騏斥鷃之逐鴻鵠焦㝠之方雲鵬鼷鼬之比巨象也然則林宗可謂有耀俗之才無用守之質見無不了庶幾大用符采外發精神内虚不勝煩躁言行相伐口稱靜退心希榮利未得玄圃之棲禽九淵之潜靈也自衒自媒士女之醜事也知其不可而尤傚尤師亞聖之器其安在乎雖云知人知人之明乃唐虞之所難尼父之所病夫以明並日月原始見終且猶有失不能常中況於林宗熒燭之明得失半解已爲不少矣然則名稱重於當世美談盛於既没故其所得者則世共傳聞而所失者則莫之有識爾雖頗甄無名之士於草萊指未剖之璞於丘園然未能進忠烈於朝廷立禦侮於疆場解亡徵於倒懸折逆謀之競逐若鮑子之推管生平仲之達穰苴林宗名振於朝延敬於一時三九肉食莫不欽重力足以拔才言足以起滯而但養疾京輦招合賔客無所進致以匡危蔽徒能知人不肯薦舉何異知沃壤之任良田識直木之中梁柱而終不墾之以播嘉穀伐之以構梁棟奚解於不粒何救於露居哉其距貢舉者誠高操也其走不休者亦其疾也嵇生又曰林宗存爲一世之所式没則遺芳永播碩儒俊士未或指點而吾生獨評其短無乃見嗤於將來乎抱朴子曰曷爲其然哉苟吾言之允者當付之於後後之識者何恤於寡和乎且前賢多亦譏之獨皇主褒過耳故太傅諸葛公元遜亦曰林宗隱不修遁出不益時實欲揚名養譽而已街談巷議以爲辯訕上謗政以爲高時俗貴之歙然猶郭解原涉見趨於曩時也後進慕聲者未能考之於聖王之典論之於先賢之行徒或華名咸競准的學之者如不及談之者則盈耳中人猶不覺童蒙安能知故零陵太守殷府君伯緒高才篤論之士也亦曰林宗入交將相出游方國崇私議以動衆關毁譽於朝廷其所善則風騰雨驟改價易姿其所惡則摧頓陸沉士人不齒折其名賢遭亂隱遁含光匿景未爲遠矣君子行道以匡君也以正俗也于時君不可匡俗不可正林宗周旋清談閭閻無救於世道之陵遲無解於天民之憔悴也又故中書郎周生恭遠英偉名儒也亦曰夫遇治而贊之則謂之樂道遭亂而救之則謂之憂道亂不可救而避之則謂之守道虞舜樂道者也仲尼憂道者也微子守道者也漢室將傾世務交游林宗法當慨然私心要同契君子共矯而正之而身棲棲爲之雄伯非救世之宜也于時雖諸黄門六畜自寓耳其陳蕃竇武之徒雖鼎司牧伯皆貴重林宗信其言論臧否取定於匡危易俗不亦可冀乎而林宗既不能薦有爲之士立毫毛之益而逋逃不仕也則方之巢許廢職待客者則比之周公養徒避役者則擬之仲尼棄親依豪者則同之游夏是以世眩名實而大亂滋甚也若謂林宗不知則無以稱聦明若謂知之而不改則無以言憂道昔四豪似周公而不能爲周公今林宗似仲尼而不得爲仲尼也於是問者慨而嘆曰然則斯人乃避亂之徒非全隱之高矣抱朴子外篇卷之四十六
