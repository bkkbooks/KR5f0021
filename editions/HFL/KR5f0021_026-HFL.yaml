front:
  text: 抱朴子外篇卷之二十六二十七二十八二十九同卷真十
  hash: sha256:52ae8ad6c6a8bce8eab54ad58309da068762a001b600f70ef097ed654e989868
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_026-001a, image: hfl/0872/0872-088.png}
body:
  text: 譏惑抱朴子曰澄濁剖判庶物化生羽族或能應對焉毛宗或有知言焉于玃識往歸終知來玄禽解隂陽虵螘遠泉流蓍龜無以過焉甘石不能勝焉夫唯無禮不厠貴性厥初邃古民無階級上聖悼混然之甚陋𢚢巢穴之可鄙故構棟宇以去鳥獸之群制禮數以異等威之品教以盤旋訓以揖讓立則罄折拱則抱鼓趨步升降之節瞻視接對之容至于三千蓋檢溢之隄防人理之所急也故儼若冠於曲禮望貌首於五事出門有見賔之肅閑居有敬獨之戒顔生整儀於宵浴仲由臨命而結纓恭容暫廢惰慢已及安上治民非此莫以蓋人之有禮猶魚之有水矣魚之失水雖暫假息然枯糜可必待也人之棄禮雖猶靦然而禍敗之階也魯秉周禮暴兵不加魏式干木銳寇旋旆大楚帶甲百萬而有振槁之脆强秦殽函襲嶮而無折柳之固豈非棄三本而喪根柢之攸召哉矧乎安可觸情喪亂日久風頽教沮抑斷之儀廢簡脫之俗成近人值正化之蚩役庸民遭道網之絶紊猶網魚之去水罟圍獸之出陸羅也喪亂以來事物屢變冠履衣服袖袂財制日月改易無復一定乍長乍短一廣一狹忽高忽卑或粗或細所飾無常以同爲快其好事者朝夕放效所謂京輦貴大眉遠方皆半額也余實凡夫拙於隨俗其服物變不勝故不變無所損者余未曾易也雖見指笑余亦不理也豈苟欲違衆哉誠以爲不急耳上國衆事所以勝江表者多然亦有可否者君子行禮不求變俗謂違本邦之他國不改其桑梓之法也况於在其父母之鄉亦何爲當事棄舊而强更學乎吴之善書則有皇象劉纂岑伯然朱季平皆一代之絶手如中州有鍾元常胡孔明張芝索靖各一邦之妙並用古體俱足周事余謂廢已習之法更勤苦以學中國之書尚可不須也況於乃有轉易其聲音以效北語既不能便良似可恥可笑所謂不得邯鄲之步而有匍匐之嗤者此猶其小者耳乃有遭喪者而學中國哭者令忽然無復念之情昔鍾儀莊舄不忘本聲古人韙之孔子云喪親者若嬰兒之失母其號豈常聲之有寧令哀有餘而禮不足哭以洩哀妍拙何在而乃治飾其音非痛切之謂也又聞貴人在大哀或有疾病服石散以數食宣藥勢以飲酒爲性命疾患危篤不堪風冷幃帳茵褥任其所安於是凡瑣小人之有財力者了不復居於喪位常在别房高牀重褥美食大飲或與密客引滿投空至於沈醉曰此京洛之法也不亦惜哉余之鄉里先德君子其居重難或并在衰老於禮唯應縗麻在身不成喪致毁者皆過哀啜粥口不經甘時人雖不肖者莫不企及自勉而今人乃自取如此何其相去之遼緬乎又凡人不解呼謂中國人之居喪者多皆奢溢殊不然也吾聞晋之宣景文武四帝居親喪皆毁瘠踰制又不用王氏二十五月之禮皆行七月服于時天下之在重哀者咸以四帝爲法世人何獨不聞此而虚誣高人不亦惑乎抱朴子外篇卷之二十六
