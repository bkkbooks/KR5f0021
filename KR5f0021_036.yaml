front:
  text: 抱朴子外篇卷之三十六
  hash: sha256:91c14b6f9c27fa8a1dce8a8384d11cd8181ddccb90936017b54d337b4eaa32ea
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_036-001a, image: hfl/0873/0873-004.png}
body:
  text: 安貧抱朴子曰昔漢火寢耀龍戰虎爭九有幅裂三家鼎據有樂天先生者避地蓬轉播流岷益始處昵於文休未見知於孔明而言高行方獨立不群時人憚焉莫之或與時二公之力不能違衆遂令斯生沈抑衡蓽齒漸桑榆而韋布不改而時主思賢不聞不知當途之士莫舉莫貢潜側武之陋巷竄繩樞之蓬屋進廢經世之務退忘治生之事藜餐屢空朝不謀夕於是偶俗公子造而詰之曰蓋聞有伊吕之才者不久滯於窮賤懷猗頓之術者不長處於飢寒達者貴其知變智士驗乎不匱故范生出則滅吳霸越為命世之佐入則貨殖營生纍萬金之資夫貧在六極富在五福詩美哿矣易貴聚人垂餌香則鱣鮪來懸賞厚則果毅奮長卿所以解犢鼻而擁朱旄曲逆所以下席扉而享茅土不韋所以食十萬之邑絳侯所以拔囹圄之困也故下鄉儉而獲悔咎之辱漂嫗豐而蒙千金之報先生無少伯之竒略專鋭思乎六經忽絶粻陟良切之實禍慕不朽之虛名恥詭遇以干祿羞衒沽以要榮冀西伯之方畋俟黃河之將清甘列子之菜色邈全神而遺形何異圖畫騏驥以代徒行之勞遙指海水以解口焦之渴張魚網於峻極之巔施釣緡於修木之末雖自以為得所猶未免乎迂闊也事無身後之功物無違時之盛今海內瓜分英雄力競象龔滔天猾夏放命駑蹇星馳以兼路豺狼奮口而交爭當塗投袂以訟屈素士蒙塵以履徑純儒釋皇道而治五霸之術碩生弃四科而恤月旦之評筐篚實者進於草萊乏資地者退於朝廷握黃白者排金門而陟玉堂誦方策者結世讎而委泥濘贄幣濃者瓦石成圭璋請託薄者龍駿弃林坰黨援多者偕驚飈以淩雲交結狹者侣跛鱉以沈泳夫丸泥已不能遏彭蠡之沸騰獨賢亦焉能反流遁之失正今先生入無儋石之儲出無束修之調徒含章如龍鳳被文如虎豹吐之如波濤陳之如錦繡而凍餓於環堵何計疏之可弔奚不泛輕舟以託迅御飛帆以遠之交瑰貨於朔南收金碧於九疑迪崔烈之遐武縻好爵於清時徒疲勞於述作豈蟬蛻之有期也獨苦身以為名乃黃老之所嗤也樂天先生答曰六藝備研八索心該斯則富矣振翰摛藻德音無窮斯則貴矣求仁仁至舍旃焉如夫棲重淵以頤靈外萬物而自得遺紛埃於險塗澄精神於玄默不窺牖以遐覽判微言而靡惑雖復設之以台鼎猶確爾而弗革也曷肯憂貧而與賈堅爭利戚窮而與凡瑣競達哉吾子苟知商販可以崇寶耕也可以免飢不識逐麋者不顧兔道遠者其到遲也且夫尚父之鼓刀素首乃吐竒也萬鈞之為重衝飈不能移簫韶未九成靈鳥不紆儀也是以俟扶搖而登蒼霄者不充詘於蓬蒿之杪騁蘭筋以陟六萬者不爭塗乎蹇驢之群大孝必畏辱親之險故子春戰悸於下堂上智不貴難得之財故唐虞捐金而抵壁明哲消禍於未來智士聞利則慮害而吾子訊僕以泛舟孳孳於潤屋勸隋珠之彈雀探虎口以奪肉輕遺體於不測觸重險以遠至忘髮膚之明戒尋乾沒於難冀若乃焚輪傾巖木拔石飛陽侯山峙洪濤嶵巍輕艘塵漂力與心違徒嗟泣而罔逮乃悟達者之見微也昔回憲以清苦稱高陳平以無金免危廣漢以好利喪身牛缺以載寶灰糜匹夫枉死於懷璧豐狐召災以美皮今吾子督余以誨盜之業敦余以召賊之策進鴆酒以獻酬非養壽之忠益夫士以三墳為金玉五典為琴筝講肆為鍾鼓百家為笙簧使味道者以辭飽酣德者以義醒超流俗以高蹈軼億代而揚聲方長驅以獨往何貨賄之穢情夫藏多者亡厚好謙者忌盈含夜光者速剖循覆車者必傾過載者沈其舟欲勝者殺其生蓋下士所用心上德所未營也於是問者茫然自失請備門生之末編永寶長生之良方焉抱朴子外篇卷之三十六
