  text: 抱朴子外篇卷之三十九四十同卷志二
  hash: sha256:b48e009fbc22baffcaf5e3d801dce8c47d084b171f6b76541e91653d7eb14ea8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_039-001a, image: hfl/0873/0873-058.png}
body:
  text: 廣譬抱朴子曰立德踐言行全操清斯則富矣何必玉帛之崇乎高尚其志不降不辱斯則貴矣何必青紫之兼拖也俗民不能識其度量庸夫不得揣其銓衡是則高矣何必凌雲而蹈霓乎問者莫或測其淵流求者未有覺其短乏是則深矣何必洞河而淪海乎四海苟備雖室有懸磬之窶可以無羡乎鑄山而煮海矣身處鳥獸之羣可以不渴乎朱輪而華轂矣抱朴子曰潛靈俟慶雲以騰竦棲鴻階徑風以凌虛素鱗須姬發而躍白雉待公旦而來薑老值西伯而投磻溪之綸韓英遭漢高乃騁撥亂之才抱朴子曰澄精神於玄一者則形器可忘邈高節以外物者同富貴可遺故支離之偉造化而怡顔北人箕叟棲嵩岫而得意焉抱朴子曰粗理不可浹全能事不可畢兼故懸象明而可蔽山川滯而或移金玉剛而可柔堅冰密而可離公旦不能與伯氏跟絓於馮雲之峻仲尼不能與吕梁較伎於百仞之溪抱朴子曰震雷不能細其音以協金石之和日月不能私其耀以就曲照之惠大川不能促其涯以適速濟之情五嶽不能削其峻以赴陟者之欲故廣車不能脅其轍以苟通於狹路高士不能撙其節以同塵於隘俗抱朴子曰隂陽以廣陶濟物三光以普照著明嵩華以藏疾為曠北溟以含垢稱大碩儒以與進弘道遠數以博愛容衆抱朴子曰靈龜之甲不必為戰施麟角鳳爪不必為鬭設故隻生不釋劍於平世擊柝不輟備於思危抱朴子曰南金不為處幽而自輕瑾瑶不以居深而止潔志道者不以否滯而改圖守正者不以莫賞而苟合抱朴子曰登玄圃者悟丘阜之卑浮溟海者識池沼之褊披九典乃覺墻面之篤蔽聞至道乃知拘俗之多迷抱朴子曰渾沌之原無皎登之流毫釐之根無連抱之枝分寸之燼無炎遠之熱隙穴之中無炳蔚之羣鉤曲之形無繩直之影參差之上無整齊之下抱朴子曰不覩瓊琨之熠爍則不覺瓦礫之可賤不覿虎豹之彧蔚則不知犬羊之質漫聆白雪之九成然後悟巴人之極鄙識儒雅之汪濊爾乃悲不學之固陋抱朴子曰無當之玉碗不如全用之埏埴寸裂之錦黻未若堅完之韋布故夏姬之無禮不如孤逐之皎潔富貴之多罪不如貧賤之履道抱朴子曰猛獸不奮搏於度外鷹鷂不揮翮以妄擊若廟算既內不揆德進取又外不量力猶輕羽之投洪罏飛雪之委沸鑊朝菌之試干將羔犢之犯暴虎也抱朴子曰三辰蔽於天則清景暗於地根荄蹶於此則柯條瘁於彼道失於近則禍及於遠政繆於上而民困於下抱朴子曰務於遠者或失於近治其外者或患生乎內覆頭者不必能令足不濡蔽腹者不必能令背不傷故秦始築城遏胡而禍發幃幄漢武懸旌萬里而變起蕭牆抱朴子曰人才無定珍器用無常道進趨者以適世為竒役御者以合時為妙故玄冰結則五明捐隆暑熾則裘爐退高鳥聚則良弓發狡兔多則盧鵲走干戈興則武夫奮韶夏作則文儒起抱朴子曰激修流揚朝宗者不可以背五城而跨積石舒翠葉吐丹葩者不可以舍洪荄而去繁柯敗源失本鮮不枯汔叛聖違經理不弘濟抱朴子曰四瀆辨源五河分流赴卑注海殊塗同歸色不均而皆艷音不同而咸悲香非一而並芳味不等而悉美抱朴子曰物貴濟事而飾為其末化俗以德而言非其本故綿布可以禦寒不必貂狐淳素可以匠物不在文辨抱朴子曰衝飆謐氣則轉蓬山峙修綱既舒則萬目齊理故未有上好謙而下慢主賤寶而俗貧抱朴子曰事有緣微而成著物有治近而致遠故修步武之池而引沈鱗於江海豐朝陽之林而延靈禽於丹穴設象於槃孟而翠虬降於玄霄委灰於尺水而望舒變於太極是以晉文回輪於勇蟲而壯士雲赴句踐曲躬於怒蛙而戎卒輕死九九顯而扣角之俊至枯骨掩而參分之仁洽抱朴子曰膏壤在荄而柯葉含榮率俗以身則不言而化故有唐以鹿裘臻太平齊桓以損紫止奢競章華構而豐屋之過成露臺輟而玄默之風行抱朴子曰聰者料興亡於遺音之絶響明者覿機理於玄微之未形故越人見齊桓不振之徵於未覺之疾箕子識殷人鹿臺之禍於象箸之初抱朴子曰二儀不能廢春秋以成歲明主不能舍刑德以致治故誅貴所以立威賞賤所以勸善罰上達則姦萌破而非懦弱所能用也惠下逮則遠人懷而非儉吝所能辨也抱朴子曰浮滄海者必精占於風氣故保利涉之福善涖政者必戰戰於得失故享惟永之慶故暗君之所輕蓋明主之所重也亡國之所棄則治世之所行也抱朴子曰毫釐蹉於機則尋常違於的與奪失於此則善否亂於彼邪正混侔則彝倫攸斁功過不料則庶績以崩故明君賞猶春雨而無霖淫之失罰擬秋霜而無詭時之嚴抱朴子曰明銓衡者所重不可得誣也仗法度者所愛不可得私也故得人者先得之於己者也失人者先失之於己者也未有得己而失人失己而得人者也抱朴子曰明主躬操威恩不假人以利器暗主倒執干戈雖名尊而勢去故制慶賞而得衆者田常所以奪齊也擅威福而專朝者王莽所以篡漢也抱朴子曰常制不可以待變化一塗不可以應無方刻船不可以索遺劍膠柱不可以諧清音故翠蓋不設於晴朗朱輪不施於涉川味淡則加之以鹽沸溢則增水而減火抱朴子曰丹書鐵券刺牲歃血不能救違約之弊則難以結繩檢矣五刑九伐赤族之盛不足以止覬覦之姦則不可以舞干化矣是以書有世重之文易有隨時之宜抱朴子曰人有識真之明者不可欺以偽也有揣深之智也不可誑以淺也不然以虺蛇為應龍狐鴟為麟鳳矣抱朴子曰世有雷同之譽而未必賢也俗有歡譁之毁而未必惡也是以迎而許之者未若鑒其事而試其用逆而距之者未若聽其言而課其實則佞媚不以虛談進良能不以孤弱退駑蹇輟望於大輅戎虬揚鑣而電騁則功胡大而不可建道胡遠而不可到抱朴子曰潛朽之木不能當傾山之風含鄛之崖難以值滔天之濤故七百之祚三十之世非徒牧野之功倒戈之敗鹿臺之禍不始甲子之朝其強久矣其亡尚矣抱朴子曰貴遠而賤近者常人之用情也信耳而疑目者古今之所患也是以秦王歎息於韓非之書而想其為人漢武慷慨於相如之文而恨不同世及既得之終不能拔或納讒而誅之或放乎冗散此蓋葉公之好偽形見真龍而失色也抱朴子曰摩尼不宵朗則無别於磧礫化鯤不淩霄則靡殊於桃蟲綿駒吞聲則與喑人為羣逸才沈抑則與凡庸為伍故鱔鰍褻絳虬於淵汙駑蹇黷駿騄於坰野者不識彼物靜與之同動與之異抱朴子曰棄金璧於塗路則行人止足委錦紈於泥濘則見者驚咄若夫放高世之士於庸鹵之伍捐經國之器於困滯之地而談者不訟其屈達者不拯其窮或貴其文而忽其身或用其策而忘其功斯之為病由來久矣抱朴子曰開源不億仞則無懷山之流崇峻不淩霄則無彌天之雲財不豐則其惠也不博才不遠則其辭也不瞻故覩盈丈之牙則知其不出徑寸之口見百尋之枝則知其不附毫末之木抱朴子曰靈鳳所以晨起丹穴夕萃軒丘日未移晷周章九陔凌風蹈雲不䞵不閡者以其六翮之輕徑也夫良才大智亦有國之六翮也抱朴子曰淇衛忘歸不能無絃而遠激振塵之音不能無器而與哀超俗拔萃之德不能立功於未至之時抱朴子曰朱緑之藻不秀於枯柯傾山之流不發乎涸源熠耀之宵焰不能使萬品程形志盡勢利不能使芳風邈世抱朴子曰重淵不洞地則不能含螭龍吐吞舟峻山不極天則不能韜琳琅播雲雨立德不絶俗則不能收美聲箸厚實執志不絶羣則不能臻成功銘弘勳而凡夫朝為蜩翼之善夕望丘陵之益猶立植黍稷坐索於豐收也抱朴子曰行無邈俗之標而索高世之稱體無道藝之本而營朋黨之未欲以收清貴於當世播德音於將來猶褰裳以越滄海企佇而躍九玄抱朴子曰泥龍雖藻繪炳蔚而不堪慶雲之招撩禽雖雕琢玄黃而不任淩風之舉芻狗雖節以金翠而不能躡景以頓逸近才雖豐其寵祿而不能令天清而地平抱朴子曰毒粥既陳則旁有爛腸之鼠明燎宵舉則下有聚死之蟲芻豢之豐則鼎俎承之才小任大則泣血漣如桑霍為戒厚矣范疏之鑒明矣抱朴子曰滄海揚萬里之濤不能斂山峯之塵驚風摧千仞之木不能拔弱草之荄貙虎暴闞不能威蚊虻冠世之才不能合流俗抱朴子曰堅志者功名之主也不惰者衆善之師也登山不以艱險而止則必臻乎峻嶺矣清苦不以窮否而怨則必永其令問矣抱朴子曰和鵲雖不長生而針石不可謂非濟命之器也儒者雖多貧賤而墳典不可謂非進德之具也播種有不收者矣而稼穡不可廢仁義有遇禍者矣而行業不可惰抱朴子曰重載不止所以沉我舟也昧進志退所以危我身也聚蝎攻本雖權安然必領之徵也抱朴子曰玄雲為龍興非虺蜓所能招也飆風為虎發非狐狢之能致也是以大人受命則逸倫之士集玉帛幽求則丘園之俊起抱朴子曰金以剛折水以柔全山以高陊谷以卑安是以執雌節者無爭雄之禍多尚人者有召怨之患抱朴子曰淮隂隱勇於跨下不損其龍躍而虎視也應侯韜竒於溺簀不妨其鸞翔而鳳起也或南面稱孤或宰總台鼎故一抑一揚者輕鴻所以凌虛也乍屈乍伸者良才所以俟時也抱朴子曰焦螟之卑棲不肯為銜鼠之唳天玄蟬之潔飢不願為蜣蜋之穢飽是以禦寇不納鄭陽之惠曾參不美晉楚之寶抱朴子曰微飆不能揚大海之波毫芒不能動萬鈞之鍾是以漆園思惠有捐斤之歎伯氏哀期有剿絃之憤短唱不足以致弘麗之和勢利不足以移淡泊之心抱朴子曰熊羆不校捷於狐狸金鶚不競擊於小鷂是以張耳掩壯於抱關朱亥竄勇於鼓刀抱朴子曰懸魚惑以芳餌檻虎死於籠狐不可以釣緡致者必虬螭也不可以機穽誘者必麟虞也抱朴子曰夫雲翔者不知泥居之汙處貴者鮮恕羣下之勞然根朽者尋木不能保其千里之茂也民怨者堯舜不能恃其長世之慶也抱朴子曰凡木結根於靈山而匠石為之寢斤斧小鮮寓身於龍池而漁父為之息網罟蚊集鷹首則應鵦不敢啄鼠住虎側則狸犬不敢議抱朴子曰靈蔡默然而吉凶昭晢於無形春蛙長譁而醜音見患於聒耳故聲希者響必巨辭寡者信必箸抱朴子曰箕踞之俗惡盤旋之容被髮之域憎章甫之飾故忠正者見排於讒勝之世雅人不容乎惡直之俗抱朴子曰升水不能救八藪之燔爇撮壤不能遏砥柱之沸騰寸刃不能刊長洲之林獨是不能止朋黨之非抱朴子曰千羊不能扞獨虎萬雀不能抵一鷹庭燎攢舉不及羲和之末景百鼓並伐未若震霆之餘聲是以庸夫盈朝不能使彝倫攸敘英俊孤任足以令庶事根長抱朴子曰非分之達猶林卉之冬華也守道之窮猶竹柏之履霜也故識否泰於獨見者雖劫以鋒鋭猶不失正而改塗焉安肯諂笑以偶俗乎體方貞以居直者雖誘以封國猶不違情以趨時焉安肯躐徑以取容乎抱朴子曰震雷鞫𨍰而不能致音乎聾聵之耳重光麗天而不能曲景於幽岫之中凝氷慘栗而不能凋款凍之華朱飆鑠石而不能靡蕭丘之木故至德有所不能移也抱朴子曰彍弩危機嚴鏃銜弦至可忌也而勇雉觸之而不猜暗政亂邦惡直妬能甚難測也而貪人競之而不避故飛鋒暴集而不覺禍敗奄及而不振是以愚夫之所悅乃達者之所悲也凡才之所趨乃大智之所去也抱朴子曰風不輟則扇不用日不入則燭不明華不墮則實不結岸不虧則谷不盈九有人安則韓白之功不著長君繼軌則伊霍之勛不成故病困乃重良醫世亂而貴忠貞抱朴子曰好榮故樂譽之欲多畏辱則憎毁之情急若夫通精元一合契造化混盈虛以同條齊得失於一指者愛惡未始有所繫窮通不足以滑和抱朴子曰與奪不汩其神者至粹者也利害不染其和者極醇者也浩浩乎非瓢觶所校矣茫茫乎非跬步所尋矣聲希所以為大音和寡所以崇我貴玄黃遼邈而不與其曠死生大矣而不以改其守常分細碎將胡恤焉抱朴子曰林繁則匠入矣珠美則蚌裂矣石舍金者焚鑠草任藥者剪掘刃利則先缺絃哀則速絶用以適己真人之寶也才合世求有伎之災也抱朴子曰準的陳則流鏑赴焉美名起則謗讟攻焉瑰貨多藏則不招怨而怨至矣器盈志驕則不召禍而禍來矣抱朴子曰連城之寶非貧寒所能市也高世之器非淺俗所能識也然盈尺之珍不以莫知而暗其質逸倫之士不以否塞而薄其節樂天任命何怨何尤抱朴子曰大鵬無戒旦之用巨象無馳逐之才故蔣琬敗績於百里而為三臺之標陳平困瘁於治家而懷六竒之略抱朴子曰明暗者才也自然而不可飾焉窮達者時也有會而不可力焉吕尚非早蔽而晚智然振素而僅遇韓信非初怯而末勇然危困而後達抱朴子曰奔驥不能及既往之失千金不能救斯言之玷故博其施者未若防其微勤其求者不如寡其辭抱朴子曰烈士之愛國也如家奉君也如親則不忠之事不為其罪矣仁人之視人也如己待疏也猶密則不恕之怨不為其責矣抱朴子曰玄冰未結白雪不積則青松之茂不顯俗化不弊風教不頽則皎潔之操不别在危國而况賤故莊萊抗遺榮之高居亂邦而飢寒故曾列播忘富之稱抱朴子曰天居高而鑒卑故其網雖踈而不漏神聰明而正直故其道賞真而罰偽是以惠和暢於九區則七耀得於玄昊殘害著於品物則二氣謬於四八抱朴子曰天秩有罔極之尊人爵無違德之貴故仲尼雖匹夫而饗祀於百代辛癸為帝王而僕堅不願以見比商老身愈賤而名愈貴幽厲位彌重而罪彌著齊王之生不及柳惠之墓秦王之宫未若康成之閭抱朴子曰影響不能無形聲以著餘慶不可以無德而招故唐堯為政七十餘載然後景星摛耀羊公積行黃髮不倦爾乃墜金雨集塗遠者其至必遲施後者其報常晚抱朴子曰理盡者不可責有餘一至者不可求兼濟故洪濤之末不能蕩浮萍衝風之後不能揚輕塵徑弩之餘力不能洞霧穀西頽之落暉不能照山東抱朴子曰懸象雖薄蝕不可以比螢燭之貞耀黃河雖混渾不可以方沼沚之清澄山雖崩猶峻於丘垤虎雖瘠猶猛於豺狼抱朴子曰神農不九疾則四經之道不垂大禹不胼胝則玄圭之慶不集故救憂為厚樂之本暫勞為永逸之始抱朴子曰金鉤桂餌雖珍不能制九淵之沉鱗顯寵豐祿雖貴而不能致無欲之幽人故吕梁有鵠立之夫河湄繁伐檀之民玉帛徒集於子陵之巷蒲輪虛反於徐生之門抱朴子曰觀聽殊好愛憎難同飛鳥覩西施而驚逝魚鱉聞九韶而深沉故衮藻之粲焕不能悅祼鄉之目采菱之清音不能快楚隸之耳古公之仁不能喻欲地之狄端木之辨不能釋繫馬之庸抱朴子曰般旋之儀見憎於祼踞之鄉繩墨之匠獲忌於曲木之肆貪婪叨餮者疾素絲之皎潔比周實繁者讎高操之孤立猶賈堅之惡同利醜女之害國色抱朴子曰君子之升騰也則推賢而散祿庸人之得志也則矜貴而忽士施惠隆於佞幸用才出乎小惠不與智者共其安而望有危而見救不與竒士同其歡而欲有戚之見恤猶災火張天方請雨於名山洪水凌空而伐舟於東閩不亦晚乎抱朴子外篇卷之三十九
