front:
  text: 抱朴子外篇卷之五六同卷真四
  hash: sha256:d1e9c34be6956ecd510447d0f8417df754706a748957eab57cece3a590a35033
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_005-001a, image: hfl/0871/0871-064.png}
body:
  text: 君道抱朴子曰清玄剖而上浮濁黃判而下沈尊卑等威於是乎著往聖取諸兩儀而君臣之道立設官分職而雍熙之化隆君人者必修諸己以先四海去偏黨以乎王道遣私情以摽至公擬宇宙以籠萬殊真僞既明於物外矣而兼之以自見聽受既聰於接來矣而加之以自聞儀决水以進善鈞絶絃以黜惡招德塞違庸親昵賢使規盡其圓矩竭其方繩肆其直斤效其斫器無量表之任才無失授之用考名責實屢省勤恤樹訓典以示民極審褒貶以彰勸沮明撿齊以杜僣濫詳枉直以違晦吝其與之也無叛理之幸其奪之也有百氏之掩匠之以六藝軌之以忠信蒞之以慈和齊之以禮刑揚灰陋以伸沈抑激清流以澄臧否使物無詭道事無非分立朝牧民者不得侵官越局推轂即戎者莫敢憚危顧命悅近以懷遠修文以招携阜百姓之財粟闡進德之廣塗杜機僞之繁務則明罰敕法哀敬折獄淳化治則匿瑕藏疾五教在寬外總多士於文武內建維城之穆屬使親踈相持尾為身幹枝雖茂而無傷本之憂流雖盛而無背源之勢石磐嶽峙式過覬覦見三苗之傾殄則知川源之未可恃也覩翳幽之不守則覺嚴嶮之不足賴也夫江漢猶存而强楚虜辱劍閣自如而子陽赤族四嶽三塗實不一姓金城湯池未若人和守在海外匪山河也是以賢君抱懼不足而改過恐有餘謀當計得猶思危而弗休焉戰勝地廣猶戒盈而夕惕焉象渾穹以遐燾式坤厚以廣載運重光以表微致遠思乎未兆資春景以嫗煦範秋霜以肅物酬咨以校同異平衡以銓群言虛己以盡下情推功以勸將來御之以術則終始可竭也整之以度則參差可齊也嶷若閬風之凌霄而諸下不得以輕重料焉窈若玄淵之萬仞則近不能以少多量焉然則君之流源不窮而百僚之才力畢陳矣我之涯畔無外而彼之斤兩可限矣發號吐令則鞫若震霆之激響而不為邪辨改其正畫法創制則炳若七曜麗天而不以愛惡曲其情宏略遠罩則藹若密雲之高結居貞成務則確若嵩岱之根地料倚伏於未萌之前審毁譽於巧言之口不使敦朴散於雕僞不使一體澆於二端雖能獨斷必博納乎芻蕘雖務含弘必清耳於浸潤民之飢寒則哀彼責此百姓有罪則謂之在豫嘉祥之臻則念得神之祐或逢天之怒則思桑林之引咎不吝改絃於宜易之調不耻反迷於朝過之塗虎眄以警密麟跱以接疏路無擊壤之叟則羞聞和音之作民有不粒之匱則愧臨方丈之膳處飛閣之概天則懼役夫之勞瘁茹柔嘉之㫖脆則憂敬授之失時聆管絃之宴羡則戚逸樂之有過瞻藻麗之采粲則慮賦斂之慘烈遵放勛之粗裘准衛文之大帛追有夏之卑宫識露臺之不果鑒章華之召災悟阿房之速禍詰誓則念依時之失信耽玩則覺褒妲之惑我征伐則量力度時不令百里有號泣之憤詄戮則遺情任理不使鴟夷有抱枉之魂鑒操彤之杜伯惟人立之呼豕廢適則戒𣈆獻之巨惑立庶則念劉表之殄祀搜畋則樂失獸而得士識弛網而悅遠偏愛則慮袖蜂之謗巧飛燕之專寵獨任則悟鹿馬之作威恭顯之惡直納策則思漢祖之吐哺孝景之誅錯㫖甘之進則疏儀狄容悅姑息則沈欒激除蒸子之諂親放麋之仁鑒白龍以輟輕脫觀羸以節無饜防人彘之變於六宫之中止汗血之求於絶域之外除惡犬以遏酒酗之患市馬骨以招追風之駿軾怒蛙以勸勇避螳蜋以厲武聆虐會之讜言容保申之正直剔腹背無益之毛攬六翮凌虛之用烹如簧以謐司原之針折菀渃以迪梁伯之美放丹姬以弭婉孌之迷退子瑕以杜餘桃之惑藏淵中之魚操利器之柄勿憚徙薪之煩以省焦爛之費鼓廉耻之陶冶明考試之準的怒不越法以加虐喜不踰憲以厚遺割情於所愛而有犯者無赦採善於所憎而有勞者不遺傾下以納忠聞逆耳而不諱廣乞言於誹謗雖委抑而不距掩細瑕而録大用忘近惡而念遠功使夫曹翽孟明有修來之效魏尚張敞立雪恥之績射鈎之賊臣著匡合之弘勳釋縛之左車吐止戈之高策則鵂梟化為鴛鸞邪僞變成忠貞芳穎秀於斥鹵夜光起乎泥濘剡鋭載胥九功允諧西面逡巡以延師友之才尊事老叟以敦孝悌之行是以淵蟠者仰赴山棲者俯集炳蔚內弼虓闞外御政得於上而物傾於下惠發乎邇而澤邁乎遠明哲宣力於攸蒞黔庶讓畔於藪澤爾乃蠲滋章之法令振太和之清風蒲輪玉帛以抽丘園之俊民元凱畢集以究論道之損益減牧羊之多人及不酤之至醇張仁讓之闈杜華競之津旌義正之操弘道素之格使附德者若潜萌之悅甘雨見歸者猶行潦之赴大川黎民安之若緑葉之綴修柯左衽仰之若衆星之繫北辰是以七政不亂象於玄極寒溫不謬節而錯集四靈備覿芝華灼粲甘露淋漉以霄墜嘉穗婀娜而盈箱丹魃逐於神潢玄厲拘於廣朔百川無沸騰之異南箕謐偃禾之暴物無詭時之凋人無嗟慨之響囹圄虛陳五刑寢厝正朔所不如冕紳所不暨氈裘皮服山棲海竄莫不含歡革面感和重譯靈禽貢於彤庭瑶環獻自西極貟首遽善猶氤氲之順徑風要荒承指若響亮之和絶音誠升隆之盛致三五之軌躅也故能固廟祧於罔極繁本枝乎百世矣夫根深則末盛矣下樂則上安矣馬不調造父不能超千里之迹民不附唐虞不能致同天之美馬極則變態生而傾僨惟憂矣民困則多離叛其禍必振矣可不戰戰以待旦乎可不栗栗而慮危乎人主不澄思於治亂不深鑒於亡徵雖目分百尋之秋毫耳精八音之清濁文則琳琅墮於筆端武則鈎鉻居額切摧於指掌心苞萬篇之誦口播濤波之辨猶無補於土崩不救乎瓦解也何者不居其大而務其細滯乎下人之業而暗元本之端也誠能事過乎儉臨深履冰居安不忘乘奔之戒處存不廢慮亡之懼操綱領以整毛目握道數以御衆才韓白畢力以折衝蕭曹竭能以經國介一人之心致其果毅謀夫協思進其長算則人主雖從容玉房之內逍遙雲閣之端羽爵腐於甘醪樂人疲於拚儛猶可以垂拱而任賢高枕以責成何必居茅茨之狹陋食薄味之大羹躬監門之勞役懷損命之辛勤然後可以惠流蒼生道洽海外哉昏惑之君則不然焉其為政也或仁而不斷朱紫混漫正者不賞邪者不罰或苛猛慘酷或純威無恩刑過乎重不恕不逮根露基頽危猶巢幕而自比於天日擬固於泰山謂克明俊德者不難及小心翼翼者未足算也於是無罪無辜淫刑以逞民不見德唯戮是聞官人則以順志者為賢擢才則以近習者為前上宰鼎列委之毋后之族專斷顧問决之阿諂之徒所揚引則遠九族外親而不簡其器幹所信仗則在於瑣才曲媚而憎乎方直所抑退則從雷同而不察之以情所寵進則任美談而不考其績用掌要治民之官御戎專征之將或貪汙以壞所在矣或營私以亂朝廷矣或懦弱以敗庶事矣或恇怯以失軍利矣終於不覺不忍黜斥猶加親委冀其晚效器小任大遂及於禍良才遠量無援之士或披褐而朝隱或沈淪於窮否懷道括囊展力莫由陵替之災所以多有也又經典規戒弗聞不覽玩弄褻宴是耽是務高樓觀而下道德廣苑囿而狹招納深池沼而淺恩信悅狗馬而惡謇諤貴珠玉而賤智略豐綺紈而約惠澤緩振濟而急聚斂勤畋弋而忽稼穡重兼并而輕民命進優倡而退儒雅厚嬖幸而薄戰士流聲色而忘庶事先酣遊而後聽斷數苦役而疏犒賜工造費好不急之器圈聚食肉靡穀之物然則危亡不可以怨天微弱不可以尤人也夫吉凶由己湯武豈一哉昔周文掩未埋之骨而天下稱其仁殷紂剖比干之心而四海疾其虐望在具瞻毁譽尤速得失之舉不在多也凡譽重則蠻貊歸懷而不可以虛索也毁積即華夏離心而不可言救也是以小善雖無大益而不可以不為細惡雖無近禍而不可不去也若乃肆情縱欲而不與天下共其樂故有憂莫之恤也削基增峻而不覺下墮則上崩故傾頽莫之扶也於是轡策去於我手神物假而不還力勤財匱民不堪命衆怨於下天怒於上田成盜全齊於帷幄姬昌取有二於而鄰陳吳之徒奮劍而大呼劉項之倫揮戈而飈駭雲梯乘於百雉之上皓刃交於象魏之下飛鋒內荐禁兵外潰而乃憂悲以思邈世之大賢擁篲以延巖棲之智士慕伊吕於嵩岫招孫吳於草萊拜昌言而無所思嘉算而莫問猶大厦既燔而運水於滄海洪潦淩室而造船於長洲矣夫巍巍之稱不可驕吝構而東嶽之封未易以恣欲修也上聖兼策載馳猶懼不逮前而庸主緩步按轡而自以為過之或於安而思危或在嶮而自逸或功成治定而匪怠匪荒或綴旒纍卵而不覺不寤不有辛癸之沒溺曷用貴欽明之高濟哉念兹在兹庶乎庶乎抱朴子外篇卷之五
