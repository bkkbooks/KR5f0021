front:
  text: 抱朴子外篇卷之三四同卷真三
  hash: sha256:6580517d149b8818ce0c3eacc3acee7d888ee0c8af89b89e93b3328dab184b78
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_003-001a, image: hfl/0871/0871-042.png}
body:
  text: 勗學抱朴子曰夫學者所以清澄性理簸揚埃穢雕煆礦璞礱鍊屯鈍啓導聰眀飾染質素察往知來博涉勸成仰觀俯察於是乎在人事王道於是乎備進可以為國退可以保己是以聖賢罔莫孜孜而勤之夙夜以勉之命盡日中而不釋飢寒危困而不廢豈以有求於當世哉誠樂之自然也夫斫削刻畫之薄伎射御騎乘之易事猶須慣習然能後善況乎人理之曠道德之遠隂陽之變鬼神之情緬邈玄奧誠難生知雖云色白匪染弗麗雖云味甘匪和弗美故瑶華不琢則耀夜之景不發丹青不治則純鈞之徑不就火則不鑽不生不扇不熾水則不決不流不積不深故質雖在我而成之由彼也登閬風捫晨極然後知井谷之暗隘也披七經玩百氏然後覺面牆之至困也夫不學而求知猶願魚而無網焉心雖勤而無獲矣廣博以窮理猶順風而託焉體不勞而致遠矣粉黛至則西施以加麗而宿瘤以藏醜經術深則高才者洞達鹵鈍者醒悟文梓干雲而不可名臺榭者未加班輸之結構也天然爽朗而不可謂之君子者不識大倫之臧否也欲超千里於終朝必假追影之足欲凌洪波而遐濟必因艘楫之器欲見無外而不下堂必由之乎載籍欲測淵微而不役神必得之乎明師故朱緑所以改素絲訓誨所以移蒙蔽披玄雲而揚大明則萬物無所隱其狀矣舒竹帛而考古今則天地無所藏其情矣况於鬼神乎而况於人事乎泥涅可令齊堅乎金玉曲木可攻之以應繩墨百獸可教之以戰陳畜牲可習之以進退沈鱗可動之以聲音機石可感之以精誠又况乎含五常而稟最靈者哉低仰之駟教之功也鷙擊之禽習之馴也與彼凡馬野鷹本實一類此以飾貴彼以質賤運行潦而勿輟必混流乎滄海矣崇一簣而弗休必鈞高乎峻極矣大川滔漾則虬螭群遊日就月將則德立道備乃可以止夢乎丘旦何徒解桎乎困蒙哉昔仲由冠雞帶豚䨥珥鳴蟬杖劍而見拔刃而舞盛稱南山之徑竹欲任掘強之自然尼父善誘染以德教遂成升堂之生而登四科之哲子張鄙人而灼聚凶猾漸漬道訓成化名儒乃抗禮於王公豈直免於庸陋以是賢人悲寓世之倏忽疾泯沒之無稱感朝聞之弘訓悟通微之無類懼將落之明戒覺罔念之作狂不飽食以終日不棄功於寸隂鑒逝川之勉志悼過隟之電速割遊情之不急損人間之末務洗憂貧之心遣廣願之穢息畋博奕之遊戲矯晝寢坐睡之懈怠知徒思之無益遂振策於聖途學以聚之問以辨之進德修業溫故知新夫周公上聖而日讀百篇仲尼天縱而韋編三絶墨翟大賢載文盈車仲舒命世不窺園門倪寬帶經以藝鉏路生截蒲以寫書黃霸抱桎梏以受業寧子勤夙夜以倍功故能究覽道奧窮測微言觀萬古如同日知八荒若户庭考七耀之盈虛步三五之變化審盛衰之方來驗善否於既往料玄黃於掌握甄未兆以如成故能盛德大業冠於當世清芳令問播于罔極也且夫聞商羊而戒浩漾訪鳥砮而洽東肅咨萍實而言色味訊土狗而識墳羊披靈寶而知山隱因折俎而説專車瞻離畢而分隂陽之候由冬螽而覺閏餘之錯何神之有學而已矣夫童謡猶助聖人之耳目豈况墳索之弘博哉才性有優劣思理有修短或有夙知而早成或有提耳而後喻夫速悟時習者驥騄之腳也遲解晚覺者鶉鵲之翼也彼雖尋飛絶景止而不行則步武不過焉此雖咫尺以進往而不輟則山澤可越焉明暗之學其猶兹乎蓋少則志一而難忘長則神放而易失故修學務早及其精專習與性成不異自然也若乃絶倫之器盛年有故雖失之於暘谷而收之於虞淵方知良田之晚播愈於卒歲之荒蕪也日燭之喻斯言當矣世道多難儒教淪喪文武之軌將遂凋墜或沈溺於聲色之中或驅馳於競逐之路孤貧而精六藝者以遊夏之資而抑頓乎九泉之下因風而附鳳翼者以駑庸之質猶回遑乎霞霄之表舍本逐末者謂之勤修庶幾擁經求己者謂之陸沈迂闊於是莫不蒙塵觸雨戴霜履氷懷黃握白提清潔肥以赴邪徑之近易規朝種而暮穫矣若乃下帷高枕遊神九典精義賾隱味道居靜確乎建不拔之操揚青於歲寒之後不揆世以投迹不隨衆以萍漂者蓋亦鮮矣汲汲於進趨悒悶於否滯者豈能舍至易速達之通塗而守甚難必窮之塞路乎此川上所以無人子襟之所為作愍俗者所以痛心而長慨憂道者所以含悲而頽思也夫寒暑代謝否終則泰文武迭貴常然之數也冀群寇畢滌中興在今七耀遵度舊邦惟新振天惠以廣掃鼓九陽之洪爐運大鈞乎皇極開玄模以軌物陶治庶類匠成翹秀蕩汰積埃革邪反正戢干戈橐弓矢興辟雍之庠序集國子修文德發金聲振玉音降風雲於潛初旅束帛乎丘園令抱翼之鳳奮翮於清虛頂領之駿騁迹於千里使夫含章抑鬱窮覽洽聞者申公伏生之徒發玄纁登蒲輪吐結氣陳立素顯其身行其道俾聖世迪唐虞之高軌馳升平之廣塗玄流沾於九該惠風被乎無外五刑厝而頌聲作和氣洽而嘉穟生不亦休哉昔秦之二世不重儒術舍先聖之道習刑獄之法民不見德唯戮是聞故感而不知反迷之路敗而不知自救之方遂墮墜於雲霄之上而整粉乎不測之下惟尊及卑可無鑒乎抱朴子外篇卷之三
