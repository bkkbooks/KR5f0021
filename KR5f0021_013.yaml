front:
  text: 抱朴子外篇卷之十三
  hash: sha256:81af565899dbe58edcc0832ade08bb77c5f0a900d8fe56dac227da25913968f0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_013-001a, image: hfl/0871/0871-114.png}
body:
  text: 欽士抱朴子曰由余在戎而秦穆惟憂楚殺得臣而晋文乃喜樂毅出而燕壞種蠡入而越霸破國亡家失士者也豈徒有之者重無之者輕而已哉柳惠之墓猶挫元寇之銳況於坐之於朝廷乎干木之隱猶退踐境之攻況於置之於端右乎郅都之象使勁虜振慴孔明之尸猶令大國寢鋒以此禦侮則地必不侵矣以此率師則主必不辱矣是以明主旅束帛於窮巷揚滯羽於瘁林飛翹車於河梁闢四門而不倦不吝金璧不遠千里不憚屈己不恥卑辭而以致賢爲首務得士爲重寳舉之者受上賞蔽之者爲竊位故公旦執贄於白屋秦邵拜昌於張生鄒子涉境而燕君擁篲莊周未食而趙惠竦立晋文接亥唐脚痺而坐不敢正齊佞之造稷丘雖頻繁而不辭其勞楚王受笞於保申簡去甲於公廬彼雖降高抑滿以貴下賤終亦並目以遠其明假耳以廣其聦龍騰虎據宜其然也抱朴子外篇卷之十三
  hash: sha256:4494c50e15d3d69cdc293c6cd693ceb48d7e0196e91c5a2aea5c91fcfa12cb77
