front:
  text: 抱朴子外篇卷之八
  hash: sha256:9c70ec0fa5d6e245288d2cd3ea9f086008f3ce6889a475fc2929239c3e3015ec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_008-001a, image: hfl/0871/0871-098.png}
body:
  text: 時難抱朴子曰盡節無隱者可爲也若夫使言必納而身必安者須時時之否也夫姦凶之徒妬所不逮擁上抑下惡直醜正憂畏公方乏彈擊邪枉是以務除勝己以紓其誅明主不世而出庸君迷於皂白既不能受用忠益或乃宣泄至言於是弘恭石顯之徒飾巧辭以構象似假至公以售私姦令獻長生之術者反獲立死之罪進安上之計者旋受危身之禍故曰非言之難也談之時難也夫以賢說聖猶未必即受故伊尹干湯至干七十也以智告愚則必不入故文王諫紂終於不納也言不見信之猶可也若乃李斯之誅韓非龐涓之刖孫臏上官之毁屈平袁盎之中晁錯不可勝載也爲臣不易豈一塗也哉蓋往而不反者所以功在身後而藏器俟時者所以百無一遇高勳之臣曠代而一有陷氷之徒委積乎史策悲夫時之難遇也如此其甚哉由兹以言吾知渭濱吕尚之儔巖間傅說之屬懷其王佐之器抱其邈世之材秉竿擁築老死於庸兒之伍而遂不遭文王高宗者必不訾矣抱朴子外篇卷之八
  hash: sha256:9a382c2bab52fd7b514697991dac968d4c2b494bd09abd0c0c9be3bbc5d33f4e
