front:
  text: 抱朴子外篇卷之五十志七
  hash: sha256:9147ed002b79e146da8a7d08e2b940aff9ff1dfdf33959635aa0dd5fcaf977c3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_051-001a, image: hfl/0873/0873-186.png}
body:
  text: 自敍抱朴子者姓葛名洪字稚川丹陽句容人也其先葛天氏蓋古之有天下者也後降為列國因以為姓焉洪曩徂為荆州刺史王莽之篡君恥事國賊棄官而歸與東郡太守翟義共起兵將以誅莽為莽所敗遇赦免禍遂稱疾自絶於世莽以君宗强慮終有變乃徙君於琅琊君之子浦廬起兵以佐光武有大功光武踐祚以廬為車騎又遷驃騎大將軍封下邳僮縣侯食邑五千户開國初侯之弟文隨侯征討屢有大捷侯比上書文為訟功而官以文私從兄行無軍名遂不為論侯曰弟與我同冒矢石瘡痍周身傷失右眼不得尺寸之報吾乃重金纍紫何心以安乃自表乞轉封於弟書至上請報漢朝欲成君高義故特聽焉文辭不獲已受爵即弟為驃騎營立宅舍於博望里于今基兆石礎存焉又分割租秩以供奉吏士給如二君焉驃騎殷勤止之而不從驃騎曰此更煩役國人何以為讓乃託他行遂南渡江而家于句容子弟躬耕以典籍自娛又纍使奉迎驃騎驃騎終不還又令人守護博望宅舍以冀驃騎之反至于纍世無居之者洪祖父學無不涉究測精微文藝之高一時莫倫有經國史才仕吳歷宰海鹽臨安山隂三縣入為吏部侍郎御史中丞盧陵太守吏部尚書太子少傅中書大鴻臚侍中光祿勛輔吳將軍封吳壽縣侯洪父以孝友聞行為士表方册所載罔不窮覽仕吳五官郎中正建城南昌二縣令中書郎廷尉平中護軍拜會稽太守未辭而晋軍順流西境不守博簡秉文經武之才朝野之論僉然推君於是轉為五郡赴警大都督給親兵五千總統征軍戍遏疆場天之所懷人不能支故主欽若九有同實君以故官赴除郎中稍遷至太中太夫歷位大中胳鄉令縣户二萬舉州最治德化尤異恩洽刑清野有頌聲路無姦跡不佃公田越界如市秋毫之贈不入于門紙筆之用皆出私財刑厝而禁止不言而化行以疾去官發詔見用為吳王郎中令正色弼違進可替不舉善彈枉軍國肅雍遷邵陵太守卒於官洪者君之第三子也生晚為二親所嬌饒不早見督以書史年十有三而慈父見背夙失庭訓飢寒困瘁躬執耕穡承星履草密勿疇襲又纍遭兵火先人典籍蕩盡農隙之暇無所讀乃負笈徒步行借又卒於一家少得全部之書益破功日伐薪賣之以給紙筆就營田園處以柴火寫書坐此之故不得早涉藝文常乏紙每所寫反覆有字人鮮能讀也年十六始讀孝經論語詩易貧乏無以遠尋師友孤陋寡聞明淺思短大義多所不通但貪廣覽於衆書乃無不暗誦精持曾所披涉自正經諸史百家之言下至短雜文章近萬卷既性暗善忘又少文意志不專所識者甚薄亦不免惑而著述時猶得有所引用竟不成純儒不中為傳授之師其河雒圖緯一視便止不得留意也不喜星書及算術九宫三棋太一飛符之屬了不從焉由其苦人而少氣味也晚學風角望氣三元遁甲六壬太一之法粗知其㫖又不研精亦計此輩率是為人用之事同出身情無急以此自勞役不如省子書之有益遂又廢焉案别録藝文志衆有萬三千二百九十九卷而魏代以來羣文滋長倍於往者乃自知所未見之多也江表書籍通同不具昔故詣京師索竒異而正值大亂半道而還每具嘆恨今齒近不惑素志衰頽但念損之又損為乎無為偶耕藪澤苟存性命耳博涉之業於是日沮矣洪之為人也而騃野性鈍口訥形貌醜陋而終不辨自矜飾也冠履垢弊衣或繿縷而或不恥焉俗之服用俄而屢改或忽廣領而大帶或身促而修袖或長裾曳地或短不蔽腳洪其於守常不隨世變言則率實杜絶嘲戲不得其人終日默然故邦人咸稱之為抱朴之士是以供著書因以自號焉洪禀性尪羸兼之多疾貧無車馬不堪徒行行亦性所不好又患弊俗捨本逐末交游過差故遂撫筆間居守靜蓽門而無趨所之從至於權毫之徒雖在密跡而莫或相識焉衣不辟寒室不免漏食不充虛名不出户不能憂也貧無僮僕籬落頓㳏荆棘叢於庭宇蓬莠塞乎階霤披榛出門排草入室論者以為意遠忽近而不怒其乏役也不曉謁以故初不修見官長至於吊大喪省困疾乃心欲自勉强令無不必至而居疾少揵恆復不周每見譏責於論者洪引咎而不恤也意苟無餘而病使心違顧不愧己而已亦何理於人之不見亮乎唯明鑒之士乃恕其信抱朴非以養高也世人多慕豫親之好推暗至之密洪以為知人甚未易上聖之所難浮雜之交口合神疕無益有損雖不能如朱公叔一切絶之且必須清澄詳悉乃處意焉又為此見憎者甚衆而不改也馳逐苟達側立勢門者又共疾洪之異於己而見疵毁謂洪為傲物輕俗而洪之為人信心而行毁譽皆之於不聞至患近人或恃其所長而輕人所短洪忝為儒者之末每與人言常度其所知而論之不强引之以造彼所不聞也及與學士有所辨識每舉綱領若值惜短難解心義但粗說意之與向使足以發寤而已不致苦理使彼率不待自還也彼靜心者存詳而思之則多自覺而得之者焉度不與言者雖或有問常辭以不知以免辭費之過也洪性深不好于煩官長自少及長曾救知己之抑者數人不得有言於在位者然其人皆不知洪之恤也不忍見其陷於非理密自營之耳其餘雖親至者在事秉勢與洪無惜者終不以片言半字少纍之也至於糧用窮匱急合湯藥則换求朋類或見濟亦不讓也受人之施必皆久久漸有以報之不令覺也非類則不妄受其饋致焉洪所食有旬日之儲則分以濟人之乏若殊自不足亦不割己也不為皎皎之細行不治察察之小廉村里凡人之謂良守善者用時或齎酒肴候洪雖非儔匹亦不拒也後有以答之亦不登時也洪嘗謂史雲不食於昆弟華生治潔於昵客蓋邀名之僞行非廊廟之遠量也洪尤疾無義之人不勤農桑之本業而慕非義之姦利持鄉論者則賣選舉以取謝有威勢者則解符疏以索財或有罪人之賂或枉有理之家或為逋逃之藪而饗亡命之人或挾使民丁妨以公役或强收錢物以求貴價或占錮市肆奪百姓之利或割人田地劫孤弱之業悅恫官府之間以窺掊尅之益內以誇妻妾外以釣名位其如此者不與交焉由是俗人憎洪疾己自然疏絶故巷無車馬之跡堂無異志之賔庭可設雀羅而几筵積塵焉洪自有識逮以將老口不及人之非不說人之私乃自然也雖僕堅有其所短所羞之事不以戲之也未嘗論評人物之優劣不喜訶譴人交之好惡或為尊長所逼問辭不獲已其論人也則獨舉彼體中之勝事而已其論文也則撮其所得之佳者而不指摘其病纍故無毁譽之怨貴人時或問官吏民甲乙何如其清高間能者洪指說其快事其貪暴暗塞者對以偶不識悉洪由比頗見譏責以顧護太多不能明辨臧否使皂白區分而洪終不敢改也每見世人有好論人物者比方倫匹未必當允而褒貶與奪或失准格見譽者自謂己分未必信德也見侵者則恨之入骨劇於血讎洪益己為戒遂不復言及士人矣雖門宗子弟其稱兩皆以付邦族不為輕乎其價數也或以譏洪洪答曰我身在我者也法當易知設令有人問我使自比古人及同時令我自求輩則我實不能自知可與誰為匹也况非我安可為取評定之耶漢末俗弊朋黨分部許子將之徒以口舌取戒爭訟論議門宗成讎故汝南人士無復定價而有月旦之評魏武帝深亦疾之欲取其首爾乃奔波亡走殆至屠滅前鑒不遠可以得師矣且人之未易知也雖父兄不比盡子弟也同乎我者遽是乎異於我者遽非乎或有始無卒唐堯公旦仲尼季札皆有不全得之恨無以近人信其嘍嘍管見熒燭之明而輕人評物是皆賣彼上聖大賢乎昔大安中石冰作亂六州之地柯鎮業靡違正黨逆義軍大都督邀洪為將兵都尉纍見敦迫既桑梓恐虜禍深憂大古人有急疾之義又畏軍法不敢任志遂募合數百人與諸軍旅進曾攻賊之别將破之日錢帛山積珍玩蔽地諸軍莫不放兵收拾財物繼轂連檐洪獨約令所領不得妄離行陳士有托得衆者洪即斬之以徇於是無敢委杖而果有伏賊數百出蕩諸軍諸軍悉發無部隊皆人馬負重無復戰心遂致驚亂死傷狼籍殆欲不振獨洪軍整齊轂張無所損傷以救諸軍之大崩洪有力焉後别戰斬賊小帥多獲甲首而獻捷幕府於是大都督加洪伏波將軍例給布百匹諸將多封閉之或送還家而洪分賜將士及施知故之貧者餘之十匹又徑以市肉酤酒以饗將吏于時竊擅一日之美談焉事平洪投戈釋甲徑詣洛陽欲廣尋異書了不論戰功竊慕魯連不受聊城之金包胥不納存楚之賞成功不處之義焉正遇上國大亂北道不通而陳敏又反於江東歸塗隔塞會有故人譙國嵇居道見用為廣州刺史乃表請洪為參軍雖非所樂然利可避地於南故黽勉就焉見遣先行催兵而居道於後遇害遂停廣州頻為節將見邀用皆不就永惟富貴可以漸得而不可頓合其間屑屑亦足以勞人且榮位勢利譬如寄客既非常物又其去不可得留也隆隆者絶赫赫者滅有若春華須臾凋落得之不喜失之安悲悔吝百端憂懼兢戰不可勝言不足為也且自度性篤懶而才至短以篤懶而御短才雖翕肩屈膝趨走風塵猶必不辦大致名位而免患纍况不能乎未若修松喬之道在我而已不由於人焉將登名山服食養性非有廢也事不兼濟自不絶棄世務則曷緣修習玄靜哉且知之誠難亦不得惜問而與人議也是以車馬之跡不經貴世之城片字之書不交在位之家又士林之中雖不可出而見造之賔意不能拒妨人所作不得專一乃嘆曰山林之中無道也而古之修道者必入山林者誠欲以違遠歡譁使心不亂也今將遂本志委桑梓適嵩嶽以尋方平梁公之軌先所作子書內外篇幸已用功夫聊復撰次以示將來云爾洪年十五六時所作詩賦雜文當時自謂可行至于弱冠更詳省之殊多不稱意天才未必為增也直所覽差廣而覺妍媸之别於是大有所製棄十不存一今除所作子書但雜尚餘百所卷猶未盡損益之理而多慘憤不遑復料護之他人文成乎便快意余才鈍思遲實不能示作文章每一更字輒自轉勝但患懶又所作多不能數省之耳洪年二十餘乃計作細碎小文妨棄功日未若立一家之言乃草創子書會遇兵亂流離播越有所亡失連在道路不復投筆十餘年至建武中乃定凡著內篇二十卷外篇五十卷碑頌詩賦百卷軍書檄移章表箋記三十卷又撰俗所不列者為神仙傳十卷又撰高上不仕者為隱逸傳十卷又抄五經七史百家之言兵事方伎短雜竒要三百一十卷别有目録其內篇言神仙方藥鬼怪變化養生延年禳邪却禍之事屬道家其外篇言人間得失世事臧否屬儒家洪見魏文帝典目自叙未及彈棋擊劍之事有意於略說所知而實不數少所便能不可虛自稱揚今將具言所不間焉洪體鈍性駑寡所玩好自總髮垂髫又擲瓦手搏不及兒童之羣未曾鬭雞鶩走狗馬見人傳戲了不目眄或强牽引觀之殊不入神有若晝睡是以至今不知棋局上有幾道樗蒲齒名亦念此輩末伎亂意思而妨日月在位有損政事儒者則廢講誦凡民則忘稼穡商人則失貝財至於勝負未分交爭都市心熱於中顔愁於外名之為樂而實煎悴喪廉恥之操興爭競之端相取重貨密結怨隙昔宋閔公吳太子致碎首之禍生叛亂之變覆滅七國幾傾天朝作戒百代其鑒明矣每觀戲者慙恚交集手足相及醜詈相加絶交壞友往往有焉怨不在大亦不在小多召悔𠫤不足為也仲尼雖有晝寢之戒以洪較之洪實未許其賢於晝寢何者晝寢但無益而未有怨恨之憂鬭訟之變聖者猶韋編三絶以勤經業凡才近人安得兼修惟諸戲盡不如示一尺之書故因本不喜而不為蓋此俗人所親焉少嘗學射但力少不能挽强若顔高之弓耳意為射既在六藝又可以禦冠辟劫及取鳥獸是以習之昔在軍旅曾手射追騎應絃而倒殺二賊一馬遂以得免死又曾受刀楯及單刀雙戟皆有口訣要術以待取人乃有祕法其巧入神若以此道與不曉者對便可以當全獨勝所向無前矣晚又學七尺杖術可以入白刃取大戟然亦是不急之末學知之譬如麟角鳳距何必用之此已往未之或知洪少有定志决不出身每覽巢許子州北人石户二姜兩袁法真子龍之傳當廢書前席慕其為人念精治五經著一部子書令後世知其為文儒而已後州郡及車騎大將軍辟皆不就薦名琅瑘王丞相府昔起義兵賊平之後了不修名詣府論功主者永無賞報之冀晋王應天順人撥亂反正結皇綱於垂絶修宗廟之廢祀念先朝之滯賞並無報以勸來洪隨例就彼庚寅詔書賜爵關中侯食句容之邑二百户竊詔討賊以救桑梓勞不足録金紫之命非其始願本欲遠慕魯連近引田疇上書固辭以遂微志逼有大例同不見許昔仲由讓應受之賜而沮為善醜虜未夷天下多事國家方欲明賞必罰以彰憲典小子豈敢苟潔區區之懦志而距弘通之大制故遂息意而恭承詔命焉洪既著自叙之篇或人難曰昔王充年在耳順道窮望絶懼身名之偕滅故自紀終篇先生以始立之盛值乎有道之運方將解申公之束帛登枚生之蒲輪耀藻九五絶聲昆吾何憾芬芳之不揚而務老生之彼務洪答曰夫二儀彌邈而人居若寓以朝菌之耀秀不移晷而殄瘁類春華之暫榮未改旬而凋墜雖飛飆之經霄激電之乍照未必速也夫期頤猶奔星之騰炯黃髮如激箭之過隙况或未明而殞籜逆秋而零瘁者哉故項子有含穗之嘆揚烏有夙折之哀歷覽遠古逸倫之士或以文藝而龍躍或以武功而虎踞高勳著於盟府德音被乎管絃形器雖沈鑠於淵壤美談飄颻而日載故雖千百代猶穆如也余以庸陋沉抑婆娑用不合時行舛於世發音則響與俗乖抗足則跡與衆忤內無金張之援外乏彈冠之友循塗雖坦而足無騏驎六虛雖曠而翼非大鵬上不能鷹揚匡國下無顯親垂名名不寄於良史聲不附乎鍾鼎故因著述之餘而為自叙之篇雖無補於窮達亦賴將來之有述焉抱朴子外篇卷之五十
