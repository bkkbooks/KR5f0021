front:
  text: 抱朴子外篇卷之二十七
  hash: sha256:a7c1cf391c63f97ad5078dc5f952c5869f648bb330864b8bfca06e6fec807a30
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_027-001a, image: hfl/0872/0872-096.png}
body:
  text: 刺驕抱朴子曰生乎世貴之門居乎熱烈之勢率多不與驕期而驕自來矣非夫超群之器不辨於免盈溢之過也蓋勞謙虛己則附之者衆驕慢倨傲則去之者多附之者衆則安去之者多則危之診也存亡之機於是乎在輕而為之不亦蔽哉亦有出自卑碎由微而著徒以翕肩斂迹偓伊側立低眉屈膝奉附權豪因緣運會超越不次毛成翼長蟬蛻泉讓便自軒昂目不步足器滿意得視人猶芥或曲宴密集管絃嘈囐後賔填門不復接引或於同造之中偏有所見復未必全得也直以求之差勤以數接有情苞苴繼到壺榼不曠者耳孟軻所謂愛而不敬豕畜之也而多有行諸云是自尊重之道自尊重之道乃在乎以貴下賤卑以自牧非此之謂也乃衰薄之弊俗膏肓之廢疾安共為之可悲者也若夫偉人巨器量逸韻遠高蹈獨往蕭然自得身寄波流之間神躋九玄之表道足於內遺物於外冠摧履决藍縷帶索何肯與俗人競幹佐之便辟修佞幸之媚容效上林喋喋之嗇夫為春蜩夏蠅之聒耳求之以貌責之以妍俗人徒覩其外形之粗簡不能察其精神之淵邈務在皮膚不料心志雖懷英抱異絶倫邁世事動可以悟舉世之術言發足以解古今之惑含章括囊非法不談而茅蓬不能動萬鈞之鏗鏘侏儒不能看重仞之弘麗因而蚩之謂為凡憒夫非漢東之人不能料明珠於泥淪之蚌非泣血之民不能識夜光於重崖之裏蟭螟屯蚊眉之中而笑彌天之大鵬寸鮒游牛迹之水不貴橫海之巨鱗故道業不足以相涉聰明不足以相建理自不合無所多怪所以疾之而不能默者願夫在位君子無以貌取人勉勗謙損以永天秩耳抱朴子曰世人聞戴叔鸞阮嗣宗傲俗自放見謂大度而不量其林力非傲生之匹而慕學之或亂項科頭或祼袒蹲夷或濯腳於稠衆或溲便於人前或停客而獨食或行酒而止所親此蓋左袵之所為非諸夏之快事也夫以戴阮之才學猶以𧿒踔自病得失財不相補向使二生敬蹈檢括恂恂以接物兢兢以御用其至到何適但爾哉況不及之遠者而遵修其業其速禍危身將不移隂何徒不以清德見待而已乎昔西施心痛而卧於道側姿顔妖麗蘭麝芬馥見者咸美其容而念其疾莫不躊躇焉於是鄰女慕之因僞疾伏於路間形狀既醜加之酷臭行人皆憎其貌而惡其氣莫不睨面掩鼻疾趨而過焉今世人無戴阮之自然而效其倨慢亦是醜女暗於自量之類也帝者猶執子弟之禮於三老五更者率人以敬也人而無禮其刺深矣夫慢人必不敬其親也蓋欲人之敬之必見自敬焉不修善事則為惡人無事於大則為小人紂為無道見稱獨夫仲尼陪臣謂為素王則君子不在乎富貴矣今為犯禮之行而不喜聞遄死之譏是負豕而憎人說其臭投泥而諱人言其汙也昔辛有見被髮而祭者知戎之將熾余觀懷𢚢之世俗尚驕褻夷虜自遇其後羌胡猾夏侵掠上京及悟斯事乃先著之妖怪也今天下向平中興有徵何可不共改既往之失修濟濟之美乎夫入虎狼之群後知賁育之壯勇處禮廢之俗乃知雅人之不渝道化淩遲流遁遂往賢士儒者所宜共惜法當扣心同慨矯而正之若力之不能末如之何且當竹柏其行使歲寒而無改也何有便當崩騰競逐彼闒茸之徒以取容於若曹邪去道彌遠可謂為痛歎者也其或俄然守正確爾不移不蓬轉以隨衆不改雅以入鄭者人莫能憎而知其善而斯以不同於己者便共仇讎而不數之嗟乎衰弊乃可爾邪君子聽使以亢亮方楞無黨於俗揚清波以激濁流執徑矢以厲群枉不過當不見容與不得富貴耳天爵苟存於吾體者以此獨立不達亦何苦何恨乎而便當伐本瓦合餔糟握泥𠟃足適履毁方入圓不亦劇乎夫節士不能使人不憎之而道不可屈也不能令人不辱之而行猶在我也不能令人不擯之而操不可改也故分定計决勸沮不能干樂天知命憂懼不能入困瘁而益堅窮否而不悔誠能用心如此者亦安肯草靡萍浮以索鑿枘效乎禮之所弃者之所為哉抱朴子曰聞之漢末諸無徒自相品藻次第群驕慢傲不入道檢者為都魁雄伯四通八達皆背叛禮教而縱肆邪僻訕毁真正中傷非黨口習醜言身行弊事凡所云為使人不忍論也夫古人所謂通達者謂通於道德達於仁義耳豈謂通乎褻黷而達於淫邪哉有似盜跖自謂有聖人之道五者也此俗之傷破人倫劇於寇賊之來不能經久豈所損壞一服而已若夫貴門子孫及在位之士不惜典刑而皆科頭袒體踞見賔客既辱天官又移染庸民後生晚出彼或以經清之資或佻竊虛名而躬自為之則凡夫便謂立身當世莫此之美也夫守禮防者苦且難而其人多窮賤焉恣驕放者樂且易而為者皆速達焉於是俗人莫不委此而就彼矣世間或有少無清白之操業長以買官而富貴或亦其所知足以自飾也其黨與足以相引也而無行之子便指以為證曰彼縱情恣欲而不妨其赫奕矣此敕身履道而不免於貧賤矣而不知榮顯者有幸而頓淪者不遇皆不由其行也然所謂四通八達者愛助附己為之履不及納帶不暇結携手升堂連袂入室出則接膝請會則直致所惠則得多屬託則常聽所欲則必副言論則見饒有患則見救所論薦則蹇驢蒙龍駿之價所中傷則孝己受商臣之談故小人之赴也若决積水於萬仞之高隄而放烈火乎雲夢之枯草焉欲望肅雍濟濟後生有式是猶炙氷使燥積灰令熾矣抱朴子外篇卷之二十七
