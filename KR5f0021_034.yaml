front:
  text: 抱朴子外篇卷之三十四三十五三十六三十七同卷真十二
  hash: sha256:da69f781364399786a0ffa779776a080beb93924e2ad94a6305a13bbf0d03d16
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_034-001a, image: hfl/0872/0872-144.png}
body:
  text: 吳失抱朴子曰吳之杪季殊代同疾知前失之於彼不能改絃於此鑒亂亡之未遠而躡傾車之前軌覩枳首之爭莓而忘同身之禍笑蟣虱之宴安不覺事異而患等見競濟之舟沈而不知殊塗而溺均也余生於晋世所不見余師鄭君具所親悉每誨之云吳之晚世尤劇之病賢者不用滓穢充序紀綱弛紊吞舟多漏貢舉以厚貨者在前官人以黨强者為右匪富匪勢窮年無冀德清行高者懷英逸而抑淪有財有力者躡雲物以官躋主昏於上臣欺於下不黨不得不競不進背公之俗彌劇正直之道遂壞於是斥鷃因驚風以淩霄朽舟託迅波而電邁鴛鳳卷六翮於叢棘鷁首滯潢汙而不擢矣秉維之佐牧民之吏非母后之親則阿諂之人也進無補過拾遺之忠退無聽訟之幹虛談則口吐冰霜行己則濁於泥潦莫愧尸祿之刺莫畏致戎之禍以毁譽為蠶織以威福代稼穡車服則光可以鑒豐屋則群烏爰止叱吒疾於雷霆禍福速於鬼神勢利傾於邦君儲積富乎公室出飾翟黃之衛從入遊玉根之藻梲僮僕成軍閉門為市牛羊掩原隰田池布千里有魚滄濯裘之儉以竊趙宣平仲之名內崇陶侃文信之訾實有安昌董鄧之汙雖造賔不沐嘉㫖之俟飢士不蒙升合之救而金玉滿堂伎妾溢房商販千艘腐穀萬廋園囿擬上林館第僣太極梁肉餘於犬馬積珍陷於帑藏其接士也葭莩之薄其自奉也有盡理之厚或有不開律令之篇卷而竊大理之位不識謹案之所置而處機要之職不知五經之名目而饗儒官之祿不間尺紙之寒暑而坐著作之地筆不狂簡而受駮議之榮低眉垂翼而充奏劾之選不辨人物之精粗而委以品藻之政不知三才之軍勢而軒昂節蓋之下屢為奔北之辱將而不失前鋒之顯號不别菽麥之同異而忝叨顧問之近任夫魚質龍文似是而非遭水而喜見獺即悲雖臨之以斧鉞之威誘之以傾城之寶猶不能奮鉛鋒於犀兕騁駑蹇以追風非不忌重誅也非不悅美賞也體不可力無自奈何而欲與之輯熙百揆弘濟大務猶託萬鈞於尺舟之上求千鍾於升合之中紲芻狗而責盧鵲之效𦃪雞鶩而崇鷹揚之功其不可用亦較然矣吳主不此之思不加夕惕佞諂凡庸委以重任危機急於彍弩亡徵著於日月而自謂安於峙嶽唐虞可仰也目力疲於綺粲而不以覽庶事之得失耳聰盡於淫音而不以證獻言之邪正穀帛靡於不急而不以賑戰士之凍餒心神悅於愛媚而不以念存亡之弘理蓋輕乎崇替之源而忽乎宗廟之重者也鄭君又稱其師左先生隱居天柱山不營祿利不友諸侯然心願太平竊憂桑梓乃慨然永歎於蓬屋之下告其門生曰漢必寢耀黃精載起纘樞紐於太微回紫蓋於鶉首聯天理物光宅東夏惠風被於區外玄澤洽乎宇內重譯接武貢楛侯古切盈庭蕩蕩巍巍格于上下承平守文因循甚易而五絃謐響南風不詠上不獲恭己之逸下不聞康哉之歌飛龍翔而不集淵虬蟠而不躍驎虞翳於冥昧朱華牙而未秀隂陽相沴寒燠繆節七政吉凶陵谷易所殷雷鞫磕於龍潜之月凝霜肅殺乎朱明之運玉燭不照沈醴不涌郊場多壘嘉生不遂其豈他哉誠由四凶不去元凱不舉用者不賢賢者不用也然高概遠量被褐懷玉守靜潔志無欲於物藏器淵𣳹得意遺世非禮不動非時不見困而無悶窮而不悔樂天任命混一榮辱進無悅色退無戚容者固有伏死乎甕牖安肯衒沽以進趨揭其不資之寶以競燕石之售哉孔墨之道昔曾不行孟軻揚雄亦居困否有德無時有自來耳世無離朱皂白混焉時乏管青騏蹇糅焉磧礫積於金匱瑾瑶委乎溝洫匠石緬而遐淪梓豫忽而莫識已矣悲夫我生不辰弗先弗後將見吳土之化為晋域南民之變成北隸也言猶在耳而孫氏輿櫬抱朴子聞之曰二君之言可為來戒故録于篇欲後代知有吳失國匪降自天也若苟諱國惡纖介不貶則董狐無貴於直筆賈誼將受譏於過秦乎抱朴子外篇卷之三十四
