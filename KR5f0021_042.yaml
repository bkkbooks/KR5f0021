front:
  text: 抱朴子外篇卷之四十一四十二四十三四十四四十五同卷志三
  hash: sha256:49b8a6dc959b4420a8d697831fe5261f0b73a994645fe9c676164306664082f5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_042-001a, image: hfl/0873/0873-098.png}
body:
  text: 循本抱朴子曰玄寂虛靜者神明之本也隂陽柔剛者二儀之本也巍峩巖岫者山嶽之本也德行文學者君子之本也莫或無本而能立焉是以欲致其高必豐其基欲茂其末必深其柢鄉黨之友不洽而勤遠方之求涖官之稱不著而索不次之顯是以雖佻虛譽猶狂華千霜以寒曜不崇朝而零瘁矣雖竊大寶於不料冒惟塵以負乘猶鮮介附騰波以高凌顧眄已枯株於危陸矣聖賢孜孜勉之若彼淺近蹻蹻忽之如此積習則忘鮑肆之臭裸鄉不覺呈形之醜自非遁世而無悶齊物於通塞者安能棄近易而尋迂闊哉將救斯弊其術無他徒擢民於巖岫任才而不計也抱朴子外篇卷之四十一
  hash: sha256:d5cf8da4999063ac29dd952cbd1c80913a868f8acb022327a87717253bd5f133
