front:
  text: 抱朴子外篇卷之十六十七十八十九同卷真七
  hash: sha256:aa7d0fb9f294646b947c35ffe14f2daae6e75fb57c0a488e4a556c5dcca8f6c5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_016-001a, image: hfl/0871/0871-156.png}
body:
  text: 交際抱朴子曰余以朋友之交不宜雜浮面而不心揚雄攸譏故雖位顯名美門齊年敵而趨舍異規業尚乖互者未嘗結焉或有矜其先達步高視遠或遺忽陵遲之舊好或簡棄後門之類味或取人以官而不論德其不遭知己零淪丘園者雖才深智遠操清節高者不可也其進趨偶合位顯官通者雖面墻庸瑣必及也如此之徒雖能令壤蟲雲飛斥鷃戾天手捉刀尺口為禍福得之則排冰吐華失之則當春雕悴余代其踧蹐耻與共世窮之與達不能求也然而輕薄之人無分之子曾無疾非俄然之節星言宵征守其門庭翕然諂笑卑辭悅色提壺執贄時行索媚勤苦積久猶見嫌拒乃行因託長者以構合之其見受也則踊悅過於幽繫之遇赦其不合也則懊悴劇於喪病之逮己也通塞有命道貴正直否泰付之自然津塗何足多咨嗟乎細人豈不鄙哉人情不同一何遠邪每為慨然助彼羞之昔莊周見惠子從車之多而棄其餘魚余感俗士不汲汲於攀及至也瞻彼云云馳騁風塵者不懋建德業務本求己而偏徇高交以結朋黨謂人理莫此之要當世莫此之急也以嶽峙獨立者為澀吝疏拙以奴顔婢睞來去聲者為曉解當世風成俗習莫不逐末流遁遂往可慨者也或有德薄位高器盈志溢聞財利則驚掉見竒士則坐睡繿縷杖策被褐負笈者雖文艷相雄學優融玄同之埃芥不加接引若夫程鄭王孫羅裒之徒乘肥衣輕懷金挾玉者雖筆不集札菽麥不辨為之倒屣吐食握髮余徒恨不在其位有斧無柯無以為國家流穢濁於四裔投畀於有北彼雖赫奕刀尺決乎勢力足以移山拔海吹呼能令泥象登雲造其門庭我則未暇也而多有下意怡顔匍匐膝進求交於若人以圖其益悲夫生民用心之不鈞何其遼邈之不肖也哉余所以同生聖世而抱困賤本後顧而不見者今皆追瞻而不及豈不有以乎然性苟不堪各從所好以此存亡豫不能易也或又難曰時移世變古今别務行立乎己名成乎人金玉經於不測者託於輕舟也靈鳥萃於玄霄者扶搖之力也芳蘭之芬烈者清風之功也屈士起於丘園者知己之助也今先生所交必清澄其行業所厚必沙汰其心性孑然隻跱失棄名輩結讎一世招怨流俗豈合和光以籠物同塵之高義乎若比智而交則白屋不降公旦之貴若鈞才而遊則尼父必無入室之客矣抱朴子曰吾聞詳交者不失人而泛結者多後悔故曩哲先擇而後交不先交而後擇也子之所論出人之計也吾之所守退士之志也子云玉浮鳥高皆有所因誠復别理一家之説也吾以為寧作不載之寶不飛之鵬不揚之蘭無黨之士亦損於夜光之質垂天之大含芳之卉不朽之蘭乎且夫名多其實位過其才處之者猶鮮免於禍辱交之者何足以為榮福哉由兹論之則交彼而遇者雖得達不足貴芘之而悮者譬如蔭朽樹之被笮也彼尚不能自止其顛蹙亦安能救我之碎首哉吾聞大丈夫之自得而外物者其於庸人也蓋逼迫不獲已而與之形接雖以千計猶蚤虱之積乎衣而贅疣之攢乎體也失之雖以萬數猶飛塵之去嵩岱鄧林之墮朽條耳豈以有之為益無之覺損乎且夫朋友也者必取乎直亮多聞拾遺斥謬生無請言死無託辭終始一契寒暑不渝者然而此人良未易得而或默語殊塗或憎愛異心或盛合衰離或見利忘信其處今也譬猶禽魚之結侣冰炭之同器欲其久合安可得哉夫父子天性好惡宜鈞而子政子駿平論異隔南山伯竒辨訟有無面别心殊其來尚矣總而混之不亦難哉世俗之人交不論志逐名趨勢熱來冷去見過不改視迷不救有利則獨專而不相分有害則苟免而不相恤或事便則先取而不讓值機會則賣彼以安此凡如是則有不如無也天下不為盡不中交也率於為益者寡而生纍者衆知人之明上聖所難而欲力厲近才短於鑒物者務廣其交又欲使悉得可與經夷險而不易情歷危苦而相負荷者吾未見其可多得也雖搜琬琰於培塿之上索鸞鳳乎鷦鷯之巢未為難也吾亦豈敢謂藍田之陽丹穴之中為無此物哉亦直言其稀己矣夫操尚不同猶金沉羽浮也志好之乖次猶火升而水降也苟不可同雖造化之靈大塊之匠不可使同也何可強乎余餐稟訥騃加之以天挺篤懶諸戲弄之事彈棋博奕皆所惡見及飛輕走迅遊獵傲覽咸所不為殊不喜嘲褻凡此數者皆時世所好莫不耽之而余悉闕焉故親交所以尤遼也加以挾直好吐忠盡藥石所集甘心者鮮又欲勉之以學問諫之以馳競止其樗蒲節其沉湎此又常人所不能悅也毁方瓦合違情偶俗人之愛力其所不堪而欲好日新安可得哉知其如此而不辨改之可不謂之暗於當世拙於用大乎夫交而不卒合而又離則兩受不弘之名俱失克終之美夫厚則親愛生焉薄則嫌隙結焉自然之理也可不詳擇乎為可臨觴拊背執手須臾欲多其數而必其全吾所懼也或曰然則都可以無交乎抱朴子答曰何其然哉夫畏水者何必廢舟揖忌傷者何必棄斧斤交之為道其來尚矣天地不交則不恭上下不交即乖志夫不泰則二氣隔并矣志乖則天下無國矣然始之甚易終之竟難患乎所結非其人敗於爭小以忘大也易美金蘭詩詠百朋雖有兄弟不如友生切思三益大聖所嘉門人所以增親惡言所以不至管仲所以免誅戮而立霸功子元所以去亭長而驅朱軒者交之力也單絃不能發韶夏之和音孑色不能成衮龍之瑋燁一味不能合伊鼎之甘獨木不能致鄧林之茂玄圃極天蓋由衆石之積南溟浩漾實須群流之赴明鏡舉則傾冠見矣羲和照則曲影覺矣櫽括修則枉刺之疾消矣良友結則輔仁之道弘矣達者知其然也所企及則必簡乎勝己所降結必料乎同志其處也則講道進德其出也則齊心比翼否則鈞魚釣之業泰則協經世之務安則有以精義危則有以相恤耻令談青專面地之篤不使王貢擅彈冠之美夫然故交道可貴也然實未易知勢利生去就毁壞刎頸之契漸漬釋膠漆之堅於是有忘素情之綢歎或睚五懈切眥音責而不思遂令元伯巨卿之好獨著於昔張耳陳餘之變屢構於今推往尋來良可歎也夫梧禽不與鴟梟同枝麟虞不與豺狼連群清源不與濁潦混流仁明不與凶暗同處何者漸染積而移直道暴迫則生害也或人曰敢問善交之道可得聞乎抱朴子答曰君子交絶猶無惡言豈肯向所異辭乎殺身猶以許友豈名位之足競乎善交狎而不慢和而不同見彼有失則正色而諫之告我以過則速改而不憚不以忤彼心而不言不以逆我耳而不納不以巧辨飾其非不以華辭文其失不形同而神乖不匿情而口合不面從而背憎不疾人之勝己護其短而引其長隱其失而宣其得外無計數之諍內遺心競之纍夫然故鹿鳴之好全而伐木之刺息若乃輕合而不重離易厚而不難薄始如形影終為參辰至歡變為篤恨接援化成讎敵不詳之悔亦無以往者漢季陵遲皇轡不振在公之義替紛競之俗成以違時為清高以救世為辱身尊卑禮壞大倫遂亂在位之人不務盡節委本趨末背實尋聲王事廢者其譽美姦過積者其功多莫不飛輪兼策星言假寐冒寒觸暑以走權門市虛華之名於秉勢之口買非分之位於賣官之家或爭所欲還相屠滅於是公叔偉長疾其若彼力不能正不忍見之爾乃發憤著論杜門絶交斯誠感激有為而然蓋矯柱而過正非經常之永訓也徒當遠非類之黨愼諂黷之源何必祼袒以跪彼己斷粒以刺玉食哉夫反之為非重諫而不止遂至大亂故禮義之所棄可以絶矣抱朴子外篇卷之十六
