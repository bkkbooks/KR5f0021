front:
  text: 抱朴子外篇卷之十七
  hash: sha256:30e7f6950d3c387876fe2abf552245f3e65c2f622082a840668fc1603f219834
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_017-001a, image: hfl/0871/0871-172.png}
body:
  text: 備闕抱朴子曰騕裊於皎切駿馬也能奮蘭筋以絶景而不能履冰以乘深猛虎能似雷霆以搏噬而不能踊雲霧以淩虛鴻鶤不能振翅於籠罩之中輕鷂不能電擊於几筵之下物既然矣人亦如之故能調和隂陽者未必能兼百行修簡書也能敷五邁九者不必能全小潔經曲碎也惠子上相之摽也而不能役舟橄以凌陽侯漢高神武之傑也而不能治産業端檢栝淮隂良將之元也而不能修農商免飢寒周勃社稷之鯁也而不能答錢穀責獄辭若以所短弃所長則逸儕拔萃之才不用矣責其體而論細禮則匠世濟民之勳不著矣天下能平其西北地不能隆其東南日月不能摛光於曲穴衝風不能揚波於井底擲齒則松檟不及一寸之筳桃耳則楝梁不如鷦鷯之羽彈鳥則千金不及丸泥之用縫緝則長劍不及數分之針何必伏巨象而捕鼠制大鵬以司晨乎故姜牙賣煦無所售而見師於文武蔣生憒慢於百里而獨步三槐抱朴子外篇卷之十七
  hash: sha256:2c2b541c2af5838ef393e55b5069a0151347632096363bd2a6b0e057860ad1ae
