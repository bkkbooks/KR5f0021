front:
  text: 抱朴子外篇卷之二十一
  hash: sha256:f3e8b21c61e68ed60358cbd41323cc328ac5a79f06368080f0a8d08c1c8efd5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_021-001a, image: hfl/0872/0872-022.png}
body:
  text: 清鑒抱朴子曰咸謂勇力絶倫者則上將之器洽聞治亂者則三九之才也然張飛關羽萬人之敵而皆喪元辱主授首非所孔融邊讓文學邈俗而並不達治務所在敗績鄧禹馬援田間諸生而善於用兵蕭何曹參不涉經誥而優於宰輔爾則知人果未易也欲試可乃已則恐成折足覆餗欲聽言察貌則或似是而非真僞混錯然而世人甚以為易經耳過目謂可精盡余甚猜焉未敢許也區别臧否瞻形得神存乎其人不可力為自非眀並日月聽聞無音者願加清澄以漸進用不可頓任輕假利器收還之既甚難所損者亦以多矣無以一事暗保其餘同乎己者未必可用異於我者未必可忽也或難曰夫在天者垂象在地者有形故望山度水則高深可推風起雲飛則吉凶可步智者覩木不瘁則悟美玉之在山覿岸不枯則覺明珠之沉淵彗星出則知鱣魚之方死日月蝕則識騏驎之共鬭華霍不須稱而無限之重可知矣江河不待量而不測之數已定矣鴻鵠之翼騄騏之足雖未飛走輕迅可必也豪曹之劍徐氏匕首雖未奮擊其立斷無疑也駮子有吞牛之容鶚鷇有淩鷙之貌卉茂者土必沃魚大者水必廣虎尾不附狸身象牙不出鼠口叔魚無厭之心見於初生之狀食我滅宗之徵著乎開胞之始申童覺竊妻之巫臣張負知將貴之陳平范子所以絶迹於五湖者以句踐蜂目而鳥喙也趙人所以息意於爭鋒者以白起首鋭而視直也文王之接吕尚桑隂未移而知其足師矣玄德之見孔明晷景未改而腹心已委矣郭泰中才猶能知人故入潁川則友李元禮到陳留則結符偉明入外黃則親韓子助至蒲亨則師仇季知止學舍則收魏德公觀耕者則拔茅季偉竒孟敏於擔負戒元艾之必敗終如其言一無差錯必能簡精鈍於符表詳舒急乎聲氣料明暗於舉厝察清濁於財色觀取與於宜適謂虛實於言行考操業於閨閫校始終於信效善否之驗不其易乎抱朴子答曰余非謂人物了不可知知人挺無形理也徒以斯術存乎大明非夫當人自許然而世士各謂能之是以有云以警付任耳夫貌望豐偉者不必賢而形器尪瘁者不必愚咆哮者不必勇淳淡者不必怯或外候同而用意異或氣性殊而所務合非若天地有常候山川有定止也物亦故有遠而易知近而難料譬猶眼能察天衢而不周項領之間耳能聞雷霆不能識蟻虱之音也唐吕樊許善於相人狀唯知壽夭貧富官祑尊卑而不能審情性之寬剋志行之汙隆惟帝難之况庸人乎而吾子舉論形之例詰精神之談未修其本殆失指矣夫亡射之箭皆破秋毫然準的恆不得為工叔向之毋申氏之子非不一得然不能常也陶唐稽古而失任姬公欽明而謬授尼父遠得崇替於未兆近失淡臺於形骸延州審清濁於千載之外而蔽竒士於咫尺之內知人之難如此其甚郭泰所論皆為此人過上聖乎但其所得者顯而易識其所失者人不能紀且夫所貴貴乎見俊才於無名之中料逸足乎吳坂之間掇懷珠之蚌於九淵之底指含光之珍於積石之中若伯喈識絶音之器於煙燼之餘平子剔逸響之竹於未用之前六軍之聚市人之會暫觀一覩無所眩惑探其潜生之心計定其始終之事行乃為獨見不傳之妙耳若如未論必俟考其操蹈之全毁觀其云為之好醜此為絲線既經於銓衡布帛已歷於丈尺徐乃說其斤兩之輕重端匹之修短人皆能之何煩於明哲哉抱朴子外篇卷之二十一
