  - {type: variant, offset: 2904, length: 0, content: '', WYG: 逸民第二抱朴子曰余昔遊乎雲臺之山而造逸民遇仕人在焉仕人之言曰明明在上總御八紘華夷同歸要荒服事而先生遊栢成之遐武穆羣黎於鳥獸然時移俗異世務不拘故木食山棲外物遺累者古之清高今之逋逃也君子思危於未形絶禍於方來無乃去張毅之内勢玩單豹之外害畏盈抗慮忘亂羣之近憂避牛跡之淺嶮而墮百仭之不測違濡足之泥涇投鑪冶而不覺乎逸民答曰夫銳志於雛鼠者不識騶虞之用心勝務於庭粒者安知鴛鸞之逺指猶焦螟之笑雲鵬朝菌之怪大椿坎蛙之疑海鼈蛇之嗤應龍也子誠喜懼於勸沮焉識𤣥曠之髙韻哉吾幸生於堯舜之世何憂不得此人之志乎仕人曰昔狂狷華士意不爭上𨼆於海隅而太公誅之吾子沈遁不亦危乎逸民曰吕尚長於用兵短於為國不能儀𤣥黄以覆載擬海嶽以博納襃賢貴徳樂育人才而甘於刑戮不修仁義故其刼殺之禍萌於始封周公聞之知其無國也夫攻守異容道貴知變而吕尚無烹鱗之術出致逺之御推戰陳之法嫉髙尚之士可謂賴甲胄以完刃又兼之浮泳以射走之儀又望求之於凖的者也夫傾庻鳥之巢則靈鳯不集漉魚鼈之池則神虬遐逝刳凡獸之胎則麒麟不峙其郊害一介之士則英傑不踐其境吕尚創業垂統以示後人而張苛酷之端開殘賊之軏適足以驅俊民以資他國逐賢能以遺讐敵也去彼市馬骨以致駿足軾陋巷以退秦兵者不亦逺乎子謂吕尚何如周公乎士人曰不能審也逸民曰夫周公大聖以貴下賤吐哺握髮懼於失人從白屋之士七十人布衣之徒親執贄所師見者十人所友者十有二人皆逼以在朝也設令吕尚居周公之地則此等皆成市朝之暴尸而溝澗之腐胔矣唐堯非不能治致許由巢父也虞舜非不能脅善卷石户也夏禹非不能逼伯成子髙也成湯非不能録卞隨務光也魏文非不能屈干木也晉平非不能吏亥唐也然尊而肆之貴而重之豈六君之小弱也誠以百行殊尚黙黙難齊慕尊賢之美稱耻賊善之醜迹取之不足以増威放之未憂於官曠從其志則可以闡𢎞風熙隆退讓厲茍進之貪夫感輕薄之冐昧雖器不益於旦夕之用才不周於立朝之俊不亦愈於脅肩低眉諂媚權右提贄懷貨宵征同塵爭津競濟市買名品棄徳行學文之本赴雷同比周之末也彼六君尚不肯苦言以侵𨼆士寧肯加之刃乎聖賢誠可師者吕尚居然謬矣漢高帝雖細行多闕不涉典藝然其𢎞曠恢廓善恕多容不繫近累盖豁如也雖饑渇四皓而不逼也及太子卑辭致之以為羽翼便敬徳矯情惜其大者發黃鵠之悲歌杜婉妾之覬覦其珍賢貴𨼆如此之至宜其以布衣而君四海其度量盖有過人者矣且夫吕尚之殺狷華者在於恐其沮衆也然俗之所患者病乎躁於進趨不務行業耳不苦於安貧樂賤者之大多也假令𨼆士往往屬目至於情掛勢利志無止足者終莫能割此常慾而慕彼退靜者也開闢已降非少人也而忘富遺貴之士猶不能居萬分之一仲尼親受業於老子而不能修其無為子貢與原憲同門而不能模其清苦四㐫與巢由同時王莾與二龔共世而不能效也凡民雖復笞督之危辱之使追狷華猶必不肯乃反憂其壞俗耶吕尚思不及此以軍法治平世枉害賢人酷誤已甚矣賴其功大不便以至顛沛耳且吕尚之未遇文王也亦曽𨼆於窮賤凡人易之老婦逐之賣傭不售屠釣無獲曽無一人慕之其避世也何獨慮狷華之沮衆邪設令殷紂亦去逃遁収而斂之尚臨死豈能自謂罪所應邪魏武帝亦刑罰法嚴峻果於殺戮乃心欲用乎孔明明自陳不樂出身武帝謝遣之曰義不使高世之士辱於汙君之朝也其鞭撻九有草創皇基亦不妄矣紛擾日久求競成俗或推貨賄以龍躍或階黨援以鳯起風成化習大道漸蕪後生昧然儒訓遂湮將為立身非財莫可茍有卓然不羣之士不出户庭潜志味道誠宜優訪以興謙退也夫使孫呉荷戈一人之力耳用其計術則賢於萬夫今令大儒為使不必切事肆之山林則能陶冶童蒙闡𢎞禮敬何必服巨象使捕鼠韝鸞也則鐘鼎鐫其聲若乃零淪藪澤空生徒死亦安足貴乎逸民答曰子可謂守培塿玩狐丘未登閬風而臨雲霓翫瀅汀游潢洿未浮南溟而涉天漢凡所謂志人者不必在乎禄位不必須乎勛伐也太上無已其次無名能振翼以絶羣迹以絶軏為常人所不能為割近才所不能割少多不為凡俗所量恬粹不為名位所染淳風足以濯百代之高標足以激將來之濁何必紆朱曵紫服冕乘軺被犧牛之文繡吞詹何之香餌朝為張天之炎熱夕成氷泠之委灰夫斥鷃不以蓬榛易雲霄之表王鮪不以幽岫滄海之曠虎豹入廣厦而懷悲鴻鶤登嵩巒而含慼物各有心安其所長莫㤗於得意而慘於失所也經世之士悠悠皆是一日無君惶惶如也譬猶藍田之積玉鄧林之多材良工大匠肆意所用亦何必棲魚而沈鳥哉嘉遁高蹈先聖所許或出或處各從攸好盖士之所貴立徳立言若夫孝友仁義操業清高可謂立徳矣窮覽墳索著述粲然可謂立言矣夫善卷無治民之功未可謂之减於俗吏仲尼無攻伐之勲不可以為不及於韓白矣身名並全謂之為上𨼆居求志先民加焉夷齊一介不合變通古人嗟嘆謂不降志辱身不降者明𨼆逸之為高也不辱者知覊縶之為汚也聖人之清者孟軻所美亦云天爵貴於印綬志修遺榮孫卿所尚道義既重可輕王公而世人所畏唯勢所重唯利盛徳身滯便謂庸人器小任大便為高士或有乘危冐險投死忘生棄遺體於萬仭之下邀榮華乎一朝之間比夫輕四海愛頸毛之士何其然邪仕人曰潜退之士得意山澤不荷世貴蕩然縱肆不為時用嗅祿利誠為天下無益之物何如逸民答曰夫麟不吠守鳯不司晨騰黄不引犂尸祝不治庖也且夫楊大明乎無外宣嫗煦之和風者日也耀華燈於閒夜治金石以致用者火也天下不可以經時無日不可以一旦無火然其大小不可同也江海之外彌綸二儀升為雲雨降成百川而朝夕之用不及累仭之井灌田溉園未若溝之沃校其巨細孰為曠哉桀紂帝王也仲尼陪臣也今見比於桀紂則莫不怒焉見擬於仲尼則莫不恱焉爾則貴賤果不在位也故孟子云禹稷顔淵易地皆然矣宰予亦謂孔子賢於堯舜逺矣夫匹庻而鈞稱於王者儒生高極乎唐虞者徳而已矣何必官哉且夫曜靈升於造化運天地於懷抱恢恢然世故不棲於心術茫茫然寵辱不泊其純白流俗之所欲不能樂其神近人之所惑不能移其志榮華猶贅疣也萬物猶蜩翼也若是者其肯詰屈其支體俯仰其容儀挹酌於其所不喜修索於其所棄遺怡顔以取進曲公以避退恐俗人之不恱慼我身之凌遲屈龍淵為錐鑚之用抑靈鼖為鼗鼙之音推黄鉞以適釤鎌之持撓華旗以入林杞之下乎古公杖䇿而捐之越翳入穴以迯之季札退耕以委之老萊灌園以逺之從其所好未與易也故醇而不雜斯則富矣身不受役斯則貴矣若夫剖符有土所謂禄利耳非富貴也且夫官高者其責重功大者人忌之獨有貧賤莫與我爭可得長寳而無憂焉濯裘布被㧞葵去織㹠不掩豆菜肴糲飡又獲逼下邀偽之譏樹塞反坫三歸玉食禳侯之富安昌之泰則有僣上汙濁之累未若遊神典文吐故納新求飽乎耒耜之端索緼乎杼軸之間腹仰河而已滿身集一枝而餘安萬物芸芸化為埃塵矣饘粥餬口布褐緼袍淡泊肆志不憂不喜斯為尊樂喻之無物也夫仕也者欲以為名邪則修毫可以寄姓字何假乎良史何須乎鑱鼎哉孟子不以矢石為功揚雲不以致民益世求仁而得不亦可乎仕人又曰𨼆遁之士則為不臣亦豈宜居君之地食君之穀乎逸民曰何謂其然乎昔顔回死魯定公將躬弔焉使人訪仲尼仲尼曰凡在邦内皆臣也定公乃升自東階行君禮焉由此論之率土之濵莫匪王臣可知也在朝者陳力以秉事山林者循徳以厲貪清濁殊塗同歸俱人臣也王者無外天下為家日月所照雨露所及皆其境也安得懸虚空食咀流霞而使之不居乎地食乎穀哉夫山之金玉水之珠貝雖不在府庫之中不給朝夕之用然皆君之財也退士不居肉食之列亦猶山水之物也豈非國有乎許由不竄於四海之外四皓不走於八荒之表也故曰萬邦黎獻共惟帝臣干木不荷戈戍境築壘疆場而有蕃魏之功今𨼆者潔行篳之内以詠先王之道使民知退讓儒墨不替此亦堯舜之所許也昔夷齊不食周粟鮑焦死於橋上彼之硜硜何足師表哉昔安帝以𤣥纁玉帛聘周彦祖桓帝以𤣥纁玉帛聘韋休明順帝以𤣥纁玉帛聘楊仲宣就拜侍中不到魏文帝徵管幼安不至又就拜光禄勲竟不到乃詔所在常以八月致羊一口酒二斛桓帝𤣥纁玉帛聘徐孺子就拜太原太守及東海相不到順帝以𤣥纁玉帛聘樊季高不到乃詔所在常以八月致羊一口酒二斛又賜几杖待以師傅之禮獻帝時鄭康成州辟舉賢良方正茂才公府十四辟皆不就公車徵右中郎博士趙相侍中大司農皆不起昭帝公車徵韓福到賜帛五十疋及羊酒法高卿再舉孝亷本州五辟公府八辟九舉賢良博士三徴皆不就桓帝以𤣥纁玉帛安車軺輪聘韓伯休不到以𤣥纁玉帛安車軺輪聘姜伯雅就拜太中大夫㨗為太守不起然皆見優重不加威辟也若此諸帝襃𨼆逸之士不謬者則吕尚之誅華士為㐫酷過惡斷可知矣仕人乃悵然自失慨爾永歎曰始悟超俗之理非庸瑣所見矣勗學第三抱朴子曰夫學者所以清澄性理簸揚埃雕鍜鑛璞礱鍊屯鈍啟道聰明餙染質素察往知來博涉勸成仰觀俯察於是乎在王道於是乎備進可以為國退可以保己是以聖賢罔不孜孜而勤之夙夜以勉之漏盡日中而不釋饑寒危困而不廢豈以有求於當世哉誠樂之自然也夫斵削刻畫之薄伎射御騎乘之易事猶須慣習然後能善況乎人理之曠道徳之逺隂陽之變鬼神之情緬邈𤣥奥誠難生知雖云色白匪染弗麗雖云味甘匪和弗美故瑶華不琢則耀夜之景不發丹鍔不淬則純鈎之勁不就火則不鑚不生不扇不熾水則不决不流不積不深故質雖在我而成之由彼也登閬風捫晨極然後知井谷之闇隘也披六經玩百氏然後覺靣牆之至困也夫不學而求知猶願魚而無網焉心雖勤而無獲矣廣博以窮理猶順風而託焉體不勞而致逺矣粉黛至則西施以加麗而宿瘤以藏醜經術深則髙才者洞逸鹵鈍者惺悟文梓干雲而不可以臺榭者未加班輸之結構也天然爽明而不可謂之君子者不識大倫之臧否也欲超千里於終朝必假退影之足欲淩洪波而遐濟必因艘楫之器欲見無外而不下堂必由之乎載籍欲測淵㣲而不役神必得之乎明師故朱緑所以改素絲訓誨所以移蒙蔽披𤣥雲而揚大明則萬物無𨼆其狀矣舒竹帛而考古今則天地無藏其情矣況於鬼神乎而況於人事乎泥塗可令齊堅乎金玉曲木可攻之以應䋲墨百獸可教之以戰陳六畜可習之以進退沉鱗可動之以聲音機石可感之以精誠又況乎含五常而禀最靈者哉低仰之駟教之功也鷙擊之禽習之馴也與彼凡馬野鷹本實一𩔖此以餙貴彼以質賤運行潦而勿輟必混流乎滄海矣崇一簣而弗休必鈞高乎峻極矣大川滔瀁則虬螭羣游日就月將則徳立道備乃可以止夢乎丘旦何徒解桎乎困蒙哉昔仲由冠鷄帶㹠䨥珥鳴蟬杖劍而見拔刄而舞盛稱山之勁竹欲任掘强之自然尼父善誘染以徳教遂成升堂之生而登四科之哲子房鄙人而灼聚㐫猾漸漬道訓成化名儒乃抗禮於王公豈直免於庸陋以是賢人悲寓世之倐忽疾泯沒之無稱感朝聞之𢎞訓思通㣲之無𩔖懼將落之明戒覺罔念之作狂不飽食以終日不棄功於寸隂鑒逝川之勉志悼過隙之電速割遊情之不急損人間之末務洗憂貧之心遣廣願之息畋獵博奕之逰戯矯晝寢坐睡之懈怠知徒思之無益遂振䇿於聖途學以聚之問以辨之進徳修業温故知新夫周公上聖而日讀百篇仲尼天縱而韋編三絶墨翟大賢載文盈車仲舒命世不窺園門倪寛帶經以芸鉏路生截蒲以寫書黄霸抱桎梏以受業甯子勤夙夜以倍功故能究覽道奥窮測㣲言觀萬古如同日知八荒若户庭考七耀之盈虚步三五之變化審盛衰之方來驗善否於徃昔料𤣥黄於掌指甄未兆以如成故能盛徳大業冠於當世清芳令問播於罔極也且夫聞商羊而戒浩瀁訪鳥砮而洽東肅諮萍實而言色味訊土狗而識墳羊被靈寳而知山𨼆因折爼而説專車瞻離畢而分隂陽之候由冬螽而覺閏餘之錯何神之有學而已矣夫童謡猶助聖人之耳目豈況墳索之𢎞博哉才性有優劣思理有修短或有夙知而早成或有提耳而後喻夫速無時習者騄之足也遲解晚覺者鶉鵲之翼也彼雖尋飛絶景止而不行則步武不過焉此雖止咫尺以進往而不輟則山澤可越焉明暗之學其猶兹乎盖少則志一而難忘長則神放而易失故修學務早及其精專習與性成不異自然也若乃絶倫之器盛年有故雖失之於暘谷而収之於虞淵方知良田之晚播愈於卒嵗之荒蕪也日燭之喻斯言當矣世道多難儒教淪喪文武之軌將隨凋墜或沉溺於聲色之中或驅馳於競逐之路孤貧而精六藝者以㳺夏之資而抑頓乎九泉之下因風而附鳯翼者以駑庸之質猶或翔乎霞霄之表舎本逐末者謂之勤修庻幾擁經求己者謂之陸沈迂濶於是莫不蒙塵觸雨戴霜履氷懷黄握白提清絜肥以赴邪徑之近易規朝種而暮穣矣若乃下帷高枕逰神九典㳺藝義賾𨼆味道居精乎建不拔之操揚青於嵗寒之後不揆世以投迹不隨衆以萍漂者盖亦鮮矣汲汲於進趨悒悶於否滯者豈能舎至易達之通途而守甚難必窮之塞路乎此川上所以無人子衿之所為作愍俗者所以痛心而長慨憂道者所以含悲而頺思也夫寒暑代謝否終則泰文武迭貴常然之數也冀羣冦畢滌中興在今七耀遵度舊邦惟新振天恵以廣掃鼔九陽之洪爐運大鈞乎皇極開𤣥模以軌物陶冶庶𩔖匠成翹秀蕩汰積埃革邪反正戢干戈櫜弓矢興辟雍之庠序集國子修文徳發金聲振玉音降風雲於前初旅束帛乎丘園令抱翼之鳯奮翔於清虚項領之駿騁迹於千里使夫含章抑鬱窮覽洽聞者申公伏生之徒發𤣥纁登蒲輪起結氣陳立素顯其身行其道俾聖世迪唐虞之高軏馳升平之廣塗𤣥流沾於九垓恵風被乎無外五刑厝而頌聲作和氣洽而嘉穟生不亦休哉昔秦之二世不重儒術舎先聖之道習刑獄之法民不見徳唯戮是聞故惑而不知反迷之路敗而不知自救之方隨墮墜於雲霄之上而薤粉乎不測之下為尊及卑可無鑒乎崇教第四抱朴子曰澄視於秋毫者不見天文之煥炳耽心於細務者不覺儒道之𢎞逺翫鮑者忘茝蕙迷大者不能反夫受䋲墨者無枉刳之木染道訓者無邪僻之人餙治之術莫良乎學學之廣在於不倦不倦在於固志志茍不固則貧賤者汲汲於營生富貴者沉淪於逸樂是以遐覽淵博者曠代而時有面牆之徒比肩而接武也若使素士則晝躬耕以餬口夜薪火以修業在位則以酣宴之餘暇時逰觀於勸誡則世無顓愚游夏不乏矣亦有饑寒切己藜藿不給膚困風霜口乏糟糠出無從師之資家有旦暮之急釋耒則農事廢執卷則供養虧者雖闕學業可恕者也所謂千里之足困於鹽車之下一刀之鑛不經歐冶之門者也若夫王孫公子優㳺貴樂婆娑綺紈之間不知稼穡之艱難目倦於𤣥黄耳疲乎鄭衛鼻饜乎蘭麝口爽於膏粱冬蹈貂狐之温麗夏縝紗縠之翩飄出驅慶封之輊軒入宴蓽房之燦蔚飾朱翠於楹梲積無已於箧匱陳妖冶以娯心湎醁以沉醉行為㑹飲之魁坐為博奕之帥省文章既不曉覩學士如草芥口筆乏乎典據牽引錯於事𩔖劇談則方戰而已屈臨疑則未老而憔悴雖菽麥之能辯亦奚别乎瞽瞶哉抱朴子曰盖聞帝之元儲必入太學承師問道齒於國子者已知為臣然後可以為君知為子然後可以為父也故學立而仕不以政學操刀傷割鄭喬所嘆觸情縱欲謂之非人而貴㳺子弟生乎深宫之中長乎婦人之手憂懼之勞未常經心或未免於襁褓之中而加青紫之官纔勝衣冠而居清顯之位操殺生之威提黜陟之柄榮辱决於與奪利病感於唇吻愛惡無時暫乏毁譽括厲於耳嫌疑象𩔖似是而非因機㑹以坐無端借素信以設巧言交傋之變千端萬緒巧弄所不能詳毫墨所不能究也無術學則安能見邪正之真偽且古今之行事自悟之理無所感假能無傾巢覆車之禍乎先哲居髙不敢忘危愛子欲教之義方雕琢切磋弗納於邪偽選明師以象成之擇良友以漸染之督之以博覽示之以成敗使之察往以悟來觀彼以知此驅之乎直道之上歛之乎檢括之中凛乎若跟掛於萬仞慄然有如乘奔以履氷故能多逺悔吝保其貞吉也昔諸竇蒙道教之福霍禹受率意之禍中山東平以好古而安燕刺由面牆而危前事不忘今之良鑒也湯武染乎伊吕其興勃然辛癸染乎推崇其忘忽焉朋友師傅尤宜精簡必收寒素徳行之士以清苦自立以不羣見憚者其經術如仲舒桓榮者强直若龔遂王吉者能朝夕講論忠孝之至道正為証存亡之軌迹以洗濯垢閑邪矯枉宜必抑情遵憲法入徳訓者矣漢之末世呉之晚年則不然焉望冠盖以選用任朋黨之華譽有師友之名無拾遺之實匪為無益乃反為損故其所講說非道徳也其所貢進非忠益也唯在於新聲艶色輕體妙手評歌謳之清濁理管絃之長短相狗馬之勁駑議遨遊之處所比錯塗之好惡方雕琢之精麄校彈棊木摴蒱之巧拙計漁獵相掊之勝負品藻妓妾之妍指摘衣服之野鄙争騎乘之善否論弓劍之踈宻招竒合異至於無限盈溢之過日増月甚其談宫殿則逺擬瑶臺瓊室近效阿房靈光以千門萬户為局促以昆明太液為淺陋笑茅茨為不肖以土堦為朴騃民力竭於功役儲蓄靡於不急起土山以准嵩霍决渠水以象九河登淩霄之華觀闢雲際之綺窓淫音譟而惑耳羅袂揮而亂目濮上北里迭奏迭起或號或呼俾晝作夜流連於羽觴之間沉淪於絃節之側或建翠翳之菁䓤或射勇禽於郊坰馳輕足於嶮峻之址暴僚𨽻於盛日之下舉火而往乘星而返機事廢而不修賞罰棄而不治或浮文艘於滉瀁布宻網於緑川垂香餌於漣潭縱擢歌於清淵飛高繳以下輕鴻引沈綸以拔潜鱗或結罘於林麓之中合重圍於山澤之表列丹飈於風草騁逸騎於平原從盧狗以噬狡獸飛輕鷂以鷙翔禽勁弩殪狂兕長㦸斃熊虎如此既彌年而不厭歴載而無已矣而又加之以四時請㑹祖送慶賀要思數之宻客接執贄之嘉賔人間之務宻勿枉極是以雅正相逺遨逸漸篤其去儒學乎邈矣能獨見崇替之理高拔淪溺之中舍敗徳之嶮塗履長世之大道者良世鮮矣嗟乎此所以保國安家者至稀而傾撓泣血者無也今聖明在上稽古濟物堅隄防以杜決溢明襃貶以彰勸沮想宗室公族及貴門富年必當競尚儒術撙節藝文釋老莊之意不急精六經之正道也君道第五抱朴子曰清𤣥剖而上浮濁黄判而下流尊卑等威於是乎著往聖取諸兩儀而君臣之道立設官分職而雍熙之化隆君人者必修諸己以先四海去偏黨以平王道遣私情以標至公擬宇宙以籠萬殊真偽既明於物外矣而兼之以自見矣聴既聰於接來矣而加之以自聞矣儀决水以進善鈞絶絃以黜惡昭徳塞違庸親昵賢使規盡其圓矩竭其方䋲肆其直斤効其斵器無量表之任才無失授之用考名責實屢省勤恤樹訓典以示民極審襃貶以彰勸沮檢不齊以杜僣濫詳直枉以違悔吝其與之也無判理之幸其奪之也有百氏之揜匠之以六藝軌之以忠信蒞之以慈和齊之以禮刑揚仄陋以伸沈抑激清流以澄臧否使物無詭道事無非分立朝牧民者不得侵官越局推轂即戎者莫敢憚危顧命恱近以懐逺修文以招攜阜百姓之財粟闡進徳之廣塗杜機偽之繁務則明罰勅法哀敬折獄淳化治則匿瑕藏疾五教在寛外總多士於文武内建維城之穆屬使親踈相持尾為身幹枝雖茂而無傷本之憂流雖盛而無背源之勢石盤岳峙式遏覬覦見三苖之傾殄則知川源之未可峙也覩翳幽之不守則覺巖嶮之不足賴也夫江漢猶存而强虜辱劍閤自如而子陽赤族四岳三塗實不一姓金城湯池未若人和守在海外匪山河也是以賢君抱懼不足而改過恐有餘謀當計得猶思危而弗休焉戰勝地廣猶戒盈而夕焉象渾穹以遐燾式坤厚以廣載運重光以表㣲致逺思乎未兆資春景以嫗煦範秋霜以肅物詶諮以校同異平衡以銓羣言虛己以盡下情推功以勸將來御之以術則終始可竭也整之以度則參差可度也嶷若閬風之淩霄而諸下不得以輕重料焉窈若𤣥淵之萬仭而䙝近不能以少多量焉然則君之源流不窮而百僚之才力畢陳矣我之涯畔無外而彼斤兩可限矣發號吐令則鞫若震雷之激響而不為邪辯改其正立法創制則炳若七耀之麗天而不以愛惡曲其情宏畧逺罩則藹若宻雲之高結居貞成務則若嵩岱之根地料倚伏於未萌之前審毁譽於巧言之口不使敦朴散於雕偽不使一體澆於二端雖能獨斷必博納乎芻蕘雖務含𢎞必清耳於浸潤民之饑寒則哀彼責此百姓有罪則謂之在於一人嘉祥之臻則念得神之祐或逢天之怒則思桑林之引不吝改絃於宜易之調不耻反迷於朝過之塗虎眄以警宻麟跱以接䟽路無擊壌之叟則羞聞和音之作民有不粒之匱則媿臨方丈之膳處飛閤之概天則懼子来之勞瘁茹柔嘉之㫖脆則憂敬授之失時聆管絃之宴羨則戚逸樂之有過瞻藻麗之美采則慮賦斂之慘烈遵放勛之麤裘准衛文之大帛追有夏之卑宫識露臺之不果鑒章華之召災悟阿房之速禍誥誓則念一時之失信玩弄則覺襃妲之惑我征伐則量力度時不令百里有號泣之憤誅戮則逆情任理不使鴟夷有抱枉之魂鑒操形之杜伯帷人力之呼豕廢嫡則戒晉獻之巨惑立庻則念劉表之殄祀蒐畋則樂失獸而得士識弛網而悦逺偏愛則慮䄂之謗巧飛燕之專寵獨任則悟鹿馬之作威恭顯之惡直納䇿則思漢祖之吐哺孝景之誅錯㫖甘之進則䟽儀狄容悦姑息則審欒盈除蒸子之謟親放麋之仁鑒白龍以止輕脫觀竒羸以節無厭防人彘之變於六宫之中止汗血之求於絶域之外除惡犬以遭酒之患市馬骨以招追風之駿軾怒鼃以勸勇避螳螂以勵武聆公廬之讜言容保申之正直剔腹背無益之毛攬六翮淩虚之用烹如簧以謐司原之箴折菀枯以迪梁伯之美放舟姬以弭婉孌之迷退子瑕以杜餘桃之惑藏淵中之魚操利器之柄勿憚徙薪之煩以省焦爛之費皷亷耻之陶冶明考試之準的怒不越法以加虐喜不踰憲以厚遺割情於所愛而有犯者無赦採善於所憎而有勞者不逸傾下問以納忠聞逆耳而不諱廣乞言於誹謗雖委抑而不距掩細瑕而録大用忘近惡而念逺功使夫曺劌孟明有修來之效魏尚張敞立雪耻之績射鈎之賊臣著匡合之𢎞勲釋縳之左車吐止戈之高䇿則鵂梟化為鴛鸞邪偽變成忠貞芳頴秀於斥鹵夜光起乎泥濘剡鈍載胥九功允諧西靣逡巡以延師友之才尊事老叟以敦孝悌之行是以淵蟠者仰赴山棲者俯集炳蔚内弼虓闞外御政得於上而物傾於下恵發乎邇而澤邁乎逺明哲宣力於攸蒞黔庻譲畔於藪澤爾乃蠲滋章之法令振太和之清風蒲輪玉帛以抽丘園之俊民元凱畢集以究論道之損益减牧羊之多人及不酤之至醇張仁譲之闈杜華競之津旌義正之操𢎞道素之格使附徳者若潜萌之恱甘雨見歸者猶行潦之赴大川黎民安之若緑葉之綴修柯左袵仰之若衆星之繫北辰是以七政不亂象於𤣥極寒温不謬節而錯集四靈備覩芝華灼爍甘露淋漉以霄墜嘉穂婀娜而盈箱丹魃逐於神潢𤣥厲拘於廣朔百川無沸騰之異南箕謐偃禾之暴物無詭脆之凋人無嗟慨之響囹圄虚陳五刑寢厝正朔所不加冕紳所不暨氊裘皮服山棲河竄莫不含歡革靣感和重譯靈禽貢於彤庭瑶環獻自西極圎首遽善猶氤氲之順勁風要荒承指若響亮之和絶音誠郅隆之盛致三五之軌躅也故能固廟祧於罔極綿本支乎百世矣夫根深則末盛矣下樂則上安矣馬不調造父不能超千里之迹民不附唐虞不能致同天之美馬極則變態生而傾僨惟憂矣民困則多離叛而其禍必振矣可不戰戰以待旦乎可不慄慄而慮危乎人主不澄思於治亂不深鑒於亡徴雖目分百尋之秋毫耳精八音之清濁文則琳琅墮於筆端武則鈎鉻居額切推於指掌心苞萬篇之誦口播濤波之辯猶無補於土崩不救乎瓦解也何者不居乎大而務方其細滯乎下人之業而闇元本之端也誠能事過乎儉臨深履氷居安不忘乘奔之戒處存不廢慮亡之懼操綱領以整細目握道數以御衆才韓白畢力以折衝蕭曺竭能以經國介胄之心致其果毅謀夫協思進其長則人主雖從容玉房之内逍遥雲閣之端羽爵腐於甘醪樂人疲於弁儛猶可以垂拱而任賢高枕以責成何必居茅茨之狹陋食薄味之大躬監門之勞役懐損命之辛勤然後可以恵流蒼生道洽海外哉昏惑之君則不然焉其為政也或仁而不斷朱紫混漫正者不賞邪者不罰或苛猛慘酷或純威無恩刑過乎重不恕不逮根露基頺危猶巢幕而自比於天日擬同於泰山謂克明峻徳者不難及小心翼翼者未足也於是無罪無辜淫刑以逞民不見徳唯戮是聞官人則以順志者為賢擢才則以近習者為前上宰鼎列委之母后之族專斷顧問決之阿諂之徒所揚引則逺九族外親而不簡其器幹所信仗則在於小才曲媚而憎乎方直所抑退則從雷同而不察之以情所寵進則任美談而不考其績用掌要治民之官御戎專征之將或貪汙以壊所在矣或營私以亂朝廷矣或懦弱以敗庻事矣或恇怯以失軍利矣終於不覺不忍黜斥猶加親委冀其晚盖器小任大遂及於禍良才逺量無援之士或披褐而朝𨼆或沉淪於窮否懐道括嚢展力莫由陵替之災所以多有也又經典規戒弗聞不覽玩㺯褻宴是躭是務髙樓觀而下道徳廣苑囿而狹招納深池沼而淺恩信恱狗馬而惡謇諤貴珠玉而賤智畧豐綺紈而約恵澤緩賑濟而急聚斂勤畋弋而忽稼穡重兼并而輕民命進優俳而退儒雅厚嬖幸而薄戰士流聲色而忘庻事先酣遊而後聴斷數苦役而踈犒賜工造費好不急之器圏聚食肉靡穀之物然則危亡不可以怨天㣲弱不可以尤人也夫吉㓙由己湯武豈一哉昔周文掩未埋之骨而天下稱其仁殷紂剖比干之心而四海疾其虐望在具瞻毁譽尤得失之舉不在多也凡譽重則蠻貊懐仁而不可以虚索也毁積則華夏離心而不可以言救也是以小善雖無大益而不可不為細惡雖無近禍而不可不去也若乃肆情縱欲而不與天下共其樂故有憂莫之恤也削基増峻而不覺下墮則上崩故傾頺莫之扶也於是轡䇿去於我手神物假而不還力殫財匱民不堪命衆怨於下天怒於上田成盜全齊於帷幄姬昌取有殷於西鄰陳呉之徒奮劍而大呼劉項之倫揮戈而飈駭雲梯乘於百雉之上皓刄交於象魏之下飛内薦禁兵外潰而乃憂悲以思邈世之大賢擁篲以延巖棲之智士慕伊吕於嵩岫招孫呉於草萊拜昌言而罔擇思嘉筭而莫問猶大厦既燔而運水於滄海洪潦陵室而造船於長洲矣夫巍巍之稱不可驕吝搆而東嶽之封未易以恣欲修也上聖兼䇿載馳猶懼不逮前而庸主緩步按轡而自以為過之或於安而思危或在嶮而自逸或功成治定而匪怠匪荒或綴旒累卵而不覺不寤不有辛癸之沒溺曷用貴欽明之高濟哉念兹在兹庶乎庶乎臣節第六抱朴子曰昔在唐虞稽古欽明猶俟羣后之翼亮用臻巍巍之成功故能熙帝之載庶績其凝四門穆穆百揆時序蠻夷無猾夏之變阿閣有鳴鳯之巢也喻之元首方之股肱雖有尊卑之殊邈實若一體之相賴也君必度能而授者備乎覆餗之敗臣必量才而受者故無流放之禍夫如影如響俯伏惟命者偷容之尸素也違令犯顔蹇蹇匪躬者安上之民翰也先意承指者佞諂之徒也匡過弼違者社稷之骾也必將伏斧鑕而正諌據鼎鑊而盡言忠而見疑諍而不得者待放可也必死無補將増主過者去之可也其動也匪訓典弗據焉其靜也匪憲章弗循焉請託無所容中䋲不顧私明刑而不濫乎所恨審賞而不加諸附己不專命以招權不含洿而談潔進思盡言以糾謬退念推賢而不蔽夙興夜寐慼庶事之不康也儉躬約志若䇿奔於薄冰也納謀貢士不宣之於口非義之利不棲之乎心立朝則以砥矢為操居己則以善卒為節當危值難則棄家而不顧秉衡執銓則平懐而無彼此儀蕭曺之指揮羨張陳之竒畫追同勃之盡忠准二鮑之直視蹈嬰𢎞之節儉執恬毅之守終甘此要離炙身之分戒彼韓英失忠之禍出不辭勞入不數功歸勲引過讓以先下專誠祗慄恒若天威之在顔也宵夙䖍竦有如湯鑊之在側也負荷寄託則以伊周為師表宣力四方則以吉召為軌儀送往視居則竭忠貞而不迴搏噬干紀則若鷹鸇之鷙鳥雀蕃扞疆場則慕魏絳李牧之高蹤莅衆撫民則希文翁信臣之徳化夫忠至者無以為國況懷智以迷上乎義篤者滅祀而無憚況黜辱之敢辭乎故能保勞貴以顯親託良哉於輿歌昆吾彛器能者鐫勲臯陶后稷亦何人哉抱朴子曰人臣勲不𢎞則耻俸禄之虚厚也績不茂則羞爵命之妄高也履信思順天人攸賛畏盈居謙乃終有慶舉足則蹈矩度抗手則奉繩墨褒重雖淹留而悔辱亦必逺矣若夫損上以附下廢公以營私阿媚曲從以水濟水君舉雖謬而諂笑賛善數進玩好陷主於惡巧言毁政令色取悦上蔽人主之明下杜進賢之路外結出境之交内樹背公之黨雖才足以飾非言足以文過專威若趙高擅朝如董卓未有不身膏剡家靡湯火者也然而愚瞽舍邪即正違真侣偽親覽傾覆不改其軌殃禍之集匪降自天也抱朴子曰臣喻股肱則手足也履氷執熱不得辭焉是以古人方之於地掘之則出水泉樹之則秀百穀生者立焉死者入焉功多而不望賞勞瘁而不敢怨審識斯術保己之要也抱朴子曰臣職分則可給統廣則多滯非賁獲之壯不可以舉兼人之重非萬夫之特不可以總獨異之局韓侯所以罪侵冐之典子元所以懼不勝之禍也若乃才力絶倫文武兼允入有腹心之高筭出有折衝之逺畧雖事殷而益舉兩循而俱濟舎之則彛倫斁委之而無其人難者兼之可也非此器也宜自忖引轅弱載重尠不及矣常人賞榮不慮後患身既溺而禍逮及君親不亦哀哉人皆辭斧斤然而位髙而莫讓攝官所不堪嗟乎陳李所以作戒於力少而子房所以高蹈於挹盈也良規第七抱朴子曰翔集而不擇木者必有離巢之禽矣出身而不料時者必有危辱之士矣時之得也則飄乎猶應龍之覽景雲時之失也則蕩然若巨魚之枯崇陸是以智者藏其器以有待也𨼆其身而有為也若乃高巖將霣非細縷所綴龍門沸騰非掬壤所遏則不茍且於乾没不投險於僥倖矣抱朴子曰周公之攝王位伊尹之黜太甲霍光之廢昌邑孫琳之退少帝謂之舎道用權以安社稷然周公之放逐狼跋流言載路伊尹終於受戮大霧三日霍光幾於及身家亦尋滅孫琳桑䕃未移首足異所皆笑音未絶而號咷已及矣夫危而不持安用彼相爭臣七人無道可救致令王莽之徒生其姦變外引舊事以飾非内包豺狼之禍心由於伊霍基斯亂也將來君子宜深鑒茲矣夫廢立之事小順大逆不可長也召王之譎已見貶抑況乃退主惡其可乎此等皆計行事成徐乃受殃者耳若夫隂謀始權而貪人賣之赤族殄祀而他家封者亦不少矣若有姦佞翼成驕亂若桀之干辛推哆尺氏切張口也紂之崇侯惡來厲之黨也改置忠良不亦易乎除君側之衆惡流㐫族於四裔擁兵持疆直道守法嚴操柯斧正色拱䋲明賞必罰有犯無赦官賢任能唯忠是與事無專權請而後行君有違謬據理正陳戰戰兢兢不忘恭敬使社稷永安於上己身無患於下功成不處乞骸告退高選忠能進以自代不亦綽有餘裕乎何必奪至尊之璽紱危所奉之見主哉君天也父也君而可廢則天亦可改父亦可改也功盖世者不賞威震主者身危此徒戰勝攻取勲勞無二者是猶鳥盡而弓棄兔訖而犬烹況乎廢退其君而欲後主之愛己是奚異夫為人子而舉其所生捐之山谷而取他人養之而云我能為伯俞曾參之孝但吾親不中奉事故棄去人雖享三牲昏定晨省豈能見憐信邪霍光之徒雖當時増班進爵賞賜無量皆以計見崇豈斯人之誠心哉夫納棄妻而論前婿之惡買僕虜而毁故主之暴凡人庸夫猶不平之何者重傷其𩔖自然情也故樂羊以安忍見踈而秦西以過厚見親而世人誠謂湯武為是而伊霍為賢此乃相勸為逆者也又見廢之君未必悉非也或輔翼少主作威作福罪大惡積慮於為後患及尚持勢因而易之以延近局之禍規定䇿之功計在自利未必為國也取威既重殺生決口見廢之主神器去矣下流之罪莫不歸焉雖知其然孰敢形言無東牟朱虚以致其計無南史董狐以證其罪將來今日誰又理之獨見者乃能追覺桀紂之惡不若是其惡湯武之事不若是其美也方䇿所載莫不尊君卑臣强榦弱枝春秋之義天不可讐大聖著經資父事君民生在三奉之如一而許廢立之事開不道之端下陵上替難以訓矣俗儒沉淪鮑肆困於詭辯方論湯武為食馬肝以彈斯事者為不知權之為變貴於起善而不犯順不謂反理而叛義正也而前代立言者不折之以大道使有此情者加夫立剡鋒之端登方崩之山非所以延年長世逺危之術雖䇿命暫隆𢎞賞暴集無異乎犧牛之被紋繡淵魚之愛莽麥渇者之資口於雲日之酒饑者之取飽於鬱肉漏脯也而屬筆者皆共褒之以為美談以不容誅之罪為知變使人於悒而永慨者也或諫余以此為傷聖人必見譏貶余答曰舜禹歴試内外然後受終文祖雖有好傷聖人者豈能傷哉昔嚴延年廷奏霍光為不道于時上下肅然無以折也況吾為世之誡無所指斥何慮乎常言哉時難第八抱朴子曰盡節無𨼆者可為也若夫使言必納而身必安者須待時之否者也夫姦㐫之徒跖所不逮擁上抑下惡直醜正憂畏公方之彈擊邪枉是以務除勝己以紓其誅明主不世而出庸君迷於皂白既不能受用忠益或乃宣泄至言於是𢎞恭石顯之徒飾巧辭以搆象似假公以售私姦今獻長生之術者反獲立死之罪進安上之計者旋受危身之禍故曰非言之難也談之時難也夫以賢説聖猶未必即受故伊尹于湯至於七十也以智告愚則必不入故文王諫紂終于不納也言不見信猶之可也若乃李斯之誅韓非龎涓之刖孫臏上官之毁屈平𡊮盎之中晁錯不可勝載也為臣不易豈一塗也哉盖往而不反者所以功在身後而藏器俟時者所以百無一遇高勲之臣曠代而一有䧟氷之徒委積乎史䇿悲夫時難遇也如此其甚哉由茲以言吾知渭濱吕尚之儔巖間傅說之屬懷其王佐之器抱其邈世之材秉竿擁築老死於庸兒之伍而遂不遭文王高宗者必不訾矣官理第九抱朴子曰騄駬之騁逸迹由造父之御也禹稷之序百揆遭唐虞之主也故能不勞而千里至揖譲而頌聲作若乃臧獲之乘驌騻殷辛之臨三仁欲長驅騖則轡急轅逼欲盡規竭忠則禍如發機所以車傾於險塗國覆而不振也故良駿敗於拙御智士躓於闇世仲尼不能止魯侯之出晏嬰不能遏崔杼之亂其才則是主則非也夫君猶器也臣猶物也器小物大不能相受矣髫孺背千金而逐蛺蜨越人棄八珍而甘鼃黽所患不賞好所病不識要矣夫不用則雖珍而不貴矣莫與則傷之者必至昔衛靈聴聖言而數驚秦孝聞高談而恐睡而欲緝隆平之化收良能之勲猶却行以逐馳適楚而首燕也務正第十抱朴子曰南溟引朝宗以成不測之深𤣥圃崇木石以致極天之峻大厦凌霄賴羣橑之積輪曲轅直無可闕之物故元凱之佐登而格天之化洽折衝之才周則逐鹿之姦寢舜禹所以有天下而不與衛靈所以雖驕恣而不危也衆力并則萬鈞不足舉也羣智用則庶績不足康也故繁足者死而不弊多士者亂而不亡然劍㦸不長於縫緝錐鑚不可以擊斷牛馬不能吠守鷄犬不任駕乘役其所長則事無廢功避其所短則世無棄材矣貴賢第十一抱朴子曰舎輕艘而渉無涯者不見其必濟也無良輔而美隆平者未聞其有成也鴻鸞之凌虚者六翮之力也淵虬之天飛者雲霧之偕也故招賢用財者人主之要務也立功立事者髦俊之所思也若乃樂治定而忽智士者何異欲致逺塗而棄騏騄哉夫拔丘園之否滯舉遺漏之幽人職盡其才禄稱其功者君所以待賢也勤夙夜之在公竭心力於百揆進善退惡知無不為者臣所以報知己也世有𨼆逸之民而無獨立之主者士可以嘉遯而無憂君不可以無臣而致治是以傅説吕尚不汲汲於聞達者道徳備則輕王公也而殷高周文乃夢想乎得賢者建洪勛必須良佐也患於生乎深宫之中長乎婦人之手不識稼穡之艱難不知憂懼之何理承家繼體蔽于崇替所急在乎侈靡至務在乎逰宴般于畋獵湎于酣樂聞淫聲則驚聴見艶色則改視役聰用明止此二事鑒澄人物不以經神唯識玩弄可以恱心志不知竒士可以安社稷犀象珠玉無足而至自萬里之外定傾之器能行而淪乎四境之内二堅之疾既據而募良醫棟橈之禍已集而思謀夫何異乎火起乃穿井覺饑而占田哉夫庸𨽻猶不可以不拊循而卒盡其力安可以無素而暴得其用哉任能第十二或曰尾大於身者不可掉臣賢於君者不可任故口不容而强吞之者必哽才非匹而委仗之者見輕抱朴子曰詭哉言乎昔者荆子總角而攝相事實賴二十五老臻乎恵康子賤起家而治大邦實由勝己者多而招其𢎞益齊桓殺兄而立鳥獸其行被髮彛酒婦閭三百委政仲父遂為霸宗夷吾既終禍亂亟起魯用季子二十餘年内無粃政外無侵削人之亡沒殄瘁響集豈非才所不逮其功如彼自任其事其禍如此乎漢高決䇿於𤣥幃定勝乎千里則不如良平治兵多而益善所向無敵則不如信布兼而用之帝業克成故疾步累趨未若託乘乎逸足尋飛逐走未若假伎乎鷹犬夫勁弩難彀而可以摧堅逮逺大艦難乘而可以致重濟深猛將難御而可以折衝拓境高賢難臨而可以攸叙彛倫昔魯哀庸主也而仲尼上聖不敢不盡其節齊景下才也而晏嬰大賢不敢不竭其誠豈有人臣當與其君校智力之多少計局量之優劣必須堯舜乃為之役哉何事非君何使非民耻令其君不及唐虞此亦達者之用心也欽士第十三抱朴子曰由余在戎而秦穆惟憂楚殺得臣而晉文乃喜樂毅出而燕壞種蠡入而越霸破國亡家失士者也豈徒有之者重無之者輕而已哉桞恵之墓猶挫元冦之銳況於坐之於朝廷乎干木之𨼆猶退踐境之攻況於置之於端右乎郅都之象使勁虜振慴孔明之尸猶令大國寢以此禦侮則地必不侵矣以此率師則主必不辱矣是明主旅束帛於窮巷揚滯羽於瘁林飛翹車於河梁闢四門而不倦不吝金璧不逺千里不憚屈己不耻卑辭而以致賢為首務得士為重寳舉之者受上賞蔽之者為竊位故公旦執贄於白屋秦卲拜昌於張生鄒子涉境而燕君擁篲莊周未食而趙恵竦立晉文接亥唐却庳而坐不敢正齊侯之造稷丘雖頻繁而不辭其勞定王受笞於保申簡公去甲於公廬彼雖降高抑滿以貴下賤終亦并目以逺其明假耳以廣其聦龍騰虎踞宜其然也用刑第十四抱朴子曰莫不貴仁而無能純仁以致治也莫不賤刑而無能廢刑以整民也咸云明后御世風向草偃道洽化醇安所用刑余乃論之曰夫徳教者黼黻之祭服也刑罰者捍刃之甲胄也若徳教治狡暴猶以黼黻御剡也以刑罰施平世是以甲胄昇廟堂也故仁者養物之器刑者懲非之具我欲利之而彼欲害之加仁無悛非刑不止刑為仁佐於是可知也譬存𤣥胎息呼吸吐納含景内視熊經鳥伸者長生之術也然艱而且遲為者尠成能得之者萬而一焉病篤痛甚身困命危則不得不攻之以鐵石治之以毒烈若廢和鵲之方而慕松喬之道則死者衆矣仁之為政非為不美也然黎庶巧偽趨利忘義若不齊之以威糾之以刑逺羨羲農之風則亂不可振其禍深大以殺止殺豈樂之哉八卦之作窮理盡性明罰用獄著於噬嗑繫以徽纆存乎習坎然則用刑其来尚矣逮於軒轅聖徳尤高而躬親征伐至於百戰僵尸涿鹿流血阪泉猶不能使時無叛逆載戢干戈亦安能使百姓皆良民不犯罪而自治者未之有也唐虞之盛象天用刑竄殛放流天下乃服漢文𤣥黙比隆成康猶斷四百鞭死者多夫匠石不舎䋲墨故無不直之木明主不廢戮罰故無凌遲之政也盖天地之道不能純仁故青陽闡陶育之和素秋厲肅殺之威融風扇則枯瘁攄藻白露凝則繁英彫零是以品物阜焉嵗功成焉温而無寒則蝡動不蟄根植冬榮寛而無嚴則姦宄並作利器長守故明賞以存正必罰以去邪勸沮之器莫此之要勸民設教濟其寛猛使懦不可狎剛不傷恩五刑之罪至于三千是䋲不可曲也司冦行刑君為不舉是法不可廢也䋲曲則姦囘萌矣法廢則禍亂滋矣亡國非無令也患於令煩而不行敗軍非無禁也患於禁設而不止故衆慝彌蔓而下黷其上夫賞貴當功而不必重罰貴得罪而不必酷也鞭朴廢於家則僮僕怠惰征伐息於國則羣下不䖍愛待敬而必敗故制禮以崇之徳須威而久立故作刑以肅之班倕不委規矩故方圓不戾於物明君不釋法度故機詐不肆其巧唐虞其仁如天而不原四罪姬公友于兄弟而不赦二叔仲尼之誅正卯漢武之殺外甥垂淚惜法盖不獲已也故誅一以振萬損少以成多方之櫛髪則所利者衆比於割疽則所全者大是以灸刺慘痛而不可止者以痊病也刑法㐫醜而不可罷者以救弊也六軍如林未必皆勇排陷火人情所憚然恬顔以勸之則投命者尠斷斬以驅之則莫不奮擊故役歡笑者不及叱咤之速用誘悦者未若刑戮之齊是以安于感深谷而嚴其法衛子疾棄灰而峻其辟夫以其所畏禁其所翫峻而不犯全民之術也明病之術者杜未生之疾達治亂之要者遏將來之患若乃以輕刑禁重罪以薄法衛厚利陳之滋章而犯者彌多有似穿穽以當路非仁人之用懷也善為政者必先端此以率彼治親以整踈不曲法以行意必有罪而無赦若石碏之割愛以滅親晉文之忍情以斬頡故仁者為政之脂粉刑者御世之轡䇿脂粉非體中之至急而轡䇿須臾不可無也肅恭少怠則慢惰已至威嚴暫弛則羣邪生心當怒不怒姦臣為虎當殺不殺大賊乃發水久壞河山起咫尺尋木千丈始于毫末鑚燧之火勺水所滅鵠卵未孚指掌之所靡及其乘衝飈而撩巨野奮六羽以淩朝霞則雖智勇不能制也故明君治難於其易去惡於其㣲不伐善以長亂不操柯而猶豫焉然則刑之為物國之神器君所自執不可假人猶長劍不可倒捉巨魚不可脫淵也乃崇替之所由安危之源本也田常之奪齊六卿之分晉趙高之弑秦王莽之漢履霜堅氷由來漸矣或永歎於海濱或拊心乎望夷禍延宗祧作戒將來者由乎慕虚名於往古忘實禍于當已也或又曰刑辟之興盖存叔世立人之道唯仁與義我清静而民自正我無欲而民自樸烹鮮之戒不欲其煩寛以愛人則得衆恱以使人則下附故孟子以體仁為安楊子雲謂申韓為屠宰夫繁策急轡非造父之御嚴刑峻罰非三五之道故有虞手不煩揮口不煩言恭已南靣而治化雍熈矣宓生正以率俗彈琴詠詩身不下堂而愚智整肅矣必能厚恵薄斂救乏擢滯舉賢任才勸穯省用招擕以禮懷逺以徳陶之以成均治之以庠序化上而興善者必若靡草之逐驚風洗心而革靣者必若清波之滌輕塵朝有徳讓之羣后野無犯禮之軌躅圜土可以虚無楚革可以永格何必賞罰可以為國乎抱朴子答曰易稱明罰敕法書有哀矜折獄爵人於朝刑人於市有自來矣豈徒叔世多仁則法不立威寡則下侵上夫法不立則庶事汩矣下侵上則逆節萌矣至醇既澆於三代大樸又散於秦漢道衰於疇昔俗薄乎當今而欲結䋲以整姦欺不言以化狡猾委轡䇿而乘奔馬於險塗舎柁櫓而汎虚舟以淩波盤旋以逐走盜揖譲以救災火斬晁錯以却七國舞干戈以平赤眉未見其可也盖三皇步而五帝驟霸王以來載馳載騖當其弊也吏欺民巧冦盜公行髠鉗不足以懲無耻族誅不能以禁覬覦重目以廣視累耳以逺聴抗燭以理滯事焦心以息奸源而猶市朝有吁嗟之音邉鄙有不聞之枉作威作福者或發乎瞻視之下㐫家害國者或搆乎蕭墻之内而欲以太旻之道治偷薄之俗以畫一之歌救鼎沸之亂非識因革之隨時明損益之變通也所謂刻舟以摸遺劔叅天而射五步摜犀兕之甲以涉不測之淵袗却寒之裘以禦鬱隆之暑踵之解結頤之搔背其為憤憤莫此之劇矣但當先令而後誅得情而勿喜使伯氏無怨于失邑虞芮知耻而無訟耳若强暴掩容操䋲而不憚邑於含垢草蔓而不除恃藏疾之大言忘膏盲之近急何異噍喉之之渇切身而遥指滄海於萬里之外滔天之水已及而方造舟於長洲之林安得免夸父之禍脫淪水之害哉世人薄申韓之實事嘉老莊之誕談然而為政莫能錯刑殺人者原其死傷人者赦其罪所謂土拌瓦胾無救朝饑者也道家之言髙則髙矣用之則弊遼落迂濶譬猶干將不可以縫線巨象不可使捕鼠金丹不能淩陽侯之波玉馬不任騁千里之迹也若行其言則當燔桎梏隳囹圄罷有司滅刑書鑄干戈平城池散府庫毁符節撤関梁掊量衡膠離朱之目塞子野之耳汎然不繫反乎天放不訓不營相忘江湖朝廷閴爾若無人民則至死不往來可得而論難得而行也俗儒徒聞周以仁興秦以嚴亡而未覺周所以得之不純仁而秦所以失之不獨嚴也昔周用肉刑刖足劓鼻盟津之令後至者斬畢力賞罰誓有孥戮考其所為未盡仁也及其叔世罔法翫文人主苛虐號令不出宇宙禮樂征伐不復由己羣下力競還為長蛇伐本塞源毁冠裂冕或沉之於漢或流之於彘失柄之敗由於不嚴也秦之初興官人得才衛鞅由余之徒式法於内白起王翦之倫攻取於外兼弱攻昧取威定霸吞噬四鄰咀嚼辟雄拓地攘戎龍變虎視實賴明賞必罰以塞帝業降及叔季驕於得意窮奢極泰加之以威虐築城萬里離宫千餘鐘鼔女樂不徙而具驪山之役大半之賦閭左之戎坑儒之酷北擊獫虚檢切狁南征百越暴兵百萬動數十年天下有生離之哀家户懷怨曠之歎白骨成山虚祭布野徐福出而重號咷之讐趙高入而屯豺狼之黨天下欲反十室九空其所以亡豈由嚴刑此為秦以嚴得之非以嚴失之也具刑兩地巧人以自成拙者以自傷為國有道而助之以刑者能令慝偽不作㐫邪改志若綱絶網紊得罪于天用刑失理其危必速亦猶水火者所以活人亦殺人存乎能用之與不能用夫癥瘕不除而不修越人之術者難圖老彭之夀也姦黨實繁而不嚴彈違之制者未見其長世之福也但當簡于張之徒任以法理世選趙陳之屬委以案刻明主留神於上忠良盡誠於下見不善則若鷹鸇之搏鳥雀覩亂萌則若薙他計切田之芟蕪薉於吠切慶賞不謬加而誅戮不失罪則太平之軌不足廸令而不犯可庶幾廢刑致治未敢謂然也或曰然則刑罰果所以助教興善式遏宄忒也若夫古之肉刑亦可復與抱朴子曰曷為而不可哉昔周用肉刑積祀七百漢氏廢之年代不如至於改以鞭笞大多死者外有輕刑之名内有殺人之實也及於犯罪上不足以至死則其下唯有徒謫鞭杖或遇赦令則身無損且髠其更生之髮撾其方愈之創殊不足以懲次死之罪今除肉刑則死罪之下無復中刑在其間而不死罪不得不止於徒謫鞭杖是輕重不得不適也又犯罪者希而時有耳至於殺之則恨重而鞭之則恨輕犯此者為多今不用肉刑是次死之罪常不見治也今若自非謀反大逆惡于君親及用軍臨敵犯軍法者及手殺人者以肉刑代其死則亦足以懲示㓙人而刑者猶任坐役能有所為又不絶其生𩔖之道而終身殘毁百姓見之莫不寒心亦足使未犯者肅慄以彰示將來乃過於殺人殺人非不重也然辜之三日行埋棄之不知者衆不見者多也若夫肉刑者之為標戒也多昔魏世數議此事諸碩儒達學洽通政理者咸謂宜復肉刑而意異者駮之皆不合也魏武帝亦以為然直以二陲未賔逺人不能統至理者卒聞中國刖人肢體割人耳鼻便當望風謂為酷虐故且權停以須四方之并耳通人楊子雲亦以為肉刑宜復也但廢之來久矣坐而論道者未以為急耳}
