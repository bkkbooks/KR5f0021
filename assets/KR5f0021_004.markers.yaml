  - {type: variant, offset: 17, length: 2, content: 焕炳, CK-KZ: 電經聊且優游以自得安能苦形於外物哉夫鳶不絓網驎不墮穽相彼鳥獸猶知爲患風塵之徒曾是未若也若夫要離滅家以効功紀信赴燔以誑楚陳賈刎頸以證弟仲由投命而葅醢嬴門伏劍以喪心聶政感惠而屠葅荆卿絕臏以報燕楚公含悲而授首皆下愚之狂惑豈上智之攸取哉葢厚祿者責重爵尊者神勞故漆園垂綸而不顧卿相之貴栢成操耜而不屑諸侯之高羊說安乎屠}
