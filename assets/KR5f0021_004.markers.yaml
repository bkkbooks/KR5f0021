  - {type: variant, offset: 999, length: 1, content: 品, CK-KZ: 未分交爭都市心熱於中顏愁於外名之爲樂而實煎悴喪廉恥之操興爭競之端相取重貨密結怨隙昔宋閔公吳太子致碎首之禍生叛亂之變覆滅七國幾傾天朝作戒百代其鑒明矣每觀戲者慙恚交集手足相及醜詈相加絕交壞友往往有焉怨不在大亦不在小多召悔𠫤不足爲也仲尼雖有晝寢之戒以洪較之洪實未許其賢於畫寢何者晝寢但無益而未有怨憾之憂鬭訟之變聖人猶韋編三絕以勤經業凡才近人安得兼修惟諸戲盡不如示一尺之書故因本不喜而不爲葢此俗人所親焉少嘗學射但力少不能挽强若顏高之弓耳意爲射旣在六藝又可以禦寇辟刼及取鳥獸是以習之昔在軍旅曾手射追騎應倒殺二賊一馬遂以得免死又曾受刀楯及單刀雙戟皆有口訣要術以待取人乃有秘法其巧入神若以此道與不曉者對便可以當全獨勝所向無前矣晚又學七尺杖術可以入白刃取大㦸然亦是不急之末學知之譬如麟角鳳距何必用之此已往未之或知洪少有定志決不出身每覽巢許子州北人石戸二姜兩表法眞子龍之傳當廢書前席慕其爲人念精治五經著一部子書令後世知其爲文儒而已後州郡及車騎大將軍辟皆不就薦名瑯琊王丞相府昔起義兵賊平之後了不修名詣府論功主者永無賞報之冀晉王應天順人撥亂反正結皇綱於垂絕修宗廟之廢祀念先朝之滯賞並無報以勸來洪隨例就彼庚寅詔書賜爵關中侯食句容之邑二百竊詔討賊以救桑梓勞不足錄金紫之命非其始願本欲遠慕魯連近引田疇上書固辭以遂微志適有大例同不見許昔仲由讓應受之賜而沮爲善醜虜未夷天下多事國家方欲明賞必罰以彰憲典小子豈敢苟潔區區之懦志而距弘通之大制故遂息意而恭承詔命焉洪旣著自敘之篇或人難曰昔王充年在耳順道窮望絕懼身名之偕滅故自紀終篇先生以始立之盛値乎有道之運也方將解申公之束帛登枚生之蒲輪耀}
