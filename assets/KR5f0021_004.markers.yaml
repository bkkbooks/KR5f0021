  - {type: variant, offset: 977, length: 0, content: '', CK-KZ: 或爲尊長所逼問辭不獲已其論人也則獨舉彼體中之勝事而已其論文也則撮其所得之佳者而不指摘其病累故無毁譽之恕貴人時或問官吏民甲乙何如其淸高賢能者洪指說其快事其貪暴闇塞者對以偶不識悉洪由此頗見譏責以顧護太多不能明辯臧否使皂白區分而洪終不敢改也每見世人有好論人物者比}
