  - {type: variant, offset: 981, length: 3, content: 精麤校, CK-KZ: 入骨劇於血讎洪益以爲戒遂不復言及士人矣雖門宗子弟其稱兩皆以付邦族不爲輕乎其價數也或以譏洪洪答曰我身在我者也法當易知設令有人問我使自比古人及同時令我自求輩則我實不能自知可與誰爲匹也况非我安可爲取評定之耶漢末俗弊朋黨分部許子將之徒以口舌取戒爭訟論議門宗成讎故汝南人士無復定價而有月旦之評魏武帝深亦疾之欲取其首爾乃奔波亡走殆至屠滅前鑒不遠可以得師矣且人之未易知也雖父兄不必盡子弟也同於我者遽是乎異於我者遽非乎或有始無卒唐堯公旦仲尼季札皆有不全得之憾無以近人信其嘍嘍管見熒燭之明而輕人評物是皆賣彼上聖大賢乎昔大安中石氷作亂六州之地村鎭業靡違正黨逆義軍大都督邀洪爲將兵都尉累見敦迫曁桑梓恐虜禍深憂大古人有急疾之義又畏軍法不敢任志遂募合數百人與諸軍旅進曾攻賊之别將破之日錢帛山積珍玩蔽地諸軍莫不放兵收拾財物繼轂連檐洪獨約令所領不得妄離行陣士有摭得眾者洪卽斬之以狥於是無敢委杖而果有伏賊數百出傷諸軍諸軍悉發無部隊人馬皆負重無復戰心遂致驚亂死傷狼藉殆欲不振獨洪軍整齊轂帳無所損失以救諸軍之大崩洪有力焉後别戰斬賊小帥多獲甲首而獻㨗幕府於是大都督加法伏波將軍例給布百疋諸將多封閉之或送還家而洪分賜將士及施知故之貧者餘之十匹又徑以市肉酤酒以饗將吏於時竊擅一日之美談焉事平洪投戈釋甲徑詣洛陽欲廣尋異書了不論戰功竊慕魯連不受聊城之金包胥不納存楚之賞成功不處之義焉正遇上國大亂比道不通而陳敏又反於江東歸塗隔塞會有故人譙國稽居道見用爲廣州刺史乃表請洪爲參軍雖非可樂然利可避地於南故黽勉就焉見遣先行催兵而居道於後遇害遂停廣州頻爲節將見邀用皆不就永惟富貴可以漸得而不可頓合其間屑屑亦足以勞人且榮位勢利譬如寄客旣非常物又其去不可得留也隆隆者絕赫赫者滅有若春華須臾凋落得之不喜失之安悲悔吝百端憂懼競戰不可勝言不足爲也且自度性篤懶而才至短以篤懶而御短才雖翕肩屈膝趨走風塵猶必不辨大致名位而免患累况不能乎未若修松喬之道在我而已不由於人焉將登名山服食養性非有廢也事不兼濟自不絕棄世務則曷緣修習玄靜哉且知之誠難以不得借問而與人議也是以車馬之跡不經貴世之域片字之書不交在位之家又士林之中雖不可出而見造之賓意不能拒妨人所作不得專一乃嘆曰山林之中無道也而古之修道者必入山林誠欲以違遠讙譁使心不亂也今將遂本志委桑梓適嵩岳以尋方平梁公之軌先所作子書內外篇幸已用功夫聊復撰次以示來者云爾洪年十五六時所作詩賦雜文當時自謂可行至於弱冠更詳省之殊多不稱意天才未必爲增也直所覽差廣而覺妍媸之別於是大有所製棄十不存一今除所作子書但雜尙餘百卷猶未盡損益之理而多慘憤不遑復料護之他人文成手便快意余才鈍思遲實不能示作文章每一更字輙自轉勝但患懶又所作多不能數省之耳洪年二十餘乃計作細碎小文妨棄功日未若立一家之言乃草創子書會遇兵亂流離播越有所亡失連在道路不復投筆十餘年至建武中乃定凡著内篇二十卷外篇五十卷碑頌詩賦百卷軍書檄移章表箋記三十卷又撰俗所不列者爲神仙傳十卷又撰高尙不仕者爲隱逸傳十卷又抄五經七史百家之言兵事方伎短雜奇要三百一十卷別有目錄其内篇言神仙方藥鬼悸變化養生延年禳邪卻禍之事屬道家其外篇言人間得失世間臧否屬儒家洪見魏文帝典論自敘未及}
