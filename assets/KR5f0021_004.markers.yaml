  - {type: variant, offset: 6, length: 0, content: '', CK-KZ: 有懷丘先生者薄周流之棲遑悲吐握之良苦讓高懷於陸海爰躬耕乎斥鹵秘六奇以括囊含琳琅而不吐謐靑音則莫之或間掩輝藻則世不得覩背朝華於朱門保恬寂於蓬戸絕軏躅於金張之閭養浩然於幽人之伍謂榮顯爲不幸以玉帛爲草土抗靈䂓於雲表獨違今而遂古庇峻岫之巍峩藉翠蘭之芳茵漱流霞之}
