  - {type: variant, offset: 577, length: 397, content: 構之變千端萬緒巧筭所不能詳毫墨所不能究也無術學則安能見邪正之眞僞具古今之行事自悟之理無所感假能無䋶巢覆車之禍乎先哲居高不敢忘危愛子欲教之義方雕琢切磋弗納於邪僞選明師以象成之擇良友以漸染之督之以博覽示之以成敗使之察往以悟來觀彼以知此驅之於直道之上歛之乎撿括之中懔乎若跟掛於萬刃慄然有如乘奔以履冰故能多遠悔吝保其貞吉也昔諸竇蒙遺教之福霍禹受率意之禍中山東平以好古而安燕刺由面墻而危前事不忘今之良鑒也湯武染乎伊吕其興勃然辛癸染乎推崇其亡忽焉朋友師傅尤宜精簡必取寒素德行之士以清苦自立以不群見憚者其經術如仲舒桓榮者强直若龔遂王吉者能朝夕講論忠孝之至道正色證存亡之軌迹以洗濯垢涅閑邪矯枉宜必抑情遵憲法入德訓者矣漢之末世吴之晩年則不然焉望冠蓋以選用任朋黨之華譽有師友之名無拾遺之實匪唯無益乃反爲損故其所講說非道德也其所貢進非忠益也唯在於新聲艷色輕體妙手評歌謳之清濁理管絃之長短相狗馬之勦駑議遨游之處所比錯塗, CK-KZ: ''}
