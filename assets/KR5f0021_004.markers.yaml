  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書抱朴子外篇巻四晉葛洪撰廣譬第三十九抱朴子曰立德踐言行全操清斯則富矣何必玉帛之崇乎高尚其志不降不辱斯則貴矣何必青紫之兼乎凡民不能識其度量庸夫不得揣其銓衡是則高矣何必凌雲而蹈霓乎問者莫或測其淵流求者未有覺其短乏是則深矣何必洞河而淪海乎四者茍備雖室有懸磬之窶可以無羨乎鑄山而煑海矣身處鳥獸之羣可以不謁乎朱輪而華轂矣抱朴子曰濳靈俟慶雲以騰竦棲鴻階勁風以凌虚素鱗須姬發而躍白雉待公旦而來姜老值西伯而投磻溪之綸韓英遭漢高乃騁撥亂之才抱朴子曰澄精神於𤣥一者則形器可忘邈高節以外物者則富貴可遺故支離甕㼜偉造化而怡顔北人箕叟棲嵩岫而得意焉抱朴子曰粗理不可浹全能事不可畢兼故懸象明而可蔽山川滯而或移金玉剛而可柔堅氷宻而可離公旦不能與伯氏跟絓於憑雲之峻仲尼不能與吕梁較伎於百仭之溪抱朴子曰震雷不能細其音以協金石之和日月不能私其耀以就曲照之惠大川不能促其涯以適速濟之情五岳不能削其峻以副陟者之欲故廣車不能脅其轍以茍通於狹路高士不能撙其節以同塵於隘俗抱朴子曰隂陽以廣陶濟物三光以普照著明嵩華以藏疾為曠北溟以含垢稱大碩儒以與進𢎞道逺數以博愛容衆抱朴子曰靈龜之甲不必為戰施麟角鳯爪不必為鬭設故雋生不釋劍於平世擊柝不輟備於思危抱朴子曰南金不為處幽而自輕瑾瑶不以居深而止潔忠道者不以否滯而改圖守正者不以莫賞而茍合抱朴子曰登𤣥圃者悟丘阜之卑浮溟海者識池沼之褊披九典乃覺牆面之篤蔽聞至道乃知拘俗之多迷抱朴子曰渾沌之原無皎澄之流毫之根無連抱之枝分寸之燼無炎逺之熱隙穴之中無炳蔚之羣鉤曲之形無繩直之影參差之上無整齊之下抱朴子曰不覩瓊琨之熠爍則不覺瓦礫之可賤不覿虎豹之文蔚則不知犬羊之質漫聆白雪之九成然後悟巴人之極鄙識儒雅之汪濊乃可悲不學之固陋抱朴子曰無當之玉盌不知全用之埏埴寸裂之錦黻未若堅完之韋布故夏姬之無禮不如孤逐之皎潔富貴之多罪不如貧賤之履道抱朴子曰猛獸不奮摶於度外鷹鷂不揮翮以妄擊若廟既内不揆德進取又外不量力猶輕羽之投洪鑪飛雪之委沸鑊朝菌之試干將羔犢之犯虣虎也抱朴子曰三辰蔽於天則清景暗於地根荄蹶於此則柯條瘁於彼道失於近則禍及於逺政繆於上而民困於下抱朴子曰務於逺者或失於近治於外者或患生乎内覆頭者不必能令足不濡蔽腹者不必能令背不傷故秦始築城遏胡而禍發幃幄漢武懸旌萬里而變起蕭牆抱朴子曰人才無定珍器用無常道進趨者以適世為奇役御者以合時為妙故𤣥氷結則五明捐隆暑熾則裘鑪退高鳥聚則良弓發狡兎多則盧鵲走干戈興則武夫奮韶夏作則文儒起抱朴子曰激修流揚朝宗者不可以背五城而跨積石舒翠葉吐丹葩者不可以舍洪荄而去繁柯敗源失本尠不枯訖叛聖違經理不𢎞濟抱朴子曰四瀆辯源五河分流赴卑注海殊塗同歸色不均而皆艷音不同而咸悲香非一而並芳味不等而悉美抱朴子曰物貴濟事而飾為其末化俗以德而言非其本故緜布可以禦寒不必貂狐淳素可以匠物不在文辯抱朴子曰衝飈謐氣則轉蓬山峙修綱既舒則萬目齊理故未有上好謙而下慢主賤寶而俗貧抱朴子曰事有縁㣲而成著物有治近而致逺故修步武之池而引沉鱗於江海豐朝陽之林而延靈禽於丹穴設象於槃盂而翠虬降於𤣥霄委灰於尺水而望舒變於太極是以晉文回輪於勇䖝而壯士雲赴句踐曲躬於怒鼃而戎卒輕死九九顯而扣角之俊至枯骨掩而三分之仁洽抱朴子曰膏壤在荄而枯葉含榮率俗以身則不言而化故有唐以鹿裘臻太平齊桓以捐紫止奢競章華構而豐屋之過成露臺輟而𤣥黙之風行抱朴子曰聰者料興亡於遺音之響絶明者覿機理於𤣥㣲之未形故越人見齊桓不振之徵於未覺之疾箕子識殷人鹿臺之禍於象箸之初抱朴子曰二儀不能廢春秋以成嵗明主不能舍刑德以致治故誅貴所以立威賞賤所以勸善罰上達則姦萌破而非懦弱所能用也惠下逮則逺人懷而非儉吝所能辦也抱朴子曰浮滄海者必精占於風氣故保利涉之福善莅政者必戰戰於得失故享惟永之慶故闇君之所輕葢明主之所重也亡國之所棄則治世之所行也抱朴子曰毫蹉於機則尋常違於的與奪失於此則善否亂於彼邪正混侔則彛倫攸斁功過不料則庶績以崩故明君賞猶春雨而無霖淫之失罰擬秋霜而無詭時之嚴抱朴子曰明銓衡者所重不可得誣也仗法度者所愛不可得私也故得人者先得之於己者也失人者先失之於己者也未有得已而失人失己而得人者也抱朴子曰明主躬操威恩不假人以利器暗主倒執干戈雖曰尊而勢去故制慶賞而得衆者田常所以奪齊也擅威福而專朝者王莽所以漢也抱朴子曰常制不可以待變化一塗不可以應無方刻船不可以索遺劍膠柱不可以諧清音故翠葢不設於晴朗朱輪不施於涉川味淡則加之以鹽沸溢則增水而減火抱朴子曰丹書鐵劵刺牲㰱血不能救違約之弊則難以結繩檢矣五刑九伐赤族之盛不足以止覬覦之姦則不可以舞干化矣是以書有世重之文易有隨時之宜抱朴子曰人有識真之明者不可欺以偽也有揣深之智者不可誑以淺也不然以虺蛇為應龍狐鴟為麟鳯矣抱朴子曰世有雷同之譽而未必賢也俗有讙譁之毁而未必惡也是以迎而許之者未若鑒其事而試其用逆而距之者未若聽其言而課其實則佞媚不以虚談進良能不以孤弱退駑蹇輟望於大輅戎虬揚鑣而電騁則功胡大而不可建道胡逺而不可到抱朴子曰潜朽之木不能當傾山之風舍隟之崖難以值滔天之濤故七百之祚三十之世非徒牧野之功倒戈之敗鹿臺之禍不始甲子之朝其疆乆矣其亡尙矣抱朴子曰貴逺而賤近者常人之用情也信耳而疑目者古今之所患也是以秦王歎息於韓非之書而想其為人漢武慷慨於相如之文而恨不同世及既得之終不能拔或納讒而誅之或放乎散職葢葉公之好偽形見真龍而失色也抱朴子曰摩尼不宵朗則無别於磧礫化鯤不凌霄則靡殊於桃䖝綿駒吞聲則與喑人為羣逸才沉抑則與凡庸為伍故鱔鰍褻絳虬於淵洿駑蹇黷駿騄於坰野者不識彼物静與之同動與之異抱朴子曰棄金璧於塗路則行人止足委錦紈於泥濘則見者驚咄若夫放高世之士於庸鹵之伍捐經國之器於困滯之地而談者不訟其屈達者不拯其窮或貴其文而息其身或用其策而忘其功斯之為病由來乆矣抱朴子曰開源不億仭則無懷山之流崇峻不凌霄則無彌天之雲財不豐則其惠也不博才不逺則其辭也不贍故覩有盈丈之牙則知其不出徑寸之口見有百尋之枝則知其不附毫末之木抱朴子曰靈鳯所以晨起丹穴夕萃軒丘日未移晷周章九陔凌風蹈雲不䟾不閡者以其六翮之輕勁也夫良才大智亦有國之六翮也抱朴子曰淇衞忘歸不能無絃而逺激振塵之音不能無器而興哀超俗拔萃之德不得立功於未至之時抱朴子曰朱緑之藻不秀於枯柯傾山之流不發乎涸源熠燿之宵焰不能使萬品呈形志盡勢利不能使芳風邈世抱朴子曰重淵不洞地則不能舍螭龍吐吞舟峻山不極天則不能韜琳琅播雲雨立德不絶俗則不能収美聲著厚實執志不絶羣則不能臻成功銘𢎞勲而凡夫朝為蜩翼之善夕望丘陵之益猶立植黍稷坐索於豐収也抱朴子曰行無邈俗之標而索高士之稱體無道藝之本而營朋黨之末欲以収清貴於當世播德音於將來猶蹇裳以越滄海企佇而躍九𤣥抱朴子曰泥龍雖藻繪炳蔚而不堪慶雲之招撩禽雖雕琢𤣥黄而不任凌風之舉芻狗雖飾以金翠而不能躡景以頓逸近才雖豐其寵禄而不能令天清而地平抱朴子曰毒粥既陳則旁有爛腸之鼠明燎宵舉則下有聚死之䖝芻豢之豐則鼎俎承乏才小任大則泣血漣如桑霍為戒厚矣范疏之鑒明矣抱朴子曰滄海揚萬里之濤不能斂山峯之塵驚風摧千仭之木不能拔弱草之荄貙虎虣闞不能威蚊䖟冠世之才不能合流俗抱朴子曰堅志者功名之主也不惰者衆善之師也登山不以艱險而止則必臻乎峻嶺矣清苦不以窮否而怨則必永其令問矣抱朴子曰和鵲雖不長生而針石不可謂非濟命之器也儒者雖多貧賤而墳典不可謂非進德之具也播種有不収者矣而稼穡不可廢仁義有遇禍者矣而行業不可惰抱朴子曰重載不止所以沉我舟也昧進忘退所以危我身也身聚蝎攻本雖權安然必傾之徵也抱朴子曰𤣥雲為龍興非虺蜓所能招也飈風為虎發非狐貉之能致也是以大人受命則逸倫之士集玉帛幽求則丘園之俊起抱朴子曰金以剛折水以柔全山以高移谷以卑安是以執雌節者無争雄之禍多尚人者有召怨之患抱朴子曰淮隂隱勇於跨下不損其龍躍而虎視也應侯韜奇於溺簀不妨其鸞翔而鳯起也或南面稱孤或宰總台鼎故一抑一揚者輕鴻所以凌虛也乍屈乍伸者良才所以俟時也抱朴子曰焦螟之卑棲不肯為銜鼠之戾天𤣥蟬之潔饑不願為蜣螂之飽是以禦寇不納鄭陽之惠曽參不美晉楚之寶抱朴子曰㣲飈不能揚大海之波毫芒不能動萬鈞之鍾是以漆園思惠有捐金之嘆伯氏哀期有𠞰絃之憤短唱不足以致𢎞麗之和勢利不足以移淡泊之心抱朴子曰熊羆不校捷於狐狸金鶚不競擊於小鷂是以張耳掩壯於抱關朱亥竄勇於皷刀抱朴子曰懸魚惑於芳餌檻虎死於籠狐不可以釣緡致者必虬螭也不可以機穽誘者必麟虞也抱朴子曰夫雲翔者不知泥居之洿處貴者尠恕羣下之勞然根朽者尋木不能保其千里之茂也民怨者堯舜不能恃其長世之慶也抱朴子曰凡木結根於靈山而匠石為之寢斤斧小鮮寓身於龍池而漁父為之息網罟蚊集鷹首則鳸鵦不敢啄鼠住虎側則狸犬不敢議抱朴子曰靈蔡黙然而吉㓙昭晢於無形春蛙長譁而醜音見患於聒耳故聲希者響必巨辭寡者信必著抱朴子曰箕踞之俗惡旋盤之容髪之域憎章甫之飾故忠正者見排於䜛勝之世雅人不容乎惡直之俗抱朴子曰升水不能救八藪之燔撮壤不能遏砥柱之沸騰寸刃不能刋長洲之林獨是不能止朋黨之非抱朴子曰千羊不能扞獨虎萬雀不能抵一鷹庭燎攅舉不及羲和之末景百皷並伐未若震霆之餘聲是以庸夫盈朝不能使彞倫攸叙英俊孤任足以令庶事根長抱朴子曰非分之達猶林卉之冬華也守道之窮猶竹栢之履霜也故識否泰於獨見者雖劫以鋒鋭猶不失正而改塗焉安肯諂笑以偶俗乎體方貞以居直者雖誘以封國猶不違情以趨時焉安肯躐徑以取容乎抱朴子曰震雷輷而不能致音乎聾聵之耳重光麗天而不能曲景於幽岫之中凝氷慘慄而不能凋款冬之華朱飈鑠石而不能靡蕭丘之木故至德有所不能移也抱朴子曰彍弩危機嚴鏃銜弦至可忌也而勇雉觸之而不猜闇政亂邦惡直妬能甚難測也而貪人競之而不避故飛鋒暴集而不覺禍敗奄及而不振是以愚夫之所恱乃達者之所悲也凡才之所趨乃大智之所去也抱朴子曰風不輟則扇不用日不入則燭不明華不墮則實不結岸不虧則谷不盈九有乂安則韓白之功不著長君繼軌則伊霍之勲不成故病困乃重良醫世亂而貴忠貞抱朴子曰好榮故樂譽之欲多畏辱則憎毁之情急若夫通精元一合契造化混盈虛以同條齊得失於一指者愛惡未始有所繫窮通不足以滑和抱朴子曰與奪不汨其神者至粹者也利害不雜其和者極醇者也浩浩乎非瓢觶所校矣茫茫乎非跬步所尋矣聲希所以為大音和寡所以崇我貴𤣥黄遼邈而不與其曠死生大矣而不以改其守常分細碎將胡恤焉抱朴子曰林繁則匠入矣珠美則蜯裂矣石含金者焚鑠草任藥者剪掘刃利則先缺絃哀則速絶用以適己真人之寶也才合世求有伎之災也抱朴子曰准的陳則流鏑赴焉美名起則謗讟攻焉瑰貨多藏則不招怨而怨至矣器盈志驕則不召禍而禍來矣抱朴子曰連城之寶非貧寒所能市也高壯之器非淺俗所能識也然盈尺之珍不以莫知而暗其質逸倫之士不以否塞而薄其節樂天任命何怨何尤抱朴子曰大鵬無戒旦之用巨象無馳逐之才故蔣琬敗績於百里而為三台之標陳平困瘁於治家而懷六奇之略抱朴子曰明闇者才也自然而不可飾焉窮達者時也有㑹而不可力焉吕尚非早蔽而晚智然振素而僅遇韓信非初怯而末勇然危困而後達抱朴子曰奔驥不能及既往之失千金不能救斯言之玷故博施者未若防其㣲勤求者不如寡其辭抱朴子曰烈士之愛國也如家奉君也如親則不忠之事不為其罪矣仁人之視人也如己待疏也猶宻則不恕之怨不為其責矣抱朴子曰𤣥氷未結白雪不積則青松之茂不顯俗化不弊風教不頽則皎潔之操不别到危國而沉賤故莊萊抗遺榮之高居亂邦而饑寒故曾列播忘富之稱抱朴子曰天居高而鑒卑故其網雖疎而不漏神聰明而正直故其道賞真而罰偽是以惠和暢於九區則七耀得於𤣥昊殘害著於品物則二氣謬於四八抱朴子曰天秩有罔極之尊人爵無違德之貴故仲尼雖匹夫而饗祀於百代辛癸為帝王而僕竪不願以見比商老身愈賤而名愈貴幽厲位彌著而謗彌惡故齊王之生不及柳惠之墓秦王之宫未若康成之閭抱朴子曰影響不能無形聲以著餘慶不可以無德而招故唐堯為政七十餘載然後景星摛耀羊公積行黄髪不倦而乃墜金雨集塗逺者其至必遲施後者其報常晚抱朴子曰理盡者不可責有餘一至者不可求兼濟故洪濤之末不能蕩浮萍衝風之後不能颺輕塵勁弩之餘力不能洞霧縠西頽之落暉不能照山東抱朴子曰懸象雖薄蝕不可以比螢燭之貞耀黄河雖混渾不可以方沼沚之清澄山雖崩猶峻於丘垤虎雖瘠猶猛於豺狼抱朴子曰神農不九疾則四經之道不垂大禹不胼胝則𤣥珪之慶不集故乆憂為厚樂之本暫勞為永逸之始抱朴子曰金鉤桂餌雖珍而不能制九淵之沉麟顯寵豐禄雖貴而不能致無欲之幽人故吕梁有鴻立之夫河湄繁伐檀之民玉帛徒集於子陵之巷蒲輪虚反於徐生之門抱朴子曰觀聴殊好愛憎難同飛鳥覩西施而驚逝魚鼈聞九韶而深沉故衮藻之燦煥不能恱裸鄉之目采菱之清音不能快楚𨽻之耳古公之仁不能喻欲地之狄端木之辯不能釋繫馬之庸抱朴子曰盤旋之儀見憎於裸踞之鄉繩墨之匠獲忌於曲木之肆貪婪饕餮者疾素絲之皎潔比周實繁者讐高操之孤立猶賈竪之惡同利醜女之害國色抱朴子曰君子之升騰也則推賢而散禄庸人之得志也則矜貴而忽士施惠隆於佞幸用才出乎小惠不與智者共其安而望有危而見救不與奇士同其歡而欲有戚而見恤猶災火張天方請雨於名山洪水凌空方伐舟於東閩不亦晚乎辭義第四十或曰乾坤方圓非規矩之功三辰摛景非瑩摹之力春華燦煥非漸染之采蕙芬馥非容氣所假知夫至真貴乎天然也義以罕覿為異辭以不常為美而歴觀古今屬文之家尠能挺逸麗於毫端多斟酌於前言何也抱朴子曰清音貴於雅韻克諧著作珍乎判㣲析理故八音形器異而鍾律同黼黻文物殊而五色均徒以開澁有主賓妍蚩有步驟是則總章無常曲大庖無定味夫梓豫山積非班匠不能成機巧衆書無限非英才不能収膏何必尋木千章乃構大厦鬼神之言乃著篇章乎抱朴子曰夫才有清濁思有修短雖並屬文參差萬品或浩瀁而不淵潭或得事情而辭鈍違物理而言工葢偏長之一致非兼通之才也闇於自料强以兼之違才易務故不免嗤也抱朴子曰五味舛而並甘衆色乖而皆麗近人之情愛同憎異貴乎合已賤於殊途夫文章之體尤難詳賞茍以入耳為佳適心為快尠知忘味之九成雅頌之風流也所謂考鹽梅之醎酸不知大羮之不致明飄颻之細巧蔽於沉深之𢎞也其英異宏逸者則網羅乎𤣥黄之表其拘束齷齪者則羈紲於籠罩之内振翅有利鈍則翔集有高卑騁迹有遲迅則進趨有逺近駑銳不可膠柱調也文貴豐贍何必稱善如一口乎不能拯風俗之流遯世塗之凌夷通疑者之路賑貧者之乏何異春華不為肴糧之用蕙不救氷寒之急古詩刺過失故有益而貴今詩純虛譽故有損而賤也抱朴子曰屬筆之家亦各有病其深者則患乎譬煩言冗申誠廣喻欲棄而惜不覺成煩也其淺者則患乎妍而無據證援不給皮膚鮮澤而骨骾逈弱也繁華暐則並七曜以曜高麗沉㣲淪妙則儕𤣥淵之無測人事靡細而不浹王道無㣲而不備故能身賤而言貴千載彌彰焉循本第四十一抱朴子曰𤣥寂虛静者神明之本也隂陽柔剛者二儀之本也巍峩巖岫者山嶽之本也德行文學者君子之本也莫或無本而能立焉是以欲致其高必豐其基欲茂其末必深其根鄉黨之友不洽而勤逺方之求涖官之稱不著而索不次之顯是以雖偷虛譽猶狂華干霜以寒曜不崇朝而零瘁矣雖竊大寶於不料冒惟塵以負乘猶鮮介附騰波以高凌顧眄已枯株於危陸矣聖賢孜孜勉之若彼淺近蹻蹻忽之如此積習則忘鮑肆之臭裸鄉不覺呈形之醜自非遁世而無悶齊物於通塞者安能棄近易而尋迂濶哉將救斯弊其術無他徒擢民於巖岫任才而不計也應嘲第四十二抱朴子曰客嘲余云先生載營抱一韜景靈淵背俗獨往邈爾蕭然計决而猶豫不生於心術分定而世累無係於胸間伯陽以道德為首莊子以逍遥冠篇用能標峻格於九霄宣芳烈於罔極今先生高尚勿用身不服事而著君道臣節之書不交於世而作譏俗救生之論甚愛骭毛而綴用兵戰守之法不營進趨而有審舉窮達之篇蒙竊惑焉抱朴子曰君臣之大次於天地思樂有道出處一情隱顯任時言亦何繫大人君子與事變通老子無為者也鬼谷終隱者也而著其書咸論世務何必身居其位然後乃言其事乎夫器非瓊瑶楚和不泣質非潜虬風雲不集余才短德薄幹不適治出處同歸行止一致豈必達官乃可議政事居否則不可論治亂乎常恨莊生言行自伐桎梏世業身居漆園而多誕談好畫鬼魅憎圖狗馬狹細忠貞貶毁仁義可謂彫虎畫龍難以徵風雲空板億萬不能救無錢孺子之馬不免於脚剥上柈之盈案無益於腹虚也或人又曰然吾子所著彈斷風俗言苦辭直吾恐適足取憎在位招擯於時非所以揚聲發譽見貴之道也抱朴子曰夫制器者珍於周急而不以采飾外形為善立言者貴於助教而不以偶俗集譽為高若徒阿順諂諛虚美隱惡豈所匡失弼違醒迷補過者乎慮寡和而廢白雪之音嫌難售而賤連城之價余無取焉非不能屬華艶以取悦非不知抗直言之多吝然不忍違情曲筆錯濫真偽欲令心口相契顧不愧景冀知音之在後也否泰有命通塞聴天何必畫行言用榮及當年乎夫君子之開口動筆必戒悟蔽式整雷同之傾邪磋礱流遁之闇而著書者徒飾弄華藻張磔迂濶屬難驗無益之辭治靡麗虚言之美有似堅白厲修之書公孫刑名之論雖曠籠天地之外㣲入無間之内立解連環離同合異鳥影不動雞卵有足犬可為羊大龜長蛇之言適足示巧表奇以誑俗何異乎畫厫倉以救饑仰天漢以解渴説崑山之多玉不能賑原憲之貧觀藥藏之簿領不能治危急之疾墨子刻木雞以厲天不如三寸之車鎋管青鑄騏驥於金象不如駑馬之周用言高秋天而不可施者丘不與易也喻蔽第四十三抱朴子曰余雅謂王仲任作論衡八十餘篇為冠倫大才有同門魯生難余曰夫瓊瑤以寡為奇磧礫以多為賤故庖犧卦不盈十而彌綸二儀老氏言不滿萬而道徳備舉王充著書兼箱累袠而乍出乍入或儒或墨屬詞比義又不盡美所謂陂原之蒿莠未若步武之黍稷也抱朴子答曰且夫作者之謂聖述者之謂賢徒見述作之品未聞多少之限也吾子所謂竄巢穴之沉昧不知八紘之無外守燈燭之霄曜不識三光之熀朗遊潢洿之淺狹未覺南溟之浩汗滯丘垤之位卑不悟嵩岱之峻極也兩儀所以稱大者以其涵括八荒邈無表也山海所以為富者以其包籠曠濶含受雜錯也若如雅論貴少賤多則穹嶐無取乎宏燾而旁魄不貴於厚載也夫尺水之中無吞舟之鱗寸枝之上無垂天之翼蟻垤之巔無扶桑之林潢潦之源無襄陵之流巨鼇首冠瀛洲飛波凌乎方丈洪桃盤於度索建木竦於都廣沉鯤横於天池雲鵬戾乎𤣥象且夫雷霆之駭不能細其響黄河之激不能局其流騏騄追風不能近其迹鴻鵠奮翅不能卑其飛雲厚者雨必猛弓勁者箭必逺王生學博才大又安省乎吾子云玉以少貴石以多賤夫𤣥圃之下荆華之巔九闕之澤折方之淵琳琅積而成山夜光煥而灼天顧不善也又引庖犧氏著作不多若夫周公既繇大易而加之以禮樂仲尼作春秋而重之以十篇過於庖犧多於老氏皆當貶也言少則至理不備辭寡即庶事不暢是以必須篇累卷積而綱領舉也羲和昇光以啟旦望舒曜景以灼夜五材並生而異用百藥雜秀而殊功四時㑹而嵗功成五色聚而錦繡麗八音諧而簫韶美羣言合而道藝辨積猗頓之財而用之甚少是何異於原憲也懷無銓之量而著述約陋亦何别於瑣碌也音為知者珍書為識者傳瞽曠之調鍾未必求解於同世格言高文豈患莫賞而減之哉且夫江海之不可勝計而不損其深也五嶽之曲木不可訾量而無虧其峻也夏后之璜雖有分毫之瑕暉曜符彩足相補也數千萬言雖有不艶之辭事義高逺足相掩也故曰四瀆之濁不方瓮水之清巨象之瘦不同羔羊之肥矣子又譏之乍入乍出或儒或墨夫發口為言著紙為書書者所以代言言者所以書事若用筆不宜雜載是論議當常守一物昔諸侯訪政弟子問仁仲尼答之人人異辭葢因事託規隨時所急譬猶治病之方千百而針灸之處無常却寒以溫除熱以冷期於救死存身而已豈可詣者逐一道如齊楚而不改路乎陶朱白圭之財不一物者豐也雲夢孟諸所生萬殊者曠也故淮南鴻烈始於原道俶貞而亦有兵畧主術莊周之書以死生為一亦有畏犧慕龜請粟救饑若以所言不純而棄其文是治珠翳而剜眼療濕痺而刖足患荑莠而刈穀憎枯枝而伐樹也百家第四十四抱朴子曰百家之言雖不皆清翰鋭藻𢎞麗汪濊然悉才士所寄心一夫所澄思也正經為道義之淵海子書為增深之川流仰而比之則景星之佐三辰俯而方之則林薄之禆嵩岳而學者專守一業游井忽海遂䟾躓於泥濘之中而沉滯乎不移之困子書披引𤣥曠眇邈泓窈總不測之源揚無遺之流變化不繫於規矩之方圓旁通不淪於違正之邪徑風格高嚴重仭難盡是偏嗜酸甜者莫能賞其味也用思有限者不得辨其神也先民嘆息於才難故百世為隨踵不以璞不生坂坰之嶺而捐曜夜之寶不以書不出周孔之門而廢助教之言猶彼操水者器雖異而救火同焉譬若鍼灸者術雖殊而攻疾均焉狹見之徒區區執一去博亂精思而不識合錙銖可以齊重於山陵聚百千可以致數於億兆惑詩賦瑣碎之文而忽子論深美之言真偽顛倒玉石混淆同廣樂於桑間均龍章於素質可悲可慨豈一條哉文行第四十五或曰德行者本也文章者末也故四科之序文不居上然則著紙者糟粕之餘事可傳者祭畢之芻狗卑高之格是可譏矣抱朴子答曰筌可棄而魚未獲則不得無筌文可廢而未行則不得無文若夫翰迹韻闕逼屬辭比義之妍媸源流至到之修短韞籍汲引之深淺其懸絶也雖天外毫内不足以喻其遼邈其相傾也雖三光熠燿不足以方其巨細龍淵鉛鋌不足以譬其銳鈍鴻羽積金不足以方其輕重而俗士唯見能染毫畫紙槩以一例斯伯氏所以永思鍾子郢人所以格斤不運也夫斵削者比肩而班狄擅絶手之名援琴者至多而虁襄專清聲之稱廐馬千駟而騏騮有邈羣之價美人萬計而威施有超世之色者葢逺過衆也且文章之與德行猶十尺之與一丈謂之餘事未之前聞也八卦生乎鷹隼之飛六甲出於靈龜之負文之所在雖貴本不必便疏不必皆薄譬錦繡之因素地珠玉之託蜯石雲雨生於膚寸江河始於咫尺理誠若兹則雅論病矣又曰應龍徐舉顧盻而凌雲汗血緩步呼吸而千里故螻螘怪其無階而高致駑蹇驚過已之不漸也若夫馳驟詩論之中周旋一經之内以常情覽巨異以量測無涯始自髫齔詣于振素不能得也又世俗率貴古昔而賤當今敬所聞而黷所見同時雖有追風絶景之駿猶謂不及伯樂之所御也雖有宵朗兼城之璞猶謂不及楚和之所泣也雖有斷馬指雕之劍猶謂不及歐冶之所鑄也雖有生枯起朽之藥猶謂不及和鵲之所合也雖有冠羣獨行之士猶謂不及於古人也正郭第四十六抱朴子曰嵇生以為太原郭林宗竟不恭三公之命學無不涉名重於往代加之以知人知人則哲葢亞聖之器也及在衰世悽悽惶惶席不暇温志在乎匡亂行道與仲尼相似余答曰夫智與不智在於一言樞機之玷亂乎白圭愚謂亞聖之評未易以輕有許也夫所謂亞聖者必具體而㣲命世絶倫與彼周孔其間無所復容之謂也若人者亦何足登斯格哉林宗拔萃翹時鑒識朗徹方之常人所議固多引之上及實復未足也此人有機辯風姿又巧自抗遇而善用且好事者為之羽翼延其聲譽於四方故能挾之見推慕於亂世而為過聽不覈實者所推䇿及其片言所褒則重於千金遊涉所經則賢愚波蕩謂龍鳯之集奇瑞之出也吐聲則餘音見法移足則遺迹見擬可謂善擊建皷而當揭日月者耳非真隱也葢欲立朝則世以大亂欲潜伏則悶而不堪或躍則畏禍害爾則非所安倉遑不定載肥載臞而世人逐其華而莫研其實翫其形而不統其神故遭雨巾壞猶復見傚不覺其短皆是𩔖也俗民追聲一至於是故其雖有缺隙莫之敢指也夫林宗學涉知人非無分也然而未能避過實之明而闇於自料也或勸之以出仕進者林宗對曰吾晝察人事夜㸔乾象天之所廢不可支也方今運在明夷之爻值勿用之位葢盤桓潜居之時非在天利見之㑹也雖在原陸猶恐滄海流横吾其魚也況可冒衝風而乗奔波乎未若巖岫頥神娯心彭老優哉游哉聊以卒嵗按林宗之言其知漢之不可救非其才之所辦審矣當仰隮商洛俯泛五湖追巢父於峻嶺尋漁父於滄浪若不能結蹤山客離羣獨往則當掩景淵洿韜鱗括囊而乃自西徂東席不暇溫欲慕孔墨悽悽之事聖者憂世周流四方猶為退士所見譏彈林宗才非應期器不絶倫出不能安上治民移風易俗入不能殫毫屬筆祖述六藝行自衒耀亦既過差収名赫赫受饒頗多然卒進無補於治亂退無迹於竹帛觀傾視汨氷泮草靡未有異于庸人也無故沉浮於波濤之間倒屣於埃塵之中遨集京邑交關貴游輪傾䇿弊匪遑啟處遂使聲譽翕熠秦胡景附巷結朱輪之軌堂列赤紱之客軺車盈街載奏連車誠為游俠之徒未合逸隱之科也有道之世而臻此者猶不得復厠高潔之條貫為秘迹之俊民修兹在於危亂之運奚足多哉孰不謂之闇於天人之否泰蔽於自量之優劣乎空背恬黙之塗竟無有為之益不值禍敗葢其幸耳以此為憂世念國希擬素王有似蹇足之尋龍騏斥鷃之逐鴻鵠焦㝠之方雲鵬鼷鼬之比巨象也然則林宗可謂有耀俗之才無用守之質見無不了庶及大用符采外發精神内虚不勝煩躁言行相伐口稱静退心希榮利未得𤣥圃之棲禽九淵之潜靈也自自媒士女之醜事也知其不可而猶傚尤師亞聖之器其安在乎雖云知人知人之明乃唐虞之所難尼父之所病夫以明並日月原始見終且猶有失不能常中况於林宗熒燭之明得失半解已為不少矣然則名稱重於當世美談盛於既沒故其所得者則世共傳聞而所失者則莫之有識爾雖頗甄無名之士於草萊指未剖之璞於丘園然未能進忠烈於朝廷立禦侮於疆場解亡徵於倒懸折逆謀之競逐若鮑子之推管生平仲之達穰苴林宗名振於朝廷敬於一時三九肉食莫不欽重力足以拔才言足以起滯而但養疾京輦招合賓客無所進致以匡危敝徒能知人不肯薦舉何異知沃壤之任良田識直木之中梁柱而終不墾之以播嘉穀伐之以構梁棟奚解於不粒何救於露居哉其距貢舉者誠高操也其走不休者亦其疾也嵇生又曰林宗存為一世之所式沒則遺芳永播碩儒俊士未或指㸃而吾生獨評其短無乃見嗤於將來乎抱朴子曰曷為其然哉茍吾言之允者當付之於後後之識者何恤於寡和乎且前賢多亦譏之獨皇主褒過耳故太傅諸葛公元遜亦曰林宗隱不修遁出不益時實欲揚名養譽而已街談巷議以為辯訕上謗政以為高時俗貴之歙然猶郭解原涉見趨於曩時也後進慕聲者未能考之於聖王之典論之於先賢之行徒惑華名咸競准的學之者如不及談之者則盈耳中人猶不覺童蒙安能知故零陵太守殷府君伯緒高才篤論之士也亦曰林宗入交將相出游方國崇私議以動衆關毁於朝廷其所欲則風騰雨驟改價易姿其所惡則摧頓陸沉士人不齒折其名賢遭亂隱遁含光匿景未為逺矣君子行道以匡君也以正俗也于時君不可匡俗不可正林宗周旋清談閭閻無救於世道之陵遲無解於天民之憔悴也又故中書郎周生恭逺英偉名儒也亦曰夫遇治而贊之則謂之樂道遭亂而救之則謂之憂道亂不可救而避之則謂之守道虞舜樂道者也仲尼憂道者也㣲子守道者也漢世將傾世務交游林宗法當慨然虚心要同契君子共矯而正之而悽悽為之雄伯非救世之宜也于時雖諸黄門六畜自寓耳其陳蕃竇武之徒雖鼎司牧伯皆貴重林宗信其言論臧否取定於匡危易俗不亦可冀乎而林宗既不能薦有為之士立毫毛之益而逋逃不仕也則方之巢許廢職待客者則比之周公養徒避役者則擬之仲尼棄親依豪者則同之游夏是以世眩名實而大亂滋甚也若謂林宗不知則無以稱聰明若謂知之而不改則無以言憂道昔四皓似周公而不能為周公今林宗似仲尼而不得為仲尼也於是問者慨而嘆曰然則斯人乃避亂之徒非全隱之高矣彈禰第四十七抱朴子曰漢末有禰衡者年二十有三孔文舉齒過知命身居九列文學冠羣少長稱譽名位殊絶而友衡於布衣又表薦之於漢朝以為宜起家作臺郎云惟嶽降神異人並出目所一見輒誦於口耳所瞥聞不忘於心性與道合思若有神其嘆之如此衡游許下自公卿國士以下衡初不稱其官皆名之云阿某或以姓呼之為其兒呼孔融為大兒呼楊修為小兒荀彧猶强可與語過此以往皆木梗泥偶似人而無人氣皆酒瓮飯囊耳百官大㑹衡時在坐忽顰悽愴哀歎慷慨或譏之曰英豪樂集非所嘆也衡顧盻歴視稠衆而答曰在此積尸列柩之間仁人安能不悲乎曹公嘗切齒欲殺之然無有八法應死之罪又惜有殺儒生之名乃謫作皷吏衡了無悔情恥色乃縛角於柱口就吹之乃有異聲並揺撃皷聞者不知其一人也而論更劇而無所顧忌尋亡走投荆州牧劉表表欲作書與孫權討逆于時已全據江東帶甲百萬欲結輔車之援共距中國使諸文士立草盡思而不得表意乃示衡衡省之曰但欲使孫左右柱刀兒視之者此可用爾儻令張子布見此大辱人也即摧壞投地表悵然有怪色謂衡曰為子不中芸鋤乎惜之也索紙筆便更書之衆所作有十餘通衡凡一歴視之而已暗記書之畢以還表表以還主或有録所作之本也以比校之無一字錯乃各大驚表乃請衡更作衡即作成手不停輟表甚以為佳而施用焉衡驕傲轉甚一州人士莫不憎恚而表亦不復堪欲殺之或諌以為曹公名為嚴酷猶能容忍衡少有虚名若一朝殺之則天下游士莫復擬足於荆楚者也表遂遣之衡走到夏口依將軍黄祖祖待以上賓祖大兒黄射與衡偕行過人墓下俱讀碑銘一過而去乆之射曰前所視碑文大佳恨不寫也衡曰卿存其名耳我一覽尚記之即為暗書之末有一字石缺乃不分明衡與半字曰疑此當作某字恐不審也衡平生雖言行輕人宻願榮顯是以高游鳯林不能幽翳蒿萊然修己駮刺迷而不覺故開口見憎舉足蹈禍齎如此之伎倆亦何理容於天下而得其死哉猶烏鳴狐嚾人皆不喜音響不改易處何益許下人物之海也文舉為之主任荷之足為至到於此不安已可知矣猶必死之病俞附越人無如何朽木鉛鋌班輸歐冶所不能匠也而復走投荆楚間中陷極害此乃衡懵蔽之效也葢欲之而不能得非能得而弗用者也於戯才士可勿戒哉生曰吾所惑者衡之虚名也子所論者衡之實病也敢不寤寐於指南投杖於折中乎詰鮑第四十八鮑生敬言好老莊之書治劇辯之言以為古者無君勝於今世故其著論云儒者曰天生烝民而樹之君豈其皇天諄諄言亦將欲之者為辭哉夫彊者凌弱則弱者服之矣智者詐愚則愚者事之矣服之故君臣之道起焉事之故力寡之民制焉然則𨽻屬役由乎争彊弱而校愚智彼蒼天果無事也夫混茫以無名為貴羣生以得意為歡故剥柱刻漆非木之願拔鶡裂翠非鳥所欲促轡銜鑣非馬之性荷軛運重非牛之樂詐巧之萌任力違真伐根之生以飾無用捕飛禽以供華玩穿本完之鼻絆天放之脚葢非萬物並生之意夫役彼黎烝養此在官貴者禄厚而民亦困矣夫死而得生欣喜無量則不如向無死也讓爵辭禄以釣虚名則不如本無讓也天下逆亂焉而忠義顯矣六親不和焉而孝慈彰矣曩古之世無君無臣穿井而飲耕田而食日出而作日入而息汎然不繫恢爾自得不競不營無榮無辱山無蹊徑澤無舟梁川谷不通則不相并兼士衆不聚則不相攻伐是高巢不探深淵不漉鳯鸞栖息於庭宇龍鱗羣逰於園池饑虎可履虺蛇可執涉澤而鷗鳥不飛入林而狐不驚勢利不萌禍亂不作干戈不用城池不設萬物𤣥同相忘於道疫癘不流民獲考終純白在胸機心不生含餔而熈皷腹而遊其言不華其行不飾安得聚斂以奪民財安得嚴刑以為坑穽降及叔季智用巧生道德既衰尊卑有序繁升降損益之禮飾紱冕𤣥黄之服起土木於凌霄構丹緑於棼橑傾峻搜寶泳淵採珠聚玉如林不足以極其變積金成山不足以贍其費澶漫於淫荒之域而叛其大始之本去古日逺背朴彌増尚賢則民争名貴貨則盜賊起見可欲則真正之心亂勢利陳則刼奪之塗開造剡鋭之器長侵割之患弩恐不勁甲恐不堅矛恐不利盾恐不厚若無凌暴此皆可棄也故曰白玉不毁孰為珪璋道德不廢安取仁義使夫桀紂之徒得燔人辜諫者脯諸侯葅方伯剖人心破人脛窮驕淫之惡用炮烙之虐若令斯人並為匹夫性雖㐫奢安得施之使彼肆酷恣欲屠割天下由於為君故得縱意也君臣既立衆慝日滋而欲攘臂乎桎梏之間愁勞於塗炭之中人主憂慄於廟堂之上百姓煎擾乎困苦之中閑之以禮度整之以刑罰是猶闢滔天之源激不測之流塞之以撮壤障之以指掌也抱朴子難曰葢聞冲昧既闢降濁升清穹隆仰燾旁泊俯停乾坤定位上下以形逺取諸物則天尊地卑以著人倫之體近取諸身則元首股肱以表君臣之序降殺之軌有自來矣若夫太極混沌兩儀無質則未若𤣥黄剖判七耀垂象隂陽陶冶萬物羣分也由兹以言亦知鳥聚獸散巢栖穴竄毛血是茹結草斯服入無六親之尊卑出無階級之等威未若庇體廣厦稻梁嘉㫖黼黻綺紈御冬當暑明辟莅物良宰巧匠設官分職宇宙穆如也貴賤有章則慕賞畏罰勢齊力均則争奪靡憚是以有聖人之作受命自天或結罟以畋漁或瞻辰而鑽燧或嘗卉以選粒或構宇以仰蔽備物致用去害興利百姓欣戴奉而尊之君臣之道於是乎生安有詐愚凌弱之理三五迭興道教遂隆辨章勸沮德盛刑清明良之歌作蕩蕩之化成泰階既平七政遵度梧禽激響於朝陽麟虞覿靈而來出龜龍吐藻於河湄景老摛耀於天路皇風振於九域㐫器戢乎府庫是以禮制則君安樂作而刑厝也若夫奢淫狂暴由乎人已豈必有君便應爾乎而鮑生獨舉衰世之罪不論至治之義何也且夫逺古質朴葢其未變民尚童蒙機心不動譬夫嬰孩智慧未萌非為知而不為欲而忍之也若人與人争草萊之利家與家訟巢窟之地上無治枉之官下有重𩔖之黨則私鬭過於公戰木石鋭於干戈交尸布野流血絳路久而無君噍𩔖盡矣至於擾龍馴鳯河圖洛書或麟銜甲負或黄魚波湧或丹禽翔授或回風三集皆在有君之世不出無王之時也夫祥瑞之徵指發𤣥極或以表革命之符或以彰至治之盛若令有君不合天意彼嘉應之來孰使之哉子若以混㝠為美乎則乾坤不宜分矣若以無名為高乎則八卦不當畫矣豈造化有謬而太昊之闇哉雅論所尚惟貴自然請問夫識母忘父羣生之性也拜伏之敬世之末飾也然性不可任必尊父焉飾不可廢必有拜焉任之廢之子安乎古者生無棟宇死無殯𦵏川無舟檝之器陸無車馬之用吞啖毒烈以至殞斃疾無醫術枉死無限後世聖人改而垂之民到于今賴其後惠機巧之利未易敗矣今使子居則反巢穴之陋死則捐之中野限水則泳之游之山行則徒步負戴棄鼎鉉而為生臊之食廢針石而任自然之病裸以為飾不用衣裳逄女為偶不假行媒吾子亦將曰不可也况於無君乎若令上世人如木石𤣥氷結而不寒殽糧絶而不饑者可也衣食之情茍在其心則所争豈必金玉所競豈必榮位橡芋可以生鬬訟藜藿足用致侵奪矣夫有欲之性萌於受氣之初厚己之情著於成形之日賊殺并兼起於自然必也不亂其理何居夫明王在上羣后盡規坐以待旦昧朝旰食延誹謗以攻過責昵屬之補察聴輿謡以屬省鑒履尾而夕惕颺清風以掃厲秋威以肅物制峻網宻有犯無赦刑戮以懲小罪九伐以討大憝猶懼豺狼之當路感倫之不叙憂作威之凶家恐姦宄之害國故嚴司鷹揚以彈違虎臣杖鉞於方嶽而狂狡之莫變世絶之而命放之使無所憚則盜跖將横行以掠殺而良善端拱以待禍無主所訢無疆所憑而冀家為夷齊人皆柳惠何異負豕而欲無臭憑河而欲不濡無轡筴而御奔馬棄柂櫓而乗輕舟未見其可也鮑生又難曰夫天地之位二氣範物樂陽則雲飛好隂則川處承柔剛以卒性隨四八而化生各附所安本無尊卑也君臣既立而變化遂滋夫獺多則魚擾鷹衆則鳥亂有司設則百姓困奉上厚則下民貧壅崇寳貨飾玩臺榭食則方丈衣則龍章内聚曠女外多鰥男採難得之寶貴奇怪之物造無益之器恣不已之欲非鬼非神財力安出哉夫穀帛積則民有饑寒之儉百官備則坐靡供奉之費宿衛有徒食之衆百姓養游手之人民乏衣食自給已劇况加賦斂重以苦役下不堪命且凍且饑冒法斯濫於是乎在王者憂勞於上台鼎頻顣於下臨深履薄懼禍之及恐智勇之不用故厚爵重禄以誘之恐姦釁之不虞故嚴城深池以備之而不知禄厚則民匱而臣驕城嚴則役重而攻巧故散鹿臺之金發鉅橋之粟莫不懽然况乎本不聚金而不斂民粟乎休牛桃林放馬華山載戢干戈載櫜弓矢猶以為太况乎本無軍旅而不戰不成乎茅茨土階棄織拔葵雜囊為幃濯裘布被妾不衣帛馬不秣粟儉以率物以為美談所謂盜跖分財取少為讓陸處之魚相煦以沫也夫身無在公之役家無輸調之費安土樂業順天分地内足衣食之用外無勢利之争操杖攻刼非人情也象刑之教民莫之犯法令滋彰盜賊多有豈彼無利性而此專貪殘葢我清静則民自正下疲怨則智巧生也任之自然猶慮凌暴勞之不休奪之無己田蕪倉虚杼柚乏空食不充口衣不周身欲令勿亂其可得乎所以救禍而禍彌深峻禁而禁不止也關梁所以禁非而猾吏因之以為非焉衡量所以檢偽而邪人因之以為偽焉大臣所以扶危而姦臣恐主之不危兵革所以静難而寇者盜之以為難此皆有君之所致也民有所利則有争心富貴之家所利重矣且夫細人之争不過小小匹夫校力亦何所至無疆土之可貪無城郭之可利無金寶之可欲無權柄之可競勢不能以合徒衆威不足以驅異人孰與王赫斯怒陳師鞠旅推無讐之民攻無罪之國僵尸則動以萬計流血則漂樐丹野無道之君無世不有肆其虐亂天下無邦忠良見害於内黎民暴骨於外豈徒小小争奪之患邪至於移父事君廢孝為忠申令無君亦同有之耳古之為屋足以蔽風雨而今則被以朱紫飾以金玉古之為衣足以掩身形而今則𤣥黄黼黻錦綺羅紈古之為樂足以定人情而今則煩手淫聲驚魂傷和古之飲食足以充饑膚而今則焚林漉淵宰割羣生豈可以事之有過而都絶之乎若令唐虞在上稷禹賛事卑宫薄賦使民以時崇節儉之清風肅玉食之明禁質素簡約者貴而顯之亂化侵民者黜而戮之則頌聲作而黎庶安矣何必慮火灾而壞屋室畏風波而填大川乎抱朴子曰鮑生貴上古無君之論余既駁之矣後所答余文多不能盡載余稍條其論而牒詰之云鮑生曰人君採難得之寶聚奇怪之物飾無益之用厭無已之求抱朴子詰曰請問古今帝王盡採難得之寶聚奇怪之物乎有不爾者也今聞唐堯之為君也捐金於山虞舜之禪也捐璧於谷蔬食菲服方之監門其不竭淵剖珠傾巖刋玉鑿石鑠黄白之鑛越海裂翡翠之羽網瑇瑁於絶域掘丹青於岷漢亦可知矣夫服章無殊則威重不著名位不同則禮物異數是以周公辨貴賤上下之典式宫室居處則有堵雉之限冠葢旌旗則有文物之飾車服器用則有多少之制庖厨供羞則有法膳之品年凶災𤯝又減撤之無已之慾不在有道子之所云可以聲桀紂之罪不足以定雅論之證也鮑生曰人君後宫三千豈皆天意糓帛積則民饑寒矣抱朴子詰曰王者妃妾之數聖人之所制也聖人與天地合其德者也其德與天地合豈徒異哉夫豈徒欲以順情盈慾而已乎乃所以佐六宫理隂陽教肅宗廟奉神祇承大祭供𤣥紞之服廣本支之路且案周典九土之記及漢氏地理之書天下女數多於男焉王所宗豈足以逼當娶者哉姬公思之似已審矣帝百僚以藉田后妃將命婦以織下及黎庶農課有限力佃有賞怠惰有罰十一而稅以奉公用家有備㓙之儲國有九年之積各得順天分地不奪其時調薄役希民無饑寒衣食既足禮讓以興昔文景之世百姓務農家給戸豐官倉之米至腐赤不可勝計然而士庶猶侯服鼎食牛馬葢由於賦斂有節不足損下也至於季世官失佃課之制私務浮末之業生糓之道不廣而游食之徒滋多故上下同之而犯非者衆鮑生乃歸咎有君未若譏采擇之過限刺農課之不實責牛飲之三千貶履畆與太半但使後宫依周禮租調不横加斯則可矣必無君乎夫一日晏起則事有失所即鹿無虞維入于林中安可終已靡所宗統則君子失所仰㐫人得其志網疎猶漏可都無網乎鮑生曰人之生也衣食已劇况又加之以収賦重之以力役饑寒並至下不堪命冒法犯非於是乎生抱朴子詰曰蜘蛛張網蚤虱不餒使人智巧役用萬物食口衣身何足劇乎但患富者無知止之心貴者有無限之用豈可以一䟾之故而終身不行以桀紂之虐思乎無主也但言主事彌張賦斂之重於往古民力之疲於末務饑寒所緣以譏之可也而言有役有賦使國亂者請問唐虞昇平之世三代有道之時為無賦役以相供奉元首股肱躬耕以自給鮑生乃唯知饑寒並至莫能固窮獨不知衣食並足而民知榮辱乎鮑生曰王者臨深履尾不足喻危假寐待旦日昃旰食將何為懼禍及也抱朴子難曰審能如此乃聖主也王者所病在乎驕奢賢者不用用者不賢夏癸指天日以自喻秦始憂萬世之同謚故致傾亡取笑將來若能懼危夕惕廣納規諫詢蒭蕘以待養黄髪以乞言何憂機事之有違何患百揆之不康夫戰兢則彛倫叙怠荒則姦宄作豈况無君能無亂乎鮑生曰王者斂想奇瑞引誘幽荒欲以崇德邁威厭耀未服白雉玉環何益齊民乎抱朴子詰曰夫王者德及天則有天瑞德及地則有地應若乃景星摛光以佐望舒之耀冠日含采以表羲和之晷靈禽嗈喈於阿閣金象焜熀乎清沼此豈卑辭所致厚幣所誘哉王莽姦猾包藏禍心文致太平誑眩朝野貺遺外域使送瑞物豈可以此謂古皆然乎夫見盈丈之尾則知非咫尺之軀覩尋仭之牙則知非徑寸之口故王母之遣使明其𤣥化通靈無逺不懷也越裳之重譯足知惠沾殊方化被無外也夫絶域不可以力服蠻貊不可以威攝自非至治焉能然哉何者鮑生謂為不用夫周室非乏玉而須王母之環以為富也非儉膳而竭越裳之雉以充庖也所以貴之者誠以斯為太平則上無苛虐之政矣孰多於斯而云不用無益於齊民源逺體大固未易見鮑生之言不亦宜乎鮑生曰人君恐姦釁之不虞故嚴城以備之也抱朴子詰曰侯王設險大易所貴不審嚴城何譏焉爾夫兩儀肇闢萬物化生則邪正存焉爾夫聖人知㓙醜之自然下愚之難移猶春陽之不能榮枯朽炎景之不能鑠金石冶容慢藏誨淫召盜故取法乎習坎備豫於未萌重門有擊柝之警治戎遏暴客之變而欲除之其理何居兕之角也鳯之距也天實假之何必日用哉蜂蠆挾毒以衛身智禽銜蘆以扞網貛曲共穴以備徑至之鋒水牛結陣以却虎豹之暴而鮑生欲棄甲胄以進利刃堕城池以止衝鋒若令甲胄既捐而利刃不住城池既壞而衝鋒猶集公輸墨翟猶不自全不審吾生計將安出乎或曰茍無可欲之物雖無城池之固敵亦不來者也抱朴子答曰夫可欲之物何必金玉錐刀之末愚民競焉越人之大戰由乎分蚺虵之不均呉楚之反兵起乎一株之桑葉饑荒之世人人相食素手祼跣逺則甫侯子羔近則于公釋之探情審罰剖毫析芒受戮者吞聲而歌德刖劓者没齒無怨言此皆非無君之時也昔有鰥在下而四嶽不蔽明揚仄陋而元凱畢舉或投屠刀而排金門或釋版築而躡玉堂或委芻豢而登卿相或自亡命而為上將伯柳達讎人解狐薦怨家方回叩頭以致士禽息碎首以推賢敢問於時有君否又云田蕪廩虚皆由有君夫君非塞田之蔓草臣非耗倉之雀鼠也其蕪其虚卒由戹運水旱疫癘以臻㐫荒豈在賦求令其然乎至於八政首食謂之民天后稷躬稼有虞親耕豐年多黍多稌我庾惟億民食其陳陌渠開而斥鹵膏壤邵父起陽陵之陂而積糓為山叔敖創期思而家有腐粟趙過造三犂之巧而關右以豐任延教九真之佃而黔庶殷飽此豈無君之時乎知止第四十九抱朴子曰禍莫大於無足福莫厚乎知止抱盈居冲者必全之筭也宴安盛滿者難保之危也若夫善卷巢許管胡之徒咸蹈雲物以高鷔依龍鳯以竦迹覘韜鋒於香餌之中悟覆車乎來軔之路違險塗以避濟故能免詹何之釣緡可謂善料㣲景於形外覿堅氷於末霜徙薪曲突於方熾之火纚舟弭檝於衝風之前瞻九犗而深沉望宻蔚而曾逝不託巢於葦苕之末不偃寢乎崩山之崖者也斯豈器大量𢎞審機識致凌儕獨往不牽常慾神參造化心遺萬物可欲不能蠆介其純粹近理不能耗滑其精誠茍無若人之自然誠難企及乎絶軌也徒令知功成者身退慮勞大者不賞狡兔訖則知獵犬之不用高鳥盡則覺良弓之將棄鑒彭韓之明鏡而念抽簮之術覩越種之闇則而識金象之貴若范公泛艘以絶景薛生遜亂以全潔二疏投印於方盈田豫釋紱於漏盡進脫亢悔之咎退無濡尾之吝清風足以揚千載之塵德音足以祛將來之惑方之陳竇不亦邈乎或智小敗於謀大或轅弱折於載重或獨是陷於衆非或盡忠訐於兼㑹或倡高筭而受晁錯之禍或竭心力而遭呉起之害故有跼高蹐厚猶不免焉公旦之放仲尼之行賈生遜擯於下土子長熏骨乎無辜樂毅平齊伍員破楚白起以百勝拓疆文子以九術霸越韓信功葢於天下黥布滅家以佐命榮不移晷辱以及之不避其禍豈智者哉為臣不易豈將一塗要而言之決在擇主我不足賴其驗如此告退避賢潔而且安美名厚實禍莫大焉能修此術萬有一焉吉凶由人可勿思乎逆耳之言樂之者希獻納斯榮將身禍救誹謗其不暇何信受之可必哉夫矰繳紛紜則鴛雛徊翮坑穽充蹊則麟虞斂迹情不可極慾不可滿達人以道制情以計遣慾為謀者猶宜使忠况自為策而不詳哉葢知足者常足不知足者無足也常足者福之所赴也無足者禍之所鍾也生生之厚殺我生生矣宋氏引苗郢人張華誠欲其快而實速萎裂知進忘退斯之以乎夫筴奔而不止者尠不傾墜凌波而無休者希不沉溺弄刄不息者傷刺之由也斫撃不輟者缺毁之原也盈則有損自然之理周廟之器豈欺我哉故養由之射行人識以㢮弦東野之御顔子知其方敗成功之下未易乆處也夫飲酒者不必盡亂而亂者多焉富貴者豈其皆危而危者有焉智者料事於倚伏之表伐木於毫末之初吐高言不於累棊之際議治裘不於羣狐之中古人狂為愚豈所樂哉時之宜然不獲己也亦有深逃而陸遭濤波幽遁而水被焚燒若龔勝之絶粒以殞命李業煎蹙以吞酖由乎迹之有朕景之不滅也若使行如蹈氷身如居隂動無遺蹤可尋靜與無為為一豈有斯患乎又况乎揭日月以隱形骸撃建皷以徇利器者哉夫值明時則優於濟四海遇險世則劣於保一身為此永慨非一士也吾聞無熾不滅靡溢不損煥赫有委灰之兆春華為秋瘁之端日中則昃月盈則蝕四時之序成功者退逺取諸物則構高崇峻之無限則頽壞惟憂矣近取諸身則嘉膳㫖酒之不節則結疾傷性矣况乎其高概雲霄而積之猶不止其威震人主而加崇又不息者乎蚊䖟墮山適足翺翔兕虎之墜碎而為薤此言大物不可失所也且夫正色彈違直道而行打撲干紀不慮讐隙則怨深恨積若舍法容非囑託如響吐剛茹柔委曲繩墨則思喪敗居此地者不亦勞乎是以身名並全者甚希而折足覆餗者不乏也然而入則蘭房窈窕朱帷組帳文茵兼舒於華第艶容燦爛於左右輕體柔聲清歌妙舞宋蔡之巧陽阿之妍口吐採菱延露之曲足躡渌水七槃之節和音悦耳冶姿娯心宻宴繼集醁不撤仰登綺閣俯映清淵遊果林之丹翠戯蕙圃之芬馥文鱗瀺灂朱羽頡頏飛繳墮雲鴻沉輪引魴鯉逺珍不索而交集玩弄紛華不求而自至出則朱輪耀路高葢接軫丹旗雲蔚麾節翕赫金鼓嘈囐戈甲璀錯得意託於後乗嘉㫖盈乎屬車窮逰觀之娯極畋漁之懽聖明之譽滿耳而入諂悦之言異口同辭于時𦕈然意蔑古人謂伊吕管晏不足也豈覺崇替之相為首尾哀樂之相為朝暮肯謝貴盛乞骸骨背朱門而反丘園哉若乃聖明在上大賢讃事百揆非我則不叙兆民非我則不濟高而不以危為憂滿而不以溢為慮者所不論也窮達第五十或問一流之才而或窮或達其故何也俊逸縶滯其有憾乎抱朴子答曰夫器業不異而有抑有揚者無知己也故否泰時也通塞命也審時者何怨於沉潜知命者何恨於卑瘁乎故湛盧純鉤精勁之良也而不以撃則朝菌不能斷焉珧華黎緑連城之寶也委之泥濘則瓦礫積其上焉故可珍而不必珍也可用而不必見用也庸俗之夫闇於别物不分朱紫不辨菽麥唯以達者為賢而不知僥求者之所達也唯以窮者為劣而不詳守道者之所窮也且夫懸象不麗天則不能揚大明灼無外嵩岱不託地則不能竦峻極概雲霄兎足因夷塗以騁迅龍艘汎激流以效離光非燧人不熾楚金非歐冶不剡豐華俟發春而表艶棲鴻待衝飈而輕戾四嶽不明揚則有鰥不登庸牙不推賢則夷吾不式厚穰苴賴平仲以超踔淮隂因蕭公以鷹揚雋生由勝之之談曲逆縁無知之薦元直起龍縈之孔明公瑾籍貢卧之興霸故能美名垂於帝籍𢎞勲著於當世也漢之末年呉之季世則不然焉舉士也必附己者為前取人也必多黨者為決而附己者不必足進之器也同乎我故不能遺焉而多黨者不必逸羣之才也信衆口故謂其可焉或信此之庸猥而不能遣所念之近清或識彼之英異而不能平心於至公於是釋銓衡而以疏數為輕重矣棄度量而以綸集為多少矣于時之所謂雅人高韻秉國之鈞黜陟決已褒貶由口者尠哉免乎斯累也又况於胸中卒有憎獨立疾非黨忌勝己忽寒素者乎悲夫邈俗之士不羣之人所以比肩不遇不可勝計或抑頓於藪澤或立朝而斥退也葢修德而道不行藏器而時不㑹或俟河清而齒已沒或竭忠勤而不見知逺用不騁於一世勲澤不加於生民席上之珍鬱於泥濘濟物之才終於無施操築而不值武丁抱竿而不遇西伯自曩迄今將有何限而獨悲之不亦陋哉瞻徑路之逺而恥由之知大道之否而不改之齊通塞於一塗付榮辱於自然豈懷悒悶於知希興永嘆於川逝乎疑其有憾是未識至人之用心也小年之不知大年井蛙之不曉滄海自有來矣重言第五十一抱朴子曰余有人𤣥泊先生者齒在志學固已窮覽六略旁綜河洛晝競羲和之末景夕照望舒之餘輝道靡逺而不究言無㣲而不測以儒道為城池以機神為干戈故談者莫不望塵而銜璧文士寓目而格筆俄而悟智者之不言覺守一之無咎意得則齊筌蹄之可棄道乖則覺唱高而和寡於是奉老氏多敗之戒思金人三緘之義括鋒頴而如納韜修翰于彤管含金懷玉抑謐華辯終日彌夕或無一言門人進曰先生黙然小子胡述且與庸夫無殊焉竊謂號鐘不鳴則不異於積銅浮磬息音則未别乎聚石也𤣥泊先生答曰吾特収逺名於萬代求知己於將來豈能競見知於今日標格於一時乎陶甄以盛酒雖美不見酣身卑而言高雖是不見信徒卷舌而竭聲將何救於流遁古人六十笑五十九不逺迷復乃覺有以也夫玉之堅也金之剛也氷之冷也火之熱也豈須自言然後明哉且八音九奏不能無長短之病養由百發不能止將有一失之疏翫馮河者數溺於水好劇談者多漏於口伯牙謹於操絃故終無煩手之累儒者敬其辭令故終無樞機之辱淺近之徒則不然焉辯虚無之不急争細事以費言論廣修堅白無用之説訟諸子非聖過正之書損教益惑謂之深逺委棄正經競治邪學或與闇見者較唇吻之勝負為不識者吐清高之談對此非敵力之人旁無賞解之客何異奏雅樂於木梗之側陳𤣥黄於土偶之前哉徒口枯氣乏雄抗抵掌斤斧缺壞而槃節不破勃然戰色而乖忤愈逺致令恚容喪顔醜言自口偷薄之變生乎其間既玷之謬不可救磨未若希聲以全大音約説以俟識者矣自叙第五十一抱朴子者姓葛名洪字稚川丹陽句容人也其先葛天氏葢古之有天下者也後降為列國因以為姓焉洪曩祖為荆州刺史王莽之簒君恥事國賊棄官而歸與東郡太守翟義共起兵將以誅莽為莽所敗遇赦免禍遂稱疾自絶於世莽以君宗强慮終有變乃徙君於瑯琊君之子浦廬起兵以佐光武有大功光武踐祚以廬為車騎又遷驃騎大將軍封下坯僮縣侯食邑五千户開國初侯之弟文隨侯征討屢有大捷侯比上書文為訟功而官以文私從兄行無軍名遂不為論侯曰弟與我同冒矢石瘡痍周身傷失右眼不得尺寸之報吾乃重金累紫何心以安乃自表乞轉封於弟書至上請報漢朝欲成君高義故特聴焉文辭不獲已受爵即第為驃騎營立宅舍於博望里于今基兆石礎存焉又分割租秩以供奉吏士給如二君焉驃騎殷勤止之而不從驃騎曰此更煩役國人何以為讓乃託他行遂南渡江而家于句容子弟躬耕以典籍自娯文累使奉迎驃騎驃騎終不還又令人守䕶博望宅舍以冀驃騎之反至于累世無居之者洪祖父學無不涉究測精㣲文藝之高一時莫倫有經國使才仕呉歴宰海鹽臨安山隂縣入為吏部侍郎御史中丞廬陵太守吏部尚書太子少傅中書大鴻臚侍中光禄勲輔呉將軍封呉壽縣侯洪父以孝友聞行為士表方册所載罔不窮覽仕吳五官郎中正建城南昌二縣令中書郎廷尉平中䕶軍拜㑹稽太守未辭而晉軍順流西境不守博簡秉文經武之才朝野之論僉然推君於是轉為五郡赴警大都督給親兵五千總統征軍戍遏疆塲天之所壞人不能支故主欽若九有同貫君以故官赴除郎中稍至大中大夫歴位大中肥鄉令縣户二萬舉州最治德化尤異恩洽刑清野有頌聲路無姦跡不佃公田越界如市秋毫之贈不入于門紙筆之用皆出私財刑厝而禁止不言而化行以疾去官發詔見用為吳郎中令正色弼違進可替否舉善彈枉軍國肅雍邵陵太守卒於官洪者君之第三子也生晚為二親所嬌嬈不早見督以書史年十有三而慈父見背夙失庭訓饑寒困瘁躬執耕穡承星履草宻勿疇襲又累遭兵火先人典籍蕩盡農隙之暇無所讀乃負笈徒步行借又卒於一家少得全部之書益破功日伐薪賣之以給紙筆就營田園處以柴火寫書坐此之故不得早涉藝文常乏紙每所寫反覆有字人尠能讀也年十六始讀孝經論語詩易貧乏無以逺尋師友孤陋寡聞明淺思短大義多所不通但貪廣覽於衆書乃無不暗誦精持曽所披涉自正經諸史百家之言下至短雜文章近萬卷既性闇善忘又少文意志不專所識者甚薄亦不免惑而著述時猶得有所引用竟不成純儒不中為傳授之師其河洛圖緯一視便止不得留意也不喜星書及筭術九宫三棊太乙飛符之屬人了不從焉由其若人而少氣味也晚學風角望氣三元遁甲六壬太乙之法粗知其㫖又不研精亦計此輩率是為人用之事同出身情無急以此自勞役不如省子書之有益遂又廢焉案别録藝文志衆有萬三千二百九十九卷而魏代以來羣文滋長倍於往者乃自知所未見之多也江表書籍通同不具昔故詣京師索奇異而正值大亂半道而還每具嘆恨今齒近不惑素志衰頽但念損之又損為乎無為偶耕藪澤茍存性命耳博涉之業於是日沮矣洪之為人朴而騃野性鈍口訥形貌醜陋而終不辦自矜飾也冠履垢弊衣或藍縷而或不恥焉俗之服用俄而屢改或忽廣領而大帶或身促而修䄂或長裾曳地或短不蔽脚洪期於守常不隨世變言則率實杜絶嘲戯不得其人終日黙然故邦人咸稱之為抱朴之士是以洪著書因以自號焉洪稟性尫羸兼之多疾貧無車馬不堪徒行行亦性所不好又患弊俗捨本逐末交游過差故遂撫筆閒居守静蓽門而無趨從之所至於權豪之徒雖在宻跡而莫或相識焉衣不辟寒室不免漏食不充虚名不出户不能憂也貧無僮僕籬落頓決荆棘叢於庭宇蓬莠塞乎階霤披榛出門排草入室論者以為意逺忽近而不怒其乏役也不曉謁以故初不修見官常至於弔大喪省困疾乃心欲自勉强令無不至而居疾少捷恒復不周每見譏責於論者洪引咎而不恤也意茍無餘而病使心違顧不媿己而已亦何理於人之不見亮乎惟明鑒之士乃恕其信抱朴非以養高也世人多慕豫親之好推闇至之宻洪以為知人甚未易上聖之所難浮雜之交口合神疵無益有損雖不能如朱公叔一旦絶之且必須清澄詳悉乃處意焉又為此見憎者甚衆而不改也馳逐茍達側立勢門者又共疾洪之異於己而見疵毁謂洪為傲物輕俗而洪之為人信心而行毁譽皆置於不聞至患近人或恃其所長而輕人所短洪忝為儒者之末每與人言常度其所知而論之不强引之以造彼所不聞也及與學士有所辯識每舉綱領若值惜短難解心家但粗説意之與向使足以發悟而已不致苦理使彼率不得自還也彼静心者詳而思之則多自覺而得之者焉度不與言者雖或有問常辭以不知以免辭費之過也洪性深不好干煩官長自少及長曽救知己之抑者數人不得有言於在位者然其人皆不知洪之恤也不忍見其陷於非理宻自營之耳其餘雖親至者在事秉勢與洪無識者終不以片言半字少累之也至於糧用窮匱急合湯藥則喚求朋𩔖或見濟亦不讓也受人之施必皆乆乆漸有以報之不令覺也非𩔖則不妄受其饋致焉洪所食有旬日之儲則分以濟人之乏若殊自不足亦不割己也不為皎皎之細行不治察察之小亷村里凡人之謂良善者用時或齎酒殽候洪雖不儔匹亦不拒也後有以答之亦不登時也洪嘗謂史雲不食於昆弟華生治潔於昵客葢邀名之偽行非廊廟之逺量也洪尤疾無義之人不勤農桑之本業而慕非義之姦利持鄉論者則賣選舉以取謝有威勢者則解符疏以索財或有罪人之賂或枉有理之家或為逋逃之藪而饗亡命之人或挾使民丁以妨公役或强収錢物以求貴價或占錮市肆奪百姓之利或割人田地刼孤弱之業惚恫官府之間以窺掊尅之益内以誇妻妾外以釣名位其如此者不與交焉由是俗人憎洪疾己自然疏絶故巷無車馬之跡堂無異志之賓庭可設雀羅而几筵積塵焉洪自有識逮以將老口不及人之非不說人之私乃自然也雖僕豎有所短所羞之事不以戯之也未嘗論評人物之優劣不喜訶譴人交之好惡或為尊長所逼問辭不獲己其論人也則獨舉彼體中之勝事而已其論文也則撮其所得之佳者而不指摘其病累故無毁譽之怨貴人時或問官吏民甲乙何如其清高閑能者洪指説其快事其貪暴闇塞者對以偶不識悉洪由此頗見譏責以顧䕶太多不能明辨臧否使皂白區分而洪終不敢改也每見世人有好論人物者比方倫匹未必當允而褒貶與奪或失准格見譽者自謂已分未必信德也見侵者則恨之入骨劇於血讎洪益以為戒遂不復言及士人矣雖門宗子弟其稱兩皆以付邦族不為輕乎其價數也或以譏洪洪答曰我身在我者也法當易知設令有人問我使自比古人及同時令我自求輩則我實不能自知可與誰為匹也况非我安可為取評定之漢末俗弊朋黨分部許子將之徒以口舌取戒争訟論議門宗成讎故汝南人士無復定價而有月旦之評魏武帝深亦疾之欲取其首爾乃奔波亡走殆至屠滅前鑒不逺可以得師矣且人之未易知也雖父兄不必盡子弟也同於我者遽是乎異於我者遽非乎或有始無卒唐堯公旦仲尼季札皆有不全得之恨無以近人信其嘍嘍管見熒燭之明而輕人評物是皆邁彼上聖大賢乎昔大安中石氷作亂六州之地村鎮業靡違正黨逆義軍大都督邀洪為將兵都尉累見敦迫暨桑梓恐虜禍深憂大古人有急疾之義又畏軍法不敢任志遂募合數百人與諸軍旅進曾攻賊之别將破之日錢帛山積珍玩蔽地諸軍莫不放兵収拾財物繼轂連擔洪獨約令所領不得妄離行陣士有摭得衆者洪即斬之以徇於是無敢委权而果有伏賊數百出傷諸軍諸軍悉發無部隊皆人馬負重無復戰心遂致驚亂死傷狼藉殆欲不振獨洪軍整齊轂帳無所損失以救諸軍之大崩洪有力焉後别戰斬賊小帥多獲甲首而獻捷幕府於是大都督加洪伏波將軍例給布百疋諸將多封閉之或送還家而洪分賜將士及施知故之貧者餘之十匹又徑以市肉酤酒以饗將吏于時竊擅一日之美談焉事平洪投戈釋甲徑詣洛陽欲廣尋異書了不論戰功竊慕魯連不受聊城之金包胥不納存楚之賞成功不處之義焉正遇上國大亂北道不通而陳敏又反於江東歸塗隔塞㑹有故人譙國居道見用為廣州刺史乃表請洪為參軍雖非所樂然利可避地於南故黽勉就焉見遣先行催兵而居道於後遇害遂停廣州頻為節將見邀用皆不就永惟富貴可以漸得而不可頓合其間屑屑亦足以勞人且榮位勢利譬如寄客既非常物又其去不可得留也隆隆者絶赫赫者滅有若春華須㬰凋落得之不喜失之安悲悔吝百端憂懼競戰不可勝言不足為也且自度性篤懶而才至短以篤懶而御短才雖翕肩屈膝趨走風塵猶必不辦大致名位而免患累况不能乎未若修松喬之道在我而已不由於人焉將登名山服食養性非有廢也事不兼濟自不絶棄世務則曷緣修習𤣥静哉且知之誠難以不得借問而與人議也是以車馬之跡不經貴世之域片字之書不交在位之家又士林之中雖不可出而見造之賓意不能拒妨人所作不得專一乃嘆曰山林之中無道也而古之修道者必入山林誠欲以違逺讙譁使心不亂也今將遂本志委桑梓適嵩岳以尋方平梁公之軌先所作子書内外篇幸已用功夫聊復撰次以示來者云爾洪年十五六時所作詩賦雜文當時自謂可行至于弱冠更詳省之殊多不稱意天才未必為増也直所覽差廣而覺妍媸之别於是大有所製棄十不存一今除所作子書但雜尚餘百卷猶未盡損益之理而多慘憤不遑復料護之他人文成手便快意余才鈍思遲實不能示作文章每一更字輒自轉勝但患懶又所作多不能數省之耳洪年二十餘乃計作細碎小文妨棄功日未若立一家之言乃草創子書㑹遇兵亂流離播越有所亡失連在道路不復投筆十餘年至建武中乃定凡著内篇二十卷外篇五十卷碑頌詩賦百卷軍書檄移章表箋記三十卷又撰俗所不列者為神僊傳十卷又撰高尚不仕者為隱逸傳十卷又抄五經七史百家之言兵事方伎短雜奇要三百一十卷别有目録其内篇言神僊方藥鬼怪變化養生延年禳邪却禍之事屬道家其外篇言人間得失世事臧否屬儒家洪見魏文帝典目自叙未及彈棊撃劍之事有意於略説所知而實不數少所便能不可虚自稱揚今將具言所不閑焉洪體鈍性駑寡所玩好自總髪垂髫又擲瓦手搏不及兒童之羣未嘗鬬雞鶩走狗馬見人博戯了不目盼或强牽引觀之殊不入神有若晝睡是以至今不知棊局上有幾道摴蒱齒名亦念此輩末伎亂意思而妨日月在位有損政事儒者則廢講誦凡民則忘稼穡商人則失貨財至於勝負未分交争都市心熱於中顔愁於外名之為樂而實煎悴喪廉恥之操興争競之端相取重貨宻結怨隙昔宋閔公呉太子致碎首之禍生叛亂之變覆滅七國幾傾天朝作戒百代其鑒明矣每觀戯者慙恚交集手足相及醜詈相加絶交壞友往往有焉怨不在大亦不在小多召悔吝不足為也仲尼雖有晝寢之戒以洪較之洪實未許其賢於晝寢何者晝寢但無益而未有怨恨之憂鬬訟之變聖人猶韋編三絶以勤經業凡才近人安得兼修惟諸戯盡不如示一尺之書故因本不喜而不為盖此俗人所親焉少嘗學射但力少不能挽强若顔高之弓耳意為射既在六藝又可以禦冦辟劫及取鳥獸是以習之昔在軍旅曽手射追騎應弦而倒殺二賊一馬遂以得免死又曽受刀楯及單刀雙㦸皆有口訣要術以待取人乃有秘法其巧入神若以此道與不曉者對便可以當全獨勝所向無前矣晚又學七尺杖術可以入白刄取大㦸然亦是不急之末學知之譬如麟角鳯距何必用之此已往未之或知洪少有定志決不出身每覽巢許子州北人石戸二姜兩表法真子龍之傳當廢書前席慕其為人念精治五經著一部子書令後世知其為文儒而已後州郡及車騎大將軍辟皆不就薦名瑯琊王丞相府昔起義兵賊平之後了不修名詣府論功主者永無賞報之冀晉王應天順人撥亂反正結皇綱於垂絶修宗廟之廢祀念先朝之滯賞並無報以勸來洪隨例就彼庚寅詔書賜爵關中侯食句容之邑二百戸竊詔討賊以救桑梓勞不足録金紫之命非其始願本欲逺慕魯連近引田疇上書固辭以遂㣲志適有大例同不見許昔仲由讓應受之賜而沮為善醜虜未夷天下多事國家方欲明賞必罰以彰憲典小子豈敢茍潔區區之懦志而距宏通之大制故遂息意而恭承詔命焉洪既著自叙之篇或人難曰昔王充年在耳順道窮望絶懼身名之偕滅故自紀終篇先生以始立之盛值乎有道之運方將解申公之束帛登枚生之蒲輪耀藻九五絶聲昆吾何憾芬芳之不揚而務老生之彼務洪答曰夫二儀彌邈而人居若寓以朝菌之耀秀不移晷而殄瘁𩔖春華之擢英未改旬而凋墜雖飛飈之經霄激電之乍照未必速也夫期頥猶奔星之騰炯黄髪如激箭之過隙况或朱明而殞籜逆秋而零瘁者哉故項子有含穗之嘆揚烏有夙折之哀歴覽逺古逸倫之士或以文藝而龍躍或以武功而虎踞高勲著於明府德音被乎管絃形器雖沉鑠於淵壤美談飄颻而日載故雖千百代猶穆如也余以庸陋沈抑婆娑用不合時行舛於世發音則響與俗乖抗足則跡與衆迕内無金張之援外乏彈冠之友循塗雖坦而足無騏驎六虚雖曠而翼非大鵬上不能鷹揚匡國下無以顯親垂名美不寄於良史聲不附乎鍾鼎故因著述之餘而為自叙之篇雖無補於窮達亦賴將來之有述焉}
