  - {type: variant, offset: 9, length: 0, content: '', CK-KZ: 是有起勢公子聞之慨然而嘆曰空谷有項領之駿者孫陽之恥也太平遺冠世之才者賞眞之責也安可令俊民全其獨善之分而使聖朝乏乎元凱之用哉乃造而說曰徒聞振翅竦身不能淩厲九霄騰跚玄極攸敘彝倫者非英偉也今先生操立斷之鋒掩炳蔚之文玩圖籍於絕跡之數括藻麗乎鳥獸之羣陳龍章於晦夜沈琳琅於重淵蟄伏於盛夏藏華於當春雖復下帷覃恩殫毫騁藻幽贊太極單闡釋元本言歡則木梗怡顏如巧笑語戚則偶象嚬顣而滂浥抑輕則鴻羽沈於弱水抗重則玉石漂於飛波離敗則肝膽爲胡越合異則萬殊而一和切論則}
  - {type: variant, offset: 9, length: 0, content: '', CK-KZ-jye: 是有起勢公子聞之慨然而嘆曰空谷有項領之駿者孫陽之恥也太平遺冠世之才者賞眞之責也安可令俊民全其獨善之分而使聖朝乏乎元凱之用哉乃造而說曰徒聞振翅竦身不能淩厲九霄騰跚玄極攸敘彝倫者非英偉也今先生操立斷之鋒掩炳蔚之文玩圖籍於絕跡之數括藻麗乎鳥獸之羣陳龍章於晦夜沈琳琅於重淵蟄伏於盛夏藏華於當春雖復下帷覃恩殫毫騁藻幽贊太極單闡釋元本言歡則木梗怡顏如巧笑語戚則偶象嚬顣而滂浥抑輕則鴻羽沈於弱水抗重則玉石漂於飛波離敗則肝膽爲胡越合異則萬殊而一和切論則}
