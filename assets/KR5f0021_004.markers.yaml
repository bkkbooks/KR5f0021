  - {type: variant, offset: 13, length: 0, content: '', CK-KZ: 須蒲輪而後動不待文王而後興潛初飛五與時消息進有攸往之利退無濡尾之累明哲以保身宣化以濟俗使夫承蘭風以傾柯濯淸波以遣穢有若沈景之應朗鑒方圓之赴規矩故勳格上下惠沾八表夫有唐所以巍巍重華所以恭已西伯所以三分姬發所以革命桓文所以一匡漢高所以應天未有不致羣賢爲六翮託豪傑爲舟楫者也若令各守洗耳之高人執耦耕之分則稽古之化不建英明之盛不彰明良之歌不作括天之網不張矣故藏器者珍於變通隨時英逸者貴於吐奇撥亂若乃耀靈翳景於雲表則麗天之明不著哮虎韜牙而握角爪則搏噬之㨗不揚太阿潛鋒而不擊則立斷之穎不顯驥騄踠趾而不馳則追風之迅不形並默則子貢與喑者同口咸瞑則離朱與矇瞽不殊矣先生潔身而忽大倫之亂得意而忘安上之義存有關機之累没無金石之聲庸人且猶憤色何有大雅而無心哉夫繩舒則木直正進則邪凋有虞舉則四凶戮宣尼入則少卯梟猶震雷駭則鼛皷咽朝日出則螢燭幽也不拯招魂之病則無以効越人之絕伎不奬多難之世則無以知非常之遠量高拱以觀溺非援物之人也懷道以迷國非作者之務也若俟中唐殖占日之草朝陽繁鳴鳳之音郊跱獨角之獸野攢連理之林長旌卷而不懸干戈戢而莫尋少伯方將告退於成功孰能相擢乎陸沈哉深願先生不遠速復哉於是懷水先生蕭然遐眺遊氣天衢情神潦緬旁若無物俯而答曰嗚呼有是言乎葢至人無爲棲神沖漠不役志於祿利故害辱不能加也不躊躇於險途故傾墜不能爲患也藜藿不供而意佚於方丈齊編庸民而心歡於有土寢宜僚之舍閉干木之閭㩦莊萊之友治陋苍之居殆岳峙而不拔豈有懷於卷舒乎以慾廣則濁和故委世務而不紆眄以位極者憂深故背勢利而無餘疑其貴不以爵也富不以財也侶雲鵬以高逝故不縈翮於腐鼠以屢空爲厚誠故不改樂於簞瓢且夫玄黃遐邈而人生倐忽以過隙之促託罔極之間迅乎猶奔星之蹔}
