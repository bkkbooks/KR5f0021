  - {type: variant, offset: 1116, length: 373, content: 華觀闢雲際之綺窗淫音譟而惑耳羅袂揮而亂目濮上北里迭奏迭起或號或呼俾晝作夜流連於羽觴之間沈淪乎絃節之側或建翠翳之青葱或射勇禽於郊坰馳輕足於嶮峻之上暴僚隸於盛日之下舉火而往乘星而返機事廢而不修賞罰棄而不治或浮文艘於滉瀁而密網於緑川垂香餌於漣潭縱櫂歌於清淵飛高繳以下輕鴻引沈綸以援潜鱗或結罝罘於林麓之中合重圍於山澤之表列丹飈於豐草騁逸騎於平原縱盧猎以噬狡獸飛輕鷂以鷙翔禽勁弩殪狂兕長戟斃熊虎如此既彌年而不厭歷載而無已矣而又加之以四時請會祖送慶賀要思數之密客接執贄之嘉賔人間之務密勿罔極是以雅正稍遠遨逸漸篤其去儒學緬乎邈矣能獨見崇替之理自拔淪溺之中舍敗德之嶮塗履長世之大道者良甚鮮矣嗟乎此所以保國安家者至稀而傾撓泣血者無筭也今聖明在上稽古濟物堅隄防以杜決溢明褒貶以彰勸沮想宗室公族及貴門富年必當競尚儒術撙節藝文釋老莊之意不急精六經之正道也抱朴子外篇卷之四, CK-KZ: 有述焉}
