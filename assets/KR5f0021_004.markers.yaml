  - {type: variant, offset: 136, length: 2, content: 餬夜, CK-KZ: 食之穿井以飲之短褐以蔽之蓬廬以覆之彈詠以娛之呼吸以延之逍遥竹素寄情玄毫守常待終斯亦足矣且夫道存則尊德勝則貴隋珠彈雀知者不爲何必須權而顯俟祿而飽哉且夫安貧者以無財爲富甘卑者以不仕爲榮故幼安浮海而澄神胡子甘心於退耕逢比有令德之罪信布陷功大之刑一枝足以戢鸞羽何煩乎豐林潢洿足以泛龍鱗豈事乎滄海藜藿嘉於八珍寒泉旨於醽醁躡履美於赤舄緼袍麗於衮服拱把安於杖鉞鳴條樂乎絲竹茅茨艷於丹楹采椽珍於刻桷登嵩峯爲臺榭庇巖霤爲華屋積篇章爲敖庾寶玄談爲金玉棄細人之近戀損庸隸之所欲遊九臯以含歡遣智慧以絕俗同屈尺蠖藏光守樸表拙示訥知止常足然後咀嚼芝芳風飛雲浮晞景九陽附翼高遊仰棲梧桐俯集玄洲孰與御轡而伏櫪同被繡於犧牛哉起勢公子曰夫入而不出者謂之耽寵忘退往而不反者謂之不仕無義故達者以身非我有任乎所値隱顯默語無所必固時止則止時行則行朿帛之集庭燎之舉則君子道長在天利見若運涉陽九讒勝之時則不出戸庭括囊勿用龍起鳳戢隨時之宜古人所以或避危亂而不肯入或色斯而不終日者慮巫山之失火恐芝艾之并焚耳方今聖皇御運世夷道泰仁及養生惠風遐邁威肅鬼方澤沾九裔儀坤德以厚載凝乾穹以高葢神化則雲行雨施玄澤則烟温汪濊四門穆穆以愽延主思英逸以俾乂此乃千載所希値剖判之一會而先生慕嘉遁之偏枯不覺狷華之患害也務乎單豹之養內未觀暴虎之犯外也是聞涉水之或溺則謂乘舟皆敗以商臣之爲凶則繼體無類也懷水先生曰聖化之盛誠如高論出處之事人各有懷故堯舜在上而箕穎有巢棲之客夏后御世而窮谷有握耒之賢豈有慮於此險哉葢各附於所安也是以高尙其志不仕王侯存夫爻象匹夫所執延州守節聖人許焉僕所以逍遥於邱園歛跡乎草澤者誠以才非政事器乏治民而多士雲起髦彥鱗萃文武盈朝庶事旣康故不欲復舉熠燿以厠日月之間拊甂瓴於洪鍾之側貢輕扇於堅氷之節衒裘鑪乎隆暑之月必見棄於無用速非時之巨嗤若擁經著述可以全眞成名有補末化若强所不堪則將顚沛惟咎同悔小狐故居其所長以全其所短耳雖無立朝之勳卽戎之勞然切磋後生宏道養政殊塗一致非狷介之民也劣者全其一介何及於許由聖世恕而容之同曠於有唐不亦可乎起勢公子勃然自失肅爾改容曰先生立言助教文討姦違標退靜以抑躁競之俗興儒教以救微言之絕非有出者誰敘彝倫非有隱者誰誨童䝉普天率土莫匪臣民亦何必垂纓執笏者爲事而樂饑衡門者可非乎失羣迷乎雲夢者必須指南以知道並乎滄海者必仰辰極以得反今聞嘉訓乃覺其蔽請負衣冠策駑希驥汎愛與進不嫌擇焉自敘抱樸子者姓葛名洪字稚川丹陽句容人也其先葛天氏葢古之有天下者也後降爲列國因以爲姓焉洪曩祖爲荆州刺史王莽之簒君恥事國賊棄官而歸與東郡太守翟義共起兵將以誅莽爲莽所敗遇赦免禍遂稱疾自絕於世莽以君宗强慮終有變乃徙君於瑯琊君之子浦廬起兵以佐光武有大功光武踐祚以廬爲車騎又遷驃騎大將軍封下坯僮縣侯食邑五千戸開國初侯之弟隨侯徵討屢有大㨗侯比上書文爲訟功而官以文私從兄行無軍名遂不爲論侯曰弟與我同冒矢石瘡痍周身傷失右眼不得盡寸之報吾乃重金累紫何心以安乃自表乞轉封於弟書至上請報漢朝欲成君高義故特聽焉文辭不獲已受爵卽弟爲驃騎營立宅舍於愽望里於令基兆石礎存焉又分割租秩以供奉吏士給如二君焉驃騎殷勤止之而不從驃騎曰此更煩役國也何以爲讓乃託他行遂南渡江而家於句容與弟躬耕以典籍自娛又累使奉迎驃騎驃騎終不還又令人守護博望宅舍以冀驃騎之反至於累世無居之者洪祖父學無不涉究測精微文藝之高一時莫倫有經國才仕吳厯宰鹽臨安山陰縣入爲吏部侍郎御史中丞廬陵太子少傅中書大鴻臚侍中光祿勳輔吳將軍封吳夀縣侯洪父以孝友聞行爲士表方冊所載罔不窮覽仕吳五官郎中正建城南昌二縣令中書郎建尉平中護軍拜會稽太守未辭而晉軍順流西境不守愽簡秉文經武之才朝野之論僉然推君於是轉爲五郡赴警大都督給親兵五千總統征軍戍遏疆場天之所壞人不能支故主欽若九有同賓君以故官赴除郎中稍遷至太中大夫厯位大中肐鄕令縣戸二萬舉州最治德化尤異恩洽刑淸野有頌聲路無姦跡不佃公田越界如市秋毫之贈不入於門紙筆之用皆出私財刑措而禁止不言而化行以疾去官發詔見用爲吳郞中令正色弼違進可替否舉善彈枉軍國肅雍遷邵陵太守卒於官洪者君之第三子也生晚爲二親所嬌嬈不早見督以書史年十有三而慈父見背夙失庭訓饑寒困瘁躬執耕穡承星履草密勿疇襲又累遭兵火先人典籍蕩盡農隙之暇無所讀乃負笈徒步行借又卒於一家少得全部之書益破功日伐}
