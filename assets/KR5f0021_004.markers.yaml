  - {type: variant, offset: 30, length: 11, content: 弘遠翫鮑者忘茝蕙迷大者, CK-KZ: 至難而利欲之彌篤邪周成賢而信流言公旦聖而走南楚託鴟鴞以吿悲賴金縢以僅免況能寤之主不世而一有不悅之謗無時而蹔乏德不以激烈風而起斃禾事不以載珪璧而稱多才嗟泣靡及宜其然也夫漸漬之久則膠漆解堅浸潤之至則骨肉乖析塵羽之積則沈舟折軸三至之言則市虎以成故江充疏賤非親於元儲後母假繼非密於伯奇而掘梗之誣滅父子之恩袖蜂之誑破天性之愛又況其他安可自必嗟乎伍員所以懷忠而漂尸悲夫白起所以秉義而刎頸也葢徹見所爲寒心匠人之所眩惑矣又欲推短才以希雷同仗獨是以彈眾非然不覩金雖克木而錐鑽不可以伐鄧林水雖勝火而升合不足以救焚山寸膠}
