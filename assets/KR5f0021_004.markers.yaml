  - {type: variant, offset: 20, length: 5, content: 心於細務者, CK-KZ: 楊朱吝其一毛僥求之徒昧乎可欲集不擇木仕不料世貪進不慮負乘之禍受任不計不堪之敗論榮貴則引伊周以救溺言亢悔則諱覆餗而不記伺河龍之睡而撥明珠居量表之寵而冀無患耽漏刻之安蔽必至之危無朝菌之榮望大椿之夀似蹈薄冰以待夏日登朽枝而須勁風淵魚之引芳餌澤雉之咽毒粒咀漏脯以充饑酣鴆酒以止渴也昔箕子覩象箸而流泣尼父聞偶葬而永歎葢尋微以知著原始以見終然而闇夫蹈機}
