  - {type: variant, offset: 141, length: 0, content: '', CK-KZ: 遠尋師友孤陋寡聞明淺思短大義多所不通但貪廣覽於眾書乃無不暗誦精持曾所披涉自正經籍史百家之言下至短雜文章近萬卷旣性闇善忘又少文意志不專所識者甚薄亦不免惑而著述時猶得有所引用竟不成純儒不中爲傳授之師其河洛圖緯一視便止不得留意也不喜星書及算術九宮三棊太乙飛符之屬人了不從焉由其苦人而少氣味也晚學風角望氣三元遁甲六壬太乙之法粗知其旨又不研精亦計此輩率是爲人用之事同出身情無急以此自勞役不如省子書之有益遂又廢焉案別錄藝文志眾有萬三千二百九十九卷而魏代以來羣文滋長倍於往者乃自知所未見之多也江表書籍通同不具昔故詣京師索奇異而正値大亂半道而還每具嘆憾今齒近不惑素志衰頽但念損之又損爲乎無爲偶耕藪澤苟存性命耳愽涉之業於是日沮矣洪之爲人也而騃野性鈍口訥形貌醜陋而終不辯自矜餙也冠履垢弊衣或藍縷而或不恥焉俗之服用俄而屢改或忽廣領而大帶或身促而}
