  - {type: variant, offset: 47, length: 0, content: '', CK-KZ: 操立斷之鋒掩炳蔚之文玩圖籍於絕跡之數括藻麗乎鳥獸之羣陳龍章於晦夜沈琳琅於重淵蟄伏於盛夏藏華於當春雖復下帷覃恩殫毫騁藻幽贊太極單闡釋元本言歡則木梗怡顏如巧笑語戚則偶象嚬顣而滂浥抑輕則鴻羽沈於弱水抗重則玉石漂於飛波離敗則肝膽爲胡越合異則萬殊而一和切論則秋霜春肅温辭則氷條吐葩摧高則峻極頽淪竦卑則淵池嵳峩疪淸則倚暗外光救濁則立澄黃河然不能沾大惠於庶物著弘勳於皇家名與朝露皆晞體與蜉蝣並化忽崇高於聖人之寶忘川逝於大耋之嗟竊爲先生不取焉葢聞大者天地其次君臣先聖憂時思行其道三月無君皇皇如也卽今聖主乃與堯舜一致愍此黎民亦可比屋而封故或負鼎而龍躍或扣角以鳳歌不須蒲輪而後動不待文王而後興潛初飛五與時消息進有攸往之利退無濡尾之累明哲以保身宣化以濟俗使夫承蘭風以傾柯濯淸波以遣穢有若沈景之應朗鑒方圓之赴規矩故勳格上下惠沾八表夫有唐所以巍巍重華所以恭已西伯所以三分姬發所以革命桓文所以一匡漢高所以應天未有不致羣賢爲六翮託豪傑爲舟楫者也若令各守洗耳之高人執耦耕之分則稽古之化不建英明之盛不彰明良之歌不作括天之網不張矣故藏器者珍於變通隨時英逸者貴於吐奇撥亂若乃耀靈翳景於雲表則麗天之明不著哮虎韜牙而握角爪則搏噬之㨗不揚太阿潛鋒而不擊則立斷之穎不顯驥騄踠趾而不馳則追風之迅不形並默則子貢與喑者同口咸瞑則離朱與矇瞽不殊矣先生潔身而忽大倫之亂得意而忘安上之義存有關機之累没無金石之聲庸人且猶憤色何有大雅而無心哉夫繩舒則木直正進則邪凋有虞舉則四凶戮宣尼入則少卯梟猶震雷駭則鼛皷咽朝日出則螢燭幽也不拯招魂之病則無以効越人之絕伎不奬多難之世則無以知非常之遠量高拱以觀溺非援物之人也懷道以迷國非作者之務也若俟中唐殖占日之草朝陽繁鳴鳳之音郊跱獨角之獸野攢連理之林長旌卷而不懸干戈戢而莫尋少伯方將告退於成功孰能相擢乎陸沈哉深願先生不遠速復哉於是懷水先生蕭然遐眺}
