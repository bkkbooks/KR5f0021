  - {type: variant, offset: 1929, length: 226, content: 時用嗅禄利誠爲天下無益之物何如逸民答曰夫麟不吠守鳳不司晨騰黄不引犂尸祝不治庖也且夫揚大明乎無外宣嫗煦之和氣者日也耀華燈於閑夜冶金石以致用者火也天下不可以經時無日不可以一旦無火然其大小不可同也江海之外彌綸二儀升爲雲雨降成百川而朝夕之用不及累刃之井灌田溉園未若溝渠之沃校其巨細孰爲曠哉桀紂帝王也仲尼陪臣也今見比於桀紂則莫不怒焉見擬於仲尼則莫不悅焉爾則貴賤果不在位也故孟子云禹稷顔淵易地皆然矣宰予亦謂孔子賢於堯舜遠矣夫匹庶而鈞稱於王者儒生高極乎唐虞者德而已矣, CK-KZ: ''}
