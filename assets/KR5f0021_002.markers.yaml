  - {type: variant, offset: 2212, length: 12, content: 榮華猶贅疣也萬物猶蜩翼也, CK-KZ: 不仕王侯存夫爻象匹夫所執延州守節聖人許焉僕所以逍遥於邱園歛跡乎草澤者誠以才非政事器乏治民而多士雲起髦彥鱗萃文武盈朝庶事旣康故不欲復舉熠燿以厠日月之間拊甂瓴於洪鍾之側貢輕扇於堅氷之節衒裘鑪乎隆暑之月必見棄於無用速非時之巨嗤}
