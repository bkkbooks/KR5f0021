  - {type: variant, offset: 2012, length: 0, content: '', WYG: 不詳試也若乃性行之惑變始正而終邪若王莽初則美於伊霍晚則劇於趙髙又非中才所能逆盡也若令士之易别如鷦鷯之與鴻鵠狐兎之與龍麟者則四㓙不得官於堯朝管蔡不得幾危宗周仲尼無澹臺之失延陵無捐金之恨伊尹無七十之勞項羽無嫌范之悔矣所患於其如碔砆上音武上音夫之亂瑾瑜鷦螟之似鳯凰凝氷之𩔖水精烟熏之疑雲氣故令不謬者也惟帝難之矧乎近人哉夫惟大明𤣥鑒幽微靈銓揣物思灼沉昧瞻山識璞臨川知珠士於難分之中而無取舍之恨者使臧否區分抑揚成允武丁姬文不獨治而傅説吕尚不永棄高莽宰嚭不得成其惡𢎞恭石顯無所容其偽矣斯蓋取士之較畧選擇之大都可精微以求存乎其人固非毫翰之所備縷也弭訟第二十}
  - {type: page-break, offset: 2012, content: '', id: KR5f0021_WYG_002-40a}
  - {type: variant, offset: 2013, length: 1, content: 旦, WYG: 姑子劉君士由之論曰人綱始於夫婦判合擬乎二儀是故大婚之禮古人所重將合二姓之好以承祖宗之基主人拜迎於門聴命於廟𤣥纁贄幣親御授綏婿有三年之喪致命女氏許諾而不敢改大喪既沒請命於婿婿有辭焉然後乃嫁所以崇敬讓也豈有先訟後婿之謂乎而末世輕慢傷化敗俗舉不修義許而弗與訟䦧辱煩塞官曹今可使諸爭婚者未及同牢皆聴義絶而倍還酒禮歸其幣帛其甞已再離者一倍禆娉其三絶者再倍禆娉如此離者不生訟心貪容者}
  - {type: page-break, offset: 2013, content: '', id: KR5f0021_WYG_002-40b}
  - {type: page-break, offset: 2013, content: '', id: KR5f0021_WYG_002-41a}
  - {type: variant, offset: 2015, length: 1, content: 火, WYG: 利重乃王治之要術不易之永法也抱朴子答曰劉君愍徳讓之凌替疾民爭之損化雖速我訟室家不足用和之貴將遂淪胥創讜言以拾世遺建嘉謀以拯流遁紛譁之俗將以此而易無恥之風將由兹而移彌綸情偽固難間矣誠經國之永法至益之篤論也洪以不敏不識至理造次承問竊有疑焉夫婚媾之結義無逼迫彼則簡擇而求此則可意乃許輕諾後悔罪在女氏食言棄信與奪任情嚴防峻制未之能彌令猥恣之唯貴禆娉倍貧者所憚也豐於財者則適其願矣後所許者或能富殖助其禆娉必所甘心}
  - {type: page-break, offset: 2015, content: '', id: KR5f0021_WYG_002-41b}
  - {type: variant, offset: 2017, length: 0, content: '', WYG: 則先家拱黙不得有言原情論之能無怨歎乎夫不伏之人視死猶歸血刃之禍於是將起令茍惜}
  - {type: variant, offset: 2018, length: 0, content: '', WYG: 辭訟之小醜而搆其難忍之}
  - {type: variant, offset: 2019, length: 0, content: '', WYG: 恨所謂愛其僦子宙切覽之煩忘其凋殞之酷也夫買物於市者或加價而奪之則尠忍而不忿然矣况乎見奪待告之妻哉此法遂用者將使結婚者雖納吉親迎猶抱有見奪之慮何者劉君之論以同牢為斷固也爾則女氏雖受幣積年恒挾任意之威恃可數奪必惰於擇婿婿}
  - {type: page-break, offset: 2019, content: '', id: KR5f0021_WYG_002-42a}
  - {type: variant, offset: 2021, length: 0, content: '', WYG: 得意便得改悔結讎速禍莫此之甚矣曩人畫法慮闗終始杜漸防萌思之良精而不闕恣奪之路斷以報板之制者殆有意乎儻令女有國色傾城絶倫而位豪右權臣之從目玩冶容心忘禮度資累千金情無所吝十倍還娉猶所不憚况但一乎華氏不難於殺孔父而取其妻楚人為子迎婦以其美而自納之以此論之豈惜傾竭屋産以助女氏還前家之直哉小人輕薄睚五解魚許二切䀝在解在許二切成怨又喜委衰逐盛蹋冷趨熱此法之行則必寡奪貧賤而與富貴者矣不審吾君何方以防弊乎或曰}
  - {type: page-break, offset: 2021, content: '', id: KR5f0021_WYG_002-42b}
  - {type: variant, offset: 2022, length: 1, content: 同, WYG: 使女氏受娉禮無豐約皆以即日報板後皆使時人署姓名於别板必十人已上以備逺行及死亡又令女之父兄若伯叔答婿家書必手書一紙若有變悔而證據明者女氏父母兄弟皆加刑罰罪如此庶於無訟者乎酒誡第二十抱朴子曰目之所好不可從}
  - {type: page-break, offset: 2022, content: '', id: KR5f0021_WYG_002-43a}
