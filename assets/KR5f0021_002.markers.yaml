  - {type: variant, offset: 2928, length: 3, content: 徵管幼, CK-KZ: 典論自敘未及彈棋擊劍之事有意於畧說所知而實不敷少所便能不可虛自稱揚今將具言所不閑焉洪體鈍性駑寡所玩好自總髮垂髫文擲瓦手摶不及兒童之羣未嘗鬭騖走狗馬見人愽戲了不目盻或强牽引觀之殊不入神有若晝睡是以至今不知棋局上有幾道樗蒲齒名亦念此輩末伎亂意思而妨日月在位有損政事儒者則廢講誦凡民則忘稼穡商人則失貨財至於勝負未分交爭都市心熱於中顏愁於外名之爲樂而實煎悴喪廉恥之操興爭競之端相取重貨密結怨隙昔宋閔公吳太子致碎首之禍生叛亂之變覆滅七國幾傾天朝作戒百代其鑒明矣每觀戲者慙恚交集手足相及醜詈相加絕交壞友往往有焉怨不在大亦不在小多召悔𠫤不足爲也仲尼雖有晝寢之戒以洪較之洪實未許其賢於畫寢何者晝寢但無益而未有怨憾之憂鬭訟之變聖人猶韋編三絕以勤經業凡才近人}
