  - {type: variant, offset: 2203, length: 0, content: '', WYG: 人慕之者猶宵蟲之赴明燭學之者猶輕毛之應飈甫遥切風嘲戲之談或及祖考或下逮婦女往者務其必深焉報者恐其不重焉倡之者不慮見答之後患和之者恥其言輕之不塞周禾之芟温麥之刈實由報恨不能已也利口者扶强而黨勢辯給者借鍒以刺鍒耳由切扶發切以不應者為拙劣以先止者為負敗如此交惡之辭焉能黙哉其有才思者為人也猶善於依因機㑹准擬體例引古喻今言微理舉雅而可笑中而不傷不張}
