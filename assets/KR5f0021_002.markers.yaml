  - {type: variant, offset: 2594, length: 0, content: '', CK-KZ-jye: 是以洪著書因以自號焉洪禀性尫羸兼之多疾貧無車馬不堪徒行行亦性所不好又患弊俗捨本逐末交游過差故遂撫筆閑居守靜蓽門而無趨所之從至於權豪之徒雖在密跡而莫或相識焉衣不辟寒室不免漏食不充虛名不出戸不能憂也貧無僮僕籬落頓決荆棘叢於定宇蓬莠塞乎階霤披榛出門排草入室論者以爲意遠忽近而不怒其乏役也不曉謁以故初不修見官常至於弔大喪省困疾乃心欲自勉强令無不必至而居疾少㨗恆復不周每見譏責於論者洪引咎而不恤也意苟無餘而病使心違顧不媿已而已亦何理於人之不見亮乎唯明鑒之士乃恕其信抱樸非以養高也世人多慕豫親之好推闇至之密洪以爲知人甚未易上聖之所難浮雜之交口合神疕無益有損雖不能如朱公叔一旦絕之且必須淸澄詳悉乃處意焉又爲此見憎者甚眾而不改也馳逐苟達側立勢門者又共疾洪之異於已而見疵毁謂洪爲慠物輕俗而洪之爲人信心而行毁譽皆置於不聞至患近人或恃其所長而輕人所短洪𣷹爲儒者之末每與人言常度其所知而論之不强引之以造彼所不聞也及與學士有所辯識每舉綱領若値惜短難解心家但粗說意之與向使足以發悟而已不致苦理使彼率不得自還也彼靜心者詳而思之}
  - {type: variant, offset: 2594, length: 2, content: 則爲, WYG: 吟咏而向枯簡匍匐以守黄巷者所宜識}
