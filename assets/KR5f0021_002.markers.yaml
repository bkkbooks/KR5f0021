  - {type: variant, offset: 2244, length: 0, content: '', WYG: 至詣則如妖怪之集也其在道塗則甚逢虎之羣也愚夫行之自矜為豪小人徵之以為横階亂靡有定實此之由也然敢為此者非必篤為也率冠蓋之後勢援之門素頗力行善事以竊虚名名既粗立本情便放或假財色以交權豪或因時運以佻榮位或以婚姻而連貴戚或弄毁譽以合威柄器盈志溢態發病出黨成交廣志通步髙清論}
