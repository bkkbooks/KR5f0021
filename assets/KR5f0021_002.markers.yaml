  - {type: variant, offset: 2589, length: 2, content: 曰隱, CK-KZ: 累遭兵火先人典籍蕩盡農隙之暇無所讀乃負笈徒步行借又卒於一家少得全部之書益破功日伐薪賣之以給紙筆就營田園處以柴火寫書坐此之故不得早涉藝文常乏紙每所寫反覆有字人尠能讀書也年十六始讀孝經論語詩易貧乏無以遠尋師友孤陋寡聞明淺思短大義多所不通但貪廣覽於眾書乃無不暗誦精持曾所披涉自正經籍史百家之言下至短雜文章近萬卷旣性闇善忘又少文意志不專所識者甚薄亦不免惑而著述時猶得有所引用竟不成純儒不中爲傳授之師其河洛圖緯一視便止不得留意也不喜星書及算術九宮三棊太乙飛符之屬人了不從焉由其苦人而少氣味也晚學風角望氣三元}
  - {type: page-break, offset: 2589, content: '', id: KR5f0021_CK-KZ_01p175a, image: JY145/CK-KZ_JY145_01p175a.png}
