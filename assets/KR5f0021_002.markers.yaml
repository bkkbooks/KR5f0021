  - {type: variant, offset: 899, length: 580, content: 之至也宜其以布衣而君四海其度量蓋有過人者矣且夫吕尚之殺狷華者在於恐其沮衆也然俗之所患者病乎躁於進趨不務行業耳不苦於安貧樂賤者之太多也假令隱士往往屬目至於情掛勢利志無止足者終莫能割此常慾而慕彼退靜者也開闢已降非少人也而忘富遺貴之士猶不能居萬分之一仲尼親受業於老子而不能修其無爲子貢與原憲同門而不能模其清苦四凶與巢由同時王莽與二龔共世而不能效也凡民雖復笞督之危辱之使追狷華猶必不肯乃當憂其壞俗邪吕尚思不及此以軍法治平世枉害賢人酷誤已甚矣賴其功大不便以至顛沛耳且吕尚之未遇文王也亦曾隱於窮賤凡人易之老婦逐之賣傭不售屠釣無獲曾無一人慕之其避世也何獨慮狷華之沮衆邪設令殷紂以尚逃遁收而歛之尚臨死豈能自謂罪所應邪魏武帝亦刑法嚴峻果於殺戮乃心欲用乎孔明明自陳不樂出身武帝謝遣之曰義不使高世之士辱於汙君之朝也其鞭撻九有草創皇基亦不妄矣紛擾日久求競成俗或推貨賄以龍躍或階黨援以鳳起風成化習大道漸蕪後生昧然儒訓遂堙將爲立身非財莫可苟有卓然不群之士不出户庭潜志味道誠宜優訪以興謙退也夫使孫吴荷戈一人之力耳用其計術則賢於萬夫今令大儒爲吏不必切事肆之山林則能陶冶童蒙闡弘禮敬何必服巨象使捕鼠韝鸞也則鍾鼎鎸其聲若乃零淪藪澤空生徒死亦安足貴乎逸民答曰子可謂守培塿玩狐丘未登閬風而臨雲霓翫瀅汀游潢洿未浮南溟而涉天漢凡所謂志人者不必在乎禄位不必須乎勛伐也太上無己其次無名能振翼以絶群騁迹以絶軌爲, WYG: 又}
