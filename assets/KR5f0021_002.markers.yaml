  - {type: variant, offset: 1789, length: 0, content: '', WYG: 虚人也覩利地而忘義棄亷恥以茍得者貪人也覿艷逸而心蕩飾袴綺而思邪者淫人也見成事而疑惑動失計而多悔者闇人也背訓典而自任恥請問於勝己者損人也知善事而不建雖多為而無成者劣人也委徳行而不修奉權勢以取媚者弊人也履蹊徑以僥速推貨賄以争津者邪人也既傲狠以無禮好凌辱乎勝己者悍人也被抑枉而自誣事無苦而振懾者怯人也治細辨於稠衆非其人而盡言者淺人也闇事宜之可否雖企慕而不及者頑人也知是非而不改聞良規而増劇者惑人也無濟恤之仁心輕告絶於親舊者薄人也既疾其所不逮喜他人之有災者妬人也專財穀而輕義觀困匱而不振者吝人也冐至危以僥倖值禍敗而不悔者愚人也情局碎而偏黨志惟務於盈利者小人也騁鷹犬於原獸好博戲而無已者迷人也忘等威之異數快飾玩之誇麗者奢人也耽聲色於飲讌廢慶弔於人理者人也既無心於修尚又怠惰於家業者嬾人也無抑斷之儀每脱易而不思者輕人也觀道義而如醉聞貨殖而波擾者人也杖淺斷短而多謬闇趨舍之藏否者笨步木切人也憎賢者而不貴聞髙言而如聾者嚚人也覩朱紫而不分雖提耳而不悟者蔽人也違道義以趦趄冐禮刑而罔顧者亂人也每動作而受嗤言發口而違理者拙人也事酋豪如僕虜值衰微而背惠者慝人也捐貧賤之故舊輕人士而倨傲者驕人也棄衰色而廣欲非宦學而逺遊者蕩人也無忠信之純固背恩養而趍利者叛人也當交顔而面從至析離而背毁者偽人也習强梁而專己距忠吿而不納者刺人也抱朴子曰人技未易知真偽或相似士有顔貌修麗風表閑雅望之溢目接之適意威儀如龍虎盤旋成規矩然信心蔽神否才無所堪心中所有盡附皮膚口不能吐片竒筆不能屬半句入不能宰民出不能用兵治事則事廢銜命則命辱動靜無宜出處莫可葢難分之一也士有貌望樸悴容觀矬悴容觀委陋聲氣雌若進止質澁然而含英懷寶經}
