  - {type: variant, offset: 2586, length: 0, content: '', CK-KZ-jye: 起勢公子勃然自失肅爾改容曰先生立言助教文討姦違標退靜以抑躁競之俗興儒教以救微言之絕非有出者誰敘彝倫非有隱者誰誨童䝉普天率土莫匪臣民亦何必垂纓執笏者爲事而樂饑衡門者可非乎失羣迷乎雲夢者必須指南以知道並乎滄海者必仰辰極以得反今聞嘉訓乃覺其蔽請負衣冠策駑希驥汎愛與進不嫌擇焉抱樸子者姓葛名洪字稚川丹陽句容人也其先葛天氏葢古之有天下者也後降爲列國因以爲姓焉洪曩祖爲荆州刺史王莽之簒君恥事國賊棄官而歸與東郡太守翟義共起兵將以誅莽爲莽所敗遇赦免禍遂稱疾自絕於世莽以君宗强慮終有變乃徙君於瑯琊君之子浦廬起兵以佐光武有大功光武踐祚以廬爲車騎又遷驃騎大將軍封下坯僮縣侯食邑五千戸開國初侯之弟隨侯徵討屢有大㨗侯比上書文爲訟功而官以文私從兄行無軍名遂不爲論侯曰弟與我同冒矢石瘡痍周身傷失右眼不得盡寸之報吾乃重金累紫何心以安乃自表乞轉封於弟書至上請報漢朝欲成君高義故特聽焉文辭不獲已受爵卽弟爲驃騎營立宅舍於愽望里於令基兆石礎存焉又分割租秩以供奉吏士給如二君焉驃騎殷勤止之而不從驃騎曰此更煩役國也何以爲讓乃託他行遂南渡江而家於句容與弟躬耕以典籍自娛又累使奉迎驃騎驃騎終不還又令人守護博望宅舍以冀驃騎之反至於累世無居之者洪祖父學無不涉究測精微文藝之高一時莫倫有經國才}
