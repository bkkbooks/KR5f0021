  - {type: variant, offset: 1798, length: 1, content: 辱, CK-KZ: 可受全而歸殘也方寸之心制之在我不可放之於流遁也躬耕以食之穿井以飲之短褐以蔽之蓬廬以覆之彈詠以娛之呼吸以延之逍遥竹素寄情玄毫守常待終斯亦足矣且夫道存則尊德勝則貴隋珠彈雀知}
