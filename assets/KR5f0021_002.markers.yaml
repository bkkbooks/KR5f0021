  - {type: variant, offset: 48, length: 0, content: '', CK-KZ: 氣天衢情神潦緬旁若無物俯而答曰嗚呼有是言乎葢至人無爲棲神沖漠不役志於祿利故害辱不能加也不躊躇於險途故傾墜不能爲患也藜藿不供而意佚於方丈齊編庸民而心歡於有土寢宜僚之舍閉干木之閭㩦莊萊之友治陋苍之居殆岳峙而不拔豈有懷於卷舒乎以慾廣則濁和故委世務而不紆眄以位極者憂深故背勢利而無餘疑其貴不以爵也富不以財也侶雲鵬以高逝故不縈翮於腐鼠以屢空爲厚誠故不改樂於簞瓢且夫玄黃遐邈而人生倐忽以過隙之促託罔極之間迅乎猶奔星之蹔見飄乎似飛矢之電經聊且優游以自得安能苦形於外物哉夫鳶不絓網驎不墮穽相彼鳥獸猶知爲患風塵之徒曾是未若也若夫要離滅家以効功紀信赴燔以誑楚陳賈刎頸以證弟仲由投命而葅醢嬴門伏劍以喪心聶政感惠而屠葅荆卿絕臏以報燕楚公含悲而授首皆下愚之狂惑豈上智之攸取哉葢厚祿者責重爵尊者神勞故漆園垂綸而不顧卿相之貴}
  - {type: page-break, offset: 48, content: '', id: KR5f0021_CK-KZ_01p169b, image: JY145/CK-KZ_JY145_01p169b.png}
  - {type: page-break, offset: 48, content: '', id: KR5f0021_CK-KZ_01p170a, image: JY145/CK-KZ_JY145_01p170a.png}
  - {type: variant, offset: 48, length: 0, content: '', CK-KZ-jye: 氣天衢情神潦緬旁若無物俯而答曰嗚呼有是言乎葢至人無爲棲神沖漠不役志於祿利故害辱不能加也不躊躇於險途故傾墜不能爲患也藜藿不供而意佚於方丈齊編庸民而心歡於有土寢宜僚之舍閉干木之閭㩦莊萊之友治陋苍之居殆岳峙而不拔豈有懷於卷舒乎以慾廣則濁和故委世務而不紆眄以位極者憂深故背勢利而無餘疑其貴不以爵也富不以財也侶雲鵬以高逝故不縈翮於腐鼠以屢空爲厚誠故不改樂於簞瓢且夫玄黃遐邈而人生倐忽以過隙之促託罔極之間迅乎猶奔星之蹔見飄乎似飛矢之電經聊且優游以自得安能苦形於外物哉夫鳶不絓網驎不墮穽相彼鳥獸猶知爲患風塵之徒曾是未若也若夫要離滅家以効功紀信赴燔以誑楚陳賈刎頸以證弟仲由投命而葅醢嬴門伏劍以喪心聶政感惠而屠葅荆卿絕臏以報燕楚公含悲而授首皆下愚之狂惑豈上智之攸取哉葢厚祿者責重爵尊者神勞故漆園垂綸而不顧卿相之貴}
