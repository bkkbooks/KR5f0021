  - {type: page-break, offset: 2201, content: '', id: KR5f0021_WYG_002-44b}
  - {type: variant, offset: 2202, length: 1, content: 近, CK-KZ: 化則雲行雨施玄澤則烟温汪濊四門穆穆以愽延主思英逸以俾乂此乃千載所希値剖判之一會而先生慕嘉遁之偏枯不覺狷華之患害也務乎單豹之養內未觀暴虎之犯外也是聞涉水之或溺則謂乘舟皆敗以商臣之爲凶則繼體無類也懷水先生曰聖化之盛誠如高論出處之事}
