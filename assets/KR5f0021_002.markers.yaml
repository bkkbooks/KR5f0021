  - {type: line-break, offset: 1632, content: '', id: KR5f0021_HFL_002-005b09}
  - {type: variant, offset: 1632, length: 3, content: 君惶惶, WYG: 惡言豈肯向所異辭乎殺身猶以許友豈名位之足競乎善交狎而不慢和而不同彼有失則正色而諫之告我以過則改而不憚不以忤彼心而不言不以逆我耳而不納不以巧辨餙其非不以華辭文其失不形同而神乖不匿情而口合不面從而背憎不疾人之勝己䕶其短而引其長隱其失而宣其得外無計數之諍内遺心競之累夫然後鹿鳴之好全而伐木之刺息若乃輕合而不重離易厚而不難薄始}
  - {type: page-break, offset: 1632, content: '', id: KR5f0021_WYG_002-16b}
  - {type: variant, offset: 1636, length: 0, content: '', WYG: 形影終為參辰至歡變為篤恨接援化成讎敵不祥之悔亦無以往者漢季陵遲皇轡不振在公之義替紛競之俗成以違時為清髙以救世為辱身尊卑禮讓大倫遂亂在位之人不務盡節委本趨末背實尋聲王事廢者其譽美姦過積者其功多莫不飛輪兼策星言假寐冒寒觸暑以走權門飾虛華之名於秉勢之口獲非分之位於賣官之家或爭所欲還相屠㓕於是公叔偉長疾其若彼力不能正不忍見之爾乃發憤著論杜門絶交斯誠感激有為而然蓋矯枉而過正非常經之永訓}
