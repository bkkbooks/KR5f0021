  - {type: variant, offset: 2198, length: 3, content: 能染其, CK-KZ: 出者謂之耽寵忘退往而不反者謂之不仕無義故達者以身非我有任乎所値隱顯默語無所必固時止則止時行則行朿帛之集庭燎之舉則君子道長在天利見若運涉陽九讒勝之時則不出戸庭括囊勿用龍起鳳戢隨時之宜古人所以或避危亂而不肯入或色斯而不終日者慮巫山之失火恐芝艾之并焚耳方今聖皇御運世夷道泰仁及養生惠風遐邁威肅鬼方澤沾九裔儀坤德以厚載凝乾穹以高葢}
