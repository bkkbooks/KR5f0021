  - {type: variant, offset: 2202, length: 0, content: '', WYG: 亂臧否顛倒或奔車走馬赴坑客庚切谷而不憚以九折之阪為螘封或登危蹋頺雖墮墜而不覺以吕梁之淵為牛跡也或肆忿於器物或醟為命切酒於妻子加枉酷於臣僕用剡鋒乎器物熾火烈於室廬掊寶玩於淵流遷威怒於踞人加暴害於士友䙝嚴主以夷戮者有矣犯㐫人而受困者有矣言雖尚辭煩而叛理拜伏徒多勞而非敬臣子失禮於君親之前㓜賤悖慢於耆宿之坐謂清談為詆詈以忠吿為侵己於是白刃抽而忘思難之慮棒杖奮而罔顧乎前後搆漉血之讎招大辟之禍以少凌長則鄉黨不加重矣責辱人父兄則子弟將推刃矣發人所諱則壯者不能堪矣計數深剋則醒者不能恕矣起衆思於須㬰結百疴於膏盲呼光切奔駟不能追既往之悔思改而無自反之蹊蓋智者所深防而愚人所不免也其為禍敗不可勝載然而歡集莫之或釋舉白盈耳不論於能否計瀝霤於小餘以稽遲為輕已傾筐注於所敬殷勤勌而成薄勸之不持督之不盡怨色醜音所由而發也夫風經腑臓使人惚恍及其劇者自傷自虞或遇斯疾莫不憂懼吞苦忍痛欲其速愈至於醉之病性何異於兹而獨居宻以逃風不能割情以節酒若畏風憎病則沉之咎塞而流連之失止矣夫風之為疾猶展攻治酒之為變在乎呼吸及其鬨亂若存若亡視泰山如彈丸見滄海如盤盂仰嚾旦切天墮俯呼地陷卧待虎狼投井赴火而不謂惡也夫用身之如此亦安能惜敬恭之禮䕶喜怒之失哉昔狄儀既䟽大禹以興糟丘酒池辛癸以亡豐侯得罪以戴尊㗸盃景升壞以三雅之爵劉松爛腸以逃暑之飲郭珍發狂以無日不醉信陵之㓙短襄子之亂政趙武之失衆子反之誅戮漢惠之伐命灌夫之㓕族陳遵之遇害季布之䟽斥子建之免退徐邈之禁言皆是物也世人好之樂之者甚多而戒之畏之者至少彼衆我寡良箴安施且願君子節之而已曩者饑年穀貴人有醉者相殺牧伯因此輒有酒禁嚴令重申官司捜索收執榜薄行切擊也狥者相辱制鞭而死者大半防之彌峻犯者至多至乃穴地為釀油嚢懷酒民之好此可謂篤矣余以匹夫之賤託此空言之書末如之何矣又臨民者雖設其法而不能自斷斯物緩己急人雖令不從弗躬弗親庶民弗信以此而教教安得行以此而禁禁安得止哉沽賣之家廢業則困遂修飾賂遺依憑權右所屬吏不敢問無力者獨止而有勢者擅市張壚專利乃更倍售從其酤買公行靡憚法輕利重安能免乎哉或人難曰夫夏桀殷紂之亡信陵漢惠之殘聲色之過豈唯酒乎以其生患於古而斷之於今所謂褒姒喪周而欲人君廢六宫以阿房之危秦而使王者結草菴也蓋聞千鍾百觚堯舜之飲也唯酒無量仲尼之能也姬旦酒殽不徹故能制禮作樂漢髙作樂巨醉故能斬蛇鞠旅于公引滿一斛而斷獄益明管輅仰傾三斗而清辯綺粲揚雲酒不離口而太𤣥乃就子圉醉無所識而霸功以舉一瓶之醪傾而三軍之衆悦解毒之觴行而盜馬之屬感消憂成禮䇿勲飲至降神合人非此莫以也内速諸父外將嘉賔如淮如澠春秋所貴由斯言之安可誡乎抱朴子答曰酒旗之宿則有之矣譬猶懸象著明莫大乎日月水火之原於是在焉然節而宣之則以養生立功用之失適則焚溺而死豈可恃懸象之在天而謂水火不殺人哉宜生之具莫先於食食之過多實結癥瘕况於酒醴之毒物乎夫使彼夏桀殷紂信陵漢惠流於亡國之淫聲沉溺於傾城之亂色皆由乎酒熏其性醉成其勢所以致極情之失忘修飾之術者也我論其本子識其末謂非酒禍禍其安出是猶知濁雨之霑衣而不知雲氣之所作唯患飛埃之糝目而不覺飈風之所為也千鍾百觚不經之言不然之事明者不信矣夫聖人之異自才智至於形骸非能兼人有七尺三丈之長萬倍之大也一日之饑安能至是仲尼則畏性之變不敢及亂周公則終日百拜殽乾酒澄上聖戰戰猶且若斯況乎庸人能無悔乎漢髙應天承運革命向雖不醉猶當斬蛇于公聰達明於聴斷小大以情不失枉直是以刑不濫加世無怨民但其健飲不即廢事若論大醉亦俱無知决疑之才何損于酒未聞臯繇甫侯子産釋之醉乃折獄也管輅年少希當劇談故假酒勢以助膽氣若過其量亦必迷錯及其刺毫於爻卦索鬼神之變化占氣色以決盛衰聆鳴鳥以知方來候風雲而克吉㓙觀碑桓而識禍福豈復須酒然後審之楊雲通人才髙思逺英贍之富禀之自天豈藉外物以助著述及其數飲由於偶好亦或有疾以宣藥勢耳子圉肆志盖已素定雖復不醉亦復終去瓶醪悦衆寓言之喻誠能賞罰允當威恩得所長算縱横應機無方則士思果毅人樂奮命其不然也雖流酒淵何𥙷勝負繆公飲盜造次之權舍法長惡何足多稱哉豈如慎之耶疾謬第二十抱朴子曰世故繼有禮教漸頺敬讓莫崇傲慢成俗儔𩔖飲㑹或蹲或踞暑夏之月露首袒體盛務唯在摴蒱彈碁所論極於聲色之間舉口不踰綺繻紈袴之側游歩不去勢利酒客之門不聞清談論道之言專醜辭嘲弄為先以如此者為髙逺以不爾者為騃五駭切癡也野於是馳遂之庸民偶俗之}
