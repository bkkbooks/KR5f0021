  - {type: variant, offset: 2595, length: 0, content: '', CK-KZ: 多自覺而得之者焉度不與言者雖或有問常辭以不知以免辭費之過也洪性深不好於煩官長自少及長曾救知已之抑者數人不得有言於在位者然其人皆不知洪之恤也不忍見其陷於非理密自營之耳其餘雖親至者在事秉勢與洪無識者終不以片言半字少累之也至於糧用窮匱急合湯藥則喚求朋類或見濟亦不讓也受人之施必皆久久漸有以報之不令覺也非類則不妄受其饋致焉洪所食有旬日之儲則分以濟人之乏若殊自不足亦不割已也不}
