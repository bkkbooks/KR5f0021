  - {type: variant, offset: 1770, length: 0, content: '', WYG: 人南見塞於子西文種大賢也初不齒於荆俗末雍游於鈞如競年立功不亦難乎夫結緑𤣥黎非陶徛不能市也千鈞之重非賁獲不能抱也白雪之絃非靈素不能徽也邁倫之才非明主不能用也然耀靈光夜之珍不為莫求而其質以苟且於賤賈洪鍾周鼎不為委淪而輕其禮取見舉於侏儒嶧陽雲和不為不御而息唱以競顯於淫哇冠羣之徳不以沉抑而履徑而剸節於流俗是以和壁變為滯貨柔木廢於勿用赤刀之鑛不得經歐冶之鑪元凱之疇終不值四門之闢也任命第十九抱扑子曰余之友人有居冷先生者恬愉静素形神相忘外不飾驚愚之容内不寄有為之心遊精墳誥樂以忘憂書競羲和之末景夕照望舒之餘耀道靡逺而不䆒言無微而不妍然車迹不軔如震切權右之國尺牘不經貴勢之庭是以名不出蓬户身不離畆於是翼亮大夫侯而難之曰余聞淵蟠起則𤣥雲赴道化霑則逸才奮故康衢有角歌之音鼎爼發凌風之迹沾之則收不貲之賈踊之則超在天之舉耀逸景於暘谷播大明乎九垓勲廕當已聲揚罔極故尋仞之塗甚近而弗往者雖追風之脚不能到也楹棁之下至卑而不動者雖鵾鴻之翅未之及也况乎寢足於大之表斂羽於幽梧之枝安得效信以尋景振輕乎蒼霄哉年期奄冉而不久託世飄而不再智者履霜則知堅氷之必至處始則悟生物之有終六龍促軌於大渾華顛倐忽而告暮古人所以映順流而頺歎眄過隙而興悲矣先生資命世之逸量含英偉以邈俗鋭翰汪濊以波涌六竒抑鬱而淵畜然不能凌扶揺以高竦揚清耀於九𤣥器不陳於瑚簋之末體不免於負薪之勞猶奏和音於聾俗之地鬻章甫於被髪之域徒㤀寤於翰林鋭意以窮神崇琬琰於懷抱之内吐琳瑯於毛墨之端躬困屢空之儉神勞堅髙之間譬若埋尺璧於重壤之下封文錦於㳫匱之中終無交易之富孰賞堙翳之珍哉夫龍驥維縶則無以别乎蹇驢赤刀韜鋒則曷用異於鉛刃鱣鮪不居牛迹大鵬不滯蒿林願先生委龍蛇之穴升利見之塗釋户庭之獨潔覽二鼠而逺寤越窮谷以登髙襲丹藻以改素競驚飈於清晨不盤旋以栢夜收名器於崇髙嚮鍾鼎之慶祚暮成}
