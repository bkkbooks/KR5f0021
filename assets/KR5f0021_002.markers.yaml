  - {type: variant, offset: 1800, length: 127, content: 知羈縶之爲洿也聖人之清者孟軻所美亦云天爵貴於印綬志修遺榮孫卿所尚道義既備可輕王公而世人所畏唯勢所重唯利盛德身滯便謂庸人器小任大便謂高士或有乘危冒嶮投死忘生棄遺體於萬仞之下邀榮華乎一朝之間比夫輕四海愛脛毛之士何其緬然邪仕人曰潜退之士得意山澤不荷世貴蕩然縱肆, CK-KZ: ''}
