  - {type: line-break, offset: 2363, content: '', id: KR5f0021_HFL_002-008a02}
  - {type: variant, offset: 2368, length: 214, content: 土所謂禄利耳非富貴也且夫官高者其責重功大者人忌之獨有貧賤莫與我爭可得長寳而無憂焉濯裘布被拔葵去織㹠不掩豆菜肴糲飡又獲逼下邀僞之譏樹塞反坫三歸玉食禳侯之富安昌之泰則有僣上洿濁之累未若遊神典文吐故納新求飽乎耒耜之端索緼乎杼軸之間腹仰河而已滿身集一枝而餘安萬物芸芸化爲埃塵矣饘粥餬口布褐緼袍淡泊肆志不憂不喜斯爲尊樂喻之無物也夫仕也者欲以爲名邪則脩毫可以洩憤懣篇章可以寄姓字何假乎良史何煩乎鑱鼎哉孟子不以矢石爲功揚雲不以治民益世求仁而得, CK-KZ: 唐}
