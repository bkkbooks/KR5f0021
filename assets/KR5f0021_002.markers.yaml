  - {type: variant, offset: 1784, length: 2, content: 夫言, SBCK: 身}
  - {type: variant, offset: 1784, length: 1, content: 夫, WYG: 以苟命者雅人也據體度以動静毎清詳而無悔者重人也體氷霜之粹素不染於勢利者清人也篤始終於寒暑雖危而不猜者義人也守一言於久要厯嵗衰而不渝者信人也摛鋭以立言辭炳蔚而清允者文人也奮果毅之壯烈騁干戈以静難者武人也甄墳索之淵粤該前言以窮理者儒人也銳乃心於精義吝寸隂以進徳者益人也識多藏之厚亡臨禄利而如遺者廉人也不改操於得失不傾志於可欲者貞人也䘏急難而㤀勞以憂人為己任者篤人也潔皎介以守終不遜避而苟免者節人也飛清機之英麗言約暢而判滯者辯人也每居卑而推功雖處㤗而滋恭者謙人也崇敦睦於九族必居正以赴理者順人也臨凝結而能斷操䋲墨而無私者幹人也㧞朱紫於中搆剖猶豫以允當者理人也步七曜之盈縮推興亡之道軌者術人也赴白刃而㤀生格兕虎於林谷者勇人也整威容以肅衆伏法度而無貳者嚴人也創機巧以濟用總音數而並精者藝人也凌强禦而無憚雖險逼而不沮者人也執匪懈於夙夜㤀勞瘁於深峻者勤人也蒙謗讟而晏如不慴懼於可畏者勁人也聞榮譽而不歡遭憂難而不變者審人也知事可而必行不猶豫於羣疑者果人也循䋲墨以進止不乾沒於僥倖者謹人也奉禮度以戰競及親踈而無尤者良人也履道素而無欲時難移而不變者朴人也凡此諸行了無一然而不躋善人之迹者下人也門人請曰善人之行既聞其目矣惡者之事可以戒俗者願聞垂誥焉抱朴子曰不致養於所生損道而妄身者悖人也懷邪偽以偷榮豫利己而忘生者逆人也背仁義之正途茍危人以自安者㐫人也好爭奪而無厭專醜正而害直者惡人也出䋲墨以傷刻心好殺而安忍者虐人也飾邪説以浸潤搆謗累於忠貞者䜛人也雖言巧而行違實履濁而假清者佞人也不原本於枉直茍好勝而肆怒者暴人也措細善以取信隂挾毒而無親者姦人也承風指以茍容揆主意而扶非者諂人也}
