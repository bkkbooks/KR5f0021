  - {type: variant, offset: 2209, length: 1, content: 移, WYG: 堪之拂衣拔棘而手足相及醜言加於所尊歡心變而成讎絶交壞身搆隙致禍以杯螺相擲者有矣以隂私相訐居謁切西斤人者有矣昔陳靈之被矢管氏之泯族匪降自天口實為之樞機之發榮辱之主三緘之戒豈欺我哉激雷不能追既往之失辭班輸不能磨斯言之既玷音㸃雖不能三思而吐清談猶可息謔調以防禍萌也尊}
