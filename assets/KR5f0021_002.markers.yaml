  - {type: variant, offset: 7, length: 0, content: '', WYG: 峻者由乎其下之厚也唐虞所以能臻巍巍之功者實賴股肱之良也雖有孫陽之手而無騏驥之足則不得致千里矣雖有稽古之才而無宣力之佐則莫縁凝庶績矣人君雖明並日月神鑒未兆然萬幾不可以獨統曲碎不可以親總必假目以闢覽借耳以廣聴誠須有司是康是賛故聖莫不根心招賢以舉才為首務施玉帛於丘園馳翹車於巖藪勞於求人逸於用能自槐棘降逮皂𨽻論道經國莫不任職恭已無為而治平刑措而化洽無外萬邦咸寧設官分職其猶搆室一物不堪則崩撓之由也然未貢舉之士格以四科三事九列是之自出必簡標頴拔萃之俊而漢之末葉桓靈之世柄去帝室政在姦臣網漏防潰風頺教沮抑清徳而揚諂媚退履道而進多財力競成俗茍得無耻或輸自售之寳或賣要人之書或父兄貴顯望名而辟命或低頭屈膝積習而見収夫銓衡不平則輕重錯謬斗斛不正則少多混亂䋲墨不陳則曲直不分準格傾側則滓雜實繁以之治人則虐暴而豺貪受取聚斂以補買官之費立之朝廷則亂劇於棼絲引用駑庸以為之黨援而望風向草偃庶事之康何異懸瓦礫而責夜光絃不調而索清音哉何可不澄濁飛沉沙汰臧否嚴試對之法峻貪夫之防哉殄瘁攸階可勿畏乎古者諸侯貢士適者謂之有功有功者增班進爵貢士不適謂之有過有過者出位削地猶復不能免詩人興大車素餐之刺山林無伐檀兔罝之賢況舉之無非才之罪受之無負乘之患衡量一失其格多少安可復損乎夫孤立之翹秀藏器以待價瑣碎之輕薄人事以邀夫惟待價故頓淪於窮瘁矣夫唯邀速故佻竊而騰躍矣盖梟鴟屯飛則鴛幽集豺狼當路則麒麟避遁舉善而教則不仁者逺矣姦偽榮顯則英傑潜逝高概耻與闒茸為伍清節羞入饕餮之貫舉任並謬則羣賢括嚢羣賢括嚢則㓙邪相引㓙邪相引則小人道長小人道長則檮杌比肩頌聲所以不作怨嗟所以嗷嗷也高幹長材恃能勝己屈伸黙語聴天任命窮通得失委之自然亦焉得不墮多黨者之後而居有力者之下乎逸倫之士非禮不動山峙淵停知之者希馳逐之徒蔽而毁之故思賢之君終不知竒才之所在懐道之人願效力而莫從雖抱稷卨之器資邈世之量遂沉滯詣死不得登叙也而有黨有力者紛然鱗萃人乏官曠致者又美亦安得不拾掇而用之乎靈獻之世閹宦用事羣姦秉權危害忠良臺閣失選用於上州郡輕貢舉於下夫選用失於上則牧守非其人矣貢舉輕於下則秀孝不得賢矣故時人語曰舉秀才不知書察孝行父别居寒清素白濁如泥高第良將却如雞又云古人欲達勤誦經今世圖官免治生盖疾之甚也于時懸爵而賣之猶列肆也爭津者買之猶市人也有苴者無分而徑進空拳者望途而収迹其貨多者其官貴其財少者其職卑故東園積賣官之錢崔烈有銅臭之嗤上為下傚君行臣甚故阿佞幸獨談親容桑梓議主中正吏部並為魁儈各債其估清貧之士何理有望哉是既然矣又邪正不同譬猶氷炭惡直之人憎於非黨刀尺顛倒者則恐人之議己也達不由道者則患言論之不美也乃共搆合虚誣中傷清徳瑕累横生莫敢救拔於是曾閔獲商臣之謗孔墨蒙盜跖之垢懷正居貞者殞笮乎泥濘之中而狡猾巧偽者軒翥乎虹霓之際矣而凡夫淺識不辨邪正謂守道者為陸沈以履徑者為知變俗之隨風而動逐波而流者安能復身於徳行苦思於學問哉是莫不棄檢括之勞而赴用賂之速也斯誠有漢之所以傾來代之所宜深鑒也或曰吾子論漢末貢舉之事誠得其病也今彼欲戒既往之失避傾車之路改有代之絃調防法翫之或變今濮上巴人反安樂之正音腠理之疾無退走之滯患者豈有力乎士有丰姿豐偉雅望有餘而懐空抱虚幹植不足以貌取之則不必得賢徐徐先試則不可倉卒將如之何抱朴子曰知人則哲上聖所難今使牧守皆能審良才於未用保性履之始終誠未易也但共遣其私竭其聰明不為利慾動不為囑託屈所欲舉者必澄思以察之博訪以詳之修其名而考其行校同異以備虚餙令親族稱其孝友邦閭歸其信義嘗小仕者有忠清之效治事之幹則寸錦足以知巧刺鼠足以觀勇也又秀孝皆宜如舊試經答策防其所對之姦當令必絶其不中者勿署吏罰禁錮其所舉書不中者刺史太守免官不中左遷中者多不中者少後轉不得過故若受賕巨切流而舉所不當發覺有驗者除名禁錮終身不以赦令原所舉舉者與同罪今試用此法治一}
