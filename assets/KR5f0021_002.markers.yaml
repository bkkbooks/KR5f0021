  - {type: variant, offset: 2211, length: 0, content: '', WYG: 辭令敬其威儀使言無口過體無倨居御切容可法可觀可畏可愛蓋逺辱之術全交之要道也且夫慢人者不愛其親者也輕鬭者不重遺體者也皆陷不孝可不詳乎然而迷謬者無自見之明觸情者諱逆耳之規疾美而無直亮之鍼職深切艾羣惑而無指南以自反諂媚小人歡笑以賛善面從之徒拊節以稱功益使惑者不覺其非自謂有端晏之㨗過人之辯而不悟斯乃招患之旌召害之符傳非之驛傾身之車也豈徒减其方䇿之令聞其沒世之徳音而已哉蓋雖有偕老之慎不能救一朝之過雖有陶朱之富不能贖片言之謬故毫之失千里之差傷人之語有劒㦸之痛積微致著累淺成深鴻羽所以沉龍舟羣輕所以折勁軸寸飈所以燔百尋之室蠧蝎所以仆普卜也連抱之木也古賢何獨跼蹐恂恂之如彼今人何其憒慢傲放之如此乎是以髙世之士望塵而旋迹輕薄之徒響赴而影集謀事無智者之助居危無切磋之益良史懸筆無可書之善談者含音無足傳之美令聞不著醜聲宣流沒有餘敗貽譏將來始無可法終無可紀斯亦}
