  - {type: variant, offset: 2245, length: 2, content: 喜脩, WYG: 能復制䋲墨所不能復彈遂成鷹頭之蠅廟垣之䑕所未及者作威作福以控御之故勝己者則不得聞聞亦陽不知也减己者則不敢言言亦不能禁也夫災蟲害穀至降霜則殄矣佞雄亂羣值嚴時則敗矣獨善其身者唯可以不肯事之不行傚之而已耳有斧無柯其如之何哉抱朴子曰詩美睢鳩貴其有别在禮男女無行媒不相見不雜坐不通問不同一物不得親授姊妹出適而反兄弟不共席而坐外言不入内言不出婦人送迎不出門行必擁蔽其面道路男由左女由右可謂昵矣而猶男子非疾病不晝居於内將終不死婦人之手況於他乎昔魯女不幽居深處以致圉犖力各切之變孔妻不宻潜户庭以起華督之禍史激無防有汙種之悔王孫不言有杜門之辱而今俗婦人休其職之業廢其𤣥紞之務不績其麻市也婆娑舍中饋之事修周旋之好更相從詣之適親戚承星舉火不已于行多將侍從暐盈路婢使吏卒錯雜如市尋道䙝謔可憎可惡或宿于他門或冐夜而反遊戲佛寺觀視漁畋登髙臨水出境慶弔開車褰幃周章城邑盃觴路酌絃歌行奏轉相髙尚習非成俗坐致因縁無所不可誨淫之源不急之甚刑于寡妻家邦乃正願諸君子少可禁絶婦無外事所以防微矣抱朴子曰輕薄之人迹側髙深交成財贍名位粗㑹便背禮叛教託云率任才不逸倫强為放達以傲兀無檢者為大度以惜䕶節操者為澁少於是臘皷垂無賴之子犬白醉耳熱之後結黨合羣遊不擇𩔖竒士碩儒或隔籬而不接妄行所在雖逺而必至携手連袂以遨以集入他堂室觀人婦女指玷修短評論美醜不解此等何為者哉或有不通主人便共前嚴飾未辦不復窺聴犯門折闗踰垝穿隙有似抄劫之至也其或妾媵藏避不及至捜}
