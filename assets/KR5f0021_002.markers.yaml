  - {type: variant, offset: 26, length: 1, content: 言, CK-KZ: 伍謂榮顯爲不幸以玉帛爲草土抗靈䂓於雲表獨違今而遂古庇峻岫之巍峩藉翠蘭之芳茵漱流霞之澄液茹八石之精英思眇眇焉若居乎虹霓之端意飄飄焉若在乎倒景之鄰萬物不能攪其和四海不足汨其神於是有起勢公子聞之慨然而嘆}
