  - {type: page-break, offset: 1620, content: '', id: KR5f0021_WYG_002-15b}
  - {type: variant, offset: 1621, length: 0, content: '', WYG: 單絃不能發韶夏之和音孑色不能成衮龍之瑋一味不能合伊鼎之甘獨木不能致鄧林之荗𤣥圃極天盖由衆石之積南溟浩瀁實須羣流之赴明鏡舉則傾冠見矣羲和照則曲影覺矣括修則枉刺之疾消矣良友結則輔仁之道𢎞矣達者知其然也所企及則必簡乎勝己所降結則必料乎同志其處也必講道進徳其出也則齊心比翼否則鈞魚釣之業泰則恊}
  - {type: variant, offset: 1624, length: 4, content: 士悠悠皆, WYG: 務安則有以精義危則有以相恤耻令譚青專兩地之篤不使王貢擅彈冠之美夫然後故交道可貴也然虚實未易知勢利生去就積毁壊刎頸之契漸漬釋膠漆之堅於}
  - {type: page-break, offset: 1624, content: '', id: KR5f0021_WYG_002-16a}
  - {type: variant, offset: 1629, length: 2, content: 一日, WYG: 有忘素情之惆歎或睚五懈切眥而不思遂令元伯巨卿之好獨著於昔張耳陳餘之變屢搆於今推往尋來良可歎也夫梧禽不與鴟梟同枝麟虞不與豺狼連羣清源不與濁潦混流仁明不與㓙闇同處何者漸染漬而移直道暴迫則生害也或曰敢問全交道可得聞乎抱朴子答曰君子交絶猶}
