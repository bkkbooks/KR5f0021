  - {type: variant, offset: 2805, length: 347, content: 曰萬邦黎獻共惟帝臣干木不荷戈戍境築壘疆場而有蕃魏之功今隱者潔行蓬蓽之内以詠先王之道使民知退讓儒墨不替此亦堯舜之所許也昔夷齊不食周粟鮑焦死於橋上彼之硜硜何足師表哉昔安帝以玄纁玉帛聘周彦祖桓帝以玄纁玉帛聘韋休明順帝以玄纁玉帛聘楊仲宣就拜侍中不到魏文帝徵管幼安不至又就拜光禄勛竟不到乃詔所在常以八月致羊一口酒二斛桓帝玄纁玉帛聘徐孺子就拜太原太守及東海相不到順帝以玄纁玉帛聘樊季高不到乃詔所在常以八月致羊一口酒二斛又賜几杖待以師傅之禮獻帝時鄭康成州辟舉賢良方正茂才公府十四辟皆不就公車徵左中郎博士趙相侍中大司農皆不起昭帝公車徵韓福到賜帛五十疋及羊酒法高卿再舉孝廉本州五辟公府八辟九舉賢良博士三徵皆不就桓帝以玄纁玉帛安車軺輪聘韓伯休不到以玄纁玉帛安車軺輪聘姜伯雅就拜太中大夫犍爲太守不起然皆見優重不加威辟, WYG: ''}
