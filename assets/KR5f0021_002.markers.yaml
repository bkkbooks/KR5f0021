  - {type: variant, offset: 2605, length: 0, content: '', CK-KZ: 村鎭業靡違正黨逆義軍大都督邀洪爲將兵都尉累見敦迫曁桑梓恐虜禍深憂大古人有急疾之義又畏軍法不敢任志遂募合數百人與諸軍旅進曾攻賊之别將破之日錢帛山積珍玩蔽地諸軍莫不放兵收拾財物繼轂連檐洪獨約令所領不得妄離行陣士有摭得眾者洪卽斬之以狥於是無敢委杖而果有伏賊數百出傷諸軍諸軍悉發無部隊人馬皆負重無復戰心遂致驚亂死傷狼藉殆欲不振獨洪軍整齊轂帳無所損失以救諸軍之大崩洪有力焉後别戰斬賊小帥多獲甲首而獻㨗幕府於是大都督加法伏波將軍例給布百疋諸將多封閉之或送還家而洪分賜將士及施知故之貧者餘之十匹又徑以市肉酤酒以饗將吏於時竊擅一日之美談焉事平洪投戈釋甲徑詣洛陽欲廣尋異書了不論戰功竊慕魯連不受聊城之金包胥不納存楚之賞成功不處之義焉正遇上國大亂比道不通而陳敏又反於江東歸塗隔塞會有故人譙國稽居道見用爲廣州刺史乃表請洪爲參軍雖非可樂然利可避地於南故黽勉就焉見遣先行催兵而居道於後遇害遂停廣州頻爲節將見邀用皆不就永惟富貴可以漸得而不可頓合其間屑屑亦足以勞人且榮位勢利譬如寄客旣非常物又其去不可得留也隆隆者絕赫赫者滅有若春華須臾凋落得之不喜失之安悲悔吝百端憂懼競戰不可勝言不足爲也且自度性篤懶而才至短以篤懶而御短才雖翕肩屈膝趨走風塵猶必不辨大致名位而免患累况不能乎未若修松喬之道在我而已不由於人焉將登名山服}
