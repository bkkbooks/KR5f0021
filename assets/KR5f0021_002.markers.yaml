  - {type: variant, offset: 1793, length: 2, content: 爲高, WYG: 二也士有謀猷淵䆳術畧入神智周成敗思洞幽𤣥才兼能事神器咸宜而口不傳心筆不盡意造次之接不異凡庸蓋難分之三也士有機變清鋭巧言綺粲擊引譬喻淵湧風厲然而口之所談身不能行長於識古短於理今為政政亂牧民民怨蓋難分之四也士有外形足恭言容恪䖍而神䟽心慢中懷散放受任不憂當局不治蓋難分之五也士有控弦命中空弮入石倒乘立騎五兵畢習而體輕慮淺手勁心怯虚試無對而實用無驗望塵奔北聞敵失魄蓋難分之六也士有梗概簡緩言希貌樸細行闕漏不為小勇跼拘檢犯而不校掘爪垂翅名為弱愿然而膽勁心方不畏强禦義正所在視死猶歸支解寸斷不易所守蓋難分之七也士有孝友温淑恂恂平雅履信思順非禮不蹈安困潔志操清氷霜而䟽遲迂濶不達事要見機不作所為無成居己披猖受任不舉蓋難分之八也士有行己髙簡風格峻峭嘯傲偃蹇凌儕慢俗不肅檢括不䕶小失過情率意旁若無人朋黨排譴談者同敗士友不附品藻所遺而立朝正色知無不為忠於奉上明以攝下蓋難分之九也士有含𢎞廣濟虚己受物藏疾匿瑕温恭亷潔勞謙冲退救危全信寄命不疑託孤可保而純良暗權仁而不斷善不能賞惡不忍罰忠貞有餘而幹用不足操柯猶豫廢法縦非枉直混錯終於負敗盖難分之十}
