  - {type: variant, offset: 8, length: 1, content: 真, WYG: 嵗之間秀孝必多不行者亦足以知天下貢舉不精之久矣過此則必多修徳而勤學者矣又諸居職其犯公坐者以法律從事其以貪濁汙為罪不足至死者刑竟及遇赦皆宜禁錮終身輕者}
