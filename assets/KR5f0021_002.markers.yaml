  - {type: variant, offset: 1772, length: 0, content: '', WYG: 之夫採薇何足多慕乎居泠先生應曰葢聞靈機㝠緬混茫渺昧禍福交錯乎倚伏之間興亡纒綿乎盈虚之㑹逝者}
  - {type: variant, offset: 1773, length: 8, content: 合變通古人嗟嘆謂, CK-KZ: 滅忌毁辱而爭肆之情}
