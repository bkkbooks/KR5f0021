  - {type: variant, offset: 1101, length: 651, content: 軍法治平世枉害賢人酷誤已甚矣賴其功大不便以至顛沛耳且吕尚之未遇文王也亦曾隱於窮賤凡人易之老婦逐之賣傭不售屠釣無獲曾無一人慕之其避世也何獨慮狷華之沮衆邪設令殷紂以尚逃遁收而歛之尚臨死豈能自謂罪所應邪魏武帝亦刑法嚴峻果於殺戮乃心欲用乎孔明明自陳不樂出身武帝謝遣之曰義不使高世之士辱於汙君之朝也其鞭撻九有草創皇基亦不妄矣紛擾日久求競成俗或推貨賄以龍躍或階黨援以鳳起風成化習大道漸蕪後生昧然儒訓遂堙將爲立身非財莫可苟有卓然不群之士不出户庭潜志味道誠宜優訪以興謙退也夫使孫吴荷戈一人之力耳用其計術則賢於萬夫今令大儒爲吏不必切事肆之山林則能陶冶童蒙闡弘禮敬何必服巨象使捕鼠韝鸞也則鍾鼎鎸其聲若乃零淪藪澤空生徒死亦安足貴乎逸民答曰子可謂守培塿玩狐丘未登閬風而臨雲霓翫瀅汀游潢洿未浮南溟而涉天漢凡所謂志人者不必在乎禄位不必須乎勛伐也太上無己其次無名能振翼以絶群騁迹以絶軌爲常人所不能爲割近才所不能割少多不爲凡俗所量恬粹不爲名位所染淳風足以濯百代之穢高操足以激將來之濁何必紆朱曳紫服冕乘軺被犠牛之文繡吞詹何之香餌朝爲張天之炎熱夕成冰冷之委灰夫斥鷃不以蓬榛易雲霄之表王鮪不以幽岫𧵍滄海之曠虎豹入廣厦而懷悲鴻鶤登嵩巒而含慼物各有心安其所長莫不泰於得意而慘於失所也經世之士悠悠皆是一日無君惶惶如也譬猶藍田之積玉鄧林之多材良工大匠肆意所用亦何必棲魚而沈鳥哉嘉遁高蹈先聖所許或出或處各從攸好蓋士之所貴立德立言若夫孝友仁義操業清高可謂立德矣窮覽墳索著述粲然可謂立言矣夫善卷無治民之功未可謂之減於俗吏仲尼無攻伐之勛不可以爲不及於韓白矣, CK-KZ: ''}
