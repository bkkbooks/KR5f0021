  - {type: variant, offset: 1778, length: 0, content: '', WYG: 之所以懷沙負石赴流魚葬而不堪與之同世也已矣悲夫然捐𤣥黎於洿濘非夜光之不真也由莫識焉投彤盧而不彎非繁弱之不勁也坐莫賞焉故瓊瑶俟荆和而顯連城之價烏號須逢門而著陷堅之功飛莵待子預而飈騰俊民直知已而宣力若夫美玉不出重岫良弓不鑿百札驥騄不服朱軒命世不履爵勢則孰知其能攄符彩之耀曄頓雲禽於千仞騁逸迹以追風康庶績於百揆乎夫其不遇亦得不雜揉於瓦石鈞賤於朽木列鑣於下乘等望於凡瑣哉}
