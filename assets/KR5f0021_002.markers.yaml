  - {type: variant, offset: 2587, length: 0, content: '', CK-KZ: 吳厯宰鹽臨安山陰縣入爲吏部侍郎御史中丞廬陵太子少傅中書大鴻臚侍中光祿勳輔吳將軍封吳夀縣侯洪父以孝友聞行爲士表方冊所載罔不窮覽仕吳五官郎中正建城南昌二縣令中書郎建尉平中護軍拜會稽太守未辭而晉軍順流西境不守愽簡秉文經武之才朝野之論僉然推君於是轉爲五郡赴警大都督給親兵五千總統征軍戍遏疆場天之所壞}
