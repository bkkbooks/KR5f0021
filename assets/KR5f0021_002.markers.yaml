  - {type: variant, offset: 1764, length: 0, content: '', WYG: 為髙士今以山林之儒為不肖故聖人之良幹乃闇俗之罪人也徃者之介石乃末葉之羸劣也𢎞偉之士履道之生其崇信匪徒重仞之牆其淵澤不唯吕梁之深也故短近不能賞而淺促不能測焉因以異乎己而薄之矣以不求我而疾之矣不貴不用何足言乎乃有播埃塵於白珪生瘡痏於玉肌訕疵雷同攻伐獨立曽參蒙刼剽之垢巢許獲穿窬之謗自匪明並懸象𤣥鑒表微者焉能披泥抽淪玉澄川掇沉珠哉夫珪璋居肆而不售矧乃翳於磐璞乎竒士扣角而見遏况乃潜於臯藪乎孫臏思騁其秘略而司馬刖之韓非願建其治績而李斯殺之賈誼慷慨懐經國之術而武夫排之子政忠良有匡危之具而恭顯陷之和氏所以抱璞而泣血禽息所以發憤而碎首也夫玉石易别於賢愚愛寶情篤於好士以易别之寶合篤好之物猶獲罪截趾歴世受誣况乎難知之賢非意所急䜛人畫蛇足於無形姦臣畏忠貞之害己體曲者忌䋲墨之容夜祼者憎明燭之來是以髙譽美行抑而不揚虛搆之謗}
