  - {type: variant, offset: 2299, length: 4, content: 持撓華旗, WYG: 動心載號載呶謔戲醜䙝窮鄙極黷爾乃笑亂男子之大節蹈相䑕之無儀夫桀傾紂覆周滅陳亡咸由無禮况匹庶乎盖信不由中則屢盟無益意得神至則形器可忘君子之交也}
  - {type: variant, offset: 2304, length: 0, content: '', WYG: 道義合以志契親故淡而成焉小人之接也以勢利結以狎慢宻故甘而敗焉何必房集内讌爾乃欵誠著妻妾飲㑹然後分好昵哉古人鑒淫敗之曲防杜傾邪之端漸可謂至矣修之者君子背之者為小人然禁䟽則上宫有穿窬之男網漏則桑中有奔隨之女縱而肆之其猶烈猛火於雲夢開積水乎萬仞其可撲以箒篲遏以撮壤哉然而俗習行慣皆曰此乃京城上國公子王孫貴人所共為也余每折之曰夫中州禮之所自出也禮豈然乎蓋衰亂之所興非治世之舊風也夫老耼清虛之至者也猶不敢見乎所欲以防心亂若使柳下惠潔髙行屢接䙝讌將不能不使情生於中而色形于表况乎情淡者萬未一而抑情者難多得如斯之事足長乎窮士雖知此風俗不足引進而名勢並乏何以整之每以為慨故常獲憎於斯黨而見謂為野朴之人不能隨時之宜余期於信己而已亦安以我之不可從人之可乎可嘆非一率如此也已矣夫吾末如之何也彼之染}
