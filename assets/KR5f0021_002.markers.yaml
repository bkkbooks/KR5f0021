  - {type: variant, offset: 1779, length: 1, content: 嘆, WYG: 乎彍棘矢而望髙手於渠廣䇿疲駑而求繼軌於周穆放斧斤而欲雙巧於班墨忽良才而欲彛倫之攸叙不亦難乎名實雖漏於一世徳音可邀乎將來樂天知命何慮何憂安時處順何怨何尤哉清鑒第二十抱朴子曰咸}
  - {type: variant, offset: 1781, length: 0, content: '', WYG: 勇力絶倫者則上將之器洽聞治亂者則三九之才也然張飛闗羽萬人之敵而皆喪元辱主授首非所孔融退讓文學邈俗而並不達治務所在敗績鄧禹馬援田間諸生而善於用兵蕭何曹參不渉經誥而優於宰輔爾則知人果未易也欲試可乃已則恐成折足覆餗欲聴言察貌則或似是而非真偽錯然而世人甚以為易經耳過目謂可精盡余甚猜焉未敢許也區别臧否瞻形得神存乎其人不可力為自非明並日月聴聞無音者願加清澄以漸進用不可頓任輕假利器收還之既甚難所損者亦多以矣無以一事闇保其餘同乎己者未必可用異於我者未必可忽也或難曰夫在天者垂象在地者有形故望山度水則髙深可推風起飛雲則吉凶可歩智者覩山不瘁則悟美玉之在山覿岸不枯則覺明珠之沉淵彗星出則知鱣魚之方死日月蝕則識麒麟之共鬭華霍不須稱而無限之重可知矣江河不待量而不測之數已定矣鴻鵠之翼騄騏之足雖未飛走輕可必也豪曹之劒徐氏匕首雖未奮擊其立斷無疑也駮子有吞牛之容鶚鷇有凌鷙之貌卉茂者土必沃魚大者水必廣虎尾不附狸身象牙不出䑕口叔魚無厭之心見於生初之狀食我㓕宗之徵著乎開胞之始申童覺竊妻之巫臣張負知將貴之陳平范子所以絶迹於五湖者以句踐蜂目而鳥喙也趙人所以息意於争鋒者以白起首鋭而視直也文王之接吕尚桑隂未移而知其足師矣𤣥徳之見孔明晷景未改而腹心已委矣郭泰中材猶能知人故入頴川則友李元禮到陳留則結符偉明入外黄則親韓子助至蒲亨則師仇季知止學舍則收龎徳公觀耕者則㧞茅季竒孟敏於擔負戒元艾之必敗終如其言一無差錯必能簡精鈍於符表詳舒急乎聲氣料明闇於舉厝察清濁於財色觀取與於宜適徴虚實於言行考操業於闔闢校始終於信效善否之檢不其易乎抱朴子答曰余非謂人物了不可知知人挺無形理也徒以斯術存乎大明非夫當人自許然而世士各謂能之是以有云以警付任耳夫貌望豐偉者不必賢而形器尫瘁者不必愚咆哮者不必勇淳淡者不必怯或外貌同而用意異或氣性殊而所務合非若天地有常候山川有定止也物亦故有逺而易知近而難料譬猶眼能察天衢而不能周項領之間耳能聞雷霆而不能識螘虱之音也唐吕樊許善於相人狀唯知夀夭貧富官秩尊卑而不能審情性之寛剋志行之洿隆惟帝難之況庸人乎而吾子舉論形之例詰精神之談未修其本殆失指矣夫亡射之箭皆破秋毫然凖的恒不得為工叔向之母申氏之子非不一得然不能常也陶唐稽古而失任姬公欽明而謬授尼父逺得崇替於未兆近失澹臺於形骸延州審清濁於千載之外而蔽竒士於咫尺之内知人之難如此其甚郭泰所論皆為此人過上聖乎但其所得者顯而易識其所失者人不能紀且夫所貴貴乎見俊才於無名之中料逸足乎呉坂之間掇懷珠之蚌於九淵之底指含光之珍於積石之中若伯喈識絶音之器於烟燼之餘平子剔逸響之竹於未用之前六軍之聚市人之㑹暫觀一覩無所昡惑探其潜生之心計定其始終之事行乃為獨見不傳之妙耳若如末論必俟考其操蹈之全毁觀其云為之好醜此為絲線既經於銓衡布帛已厯於丈尺乃説其斤兩之䡖重端匹之修短人皆能之何煩於哲哉行品第二十二抱朴子曰擬𤣥黄之覆載揚明並以表㣲文彪昺而摽以邈俗虛靈機以如愚不二過以謟黷者賢人也居寂寞之無為蹈修直而執平者道人也盡烝嘗於存亡保髮膚以揚名者孝人也垂惻𨼆於有生恒恕己以接物者仁人也端身命以狥國經險難而一節者忠人也覩㣲理於難覺料倚伏於將來者明人也量理亂以卷舒審去就以保身者智人也順通塞而一情任性命而不滯者達人也不枉尺以直尋}
