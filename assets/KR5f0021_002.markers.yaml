  - {type: variant, offset: 2198, length: 3, content: 能染其, CK-KZ-jye: 出者謂之耽寵忘退往而不反者謂之不仕無義故達者以身非我有任乎所値隱顯默語無所必固時止則止時行則行朿帛之集庭燎之舉則君子道長在天利見若運涉陽九讒勝之時則不出戸庭括囊勿用龍起鳳戢隨時之宜古人所以或避危亂而不肯入或色斯而不終日者慮巫山之失火恐芝艾之并焚耳方今聖皇御運世夷道泰仁及養生惠風遐邁威肅鬼方澤沾九裔儀坤德以厚載凝乾穹以高葢}
  - {type: variant, offset: 2198, length: 0, content: '', WYG: 可恣也故惑目者必逸容鮮藻也惑耳者必妍音淫聲也惑鼻者必茝昌給切蕙芬馥也惑口者必珍羞嘉㫖也惑心者必勢利功名也五者畢惑則或承之禍為身患者不亦信哉是以智嚴櫽括於性理不肆神以逐物檢之以恬愉増之以長筭其抑情也劇乎隄防之備决其御性也過乎腐轡之乘奔故}
