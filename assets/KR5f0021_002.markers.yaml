  - {type: variant, offset: 3041, length: 0, content: '', CK-KZ: 薦名瑯琊王丞相府昔起義兵賊平之後了不修名詣府論功主者永無賞報之冀晉王應天順人撥亂反正結皇綱於垂絕修宗廟之廢祀念先朝之滯賞並無報以勸來洪隨例就彼庚寅詔書賜爵關中侯食句容之邑二百竊詔討賊以救桑梓勞不足錄金紫之命非其始願本欲遠慕魯連近引田疇上書固辭以遂微志適有大例同不見許昔仲由讓應受之賜而沮爲善醜虜未夷天下多事國家方欲明賞必罰以彰憲典小子豈敢苟潔區區之懦志而距弘通之大制故遂息意而恭承詔命焉洪旣著自敘之篇或人難曰昔王充年在耳順道窮望絕懼身名之偕滅故自紀終篇先生以始立之盛値乎有道之運也方將解申}
