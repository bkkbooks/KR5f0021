  - {type: variant, offset: 2592, length: 0, content: '', CK-KZ: 甲六壬太乙之法粗知其旨又不研精亦計此輩率是爲人用之事同出身情無急以此自勞役不如省子書之有益遂又廢焉案別錄藝文志眾有萬三千二百九十九卷而魏代以來羣文滋長倍於往者乃自知所未見之多也江表書籍通同不具昔故詣京師索奇異而正値大亂半道而還每具嘆憾今齒近不惑素志衰頽但念損之又損爲乎無爲偶耕藪澤苟存性命耳愽涉之業於是日沮矣洪之爲人也而騃野性鈍口訥形貌醜陋而終不辯自矜餙也冠履垢弊衣或藍縷而或不恥焉俗之服用俄而屢改或忽廣領而大帶或身促而修袖或長裾曳地或短不蔽腳洪期於守常不隨世變言則率實杜絕嘲戲不得其人終日默然故邦人咸稱之爲抱樸}
  - {type: page-break, offset: 2592, content: '', id: KR5f0021_CK-KZ_01p175b, image: JY145/CK-KZ_JY145_01p175b.png}
  - {type: variant, offset: 2592, length: 0, content: '', CK-KZ-jye: 甲六壬太乙之法粗知其旨又不研精亦計此輩率是爲人用之事同出身情無急以此自勞役不如省子書之有益遂又廢焉案別錄藝文志眾有萬三千二百九十九卷而魏代以來羣文滋長倍於往者乃自知所未見之多也江表書籍通同不具昔故詣京師索奇異而正値大亂半道而還每具嘆憾今齒近不惑素志衰頽但念損之又損爲乎無爲偶耕藪澤苟存性命耳愽涉之業於是日沮矣洪之爲人也而騃野性鈍口訥形貌醜陋而終不辯自矜餙也冠履垢弊衣或藍縷而或不恥焉俗之服用俄而屢改或忽廣領而大帶或身促而修袖或長裾曳地或短不蔽腳洪期於守常不隨世變言則率實杜絕嘲戲不得其人終日默然故邦人咸稱之爲抱樸}
