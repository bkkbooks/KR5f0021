  - {type: variant, offset: 728, length: 1, content: 冒, SBCK: 冐}
  - {type: variant, offset: 728, length: 2, content: 冒昧, WYG: 人無分之子曽無疾非介然之節星言宵征守其門庭翕然諂侫卑辭恱色提壺執贄時行索媚勤苦積久猶見嫌拒乃行因託長者以搆合之其見受也則踊恱過於幽繫之遇赦其不可也則懊悴劇於喪病之逮己也通塞有命道貴正直否泰付之自然津塗何足多咨嗟乎細人豈不鄙哉人情不同亦何逺邪毎為慨然助彼羞之昔莊周見恵子從車之多而棄其餘魚余感俗士不汲汲於攀及至也瞻彼云云馳騁風塵者不懋建徳業務本求己而偏狥髙友以結朋黨謂人理莫此之要當世莫此之急也以嶽峙獨立者為澁吝䟽拙以奴顔婢膝者為曉解當世風成俗習莫不流遁逐欲遂往可慨者也或有徳薄位髙器盈志溢聞財利則驚掉見竒士則坐睡繿縷杖䇿被褐負笈者}
  - {type: page-break, offset: 728, content: '', id: KR5f0021_WYG_002-11a}
  - {type: variant, offset: 731, length: 0, content: '', WYG: 文艶相雄學優融𤣥同之埃芥不加接引若夫程鄭王孫羅襃之徒乘肥衣輕懷金挾玉者雖素不習禮菽麥不辨為之倒屣吐食握髪余徒恨不在其位有斧無柯無以為國家流濁於四裔投畀於有北彼雖赫奕刀尺決乎勢力足以移山拔海吹呼能令出泥登雲造其門庭我則未暇也而多有下意怡顔匍匐膝進求交於若人以圖其益悲夫生民用心之鈞何其遼邈之不肖也哉余所以同生聖世而抱困賤本後顧而不見者今皆追瞻而不及其不有以乎然性茍不堪各從所好以此存亡子不能易也或又難曰時移世變古今别務行立乎己名成乎人金玉經於不測者託於輕舟也靈烏萃於𤣥霄者扶揺之力也芳蘭之芳烈者清風之功也屈士起於丘園者知己之助也今先生所交必清澄其行業所厚必沙汰其心性孑然隻跱失其名軰結仇一世招怨流俗豈合和光以籠物同塵之髙義乎若比智而交則白屋不降公旦之貴若鈞才而遊則尼父必無入室之客矣抱朴子曰吾聞詳交者不失人而泛結者多後悔故曩哲先擇而後交不先交而後擇也子之所論出人之計也吾之所守退士之志也子云玉浮鳥高皆有所因誠復别理一家之説也吾以為寧作不載之寳不飛之鵬不颺之蘭乎且夫士亦損於夜光之質垂天之大含芳之卉不朽之蘭乎且夫名多其實位過其才處之者猶尠免於禍辱交之者何足以為榮福哉由茲論之則交彼而遇者雖得達不足貴芘之而悞者譬如䕃朽樹之破笮也彼尚不能自止其顛蹷亦安能救我之碎首哉吾聞大丈夫之自得而外物者其於庸人也盖逼迫不獲已而與之形接雖以千計猶蚤虱之積乎衣而贅疣之攅乎體也失之雖以萬數猶飛塵之去嵩岱鄧林之墮朽條耳豈以有之為益無之覺損乎且夫朋友也者必取乎直諒多聞拾遺斥謬生無請言死無託辭終始一契寒暑不渝者然而此人良未易得而或黙語殊途或憎愛易心或盛合衰離或見利忘信其處今也譬猶禽魚之結侣氷炭之同}
