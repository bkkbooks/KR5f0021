  - {type: variant, offset: 2361, length: 0, content: '', WYG: 異於兹蓬髪亂横挾不帯或䙝衣以接人或祼而箕踞朋友之集𩔖味之遊莫切切進徳誾誾修業功過弼為講道精義其相見也不復叙離闊問安否賔則入門而呼奴主則望客而喚狗其或不爾不成親至而棄之不與為黨及好㑹則狐蹲牛飲爭食競割横撥淼摺無復亷恥以同此者為㤗以不爾者為劣終日無及義之言徹夜無箴規之益誣引老莊}
  - {type: page-break, offset: 2361, content: '', id: KR5f0021_WYG_002-58a}
  - {type: variant, offset: 2362, length: 5, content: 矣若夫剖符, WYG: 於率任大行不顧細禮至人不拘撿括嘯傲縱逸謂之體道嗚呼惜乎豈不哀哉於是嘲族以叙歡交極黷以結情欵以傾倚伸脚者為妖妍標秀以風格端嚴者為田舍朴騃以虽鎮抗指者為剿令鮮倚以出言}
