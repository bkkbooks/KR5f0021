  - {type: variant, offset: 1765, length: 4, content: 民嘉焉夷, WYG: 形生影又無楚人號哭之薦萬無一遇固其宜矣夫以王為石者亦將以石為玉矣以賢為愚者亦將以愚為賢矣以石為玉未有傷也以愚為賢者亡之診也盖診亡者雖存而必亡猶脉死者雖生而必死也可勿慎乎於戯悲夫莫之思者也昔仲尼上聖也東受累於}
