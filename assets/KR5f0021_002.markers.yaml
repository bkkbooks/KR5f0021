  - {type: variant, offset: 2350, length: 2, content: 雜斯, WYG: 㓕燭悲代親而不舉樂禮論娶者羞而不賀人既不能動蹈舊典至於徳為鄉閭之所敬言為人士之所信誠宜正色矯而呵之何謂同其波流長此弊俗哉然民間行之日久莫覺其非或清談所不能禁非峻刑不能止也遂詘周而疵孔謂傲放為邈世矣或因變故佻竊榮貴或賴髙援翻飛㧞萃於是便驕矜誇氣凌雲物歩髙視逺侈然自足顧瞻否滯失羣之士雖實英異忽焉若草或傾枕而延賔或稱疾以距客欲令人士立門以成林車騎填噎於閭巷呼謂尊貴不可不爾夫以勢位言之}
