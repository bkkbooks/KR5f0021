  - {type: variant, offset: 10, length: 2, content: 逸民, WYG: 十年如此不亷之吏必將化為夷齊矣若乃臨官受取金錢山積發覺則自恤得了免退則旬日復用者曽史亦將變為盜跖矣如此則雖貢士皆中不辭於官長之不良或曰能言不必能行今試經對䇿雖過豈必有政事之才乎抱朴子答曰古者猶以射擇人況經術乎如其舎㫋則未見餘法之賢乎此也夫豐草不秀瘠土巨魚不生小水格言不吐庸人之口髙文不墮頑夫之筆故披洪範而知箕子有經世之器覧九術而見范生懐治國之略省夷吾之書而明其有撥亂之幹視不害之文而見其精霸王之道也今孝亷必試經無脱謬而秀才必對䇿無失指則亦不得闇蔽也良將髙第取其膽武猶復試之以䇿況文士乎假令不能必盡得賢能要必愈於了不試也己且令天下諸當在貢舉之流者莫敢不勤學但此一條其為長益風教亦不細矣若使海内畏妄舉之失凡人息僥倖之求背競逐之末歸學問之本儒道將大興而私貨必漸絶竒才可得而役庶官可以不曠矣或曰先生欲急貢舉之法但禁錮之罪苛而且重懼者甚衆夫急轡繁䇿伯樂所不為宻防峻法徳政之所耻抱朴子曰夫骨填肉補之藥長於養體益夀而不可以救暍溺之急也務寛含垢之政可以蒞敦御朴而不足以拯衰弊之變也虎狼見逼不揮戈奮劍而彈琴詠詩吾未見其身可保也燎火及室不奔走灌注而揖譲盤旋吾未見其焚之自息也今與知欲賣䇿者論此是與跖議捕盜也抱朴子曰今普天一統九垓同風王制政令誠宜齊一夫衡量小器猶不可使往往而有異況人士之格而可參差而無檢乎江表雖逺宻邇海隅然染道化率禮道亦既千餘載矣往雖暫隔不盈百年而儒學之事亦不偏廢也惟以其土宇徧於中州故人士之數不得鈞其多少耳及其徳行才學之高者子㳺仲任之徒亦未謝上國也昔吳王初年附其貢士見格以不試今太平已近四十年矣猶復不試所以使東南儒業衰於在昔也此乃見同於左衽之𩔖非所以别之也且夫君子猶愛人以禮況為其愷悌之父母邪法有招患令有損化其此之謂也今貢士無復試者則必皆修飾馳逐以競虚名誰肯復開卷受書哉所謂饒之適足以敗之者也自有天性好古心恱藝文學不為禄味道忘貧若法高卿周生烈者學精而不仕狥乎榮利者萬之一耳至於甯越倪寛黄霸之徒所以强自篤勵於典籍者非天性也皆由患苦困瘁欲以經術自拔耳向使非漢武之世則朱買臣嚴助之屬亦未必讀書也今若取富貴之道幸有意于學者而復素無自然之好豈肯復空自勤苦執灑掃為諸生逺行尋師問道者乎兵興之世武貴文寢俗人視儒士如僕虜見經誥如芥壌者何哉由於聲名背乎此也夫不用譬猶售章甫於於越狥蚦蛇于華夏矣今若遐邇一例明考課試則必多負笈千里以尋師友轉其禮賂之費以買記籍者不俟終日矣抱朴子曰才學之士堪秀孝者已不可多得矣就今其人若如桓靈之世舉吏不先以財貨便安臺閣主者則雖諸經兼本解於問無不對猶見枉誣使不得過矣常追恨于時執事不重為之防除余意謂新年當試貢舉者今年便可使儒官才士豫作諸䇿計足周用集禁其留草殿中封閉之臨試之時亟賦之人事因縁於是絶當答䇿者皆可㑹著一處高選臺省之官親監察之又嚴禁之其交闗出入畢事乃遣違犯有罪無赦如此囑託之冀窒矣夫明君恃己之不可欺不恃人之不欺己也亦何耻於峻為斯制乎若試經法立則天下不可以不立學官而人自勤學矣漢四科亦有明解法令入仕今在職之人官無大小悉不知法令或有㣲言難曉而小吏多頑而使之決獄是以死生委之以輕百姓之命付無知之人也作官長不知法為下吏所欺而不知又決其口筆者憒憒不能知合法與不合不問不以付主者或以意斷事蹉跌不慎法令亦可令亷良之吏皆取明律令者試之如試經髙者隨才品叙用如此天下必少弄法之吏失理之獄矣交際第十六}
