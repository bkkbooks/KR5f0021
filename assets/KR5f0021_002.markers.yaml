  - {type: variant, offset: 2588, length: 0, content: '', CK-KZ: 不能支故主欽若九有同賓君以故官赴除郎中稍遷至太中大夫厯位大中肐鄕令縣戸二萬舉州最治德化尤異恩洽刑淸野有頌聲路無姦跡不佃公田越界如市秋毫之贈不入於門紙筆之用皆出私財刑措而禁止不言而化行以疾去官發詔見用爲吳郞中令正色弼違進可替否舉善彈枉軍國肅雍遷邵陵太守卒於官洪者君之第三子也生晚爲二親所嬌嬈不早見督以書史年十有三而慈父見背夙失庭訓饑寒困瘁躬執耕穡承星履草密勿疇襲}
