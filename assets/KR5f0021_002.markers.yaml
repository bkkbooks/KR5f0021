  - {type: variant, offset: 2599, length: 4, content: 豈宜居君, CK-KZ: 不拒也後有以答之亦不登時也洪嘗謂史雲不食於昆弟華生治潔於昵客葢邀名之僞行非廊廟之遠量也洪尤疾無義之人不勤農桑之本業而慕非義之姦利持鄉論者則賣選舉以取謝有威勢者則解符疏以索財或有罪人之賂或枉有理之家或爲逋逃之藪而饗亡命之人或抉使民丁妨以公役或强收錢物以求貴價或占錮市肆奪百姓之利或割人田地刼孤弱之業憁恫官府之間以窺括尅之益內以誇妻妾外以釣名位其如此者不與交焉由是俗人憎洪疾已自然疏絕故巷無車馬之跡堂無異志之賓庭可設萑羅而几筵積塵焉洪自有識逮以將老口不及人之非不說人之私乃自然也雖僕豎有所短所羞之事不以戲之也未嘗論評人物之優劣不喜訶譴人交之好惡或爲尊長所逼問辭不獲已其論人也則獨舉彼體中之勝事而已其論文也則撮其所得之佳者而不指摘其病累故無毁譽之恕貴人時或問官吏民甲乙何如其淸高賢能者洪指說其快事其貪暴闇塞者對以偶不識悉洪由此頗見譏責以顧護太多不能明辯臧否使皂白區分而洪終不敢改也每見世人有好論人物者比方倫匹未必當允而褒貶與奪或失准格見譽者自謂已分未必信德也見侵者則憾之入骨劇於血讎洪益以爲戒遂不復言及士人矣雖門宗子弟其稱兩皆以付邦族不爲輕乎其價數也或以譏洪洪答曰我身在我者也法當易知設令有人問我使自比古人及同時令我自求輩則我實不能自知可與誰爲匹也况非我安可爲取評定之耶漢末俗弊朋黨分部許子將之徒以口舌取戒爭訟論議門宗成讎故汝南人士無復定價而有月旦之評魏武帝深亦疾之欲取其首爾乃奔波亡走殆至屠滅前鑒不遠可以得師矣且人之未易知也雖父兄不必盡子弟也同於我者遽是乎異於我者遽非乎或有始無卒唐堯公旦仲尼季札皆有不全得之憾無以近人信其嘍嘍管見熒燭之明而輕人評物是皆賣彼上聖大賢乎昔大安中石氷作亂六州}
