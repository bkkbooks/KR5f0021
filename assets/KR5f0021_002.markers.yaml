  - {type: variant, offset: 2212, length: 0, content: '', WYG: 士之恥也安為之過而不改斯誠委夷路而陷叢棘舍嘉㫖而咽鈎吻者也豈所謂以小善為無益而不為以小惡為無損而不止以至惡積而不可掩罪大而不可解者邪余願世人改其險詖之行除其驕吝之失遣其誇矜之人諸疾絶息嘲弄不典之言則趙勝之門不去客黄祖之棓無所用矣抱朴子曰或有不治清徳以取敬而仗氣力以求畏其入衆也則亭立不坐争處端上作色諧聲逐人自安其不得意恚懟不退其行出入也窄逼之地恥於分塗振䇿長驅推人於險有不即避更加攄頓嗚呼悲哉此云古之卑而不可踰推䕃譲路勞謙下士無競於物立若不勝衣行若不容身者何其腼然之不肖哉夫盛操清節雖深自抱降而人猶貴之若履蹈不髙則雖行凌暴而人猶不敬假令外服人體内失人心所謂見憎惡非為見尊重也昔莊生未食趙王側立騶衍入疆燕君擁篲康成之里逆虜望拜林祖之庭莫不卑肅非力之所服也夫以抄盜致財雖巨富不足嘉凶徳脅人雖見憚不足}
