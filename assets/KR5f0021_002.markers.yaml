  - {type: variant, offset: 1774, length: 2, content: 變通, WYG: 真嶷然特立才逺量逸懷霜履氷思綿天地器兼元凱執已衡門淵渟嶽立寜潔身以守滯恥脅肩以苟合樂饑陋巷以勵髙尚之節藏器全真以待天年之盡非時不出非禮不動結褐嚼蔬而不悒悒也黄髪終否而不悢悢力尚也也安肯蹙泰山之峻以適鑿枘之中斂垂天之羽為戒旦之役編於仕𩔖而抑鬱庸兒之下捨鸞鳯之林適枳棘之藪競腐䑕於踞鴟而枉尺以直尋哉且大賢之狀也至拙為味也甚淡蕭然自足泊爾無知知之者稀而不蹙時不能用而不悶雖并日無藜藿之糝不以易不義之大牢也雖緼袍無卒嵗之服不肯樂無道之狐白也獨可散髪髙枕守其所有以絶不曲躬低眉求其所未須也徳薄位厚弗交也名與實違弗親也榮華馳逐弗務也豪狹姦權弗接也俗説細辨不答也脅肩所赴弗隨也貌愚而志達面垢而行潔乎若嵩岱銓衡所不能測也浩乎若滄海斗斛所不能校也峻其重仞之髙隱其百官之富觀彼佻竊若草莽也邈世之操𦕈焉冠秋雲之表遺俗之神緬焉棲九𤣥之端雖窮賤而不可脅以威雖危苦而不可動以利其所業耳可聞而不可盡也其所執手可見而不可論也故疾之者齊聲而側目愛之者寡弱而無益亦猶撮壤不能填決河升水不能殄原火於是鼗皷戢雷霆之音鞉徒刀切鞞奴移切恣喋鼛音髙之響芳蕙芟夷臭鮑佩御𤣥鬯傾棄而不羞醨酪專灌于圓丘汗血驅放而垂耳跛蹇馳騁於鑾軒此}
