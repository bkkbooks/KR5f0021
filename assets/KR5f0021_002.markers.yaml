  - {type: variant, offset: 695, length: 319, content: 增威放之未憂於官曠從其志則可以闡弘風化熙隆退讓厲苟進之貪夫感輕薄之冒昧雖器不益於旦夕之用才不周於立朝之後不亦愈於脅肩低眉諂媚權右提贄懷貨宵征同塵爭津競濟市買名品棄德行學問之本赴雷同比周之末也彼六君尚不肯苦言以侵隱士寧肯加之鋒刃乎聖賢誠可師者吕尚居然謬矣漢高帝雖細行多闕不涉典藝然其弘曠恢廓善恕多容不繫近累蓋豁如也雖飢渴四皓而不逼也及太子卑辭致之以爲羽翼便敬德矯情惜其大者發黄鵠之悲歌杜婉妾之顗覦其珍賢貴隱如此之至也宜其以布衣而君四海其度量蓋有過人者矣且夫吕尚之殺狷華者在於恐其沮衆也然俗之所患者病乎躁於進趨不務行業耳不苦於安貧樂賤者之太多也假令隱士往往屬目至於情掛勢利志無止足者終莫能割此常慾而慕彼退靜者也開闢已降非少人也而忘富遺貴之士猶, CK-KZ: 救焚山寸膠}
  - {type: variant, offset: 695, length: 319, content: 增威放之未憂於官曠從其志則可以闡弘風化熙隆退讓厲苟進之貪夫感輕薄之冒昧雖器不益於旦夕之用才不周於立朝之後不亦愈於脅肩低眉諂媚權右提贄懷貨宵征同塵爭津競濟市買名品棄德行學問之本赴雷同比周之末也彼六君尚不肯苦言以侵隱士寧肯加之鋒刃乎聖賢誠可師者吕尚居然謬矣漢高帝雖細行多闕不涉典藝然其弘曠恢廓善恕多容不繫近累蓋豁如也雖飢渴四皓而不逼也及太子卑辭致之以爲羽翼便敬德矯情惜其大者發黄鵠之悲歌杜婉妾之顗覦其珍賢貴隱如此之至也宜其以布衣而君四海其度量蓋有過人者矣且夫吕尚之殺狷華者在於恐其沮衆也然俗之所患者病乎躁於進趨不務行業耳不苦於安貧樂賤者之太多也假令隱士往往屬目至於情掛勢利志無止足者終莫能割此常慾而慕彼退靜者也開闢已降非少人也而忘富遺貴之士猶, CK-KZ-jye: 救焚山寸膠}
