  - {type: variant, offset: 2199, length: 1, content: 染, WYG: 内保永年外免釁累也盖饑寒難堪者也而清節者不納不義之穀帛焉困賤難居者也而髙尚者不處危亂之榮貴焉蓋計得則能忍之心全矣道勝則害性之事棄矣夫酒醴之近味生病之毒物無毫分之細益有丘山之巨損君子以之敗徳小人以之速罪耽之惑之尠息淺切不及禍世之士人亦知}
  - {type: variant, offset: 2201, length: 0, content: '', WYG: 然既莫能絶又不肯節縱心口之近欲輕召災之本源似熱渴之恣冷雖適已而身危也小大亂喪亦罔非酒然而俗人是酣是湎音其初筵也抑抑濟濟言希容整詠湛露之厭厭歌在鎬之愷樂舉萬夀之觴誦温克之義日未移晷體輕耳熱夫琉璃螺殻之器並用滿酌罰餘之令遂急醉而不止㧞轄投井於是口涌鼻溢濡首及亂屢儛躚躚舍其坐遷載號載呶女交切宣也如沸如羮或爭辭尚勝或啞啞烏格笑聲切獨笑或無對而談或嘔吐几筵或值蹷居月切良倡或冠脱帯解貞良者流華督之顧眄怯懦者效慶忌之蕃㨗遲重者蓬轉而波擾整肅者鹿踊而魚躍口訥於寒暑者皆垂掌而諧聲謙卑而不競者悉狂瞻以髙視亷恥之儀毁而錯之疾發闒茸之性露而傲佷之態出精濁}
