  - {type: variant, offset: 303, length: 389, content: 甘於刑殺不修仁義故其劫殺之禍萌於始封周公聞之知其無國也夫攻守異容道貴知變而吕尚無烹鮮之術出致遠之御推戰陳之法害高尚之士可謂賴甲冑以完刃又兼之浮泳以射走之儀又望求之於準的者也夫傾庶鳥之巢則靈鳳不集漉魚鼈之池則神虬遐逝刳凡獸之胎則麒麟不峙其郊害一介之士則英傑不踐其境吕尚創業垂統以示後人而張苛酷之端開殘賊之軏適足以驅俊民以資他國逐賢能以遺讎敵也去彼市馬骨以致駿足軾陋巷以退秦兵者不亦遠乎子謂吕尚何如周公乎仕人曰不能審也逸民曰夫周公大聖以貴下賤吐哺握髮懼於失人從白屋之士七十人布衣之徒親執贄所師見者十人所友者十有一人皆逼以在朝也設令吕尚居周公之地則此等皆成市朝之暴尸而溝澗之腐胔矣唐堯非不能致許由巢父也虞舜非不能脅善卷石户也夏禹非不能逼柏成子高也成湯非不能録卞隨務光也魏文非不能屈干木也𣈆平非不能吏期唐也然復而肆之貴而重之豈六君之劣弱也誠以百行殊尚默默難齊慕尊賢之美稱耻賊善之醜迹取之, CK-KZ: 升合}
