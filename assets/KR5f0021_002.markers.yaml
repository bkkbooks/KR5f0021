  - {type: variant, offset: 1773, length: 0, content: '', WYG: 能脱逐身之景樂成者不能免理致之敗匠流末者未若挺冶元兆之中整已然者不逮原本乎𤣥朴之外是以覺尺蠖者甘屈以保伸識通塞者不慘悦於否泰且夫洪陶範物大象流形躁靜異尚翔沉舛情金寶其重羽矜其輕篤隘者執束於滓汁達妙者逍遥於𤣥清潢洿納行潦而乃噎渤澥吞百川而不盈鮋鰕踊悦於泥濘赤螭凌厲乎髙㝠嚼香餌者快嗜欲而赴死味虚淡者含天和而趨生識機神者瞻無兆而弗惑闇休咎者觸强弩而不驚各附攸好安肯改營吾聞五玉不能自剖於嵩岫騰蛇不能無霧而電征龍淵不能勿操而斷犀兕景鍾不能莫扣而揚洪聲金芝須商風而激耀倉庚俟烟煴以修鳴騏騄不苟馳以赴險君子不詭遇以毁名運屯則沉淪於勿用時行則髙竦乎天庭士以自衒為不髙女以自媒為不貞何必委洗耳之峻標效負爼之干榮哉夫其窮也則有虞婆娑而陶鈞尚父見逐於愚嫗范生來辱於溺簀苦恠切籠也𢎞式匿竒於耕牧及其達也則淮隂投竿而稱孤文種解屫而紆青傅説釋築而論道管子脱桎為上卿葢君子藏器以有待也畜徳以有為也非其時不見也非其君不事也窮達任所值出處無所繫其靜也則為逸民之宗其動也則為元凱之表或運思於立言或銘勲乎國器殊途同歸其致一焉士能為可貴之行而不能使俗必貴之也能為可用之才而不能使世必用之也被褐茹草垂綸罝兎則心歡意得如將終身服冕乗軺兼朱重紫則若固有之常如布衣此至人之用懷也若席上之珍不積環堵之操不粹者予之過也知之者希名位不臻以玉為石謂鳯曰鷃者非余罪也夫汲汲於見知悒悒於否滯者常民之情也浩然而養氣淡爾靡欲者無悶之至也時至道行器大者不悦天地之間知命者不憂若乃狥萬金之貨以索百千之售多失骭干上聲毛我則未暇矣名實第十九門人問曰聞漢末之世靈獻之時品藻乖濫英逸窮滯饕得志名不凖實賈不本物以其通者為賢塞者為愚其故何哉抱朴子答曰夫雷霆輷磕而或不聞焉七曜經天而或不見焉豈唯形器有聾瞽哉心神所蔽亦又如之是以聞格言而不識者非無耳也見英異而不知者非無目也由乎聰不經妙而明不逮竒也夫智大量逺者盤桓以山峙器小志近者蓬飛而萍浮夫唯山峙故莫之能動焉夫唯萍浮故流而不滯焉方之貨也則緘連以待賈者唯至珍而難售鳴鼔以狥之者雖見蔽而易盡比之材也則結根於嵩岱者雖竦葢千仞垂䕃萬畆而莫之知也挿株於塗要者雖鈎曲戾細雖速朽而猶見用也故廟堂有枯楊之瑚簋窮谷多不伐之梓豫也是竊華名者螻騰於雲霄失實賈者翠虬淪乎九泉於是斥鷃凌風以髙奮靈鳯卷翮以幽戢鉛鋒充太阿之寶犬羊佻勅髙切獨行貌虎狼之資矣夫佞者鼓珍賂為勁羽則無高而不到矣乘朋黨為舟楫則無逺而不濟矣持之以夙興側立加之以先意承指其利口謏辭也似辨其道聴塗説也似學其心險貌柔也似仁其行汚言潔也似亷其好説人短也似忠其不知忌諱也似直故多通焉且愛奉望我者欲我欲之不求我者我不能愛自然之理也夫賢常少而愚常多多則比周而匿瑕少則孤弱而無援佞人相汲引而柴正路俊哲處下位而不見知㧞茅之義犯而負乘之羣興亢龍髙墜泣血漣如故子西逐大聖之仲尼臧倉毁命世之孟軻二生不免斯患降兹亦何足言斯禍盖與開闢並生苦之匪唯一世也歴覽振古多同此疾至於駑蹇矯首於琱多么切輦駥驥委牧乎林坰彼已尸䘵邦國殄瘁下凌上替實此之由或蟲流而莫斂或逆竄於申亥或擢筋於廟梁或絶命於望夷葢所㧞之非真而忠能之不用也故明君勤於招賢而汲汲於擢竒道達凝滯而嚴防壅蔽才誠足委不拘於屠釣言審可施抽之於戎戍或舉於牛口之下而加之於羣僚之上或㧞於桎梏之中而任以社稷之重故能勲業隆濟拓境服逺取威定功垂統長世也夫直䋲者枉木之所憎也清公者姦慝之所讎也人主不能運𤣥鑒以索隱而必須當塗之所舉然每觀前代專權之徒率其所舉皆在乎附舉己者也所薦者先乎利己者也毁所畏而進所愛所畏則至公者也所愛則同私者也至公用則姦黨破衆私立則主威奪矣姦黨破則昇泰之所由也主威奪則危亡之端漸矣毁所畏則恐辭之不痛雖刖劓之猶未稱意焉故必除之而後快也彼進所愛則苦談之不美雖立超之猶未逞心焉故必危彼以安此也是故抱枉而死無愆而黜者有自來矣所以體道}
