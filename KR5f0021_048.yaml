front:
  text: 抱朴子外篇卷之四十七
  hash: sha256:efbdaffaf2e960685cf8d9504c8132eedc10b99c8b6682a9a508e6eeae7cec7c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0021_HFL_048-001a, image: hfl/0873/0873-132.png}
body:
  text: 彈禰抱朴子曰漢末有禰衡者年二十有三孔文舉齒過知命身居九列文學冠羣少長稱譽名位殊絶而友衡於布衣又表薦之於漢朝以爲宜起家作臺郎云惟岳降神異人並出目所一見輒誦於口耳所瞥聞不忘於心性與道合思若有神其歎之如此衡游許下自公卿國士以下衡初不稱其官皆名之云阿某或以姓呼之爲某兒呼孔融爲大兒呼楊脩爲小兒荀彧猶强可與語過此以往皆木梗泥偶似人而無人氣皆酒瓮飯囊耳百官大會衡時在坐忽顰蹙悽愴哀歎忼慨或譏之曰英豪樂集非所歎也衡顧眄歷視稠衆而答曰在此積尸列柩之間仁人安能不悲乎曹公嘗切齒欲殺之然復無正有入法應死之罪又惜有殺儒生之名乃謫作鼓吏衡了無悔情恥色乃縛角於柱口就吹之乃有異聲並摇𪔛擊鼓聞者不知其一人也而論更劇無所顧忌尋亡走投荆州牧劉表表欲作書與孫權討逆于時已全據江東帶甲百萬欲結輔車之援共其距中國使諸文士立草盡思而不得表意乃示衡衡省之曰但欲使孫左右柱刀兒視之者此可用爾儻令張子布見此大辱人也即摧壞投地表悵然有怪色謂衡曰爲了不中芸鋤乎惜之也索紙筆便更書之衆所作有十餘通衡凡一歷視之而已暗記書之畢以還表表以還主或有録所作之本也以比校之無一字錯乃各大驚表乃請衡更作衡則作成手不停輟表甚以爲佳而施用焉衡驕傲轉甚一州人士莫不憎恚而表亦不復堪欲殺之或諫以爲曹公名爲嚴酷猶能容忍衡少有虛名若一朝殺之則天下游士莫復擬足於荆楚者也表遂遣之衡走到夏口依將軍黄祖祖待以上賔祖大兒黄射與衡偕行過人墓下俱讀碑銘一過而去久之射曰前所視碑文大佳恨不寫也衡曰卿存之名耳我一覽尚記之即爲暗書之末有一字右缺乃不分明衡與半字曰疑此當作某字恐不審也射省可雖言行輕人密顧榮顯是以高游鳳林不能幽翳蒿萊然修己駮刺迷而不覺故開口見憎舉足蹈禍齎如此之伎倆亦何理容於天下而得其死哉猶梟鳴狐嚾人皆不喜音響不改易處何益許下人物之海也文舉爲之主任荷之足爲至到於此不安已可知矣猶必死之病俞附越人所無如何朽木鈆鋌班輸歐冶所不能匠也而復走投荆楚間終陷極害此乃衡懵蔽之效也蓋欲之而不能得非能得而弗用者矣於戲才士可勿戒哉嵇生曰吾所惑者衡之虛名也子所論者衡之實病也敢不寤寐於指南投杖於折中乎抱朴子外篇卷之四十七
